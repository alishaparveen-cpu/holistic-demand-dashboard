<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8fafc;--s1:#ffffff;--s2:#f8fafc;--s3:#f1f5f9;--b:#e2e8f0;--b2:#cbd5e1;--t:#0f172a;--t2:#475569;--t3:#94a3b8;--g:#059669;--gb:rgba(5,150,105,.08);--gbr:rgba(5,150,105,.25);--r:#dc2626;--rb:rgba(220,38,38,.07);--rbr:rgba(220,38,38,.22);--a:#d97706;--ab:rgba(217,119,6,.09);--abr:rgba(217,119,6,.26);--bl:#0ea5e9;--blb:rgba(14,165,233,.08);--blbr:rgba(14,165,233,.22);--te:#4f46e5;--teb:rgba(79,70,229,.08);--sh:0 1px 3px rgba(15,23,42,.06)}

.live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--g);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.page{display:none}.page.on{display:block}

.cc-metrics{display:grid;grid-template-columns:repeat(4,1fr);padding:10px 14px}

.sw-summary{margin-top:6px;padding:7px 9px;border-radius:6px;font-size:11px;line-height:1.4}
.sw-summary.acute{background:var(--rb);color:var(--r);border:1px solid var(--rbr)}.sw-summary.chronic{background:rgba(124,58,237,.08);color:#7c3aed;border:1px solid rgba(124,58,237,.22)}
.iso-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;border:1px solid var(--b);background:var(--s2);margin-bottom:5px}
.iso-label{font-size:10px;color:var(--t2);flex:1}
.iso-val{font-family:'DM Mono',monospace;font-size:12px}.iso-val.r{color:var(--r)}.iso-val.g{color:var(--g)}.iso-val.a{color:var(--a)}.iso-val.n{color:var(--t2)}
.iso-badge{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px}
.ib-r{background:var(--rb);color:var(--r);border:1px solid var(--rbr)}.ib-g{background:var(--gb);color:var(--g);border:1px solid var(--gbr)}.ib-a{background:var(--ab);color:var(--a);border:1px solid var(--abr)}.ib-n{background:var(--s3);color:var(--t3);border:1px solid var(--b)}
.iso-conclusion{margin-top:7px;padding:7px 9px;border-radius:6px;font-size:11px;line-height:1.4;background:var(--s2);border:1px solid var(--b);color:var(--t2)}
.iso-conclusion strong{color:var(--t)}
.why-item{padding:7px 9px;border-radius:6px;border:1px solid;font-size:11px;line-height:1.4;margin-bottom:5px}
.why-item.checked{background:var(--rb);border-color:var(--rbr)}.why-item.possible{background:var(--ab);border-color:var(--abr)}.why-item.ruled-out{background:var(--s2);border-color:var(--b)}
.wi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}

<script>
const _cb='?t='+Date.now();
const TGT={b2d:75,noshow:15,recovery:50,l2b:60};
const WEEKLBL=i=>i===0?'W-1':'W-'+(i+1);   // index 0 = latest complete week
let SC={},LEADS={},EP={},GMB={},REVIEWS={},REM={},CB={},ROST={},LAGE={},WEEKS=[];
const RS=2000; // ₹ revenue per completed consult (for impact sizing)
let CLINICS=[],CITIES={},curCity='',curClinic='';

const sum=a=>a.reduce((x,y)=>x+(+y||0),0);
const avg=a=>a.length?sum(a)/a.length:0;
const r0=x=>Math.round(x);
const r1=x=>Math.round(x*10)/10;
const pctv=(a,b)=>b>0?Math.round(a/b*100):0;
const arr12=()=>Array(12).fill(0);
function sevColor(m,val,norm){ // returns 'r'/'a'/'g'
  if(m.dir==='lower'){ const d=val-norm; if(val>=m.tgt*1.5||d>=norm*0.4) return 'r'; if(val>m.tgt||d>=norm*0.15) return 'a'; return 'g'; }
  if(m.rate){ const d=norm-val; if(val<m.tgt*0.7||d>=norm*0.25) return 'r'; if(val<m.tgt||d>=5) return 'a'; return 'g'; }
  const d=norm-val; if(norm>0&&d/norm>=0.30) return 'r'; if(norm>0&&d/norm>=0.10) return 'a'; return 'g';
}
// ── metric definitions: each returns a 12-week array (newest-first) for a clinic ──
const METRICS={
  b2d:{label:'Book → Done (B2D)',dir:'higher',rate:true,tgt:TGT.b2d,unit:'%',
    series:c=>c.disp.total.map((t,i)=>t>0?r0(c.disp.done[i]/t*100):0)},
  noshow:{label:'No-show rate',dir:'lower',rate:true,tgt:TGT.noshow,unit:'%',
    series:c=>c.disp.done.map((d,i)=>{const k=d+c.disp.missed[i];return k>0?r0(c.disp.missed[i]/k*100):0;})},
  recovery:{label:'No-show recovery',dir:'higher',rate:true,tgt:TGT.recovery,unit:'%',
    series:c=>c.disp.missed.map((m,i)=>m>0?r0(c.disp.recovered_done[i]/m*100):0)},
  leads:{label:'Total leads',dir:'higher',rate:false,tgt:0,unit:'',
    series:c=>c.leads},
  l2b:{label:'Lead → Book',dir:'higher',rate:true,tgt:TGT.l2b,unit:'%',
    series:c=>c.leads.map((l,i)=>l>0?Math.min(100,r0(c.disp.new_bk[i]/l*100)):0)},
  bookings:{label:'Bookings',dir:'higher',rate:false,tgt:0,unit:'',
    series:c=>c.disp.total}
};
const ORDER=['b2d','noshow','recovery','leads','l2b'];

function clinObj(key){
  const sc=(SC[key]||{}).disp||{}, ld=LEADS[key]||{}, gm=GMB[key]||{}, rv=REVIEWS[key]||{};
  const rem=REM[key]||{}, cb=CB[key]||{}, rost=ROST[key]||{}, lage=LAGE[key]||{};
  const f=(o,k)=>(o[k]||arr12()).slice(0,12);
  const leads=arr12();
  ['gmb','google_ad','organic','fb','justdial','others'].forEach(ch=>{const a=f(ld,ch);for(let i=0;i<12;i++)leads[i]+=a[i];});
  const practo=(EP[key]&&EP[key].channel&&EP[key].channel.Practo)?f(EP[key].channel.Practo,'total'):arr12();
  for(let i=0;i<12;i++)leads[i]+=practo[i];
  return {key,city:key.split('|')[0],clinic:key.split('|')[1],
    disp:{total:f(sc,'total'),new_bk:f(sc,'new_bk'),done:f(sc,'done'),missed:f(sc,'missed'),recovered_done:f(sc,'recovered_done')},
    leads, gmbSearch:f(gm,'searches'), gmbInter:f(gm,'interactions'),
    revN:f(rv,'n'), revNeg:f(rv,'neg'), rating:(rv.rating||[]),
    // ── ops cross-data: reminders (booked + the no-show subset), PCC callbacks, capacity, lead freshness ──
    rem:{tot:f(rem,'total'),sent:f(rem,'rem_sent'),deliv:f(rem,'rem_delivered'),read:f(rem,'rem_read'),
         nsTot:f(rem,'ns_total'),nsDeliv:f(rem,'ns_delivered'),nsRead:f(rem,'ns_read')},
    cb:{ns:f(cb,'noshows'),called:f(cb,'called_back')},
    cap:{hrs:f(rost,'hrs'),weHrs:f(rost,'we_hrs'),sched:f((rost.shr||{}),'sched'),shrunk:f((rost.shr||{}),'shrunk')},
    lage:{same:f(lage,'same'),last:f(lage,'last'),older:f(lage,'older')}};
}
// aggregate a list of clinic objects into one (sum counts; recompute rates downstream)
function aggClin(list){
  const o={disp:{total:arr12(),new_bk:arr12(),done:arr12(),missed:arr12(),recovered_done:arr12()},leads:arr12(),gmbSearch:arr12(),gmbInter:arr12(),revN:arr12(),revNeg:arr12()};
  list.forEach(c=>{ for(const k in o.disp) for(let i=0;i<12;i++) o.disp[k][i]+=c.disp[k][i];
    for(let i=0;i<12;i++){o.leads[i]+=c.leads[i];o.gmbSearch[i]+=c.gmbSearch[i];o.gmbInter[i]+=c.gmbInter[i];o.revN[i]+=c.revN[i];o.revNeg[i]+=c.revNeg[i];}});
  return o;
}
// metric value at week w for a (possibly aggregated) clinic object
function mval(m,c,w){ return METRICS[m].series(c)[w]||0; }
// ── volume / signal guards: a 0% rate on ~0 bookings is "no signal", not "broken" ──
function vol4(c){ return sum(c.disp.done.slice(0,4))+sum(c.disp.missed.slice(0,4)); } // RESOLVED bookings, last 4 wk (open/unmatured excluded — rates need a settled denominator)
function leads4(c){ return sum(c.leads.slice(0,4)); }
function lowSig(c){ return vol4(c)<8 && leads4(c)<12; }      // too thin / too unmatured to diagnose reliably
// per-metric signal gate: a rate is only trustworthy if THIS WEEK's denominator is settled enough.
// (4-week history isn't enough — a clinic can have history but an all-open current week → 0% is censoring, not failure.)
function metricSig(m,c){
  const res0=c.disp.done[0]+c.disp.missed[0];          // resolved bookings this week
  if(m==='b2d'||m==='noshow') return res0>=4;
  if(m==='recovery') return c.disp.missed[0]>=2;        // recovery is meaningless with ~0 no-shows
  if(m==='l2b') return c.leads[0]>=4 && c.disp.total[0]>=3;
  return c.leads[0]>=3 || c.disp.total[0]>=4;            // leads / bookings volume
}
// metric colour with the signal gate applied — returns 'n' (neutral) when there isn't enough to judge
function mcol(m,c,w){ if(!metricSig(m,c)) return 'n'; const s=METRICS[m].series(c); return sevColor(METRICS[m],s[w],avg(s.slice(1,7))); }

// ── load data ──
async function load(){
  const F=(f)=>fetch(f+_cb).then(r=>r.ok?r.json():{}).catch(()=>({}));
  const [sc,ld,ep,gm,rv,rem,cb,rost,lage]=await Promise.all([F('data_scorecard.json'),F('data_leads.json'),F('data_booking_episodes.json'),F('data_gmb_insights.json'),F('data_reviews.json'),F('data_reminders.json'),F('data_callback.json'),F('data_roster.json'),F('data_lead_age.json')]);
  SC=sc;LEADS=ld;EP=ep;GMB=gm;REVIEWS=rv;REM=rem;CB=cb;ROST=rost;LAGE=lage;
  WEEKS=(sc._meta&&sc._meta.weeks)||(ep._meta&&ep._meta.weeks)||[];
  CLINICS=Object.keys(SC).filter(k=>k!=='_meta').map(clinObj).filter(c=>c.disp.total.some(x=>x>0));
  CITIES={}; CLINICS.forEach(c=>{(CITIES[c.city]=CITIES[c.city]||[]).push(c);});

}
// network aggregate object (all clinics)
function netObj(){ return aggClin(CLINICS); }
function cityObj(city){ return aggClin(CITIES[city]||[]); }

// ── CLINIC DETAIL ──
function drillCity(city){ curCity=city; const list=CITIES[city]||[]; // pick worst clinic by score (deprioritise thin/no-signal)
  curClinic=list.map(c=>{let s=0;ORDER.forEach(m=>{if(mcol(m,c,0)==='r')s+=2;else if(mcol(m,c,0)==='a')s+=1;});
    if(lowSig(c))s=vol4(c)*0.001;            // thin clinics sink below any real-signal clinic; among themselves, higher volume first
    else s+=10+vol4(c)*0.001;                // real-signal clinics always outrank thin ones
    return {c,s};}).sort((a,b)=>b.s-a.s)[0].c.key;
  showPage('clinic'); renderClinic();
}

// ── DRAWER: 5-question diagnostic ──
function openDrawer(m){
  const c=CLINICS.find(x=>x.key===curClinic); if(!c)return;
  const M=METRICS[m],a=M.series(c),W=0,v=a[0];
  const norm4=avg(a.slice(1,5)),norm6=avg(a.slice(1,7)),col=mcol(m,c,0);
  document.getElementById('d-metric-label').textContent=M.label;
  const valEl=document.getElementById('d-metric-val'); valEl.textContent=v+M.unit; valEl.className='dh-val '+col;
  document.getElementById('d-metric-ctx').textContent=`${c.clinic} · W-1 · target ${M.tgt}${M.unit}`;
  // Q1 WHAT
  let lastNormIdx=-1;for(let i=1;i<12;i++){if(sevColor(M,a[i],avg(a.slice(i+1,i+5)))==='g'){lastNormIdx=i;break;}}
  const q1=`<div class="what-grid">
    <div class="what-box"><div class="what-n ${col}">${v}${M.unit}</div><div class="what-l">This week (W-1)</div></div>
    <div class="what-box"><div class="what-n ${sevColor(M,a[1],avg(a.slice(2,6)))}">${a[1]}${M.unit}</div><div class="what-l">Last week (W-2)</div></div>
    <div class="what-box"><div class="what-n g">${lastNormIdx>0?a[lastNormIdx]+M.unit:'—'}</div><div class="what-l">${lastNormIdx>0?WEEKLBL(lastNormIdx)+' (last normal)':'no normal wk'}</div></div>
    <div class="what-box"><div class="what-n n">${r0(norm4)}${M.unit}</div><div class="what-l">4-week average</div></div></div>`;
  // Q2 HOW BAD
  const sevMult=M.dir==='lower'?(norm4>0?v/norm4:1):(v>0?norm4/v:99);
  const sevTxt=M.dir==='lower'?`${r1(sevMult)}× above normal`:(v<norm4?`${r1(sevMult)}× below normal`:'at/above normal');
  const sevClass=col;
  const bar=(lbl,val,c2,pct)=>`<div class="hb-row"><div class="hb-dot" style="background:var(--${c2==='n'?'t3':c2})"></div><div class="hb-label">${lbl}</div><div style="flex:1"><div class="hb-bar-bg"><div class="hb-bar-fill" style="width:${Math.min(100,pct)}%;height:100%;background:var(--${c2==='n'?'t3':c2})"></div></div></div><div class="hb-val ${c2}">${val}${M.unit}</div></div>`;
  const mx2=Math.max(v,norm4,norm6,M.tgt,1);
  const q2=bar('This week',v,col,v/mx2*100)+bar('4-week avg',r0(norm4),'g',norm4/mx2*100)+bar('6-week avg',r0(norm6),'g',norm6/mx2*100)+(M.tgt?bar('Target',M.tgt,'a',M.tgt/mx2*100):'')+
    `<div class="severity-box ${sevClass}"><strong>Severity: ${col==='r'?'Critical':col==='a'?'Watch':'Healthy'}.</strong> ${v}${M.unit} vs ${r0(norm4)}${M.unit} avg — ${sevTxt}. ${col==='r'?'A structural break, not noise.':col==='a'?'A meaningful dip worth watching.':'Within normal range.'}</div>`;
  // Q3 SINCE WHEN
  let breach=0;for(let i=0;i<8;i++){if(sevColor(M,a[i],avg(a.slice(i+1,i+5)))!=='g')breach++;else break;}
  let rows='';for(let i=7;i>=0;i--){const n=avg(a.slice(i+1,i+5));const cc=a.slice(i).every(x=>x===0)&&i>0?'na':sevColor(M,a[i],n);const cls=cc==='g'?'above':cc==='a'?'warn':cc==='na'?'na':'below';const lbl=cc==='na'?'no data':a[i]+M.unit+(cc==='g'?' ✓':cc==='r'?' ✗':' ~');rows+=`<div class="sw-bar"><div class="sw-wk">${WEEKLBL(i)}</div><div class="sw-box ${cls}"><div class="sw-box-val">${lbl}</div></div></div>`;}
  const acute=breach<=2;
  const q3=rows+`<div class="sw-summary ${acute?'acute':'chronic'}"><strong>${breach===0?'No active issue.':acute?`Acute — started ${WEEKLBL(breach-1)}.`:`Chronic — ${breach}+ weeks.`}</strong> ${breach===0?'This metric is at or above normal.':acute?'Something changed recently. Look at what moved in the last 1–2 weeks.':'Long-standing — a structural/staffing issue, not a one-off.'}</div>`;
  // Q4 IS IT JUST ME
  const co=cityObj(curCity),net=netObj();
  const cityV=mval(m,co,W),netV=mval(m,net,W);
  const multiClinic=CITIES[curCity].length>1;
  const peers=CITIES[curCity].filter(x=>x.key!==c.key).slice(0,2);
  const isoRow=(lbl,val,badge)=>`<div class="iso-row"><div class="iso-label">${lbl}</div><div class="iso-val ${badge}">${val}${M.unit}</div><div class="iso-badge ib-${badge}">${badge==='r'?'ANOMALY':badge==='a'?'Watch':badge==='n'?'Low signal':'Normal'}</div></div>`;
  let q4=isoRow(`This clinic (${c.clinic})`,v,col);
  if(multiClinic){peers.forEach(p=>{const pa=M.series(p);q4+=isoRow(`${p.clinic} (same city)`,pa[0],sevColor(M,pa[0],avg(pa.slice(1,5))));});
    q4+=isoRow(`${curCity} city avg`,cityV,sevColor(M,cityV,avg(M.series(co).slice(1,7))));}
  q4+=isoRow('Network avg',netV,sevColor(M,netV,avg(M.series(net).slice(1,7))));
  const netBadge=sevColor(M,netV,avg(M.series(net).slice(1,7)));
  const cityBad=multiClinic&&sevColor(M,cityV,avg(M.series(co).slice(1,7)))!=='g';
  const q4verdict=!multiClinic?'Single-clinic city':cityBad?'City-wide':'Clinic-specific';
  q4+=`<div class="iso-conclusion"><strong>Verdict: ${q4verdict}.</strong> ${!multiClinic?`${curCity} has only this clinic, so we can't separate "clinic execution" from "local market" here. Best comparison is the network (${netV}${M.unit}, ${netBadge==='r'?'also weak':netBadge==='a'?'soft':'healthy'}): ${col==='r'&&netBadge!=='r'?`this clinic is worse than the network — likely its own ops, not the market.`:col==='r'&&netBadge==='r'?`the network is weak too — likely a system-wide issue, not just here.`:`broadly in line with the network.`}`:cityBad?`The whole of ${curCity} is off on this metric — a market/seasonal/city-ops issue, not just ${c.clinic}. Fix at city level.`:`City avg (${cityV}${M.unit}) and network (${netV}${M.unit}) are normal — specific to ${c.clinic}, not the market. Look at this clinic's own ops/ads.`}</div>`;
  // Q5 WHY (the AI cross-data engine)
  const q5=whyEngine(m,c,co);
  // assemble
  const secs=[['1','What is the number?',v+M.unit+' this week',col,q1],['2','How bad is it?',sevTxt,col,q2],['3','Since when?',breach===0?'No issue':acute?'Acute · '+breach+'wk':'Chronic · '+breach+'+wk',col,q3],['4','Is it just this clinic?',q4verdict,cityBad?'a':col,q4],['5','Why did it happen?',q5.headline,col,q5.html]];
  document.getElementById('d-sections').innerHTML=secs.map((s,i)=>`<div class="d-sec"><div class="d-sec-head" onclick="toggleSec(this)"><div class="d-sec-num">${s[0]}</div><div class="d-sec-title">${s[1]}</div><div class="d-sec-status ${s[3]||'n'}">${s[2]}</div><div class="d-sec-chev ${i<2?'open':''}">▶</div></div><div class="d-sec-body ${i<2?'on':''}">${s[4]}</div></div>`).join('');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('clinic-main').classList.add('drawer-open');
}
// ── the cross-data "Why" engine: MEASURES each candidate cause against real data
//    (reminders delivered/read, PCC callbacks vs no-shows, roster capacity, lead freshness,
//     GMB visibility, reviews, city-vs-network) and ranks by ₹ impact — not fixed rules. ──
function inr(x){ x=Math.round(x); return x>=1000?'₹'+(x/1000).toFixed(x>=10000?0:1)+'k':'₹'+x; }
function whyEngine(m,c,co){
  const items=[];
  const d=(s)=>{const n=avg(s.slice(1,5));return n>0?(s[0]-n)/n*100:0;};   // % vs 4w norm
  const dpp=(s)=>s[0]-avg(s.slice(1,5));                                    // pp vs 4w norm
  const pct=(a,b)=>b>0?r0(a/b*100):0;
  const add=(rank,label,text,action,impact)=>items.push({rank,label,text,action,impact:impact||0});
  // this-week reads (newest = index 0)
  const total0=c.disp.total[0], done0=c.disp.done[0], miss0=c.disp.missed[0], rec0=c.disp.recovered_done[0];
  const nsTot=c.rem.nsTot[0], nsDeliv=c.rem.nsDeliv[0], nsRead=c.rem.nsRead[0];   // reminders to the no-show patients
  const remGap=Math.max(0,nsTot-nsDeliv), readGap=Math.max(0,nsDeliv-nsRead);
  const cbNs=c.cb.ns[0], cbCalled=c.cb.called[0], callGap=Math.max(0,cbNs-cbCalled);
  const hrs0=c.cap.hrs[0], hrsN=avg(c.cap.hrs.slice(1,5)), hrsD=d(c.cap.hrs);
  const leadsD=d(c.leads), gmbD=d(c.gmbSearch), nsD=dpp(METRICS.noshow.series(c));
  const recPct=METRICS.recovery.series(c)[0], l2b0=METRICS.l2b.series(c)[0];
  const older=c.lage.older[0]||0, sameL=c.lage.same[0]||0, lastL=c.lage.last[0]||0, agedShare=pct(older+lastL,older+lastL+sameL);
  const revNeg=c.revNeg[0]||0, revVel=c.revN[0]||0, revVelN=avg(c.revN.slice(1,5));
  const multiClinic=(CITIES[c.city]||[]).length>1;   // city-vs-clinic only means something with >1 clinic
  const cityBad=multiClinic&&sevColor(METRICS[m],METRICS[m].series(co)[0],avg(METRICS[m].series(co).slice(1,7)))!=='g';

  // low-signal gate — be honest when there isn't enough to diagnose
  if(lowSig(c)){
    add('checked','Low volume — too thin to diagnose',`This clinic had only ${vol4(c)} matured bookings and ${leads4(c)} leads in the last 4 weeks. At this volume a single no-show swings every rate by tens of points, so the % above is noise, not a trend.`,'→ Don\'t action a % here. Track absolute counts (bookings, no-shows) until volume builds.');
  }

  // city-wide context first (it reframes everything below)
  if(cityBad&&!lowSig(c)) add('checked','Market / city-wide — not just this clinic',`All of ${c.city} moved the same way on ${METRICS[m].label.toLowerCase()} — points to seasonality, a city-level ad/budget change or a market shift, not this clinic's execution.`,'→ Check city-level ad spend + a competitor/seasonality scan for '+c.city+'; fix at city level.',0);

  // ---- NO-SHOW / B2D : both are driven by the show-up funnel ----
  if((m==='noshow'||m==='b2d')&&!lowSig(c)){
    if(m==='b2d'&&total0>0) add('checked',`No-shows are the leak (${miss0} of ${total0})`,`B2D is low chiefly because ${miss0} of ${total0} booked patients (${pct(miss0,total0)}%) didn't show. Completions themselves aren't the problem — attendance is.`,'→ Work the no-show levers below; each recovered no-show is ~'+inr(RS)+'.',miss0*RS);
    if(nsTot>=2&&remGap>=1) add('checked',`Reminder delivery gap — ${remGap} of ${nsTot} no-shows never got one`,`Of ${nsTot} no-shows this week, only ${nsDeliv} received a *delivered* reminder — ${remGap} never did (bad/missing number or send failure). Fixing delivery alone is worth ~${inr(remGap*RS)}.`,'→ Audit WhatsApp/SMS delivery logs + phone-number capture at booking for this clinic.',remGap*RS);
    else if(nsTot>=2&&remGap===0) add('ruled-out','Reminder delivery',`${nsDeliv}/${nsTot} no-shows DID get a delivered reminder — delivery is not the gap here.`,'',0);
    if(nsTot>=2&&readGap>=2) add('possible',`Reminders delivered but unread — ${readGap} of ${nsDeliv}`,`${readGap} of ${nsDeliv} delivered reminders were never opened — patients aren't engaging with the message (wrong channel, generic copy, or stale number).`,'→ Add a live confirmation call for unread reminders; test SMS vs WhatsApp.',0);
    if(nsTot>=2&&remGap===0&&readGap<2&&nsRead>=2) add('checked',`Reminded & read, still no-show — ${nsRead} patients`,`${nsRead} no-shows read their reminder and still didn't come. This is intent/commitment, not message delivery — a reminder won't fix it.`,'→ Day-before *live* confirmation call (not just a reminder); ask to re-confirm or release the slot.',nsRead*RS*0.5);
  }
  // ---- RECOVERY : the measured "calls happen but don't convert" insight ----
  if((m==='recovery'||((m==='noshow'||m==='b2d')&&recPct<TGT.recovery))&&!lowSig(c)){
    if(cbNs>=2&&callGap<=1&&recPct<TGT.recovery)
      add('checked','Callbacks happen but don\'t convert',`PCCs called back ${cbCalled} of ${cbNs} no-shows — effort is there. But only ${rec0} came back and completed (recovery ${recPct}%). The break is call→rebook conversion, not call volume.`,'→ Don\'t push "call more". Fix the offer on the call: hold a priority slot, remove rebooking friction; track call→rebook, not calls made.',(cbNs-rec0)*RS);
    else if(cbNs>=2&&callGap>=2)
      add('checked',`No-shows not called back — ${callGap} of ${cbNs} uncontacted`,`Only ${cbCalled} of ${cbNs} no-shows were called back; ${callGap} were never contacted. Each un-worked no-show is ~${inr(RS)} left on the table.`,'→ Enforce the 48-hour callback list; assign an owner for this clinic\'s no-shows.',callGap*RS);
  }
  // ---- LEADS : visibility vs conversion, measured against GMB ----
  if(m==='leads'&&!lowSig(c)){
    if(gmbD<=-15) add('checked',`GMB visibility down ${r1(Math.abs(gmbD))}%`,`Profile searches fell to ${c.gmbSearch[0]} (vs ~${r0(avg(c.gmbSearch.slice(1,5)))} norm). Fewer people see the listing → fewer leads upstream.`,'→ Check GMB profile status/suspension, recent posts, category & photo freshness; review velocity drives rank.',0);
    else if(leadsD<=-15&&gmbD>-5) add('checked','Leads down, visibility held — it\'s click→lead',`Searches held but leads fell ${r1(Math.abs(leadsD))}% — the loss is in click→enquiry (ad relevance, landing page, or lead routing), not exposure.`,'→ Pull Google Ads Search-Terms for junk queries; verify the right landing page & call-tracking number.',0);
    if(revVelN>0.5&&revVel<revVelN-0.5) add('possible','Review velocity slowing — future rank risk',`New reviews dropped to ${revVel}/wk (was ~${r1(revVelN)}). Slowing velocity erodes GMB rank over weeks → fewer future leads.`,'→ Restart the review ask at checkout.',0);
  }
  // ---- L2B : capacity, lead freshness, quality ----
  if(m==='l2b'&&!lowSig(c)){
    if(hrsD<=-12) add('checked',`Fewer bookable hours — ${hrs0} vs ${r0(hrsN)}`,`Scheduled doctor hours fell ${r1(Math.abs(hrsD))}% this week. Leads can't be booked into slots that don't exist — the low book-rate is partly a supply cap, not lost intent.`,'→ Check roster gaps/leave for this clinic; protect prime-hour capacity.',0);
    if(agedShare>=35) add('possible',`Working aged leads — ${agedShare}% are >1wk old`,`${agedShare}% of this week's worked leads are carried over from earlier weeks. Aged leads convert worse, dragging the book-rate down even if new-lead handling is fine.`,'→ Tighten same-day speed-to-lead; separate fresh vs backlog conversion in reporting.',0);
    if(leadsD>5) add('possible','Lead quality dip — volume up, conversion down',`Leads rose ${r1(leadsD)}% but book-rate fell — classic broad-match expansion pulling lower-intent traffic.`,'→ Search-Terms report for off-topic queries; add negative keywords.',0);
  }
  // ---- BOOKINGS : demand vs supply ----
  if(m==='bookings'&&!lowSig(c)){
    if(hrsD<=-12) add('checked',`Supply down — ${hrs0} hrs vs ${r0(hrsN)}`,`Scheduled hours fell ${r1(Math.abs(hrsD))}%. Fewer slots mechanically caps bookings regardless of demand.`,'→ Restore roster hours; check doctor leave/attrition.',0);
    if(leadsD<=-15) add('checked',`Demand down — leads ${r1(Math.abs(leadsD))}% below norm`,`Top-of-funnel leads fell ${r1(Math.abs(leadsD))}%, so fewer bookings follow. This is a marketing/visibility issue, not ops.`,'→ See the Leads metric for the visibility-vs-conversion split.',0);
  }
  // ---- generic rule-outs (only when confidently not the cause) ----
  if(m!=='leads'&&m!=='bookings'&&Math.abs(leadsD)<10&&!lowSig(c)) add('ruled-out','Lead demand',`Leads are ~flat (${r1(leadsD)}% vs norm) — top-of-funnel isn't the cause.`,'',0);
  if(revNeg===0&&(m==='b2d'||m==='leads'||m==='noshow')&&!lowSig(c)) add('ruled-out','Negative reviews',`0 negative reviews recently — not a trust/rank cause this week.`,'',0);
  if(multiClinic&&!cityBad&&!lowSig(c)) add('ruled-out','Market / competitor',`City & network are normal on this metric — not a market-wide issue, it's this clinic.`,'',0);
  else if(!multiClinic&&!lowSig(c)) add('possible','Market vs clinic — can\'t fully separate',`${c.city} has only this one clinic, so internal data can't split "clinic execution" from "local market". Compare against network and nearby cities to judge.`,'',0);
  if((m==='l2b'||m==='bookings')&&hrsD>-12&&!lowSig(c)) add('ruled-out','Capacity',`Scheduled hours are roughly steady (${hrs0} vs ${r0(hrsN)}) — supply isn't the constraint.`,'',0);

  // rank: checked (by ₹ impact desc) → possible → ruled-out
  const order={checked:0,possible:1,'ruled-out':2};
  items.sort((a,b)=>order[a.rank]-order[b.rank] || (b.impact-a.impact));
  const top=items.find(i=>i.rank==='checked');
  const totImpact=items.filter(i=>i.rank==='checked').reduce((s,i)=>s+i.impact,0);
  let nChecked=0;
  const html=`<div class="ai-banner">🤖 <b>Cross-data read:</b> each cause below was <b>tested against the data</b> — reminders (delivered/read), PCC callbacks vs no-shows, roster capacity, lead freshness, GMB visibility, reviews & city-vs-network. Ranked by ₹ impact.${totImpact>0?` <b>~${inr(totImpact)}/wk</b> recoverable here.`:''}</div>`+
    items.map(it=>{const lbl=it.rank==='checked'?(++nChecked===1?'Most likely':'Confirmed factor'):it.rank==='possible'?'Possible':'Ruled out';
      return `<div class="why-item ${it.rank}"><div class="wi-label">${lbl} — ${it.label}${it.impact>0?` · <span style="opacity:.85">${inr(it.impact)}/wk</span>`:''}</div><div class="wi-text">${it.text}</div>${it.action?`<div class="wi-action">${it.action}</div>`:''}</div>`;}).join('');
  return {headline:top?top.label.split('—')[0].trim():(cityBad?'City-wide':'No clear cause'),html};
}

function showPage(p){document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));document.getElementById('page-'+p).classList.add('on');if(p==='cities')closeDrawer();}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('clinic-main').classList.remove('drawer-open');}
function toggleSec(h){const b=h.nextElementSibling,ch=h.querySelector('.d-sec-chev'),o=b.classList.contains('on');b.classList.toggle('on',!o);ch.classList.toggle('open',!o);}
load();
</script>
</body>
