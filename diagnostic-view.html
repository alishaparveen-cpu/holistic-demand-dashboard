<script>
const _cb='?t='+Date.now();
const TGT={b2d:75,noshow:15,recovery:50,l2b:60};
const WEEKLBL=i=>i===0?'W-1':'W-'+(i+1);   // index 0 = latest complete week
let SC={},LEADS={},EP={},GMB={},REVIEWS={},REM={},CB={},ROST={},LAGE={},DF={},DFW=[],PL={},RN={},L2C={},WEEKS=[];
const RS=2000; // ₹ revenue per completed consult (for impact sizing)
const T1_CITIES=['Bangalore','Mumbai','Navi Mumbai','Pune','Hyderabad','Chennai','Delhi'];
function cityTier(city){ return T1_CITIES.includes(city)?'T1':'T2'; }
// maturity from how many of the 12 weeks had any resolved bookings (proxy for "how established")
function matBucket(c){ const active=c.disp.total.filter(x=>x>0).length; return active<=5?'New':active<=9?'Maturing':'Mature'; }
// bucket a review date (YYYY-MM-DD) into the Monday-week index of WEEKS
function weekIdxOf(dtStr){ const d=new Date(dtStr+'T00:00:00'); for(let i=0;i<WEEKS.length;i++){const m=new Date(WEEKS[i]+'T00:00:00'),e=new Date(m.getTime()+6*864e5); if(d>=m&&d<=e)return i;} return -1; }
function buildNeg(key){ const a=RN[key]||[],cnt=arr12(),handled=arr12(); let recent=null;
  a.forEach(r=>{const i=weekIdxOf(r.dt); if(i>=0){cnt[i]++; if(r.replied)handled[i]++;} if(!recent||r.dt>recent.dt)recent=r;});
  return {cnt,handled,recent,total:a.length}; }
function l2cCity(city){ const row=(L2C.by_city||[]).find(x=>(x.city||'').toLowerCase()===city.toLowerCase()); if(!row||!row.reached)return null; return {reached:row.reached,connected:row.connected,rate:pctv(row.connected,row.reached)}; }
// peer-cohort value for a metric. Rate metrics → aggregate rate; COUNT metrics → per-clinic average
// (comparing one clinic's leads to the cohort SUM would be nonsense).
function cohortVal(m,pred,excl){ const list=CLINICS.filter(x=>x.key!==excl&&pred(x)); if(!list.length)return {v:null,n:0,norm:null};
  const o=aggClin(list); let v=mval(m,o,0), norm=avg(METRICS[m].series(o).slice(1,7));
  if(!METRICS[m].rate){ v=v/list.length; norm=norm/list.length; }
  return {v,n:list.length,norm}; }
// demand_funnel.json (relevancy + funnel) is maintained on its own weekly cadence and can lag the
// scorecard by a week — align it to the view's WEEKS by date so columns never silently shift.
function dfAlign(a){ return WEEKS.map(w=>{const j=DFW.indexOf(w);return j>=0?(a[j]==null?null:a[j]):null;}); }
function dfArr(key,grp,fld){ const o=DF[key]; const a=o&&o[grp]&&o[grp][fld]; return a?dfAlign(a):WEEKS.map(()=>null); }
let CLINICS=[],CITIES={},curCity='',curClinic='';

const sum=a=>a.reduce((x,y)=>x+(+y||0),0);
const avg=a=>a.length?sum(a)/a.length:0;
const r0=x=>Math.round(x);
const r1=x=>Math.round(x*10)/10;
const pctv=(a,b)=>b>0?Math.round(a/b*100):0;
const arr12=()=>Array(12).fill(0);
function sevColor(m,val,norm){ // returns 'r'/'a'/'g'
  if(m.dir==='lower'){ const d=val-norm; if(val>=m.tgt*1.5||d>=norm*0.4) return 'r'; if(val>m.tgt||d>=norm*0.15) return 'a'; return 'g'; }
  if(m.rate){ const d=norm-val; if(val<m.tgt*0.7||d>=norm*0.25) return 'r'; if(val<m.tgt||d>=5) return 'a'; return 'g'; }
  const d=norm-val; if(norm>0&&d/norm>=0.30) return 'r'; if(norm>0&&d/norm>=0.10) return 'a'; return 'g';
}
// ── metric definitions: each returns a 12-week array (newest-first) for a clinic ──
const METRICS={
  b2d:{label:'Book → Done (B2D)',dir:'higher',rate:true,tgt:TGT.b2d,unit:'%',
    series:c=>c.disp.total.map((t,i)=>t>0?r0(c.disp.done[i]/t*100):0)},
  noshow:{label:'No-show rate',dir:'lower',rate:true,tgt:TGT.noshow,unit:'%',
    series:c=>c.disp.done.map((d,i)=>{const k=d+c.disp.missed[i];return k>0?r0(c.disp.missed[i]/k*100):0;})},
  recovery:{label:'No-show recovery',dir:'higher',rate:true,tgt:TGT.recovery,unit:'%',
    series:c=>c.disp.missed.map((m,i)=>m>0?r0(c.disp.recovered_done[i]/m*100):0)},
  leads:{label:'Total leads',dir:'higher',rate:false,tgt:0,unit:'',
    series:c=>c.leads},
  l2b:{label:'Lead → Book',dir:'higher',rate:true,tgt:TGT.l2b,unit:'%',
    series:c=>c.leads.map((l,i)=>l>0?Math.min(100,r0(c.disp.new_bk[i]/l*100)):0)},
  bookings:{label:'Bookings',dir:'higher',rate:false,tgt:0,unit:'',
    series:c=>c.disp.total}
};
const ORDER=['b2d','noshow','recovery','leads','l2b'];

function clinObj(key){
  const sc=(SC[key]||{}).disp||{}, ld=LEADS[key]||{}, gm=GMB[key]||{}, rv=REVIEWS[key]||{};
  const rem=REM[key]||{}, cb=CB[key]||{}, rost=ROST[key]||{}, lage=LAGE[key]||{};
  const f=(o,k)=>(o[k]||arr12()).slice(0,12);
  const leads=arr12();
  ['gmb','google_ad','organic','fb','justdial','others'].forEach(ch=>{const a=f(ld,ch);for(let i=0;i<12;i++)leads[i]+=a[i];});
  const practo=(EP[key]&&EP[key].channel&&EP[key].channel.Practo)?f(EP[key].channel.Practo,'total'):arr12();
  for(let i=0;i<12;i++)leads[i]+=practo[i];
  return {key,city:key.split('|')[0],clinic:key.split('|')[1],
    disp:{total:f(sc,'total'),new_bk:f(sc,'new_bk'),done:f(sc,'done'),missed:f(sc,'missed'),recovered_done:f(sc,'recovered_done')},
    leads, gmbSearch:f(gm,'searches'), gmbInter:f(gm,'interactions'),
    revN:f(rv,'n'), revNeg:f(rv,'neg'), rating:(rv.rating||[]),
    // ── ops cross-data: reminders (booked + the no-show subset), PCC callbacks, capacity, lead freshness ──
    rem:{tot:f(rem,'total'),sent:f(rem,'rem_sent'),deliv:f(rem,'rem_delivered'),read:f(rem,'rem_read'),
         nsTot:f(rem,'ns_total'),nsDeliv:f(rem,'ns_delivered'),nsRead:f(rem,'ns_read')},
    cb:{ns:f(cb,'noshows'),called:f(cb,'called_back')},
    cap:{hrs:f(rost,'hrs'),weHrs:f(rost,'we_hrs'),sched:f((rost.shr||{}),'sched'),shrunk:f((rost.shr||{}),'shrunk'),avail:f((rost.shr||{}),'avail'),dow:(rost.dow||arr12()).slice(0,12)},
    lage:{same:f(lage,'same'),last:f(lage,'last'),older:f(lage,'older')},
    // lead quality / relevancy + funnel from the weekly demand superset (date-aligned to the view)
    rel:{leads:dfArr(key,'gmb_google','leads'),relevant:dfArr(key,'gmb_google','relevant'),sw:dfArr(key,'gmb_google','sw_booked')},
    // Practo funnel (own weekly cadence)
    practo:{leads:f((PL[key]||{}),'leads'),booked:f((PL[key]||{}),'booked')},
    // real negative reviews (live GBP feed) — date-bucketed; replied = "handled"
    negRev:buildNeg(key)};
}
// aggregate a list of clinic objects into one (sum counts; recompute rates downstream)
function aggClin(list){
  const o={disp:{total:arr12(),new_bk:arr12(),done:arr12(),missed:arr12(),recovered_done:arr12()},leads:arr12(),gmbSearch:arr12(),gmbInter:arr12(),revN:arr12(),revNeg:arr12()};
  list.forEach(c=>{ for(const k in o.disp) for(let i=0;i<12;i++) o.disp[k][i]+=c.disp[k][i];
    for(let i=0;i<12;i++){o.leads[i]+=c.leads[i];o.gmbSearch[i]+=c.gmbSearch[i];o.gmbInter[i]+=c.gmbInter[i];o.revN[i]+=c.revN[i];o.revNeg[i]+=c.revNeg[i];}});
  return o;
}
// metric value at week w for a (possibly aggregated) clinic object
function mval(m,c,w){ return METRICS[m].series(c)[w]||0; }
// ── volume / signal guards: a 0% rate on ~0 bookings is "no signal", not "broken" ──
function vol4(c){ return sum(c.disp.done.slice(0,4))+sum(c.disp.missed.slice(0,4)); } // RESOLVED bookings, last 4 wk (open/unmatured excluded — rates need a settled denominator)
function leads4(c){ return sum(c.leads.slice(0,4)); }
function lowSig(c){ return vol4(c)<8 && leads4(c)<12; }      // too thin / too unmatured to diagnose reliably
// per-metric signal gate: a rate is only trustworthy if THIS WEEK's denominator is settled enough.
// (4-week history isn't enough — a clinic can have history but an all-open current week → 0% is censoring, not failure.)
function metricSig(m,c){
  const res0=c.disp.done[0]+c.disp.missed[0];          // resolved bookings this week
  if(m==='b2d'||m==='noshow') return res0>=4;
  if(m==='recovery') return c.disp.missed[0]>=2;        // recovery is meaningless with ~0 no-shows
  if(m==='l2b') return c.leads[0]>=4 && c.disp.total[0]>=3;
  return c.leads[0]>=3 || c.disp.total[0]>=4;            // leads / bookings volume
}
// metric colour with the signal gate applied — returns 'n' (neutral) when there isn't enough to judge
function mcol(m,c,w){ if(!metricSig(m,c)) return 'n'; const s=METRICS[m].series(c); return sevColor(METRICS[m],s[w],avg(s.slice(1,7))); }

async function load(){

  SC=sc;LEADS=ld;EP=ep;GMB=gm;REVIEWS=rv;REM=rem;CB=cb;ROST=rost;LAGE=lage;DF=df;PL=pl;RN=rn;L2C=l2c;
  WEEKS=(sc._meta&&sc._meta.weeks)||(ep._meta&&ep._meta.weeks)||[];
  DFW=(df._meta&&df._meta.weeks)||[];
  CLINICS=Object.keys(SC).filter(k=>k!=='_meta').map(clinObj).filter(c=>c.disp.total.some(x=>x>0));
  CITIES={}; CLINICS.forEach(c=>{(CITIES[c.city]=CITIES[c.city]||[]).push(c);});

  renderCities();
}

function drillCity(city){ curCity=city; const list=CITIES[city]||[]; // pick worst clinic by score (deprioritise thin/no-signal)
  curClinic=list.map(c=>{let s=0;ORDER.forEach(m=>{if(mcol(m,c,0)==='r')s+=2;else if(mcol(m,c,0)==='a')s+=1;});
    if(lowSig(c))s=vol4(c)*0.001;            // thin clinics sink below any real-signal clinic; among themselves, higher volume first

}

    </div></div>`:'';
  // ── Reviews (real negatives from live GBP feed) ──
  const neg=c.negRev, neg4=sum(neg.cnt.slice(0,4)), negH4=sum(neg.handled.slice(0,4)), negOpen=neg4-negH4;

    ${chart8('Book → Done %',METRICS.b2d.series(c),sevColor(METRICS.b2d,METRICS.b2d.series(c)[0],avg(METRICS.b2d.series(c).slice(1,5))))}

    ${chart8('GMB searches',c.gmbSearch.map(x=>x),'bl')}
  </div></div>`;
  document.getElementById('threeCol').innerHTML=col1+panelBook+panelOps+panelAvail+panelRel+panelPracto+panelRev+col3;

// ── DRAWER: 5-question diagnostic ──
function openDrawer(m){
  const c=CLINICS.find(x=>x.key===curClinic); if(!c)return;
  const M=METRICS[m],a=M.series(c),W=0,v=a[0];
  const norm4=avg(a.slice(1,5)),norm6=avg(a.slice(1,7)),col=mcol(m,c,0);

  const valEl=document.getElementById('d-metric-val'); valEl.textContent=v+M.unit; valEl.className='dh-val '+col;
  document.getElementById('d-metric-ctx').textContent=`${c.clinic} · W-1 · target ${M.tgt}${M.unit}`;
  // Q1 WHAT
  let lastNormIdx=-1;for(let i=1;i<12;i++){if(sevColor(M,a[i],avg(a.slice(i+1,i+5)))==='g'){lastNormIdx=i;break;}}
  const q1=`<div class="what-grid">
    <div class="what-box"><div class="what-n ${col}">${v}${M.unit}</div><div class="what-l">This week (W-1)</div></div>
    <div class="what-box"><div class="what-n ${sevColor(M,a[1],avg(a.slice(2,6)))}">${a[1]}${M.unit}</div><div class="what-l">Last week (W-2)</div></div>
    <div class="what-box"><div class="what-n g">${lastNormIdx>0?a[lastNormIdx]+M.unit:'—'}</div><div class="what-l">${lastNormIdx>0?WEEKLBL(lastNormIdx)+' (last normal)':'no normal wk'}</div></div>
    <div class="what-box"><div class="what-n n">${r0(norm4)}${M.unit}</div><div class="what-l">4-week average</div></div></div>`;
  // Q2 HOW BAD
  const sevMult=M.dir==='lower'?(norm4>0?v/norm4:1):(v>0?norm4/v:99);
  const sevTxt=M.dir==='lower'?`${r1(sevMult)}× above normal`:(v<norm4?`${r1(sevMult)}× below normal`:'at/above normal');
  const sevClass=col;
  const bar=(lbl,val,c2,pct)=>`<div class="hb-row"><div class="hb-dot" style="background:var(--${c2==='n'?'t3':c2})"></div><div class="hb-label">${lbl}</div><div style="flex:1"><div class="hb-bar-bg"><div class="hb-bar-fill" style="width:${Math.min(100,pct)}%;height:100%;background:var(--${c2==='n'?'t3':c2})"></div></div></div><div class="hb-val ${c2}">${val}${M.unit}</div></div>`;
  const mx2=Math.max(v,norm4,norm6,M.tgt,1);
  const q2=bar('This week',v,col,v/mx2*100)+bar('4-week avg',r0(norm4),'g',norm4/mx2*100)+bar('6-week avg',r0(norm6),'g',norm6/mx2*100)+(M.tgt?bar('Target',M.tgt,'a',M.tgt/mx2*100):'')+
    `<div class="severity-box ${sevClass}"><strong>Severity: ${col==='r'?'Critical':col==='a'?'Watch':'Healthy'}.</strong> ${v}${M.unit} vs ${r0(norm4)}${M.unit} avg — ${sevTxt}. ${col==='r'?'A structural break, not noise.':col==='a'?'A meaningful dip worth watching.':'Within normal range.'}</div>`;
  // Q3 SINCE WHEN
  let breach=0;for(let i=0;i<8;i++){if(sevColor(M,a[i],avg(a.slice(i+1,i+5)))!=='g')breach++;else break;}
  let rows='';for(let i=7;i>=0;i--){const n=avg(a.slice(i+1,i+5));const cc=a.slice(i).every(x=>x===0)&&i>0?'na':sevColor(M,a[i],n);const cls=cc==='g'?'above':cc==='a'?'warn':cc==='na'?'na':'below';const lbl=cc==='na'?'no data':a[i]+M.unit+(cc==='g'?' ✓':cc==='r'?' ✗':' ~');rows+=`<div class="sw-bar"><div class="sw-wk">${WEEKLBL(i)}</div><div class="sw-box ${cls}"><div class="sw-box-val">${lbl}</div></div></div>`;}
  const acute=breach<=2;
  const q3=rows+`<div class="sw-summary ${acute?'acute':'chronic'}"><strong>${breach===0?'No active issue.':acute?`Acute — started ${WEEKLBL(breach-1)}.`:`Chronic — ${breach}+ weeks.`}</strong> ${breach===0?'This metric is at or above normal.':acute?'Something changed recently. Look at what moved in the last 1–2 weeks.':'Long-standing — a structural/staffing issue, not a one-off.'}</div>`;
  // Q4 IS IT JUST ME — fair peer cohort (same maturity × tier), not just city

  const multiClinic=CITIES[curCity].length>1;
  const myMat=matBucket(c), myTier=cityTier(c.city);

  const cohBadge=coh.v==null?'n':sevColor(M,coh.v,coh.norm);
  const worse=coh.v!=null&&(M.dir==='lower'?v>coh.v*1.15:v<coh.v*0.85);                       // clinic clearly off-cohort
  const cohWeak=coh.v!=null&&cohBadge!=='g';                                                  // the whole cohort is soft
  const isoRow=(lbl,val,badge)=>`<div class="iso-row"><div class="iso-label">${lbl}</div><div class="iso-val ${badge}">${val}${M.unit}</div><div class="iso-badge ib-${badge}">${badge==='r'?'ANOMALY':badge==='a'?'Watch':badge==='n'?'Low signal':'Normal'}</div></div>`;
  let q4=isoRow(`This clinic (${c.clinic})`,v,col);
  if(multiClinic)q4+=isoRow(`${curCity} city avg`,cityV,sevColor(M,cityV,avg(M.series(co).slice(1,7))));
  if(coh.v!=null)q4+=isoRow(`${myMat} · ${myTier} peers (n=${coh.n})`,r0(coh.v),cohBadge);
  q4+=isoRow('Network avg',netV,sevColor(M,netV,avg(M.series(net).slice(1,7))));
  const cohInfo={coh,worse,cohWeak,myMat,myTier};
  const q4verdict=coh.v==null?'vs network':worse?'This clinic':cohWeak?`${myMat} ${myTier} segment`:'In line';
  q4+=`<div class="iso-conclusion"><strong>Verdict: ${q4verdict}.</strong> ${coh.v==null?`Too few same-stage peers to benchmark fairly — comparing to network (${netV}${M.unit}).`:worse?`Worse than other <b>${myMat.toLowerCase()} ${myTier}</b> clinics (${r0(coh.v)}${M.unit} vs this ${v}${M.unit}). A like-for-like gap → it's this clinic's execution, <b>not</b> "it's a new/small clinic" or the market.`:cohWeak?`Other <b>${myMat.toLowerCase()} ${myTier}</b> clinics are soft on this too (${r0(coh.v)}${M.unit}) — likely a <b>segment/market</b> pattern, not this clinic alone. Fix at city/campaign level.`:`In line with same-stage peers (${r0(coh.v)}${M.unit}) — this is normal for a ${myMat.toLowerCase()} ${myTier} clinic, not an anomaly.`}</div>`;
  // Q5 WHY (the AI cross-data engine)
  const q5=whyEngine(m,c,co,cohInfo);
  // assemble
  const secs=[['1','What is the number?',v+M.unit+' this week',col,q1],['2','How bad is it?',sevTxt,col,q2],['3','Since when?',breach===0?'No issue':acute?'Acute · '+breach+'wk':'Chronic · '+breach+'+wk',col,q3],['4','Is it just this clinic?',q4verdict,worse?col:cohWeak?'a':'g',q4],['5','Why did it happen?',q5.headline,col,q5.html]];
  document.getElementById('d-sections').innerHTML=secs.map((s,i)=>`<div class="d-sec"><div class="d-sec-head" onclick="toggleSec(this)"><div class="d-sec-num">${s[0]}</div><div class="d-sec-title">${s[1]}</div><div class="d-sec-status ${s[3]||'n'}">${s[2]}</div><div class="d-sec-chev ${i<2?'open':''}">▶</div></div><div class="d-sec-body ${i<2?'on':''}">${s[4]}</div></div>`).join('');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('clinic-main').classList.add('drawer-open');
}
// ── the cross-data "Why" engine: MEASURES each candidate cause against real data
//    (reminders delivered/read, PCC callbacks vs no-shows, roster capacity, lead freshness,
//     GMB visibility, reviews, city-vs-network) and ranks by ₹ impact — not fixed rules. ──
function inr(x){ x=Math.round(x); return x>=1000?'₹'+(x/1000).toFixed(x>=10000?0:1)+'k':'₹'+x; }
function whyEngine(m,c,co,cohInfo){
  const items=[], fixesS=[], fixesL=[];
  const d=(s)=>{const n=avg(s.slice(1,5));return n>0?(s[0]-n)/n*100:0;};   // % vs 4w norm
  const dpp=(s)=>s[0]-avg(s.slice(1,5));                                    // pp vs 4w norm
  const pct=(a,b)=>b>0?r0(a/b*100):0;
  const add=(rank,label,text,action,impact,fx)=>{items.push({rank,label,text,action,impact:impact||0}); if(fx){if(fx.short)[].concat(fx.short).forEach(x=>fixesS.push(x)); if(fx.long)[].concat(fx.long).forEach(x=>fixesL.push(x));}};
  // worst-dropping lead source this week (vs its 4-wk norm)
  function leadDrop(){const ld=LEADS[c.key]||{};let w=null;
    [['gmb','GMB'],['google_ad','Google Ads'],['organic','Organic'],['fb','Meta'],['justdial','JustDial'],['others','Other']].forEach(([k,nm])=>{const a=(ld[k]||arr12()),n=avg(a.slice(1,5)),dd=(a[0]||0)-n;if(dd<0&&(!w||dd<w.d))w={k,nm,wv:a[0]||0,n,d:dd};});
    const pa=c.practo.leads,pn=avg(pa.slice(1,5)),pd=(pa[0]||0)-pn;if(pd<0&&(!w||pd<w.d))w={k:'practo',nm:'Practo',wv:pa[0]||0,n:pn,d:pd};
    return w;}
  // this-week reads (newest = index 0)
  const total0=c.disp.total[0], miss0=c.disp.missed[0], rec0=c.disp.recovered_done[0];
  const nsTot=c.rem.nsTot[0], nsDeliv=c.rem.nsDeliv[0], nsRead=c.rem.nsRead[0];
  const remGap=Math.max(0,nsTot-nsDeliv), readGap=Math.max(0,nsDeliv-nsRead);
  const cbNs=c.cb.ns[0], cbCalled=c.cb.called[0], callGap=Math.max(0,cbNs-cbCalled);
  const hrs0=c.cap.hrs[0], hrsN=avg(c.cap.hrs.slice(1,5)), hrsD=d(c.cap.hrs);
  const leadsD=d(c.leads);
  // GMB searches: the GBP API lags ~2-3 days, so the newest week is often 0 (not yet loaded). Use the
  // latest SETTLED (non-zero) week for the visibility read, or we'd cry "down 100%" every week.
  const gi=c.gmbSearch.findIndex(x=>x>0), gmbLag=gi>0;
  const gmbW=gi>=0?c.gmbSearch[gi]:0, gmbNorm=gi>=0?avg(c.gmbSearch.slice(gi+1,gi+5)):0, gmbDs=gmbNorm>0?(gmbW-gmbNorm)/gmbNorm*100:0;
  const recPct=METRICS.recovery.series(c)[0];
  const older=c.lage.older[0]||0, sameL=c.lage.same[0]||0, lastL=c.lage.last[0]||0, agedShare=pct(older+lastL,older+lastL+sameL);
  const revVel=c.revN[0]||0, revVelN=avg(c.revN.slice(1,5));
  // real negatives (last 4 weeks) + handled
  const neg=c.negRev, negRecent=sum(neg.cnt.slice(0,4)), negOpen=sum(neg.cnt.slice(0,4))-sum(neg.handled.slice(0,4)), rc=neg.recent;
  // fair-cohort signals (same maturity × tier) — replaces naive city compare
  const cohWide = cohInfo&&cohInfo.cohWeak&&!cohInfo.worse, clinicOwn = cohInfo&&cohInfo.worse;
  const segLbl = cohInfo?`${cohInfo.myMat.toLowerCase()} ${cohInfo.myTier}`:'peer';

  if(lowSig(c)){
    add('checked','Low volume — too thin to diagnose',`This clinic had only ${vol4(c)} matured bookings and ${leads4(c)} leads in the last 4 weeks. At this volume a single no-show swings every rate by tens of points, so the % above is noise, not a trend.`,'→ Track absolute counts (bookings, no-shows), not %, until volume builds.');
  }
  // cohort framing first — fair peer comparison (NOT raw city, which is unfair to new/small clinics)
  if(cohWide&&!lowSig(c)) add('checked',`Segment-wide — other ${segLbl} clinics down too`,`Not unique to ${c.clinic}: other <b>${segLbl}</b> clinics are soft on ${METRICS[m].label.toLowerCase()} this week (cohort ${r0(cohInfo.coh.v)}${METRICS[m].unit}). A like-for-like dip → a market/seasonal or campaign-level pattern, not this clinic's execution.`,`→ Review the ${segLbl} cohort + the campaign serving it together; fix centrally, not clinic-by-clinic.`,0,{long:`Track the ${segLbl} cohort as a unit — shared dips are campaign/market levers.`});
  else if(clinicOwn&&!lowSig(c)) add('checked',`Worse than same-stage peers — it's this clinic`,`${c.clinic} is off vs other <b>${segLbl}</b> clinics (peers ${r0(cohInfo.coh.v)}${METRICS[m].unit} vs this ${METRICS[m].series(c)[0]}${METRICS[m].unit}). The "it's new/small/market" excuse doesn't hold — same-stage peers do better, so it's local execution.`,'→ Focus on this clinic\'s own ops/marketing below.',0);

  // ---- NO-SHOW / B2D ----
  if((m==='noshow'||m==='b2d')&&!lowSig(c)){
    if(m==='b2d'&&total0>0) add('checked',`No-shows are the leak (${miss0} of ${total0})`,`B2D is low chiefly because ${miss0} of ${total0} booked patients (${pct(miss0,total0)}%) didn't show. Completions aren't the problem — attendance is.`,'→ Work the no-show levers below; each recovered no-show is ~'+inr(RS)+'.',miss0*RS);
    if(nsTot>=2&&remGap>=1) add('checked',`Reminder delivery gap — ${remGap} of ${nsTot} no-shows never got one`,`Of ${nsTot} no-shows, only ${nsDeliv} got a *delivered* reminder — ${remGap} never did (bad number or send failure). Fixing delivery alone is worth ~${inr(remGap*RS)}.`,'→ Audit WhatsApp/SMS delivery logs + phone-capture at booking.',remGap*RS,{short:`Fix reminder delivery for this clinic this week (numbers + template).`});
    else if(nsTot>=2&&remGap===0) add('ruled-out','Reminder delivery',`${nsDeliv}/${nsTot} no-shows DID get a delivered reminder — delivery is not the gap.`,'',0);
    if(nsTot>=2&&readGap>=2) add('possible',`Reminders delivered but unread — ${readGap} of ${nsDeliv}`,`${readGap} delivered reminders were never opened — wrong channel, generic copy, or stale number.`,'→ Add a live confirmation call for unread; test SMS vs WhatsApp.',0,{short:`Call the day-before for patients who didn't open the reminder.`});
    if(nsTot>=2&&remGap===0&&readGap<2&&nsRead>=2) add('checked',`Reminded & read, still no-show — ${nsRead}`,`${nsRead} no-shows read the reminder and still didn't come. Intent/commitment, not delivery — a reminder won't fix it.`,'→ Day-before *live* confirm call; ask to re-confirm or release the slot.',nsRead*RS*0.5,{short:`Introduce a day-before live confirmation call.`,long:`Consider a small commitment fee / deposit for first-timers.`});
  }
  // ---- RECOVERY ----
  if((m==='recovery'||((m==='noshow'||m==='b2d')&&recPct<TGT.recovery))&&!lowSig(c)){
    if(cbNs>=2&&callGap<=1&&recPct<TGT.recovery)
      add('checked','Callbacks happen but don\'t convert',`PCCs called back ${cbCalled} of ${cbNs} no-shows — effort is there. But only ${rec0} came back & completed (recovery ${recPct}%). The break is call→rebook conversion, not call volume.`,'→ Fix the offer on the call: hold a priority slot, remove rebooking friction; track call→rebook.',(cbNs-rec0)*RS,{short:`Give PCCs a "held slot" to offer on the callback this week.`,long:`Redesign the no-show recovery script around conversion, not just contact.`});
    else if(cbNs>=2&&callGap>=2)
      add('checked',`No-shows not called back — ${callGap} of ${cbNs} uncontacted`,`Only ${cbCalled} of ${cbNs} no-shows were called back; ${callGap} never contacted. Each un-worked no-show is ~${inr(RS)}.`,'→ Enforce the 48h callback list; assign an owner.',callGap*RS,{short:`Work the 48h callback list for the ${callGap} uncontacted no-shows.`});
  }
  // ---- LEADS : source-level drop diagnosis (which source, since when, profile vs conversion vs market) ----
  if(m==='leads'&&!lowSig(c)){
    let lbWeeks=0;for(let i=0;i<6;i++){const n=avg(c.leads.slice(i+1,i+5));if(n>0&&(c.leads[i]-n)/n<=-0.12)lbWeeks++;else break;}
    const since=lbWeeks<=1?'just this week':lbWeeks===2?'the last 2 weeks':`${lbWeeks}+ weeks`;
    const drop=leadDrop(), conn=l2cCity(c.city);
    if(gmbDs<=-15&&gmbW>0) add('checked',`GMB visibility down ${r1(Math.abs(gmbDs))}% — profile / rank`,`Profile searches fell to ${gmbW} (vs ~${r0(gmbNorm)} norm)${gmbLag?` for the week of ${(WEEKS[gi]||'').slice(5)} (GBP lags ~2-3d)`:`, starting ${since}`}. A sudden drop usually means the profile was suspended/edited, the category changed, or a competitor outranked you.`,`→ Check GMB profile status (suspension/edits), posts, category & photos; scan for a new competitor in ${c.city}.`,0,{short:`Verify the GMB profile is live & unflagged; re-post + refresh photos.`,long:`Sustained review velocity + local SEO to hold rank vs competitors.`});
    else if(drop&&drop.d<=-2){const act={gmb:'Check GMB rank/profile & reviews.',google_ad:'Check Google Ads budget pacing, impression share & paused campaigns.',practo:'Check Practo listing rank, profile completeness & subscription.',organic:'Check website/SEO & GBP rank.',fb:'Check Meta ad delivery & budget.',justdial:'Check JustDial listing status.',others:'Check referral sources.'}[drop.k]||'';
      add('checked',`Drop is from ${drop.nm} — ${drop.wv} vs ~${r0(drop.n)} norm`,`The leads loss is concentrated in <b>${drop.nm}</b> (−${Math.abs(r0(drop.d))} vs norm), starting ${since}; other sources broadly held. So it's a ${drop.nm}-specific channel issue, not broad demand.`,'→ '+act,0,{short:`Pull the ${drop.nm} report this week; confirm nothing was paused/suspended.`});}
    else if(leadsD<=-12) add('checked','Leads down, sources mixed',`Leads fell ${r1(Math.abs(leadsD))}% ${since} with no single source dominating — looks broad (market/seasonal or city campaign).`,'→ Compare against the segment cohort + check city-level campaign pacing.',0);
    if(conn&&conn.rate<70) add('possible',`Calls not connecting — ${conn.rate}% answer rate in ${c.city}`,`Across ${c.city}, only ${conn.connected} of ${conn.reached} reached leads connected (${conn.rate}%). Leads may be arriving but the call isn't landing — a staffing / answer-rate issue, not demand.`,'→ Detailed View → lead→conversion panel; check PCC staffing & call-attempt discipline.',0,{short:`Audit missed/abandoned calls; set a call-back SLA.`});
    if(revVelN>0.5&&revVel<revVelN-0.5) add('possible','Review velocity slowing — future rank risk',`New reviews dropped to ${revVel}/wk (was ~${r1(revVelN)}). Competitors with more reviews outrank you over weeks → fewer future leads.`,'→ Restart the review ask at checkout.',0,{long:`Build a steady review engine — you're losing the review-count race that drives map rank.`});
  }
  // ---- L2B ----
  if(m==='l2b'&&!lowSig(c)){
    if(hrsD<=-12) add('checked',`Fewer bookable hours — ${hrs0} vs ${r0(hrsN)}`,`Scheduled doctor hours fell ${r1(Math.abs(hrsD))}%. Leads can't book into slots that don't exist — partly a supply cap, not lost intent.`,'→ Check roster gaps/leave; protect prime-hour capacity.',0,{short:`Fill this week's roster gaps.`});
    if(agedShare>=35) add('possible',`Working aged leads — ${agedShare}% are >1wk old`,`${agedShare}% of worked leads are carried over from earlier weeks. Aged leads convert worse, dragging the book-rate down.`,'→ Tighten same-day speed-to-lead.',0,{short:`Prioritise same-day callbacks over the backlog.`});
    if(leadsD>5) add('possible','Lead quality dip — volume up, conversion down',`Leads rose ${r1(leadsD)}% but book-rate fell — classic broad-match expansion pulling lower-intent traffic.`,'→ Search-Terms report; add negative keywords.',0,{long:`Tighten keyword/match-type targeting for intent.`});
  }
  // ---- BOOKINGS ----
  if(m==='bookings'&&!lowSig(c)){
    if(hrsD<=-12) add('checked',`Supply down — ${hrs0} hrs vs ${r0(hrsN)}`,`Scheduled hours fell ${r1(Math.abs(hrsD))}%. Fewer slots caps bookings regardless of demand.`,'→ Restore roster hours; check doctor leave/attrition.',0,{short:`Restore roster hours this week.`});
    if(leadsD<=-15) add('checked',`Demand down — leads ${r1(Math.abs(leadsD))}% below norm`,`Top-of-funnel leads fell ${r1(Math.abs(leadsD))}%, so fewer bookings follow.`,'→ Open the Leads metric for the source-level split.',0);
  }
  // ---- NEGATIVE REVIEWS (real GBP feed) — trust + rank lever ----
  if((m==='b2d'||m==='noshow'||m==='leads')&&!lowSig(c)){
    if(negRecent>0) add('possible',`Negative review${negOpen>0?` · ${negOpen} unanswered`:' (replied)'}`,`${negRecent} negative review(s) in the last 4 weeks${rc?` — latest ${rc.rating}★ "${(rc.txt||'').slice(0,70)}…" (${rc.dt}, ${rc.replied?'replied ✓':'<b>no reply</b>'})`:''}. Negatives dent rank (→ leads) and first-timer show-up.`,negOpen>0?'→ Reply publicly within 24h; address the specific complaint.':'→ Already replied — monitor for repeat complaints on the same issue.',0,{short:negOpen>0?`Respond to the ${negOpen} unanswered negative review(s) today.`:`Check the complaint theme isn't recurring.`,long:`Lift review velocity so one negative doesn't swing the average — and to out-pace competitor review counts.`});
    else add('ruled-out','Negative reviews',`No negative reviews in the last 4 weeks — not a trust/rank cause now.`,'',0);
  }
  // ---- rule-outs ----
  if(m!=='leads'&&m!=='bookings'&&Math.abs(leadsD)<10&&!lowSig(c)) add('ruled-out','Lead demand',`Leads ~flat (${r1(leadsD)}% vs norm) — top-of-funnel isn't the cause.`,'',0);
  if((m==='l2b'||m==='bookings')&&hrsD>-12&&!lowSig(c)) add('ruled-out','Capacity',`Scheduled hours steady (${hrs0} vs ${r0(hrsN)}) — supply isn't the constraint.`,'',0);
  if(cohInfo&&cohInfo.coh.v!=null&&!cohWide&&!clinicOwn&&!lowSig(c)) add('ruled-out','Market / segment',`In line with same-stage ${segLbl} peers — not a market-wide issue.`,'',0);

  // rank: checked (by ₹ impact desc) → possible → ruled-out
  const order={checked:0,possible:1,'ruled-out':2};
  items.sort((a,b)=>order[a.rank]-order[b.rank] || (b.impact-a.impact));
  const top=items.find(i=>i.rank==='checked');
  const totImpact=items.filter(i=>i.rank==='checked').reduce((s,i)=>s+i.impact,0);
  let nChecked=0;
  const uniq=a=>[...new Set(a)];
  const fixCol=(title,col,bg,br,list)=>`<div style="background:${bg};border:1px solid ${br};border-radius:8px;padding:8px 10px"><div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:${col};margin-bottom:4px">${title}</div>${list.length?`<ul style="margin:0;padding-left:14px;font-size:10.5px;line-height:1.5;color:var(--t2)">${uniq(list).map(x=>`<li>${x}</li>`).join('')}</ul>`:'<div style="font-size:10px;color:var(--t3)">— nothing urgent</div>'}</div>`;
  const fixHtml=(fixesS.length||fixesL.length)?`<div style="margin-top:10px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-bottom:5px">Fixes</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${fixCol('⚡ Short-term · this week','var(--a)','var(--ab)','var(--abr)',fixesS)}${fixCol('🌱 Long-term · structural','var(--bl)','var(--blb)','var(--blbr)',fixesL)}</div></div>`:'';
  const html=`<div class="ai-banner">🤖 <b>Cross-data read:</b> each cause was <b>tested against the data</b> — reminders, callbacks, capacity, lead-source mix, GMB visibility, call-connect, real negative reviews & a <b>fair peer cohort</b> (same maturity × tier, not raw city). Ranked by ₹ impact.${totImpact>0?` <b>~${inr(totImpact)}/wk</b> recoverable.`:''}</div>`+
    items.map(it=>{const lbl=it.rank==='checked'?(++nChecked===1?'Most likely':'Confirmed factor'):it.rank==='possible'?'Possible':'Ruled out';
      return `<div class="why-item ${it.rank}"><div class="wi-label">${lbl} — ${it.label}${it.impact>0?` · <span style="opacity:.85">${inr(it.impact)}/wk</span>`:''}</div><div class="wi-text">${it.text}</div>${it.action?`<div class="wi-action">${it.action}</div>`:''}</div>`;}).join('')+fixHtml;
  return {headline:top?top.label.split('—')[0].trim():(cohWide?'Segment-wide':'No clear cause'),html};
}

function showPage(p){document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));document.getElementById('page-'+p).classList.add('on');if(p==='cities')closeDrawer();}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('clinic-main').classList.remove('drawer-open');}
function toggleSec(h){const b=h.nextElementSibling,ch=h.querySelector('.d-sec-chev'),o=b.classList.contains('on');b.classList.toggle('on',!o);ch.classList.toggle('open',!o);}
load();
</script>
