    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'top',labels:{font:{size:11},boxWidth:14,padding:12}}, tooltip:{mode:'index'} },
      scales:{ x:{grid:{display:false},ticks:{font:{size:10},maxRotation:30}}, y:{beginAtZero:true, ticks:{font:{size:11},callback:v=>viewMode==='share'?v.toFixed(1)+'%':fmt(v)}, grid:{color:'#f1f5f9'}} }
    }
  });
}

// ── Dual trend chart (stacked: category + non-category, with rate line) ──────
function buildDualTrendChart(weeks, cat, m, wkLabels, allWeekData) {
  const ctx = document.getElementById('dualTrendChart');
  if (!ctx) return;
  const catVals  = allWeekData.map(d => d.catVal);
  const nonVals  = allWeekData.map(d => Math.max(d.total - d.catVal, 0));
  const rateVals = allWeekData.map(d => d.total > 0 ? d.catVal / d.total * 100 : 0);
  const maxRate  = Math.max(...rateVals, 10);

  charts.dualTrend = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: wkLabels,
      datasets: [
        { label: m.label + ' calls', data: catVals, backgroundColor: m.color + 'BB',
          borderColor: m.color, borderWidth: 1, stack: 's', order: 2 },
        { label: 'Non-' + m.label, data: nonVals, backgroundColor: '#cbd5e1BB',
          borderColor: '#94a3b8', borderWidth: 1, stack: 's', order: 3 },
        { label: m.label + ' % (right)', data: rateVals, type: 'line',
          borderColor: '#f59e0b', backgroundColor: 'transparent', borderWidth: 2.5,
          pointRadius: 3, pointBackgroundColor: '#f59e0b', yAxisID: 'yRate',
          order: 1, tension: 0.3, spanGaps: true }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 14, padding: 12 } },
        tooltip: { mode: 'index', callbacks: {
          label: ctx => {
            if (ctx.dataset.yAxisID === 'yRate')
              return `${m.label} rate: ${(ctx.raw || 0).toFixed(1)}%`;
            return `${ctx.dataset.label}: ${Math.round(ctx.raw || 0).toLocaleString()}`;
          }
        }}
      },
      scales: {
        x:     { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } },
        y:     { stacked: true, beginAtZero: true, grid: { color: '#f1f5f9' },
                 ticks: { font: { size: 10 }, callback: v => fmt(v) } },
        yRate: { position: 'right', grid: { display: false }, suggestedMin: 0,
                 suggestedMax: Math.ceil(maxRate * 1.4),
                 ticks: { font: { size: 10 }, callback: v => v.toFixed(0) + '%' } }
      }
    }
  });
}

// ── Clinic-level category section ─────────────────────────────────────────────
function buildClinicCatSection(periods, cat, m, wkLabels, n4) {
  if (activeScope === 'online') return '';
  const scope = S();

  // Build per-clinic per-period series (bucketed), respecting geo/maturity filters
  const effClinSet = new Set(effectiveClinicKeys());
  const series = {};
  periods.forEach((p, i) => {
    for (const wk of p.weeks) {
      for (const [key, d] of Object.entries(scope.weekly_clinic?.[wk] || {})) {
        if (!effClinSet.has(key)) continue;
        if (!series[key]) series[key] = { catW: new Array(periods.length).fill(0), totW: new Array(periods.length).fill(0) };
        series[key].catW[i] += cat === 'SH' ? getSHVal(d) : cat === 'ALL' ? (d.total || 0) : (d[cat] || 0);
        series[key].totW[i] += d.total || 0;
      }
    }
  });

  const clinics = Object.entries(series).map(([key, s]) => {
    const sep  = key.indexOf('_');
    const city = sep > -1 ? key.slice(0, sep) : key;
    const name = sep > -1 ? key.slice(sep + 1) : key;

    if (activeTier !== 'ALL' && cityTier(city) !== activeTier) return null;
    if (geoCitySel.size && !geoCitySel.has(city)) return null;
    if (geoClinicSel.size && !geoClinicSel.has(city+'_'+(activeClinic))) { /* clinic-level: keep cities that have a selected clinic */ if(![...geoClinicSel].some(k=>k.split('_')[0]===city)) return null; }

    const totalAll = s.totW.reduce((a, b) => a + b, 0);
    if (totalAll < 5) return null;

    const earlyAvgTot = s.totW.slice(0, n4).reduce((a, b) => a + b, 0) / n4;
    const lateAvgTot  = s.totW.slice(-n4).reduce((a, b) => a + b, 0) / n4;
    const earlyAvgCat = s.catW.slice(0, n4).reduce((a, b) => a + b, 0) / n4;
    const lateAvgCat  = s.catW.slice(-n4).reduce((a, b) => a + b, 0) / n4;

    // Maturity: was this clinic active in the first n4 weeks?
    const maturity = earlyAvgTot > 2 ? 'mature' : (lateAvgTot > 2 ? 'new' : null);
    if (!maturity) return null;

    const totGrowthPct = earlyAvgTot > 1   ? (lateAvgTot - earlyAvgTot) / earlyAvgTot * 100 : null;
    const catGrowthPct = earlyAvgCat > 0.5 ? (lateAvgCat - earlyAvgCat) / earlyAvgCat * 100 : null;

    // Category trend classification
    let catTrend;
    if (maturity === 'new') {
      const lateTotSum = s.totW.slice(-n4).reduce((a, b) => a + b, 0);
      const lateCatSum = s.catW.slice(-n4).reduce((a, b) => a + b, 0);
      catTrend = lateTotSum > 0 && lateCatSum / lateTotSum * 100 >= 5 ? 'contributing' : 'not-contributing';
    } else if (catGrowthPct === null) {
      catTrend = 'maintained';
    } else {
      catTrend = catGrowthPct > 15 ? 'growing' : catGrowthPct < -15 ? 'declining' : 'maintained';
    }

    // New bookings diagnostic (mature clinics only)
    let diagnosis = null;
    if (maturity === 'mature' && totGrowthPct !== null && catGrowthPct !== null) {
      if      (totGrowthPct > 10  && catGrowthPct > 10)   diagnosis = 'cat-driving';
      else if (totGrowthPct > 10  && catGrowthPct < -10)  diagnosis = 'tot-up-cat-down';
      else if (totGrowthPct > 10)                          diagnosis = 'tot-up-cat-flat';
      else if (totGrowthPct < -10 && catGrowthPct > 10)   diagnosis = 'cat-holding';
      else if (totGrowthPct < -10 && catGrowthPct < -10)  diagnosis = 'both-down';
      else                                                 diagnosis = 'stable';
    }

    const totalCat = s.catW.reduce((a, b) => a + b, 0);
    const rate     = totalAll > 0 ? totalCat / totalAll * 100 : 0;

    return { city, name, catW: s.catW, totW: s.totW, totalCat, totalAll, maturity,
             earlyAvgCat, lateAvgCat, earlyAvgTot, lateAvgTot,
             catGrowthPct, totGrowthPct, catTrend, rate, diagnosis };
  }).filter(Boolean);

  if (!clinics.length) return '';

  // Sort: declining / problematic first, then maintained, then growing
  clinics.sort((a, b) => {
    const rank = t => (t === 'declining' || t === 'not-contributing' || t === 'both-down') ? 0
                    : (t === 'maintained' || t === 'stable' || t === 'tot-up-cat-flat') ? 1 : 2;
    const ra = rank(a.catTrend), rb = rank(b.catTrend);
    return ra !== rb ? ra - rb : (b.lateAvgCat || 0) - (a.lateAvgCat || 0);
  });

  const mature = clinics.filter(c => c.maturity === 'mature');
  const newC   = clinics.filter(c => c.maturity === 'new');
  const cnt = {
    growing:    mature.filter(c => c.catTrend === 'growing').length,
    maintained: mature.filter(c => c.catTrend === 'maintained').length,
    declining:  mature.filter(c => c.catTrend === 'declining').length,
    newContrib: newC.filter(c => c.catTrend === 'contributing').length,
    newNo:      newC.filter(c => c.catTrend === 'not-contributing').length,
  };

  function matBadge(mat) {
    return mat === 'new'
      ? `<span style="padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;background:#ede9fe;color:#6d28d9;white-space:nowrap;">New</span>`
      : `<span style="padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;background:#dbeafe;color:#1e40af;white-space:nowrap;">Mature</span>`;
  }

  function trendBadge(trend, mat) {
    if (mat === 'new') return trend === 'contributing'
      ? `<span style="padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7;">✓ Contributing</span>`
      : `<span style="padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;">Not yet</span>`;
    if (trend === 'growing')   return `<span style="padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7;">▲ Growing</span>`;
    if (trend === 'declining') return `<span style="padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;">▼ Declining</span>`;
    return `<span style="padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;">→ Maintained</span>`;
  }

  function diagCell(diag, tg, cg) {
    if (!diag) return `<span style="font-size:10px;color:#94a3b8;">—</span>`;
    const map = {
      'cat-driving':     ['✅', 'Cat driving growth',        '#ecfdf5', '#065f46'],
      'tot-up-cat-down': ['⚠️', 'Total ↑, cat losing share', '#fff7ed', '#9a3412'],
      'tot-up-cat-flat': ['🔵', 'Total ↑, cat flat',          '#eff6ff', '#1e40af'],
      'cat-holding':     ['💪', 'Cat holding vs decline',    '#eff6ff', '#1e40af'],
      'both-down':       ['❌', 'Both declining',            '#fef2f2', '#991b1b'],
      'stable':          ['—',  'Stable',                    '#f8fafc', '#475569'],
    };
    const [ico, txt, bg, col] = map[diag] || ['?', diag, '#f8fafc', '#475569'];
    const tStr = tg !== null ? ` T:${tg > 0 ? '+' : ''}${Math.round(tg)}%` : '';
    const cStr = cg !== null ? ` C:${cg > 0 ? '+' : ''}${Math.round(cg)}%` : '';
    return `<div style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;background:${bg};color:${col};white-space:nowrap;">${ico} ${txt}</div>
            <div style="font-size:9px;color:#94a3b8;margin-top:1px;">${tStr}${cStr}</div>`;
  }

  const rows = clinics.map(c => {
    // Dual sparkline: category (colored solid) + total calls (gray dashed) — both visible in zoom
    const catSparkBase = svgSparkline(c.catW, m.color, 90, 28, true, {
      labels: wkLabels,
      title: c.name + ' — ' + m.label + ' calls',
    });
    const safe2 = JSON.stringify(c.totW || []).replace(/'/g, '&#39;');
    const dualSpark = catSparkBase
      ? catSparkBase.replace(
          'class="spark-wrap"',
          `class="spark-wrap" data-sparkvals2='${safe2}' data-sparkcolor2='#94a3b8' data-sparklabel2='Total calls'`
        )
      : '';

    // Category growth string (first4 → last4 avg)
    const catGrowStr = c.catGrowthPct !== null
      ? `<span style="font-weight:700;color:${c.catGrowthPct > 15 ? '#059669' : c.catGrowthPct < -15 ? '#dc2626' : '#64748b'};">${c.catGrowthPct > 0 ? '+' : ''}${Math.round(c.catGrowthPct)}%</span>`
      : `<span style="font-size:10px;color:#94a3b8;">new</span>`;
    // Total growth string
    const totGrowStr = c.totGrowthPct !== null
      ? `<span style="font-weight:700;color:${c.totGrowthPct > 10 ? '#059669' : c.totGrowthPct < -10 ? '#dc2626' : '#64748b'};">${c.totGrowthPct > 0 ? '+' : ''}${Math.round(c.totGrowthPct)}%</span>`
      : `<span style="font-size:10px;color:#94a3b8;">new</span>`;

    // Proportion bar (cat share of total, recent period)
    const shareRatio = c.lateAvgTot > 0 ? Math.min(c.lateAvgCat / c.lateAvgTot * 100, 100) : 0;
    const shareColor = shareRatio > 22 ? '#dc2626' : shareRatio > 15 ? '#d97706' : '#10b981';
    const propBar = `<div style="display:flex;align-items:center;gap:4px;margin-top:3px;">
      <div style="flex:1;height:4px;background:#f1f5f9;border-radius:2px;min-width:40px;">
        <div style="width:${shareRatio.toFixed(1)}%;height:4px;background:${shareColor};border-radius:2px;"></div>
      </div>
      <span style="font-size:9px;color:${shareColor};font-weight:700;min-width:28px;">${shareRatio.toFixed(0)}%</span>
    </div>`;

    return `<tr>
      <td><div style="font-weight:600;">${c.name}</div><div style="font-size:10px;color:var(--muted);">${c.city}</div></td>
      <td>${matBadge(c.maturity)}</td>
      <td style="text-align:right;">
        <div style="font-weight:700;color:${m.color};">${Math.round(c.lateAvgCat)}<span style="font-size:10px;color:#94a3b8;font-weight:400;"> ${m.label}</span></div>
        <div style="font-size:11px;color:#64748b;margin-top:1px;">${Math.round(c.lateAvgTot)} total</div>
        ${propBar}
      </td>
      <td>${trendBadge(c.catTrend, c.maturity)}</td>
      <td>
        <div style="display:flex;gap:8px;align-items:center;">
          <span style="font-size:9px;color:${m.color};font-weight:700;min-width:28px;">${m.label}</span>${catGrowStr}
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:2px;">
          <span style="font-size:9px;color:#64748b;min-width:28px;">Total</span>${totGrowStr}
        </div>
      </td>
      <td>${diagCell(c.diagnosis, c.totGrowthPct, c.catGrowthPct)}</td>
      <td title="Click to zoom — shows ${m.label} calls (solid) vs Total calls (dashed)">${dualSpark}</td>
    </tr>`;
  }).join('');

  return `<div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:2px;">Clinic-Level — ${m.label} Trend &amp; New Bookings Diagnostic</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px;">First ${n4}-wk avg vs last ${n4}-wk avg · ${clinics.length} active clinics · ${activeScope}</div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
      <div style="padding:10px 16px;background:#f8fafc;border:1px solid var(--line);border-radius:12px;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:6px;">Mature clinics</div>
        <div style="display:flex;gap:16px;">
          <div><div style="font-size:22px;font-weight:700;color:#059669;line-height:1.1;">${cnt.growing}</div><div style="font-size:10px;color:#64748b;">Growing</div></div>
          <div><div style="font-size:22px;font-weight:700;color:#64748b;line-height:1.1;">${cnt.maintained}</div><div style="font-size:10px;color:#64748b;">Maintained</div></div>
          <div style="border-left:2px solid #fca5a5;padding-left:16px;"><div style="font-size:22px;font-weight:700;color:#dc2626;line-height:1.1;">${cnt.declining}</div><div style="font-size:10px;color:#dc2626;">Declining ⚠</div></div>
        </div>
      </div>
      <div style="padding:10px 16px;background:#f8fafc;border:1px solid var(--line);border-radius:12px;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:6px;">New clinics</div>
        <div style="display:flex;gap:16px;">
          <div><div style="font-size:22px;font-weight:700;color:#059669;line-height:1.1;">${cnt.newContrib}</div><div style="font-size:10px;color:#64748b;">${m.label} contributing ✓</div></div>
          <div><div style="font-size:22px;font-weight:700;color:#d97706;line-height:1.1;">${cnt.newNo}</div><div style="font-size:10px;color:#64748b;">Not yet</div></div>
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      <div style="padding:10px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;font-size:11px;line-height:1.6;color:#1e40af;">
        <strong>Mature clinics:</strong> ${m.label} should grow or at minimum be maintained. Degrowth = concern. Check: has volume or capacity changed? Is ${m.label} being displaced by another category?
      </div>
      <div style="padding:10px 14px;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:10px;font-size:11px;line-height:1.6;color:#6d28d9;">
        <strong>New clinics:</strong> Want new bookings AND ${m.label} contributing (≥5% rate). If total is growing but ${m.label}% ≈ 0 → category not being established at this clinic.
      </div>
    </div>

    <div style="overflow-x:auto;">
      <table class="tbl">
        <thead>
          <tr>
            <th>Clinic / City</th>
            <th>Type</th>
            <th style="text-align:right;">${m.label}/wk · Total/wk<br><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;">recent ${n4}-wk avg · bar = cat share</span></th>
            <th>${m.label} Trend</th>
            <th>Growth (${m.label} · Total)<br><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;">first ${n4}wk avg → last ${n4}wk avg</span></th>
            <th>New Bkgs Diagnostic</th>
            <th>${periods.length}-${tPWord()} Sparkline<br><span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px;">click: ${m.label} vs Total</span></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

async function init() {
  try {
    const res  = await fetch('data.json', {cache:'no-store'});
    DATA       = await res.json();
    try { const cr = await fetch('data_channel.json', {cache:'no-store'}); if (cr.ok) CHDATA = await cr.json(); }
    catch(_) { CHDATA = null; }   // channel mix is an enhancement — page still works without it
    try { const lr = await fetch('data_leads_total.json', {cache:'no-store'}); if (lr.ok) LEADS_TOTAL = (await lr.json()).totals || {}; }
    catch(_) { LEADS_TOTAL = null; }   // network total leads — top of the demand funnel

// "Is the category growing?" — absolute volume + share of total, WoW & MoM (handles new clinics).
function dlGrowMetrics(cfg){

  const full=wks.map(wk=>{ const r=dlRec(wk); const total=r?(r.total||0):0, cat=r?dlCatOf(r):0; return {wk,total,cat,share: total?cat/total*100:0}; });

  const sum=(a,b,k)=>full.slice(Math.max(0,a),Math.max(0,b)).reduce((s,x)=>s+x[k],0);

  let per=dlBuildPeriods(cfg.gran).map(p=>{ let total=0,cat=0; for(const wk of p.weeks){ const r=dlRec(wk); if(r){ total+=r.total||0; cat+=dlCatOf(r); } } return {label:p.label,total,cat,share: total?cat/total*100:0}; });

  else if(au&&sd){ badge='Growing slower than total'; color='#d97706'; sentence=`${cl} volume is up but its share is slipping — total demand grew faster than ${cl}.`; }
  else if(ad&&su){ badge='Relatively stronger'; color='#0ea5e9'; sentence=`The clinic is shrinking overall, but ${cl}'s share is rising — it's holding up better than other categories.`; }
  else if(ad&&sd){ badge='Declining'; color='#dc2626'; sentence=`${cl} volume and share are both falling.`; }
  else { badge='Stable'; color='#64748b'; sentence=`${cl} volume and share are broadly flat.`; }

    + `<div class="dl-grp"><span class="tb-lbl">+ Compare cat</span><select class="tb-sel" onchange="dlSetCmpCat(this.value)"><option value="">None</option>${cmpCats.map(c=>`<option value="${c}" ${cfg.cmpCat===c?'selected':''}>${dlLabOf(c)}</option>`).join('')}</select></div>`; }
  else if (id==='mix') extra=`<div class="dl-grp"><span class="tb-lbl">Mode</span>${[['Absolute','abs'],['100% share','pct']].map(([l,v])=>`<button class="tb-pill${cfg.mode===v?' on':''}" onclick="dlSetCfg('mix','mode','${v}')">${l}</button>`).join('')}</div>`;
  else if (id==='chmix') extra=`<div class="dl-grp"><span class="tb-lbl">Metric</span>${[[cl+' calls','cat'],['Total calls','total']].map(([l,v])=>`<button class="tb-pill${cfg.metric===v?' on':''}" onclick="dlSetCfg('chmix','metric','${v}')">${l}</button>`).join('')}</div><div class="dl-grp"><span class="tb-lbl">Mode</span>${[['Absolute','abs'],['100% share','pct']].map(([l,v])=>`<button class="tb-pill${cfg.mode===v?' on':''}" onclick="dlSetCfg('chmix','mode','${v}')">${l}</button>`).join('')}</div>`;
  // average-line toggles (per chart, per metric)
  let avgRow='';
  const av=cfg.avg||{};
  const avgBtns=(opts)=>opts.map(([l,k])=>`<button class="tb-pill${av[k]?' on':''}" onclick="dlToggleAvg('${id}','${k}')">${l}</button>`).join('');
  if(id==='trend') avgRow=`<div class="dl-grp"><span class="tb-lbl">Avg line</span>${cfg.metric==='share'?avgBtns([[cl+' %','pct']]):avgBtns([['Total','total'],[cl,'cat'],[cl+' %','pct']])}</div>`;
  let endRow='';
  if(id==='trend'){ const allW=(S().weeks||DATA.weeks); const sel=dlEndIdx<0?allW.length-1:dlEndIdx;
    endRow=`<div class="dl-grp"><span class="tb-lbl">Latest ${tPWord()}</span><select class="tb-sel" onchange="dlSetEnd(+this.value)">${allW.map((w,i)=>`<option value="${i}" ${i===sel?'selected':''}>${tShortWk(w)}${i===allW.length-1?' (actual latest)':''}</option>`).join('')}</select></div>`; }
  return `<div class="dl-gearpanel"><div class="dl-grp"><span class="tb-lbl">View</span>${gran}</div><div class="dl-grp"><span class="tb-lbl">Range</span>${rng}</div>${extra}${avgRow}${endRow}</div>`;
}
function dlChartCard(id,title,sub){
  return `<div class="dl-card">
    <div class="dl-head"><div><div class="dl-title">${title}</div><div class="dl-sub">${sub}</div></div>
      <button class="dl-gear${dlGear===id?' on':''}" onclick="dlToggleGear('${id}')" title="Customize this chart">⚙</button></div>
    ${dlGear===id?dlGearPanel(id):''}
    <div class="dl-chartbox" style="margin-top:10px;"><canvas id="dl_${id}"></canvas></div>
  </div>`;
}
function renderDrill(){
  const root=document.getElementById('drillRoot'); if(!root) return;
  const geo = dlHasGeo();
  let sel='', ent='', note='';
  if(geo){
    dlEnsure();
    const set=dlSelSet();
    const allCount = dlLevel==='city' ? dlCities().length : (S().clinics||[]).length;
    ent = set.size===0 ? '—' : (set.size===allCount ? `all ${dlLevel==='city'?'cities':'clinics'} (${dlScopeLbl()})` : set.size===1 ? (dlLevel==='clinic'?[...set][0].replace('_',' › '):[...set][0]) : (set.size+' '+(dlLevel==='city'?'cities':'clinics')));
    const chanCtl = dlChAvail()
      ? `<div class="dl-grp"><span class="tb-lbl">× Channel</span><div class="mf dl-mf">${dlMultiBtn('chan',dlChanFilterOn()?'Channels':'All channels')}${dlDD==='chan'?dlMultiPanel('chan'):''}</div></div>`
      : '';
    sel = `<div class="dl-bar">
        <div class="dl-grp"><span class="tb-lbl">Level</span><button class="tb-pill${dlLevel==='city'?' on':''}" onclick="dlSetLevel('city')">City</button><button class="tb-pill${dlLevel==='clinic'?' on':''}" onclick="dlSetLevel('clinic')">Clinic</button></div>
        ${dlLevel==='city'
          ? `<div class="dl-grp"><span class="tb-lbl">Cities</span><div class="mf dl-mf">${dlMultiBtn('city','Cities')}${dlDD==='city'?dlMultiPanel('city'):''}</div></div>`
          : `<div class="dl-grp"><span class="tb-lbl">Filter city</span><select class="tb-sel" onchange="dlSetClinFilter(this.value)"><option value="ALL" ${dlClinFilterCity==='ALL'?'selected':''}>All cities</option>${dlCities().map(c=>`<option ${c===dlClinFilterCity?'selected':''}>${c}</option>`).join('')}</select></div>
             <div class="dl-grp"><span class="tb-lbl">Clinics</span><div class="mf dl-mf">${dlMultiBtn('clinic','Clinics')}${dlDD==='clinic'?dlMultiPanel('clinic'):''}</div></div>`}
        ${chanCtl}
      </div>
      ${set.size||dlChanFilterOn()?`<div class="dl-chips">${dlChipsHTML(dlLevel)}${dlChanFilterOn()?`<span class="dl-chip" style="background:#eef2ff;color:#4338ca;border-color:#c7d2fe;font-weight:600;">× ${[...dlActiveChans()].join(', ')}<button onclick="dlSelAll('chan')" title="clear channel filter">×</button></span>`:''}</div>`:''}`;
    if(set.size===0){
      root.innerHTML=`<details class="sect dl-sect" open><summary><span class="sect-t">🔎 Drill-down</span><span class="sect-s">Select one or more ${dlLevel==='city'?'cities':'clinics'} to explore.</span><span class="sect-cv">▶</span></summary><div class="sect-body">${sel}<div class="dl-empty">Select one or more ${dlLevel==='city'?'cities':'clinics'} above to see the charts.</div></div></details>`;
      return;
    }
    note = `${dlScopeLbl()} ${dlLevel} data${set.size>1?` · aggregated across ${set.size} ${dlLevel==='city'?'cities':'clinics'}`:''}.${dlChanFilterOn()?` <b style="color:#4338ca;">Cross-filtered to ${dlActiveChans().length} channel${dlActiveChans().length>1?'s':''}</b> — every chart below counts only ${dlActiveChans().join(', ')}.`:dlChAvail()?' Channel mix below is the verified per-'+dlLevel+' split (reconciles 100% to the booking feed).':''}`;
  } else {
    // All / Online → network total (no city/clinic drill, but channel-wise IS available)
    ent = `${dlScopeLbl()} (network total)${dlChanFilterOn()?' · '+dlActiveChans().length+' ch':''}`;
    const chanCtl = dlChShow()
      ? `<div class="dl-grp"><span class="tb-lbl">× Channel</span><div class="mf dl-mf">${dlMultiBtn('chan',dlChanFilterOn()?'Channels':'All channels')}${dlDD==='chan'?dlMultiPanel('chan'):''}</div></div>`
      : '';
    sel = `<div class="dl-bar">
        ${chanCtl}
        <div class="dl-grp" style="flex:1;min-width:220px;"><span style="font-size:12px;color:#475569;">${dlScopeLbl()} network total${activeScope==='all'?' (online + offline)':''}${dlChShow()?' — channel-wise breakdown available below':''}. <b style="color:#4338ca;cursor:pointer;" onclick="setScope('offline')">Switch to Offline</b> to drill down by city &amp; clinic.</span></div>
      </div>
      ${dlChanFilterOn()?`<div class="dl-chips"><span class="dl-chip" style="background:#eef2ff;color:#4338ca;border-color:#c7d2fe;font-weight:600;">× ${[...dlActiveChans()].join(', ')}<button onclick="dlSelAll('chan')" title="clear channel filter">×</button></span></div>`:''}`;
    note = `${dlScopeLbl()} network total${activeScope==='all'?' — online + offline combined':''}.${dlChanFilterOn()?` <b style="color:#4338ca;">Channel-filtered to ${dlActiveChans().join(', ')}</b> — charts count only those channels.`:dlChShow()?' Channel-wise mix is shown below.':''} City/clinic drill-down is available under the <b>Offline</b> scope only.`;
  }
  root.innerHTML=`<details class="sect dl-sect" open><summary><span class="sect-t">🔎 Drill-down — ${ent}</span><span class="sect-s">${geo?'Select one or more '+dlLevel+'s; charts aggregate the selection.':'Network view'} Each chart has its own ⚙ controls.</span><span class="sect-cv">▶</span></summary><div class="sect-body">
    ${sel}
    <div style="font-size:11px;color:#94a3b8;margin:8px 0 14px;">${note}</div>
    ${(()=>{const cm=dlCfg.trend.cmpCat&&dlCfg.trend.cmpCat!==activeCat?dlCfg.trend.cmpCat:null; return cm
      ? dlChartCard('trend',dlCatLab()+' vs '+dlLabOf(cm)+' over time','Two categories side by side'+(dlCfg.trend.metric==='share'?' — share %':' — calls')+'.')
      : dlChartCard('trend','Volume &amp; '+dlCatLab()+' over time','Is '+dlCatLab()+' adding to total volume, or flat?');})()}
    ${(()=>{const gm=dlGrowMetrics(dlCfg.trend);return `<details class="dl-card dl-linked" style="margin-top:14px;">
      <summary class="dl-gsum"><div style="flex:1;min-width:0;"><div class="dl-title">Is ${dlCatLab()} growing — volume vs share? <span class="dl-cv">▶</span> <span class="dl-badge" style="background:${gm.color}22;color:${gm.color};font-size:10px;">${gm.badge}</span></div><div class="dl-sub">Expand for the volume-vs-share read + period-over-period breakdown</div></div>
        <span class="dl-linkbadge" title="Follows the range & view of the “Volume &amp; ${dlCatLab()}” chart above">↑ linked to “Volume &amp; ${dlCatLab()}” chart · ${dlCfg.trend.gran==='month'?'monthly':'weekly'} · ${dlCfg.trend.range==='all'?'all':dlCfg.trend.range+' '+(dlCfg.trend.gran==='month'?'mo':'wk')}</span></summary>
      <div style="margin-top:8px;">${dlVerdictHTML(gm)+dlDecompHTML(gm)}</div>
    </details>`;})()}
  </div></details>`;
  dlDrawTrend();
}
function dlDrawTrend(){
  const id='dl_trend', ctx=document.getElementById(id); if(!ctx) return; if(dlCharts[id]) dlCharts[id].destroy();
  const cfg=dlCfg.trend, s=dlSeries(cfg), labels=s.map(x=>x.label), cl=dlCatLab(), cc=dlCatCol(), av=cfg.avg||{};
  const catArr=s.map(x=>dlCatOf(x)), totArr=s.map(x=>x.total), pctArr=s.map(x=>x.total?dlCatOf(x)/x.total*100:0);
  const cmp=cfg.cmpCat && cfg.cmpCat!==activeCat ? cfg.cmpCat : null;   // second category to compare
  const cmpLab=cmp?dlLabOf(cmp):'', cmpCol=cmp?dlColOf(cmp):'';
  const cmpArr=cmp?s.map(x=>dlValOf(x,cmp)):[], cmpPctArr=cmp?s.map(x=>x.total?dlValOf(x,cmp)/x.total*100:0):[];
  const DLB_PCT={display:true,align:'top',color:'#d97706',font:{size:12,weight:'bold'},formatter:v=>v?v.toFixed(0)+'%':''};
  if(cfg.metric==='share'){
    const ds=[{label:cl+' share %',data:pctArr,borderColor:cc,backgroundColor:cc+'18',fill:true,borderWidth:2.5,pointRadius:4,tension:.3,datalabels:{display:true,align:'top',color:cc,font:{size:12,weight:'bold'},formatter:v=>v?v.toFixed(0)+'%':''}}];
    if(cmp) ds.push({label:cmpLab+' share %',data:cmpPctArr,borderColor:cmpCol,backgroundColor:cmpCol+'14',fill:true,borderWidth:2.5,pointRadius:4,tension:.3,datalabels:{display:true,align:'bottom',color:cmpCol,font:{size:12,weight:'bold'},formatter:v=>v?v.toFixed(0)+'%':''}});
    if(av.pct) ds.push(dlMeanLine(pctArr,cl+' %',cc,undefined,true));
    dlCharts[id]=new Chart(ctx,{type:'line',data:{labels,datasets:ds},options:{animation:false,responsive:true,maintainAspectRatio:false,layout:{padding:{top:18}},plugins:{legend:{display:av.pct||!!cmp,labels:{font:{size:13},boxWidth:14}}},scales:{x:{grid:{display:false},ticks:{font:{size:12}}},y:{grid:{color:'#f1f5f9'},ticks:{font:{size:12},callback:v=>v+'%'}}}}});
  } else {
    const ds=[
      {label:'Total calls',data:totArr,backgroundColor:'#e2e8f0',borderColor:'#cbd5e1',borderWidth:1,order:3,datalabels:{display:true,anchor:'end',align:'top',offset:0,color:'#475569',font:{size:cmp?11:13,weight:'bold'},formatter:v=>v?v.toLocaleString():''}},
      {label:cl+' calls',data:catArr,backgroundColor:cc+'cc',borderColor:cc,borderWidth:1,order:2,datalabels:{display:true,anchor:'end',align:'end',offset:0,color:cc,font:{size:cmp?11:13,weight:'bold'},formatter:v=>v||''}}
    ];
    if(cmp){   // second category bars, grouped side-by-side
      ds.push({label:cmpLab+' calls',data:cmpArr,backgroundColor:cmpCol+'cc',borderColor:cmpCol,borderWidth:1,order:2,datalabels:{display:true,anchor:'end',align:'end',offset:0,color:cmpCol,font:{size:11,weight:'bold'},formatter:v=>v||''}});
    } else {
      ds.push({label:cl+' %',data:pctArr,type:'line',yAxisID:'y2',borderColor:'#f59e0b',backgroundColor:'transparent',borderWidth:2.5,pointRadius:3,tension:.3,order:1,datalabels:DLB_PCT});
    }
    if(av.total) ds.push(dlMeanLine(totArr,'Total','#94a3b8'));
    if(av.cat) ds.push(dlMeanLine(catArr,cl,cc));
    if(av.cat&&cmp) ds.push(dlMeanLine(cmpArr,cmpLab,cmpCol));
    if(av.pct&&!cmp) ds.push(dlMeanLine(pctArr,cl+' %','#f59e0b','y2',true));
    const scales={x:{grid:{display:false},ticks:{font:{size:12}}},y:{grid:{color:'#f1f5f9'},ticks:{font:{size:12}},beginAtZero:true}};
    if(!cmp) scales.y2={position:'right',grid:{display:false},ticks:{font:{size:12},callback:v=>v+'%'},beginAtZero:true};
    dlCharts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:ds},options:{animation:false,responsive:true,maintainAspectRatio:false,layout:{padding:{top:18}},plugins:{legend:{position:'top',labels:{font:{size:13},boxWidth:14,padding:10}}},scales}});
  }
}
function dlDrawMix(){
  const id='dl_mix', ctx=document.getElementById(id); if(!ctx) return; if(dlCharts[id]) dlCharts[id].destroy();
  const cfg=dlCfg.mix, s=dlSeries(cfg), labels=s.map(x=>x.label), pct=cfg.mode==='pct';
  const ds=DL_CATS.map(c=>({label:CAT_META[c]?CAT_META[c].label:c,data:s.map(x=>pct?(x.total?x[c]/x.total*100:0):x[c]),backgroundColor:DL_CATCOL[c]+'cc',borderColor:DL_CATCOL[c],borderWidth:0,stack:'s',datalabels: c===activeCat?{display:true,color:'#fff',font:{size:8,weight:'bold'},formatter:v=>v>0?(pct?v.toFixed(0)+'%':Math.round(v)):''}:{display:false}}));
  dlCharts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:ds},options:{animation:false,responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:9},boxWidth:9,padding:6}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${pct?c.raw.toFixed(1)+'%':Math.round(c.raw)}`}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:9}}},y:{stacked:true,max:pct?105:undefined,grid:{color:'#f1f5f9'},ticks:{font:{size:9},callback:v=>pct?v+'%':v}}}}});
}

// ── Channel mix & trends ──
// Offline → verified per-geo split (data_channel.json). Online/All → network channel split (data.json weekly_channel).
function dlChAvail(){ return !!(CHDATA && CHDATA.offline) && dlHasGeo(); }   // offline geo cross-filter source
function dlChShow(){ return dlHasGeo() ? !!(CHDATA && CHDATA.offline) : !!S().weekly_channel; }   // show the channel-mix card?
function dlChNode(){ return CHDATA.offline[dlLevel==='clinic'?'clinic':'city']||{}; }
function dlChRec(wk){
  // {channel:{cats..,total}} for one week — geo: selected cities/clinics; network: scope.weekly_channel
  const out={}, chans=dlActiveChans();
  DL_CHANS.forEach(ch=>{ const o={total:0}; DL_CATS.forEach(c=>o[c]=0); out[ch]=o; });
  if(dlHasGeo()){
    if(!(CHDATA&&CHDATA.offline)) return out;
    const node=dlChNode(), set=dlSelSet();
    for(const key of set){ const wk2=node[key]?.[wk]; if(!wk2) continue;
      for(const ch of chans){ const r=wk2[ch]; if(!r) continue; out[ch].total+=r.total||0; DL_CATS.forEach(c=>out[ch][c]+=r[c]||0); } }
  } else {
    const wc=S().weekly_channel?.[wk]||{};
    for(const ch of chans){ const r=wc[ch]; if(!r) continue; out[ch].total+=r.total||0; DL_CATS.forEach(c=>out[ch][c]+=r[c]||0); }
  }
  return out;
}
function dlChSeries(cfg){
  let pAll=dlBuildPeriods(cfg.gran); if(cfg.range!=='all') pAll=pAll.slice(-cfg.range);
  const val=o=> cfg.metric==='total' ? (o.total||0) : dlCatOf(o);
  const chans=dlActiveChans();
  return pAll.map(p=>{ const row={label:p.label,_tot:0,_byCh:{}}; DL_CHANS.forEach(ch=>row[ch]=0);
    for(const wk of p.weeks){ const rec=dlChRec(wk); for(const ch of chans){ const v=val(rec[ch]); row[ch]+=v; row._tot+=v; } }
    return row; });
}
function dlChMetricLbl(){ return dlCfg.chmix.metric==='total'?'Total calls':dlCatLab()+' calls'; }
function dlChInsight(s){
  if(!s.length) return '';
  const last=s[s.length-1], tot=last._tot;
  if(!tot) return `<div class="dl-sub" style="margin-top:6px;">No ${dlChMetricLbl()} in the latest period for this selection.</div>`;
  const ranked=dlActiveChans().map(ch=>[ch,last[ch]]).sort((a,b)=>b[1]-a[1]).filter(x=>x[1]>0);
  const top=ranked[0], topPct=(top[1]/tot*100);
  // momentum of top channel vs previous period
  let mom='';
  if(s.length>=2){ const prev=s[s.length-2]; const pPct=prev._tot?prev[top[0]]/prev._tot*100:0; const d=topPct-pPct;
    mom = Math.abs(d)<0.5?' (share roughly flat)':d>0?` (▲ +${d.toFixed(0)}pp share vs prev)`:` (▼ ${d.toFixed(0)}pp share vs prev)`; }
  const list=ranked.slice(0,3).map(([ch,v])=>`<b style="color:${CH_COLORS[ch]||'#64748b'}">${ch}</b> ${(v/tot*100).toFixed(0)}%`).join(' · ');
  return `<div class="dl-sub" style="margin-top:8px;line-height:1.5;"><b>${top[0]}</b> leads at ${topPct.toFixed(0)}% of ${dlChMetricLbl()}${mom}. &nbsp;Top mix: ${list}.</div>`;
}
function dlDrawChMix(){
  const id='dl_chmix', ctx=document.getElementById(id); if(!ctx) return; if(dlCharts[id]) dlCharts[id].destroy();
  const cfg=dlCfg.chmix, s=dlChSeries(cfg), labels=s.map(x=>x.label), pct=cfg.mode==='pct';
  const ds=dlActiveChans().map(ch=>({label:ch,data:s.map(x=>pct?(x._tot?x[ch]/x._tot*100:0):x[ch]),backgroundColor:(CH_COLORS[ch]||'#94a3b8')+'cc',borderColor:CH_COLORS[ch]||'#94a3b8',borderWidth:0,stack:'c',
    datalabels:{display:ctx2=>{const v=ctx2.dataset.data[ctx2.dataIndex];return pct? v>=8 : v>=4;},color:'#fff',font:{size:9,weight:'bold'},formatter:v=>v>0?(pct?Math.round(v)+'%':Math.round(v)):''}}));
  dlCharts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:ds},options:{animation:false,responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:11,padding:8}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${pct?(c.raw||0).toFixed(1)+'%':Math.round(c.raw||0)}`}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:11}}},y:{stacked:true,max:pct?105:undefined,grid:{color:'#f1f5f9'},ticks:{font:{size:11},callback:v=>pct?v+'%':v},title:{display:true,text:pct?'% of '+dlChMetricLbl().toLowerCase():dlChMetricLbl(),font:{size:10}}}}}});
}

init();
document.addEventListener('click', (e) => {
  if (e.target.closest('.mf')) return;
  if (openDD) { openDD = null; if (dlDD) dlDD = null; render(); return; }
  if (dlDD) { dlDD = null; renderDrill(); }
});
</script>
