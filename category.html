<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Category Analysis · Demand Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
:root{
  --ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --red:#ef4444;--green:#10b981;--yellow:#f59e0b;
  --redBg:#fef2f2;--greenBg:#ecfdf5;--yellowBg:#fffbeb;
}
html,body{background:#f8fafc;color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(15,23,42,.05);}
.sect{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,.05);margin-bottom:16px;overflow:hidden;}
/* drill-down section must let its filter dropdowns overflow the card (otherwise they get clipped & unclickable) */
.dl-sect, .dl-sect>.sect-body{overflow:visible;}
/* drill filter triggers sit far right on a wide bar — anchor panels to the right edge so they don't run off-screen */
.dl-mf .mf-panel{left:auto;right:0;}
.sect>summary{list-style:none;cursor:pointer;padding:13px 18px;display:flex;align-items:center;gap:12px;user-select:none;}
.sect>summary::-webkit-details-marker{display:none;}
.sect>summary:hover{background:#fafaff;}
.sect>summary .sect-t{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;}
.sect>summary .sect-s{font-size:11.5px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sect>summary .sect-cv{margin-left:auto;color:#94a3b8;font-size:11px;transition:transform .15s;flex-shrink:0;}
.sect[open]>summary .sect-cv{transform:rotate(90deg);}
.sect[open]>summary{border-bottom:1px solid var(--line);}
.sect-body{padding:16px 18px;}
.sect-body>.card{box-shadow:none;border:none;padding:0;margin-bottom:0;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border:1.5px solid var(--line);border-radius:999px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:#fff;}
.chip:hover{border-color:#94a3b8;}
.chip.active{color:#fff;border-color:transparent;}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
.stat-val{font-size:26px;font-weight:700;line-height:1.2;}
.stat-sub{font-size:13px;margin-top:2px;}
.up{color:#059669;} .down{color:#dc2626;} .neutral{color:var(--muted);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.badge.up{background:#ecfdf5;color:#065f46;}
.badge.down{background:#fef2f2;color:#991b1b;}
.badge.neutral{background:#f1f5f9;color:#475569;}
table.tbl{width:100%;border-collapse:separate;border-spacing:0;}
table.tbl th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);text-align:left;padding:9px 12px;background:#f8fafc;border-bottom:1px solid var(--line);}
table.tbl td{padding:9px 12px;border-bottom:1px solid #f1f5f9;font-size:13px;}
table.tbl tr:last-child td{border-bottom:none;}
table.tbl tr:hover td{background:#f8fafc;}
.bar-bg{height:7px;border-radius:999px;background:#f1f5f9;overflow:hidden;min-width:60px;}
.bar-fill{height:100%;border-radius:999px;}
.toggle-btn{padding:4px 12px;font-size:12px;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:#fff;}
.toggle-btn.active{background:#0f172a;color:#fff;border-color:#0f172a;}
.section-title{font-size:14px;font-weight:700;color:var(--ink);}
.section-sub{font-size:12px;color:var(--muted);margin-top:2px;}
canvas{display:block;}
.loading{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--muted);font-size:13px;}
.nav-link{font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border-radius:6px;transition:background .12s;}
.nav-link:hover{background:#f1f5f9;color:#0f172a;}
.nav-link.active{font-weight:700;color:#0f172a;background:#f1f5f9;}
.nav-sep{color:#e2e8f0;font-size:14px;}
/* simple time bar — Period vs Comparison dropdowns */
.tbar2{display:flex;align-items:center;gap:22px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 18px;box-shadow:0 1px 3px rgba(15,23,42,.05);}
.tb-grp{display:flex;align-items:center;gap:8px;}
.tb-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;white-space:nowrap;}
.tb-pill{font-size:12px;font-weight:600;padding:4px 12px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#334155;cursor:pointer;}
.tb-pill.on{background:#0f172a;color:#fff;border-color:#0f172a;}
.tb-sel{font-size:12.5px;font-weight:600;background:#fff;color:#0f172a;border:1.5px solid var(--line);border-radius:8px;padding:5px 9px;cursor:pointer;}
.tb-sel:hover{border-color:#6366f1;}
.ch-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid var(--line);white-space:nowrap;}
.ch-winbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line);}
.ch-winpill{font-size:11px;font-weight:600;padding:3px 11px;border:1px solid var(--line);border-radius:999px;background:#fff;color:#334155;cursor:pointer;}
.ch-winpill.on{background:#0f172a;color:#fff;border-color:#0f172a;}
/* snapshot tables */
.snap-h{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:12px;}
.snap-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;}
.snap-tbl th{position:sticky;top:0;background:#f8fafc;text-align:right;padding:8px 11px;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid var(--line);}
.snap-tbl th.l,.snap-tbl td.l{text-align:left;}
.snap-tbl td{text-align:right;padding:7px 11px;border-bottom:1px solid #f1f5f9;white-space:nowrap;color:#334155;}
.snap-tbl td.b{font-weight:700;color:#0f172a;}
.snap-tbl tbody tr:hover td{background:#fafaff;}
.snap-tbl tfoot .ft td{border-top:2px solid var(--line);background:#f8fafc;font-weight:700;color:#0f172a;}
/* demand funnel */
.snap-funnel{display:flex;flex-direction:column;gap:10px;}
.fnl-row{display:flex;align-items:center;gap:14px;}
.fnl-bar{height:50px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;color:#fff;min-width:160px;transition:width .2s;box-shadow:0 1px 3px rgba(15,23,42,.12);}
.fnl-lbl{font-size:12.5px;font-weight:700;white-space:nowrap;}
.fnl-val{font-size:18px;font-weight:800;margin-left:18px;}
.fnl-sub{font-size:11.5px;color:#64748b;white-space:nowrap;}
/* drill-down explorer */
.dl-bar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.dl-grp{display:flex;align-items:center;gap:6px;}
.dl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:768px){.dl-grid{grid-template-columns:1fr;}}
.dl-card{border:1px solid var(--line);border-radius:12px;padding:14px;}
.dl-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.dl-title{font-size:13px;font-weight:700;color:#0f172a;}
.dl-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.dl-gear{font-size:14px;line-height:1;border:1px solid var(--line);background:#fff;border-radius:7px;width:28px;height:28px;cursor:pointer;color:#64748b;flex-shrink:0;}
.dl-gear:hover,.dl-gear.on{border-color:#6366f1;color:#4338ca;background:#eef2ff;}
.dl-gearpanel{margin-top:10px;padding:10px 12px;background:#f8fafc;border:1px solid var(--line);border-radius:9px;display:flex;flex-wrap:wrap;gap:16px;}
.dl-verdict{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:10px;}
.dl-badge{font-size:11px;font-weight:800;padding:3px 11px;border-radius:999px;}
.dl-metric{font-size:12px;color:#64748b;}
.dl-share{font-size:11px;font-weight:700;color:#4338ca;background:#eef2ff;border-radius:999px;padding:3px 10px;}
.dl-sentence{font-size:12px;color:#475569;margin-top:8px;line-height:1.5;}
.dl-chips{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 2px;}
.dl-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;background:#eef2ff;color:#4338ca;border-radius:999px;padding:3px 5px 3px 10px;}
.dl-chip button{border:none;background:none;color:#6366f1;cursor:pointer;font-size:13px;line-height:1;padding:0 2px;}
.dl-cb{display:flex;align-items:center;gap:8px;flex:1;cursor:pointer;font-size:12px;padding:1px 0;}
.dl-cb input{cursor:pointer;}
.mf-quick{display:flex;flex-wrap:wrap;align-items:center;gap:5px;padding:8px 4px 2px;margin-top:6px;border-top:1px solid var(--line);}
.mf-qlbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;}
.mf-qgrp{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:#475569;border:1px solid var(--line);border-radius:7px;padding:1px 4px 1px 7px;}
.mf-qgrp button{border:none;background:#f1f5f9;color:#475569;border-radius:4px;width:17px;height:17px;cursor:pointer;font-size:11px;line-height:1;font-weight:800;}
.mf-qgrp button:hover{background:#6366f1;color:#fff;}
.dl-empty{font-size:13px;color:#64748b;padding:26px;text-align:center;background:#f8fafc;border:1px dashed var(--line);border-radius:10px;margin-top:10px;}
/* larger, more readable drill chart (normal page width) */
.dl-chartbox{height:340px;}
@media(max-width:768px){.dl-chartbox{height:260px;}}
.dl-decomp{width:100%;border-collapse:collapse;font-size:11.5px;}
.dl-decomp th{text-align:right;padding:5px 9px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;border-bottom:1px solid var(--line);white-space:nowrap;}
.dl-decomp td{text-align:right;padding:5px 9px;border-bottom:1px solid #f1f5f9;white-space:nowrap;}
.dl-decomp tbody tr:hover td{background:#fafaff;}
.dl-decomp tfoot .dl-net td{border-top:2px solid var(--line);background:#f8fafc;}
.dl-linked{border-color:#c7d2fe;box-shadow:inset 3px 0 0 #6366f1;}
.dl-linkbadge{font-size:11px;font-weight:700;color:#4338ca;background:#eef2ff;border:1px solid #c7d2fe;border-radius:999px;padding:4px 11px;white-space:nowrap;cursor:default;flex-shrink:0;}
.dl-gsum{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;list-style:none;}
.dl-gsum::-webkit-details-marker{display:none;}
.dl-cv{display:inline-block;font-size:10px;color:#94a3b8;transition:transform .15s;}
details[open]>.dl-gsum .dl-cv{transform:rotate(90deg);}
.flt-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;flex-shrink:0;}
.flt-sep{width:1px;height:20px;background:#e2e8f0;display:inline-block;}
.flt-clear{font-size:10px;color:#dc2626;border:1px solid #fecaca;border-radius:6px;padding:2px 9px;background:#fff;cursor:pointer;margin-left:4px;}
.mf{position:relative;display:inline-block;}
.mf-btn{font-size:12px;font-weight:600;border:1.5px solid var(--line);border-radius:7px;padding:4px 10px;background:#fff;color:#334155;cursor:pointer;white-space:nowrap;}
.mf-btn.act{border-color:#6366f1;color:#4338ca;background:#eef2ff;}
.mf-badge{font-size:10px;font-weight:700;color:#4338ca;}
.mf-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:200;width:280px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(15,23,42,.16);padding:8px;}
.mf-search{width:100%;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:5px 9px;margin-bottom:6px;box-sizing:border-box;}
.mf-list{max-height:300px;overflow-y:auto;}
.mf-row{display:flex;align-items:center;gap:6px;padding:3px 4px;border-radius:6px;}
.mf-row:hover{background:#f8fafc;}
.mf-nm{flex:1;font-size:12px;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mf-mat{font-size:9px;font-weight:700;padding:0 5px;border-radius:999px;}
.mf-mat-Matured{background:#dcfce7;color:#166534;}.mf-mat-Maturing{background:#e0f2fe;color:#075985;}.mf-mat-New{background:#f3e8ff;color:#6b21a8;}
.mf-inc,.mf-exc{width:22px;height:22px;border-radius:6px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:13px;font-weight:800;line-height:1;color:#94a3b8;flex-shrink:0;}
.mf-inc:hover{border-color:#16a34a;color:#16a34a;}.mf-inc.on{background:#16a34a;border-color:#16a34a;color:#fff;}
.mf-exc:hover{border-color:#dc2626;color:#dc2626;}.mf-exc.on{background:#dc2626;border-color:#dc2626;color:#fff;}
.mf-foot{display:flex;justify-content:space-between;align-items:center;margin-top:7px;padding-top:7px;border-top:1px solid var(--line);font-size:10px;color:#94a3b8;}
.mf-foot button{font-size:10px;color:#6366f1;background:none;border:none;cursor:pointer;text-decoration:underline;}
.mtp{font-size:11px;font-weight:600;border:1px solid var(--line);border-radius:999px;padding:3px 10px;background:#fff;color:#334155;cursor:pointer;}
.mtp.on{background:#0f172a;color:#fff;border-color:#0f172a;}
</style>
</head>

<!-- Header -->
<div class="border-b bg-white sticky top-0 z-20" style="border-color:var(--line);">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center gap-6 flex-wrap">

<script>
const CAT_META = {
  'STI':    { label:'STI', color:'#0ea5e9', bg:'#eff6ff' },
  'MH':     { label:'Mental Health', color:'#4f46e5', bg:'#eef2ff' },
  'SH':     { label:'Sexual Health', isSHAggregate:true, color:'#7c3aed', bg:'#f5f3ff' },
  'ED+':    { label:'ED+',    parent:'Sexual Health', color:'#7c3aed', bg:'#f5f3ff' },
  'PE+':    { label:'PE+',    parent:'Sexual Health', color:'#f59e0b', bg:'#fffbeb' },
  'ED+PE+': { label:'ED+PE+', parent:'Sexual Health', color:'#10b981', bg:'#ecfdf5' },
  'NSSD':   { label:'NSSD',   parent:'Sexual Health', color:'#94a3b8', bg:'#f8fafc' },
  'oth':    { label:'Others', parent:'Sexual Health', color:'#cbd5e1', bg:'#f8fafc' },
  'ALL':    { label:'All Categories', color:'#0f172a', bg:'#f1f5f9' },
};

const SH_SUBS = ['ED+', 'PE+', 'ED+PE+', 'NSSD', 'oth'];

function getSHVal(obj) {
  return SH_SUBS.reduce((s, k) => s + (obj[k] || 0), 0);
}

function catDisplayLabel(cat) {
  const m = CAT_META[cat] || CAT_META['oth'];
  if (m.parent) return m.parent + ' › ' + m.label;
  return m.label;
}

const CH_COLORS = {
  'GMB':     '#10b981',
  'Google':  '#3b82f6',
  'Practo':  '#8b5cf6',
  'Organic': '#f59e0b',
  'Meta':    '#f97316',
  'Others':  '#94a3b8'
};

const CITY_TIERS = {
  T1: ['Bangalore','Mumbai','Pune','Hyderabad','Chennai'],
  T2: ['Navi Mumbai','Coimbatore','Nagpur','Ranchi','Jaipur','Ahmedabad',
       'Surat','Nashik','Aurangabad','Hubli','Mysuru','Mangaluru',
       'Bhopal','Visakhapatnam','Thane','Gandhinagar','Vijayawada'],
};
function cityTier(c) {
  return CITY_TIERS.T1.includes(c) ? 'T1'
       : CITY_TIERS.T2.includes(c) ? 'T2' : null;
}

let DATA = null;
let CHDATA = null;   // data_channel.json — verified offline channel×category per city/clinic
let LEADS_TOTAL = null;   // data_leads_total.json — network total inbound leads/week (top of funnel)
let activeCat    = 'STI';
let viewMode     = 'abs';
let activeScope  = 'offline';
let activeChannel= 'ALL';
let activeCity   = 'ALL';   // legacy single-city (kept for Data/Snapshot paths); geoCitySel is the multi-select source of truth
let activeClinic = 'ALL';
let geoCitySel   = new Set();   // multi-select cities (empty = all)
let geoClinicSel = new Set();   // multi-select clinic keys "City_Locality" (empty = all)
let geoDoctorSel = new Set();   // multi-select doctor keys "City_Locality|Dr. Name" (one depth below clinic)
let geoMsOpen    = null;        // open multiselect panel: 'city' | 'clinic' | null
let geoMsSearch  = '';
let activeTier   = 'ALL';
let chWin        = 8;     // Channel Analysis time window (periods), or 'all'

function setStiFrom(i){ stiFromIdx = +i; if(stiToIdx>=0 && stiToIdx<stiFromIdx) stiToIdx=stiFromIdx; renderStiResults(); }
function setStiTo(i){ stiToIdx = +i; if(stiToIdx<stiFromIdx) stiFromIdx=stiToIdx; renderStiResults(); }
function renderStiResults(){
  const el = document.getElementById('stiResults'); if(!el || !_stiPeriods) return;
  const periods = _stiPeriods;
  const f = Math.max(0, Math.min(stiFromIdx, periods.length-1));
  const t = (stiToIdx<0 || stiToIdx>=periods.length) ? periods.length-1 : stiToIdx;
  const weeks = periods.slice(f, t+1).flatMap(p => p.weeks);
  const scope = S();
  const agg = src => { const m={}; for(const wk of weeks){ for(const [k,d] of Object.entries(scope[src]?.[wk] || {})){ if(!m[k]) m[k]={sti:0,total:0}; m[k].sti+=d.STI||0; m[k].total+=d.total||0; } } return m; };
  const q = (stiSearch||'').trim().toLowerCase();
  const clinRows = Object.entries(agg('weekly_clinic'))
    .map(([k,a])=>({name:k.replace('_',' · '), ...a, rate:a.total?a.sti/a.total*100:0}))
    .filter(r=>r.sti>0).filter(r=>!q||r.name.toLowerCase().includes(q)).sort((a,b)=>b.sti-a.sti);
  const docRows = Object.entries(agg('weekly_doctor'))
    .map(([k,a])=>({name:k.split('|')[1]||k, clinic:k.split('|')[0].replace('_',' · '), ...a, rate:a.total?a.sti/a.total*100:0}))
    .filter(r=>r.sti>0).filter(r=>!q||r.name.toLowerCase().includes(q)||r.clinic.toLowerCase().includes(q)).sort((a,b)=>b.sti-a.sti);
  const mC=Math.max(...clinRows.map(r=>r.sti),1), mD=Math.max(...docRows.map(r=>r.sti),1);
  const tbl=(title,rows,mx,withClinic)=>`<div style="flex:1;min-width:320px;">
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:6px;">${title} · ${rows.length}</div>
    <div style="max-height:520px;overflow:auto;border:1px solid var(--line);border-radius:8px;"><table style="width:100%;border-collapse:collapse;font-size:12px;">
      <thead><tr style="position:sticky;top:0;background:#fff;border-bottom:2px solid var(--line);font-size:9.5px;text-transform:uppercase;color:#94a3b8;">
        <th style="text-align:left;padding:5px 7px;">#</th><th style="text-align:left;padding:5px 7px;">Name</th>${withClinic?'<th style="text-align:left;padding:5px 7px;">Clinic</th>':''}<th style="text-align:right;padding:5px 7px;">STI calls</th><th style="text-align:right;padding:5px 7px;">Total</th><th style="text-align:right;padding:5px 7px;">STI%</th></tr></thead>
      <tbody>${rows.map((r,i)=>{ const bw=Math.max(2,r.sti/mx*54); const low=i>=rows.length-Math.max(1,Math.ceil(rows.length*0.25)); const bc=i<3?'#10b981':low?'#ef4444':'#94a3b8';
        return `<tr style="border-bottom:1px solid var(--line);">
          <td style="text-align:left;padding:4px 7px;color:#94a3b8;">${i+1}</td>
          <td style="text-align:left;padding:4px 7px;font-weight:600;">${r.name}</td>
          ${withClinic?`<td style="text-align:left;padding:4px 7px;color:var(--muted);font-size:11px;">${r.clinic}</td>`:''}
          <td style="text-align:right;padding:4px 7px;font-weight:700;white-space:nowrap;"><span style="display:inline-block;width:${bw}px;height:8px;background:${bc};border-radius:2px;margin-right:5px;vertical-align:middle;"></span>${r.sti}</td>
          <td style="text-align:right;padding:4px 7px;color:var(--muted);">${r.total}</td>
          <td style="text-align:right;padding:4px 7px;font-weight:600;color:${r.rate>=20?'#059669':'#64748b'};">${r.rate.toFixed(0)}%</td></tr>`;
      }).join('') || '<tr><td colspan="6" style="padding:12px;color:#94a3b8;text-align:center;">No matches</td></tr>'}</tbody></table></div></div>`;
  el.innerHTML = `<div style="display:flex;gap:18px;flex-wrap:wrap;">${tbl('Clinics by STI calls',clinRows,mC,false)}${tbl('Top doctors by STI calls',docRows,mD,true)}</div>
    <div style="font-size:10.5px;color:#94a3b8;margin-top:8px;">Green = top 3 · red = bottom 25% (watch) · sorted high → low STI calls · scope: ${activeScope}.</div>`;
}

function S() { return DATA[activeScope]; }

// ── Geo / maturity filters (city + clinic include/exclude · clinic maturity) ──
let cityInc = new Set(), cityExc = new Set();
let clinInc = new Set(), clinExc = new Set();
let activeMat = 'ALL';        // 'ALL' | 'Matured' | 'Maturing' | 'New'
let openDD = null;            // open dropdown: 'city' | 'clinic' | null
const CLINIC_MAT = {};
function seedMat(){
  if (Object.keys(CLINIC_MAT).length) return;
  const cnt = {};
  for (const sk of ['offline','all','online']){
    const wc = DATA[sk]?.weekly_clinic; if (!wc) continue;
    for (const w in wc) for (const k in wc[w]) if ((wc[w][k].total||0) > 0) cnt[k] = (cnt[k]||0) + 1;
    if (Object.keys(cnt).length) break;
  }
  for (const k in cnt){ const n = cnt[k]; CLINIC_MAT[k] = n>=11 ? 'Matured' : n>=5 ? 'Maturing' : 'New'; }
}
function clinCity(key){ const i = key.indexOf('_'); return i>-1 ? key.slice(0,i) : key; }
function effectiveCities(){
  let cs = (S().cities||[]).filter(c => c && c!=='Online');
  if (activeTier !== 'ALL') cs = cs.filter(c => cityTier(c)===activeTier);
  if (geoCitySel.size) cs = cs.filter(c => geoCitySel.has(c));   // header multiselect (source of truth)
  if (cityInc.size) cs = cs.filter(c => cityInc.has(c));
  if (cityExc.size) cs = cs.filter(c => !cityExc.has(c));
  return cs;
}
function effectiveClinicKeys(){
  seedMat();
  let ks = (S().clinics||[]).slice();
  if (activeTier !== 'ALL') ks = ks.filter(k => cityTier(clinCity(k))===activeTier);
  if (geoCitySel.size)   ks = ks.filter(k => geoCitySel.has(clinCity(k)));   // header city multiselect
  if (geoClinicSel.size) ks = ks.filter(k => geoClinicSel.has(k));           // header clinic multiselect
  if (cityInc.size) ks = ks.filter(k => cityInc.has(clinCity(k)));
  if (cityExc.size) ks = ks.filter(k => !cityExc.has(clinCity(k)));
  if (clinInc.size) ks = ks.filter(k => clinInc.has(k));
  if (clinExc.size) ks = ks.filter(k => !clinExc.has(k));
  if (activeMat !== 'ALL') ks = ks.filter(k => (CLINIC_MAT[k]||'New')===activeMat);
  return ks;
}
function geoMode(){
  if (geoDoctorSel.size) return 'doctor';
  if (clinInc.size || clinExc.size || geoClinicSel.size || activeMat!=='ALL') return 'clinic';
  if (activeTier!=='ALL' || cityInc.size || cityExc.size || geoCitySel.size) return 'city';
  return 'none';
}
function aggCats(weekKey, keys, src){
  const scope = S(), table = scope[src]?.[weekKey] || {};
  const o = { total:0, by_cat:{ STI:0,'ED+':0,'PE+':0,'ED+PE+':0,NSSD:0,MH:0,oth:0 } };
  for (const k of keys){ const d = table[k]; if (!d) continue; o.total += d.total||0; for (const c in o.by_cat) o.by_cat[c] += d[c]||0; }
  return o;
}

function getFilteredData(weekKey) {
  const scope = S();
  if (activeChannel !== 'ALL') {
    const d = scope.weekly_channel?.[weekKey]?.[activeChannel] || {};
    return { cats: d, funnel: d, total: d.total || 0, isFiltered: true };
  }
  const gm = geoMode();
  if (gm === 'doctor') {
    const a = aggCats(weekKey, effectiveDoctorKeys(), 'weekly_doctor');
    return { cats: a.by_cat, funnel: scope.weekly_funnel?.[weekKey]||{}, total: a.total, isFiltered: true };
  }
  if (gm === 'clinic') {
    const a = aggCats(weekKey, effectiveClinicKeys(), 'weekly_clinic');
    return { cats: a.by_cat, funnel: scope.weekly_funnel?.[weekKey]||{}, total: a.total, isFiltered: true };
  }
  if (gm === 'city') {
    const a = aggCats(weekKey, effectiveCities(), 'weekly_city');
    return { cats: a.by_cat, funnel: scope.weekly_funnel?.[weekKey]||{}, total: a.total, isFiltered: true };
  }
  const wt = scope.weekly_total[weekKey] || {};
  return { cats: wt.by_cat || {}, funnel: scope.weekly_funnel?.[weekKey] || {}, total: wt.total || 0, isFiltered: false };
}

// ── Geo-filter setters + dropdown UI ──
function setCityFilter(city, mode){
  if (mode==='inc'){ if (cityInc.has(city)) cityInc.delete(city); else { cityInc.add(city); cityExc.delete(city); } }
  else { if (cityExc.has(city)) cityExc.delete(city); else { cityExc.add(city); cityInc.delete(city); } }
  render();
}
function setClinFilter(key, mode){
  if (mode==='inc'){ if (clinInc.has(key)) clinInc.delete(key); else { clinInc.add(key); clinExc.delete(key); } }
  else { if (clinExc.has(key)) clinExc.delete(key); else { clinExc.add(key); clinInc.delete(key); } }
  render();
}

// ── Time control: granularity only (Weekly/Monthly). Per-section filters live in each section. ──
let tGran = 'week';        // 'week' | 'month'
const TMS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TMS1 = ['J','F','M','A','My','Jn','Jl','Au','S','O','N','D'];
function tShortWk(wk){ const d = new Date(wk+'T00:00:00Z'); return d.getUTCDate()+TMS1[d.getUTCMonth()]; }
function tMonLabel(wk){ const d = new Date(wk+'T00:00:00Z'); return TMS[d.getUTCMonth()]+" '"+String(d.getUTCFullYear()).slice(2); }
// Build all periods (full data) for the active scope, bucketed by granularity.
function tAllPeriods(){
  const wks = (S().weeks || DATA.weeks);
  if (tGran === 'month'){
    const map = new Map();
    for (const wk of wks){ const k = wk.slice(0,7); if(!map.has(k)) map.set(k,{key:k,label:tMonLabel(wk),weeks:[]}); map.get(k).weeks.push(wk); }
    return [...map.values()];
  }
  return wks.map(wk => ({ key:wk, label:tShortWk(wk), weeks:[wk], wlabel:(DATA.week_labels?.[wk]||wk) }));
}
const tPWord = () => tGran==='month' ? 'mo' : 'wk';
// Aggregate the active category + total over a set of weeks.
function tAgg(weeksArr){
  let total=0, catVal=0; const cat=activeCat;
  for (const wk of weeksArr){ const {cats,total:t}=getFilteredData(wk); total+=t; catVal += cat==='SH'?getSHVal(cats):cat==='ALL'?t:(cats[cat]||0); }
  return { total, catVal, rate: total ? catVal/total*100 : 0 };
}
function setGran(g){ tGran=g; render(); }
function renderTimeBar(){

    <div class="tb-grp"><span class="tb-lbl">View</span>
      <button class="tb-pill${tGran==='week'?' on':''}" onclick="setGran('week')">Weekly</button><button class="tb-pill${tGran==='month'?' on':''}" onclick="setGran('month')">Monthly</button></div>

function last8WeeksAvg(weeks, cat, upToIdx) {

// ── SVG sparkline ────────────────────────────────────────────────────────────
function svgSparkline(vals, color, w, h, filled, opts) {
  w = w||80; h = h||28; if (filled === undefined) filled = true; opts = opts||{};
  const safeVals   = JSON.stringify(vals||[]).replace(/'/g,'&#39;');
  const safeLabels = (opts.labels?JSON.stringify(opts.labels):'null').replace(/'/g,'&#39;');
  const safeTitle  = (opts.title||'').replace(/"/g,'&quot;');
  const safeYL     = (opts.ylabel||'').replace(/"/g,'&quot;');
  const safeXL     = (opts.xlabel||'').replace(/"/g,'&quot;');
  const safeSub    = (opts.sub||'').replace(/"/g,'&quot;');
  const datAttrs   = `data-sparkvals='${safeVals}' data-sparklabels='${safeLabels}' data-sparkcolor='${color}' data-sparktitle="${safeTitle}" data-sparkfmt='${opts.fmt||''}'${safeYL?` data-sparkylabel="${safeYL}"`:''}${safeXL?` data-sparkxlabel="${safeXL}"`:''}${safeSub?` data-sparksub="${safeSub}"`:''}`;
  if (!vals || !Array.isArray(vals)) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}"></svg></div>`;
  const valid = vals.filter(v => v != null && !isNaN(v) && isFinite(v));
  if (!valid.length || valid.length < 2) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}"></svg></div>`;
  const mn  = Math.min(...valid);
  const mx  = Math.max(...valid);
  const rng = mx - mn || 1;
  const pts = vals.map((v, i) => {
    if (v == null || isNaN(v) || !isFinite(v)) return null;
    const x = (i / (vals.length - 1)) * (w - 6) + 3;
    const y = h - 3 - ((v - mn) / rng) * (h - 8);
    return [x.toFixed(1), y.toFixed(1)];
  }).filter(Boolean);
  if (pts.length < 2) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}"></svg></div>`;
  const pStr = pts.map(p => p.join(',')).join(' ');
  const last = pts[pts.length - 1];
  const fill = filled ? `<polygon points="${pts[0][0]},${h} ${pStr} ${last[0]},${h}" fill="${color}22"/>` : '';
  return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible;">
    ${fill}
    <polyline points="${pStr}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.5" fill="${color}"/>
  </svg></div>`;
}

// ── Mini trend box (sparkline + latest + trend indicator) ───────────────────
function buildMiniTrendBox(label, vals, color, latestStr, trendVal, isRatePp, opts) {
  const trendSign  = trendVal >= 0 ? '▲' : '▼';
  const trendAbs   = Math.abs(trendVal);
  const trendColor = isRatePp
    ? (trendVal <= -2 ? '#dc2626' : trendVal >= 2 ? '#059669' : '#94a3b8')
    : (trendVal >= 0 ? '#059669' : '#dc2626');
  const trendStr = isRatePp
    ? trendAbs.toFixed(1) + 'pp'
    : (trendAbs < 10 ? trendAbs.toFixed(1) : Math.round(trendAbs)) + '%';
  const spark = svgSparkline(vals, color, 72, 26, true, opts||{});
  return `<div style="background:#f8fafc;border-radius:8px;padding:8px 10px;">
    <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${label}</div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:4px;">
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--ink);line-height:1.1;">${latestStr}</div>
        <div style="font-size:9px;color:${trendColor};margin-top:2px;font-weight:600;">${trendSign}${trendStr}</div>
      </div>
      ${spark}
    </div>
  </div>`;
}

// ══════════ SNAPSHOT (pure-data tables · no charts · all filters live) ══════════
function renderSnapshot(){
  const cat=activeCat, m=CAT_META[cat]||CAT_META.oth, catLabel=m.label, pWord=tPWord();
  const CATS=['STI','ED+','PE+','ED+PE+','NSSD','MH','oth'];
  const periods=tAllPeriods();
  // ── date range window ──
  const sF=Math.max(0,Math.min(snapFromIdx,periods.length-1));
  const sT=(snapToIdx<0||snapToIdx>=periods.length)?periods.length-1:snapToIdx;
  const snapPeriods=periods.slice(sF,sT+1);
  const allWeeks=snapPeriods.flatMap(p=>p.weeks);   // = selected range
  const channels=DATA.channels||['GMB','Google','Practo','Organic','Meta','Others'];
  const hasGeo=activeScope!=='online'; const scope=S();
  const catOf=o=>cat==='SH'?getSHVal(o):cat==='ALL'?(o.total||0):(o[cat]||0);
  const aggW=wks=>{const o={total:0};CATS.forEach(c=>o[c]=0);for(const wk of wks){const fd=getFilteredData(wk);o.total+=fd.total;const cs=fd.cats||{};CATS.forEach(c=>o[c]+=cs[c]||0);}return o;};
  const pc=(a,b)=>b?(a/b*100).toFixed(1)+'%':'0.0%';
  // funnel aggregate (respects channel/geo filters)
  function aggFunnel(wks){
    const o={slot_booked:0,gross:0,calls_done:0,no_show:0,rescheduled:0,total:0}; CATS.forEach(c=>o[c]=0);
    const add=d=>{o.slot_booked+=d.slot_booked||0;o.gross+=d.gross||0;o.calls_done+=d.calls_done||0;o.no_show+=d.no_show||0;o.rescheduled+=d.rescheduled||0;o.total+=d.total||0;CATS.forEach(c=>o[c]+=d[c]||0);};
    for(const wk of wks){
      if(activeChannel!=='ALL'){ add(scope.weekly_channel?.[wk]?.[activeChannel]||{}); }
      else if(geoMode()==='clinic'){ for(const k of effectiveClinicKeys()){ const d=scope.weekly_clinic?.[wk]?.[k]; if(d) add(d); } }
      else if(geoMode()==='city'){ for(const c of effectiveCities()){ const d=scope.weekly_city?.[wk]?.[c]; if(d) add(d); } }
      else { const fn=scope.weekly_funnel?.[wk]||{}; const t=scope.weekly_total?.[wk]||{}; o.slot_booked+=fn.slot_booked||0;o.gross+=fn.gross||0;o.calls_done+=fn.calls_done||0;o.no_show+=fn.no_show||0;o.rescheduled+=fn.rescheduled||0;o.total+=t.total||0;CATS.forEach(c=>o[c]+=(t.by_cat||{})[c]||0); }
    }
    return o;
  }
  const F=aggFunnel(allWeeks);
  const lost=Math.max(0,F.slot_booked-F.calls_done);
  const fStages=[
    {lbl:'Slots booked', v:F.slot_booked, col:'#94a3b8', sub: lost?lost.toLocaleString()+' not converted'+(F.no_show||F.rescheduled?` (${F.no_show?F.no_show+' no-show':''}${F.no_show&&F.rescheduled?' · ':''}${F.rescheduled?F.rescheduled+' resched':''})`:''):''},
    {lbl:'Calls done', v:F.calls_done, col:'#10b981', sub: F.slot_booked?'B2D '+pc(F.calls_done,F.slot_booked)+' of slots booked':''},
    {lbl:catLabel+' calls', v:catOf(F), col:m.color, sub: F.calls_done?catLabel+' = '+pc(catOf(F),F.calls_done)+' of calls done':''},
  ];
  // Top of funnel: network total inbound leads. Most leads have no clinic tag, so this is only shown
  // at true network scope (no geo/channel filter) — otherwise network leads would dwarf scoped bookings.
  const isNetworkScope = (typeof geoMode==='function'? geoMode()==='none' : true) && activeChannel==='ALL';
  const leadWks = LEADS_TOTAL ? allWeeks.filter(w=>LEADS_TOTAL[w]!=null) : [];
  const leadsTot = leadWks.length ? leadWks.reduce((s,w)=>s+(LEADS_TOTAL[w]||0),0) : null;
  if (isNetworkScope && leadsTot!=null) {
    fStages.unshift({lbl:'Leads', v:leadsTot, col:'#0ea5e9', sub:'all inbound (excl. Practo) · '+pc(F.slot_booked,leadsTot)+' booked a slot'});
  }
  const fMax=Math.max(F.slot_booked||1, fStages[0]?.v||0);
  const funnelHTML=`<div class="card"><div class="snap-h">🔻 Demand funnel — ${dlScopeLbl()}${activeChannel!=='ALL'?' · '+activeChannel:''} · ${snapPeriods[0].label} → ${snapPeriods[snapPeriods.length-1].label}</div>
    <div class="snap-funnel">${fStages.map(s=>`<div class="fnl-row"><div class="fnl-bar" style="width:${Math.max(16,s.v/fMax*100)}%;background:${s.col};"><span class="fnl-lbl">${s.lbl}</span><span class="fnl-val">${s.v.toLocaleString()}</span></div><div class="fnl-sub">${s.sub||''}</div></div>`).join('')}</div></div>`;
  // snapshot bar (Weekly/Monthly + date range — no Period/Compare here)
  const snapBar=`<div class="tbar2">
    <div class="tb-grp"><span class="tb-lbl">View</span><button class="tb-pill${tGran==='week'?' on':''}" onclick="setGran('week')">Weekly</button><button class="tb-pill${tGran==='month'?' on':''}" onclick="setGran('month')">Monthly</button></div>
    <div class="tb-grp"><span class="tb-lbl">Date range</span><select class="tb-sel" onchange="setSnapFrom(+this.value)">${periods.map((p,i)=>`<option value="${i}" ${i===sF?'selected':''}>${p.label}</option>`).join('')}</select><span style="color:#94a3b8;">→</span><select class="tb-sel" onchange="setSnapTo(+this.value)">${periods.map((p,i)=>`<option value="${i}" ${i===sT?'selected':''}>${p.label}${i===periods.length-1?' (latest)':''}</option>`).join('')}</select><span style="font-size:11px;color:var(--muted);margin-left:6px;">${snapPeriods.length} ${pWord}</span></div>
  </div>`;

  // ── filter card (same controls as charts view) ──
  const chips=['ALL',...channels].map(ch=>{const on=activeChannel===ch;const col=ch==='ALL'?'#0f172a':(CH_COLORS[ch]||'#94a3b8');return `<button class="chip" style="${on?`background:${col};border-color:${col};color:#fff;`:''}font-size:11px;padding:3px 10px;" onclick="setChannel('${ch}')">${ch==='ALL'?'All':ch}</button>`;}).join('');
  const filterCard=`<div class="card" style="padding:10px 16px;"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
     <span class="flt-lbl">Channel:</span><div style="display:flex;gap:5px;flex-wrap:wrap;">${chips}</div>
     ${hasGeo?`<span class="flt-sep"></span><span class="flt-lbl">City:</span><div class="mf">${ddBtn('city')}${openDD==='city'?ddPanel('city'):''}</div><span class="flt-lbl">Clinic:</span><div class="mf">${ddBtn('clinic')}${openDD==='clinic'?ddPanel('clinic'):''}</div><span class="flt-sep"></span><span class="flt-lbl">Maturity:</span><div style="display:flex;gap:4px;">${['ALL','Matured','Maturing','New'].map(mt=>`<button class="mtp${activeMat===mt?' on':''}" onclick="setMat('${mt}')">${mt==='ALL'?'All':mt}</button>`).join('')}</div>`:''}
     ${geoMode()!=='none'?`<button class="flt-clear" onclick="clearGeo()">✕ Clear filters</button>`:''}
   </div></div>`;

  // ── 1) weekly category table ──
  const wkRows=snapPeriods.map(p=>{const a=aggW(p.weeks);const cv=catOf(a);return `<tr><td class="l">${p.label}</td>${CATS.map(c=>`<td>${a[c]}</td>`).join('')}<td class="b">${a.total}</td><td class="b" style="color:${m.color}">${pc(cv,a.total)}</td></tr>`;}).join('');
  const wT=aggW(allWeeks);
  const wkFoot=`<tr class="ft"><td class="l">Range total · ${snapPeriods.length} ${pWord}</td>${CATS.map(c=>`<td>${wT[c]}</td>`).join('')}<td class="b">${wT.total}</td><td class="b">${pc(catOf(wT),wT.total)}</td></tr>`;
  const t1=`<div class="card"><div class="snap-h">📅 By ${pWord==='mo'?'month':'week'} — calls done by category</div>
    <div style="overflow:auto;"><table class="snap-tbl"><thead><tr><th class="l">${pWord==='mo'?'Month':'Week'}</th>${CATS.map(c=>`<th>${CAT_META[c]?CAT_META[c].label:c}</th>`).join('')}<th>Total</th><th>${catLabel}%</th></tr></thead><tbody>${wkRows}</tbody><tfoot>${wkFoot}</tfoot></table></div></div>`;

  // ── 2) channel table (network-wide, all weeks) ──
  const netCat=channels.reduce((s,ch)=>s+allWeeks.reduce((x,wk)=>x+catOf(scope.weekly_channel?.[wk]?.[ch]||{}),0),0);
  const netTot=channels.reduce((s,ch)=>s+allWeeks.reduce((x,wk)=>x+(scope.weekly_channel?.[wk]?.[ch]?.total||0),0),0);
  const chRows=channels.map(ch=>{const tot=allWeeks.reduce((x,wk)=>x+(scope.weekly_channel?.[wk]?.[ch]?.total||0),0);const cv=allWeeks.reduce((x,wk)=>x+catOf(scope.weekly_channel?.[wk]?.[ch]||{}),0);return {ch,tot,cv};}).sort((a,b)=>b.tot-a.tot)
    .map(r=>`<tr><td class="l"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${CH_COLORS[r.ch]||'#94a3b8'};margin-right:6px;"></span>${r.ch}</td><td class="b">${r.tot}</td><td>${r.cv}</td><td style="color:${m.color}">${pc(r.cv,r.tot)}</td><td>${pc(r.tot,netTot)}</td><td>${pc(r.cv,netCat)}</td></tr>`).join('');
  const t2=`<div class="card"><div class="snap-h">📣 By channel — network-wide · ${snapPeriods.length} ${pWord} in range</div>
    <div style="overflow:auto;"><table class="snap-tbl"><thead><tr><th class="l">Channel</th><th>Calls</th><th>${catLabel}</th><th>${catLabel}%</th><th>% of calls</th><th>% of ${catLabel}</th></tr></thead><tbody>${chRows}</tbody></table></div></div>`;

  // ── 3) city + 4) clinic tables (geo only) ──
  let t3='',t4='';

  const aggW=wks=>{const o={total:0};CATS.forEach(c=>o[c]=0);for(const wk of wks){const fd=getFilteredData(wk);o.total+=fd.total;const cs=fd.cats||{};CATS.forEach(c=>o[c]+=cs[c]||0);}return o;};

    ${hero(catLabel+'% · latest '+pWord, latest.rate.toFixed(1)+'%', dlt(dRate,true)+` vs window avg (${avgRate.toFixed(1)}%)`, '#d97706', svgSparkline(series.map(x=>x.rate),'#f59e0b',96,34,true,{...sOpt(catLabel+'%','%'),fmt:'pct'}))}

function render() {
  syncHeaderFilters();
  if (dataMode === 'snapshot') { try { renderSnapshot(); } catch(e){ console.error('snapshot', e); } return; }
  if (dataMode === 'kpi') { try { renderKpiSnapshot(); } catch(e){ console.error('kpi', e); } return; }
  const scope    = S();
  const periods  = tAllPeriods();                  // full timeline (page shows all data, bucketed by granularity)
  _stiPeriods = periods;                            // snapshot for the STI finder's standalone re-render
  const weeks    = periods.flatMap(p => p.weeks);
  const cat      = activeCat;
  const m        = CAT_META[cat] || CAT_META['oth'];
  const catLabel = m.label;
  const lastWeek = weeks[weeks.length - 1];
  const hasGeo   = activeScope !== 'online';
  const pWord    = tPWord();

  // ── Per-period series (respects granularity + range window) ──
  const allWeekData = periods.map(p => {
    const a = tAgg(p.weeks);
    return { wk:p.key, label:p.label, total:a.total, catVal:a.catVal, weeks:p.weeks };
  });
  const totalCatAll   = allWeekData.reduce((s,d) => s + d.catVal, 0);
  const totalCallsAll = allWeekData.reduce((s,d) => s + d.total,  0);
  const avgCatPct     = totalCallsAll ? totalCatAll / totalCallsAll * 100 : 0;

  const weekRates = allWeekData.map(d => ({ wk:d.wk, label:d.label, rate: d.total ? d.catVal/d.total*100 : 0 }));
  const peakWk    = weekRates.reduce((a,b) => b.rate > a.rate ? b : a);
  const lowWk     = weekRates.reduce((a,b) => b.rate < a.rate ? b : a);
  const catPctMin = Math.min(...weekRates.map(r => r.rate));
  const catPctMax = Math.max(...weekRates.map(r => r.rate));
  const catPctAvg = weekRates.reduce((s,r) => s + r.rate, 0) / weekRates.length;

  // Top channel (scope-level, network-wide)
  const channels = DATA.channels || ['GMB','Google','Practo','Organic','Meta','Others'];
  const chCatTotals = channels.map(ch => ({
    ch,
    total: weeks.reduce((s,wk) => {
      const d = scope.weekly_channel?.[wk]?.[ch] || {};
      return s + (cat==='SH' ? getSHVal(d) : cat==='ALL' ? (d.total||0) : (d[cat]||0));
    }, 0)
  })).sort((a,b) => b.total - a.total);
  const topCh    = chCatTotals[0] || { ch:'—', total:0 };
  const topChPct = totalCatAll ? topCh.total / totalCatAll * 100 : 0;

  // Growth: first N4 vs last N4 periods
  const n4        = Math.min(4, Math.floor(periods.length / 2)) || 1;
  const first4    = allWeekData.slice(0, n4);
  const last4     = allWeekData.slice(-n4);
  const avgTotF   = first4.reduce((s,d) => s + d.total,  0) / n4;
  const avgTotL   = last4.reduce((s,d)  => s + d.total,  0) / n4;
  const avgCatF   = first4.reduce((s,d) => s + d.catVal, 0) / n4;
  const avgCatL   = last4.reduce((s,d)  => s + d.catVal, 0) / n4;
  const totGrowth = avgTotF ? (avgTotL - avgTotF) / avgTotF * 100 : 0;
  const catGrowth = avgCatF ? (avgCatL - avgCatF) / avgCatF * 100 : 0;

  // Period labels for charts (week-short or month)
  const wkLabels   = periods.map(p => p.label);

  // ── Channel stats (network-wide · windowed by chWin, ending at chWeekIdx) ──
  const chEnd = (chWeekIdx<0 || chWeekIdx>=periods.length) ? periods.length-1 : chWeekIdx;
  const chStart = (chWin==='all') ? 0 : Math.max(0, chEnd - chWin + 1);
  const chPeriods = periods.slice(chStart, chEnd+1);
  const chN4 = Math.min(4, Math.floor(chPeriods.length/2)) || 1;
  // Per-channel weekly record honouring the Channel-Analysis tier filter.
  // ALL → all-scope weekly_channel (data.json). T1/T2 → sum CHDATA.offline.city
  // over the tier's cities (offline calls done; online isn't geo-tagged).
  // Geo filter active when any of tier / city / clinic is set (offline CHDATA).
  const _catKeys = DATA.categories || [];
  seedMat();
  const geoActive = (activeTier!=='ALL' || geoCitySel.size || geoClinicSel.size || activeMat!=='ALL') && CHDATA && CHDATA.offline;
  const chRec = (wk, ch) => {
    if(!geoActive) return scope.weekly_channel?.[wk]?.[ch] || {};
    const out={total:0}; _catKeys.forEach(c=>out[c]=0);
    // clinic-level aggregation when explicit clinics OR maturity is in play
    if(geoClinicSel.size || activeMat!=='ALL'){
      const clinicNode = CHDATA.offline.clinic || {};
      for(const key in clinicNode){
        if(geoClinicSel.size && !geoClinicSel.has(key)) continue;
        if(activeMat!=='ALL' && (CLINIC_MAT[key]||'New')!==activeMat) continue;
        if(activeTier!=='ALL' && cityTier(clinCity(key))!==activeTier) continue;
        if(geoCitySel.size && !geoCitySel.has(clinCity(key))) continue;
        const rr=clinicNode[key]?.[wk]?.[ch]; if(!rr) continue;
        out.total+=rr.total||0; _catKeys.forEach(c=>out[c]+=rr[c]||0); }
      return out;
    }
    const cityNode = CHDATA.offline.city || {};
    for(const city in cityNode){
      if(geoCitySel.size && !geoCitySel.has(city)) continue;
      if(activeTier!=='ALL' && cityTier(city)!==activeTier) continue;
      const rr=cityNode[city]?.[wk]?.[ch]; if(!rr) continue;
      out.total += rr.total||0; _catKeys.forEach(c=>out[c]+=rr[c]||0); }
    return out;
  };
  const chTierActive = geoActive;   // (kept for netTotW/netCatW below)
  const netTotW = wk => chTierActive ? channels.reduce((s,ch)=>s+(chRec(wk,ch).total||0),0) : (scope.weekly_total?.[wk]?.total||0);
  const netCatW = wk => { if(!chTierActive){ const wt=scope.weekly_total?.[wk]?.by_cat||{}; return cat==='SH'?getSHVal(wt):cat==='ALL'?(scope.weekly_total?.[wk]?.total||0):(wt[cat]||0); }
    return channels.reduce((s,ch)=>{ const d=chRec(wk,ch); return s+(cat==='SH'?getSHVal(d):cat==='ALL'?(d.total||0):(d[cat]||0)); },0); };
  const channelStats = channels.map(ch => {
    const totVals = chPeriods.map(p => p.weeks.reduce((s,wk) => s + (chRec(wk,ch).total||0), 0));
    const catVals = chPeriods.map(p => p.weeks.reduce((s,wk) => { const d = chRec(wk,ch); return s + (cat==='SH'?getSHVal(d):cat==='ALL'?(d.total||0):(d[cat]||0)); }, 0));
    const rates      = totVals.map((t,i) => t ? catVals[i]/t*100 : null);
    const validR     = rates.filter(v => v != null);
    const avgRate    = validR.length ? validR.reduce((a,b)=>a+b,0)/validR.length : 0;
    const latestRate = [...rates].reverse().find(v => v != null) ?? 0;
    const earlyR     = validR.slice(0, chN4);
    const recentR    = validR.slice(-chN4);
    const earlyAvg   = earlyR.length  ? earlyR.reduce((a,b)=>a+b,0)/earlyR.length   : avgRate;
    const recentAvg  = recentR.length ? recentR.reduce((a,b)=>a+b,0)/recentR.length : avgRate;
    const trend      = recentAvg - earlyAvg;
    const avgVol     = totVals.reduce((a,b)=>a+b,0) / totVals.length;
    const avgCat     = catVals.reduce((a,b)=>a+b,0) / catVals.length;
    const netTots    = chPeriods.map(p => p.weeks.reduce((s,wk) => s + netTotW(wk), 0));
    const netCatTots = chPeriods.map(p => p.weeks.reduce((s,wk) => s + netCatW(wk), 0));
    const avgNetVol  = netTots.reduce((a,b)=>a+b,0)    / netTots.length    || 1;
    const avgNetCat  = netCatTots.reduce((a,b)=>a+b,0) / netCatTots.length || 1;
    const volShare   = avgNetVol ? avgVol / avgNetVol * 100 : 0;
    const catShare   = avgNetCat ? avgCat / avgNetCat * 100 : 0;
    const earlyVol   = totVals.slice(0,chN4).reduce((a,b)=>a+b,0)/chN4 || 1;
    const recentVol  = totVals.slice(-chN4).reduce((a,b)=>a+b,0)/chN4;
    const volTrend   = (recentVol - earlyVol) / earlyVol * 100;
    const earlyC     = catVals.slice(0,chN4).reduce((a,b)=>a+b,0)/chN4 || 1;
    const recentC    = catVals.slice(-chN4).reduce((a,b)=>a+b,0)/chN4;
    const catTrend   = (recentC - earlyC) / earlyC * 100;
    return { ch, totVals, catVals, rates, avgRate, latestRate, earlyAvg, trend,
             avgVol, avgCat, volShare, catShare, volTrend, catTrend };
  });

  const maxAvgVol = Math.max(...channelStats.map(s => s.avgVol)) || 1;
  const chLabels = chPeriods.map(p => p.label);
  const pAxis = pWord==='mo' ? 'Month' : 'Week';

  function getSignal(stats) {
    const { avgVol, trend, volTrend } = stats;
    if (avgVol === maxAvgVol && Math.abs(trend) < 2)  return {key:'anchor',  label:'Anchor channel',        color:'#059669', bg:'#ecfdf5', bd:'#6ee7b7'};
    if (volTrend > 10 && trend < -2)                  return {key:'slipping',label:'Vol↑ · Rate slipping',  color:'#d97706', bg:'#fffbeb', bd:'#fcd34d'};
    if (trend < -3)                                   return {key:'dropping',label:catLabel+' rate dropping',color:'#dc2626', bg:'#fef2f2', bd:'#fca5a5'};
    if (trend > 2)                                    return {key:'rising',  label:catLabel+' rate rising',  color:'#059669', bg:'#f0fdf4', bd:'#86efac'};
    return                                                    {key:'stable',  label:'Stable',                color:'#0ea5e9', bg:'#eff6ff', bd:'#93c5fd'};
  }

  function getInsight(sig, st) {
    const lb = catLabel;
    switch(sig.key) {
      case 'anchor':   return `<strong>Healthy anchor:</strong> Largest channel (${st.volShare.toFixed(1)}% of calls), drives ${st.catShare.toFixed(1)}% of all ${lb}. ${lb} rate steady — ${st.avgRate.toFixed(1)}% avg, latest ${st.latestRate.toFixed(1)}%. Nothing to fix.`;
      case 'slipping': return `<strong>Volume up, ${lb} rate slipping:</strong> Volume +${Math.abs(st.volTrend).toFixed(0)}% vs early weeks but ${lb} rate declining (${st.avgRate.toFixed(1)}% avg, latest ${st.latestRate.toFixed(1)}%, trend ${st.trend.toFixed(1)}pp). More traffic, proportionally fewer ${lb}. Check campaign targeting.`;
      case 'dropping': return `<strong>${lb} rate dropping:</strong> Rate declined from ${st.earlyAvg.toFixed(1)}% to ${st.latestRate.toFixed(1)}% (trend ${st.trend.toFixed(1)}pp). Review lead quality and mix shift.`;
      case 'rising':   return `<strong>${lb} rate rising:</strong> Rate improved from ${st.earlyAvg.toFixed(1)}% to ${st.latestRate.toFixed(1)}% (+${st.trend.toFixed(1)}pp). Positive quality signal — keep monitoring.`;
      default:         return `<strong>Stable:</strong> ${lb} rate consistent around ${st.avgRate.toFixed(1)}%. Volume and ${lb} broadly in line with network trends.`;
    }
  }

  // ── Channel cards ──
  const latestWkStr = (DATA.week_labels?.[lastWeek]||lastWeek).split(' - ')[1] || 'latest';
  const channelCardsHTML = channelStats.map(stats => {
    const sig = getSignal(stats);
    const { ch, totVals, catVals, rates, avgRate, latestRate, avgVol, avgCat,
            volShare, catShare, catTrend, volTrend, trend } = stats;
    const cc     = CH_COLORS[ch] || '#94a3b8';
    const chName = ch==='GMB' ? 'Google GMB' : ch==='Google' ? 'Google ex GMB' : ch;
    const latestTot = totVals[totVals.length-1];
    const latestCat = catVals[catVals.length-1];
    const rateColor = v => v >= 25 ? '#dc2626' : v >= 18 ? '#d97706' : 'var(--ink)';
    return `<div style="background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:18px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
        <span style="width:11px;height:11px;border-radius:50%;background:${cc};flex-shrink:0;display:inline-block;"></span>
        <span style="font-size:15px;font-weight:700;">${chName}</span>
        <span class="ch-chip" style="color:${cc};border-color:${cc}44;background:${cc}11;">${volShare.toFixed(0)}% of calls</span>
        <span class="ch-chip" style="color:#d97706;border-color:#f59e0b44;background:#fffbeb;">${catShare.toFixed(0)}% of all ${catLabel}</span>
        <span style="margin-left:auto;padding:3px 11px;border-radius:999px;font-size:10px;font-weight:700;background:${sig.bg};color:${sig.color};border:1px solid ${sig.bd};">${sig.label}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;">
        ${buildMiniTrendBox('Total calls / '+pWord, totVals, cc, fmt(latestTot), volTrend, false, {labels:chLabels, title:chName+' · Total calls', ylabel:'Total calls', xlabel:pAxis, sub:'Network-wide · per '+pWord})}
        ${buildMiniTrendBox(catLabel+' calls / '+pWord, catVals, '#f59e0b', fmt(latestCat), catTrend, false, {labels:chLabels, title:chName+' · '+catLabel+' calls', ylabel:catLabel+' calls', xlabel:pAxis, sub:'Network-wide · per '+pWord})}
        ${buildMiniTrendBox(catLabel+' rate / '+pWord, rates.map(r => r ?? 0), sig.color, latestRate.toFixed(1)+'%', trend, true, {labels:chLabels, title:chName+' · '+catLabel+' rate', ylabel:catLabel+' rate %', xlabel:pAxis, fmt:'pct', sub:'Network-wide · per '+pWord})}
      </div>
      <div style="padding:9px 12px;background:${sig.bg};border:1px solid ${sig.bd};border-radius:8px;font-size:12px;line-height:1.45;color:var(--ink);">
        ${getInsight(sig, stats)}
      </div>
    </div>`;
  }).join('');

  // ── City analysis ──
  let citySection = '';
  if (hasGeo) {
    // date range for the city section
    const cF = Math.max(0, Math.min(cityFromIdx, periods.length-1));
    const cT = (cityToIdx<0 || cityToIdx>=periods.length) ? periods.length-1 : cityToIdx;
    const cityPeriods = periods.slice(cF, cT+1);
    const cityWeeks   = cityPeriods.flatMap(p => p.weeks);
    const allCities = (S().cities || []).filter(c => c && c !== 'Online');
    const cityAgg   = {};
    for (const city of allCities) {
      let total=0, catV=0;
      for (const wk of cityWeeks) {
        const d = S().weekly_city?.[wk]?.[city] || {};
        total += d.total || 0;
        catV  += cat==='SH' ? getSHVal(d) : cat==='ALL' ? (d.total||0) : (d[cat]||0);
      }
      cityAgg[city] = { total, catV, rate: total ? catV/total*100 : 0 };
    }

    // Network rate (scope-level for threshold)
    const netRate = totalCallsAll ? totalCatAll/totalCallsAll*100 : 0;
    const watchT  = netRate * 1.4; // ≥1.4× network avg = watch

    const effCitySet = new Set(effectiveCities());
    const filteredCities = allCities.filter(c => effCitySet.has(c))
      .filter(c => cityAgg[c]?.total > 0)
      .sort((a,b) => cityAgg[b].rate - cityAgg[a].rate);
    const maxCR = Math.max(...filteredCities.map(c => cityAgg[c].rate), 1);

    // Aggregate clinic data across the selected date range
    const clinicAgg = {};
    for (const wk of cityWeeks) {
      for (const [key, d] of Object.entries(S().weekly_clinic?.[wk] || {})) {
        if (!clinicAgg[key]) clinicAgg[key] = { total:0, catV:0 };
        clinicAgg[key].total += d.total || 0;
        clinicAgg[key].catV  += cat==='SH' ? getSHVal(d) : cat==='ALL' ? (d.total||0) : (d[cat]||0);
      }
    }

    const cityBarRows = filteredCities.map(city => {
      const cd  = cityAgg[city];
      const bw  = maxCR ? cd.rate/maxCR*100 : 0;
      const bc  = cd.rate >= watchT ? '#f59e0b' : '#10b981';
      const tc  = cd.rate >= watchT ? '#d97706' : '#059669';
      return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
        <div style="width:88px;font-size:11px;font-weight:600;text-align:right;color:var(--ink);">${city}</div>
        <div style="flex:1;height:16px;background:#f1f5f9;border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${Math.min(bw,100)}%;background:${bc};border-radius:4px;"></div>
        </div>
        <div style="font-size:11px;font-weight:700;color:${tc};width:34px;text-align:right;">${cd.rate.toFixed(0)}%</div>
      </div>`;
    }).join('');

    const effClinSet = new Set(effectiveClinicKeys());
    const cityCards = filteredCities.map(city => {
      const cd      = cityAgg[city];
      const clinics = Object.keys(clinicAgg)
        .filter(k => k.startsWith(city+'_') && effClinSet.has(k))
        .map(k => ({ name:k.replace(city+'_',''), ...clinicAgg[k],
                     rate: clinicAgg[k].total ? clinicAgg[k].catV/clinicAgg[k].total*100 : 0 }))
        .filter(c => c.total > 0)
        .sort((a,b) => b.rate - a.rate);
      const maxClinicR = Math.max(...clinics.map(c => c.rate), 1);
      const alertC     = clinics.find(c => c.rate >= watchT);
      const hdrColor   = cd.rate >= watchT ? '#d97706' : '#059669';
      return `<div style="border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:10px;">
        <div style="padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:#fafafa;">
          <span style="font-size:22px;font-weight:700;color:${hdrColor};">${cd.rate.toFixed(0)}%</span>
          <div>
            <div style="font-size:13px;font-weight:700;cursor:pointer;color:#4338ca;" title="Open drill-down for ${city}" onclick="drillToCity('${city.replace(/'/g,"\\'")}')">${city} <span style="font-size:10px;font-weight:600;">🔎</span></div>
            <div style="font-size:11px;color:var(--muted);">${clinics.length} active clinic${clinics.length!==1?'s':''} · ${cd.catV.toLocaleString()} ${catLabel} / ${cd.total.toLocaleString()} total</div>
          </div>
        </div>
        <div style="padding:10px 14px;">
          ${clinics.map(c => {
            const cbc = c.rate >= watchT ? '#f59e0b' : '#10b981';
            const ctc = c.rate >= watchT ? '#d97706' : '#059669';
            return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
              <div style="width:110px;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${c.name}">${c.name}</div>
              <div style="flex:1;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${Math.min(c.rate/maxClinicR*100,100)}%;background:${cbc};border-radius:3px;"></div>
              </div>
              <div style="font-size:11px;font-weight:700;color:${ctc};width:30px;text-align:right;">${c.rate.toFixed(0)}%</div>
            </div>`;
          }).join('')}
          ${alertC
            ? `<div style="margin-top:8px;padding:6px 10px;background:#fffbeb;border:1px solid #fcd34d;border-radius:6px;font-size:11px;color:#92400e;display:flex;gap:6px;align-items:center;">⚠️ Moderate ${catLabel} load. Watch ${alertC.name} (${alertC.rate.toFixed(0)}%)</div>`
            : `<div style="margin-top:8px;padding:6px 10px;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:6px;font-size:11px;color:#065f46;display:flex;gap:6px;align-items:center;">✓ Stable — low ${catLabel} share overall</div>`
          }
        </div>
      </div>`;
    }).join('');

    const cwStart = cityWeeks[0], cwEnd = cityWeeks[cityWeeks.length-1];
    const dateRange = `${(DATA.week_labels?.[cwStart]||'').split(' - ')[0]||cwStart} – ${(DATA.week_labels?.[cwEnd]||'').split(' - ')[1]||cwEnd}`;
    const rangeCtl = `<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:14px;">
        <span class="tb-lbl">View</span><button class="ch-winpill${tGran==='week'?' on':''}" onclick="setGran('week')">Weekly</button><button class="ch-winpill${tGran==='month'?' on':''}" onclick="setGran('month')">Monthly</button>
        <span class="tb-lbl" style="margin-left:8px;">Date range</span>
        <select class="tb-sel" style="padding:3px 7px;" onchange="setCityFrom(+this.value)">${periods.map((p,i)=>`<option value="${i}" ${i===cF?'selected':''}>${p.label}</option>`).join('')}</select>
        <span style="color:#94a3b8;">→</span>
        <select class="tb-sel" style="padding:3px 7px;" onchange="setCityTo(+this.value)">${periods.map((p,i)=>`<option value="${i}" ${i===cT?'selected':''}>${p.label}${i===periods.length-1?' (latest)':''}</option>`).join('')}</select>
        <span style="font-size:11px;color:var(--muted);margin-left:6px;">${cityPeriods.length} ${pWord} · ${dateRange}</span></div>`;
    citySection = `<div class="card">
      <div style="font-size:15px;font-weight:700;margin-bottom:4px;">City-level ${catLabel} share — average · ${catDisplayLabel(cat)}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">${catLabel}% of calls by city · averaged over the selected range · ${activeScope}</div>
      ${rangeCtl}
      <div style="display:grid;grid-template-columns:240px 1fr;gap:20px;align-items:start;">
        <div>
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:10px;">${catLabel} % by city — ${dateRange}</div>
          ${cityBarRows}
          <div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:#64748b;">
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#10b981;margin-right:3px;vertical-align:middle;"></span>Below watch (${watchT.toFixed(0)}%)</span>
            <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#f59e0b;margin-right:3px;vertical-align:middle;"></span>Watch zone</span>
          </div>
        </div>
        <div style="max-height:660px;overflow-y:auto;">${cityCards}</div>
      </div>
    </div>`;
  }

  // ── Assemble all HTML ──
  document.getElementById('mainContent').innerHTML = `
    ${mhBanner()}
    <div id="drillRoot"></div>

    ${sect('🔀 Channel Analysis — ' + catDisplayLabel(cat),
      'Per-channel ' + catLabel + ' rate &amp; volume trend · network-wide',
      `<div class="ch-winbar"><span class="tb-lbl">View</span><button class="ch-winpill${tGran==='week'?' on':''}" onclick="setGran('week')">Weekly</button><button class="ch-winpill${tGran==='month'?' on':''}" onclick="setGran('month')">Monthly</button>
        <span class="tb-lbl" style="margin-left:10px;">Window</span>${[['1',1],['2',2],['4',4],['8',8],['12',12],['All','all']].map(([l,v])=>`<button class="ch-winpill${(chWin===v||(v==='all'&&chWin==='all'))?' on':''}" onclick="setChWin(${v==='all'?"'all'":v})">${l}${v==='all'?'':' '+pWord}</button>`).join('')}
        <span class="tb-lbl" style="margin-left:10px;">End ${pWord}</span><select class="tb-sel" style="padding:3px 7px;" onchange="setChWeek(+this.value)">${periods.map((p,i)=>`<option value="${i}" ${i===chEnd?'selected':''}>${p.label}${i===periods.length-1?' (latest)':''}</option>`).join('')}</select>
        <span style="margin-left:auto;font-size:11px;color:var(--muted);">${periods[chStart].label} → ${periods[chEnd].label} · ${chPeriods.length} ${pWord} · trends &amp; shares reflect this window</span></div>
       ${activeTier!=='ALL' ? `<div style="font-size:11px;color:#4338ca;background:#eef2ff;border-radius:8px;padding:7px 11px;margin-bottom:10px;">Filtered to <b>${activeTier==='T1'?'Tier 1':'Tier 2'}</b> cities (from the top filter) — offline calls done in ${activeTier} clinics.</div>` : ''}
       <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;">${channelCardsHTML}</div>`)}

    ${(()=>{ // ── Channel mix & trends — stacked channel composition over the window ──
      const pcmCats=v=>cat==='SH'?getSHVal(v):cat==='ALL'?(v.total||0):(v[cat]||0);
      const series=chPeriods.map(p=>{ const row={label:p.label,_tot:0}; channels.forEach(ch=>row[ch]=0);
        for(const wk of p.weeks){ for(const ch of channels){ const d=chRec(wk,ch); const val=pcmMetric==='total'?(d.total||0):pcmCats(d); row[ch]+=val; row._tot+=val; } } return row; });
      _pcmData={labels:chLabels, series, channels};
      const last=series[series.length-1]||{_tot:0};
      const ranked=channels.map(ch=>[ch,last[ch]||0]).sort((a,b)=>b[1]-a[1]).filter(x=>x[1]>0);
      const metLbl=pcmMetric==='total'?'Total calls':catLabel+' calls';
      const ins=ranked.length?`<b>${ranked[0][0]}</b> leads at ${last._tot?Math.round(ranked[0][1]/last._tot*100):0}% of ${metLbl} · `+ranked.slice(0,3).map(([ch,v])=>`<span style="color:${CH_COLORS[ch]||'#64748b'}">${ch}</span> ${last._tot?Math.round(v/last._tot*100):0}%`).join(' · '):'no calls in window';
      return sect('📊 Channel mix &amp; trends — '+metLbl,
        'Which channels drive '+(pcmMetric==='total'?'demand':catLabel+' calls')+' over the window, and how the mix is shifting',
        `<div class="ch-winbar"><span class="tb-lbl">Metric</span>${[[catLabel+' calls','cat'],['Total calls','total']].map(([l,v])=>`<button class="ch-winpill${pcmMetric===v?' on':''}" onclick="setPcm('metric','${v}')">${l}</button>`).join('')}
          <span class="tb-lbl" style="margin-left:10px;">Mode</span>${[['Absolute','abs'],['100% share','pct']].map(([l,v])=>`<button class="ch-winpill${pcmMode===v?' on':''}" onclick="setPcm('mode','${v}')">${l}</button>`).join('')}
          <span style="margin-left:auto;font-size:11px;color:var(--muted);">same ${chPeriods.length}-${pWord} window as above</span></div>
         <div style="height:300px;margin-top:6px;"><canvas id="pageChMix"></canvas></div>
         <div style="font-size:11.5px;color:#475569;margin-top:8px;line-height:1.5;">${ins}.</div>`,
        'chanmix');
    })()}

    ${citySection ? sect('🏙️ City-level ' + catLabel + ' share — average',
      catLabel + '% by city · aggregated over the selected date range',
      citySection) : ''}

    ${(()=>{ const f=Math.max(0,Math.min(stiFromIdx,periods.length-1)); const t=(stiToIdx<0||stiToIdx>=periods.length)?periods.length-1:stiToIdx;
      return sect('🔎 STI performance finder — clinics & doctors',
        'Search &amp; rank clinics and doctors by STI calls over a time range · top → bottom to spot under-performers',
        `<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
           <input id="stiSearchInput" type="text" value="${(stiSearch||'').replace(/"/g,'&quot;')}" oninput="setStiSearch(this.value)" placeholder="Search a clinic or doctor…" style="flex:1;min-width:240px;padding:7px 11px;border:1.5px solid #4f46e5;border-radius:8px;font-size:13px;">
           <span class="tb-lbl">From</span><select class="tb-sel" style="padding:3px 7px;" onchange="setStiFrom(+this.value)">${periods.map((p,i)=>`<option value="${i}" ${i===f?'selected':''}>${p.label}</option>`).join('')}</select>
           <span class="tb-lbl">To</span><select class="tb-sel" style="padding:3px 7px;" onchange="setStiTo(+this.value)">${periods.map((p,i)=>`<option value="${i}" ${i===t?'selected':''}>${p.label}${i===periods.length-1?' (latest)':''}</option>`).join('')}</select>
         </div>
         <div id="stiResults"></div>`,
        'stifinder');
    })()}`;

  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
  renderDrill();
  drawPageChMix();
  renderStiResults();
}
function drawPageChMix(){
  const ctx=document.getElementById('pageChMix'); if(!ctx||!_pcmData) return;
  const {labels,series,channels}=_pcmData; const pct=pcmMode==='pct';
  const ds=channels.map(ch=>({label:ch,data:series.map(x=>pct?(x._tot?x[ch]/x._tot*100:0):x[ch]),backgroundColor:(CH_COLORS[ch]||'#94a3b8')+'cc',borderColor:CH_COLORS[ch]||'#94a3b8',borderWidth:0,stack:'c',
    datalabels:{display:c=>{const v=c.dataset.data[c.dataIndex];return pct?v>=8:v>=4;},color:'#fff',font:{size:9,weight:'bold'},formatter:v=>v>0?(pct?Math.round(v)+'%':Math.round(v)):''}}));
  charts.pageChMix=new Chart(ctx,{type:'bar',data:{labels,datasets:ds},options:{animation:false,responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:11},boxWidth:11,padding:8}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${pct?(c.raw||0).toFixed(1)+'%':Math.round(c.raw||0)}`}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:11}}},y:{stacked:true,max:pct?105:undefined,grid:{color:'#f1f5f9'},ticks:{font:{size:11},callback:v=>pct?v+'%':v}}}}});
}

// ── Deep-dive helpers ────────────────────────────────────────────────────────
function getCatChVal(scope, weekKey, cat, ch) {
  const chData = scope.weekly_channel?.[weekKey]?.[ch] || {};
  if (cat === 'ALL') return chData.total || 0;
  if (cat === 'SH')  return getSHVal(chData);
  return chData[cat] || 0;
}

function getScopeCatTotal(weekKey, cat) {
  const wt = S().weekly_total?.[weekKey];
  if (!wt) return 1;
  if (cat === 'ALL') return wt.total || 1;
  if (cat === 'SH')  return getSHVal(wt.by_cat || {});
  return (wt.by_cat || {})[cat] || 1;
}

function buildCatMixChart(weeks, cat, m) {
  const ctx = document.getElementById('catMixChart');
  if (!ctx) return;
  const scope    = S();
  const channels = DATA.channels;
  const lastW    = weeks[weeks.length - 1];
  const avg8     = weeks.slice(Math.max(0, weeks.length - 9), weeks.length - 1);
  const catTotalCur = getScopeCatTotal(lastW, cat);
  const curVals = channels.map(ch => getCatChVal(scope, lastW, cat, ch) / catTotalCur * 100);
  const avgVals = channels.map(ch => {
    const vals = avg8.map(w => getCatChVal(scope, w, cat, ch) / getScopeCatTotal(w, cat) * 100);
    return vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
  });
  charts.catMix = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: channels,
      datasets: [
        { label:'This Week %',  data:curVals, backgroundColor:channels.map(ch=>(CH_COLORS[ch]||'#94a3b8')+'CC'), borderColor:channels.map(ch=>CH_COLORS[ch]||'#94a3b8'), borderWidth:1.5, borderRadius:5, order:2 },
        { label:'8-Wk Avg %',  data:avgVals, type:'line', borderColor:'#0f172a', backgroundColor:'transparent', borderWidth:2, borderDash:[4,3], pointRadius:4, pointBackgroundColor:'#0f172a', order:1 }
      ]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{position:'top',labels:{font:{size:10},boxWidth:10,padding:8}}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${(ctx.raw||0).toFixed(1)}%`}} },
      scales:{ x:{grid:{display:false}}, y:{beginAtZero:true,ticks:{callback:v=>v+'%'},grid:{color:'#f1f5f9'}} }
    }
  });
}

function buildCatSplitChart(periods, cat, m) {
  const ctx = document.getElementById('catSplitChart');
  if (!ctx) return;
  const channels = DATA.channels;
  function getScopeTotal(scopeKey, weekKey) {
    if (!DATA[scopeKey]?.weekly_channel) return 0;
    return channels.reduce((s, ch) => s + getCatChVal(DATA[scopeKey], weekKey, cat, ch), 0);
  }
  const labels     = periods.map(p => p.label);
  const offlineAbs = periods.map(p => p.weeks.reduce((s,w) => s + getScopeTotal('offline', w), 0));
  const onlineAbs  = periods.map(p => p.weeks.reduce((s,w) => s + getScopeTotal('online',  w), 0));
  const offlinePct = offlineAbs.map((_,i) => offlineAbs[i] / ((offlineAbs[i]+onlineAbs[i])||1) * 100);
  const onlinePct  = onlineAbs.map((_,i)  => onlineAbs[i]  / ((offlineAbs[i]+onlineAbs[i])||1) * 100);
  charts.catSplit = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [
      { label:'Offline', data:offlinePct, backgroundColor:'#10b981CC', borderColor:'#10b981', borderWidth:1 },
      { label:'Online',  data:onlinePct,  backgroundColor:'#3b82f6CC', borderColor:'#3b82f6', borderWidth:1 },
    ]},
    options: { responsive:true, maintainAspectRatio:false,
      scales:{ x:{stacked:true,grid:{display:false},ticks:{font:{size:10},maxRotation:30}}, y:{stacked:true,max:105,ticks:{callback:v=>v+'%'},grid:{color:'#f1f5f9'}} },
      plugins:{ legend:{position:'top',labels:{font:{size:10},boxWidth:10,padding:8}}, tooltip:{mode:'index',callbacks:{label:ctx=>`${ctx.dataset.label}: ${(ctx.raw||0).toFixed(1)}%`}} }
    }
  });
}

      plugins:{ legend:{position:'top',labels:{font:{size:10},boxWidth:10,padding:8}}, tooltip:{mode:'index',callbacks:{label:ctx=>`${ctx.dataset.label}: ${(ctx.raw||0).toFixed(1)}%`}} }

}

function buildTrendChart(periods, cat, m) {
  const ctx = document.getElementById('trendChart');
  if (!ctx) return;
  const labels = periods.map(p => p.label);

      { label:'8-Week Avg', data:avgs, type:'line', borderColor:'#0f172a', borderWidth:2, borderDash:[5,3], pointRadius:0, fill:false, tension:0.3, order:1 }
