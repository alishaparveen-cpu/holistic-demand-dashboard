<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clinic Scorecard · Allo Health</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--ink:#0f172a;--muted:#64748b;--dim:#94a3b8;--line:#e2e8f0;}
html,body{background:#f8fafc;color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;margin:0;}
.nav-link{font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border-radius:6px;}
.nav-link:hover{background:#f1f5f9;color:#0f172a;} .nav-link.active{font-weight:700;color:#0f172a;background:#f1f5f9;}
.nav-sep{color:#e2e8f0;font-size:14px;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(15,23,42,.05);margin-bottom:14px;}
.bh{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:2px;}
.bnum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;background:#eef2ff;color:#4338ca;font-weight:800;font-size:11px;flex:none;}
.bsub{font-size:11px;color:var(--muted);margin-bottom:11px;line-height:1.45;}
table.sc{width:100%;border-collapse:collapse;font-size:12px;}
table.sc th{background:#f8fafc;color:#64748b;font-weight:700;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;padding:6px 8px;text-align:right;border-bottom:2px solid var(--line);white-space:nowrap;}
table.sc th:first-child{text-align:left;}
table.sc td{padding:6px 8px;border-bottom:1px solid #f1f5f9;text-align:right;white-space:nowrap;}
table.sc td:first-child{text-align:left;font-weight:600;color:#334155;}
table.sc tr:hover td{background:#fafaff;}
.need{display:inline-block;font-size:9px;font-weight:700;color:#9a3412;background:#fff7ed;border:1px solid #fed7aa;border-radius:5px;padding:1px 6px;margin-left:5px;}
.flag{display:flex;align-items:center;gap:8px;font-size:12px;padding:8px 11px;border-radius:9px;margin-bottom:6px;line-height:1.4;}
.loading-msg{display:flex;align-items:center;justify-content:center;min-height:200px;color:var(--muted);}
select{font-size:13px;border:1.5px solid #4f46e5;border-radius:7px;padding:5px 10px;background:#fff;font-weight:600;color:#4338ca;cursor:pointer;}
</style>
</head>
<body class="min-h-screen">
<script>if(!sessionStorage.getItem("allo_dash_auth"))location.replace("index.html");</script>
<div style="max-width:1000px;margin:0 auto;padding:14px 18px 60px;">
  <nav style="display:flex;align-items:center;gap:2px;flex-wrap:wrap;margin-bottom:12px;">
    <a href="index.html" class="nav-link">← Dashboard</a><span class="nav-sep">|</span>
    <a href="diagnostic.html" class="nav-link">Diagnostic</a>
    <a href="marketing.html" class="nav-link">Marketing</a>
    <span class="nav-link active">Clinic Scorecard</span>
  </nav>
  <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px;">
    <h1 style="font-size:20px;font-weight:800;margin:0;">Clinic Scorecard</h1>
    <span style="font-size:10.5px;font-weight:700;color:#9a3412;background:#fff7ed;border:1px solid #fed7aa;border-radius:6px;padding:2px 9px;">PROTOTYPE · 1 clinic</span>
    <select id="clinicSel" onchange="CUR=this.value;render()"></select>
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:14px;">A city head reads top-down: <b>Did bookings drop?</b> → <b>which type?</b> → <b>where from?</b> → <b>did B2D drop, for whom?</b> → <b>are no-shows recovered?</b> Each block answers the next question.</div>
  <div id="main"><div class="loading-msg">Loading…</div></div>
</div>
<script>
let DIAG=null, SC=null, LEADS=null, CUR='Bangalore|Bellandur';
const WEEKS=["2026-05-25","2026-05-18","2026-05-11","2026-05-04","2026-04-27","2026-04-20","2026-04-13","2026-04-06","2026-03-30","2026-03-23","2026-03-16","2026-03-09"];
const DOWO=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const wkLabel=w=>{ const d=new Date(w+'T00:00:00'), e=new Date(d); e.setDate(d.getDate()+6); const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${d.getDate()} ${M[d.getMonth()]}–${e.getDate()} ${M[e.getMonth()]}`; };
const sum=a=>(a||[]).reduce((s,x)=>s+(+x||0),0);
function dispA(sc,f){ return (sc&&sc.disp&&sc.disp[f])?sc.disp[f]:Array(12).fill(0); }
function stat(arr){ const now=arr[0]||0, last=arr[1]||0, avg4=Math.round(sum(arr.slice(1,5))/4*10)/10, d=now-last, dp=last>0?Math.round(d/last*100):(now>0?100:0); return {now,last,avg4,d,dp}; }
const wowCell=s=>{ const col=s.d>0?'#059669':s.d<0?'#dc2626':'#94a3b8'; return `<span style="color:${col};font-weight:700;">${s.d>0?'+':''}${s.d} <span style="font-size:9px;">(${s.dp>0?'+':''}${s.dp}%)</span></span>`; };
function row(label, arr, sub){ const s=stat(arr); return `<tr><td>${label}${sub?`<div style="font-size:9px;color:#94a3b8;font-weight:400;">${sub}</div>`:''}</td><td>${s.now}</td><td>${s.last}</td><td>${s.avg4}</td><td>${wowCell(s)}</td></tr>`; }
function pct(n,d){ return d>0?Math.round(n/d*100):0; }
const b2dcol=p=>p>=70?'#059669':p>=50?'#d97706':'#dc2626';

function render(){
  const el=document.getElementById('main');
  const sc=SC[CUR]; if(!sc){ el.innerHTML='<div class="loading-msg">No scorecard data for this clinic.</div>'; return; }
  const lj=LEADS[CUR]||{}, W=0;
  const total=dispA(sc,'total'), nw=dispA(sc,'new_bk'), fu=dispA(sc,'followup_bk'), don=dispA(sc,'done'),
        dnew=dispA(sc,'done_new'), dfu=dispA(sc,'done_followup'), mis=dispA(sc,'missed'),
        rPat=dispA(sc,'resched_patient'), rNo=dispA(sc,'resched_noshow'), rec=dispA(sc,'recovered_done');
  const la=sc.leadage||{}, AG=['b0_same','b1_lastwk','b2_2to4wk','b3_1to3mo','b4_3moplus'];
  const ageW=AG.map(a=>(la[a]||[])[W]||0), ageTot=ageW.reduce((a,b)=>a+b,0);
  const b2d=pct(don[W],total[W]), nsRate=pct(mis[W],total[W]);
  const recBase=mis[W]||0, recd=(rNo[W]||0)+(rec[W]||0), recRate=recBase>0?Math.round(recd/recBase*100):null;
  // ── Block 6 flags ──
  const flags=[]; const newS=stat(nw);
  if(newS.dp<=-20) flags.push(['🔴','#fef2f2','#991b1b',`New bookings down <b>${newS.dp}%</b> WoW (${newS.last}→${newS.now})`]);
  if(b2d<70) flags.push(['🔴','#fef2f2','#991b1b',`B2D% is <b>${b2d}%</b> — below the 70% bar`]);
  if(nsRate>30) flags.push(['🔴','#fef2f2','#991b1b',`No-show rate <b>${nsRate}%</b> — above 30%`]);
  if(recRate!=null && recRate<50 && recBase>=3) flags.push(['🟡','#fffbeb','#92400e',`No-show recovery only <b>${recRate}%</b> — calling team not working it`]);
  if(((lj.gmb||[])[W]||0)===0) flags.push(['🟡','#fffbeb','#92400e',`Zero GMB leads this week`]);
  if(ageTot>0 && (ageW[3]+ageW[4])===0 && sum(AG.slice(3).map(a=>sum((la[a]||[]).slice(1,6))))>0) flags.push(['🟡','#fffbeb','#92400e',`No bookings from 1mo+ old leads — old pipeline not being worked`]);
  if(recRate!=null && recRate>=70) flags.push(['🟢','#f0fdf4','#166534',`No-show recovery strong at <b>${recRate}%</b> — good ops`]);
  if(b2d>=85) flags.push(['🟢','#f0fdf4','#166534',`B2D% strong at <b>${b2d}%</b>`]);
  const flagBlock = flags.length ? `<div class="card">${flags.map(f=>`<div class="flag" style="background:${f[1]};color:${f[2]};">${f[0]} ${f[3]}</div>`).join('')}</div>`
    : `<div class="card"><div class="flag" style="background:#f0fdf4;color:#166534;">🟢 No red/amber flags this week.</div></div>`;
  // ── Block 1 ──
  const b1=`<div class="card"><div class="bh"><span class="bnum">1</span>Bookings overview</div>
    <div class="bsub">Did bookings drop — and which <b>type</b>? Patient-requested reschedules are demand; no-show-recycled reschedules are a quality failure being recycled. <span style="color:#94a3b8;">Appointment-event basis.</span></div>
    <table class="sc"><thead><tr><th>Metric</th><th>This wk</th><th>Last wk</th><th>4-wk avg</th><th>WoW △</th></tr></thead><tbody>
      ${row('Total bookings', total)}
      ${row('New (first-time)', nw)}
      ${row('Follow-up (returning)', fu)}
      ${row('Rescheduled — patient-requested', rPat,'demand signal')}
      ${row('Rescheduled — no-show recycled', rNo,'quality failure recycled')}
    </tbody></table></div>`;
  // ── Block 2 ──
  const ageRow=(lab,v,sub)=>`<tr><td>${lab}${sub?`<div style="font-size:9px;color:#94a3b8;">${sub}</div>`:''}</td><td>${v}</td><td>${ageTot>0?Math.round(v/ageTot*100):0}%</td></tr>`;
  const untraced=Math.max(0,(total[W]||0)-ageTot);
  const b2=`<div class="card"><div class="bh"><span class="bnum">2</span>Bookings by lead age <span style="font-size:10px;font-weight:600;color:#94a3b8;">(lead-traced subset)</span></div>
    <div class="bsub">Is the drop a <b>demand</b> problem (fresh leads) or a <b>reactivation</b> problem (old pipeline)? · <b>${ageTot}</b> of this week's <b>${total[W]||0}</b> bookings could be matched to a tracked lead. <span style="color:#b45309;">⚠️ The other ~${untraced} (follow-ups, walk-in, direct, untracked) aren't in the lead-attribution table — so this <b>won't equal Block 1's new bookings</b>, and it counts follow-ups by their original lead's age.</span></div>
    <table class="sc"><thead><tr><th>Lead age</th><th>Bookings</th><th>% of traced</th></tr></thead><tbody>
      ${ageRow('Lead created this week', ageW[0],'fresh demand')}
      ${ageRow('Lead created last week', ageW[1],'7–14 days')}
      ${ageRow('Lead created 2–4 weeks ago', ageW[2])}
      ${ageRow('Lead created 1–3 months ago', ageW[3],'reactivation')}
      ${ageRow('Lead created 3+ months ago', ageW[4],'deep backlog')}
    </tbody></table></div>`;
  // ── Block 3 — channel: leads (data_leads) vs bookings (source-attributed) ──
  const CH=[['Google (Ads+GMB)',['gmb','google_ad'],['google']],['Organic',['organic'],['organic']],['Meta / FB',['fb'],['fb','instagram']],['JustDial',['justdial'],['justdial']],['Other / Direct',['others'],['others','newspaper','youtube','(none)']]];
  const chRow=([lab,lk,bk])=>{ const lead=lk.reduce((s,k)=>s+((lj[k]||[])[W]||0),0); const book=bk.reduce((s,k)=>s+(((sc.channel||{})[k]||[])[W]||0),0);
    const c2b=lead>0?Math.round(book/lead*100):null; const ld1=lk.reduce((s,k)=>s+((lj[k]||[])[1]||0),0); const dwow=lead-ld1;
    return `<tr><td>${lab}</td><td>${lead}</td><td>${book}</td><td>${c2b==null?'—':(c2b>100?'<span style="color:#94a3b8" title="bookings counted on a different basis than leads">'+c2b+'%*</span>':c2b+'%')}</td><td style="color:${dwow>0?'#059669':dwow<0?'#dc2626':'#94a3b8'};">${dwow>0?'+':''}${dwow}</td></tr>`; };
  const b3=`<div class="card" style="border-color:#fed7aa;"><div class="bh"><span class="bnum">3</span>Bookings by channel <span style="font-size:10px;font-weight:600;color:#b45309;">⚠️ C2B unreliable</span></div>
    <div class="bsub" style="color:#b45309;">⚠️ <b>Read C2B with caution:</b> leads come from one table and bookings from another, with different channel taxonomy — so C2B can read far above 100% (e.g. organic). Treat the <b>Leads</b> and <b>Bookings</b> columns as separate volume signals, not a clean ratio, until channel attribution is unified.</div>
    <table class="sc"><thead><tr><th>Channel</th><th>Leads</th><th>Bookings</th><th>C2B%</th><th>Leads WoW</th></tr></thead><tbody>${CH.map(chRow).join('')}</tbody></table></div>`;
  // ── Block 4 — B2D by booking type ──
  const b2dRow=(lab,bk,dn)=>`<tr><td>${lab}</td><td>${bk}</td><td>${dn}</td><td><b style="color:${b2dcol(pct(dn,bk))}">${pct(dn,bk)}%</b></td></tr>`;
  const b4=`<div class="card"><div class="bh"><span class="bnum">4</span>Book→Done (B2D) by booking type</div>
    <div class="bsub">If overall B2D dropped, <b>which patient type</b> stopped showing? No-show-recycled usually has the lowest B2D — rising volume there drags the average without a real quality problem.</div>
    <table class="sc"><thead><tr><th>Booking type</th><th>Booked</th><th>Done</th><th>B2D%</th></tr></thead><tbody>
      ${b2dRow('New first-time', nw[W]||0, dnew[W]||0)}
      ${b2dRow('Follow-up (returning)', fu[W]||0, dfu[W]||0)}
      <tr><td colspan="4" style="text-align:left;font-size:10px;color:#94a3b8;">Rescheduled appointments transition to a new slot, so their completion shows under New/Follow-up above (not double-counted).</td></tr>
    </tbody></table></div>`;
  // ── Block 5 — no-show & recovery ──
  const b5=`<div class="card"><div class="bh"><span class="bnum">5</span>No-show &amp; recovery</div>
    <div class="bsub">Are no-shows being <b>recovered</b>? High recovery = not a crisis, just volume. Low = calling team isn't working it. <span style="color:#94a3b8;">Recovery = no-show that was rescheduled or later completed (via status history). "Called back" needs a call-log source.</span></div>
    <table class="sc"><thead><tr><th>Metric</th><th>This wk</th><th>Last wk</th><th>4-wk avg</th><th>WoW △</th></tr></thead><tbody>
      ${row('Total no-shows', mis)}
      ${row('No-show → rescheduled', rNo)}
      ${row('No-show → completed (recovered)', rec)}
      <tr><td>Recovery rate</td><td colspan="3" style="text-align:left;"><b style="color:${recRate==null?'#94a3b8':recRate>=70?'#059669':recRate>=50?'#d97706':'#dc2626'}">${recRate==null?'—':recRate+'%'}</b> <span style="font-size:9px;color:#94a3b8;">(rescheduled + completed) ÷ no-shows</span></td><td></td></tr>
    </tbody></table></div>`;
  // ── Day of week ──
  const dow=sc.dow||{}; const dowMaxNs=Math.max(...DOWO.map(d=>pct((dow[d]||{}).missed,(dow[d]||{}).booked)),0);
  const dowRows=DOWO.map(d=>{ const x=dow[d]||{booked:0,done:0,missed:0}; const bd=pct(x.done,x.booked), ns=pct(x.missed,x.booked); const worst=ns===dowMaxNs&&ns>0;
    return `<tr${worst?' style="background:#fef2f2;"':''}><td>${d}${worst?' <span style="font-size:9px;color:#dc2626;font-weight:700;">worst no-show</span>':''}</td><td>${x.booked}</td><td><b style="color:${b2dcol(bd)}">${bd}%</b></td><td><b style="color:${ns>=30?'#dc2626':ns>=20?'#d97706':'#64748b'}">${ns}%</b></td></tr>`; }).join('');
  const bDow=`<div class="card"><div class="bh"><span class="bnum">+</span>Day-of-week B2D &amp; no-show <span style="font-size:10px;font-weight:600;color:#94a3b8;">(last ~8 weeks)</span></div>
    <div class="bsub">A consistent bad day (e.g. Mon AM, Sun PM) is an <b>ops</b> fix — doctor availability or patient behaviour — not a demand problem.</div>
    <table class="sc"><thead><tr><th>Day</th><th>Booked</th><th>B2D%</th><th>No-show%</th></tr></thead><tbody>${dowRows}</tbody></table></div>`;

  el.innerHTML=`<div style="font-size:11px;color:#94a3b8;margin-bottom:10px;">${CUR.split('|')[1]}, ${CUR.split('|')[0]} · week ${wkLabel(WEEKS[0])} (vs prior &amp; 4-wk avg)</div>
    ${flagBlock}${b1}${b2}${b3}${b4}${b5}${bDow}
    <div class="card" style="background:#fffbeb;border-color:#fde68a;"><div class="bh" style="color:#92400e;">📐 Data basis &amp; honest caveats</div>
      <div style="font-size:11.5px;color:#475569;line-height:1.7;">This view combines <b>two source systems that don't fully reconcile</b> — read each block knowing which:
      <table style="width:100%;border-collapse:collapse;font-size:11px;margin:8px 0;">
        <tr style="border-bottom:1px solid #fde68a;"><td style="padding:4px 6px;font-weight:700;">✅ Reliable</td><td style="padding:4px 6px;">Blocks <b>1, 4</b> &amp; <b>Day-of-week</b> — all from the <b>appointments</b> system (one source). The reschedule split uses <code>previous_status</code> (last transition).</td></tr>
        <tr style="border-bottom:1px solid #fde68a;"><td style="padding:4px 6px;font-weight:700;color:#b45309;">⚠️ Subset</td><td style="padding:4px 6px;"><b>Block 2</b> (lead age) — only bookings matched to a <b>tracked lead</b> in a separate attribution table, so it's <b>lower</b> than Block 1's bookings (walk-in/direct/untracked excluded) and includes follow-ups by their original lead's age.</td></tr>
        <tr style="border-bottom:1px solid #fde68a;"><td style="padding:4px 6px;font-weight:700;color:#dc2626;">⚠️ Weak</td><td style="padding:4px 6px;"><b>Block 3</b> C2B% — leads and bookings come from different tables with mismatched channel names, so the ratio is unreliable (can exceed 100%). Volume columns are still usable.</td></tr>
        <tr><td style="padding:4px 6px;font-weight:700;color:#d97706;">⚠️ Undercount</td><td style="padding:4px 6px;"><b>Block 5</b> recovery — inferred from status history (no call-log). <code>previous_status</code> only sees the <b>immediately</b> prior state, so no-show→rescheduled→completed journeys are missed. Recovery is understated; "called back" needs a call-log source.</td></tr>
      </table>
      <span style="color:#94a3b8;">Also: appointment-<b>event</b> basis (each reschedule is an event), so totals run higher than the diagnostic's distinct-booking counts. To fully fix Blocks 2–3 &amp; 5, eng needs to unify lead→booking attribution onto the appointments table and add a call-log feed.</span></div></div>`;
}
(async()=>{
  try{
    const safe=u=>fetch(u,{cache:'no-store'}).then(r=>r.ok?r.json():null).catch(()=>null);
    [DIAG,SC,LEADS]=await Promise.all([safe('data_diagnostic.json'),safe('data_scorecard.json'),safe('data_leads.json')]);
    if(!SC) throw new Error('data_scorecard.json not found — run scripts/build_scorecard.py');
    const sel=document.getElementById('clinicSel');
    const keys=Object.keys(SC).filter(k=>k!=='_meta').sort();
    sel.innerHTML=keys.map(k=>`<option value="${k}" ${k===CUR?'selected':''}>${k.replace('|',' · ')}</option>`).join('');
    if(!SC[CUR]){ CUR=keys[0]; sel.value=CUR; }
    render();
  }catch(e){ document.getElementById('main').innerHTML='<div class="loading-msg" style="color:#dc2626">'+e.message+'</div>'; }
})();
</script>
</body>
</html>
