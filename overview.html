<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Overall Demand · Allo Health</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="sparkzoom.js"></script>
<style>
:root{
  --ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --red:#ef4444;--amber:#f59e0b;--green:#10b981;
}
html,body{background:#f8fafc;color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;margin:0;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(15,23,42,.05);}
/* KPI cards */
.kpi-card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:18px 20px;box-shadow:0 1px 2px rgba(15,23,42,.04);position:relative;overflow:hidden;}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-size:26px;font-weight:700;color:var(--ink);line-height:1.1;margin-bottom:4px;}
.kpi-wow{font-size:11px;margin-bottom:3px;}
.kpi-avg{font-size:11px;}
.wow-up{color:#059669;} .wow-dn{color:#dc2626;} .wow-flat{color:#94a3b8;}
/* Beat/Miss chip */
.beat{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#ecfdf5;color:#065f46;}
.miss{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#fef2f2;color:#991b1b;}
.flat{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#f1f5f9;color:#475569;}
/* Toggle */
.toggle-btn{padding:4px 12px;font-size:12px;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:#fff;color:var(--ink);transition:all .12s;}
.toggle-btn.active{background:#0f172a;color:#fff;border-color:#0f172a;}
/* Table */
.tbl{width:100%;border-collapse:separate;border-spacing:0;}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;position:sticky;top:0;}
.tbl th.r{text-align:right;}
.tbl td{padding:8px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#f8fafc;}
.cell-r{text-align:right;}
.val-main{font-weight:600;display:block;}
.val-sub{font-size:10px;display:block;margin-top:1px;}
/* Tier badge */
.t1b{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#ede9fe;color:#6d28d9;}
.t2b{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#e0f2fe;color:#0369a1;}
/* Nav */
.nav-link{font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border-radius:6px;transition:background .12s;}
.nav-link:hover{background:#f1f5f9;color:#0f172a;}
.nav-link.active{font-weight:700;color:#0f172a;background:#f1f5f9;}
/* Section header */
.sec-hdr{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.sec-sub{font-size:11px;color:var(--muted);}
/* Beat bar (week-by-week) */
.wk-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;}
.wk-row:last-child{border-bottom:none;}
.wk-label{font-size:11px;color:#64748b;width:80px;flex-shrink:0;}
.wk-bar-wrap{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;}
.wk-bar{height:100%;border-radius:4px;transition:width .4s;}
.wk-val{font-size:11px;font-weight:600;width:40px;text-align:right;flex-shrink:0;}
.wk-chip{width:46px;flex-shrink:0;}
/* Loading */
.loading{text-align:center;padding:60px;color:var(--muted);}
/* Category dot */
.cat-dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0;}
</style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<div style="background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;">
  <div style="max-width:1280px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
    <a href="index.html"      class="nav-link">← Dashboard</a>
    <span style="color:#e2e8f0;">|</span>
    <span class="nav-link active">Overview</span>
    <a href="diagnostic.html" class="nav-link">Diagnostic</a>
    <a href="category.html"   class="nav-link">Category</a>
    <a href="city.html"       class="nav-link">City</a>
    <a href="clinic.html"     class="nav-link">Clinics</a>
    <a href="efficiency.html" class="nav-link">Efficiency</a>
    <a href="comparison.html" class="nav-link">Comparison →</a>

    <!-- controls on the right -->
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <!-- Scope -->
      <div style="display:flex;gap:3px;">
        <button class="toggle-btn active" id="sAll"     onclick="setScope('all')">All</button>
        <button class="toggle-btn"        id="sOffline" onclick="setScope('offline')">Offline</button>
        <button class="toggle-btn"        id="sOnline"  onclick="setScope('online')">Online</button>
      </div>
      <!-- Tier -->
      <div style="display:flex;gap:3px;">
        <button class="toggle-btn active" id="tAll" onclick="setTier('ALL')">All Cities</button>
        <button class="toggle-btn"        id="tT1"  onclick="setTier('T1')">T1</button>
        <button class="toggle-btn"        id="tT2"  onclick="setTier('T2')">T2</button>
      </div>
      <!-- Metric -->
      <div style="display:flex;gap:3px;">
        <button class="toggle-btn active" id="mCalls"    onclick="setMet('calls_done')">Calls</button>
        <button class="toggle-btn"        id="mBookings" onclick="setMet('new_bookings')">Bookings</button>
        <button class="toggle-btn"        id="mLeads"    onclick="setMet('total_leads')">Leads</button>
      </div>
      <!-- Week -->
      <select id="weekSel" onchange="setWeek(this.value)"
        style="padding:5px 10px;border:1px solid var(--line);border-radius:7px;font-size:12px;background:#fff;cursor:pointer;min-width:160px;">
      </select>
    </div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div style="max-width:1280px;margin:0 auto;padding:20px;" id="root">
  <div class="loading">Loading demand data…</div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const CITY_TIERS = {
  T1: ['Bangalore','Mumbai','Pune','Hyderabad','Chennai'],
  T2: ['Navi Mumbai','Coimbatore','Nagpur','Ranchi','Jaipur','Ahmedabad',
       'Surat','Nashik','Aurangabad','Hubli','Mysuru','Mangaluru',
       'Bhopal','Visakhapatnam','Thane','Gandhinagar','Vijayawada'],
};
function cityTier(c) {
  return CITY_TIERS.T1.includes(c) ? 'T1' : CITY_TIERS.T2.includes(c) ? 'T2' : null;
}

const CAT_COLORS = {
  'STI':   '#6366f1', 'ED+':   '#10b981', 'PE+':   '#f59e0b',
  'ED+PE+':'#3b82f6', 'NSSD':  '#ec4899', 'oth':   '#94a3b8',
};
const CAT_LABELS = { 'STI':'STI', 'ED+':'ED+', 'PE+':'PE+', 'ED+PE+':'ED+PE+', 'NSSD':'NSSD', 'oth':'Other' };

const CH_COLORS = {
  GMB:'#34A853', Google:'#4285F4', Practo:'#6B4EFF',
  Organic:'#10b981', Meta:'#1877F2', Others:'#94a3b8',
};

// Sheet for GMB Leads (same demand-tracker sheet as diagnostic tab)
const OV_SHEET_ID   = '1bZWGVKu6b4EFPDt3aKHn21gYjdhN1aT1-LT60BFe8g0';
const OV_SHEET_URL  = `https://docs.google.com/spreadsheets/d/${OV_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Booking%20and%20Leads%20trend%20summary`;
// Week keys matching data.json, newest-first (7 weeks covered by the sheet)
const OV_SHEET_WEEKS = ['2026-05-18','2026-05-11','2026-05-04','2026-04-27','2026-04-20','2026-04-13','2026-04-06'];
const OV_GMB_C = 27; // 0-indexed column start for GMB leads (7 weeks newest→oldest)

// L0 sheet — for total leads (shared cache with efficiency tab)
const L0_ID        = '1jyyFYpd7gfYyAQ3U7E56c7OA3OuQQAVgJrAGyQr90XM';
const L0_CSV_URL   = `https://docs.google.com/spreadsheets/d/${L0_ID}/gviz/tq?tqx=out:csv&sheet=L0`;
const L0_CACHE_KEY = 'allo_eff_l0_v2';
const L0_CACHE_TTL = 45 * 60 * 1000;
const L0_WK_KEYS   = ['2026-05-18','2026-05-11','2026-05-04','2026-04-27','2026-04-20','2026-04-13','2026-04-06'];
const L0_WK_COLS   = [3,4,5,6,7,8,9]; // 0-indexed columns in L0 CSV

// ── STATE ─────────────────────────────────────────────────────────────────
let JDATA      = null;
let ALL_WEEKS  = []; // newest-first week keys
let WK_LABELS  = {}; // wkKey → label string
let dataScope  = 'all';
let activeTier = 'ALL';
let activeWkIdx = 0;  // index into ALL_WEEKS (0 = newest)
let activeMet  = 'calls_done'; // 'calls_done' | 'new_bookings' | 'total_leads'
let GMB_LEADS_BY_CITY = {};    // weekKey → city → GMB leads (loaded from OV sheet)
let TOTAL_LEADS_WK    = {};    // weekKey → total leads (loaded from L0 sheet)
let charts     = {};

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmtN(v) {
  if (v == null) return '—';
  return Math.round(v).toLocaleString();
}
function fmtPct(v, dec=1) {
  if (v == null) return '—';
  return v.toFixed(dec) + '%';
}
function fmtINR(v) {
  if (v == null) return '—';
  if (v >= 100000) return '₹' + (v/100000).toFixed(1) + 'L';
  if (v >= 1000)   return '₹' + (v/1000).toFixed(0) + 'K';
  return '₹' + Math.round(v);
}

// WoW % change
function wowPct(cur, prev) {
  if (cur == null || prev == null || prev === 0) return null;
  return (cur - prev) / Math.abs(prev) * 100;
}
// Percentage-point change (for rates)
function wowPp(cur, prev) {
  if (cur == null || prev == null) return null;
  return cur - prev;
}

function wowHtml(pct, inverted=false) {
  if (pct === null) return '<span class="wow-flat">—</span>';
  const up = pct > 0;
  const isGood = inverted ? !up : up;
  const cls = Math.abs(pct) < 1 ? 'wow-flat' : isGood ? 'wow-up' : 'wow-dn';
  return `<span class="${cls}">${up?'▲':'▼'} ${Math.abs(pct).toFixed(1)}%</span>`;
}
function ppHtml(pp, inverted=false) {
  if (pp === null) return '<span class="wow-flat">—</span>';
  const up = pp > 0;
  const isGood = inverted ? !up : up;
  const cls = Math.abs(pp) < 0.3 ? 'wow-flat' : isGood ? 'wow-up' : 'wow-dn';
  const sign = pp >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${pp.toFixed(1)}pp</span>`;
}

// 8-week average of an array (all_weeks-indexed newest-first), starting from fromIdx+1
function avg8(arr, fromIdx) {
  const vals = arr.slice(fromIdx + 1, fromIdx + 9).filter(v => v != null && !isNaN(v));
  if (!vals.length) return null;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

// vs-average chip
function vsAvgHtml(cur, avgVal, isRate=false) {
  if (cur == null || avgVal == null || avgVal === 0) return '';
  const diff = isRate ? (cur - avgVal) : (cur - avgVal) / avgVal * 100;
  const isGood = diff > 0;
  const abs = Math.abs(diff);
  if (abs < (isRate ? 0.3 : 1.5)) return `<span class="flat">→ avg</span>`;
  const label = isRate
    ? `${diff >= 0 ? '+' : ''}${diff.toFixed(1)}pp vs avg`
    : `${diff >= 0 ? '+' : ''}${diff.toFixed(0)}% vs avg`;
  return isGood
    ? `<span class="beat">${label}</span>`
    : `<span class="miss">${label}</span>`;
}

// SVG sparkline
function spark(vals, color='#6366f1', w=80, h=22, _fill, opts={}) {
  const v = (vals||[]).filter(x => x != null);
  const safeVals   = JSON.stringify(vals||[]).replace(/'/g,'&#39;');
  const safeLabels = (opts.labels?JSON.stringify(opts.labels):'null').replace(/'/g,'&#39;');
  const safeTitle  = (opts.title||'').replace(/"/g,'&quot;');
  const datAttrs   = `data-sparkvals='${safeVals}' data-sparklabels='${safeLabels}' data-sparkcolor='${color}' data-sparktitle="${safeTitle}" data-sparkfmt='${opts.fmt||''}'`;
  if (v.length < 2) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;"></svg></div>`;
  const mn = Math.min(...v), mx = Math.max(...v);
  const range = mx - mn || 1;
  const n = vals.length;
  const pts = [];
  (vals||[]).forEach((val, i) => {
    if (val == null) return;
    const x = ((i / (n - 1)) * (w - 4) + 2).toFixed(1);
    const y = (h - 2 - ((val - mn) / range) * (h - 4)).toFixed(1);
    pts.push(`${x},${y}`);
  });
  if (pts.length < 2) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;"></svg></div>`;
  const poly = pts.join(' ');
  const [fx] = pts[0].split(',');
  const [lx, ly] = pts[pts.length - 1].split(',');
  return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;overflow:visible;">
    <polygon points="${fx},${h} ${poly} ${lx},${h}" fill="${color}20" stroke="none"/>
    <polyline points="${poly}" stroke="${color}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/>
  </svg></div>`;
}

// ── DATA ACCESSORS ────────────────────────────────────────────────────────
function funnel(wkKey) {
  // When a tier is selected (and not online scope), aggregate from per-city data
  // so KPI cards, beat/miss, and trend chart all reflect the selected tier.
  if (activeTier !== 'ALL' && dataScope !== 'online') {
    const tierCities = CITY_TIERS[activeTier] || [];
    let calls=0, gross=0, noShow=0, newBk=0, n=0;
    for (const city of tierCities) {
      const d = JDATA?.[dataScope]?.weekly_city?.[wkKey]?.[city];
      if (!d) continue;
      calls  += d.calls_done || 0;
      gross  += d.gross      || 0;
      noShow += d.no_show    || 0;
      newBk  += d.gross      || 0; // weekly_city has no new_bookings; gross ≈ new_bookings (within ~1%)
      n++;
    }
    if (n > 0) return {
      calls_done:   calls,
      gross,
      no_show:      noShow,
      new_bookings: newBk,
      b2d_pct:      gross > 0 ? calls / gross * 100 : null,
      ns_pct:       gross > 0 ? noShow / gross * 100 : null,
      label: JDATA?.[dataScope]?.weekly_funnel?.[wkKey]?.label,
    };
  }
  return JDATA?.[dataScope]?.weekly_funnel?.[wkKey] || {};
}
function chanData(wkKey, ch) {
  return JDATA?.[dataScope]?.weekly_channel?.[wkKey]?.[ch] || {};
}
function cityData(wkKey, city) {
  return JDATA?.[dataScope]?.weekly_city?.[wkKey]?.[city] || {};
}
function catData(wkKey) {
  return JDATA?.all?.weekly_total?.[wkKey]?.by_cat || {};
}

// All weeks array for a funnel metric (newest-first)
function funnelArr(metric) {
  return ALL_WEEKS.map(wk => funnel(wk)[metric] ?? null);
}
function chanArr(ch, metric) {
  return ALL_WEEKS.map(wk => chanData(wk, ch)[metric] ?? null);
}
function cityArr(city, metric) {
  return ALL_WEEKS.map(wk => cityData(wk, city)[metric] ?? null);
}

// ── TOTAL LEADS FROM L0 (shared cache with efficiency tab) ────────────────
async function loadTotalLeads() {
  try {
    let text = null;
    // Re-use the efficiency tab's L0 cache if available — zero extra cost
    const cached = localStorage.getItem(L0_CACHE_KEY);
    if (cached) {
      const { ts, text: t } = JSON.parse(cached);
      if (Date.now() - ts < L0_CACHE_TTL) text = t;
    }
    if (!text) {
      const res = await fetch(L0_CSV_URL);
      if (!res.ok) return;
      text = await res.text();
      try { localStorage.setItem(L0_CACHE_KEY, JSON.stringify({ ts: Date.now(), text })); } catch(e) {}
    }
    // Minimal CSV parse — just need row 4 (overall total leads, 0-indexed)
    const rows = [];
    for (const line of text.split('\n')) {
      if (!line.trim()) continue;
      const row = []; let cur = '', inQ = false;
      for (const c of line) {
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      row.push(cur.trim());
      rows.push(row);
    }
    const leadsRow = rows[4]; // overall leads
    if (!leadsRow) return;
    L0_WK_COLS.forEach((col, i) => {
      const wk  = L0_WK_KEYS[i];
      const raw = (leadsRow[col] || '').replace(/[^\d.]/g, '');
      const v   = parseFloat(raw);
      if (!isNaN(v) && v > 0) TOTAL_LEADS_WK[wk] = v;
    });
  } catch(e) {}
}

// ── GMB LEADS HELPERS ─────────────────────────────────────────────────────
function parseCSVSimple(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const row = []; let inQ = false, cell = '';
    for (const c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cell.trim()); cell = ''; }
      else { cell += c; }
    }
    row.push(cell.trim());
    rows.push(row);
  }
  return rows;
}
function parseGmbLeads(text) {
  const rows = parseCSVSimple(text);
  const out = {}; // weekKey → city → total
  let curCity = '';
  for (let ri = 3; ri < rows.length; ri++) {
    const r = rows[ri];
    if (!r || r.length < OV_GMB_C + 7) continue;
    const c0 = r[0]||'', c1 = r[1]||'', c2 = r[2]||'', c3 = r[3]||'';
    if (c1 && !c1.startsWith('<>')) curCity = c1;
    if (c0 && !c0.startsWith('<>')) curCity = c0;
    if (!curCity || c2 === '<>All' || c2 === '<>ALL' || c3 === '<>All') continue;
    if (!c2) continue;
    for (let wi = 0; wi < OV_SHEET_WEEKS.length; wi++) {
      const wk = OV_SHEET_WEEKS[wi];
      const v = parseInt((r[OV_GMB_C+wi]||'').replace(/[^\d]/g,''), 10);
      if (!isNaN(v) && v > 0) {
        if (!out[wk]) out[wk] = {};
        out[wk][curCity] = (out[wk][curCity] || 0) + v;
      }
    }
  }
  return out;
}
function leadsVal(wkKey) {
  const byCity = GMB_LEADS_BY_CITY[wkKey];
  if (!byCity) return null;
  if (activeTier === 'ALL') {
    const t = Object.values(byCity).reduce((s, v) => s + v, 0);
    return t || null;
  }
  const cities = CITY_TIERS[activeTier] || [];
  const t = cities.reduce((s, c) => s + (byCity[c] || 0), 0);
  return t || null;
}
function leadsArr() { return ALL_WEEKS.map(wk => leadsVal(wk)); }
function metLabel(met) {
  return { calls_done:'Calls Done', new_bookings:'New Bookings', total_leads:'Total Leads', gmb_leads:'GMB Leads' }[met] || met;
}
function metArr(met) {
  if (met === 'total_leads') return ALL_WEEKS.map(wk => TOTAL_LEADS_WK[wk] ?? null);
  if (met === 'gmb_leads')   return leadsArr();
  return funnelArr(met);
}

// ── BUILD KPI STRIP ────────────────────────────────────────────────────────
function buildKPIStrip() {
  const wk    = ALL_WEEKS[activeWkIdx];
  const wkPrv = ALL_WEEKS[activeWkIdx + 1];
  const f     = funnel(wk);
  const fPrv  = wkPrv ? funnel(wkPrv) : {};

  // Pre-compute 8wk avg arrays
  const cdArr  = funnelArr('calls_done');
  const nbArr  = funnelArr('new_bookings');
  const grArr  = funnelArr('gross');
  const b2dArr = funnelArr('b2d_pct');
  const nsArr  = funnelArr('ns_pct');

  function kpiCard(label, curVal, prevVal, avgVal, fmt, isRate=false, inverted=false) {
    const val    = curVal != null ? fmt(curVal) : '—';
    const wow    = isRate ? ppHtml(wowPp(curVal, prevVal), inverted) : wowHtml(wowPct(curVal, prevVal), inverted);
    const vsAvg  = vsAvgHtml(curVal, avgVal, isRate);
    const avgStr = avgVal != null ? `8wk avg: ${fmt(avgVal)}` : '';

    // Color accent based on beat/miss
    let accent = '';
    if (avgVal != null && curVal != null) {
      const diff = isRate ? (curVal - avgVal) : (curVal - avgVal)/avgVal*100;
      if (!inverted && diff > 2 || inverted && diff < -2) accent = 'border-left:3px solid #10b981;';
      else if (!inverted && diff < -2 || inverted && diff > 2) accent = 'border-left:3px solid #ef4444;';
    }

    return `<div class="kpi-card" style="${accent}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-val">${val}</div>
      <div class="kpi-wow">${wow} <span style="color:#94a3b8;font-size:10px;">WoW</span></div>
      <div class="kpi-avg">${vsAvg} <span style="color:#94a3b8;font-size:10px;">${avgStr}</span></div>
    </div>`;
  }

  return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;">
    ${kpiCard('Calls Done',    f.calls_done,   fPrv.calls_done,   avg8(cdArr,  activeWkIdx), fmtN)}
    ${kpiCard('New Bookings',  f.new_bookings, fPrv.new_bookings, avg8(nbArr,  activeWkIdx), fmtN)}
    ${kpiCard('Gross Bookings',f.gross,        fPrv.gross,        avg8(grArr,  activeWkIdx), fmtN)}
    ${kpiCard('B2D %',         f.b2d_pct,      fPrv.b2d_pct,      avg8(b2dArr, activeWkIdx), fmtPct, true)}
    ${kpiCard('No Show %',     f.ns_pct,       fPrv.ns_pct,       avg8(nsArr,  activeWkIdx), fmtPct, true, true)}
  </div>`;
}

// ── BUILD 12-WEEK TREND CHART ──────────────────────────────────────────────
function buildTrendChart() {
  // Chronological (oldest → newest) labels
  const labels = [...ALL_WEEKS].reverse().map(wk => {
    const lbl = JDATA?.[dataScope]?.weekly_funnel?.[wk]?.label || wk;
    return lbl.replace(' - ', '\n').replace(/\d{4}/,'').trim();
  });
  const cdChron   = funnelArr('calls_done').slice().reverse();
  const nbChron   = funnelArr('new_bookings').slice().reverse();

  // 8wk avg at activeWkIdx
  const avg8cd = avg8(funnelArr('calls_done'), activeWkIdx);

  // Highlight selected week (convert activeWkIdx from newest-first to oldest-first position)
  const selPosInChron = ALL_WEEKS.length - 1 - activeWkIdx;

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
      <div>
        <div class="sec-hdr">12-Week Demand Trend</div>

      </div>

        ${activeMet==='calls_done'?`<span style="display:flex;align-items:center;gap:5px;"><span style="width:14px;height:2.5px;background:#10b981;display:inline-block;border-radius:2px;border-style:dashed;border-width:0 0 2px 0;"></span>New Bookings</span>`:''}
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:14px;height:2px;background:#f59e0b;display:inline-block;border-radius:2px;border-style:dashed;"></span>8wk avg</span>

  const cdChron  = metArr(activeMet).slice().reverse();

// ── BUILD BEAT/MISS HISTORY ───────────────────────────────────────────────
function buildBeatMissHistory() {
  const cdArr    = metArr(activeMet);
  const allValid = cdArr.filter(v => v != null);
  const maxVal   = Math.max(...allValid, 1);

  const rows = ALL_WEEKS.slice(0, 9).map((wk, i) => {
    const val    = cdArr[i];
    const avgVal = avg8(cdArr, i);
    const lbl    = (JDATA?.[dataScope]?.weekly_funnel?.[wk]?.label || wk)
                   .replace(/\d{4}/,'').replace(' - ', ' – ').trim();
    const isSelected = i === activeWkIdx;
    const barW = val != null ? Math.round((val / maxVal) * 100) : 0;

    let chip = '';
    if (val != null && avgVal != null) {
      const diff = (val - avgVal) / avgVal * 100;
      chip = diff > 3  ? `<span class="beat">▲ beat</span>`
           : diff < -3 ? `<span class="miss">▼ miss</span>`
           :              `<span class="flat">→ avg</span>`;
    }
    const barColor = isSelected ? '#6366f1'
      : (val != null && avgVal != null && val > avgVal) ? '#10b981'
      : (val != null && avgVal != null && val < avgVal) ? '#ef4444'
      : '#cbd5e1';

    return `<div class="wk-row" style="${isSelected ? 'background:#f5f3ff;margin:0 -8px;padding:6px 8px;border-radius:6px;' : ''}">
      <div class="wk-label" style="font-weight:${isSelected?700:400};">${lbl}</div>
      <div class="wk-bar-wrap">
        <div class="wk-bar" style="width:${barW}%;background:${barColor};"></div>
      </div>
      <div class="wk-val" style="color:${isSelected?'#6366f1':'var(--ink)'};">${val != null ? fmtN(val) : '—'}</div>
      <div class="wk-chip">${chip}</div>
    </div>`;
  }).join('');

  return `<div class="card" style="padding:16px 20px;">
    <div class="sec-hdr" style="margin-bottom:2px;">Beat/Miss vs 8wk Avg</div>
    <div class="sec-sub" style="margin-bottom:12px;">${metLabel(activeMet)} · last 9 weeks · highlighted = selected week</div>
    ${rows}
    <div style="margin-top:10px;font-size:10px;color:#94a3b8;">
      Bar width = relative to max week · beat/miss = ±3% from rolling 8wk average
    </div>
  </div>`;
}

// ── BUILD CATEGORY MIX ────────────────────────────────────────────────────
function buildCategoryMix() {
  const wk      = ALL_WEEKS[activeWkIdx];
  const wkPrv   = ALL_WEEKS[activeWkIdx + 1];
  const cats    = catData(wk);
  const catsPrv = catData(wkPrv);
  const total   = Object.values(cats).reduce((a, b) => a + b, 0);
  const totalPrv= Object.values(catsPrv).reduce((a, b) => a + b, 0);
  if (total === 0) return '';

  const JDATA_ALL_TOTAL = JDATA?.all?.weekly_total;
  const totalCallsDone  = JDATA_ALL_TOTAL?.[wk]?.total || total;

  const rows = Object.entries(cats)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, cnt]) => {
      const pct     = total > 0 ? cnt / total * 100 : 0;
      const prev    = catsPrv[cat] ?? 0;
      const wowP    = prev > 0 ? (cnt - prev) / prev * 100 : null;
      const color   = CAT_COLORS[cat] || '#94a3b8';
      const wowStr  = wowP != null
        ? `<span class="${wowP > 3 ? 'wow-up' : wowP < -3 ? 'wow-dn' : 'wow-flat'}" style="font-size:10px;">${wowP >= 0 ? '▲' : '▼'}${Math.abs(wowP).toFixed(0)}%</span>`
        : '';
      return `<tr>
        <td style="font-weight:600;">
          <span class="cat-dot" style="background:${color};margin-right:6px;"></span>${CAT_LABELS[cat] || cat}
        </td>
        <td class="cell-r" style="font-weight:600;">${fmtN(cnt)}</td>
        <td class="cell-r">
          <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;">
            <div style="width:60px;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;">
              <div style="height:100%;width:${pct.toFixed(0)}%;background:${color};border-radius:3px;"></div>
            </div>
            <span style="font-size:12px;">${pct.toFixed(1)}%</span>
          </div>
        </td>
        <td class="cell-r">${wowStr}</td>
      </tr>`;
    }).join('');

  return `<div class="card">
    <div class="sec-hdr" style="margin-bottom:2px;">Category Mix</div>
    <div class="sec-sub" style="margin-bottom:12px;">All scope · Calls Done · selected week</div>
    <table class="tbl">
      <thead><tr>
        <th>Category</th><th class="r">Count</th><th class="r">Share</th><th class="r">WoW</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── BUILD CHANNEL TABLE ───────────────────────────────────────────────────
function buildChannelTable() {
  const wk   = ALL_WEEKS[activeWkIdx];
  const wkP  = ALL_WEEKS[activeWkIdx + 1];
  const chs  = Object.keys(JDATA?.[dataScope]?.weekly_channel?.[wk] || {});
  if (!chs.length) return '';

  const totalCalls = Object.values(JDATA[dataScope].weekly_channel[wk])
    .reduce((s, d) => s + (d.calls_done || 0), 0) || 1;

  const rows = chs.map(ch => {
    const arr   = chanArr(ch, 'calls_done');
    const b2dA  = chanArr(ch, 'b2d_pct');
    const cur   = arr[activeWkIdx];
    const prev  = arr[activeWkIdx + 1];
    const avgV  = avg8(arr, activeWkIdx);
    const b2dCur = b2dA[activeWkIdx];
    const b2dAvg = avg8(b2dA, activeWkIdx);
    const share  = cur != null && totalCalls ? (cur / totalCalls * 100) : null;
    const color  = CH_COLORS[ch] || '#94a3b8';

    const wowStr  = wowPct(cur, prev);
    const vsAvgStr = vsAvgHtml(cur, avgV);

    // Sparkline: chronological (oldest→newest)
    const sparkVals = arr.slice(0, 9).reverse();

    return `<tr>
      <td style="font-weight:600;">
        <span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${color};margin-right:7px;vertical-align:middle;"></span>${ch}
      </td>
      <td class="cell-r">
        <span class="val-main">${fmtN(cur)}</span>
        <span class="val-sub">${wowStr != null ? wowHtml(wowStr) : ''}</span>
      </td>
      <td class="cell-r">${vsAvgStr} <span style="font-size:10px;color:#94a3b8;">${avgV != null ? fmtN(avgV) + ' avg' : ''}</span></td>
      <td class="cell-r">
        <span class="val-main">${share != null ? share.toFixed(1)+'%' : '—'}</span>
      </td>
      <td class="cell-r">
        <span class="val-main" style="color:${b2dCur >= 70 ? '#059669' : b2dCur >= 60 ? '#d97706' : b2dCur ? '#dc2626' : '#94a3b8'};">${fmtPct(b2dCur)}</span>
        <span class="val-sub" style="color:#94a3b8;">${b2dAvg != null ? 'avg '+b2dAvg.toFixed(1)+'%' : ''}</span>
      </td>
      <td style="padding-right:12px;">${spark(sparkVals, color, 84, 24)}</td>
    </tr>`;
  }).join('');

  return `<div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="sec-hdr">Channel Breakdown</span>
      <span class="sec-sub">Calls Done · ${dataScope} · with 8-week rolling average</span>
    </div>
    <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr>
        <th>Channel</th>
        <th class="r">Calls Done</th>
        <th class="r">vs 8wk Avg</th>
        <th class="r">Share %</th>
        <th class="r">B2D %</th>
        <th>9wk Trend</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div>`;
}

// ── BUILD CITY TABLE ──────────────────────────────────────────────────────
function buildCityTable() {
  if (dataScope === 'online') {
    return `<div class="card" style="margin-bottom:20px;padding:16px 20px;color:#94a3b8;font-size:12px;">
      City-level data is not available for Online scope (data.json limitation)
    </div>`;
  }

  const wk   = ALL_WEEKS[activeWkIdx];
  const wkP  = ALL_WEEKS[activeWkIdx + 1];
  const cityObj = JDATA?.[dataScope]?.weekly_city?.[wk] || {};
  const cities  = Object.keys(cityObj).filter(c => c && c !== 'Online');

  // Filter by tier
  const filtered = cities.filter(c => {
    if (activeTier === 'ALL') return true;
    return cityTier(c) === activeTier;
  });

  if (!filtered.length) return '';

  // Sort by calls done (highest first)
  const sorted = filtered
    .map(city => ({
      city,
      arr:    cityArr(city, 'calls_done'),
      b2dArr: cityArr(city, 'b2d_pct'),
    }))
    .map(o => ({
      ...o,
      cur:    o.arr[activeWkIdx],
      prev:   o.arr[activeWkIdx + 1],
      avgV:   avg8(o.arr, activeWkIdx),
      b2dCur: o.b2dArr[activeWkIdx],
      b2dAvg: avg8(o.b2dArr, activeWkIdx),
    }))
    .sort((a, b) => (b.cur || 0) - (a.cur || 0));

  const maxCalls = Math.max(...sorted.map(o => o.cur || 0), 1);

  const rows = sorted.map(({ city, arr, b2dArr, cur, prev, avgV, b2dCur, b2dAvg }) => {
    const tier   = cityTier(city);
    const tierB  = tier === 'T1' ? `<span class="t1b">T1</span>` : tier === 'T2' ? `<span class="t2b">T2</span>` : '';
    const wowStr = wowPct(cur, prev);
    const barW   = Math.round((cur || 0) / maxCalls * 100);
    const color  = (avgV != null && cur != null && cur > avgV) ? '#10b981'
                 : (avgV != null && cur != null && cur < avgV) ? '#ef4444' : '#6366f1';

    // Sparkline: 9 weeks, chronological
    const sparkVals = arr.slice(0, 9).reverse();

    const b2dColor = b2dCur >= 70 ? '#059669' : b2dCur >= 60 ? '#d97706' : b2dCur ? '#dc2626' : '#94a3b8';

    return `<tr>
      <td style="font-weight:600;">
        ${city} ${tierB}
        <div style="height:3px;width:${barW}%;background:${color}66;border-radius:2px;margin-top:4px;max-width:80px;"></div>
      </td>
      <td class="cell-r">
        <span class="val-main">${fmtN(cur)}</span>
        <span class="val-sub">${wowStr != null ? wowHtml(wowStr) : ''}</span>
      </td>
      <td class="cell-r">${vsAvgHtml(cur, avgV)} <span style="font-size:10px;color:#94a3b8;">${avgV != null ? fmtN(Math.round(avgV)) + ' avg' : ''}</span></td>
      <td class="cell-r">
        <span class="val-main" style="color:${b2dColor};">${fmtPct(b2dCur)}</span>
        <span class="val-sub" style="color:#94a3b8;">${b2dAvg != null ? 'avg '+b2dAvg.toFixed(1)+'%' : ''}</span>
      </td>
      <td>${spark(sparkVals, color, 80, 22)}</td>
    </tr>`;
  }).join('');

  return `<div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="sec-hdr">City Breakdown</span>
      <span class="sec-sub">Calls Done · ${dataScope} · ${activeTier === 'ALL' ? 'All tiers' : activeTier} · with 8wk avg</span>
    </div>
    <div style="overflow-x:auto;max-height:480px;overflow-y:auto;">
    <table class="tbl">
      <thead><tr>
        <th>City</th>
        <th class="r">Calls Done</th>
        <th class="r">vs 8wk Avg</th>
        <th class="r">B2D %</th>
        <th>9wk Trend</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  if (!JDATA) return;
  const wk = ALL_WEEKS[activeWkIdx];
  const lbl = JDATA?.[dataScope]?.weekly_funnel?.[wk]?.label || wk;

  document.getElementById('root').innerHTML = `
    <!-- Page title -->
    <div style="margin-bottom:16px;">
      <h1 style="font-size:22px;font-weight:700;margin:0 0 4px;">Overall Demand View</h1>
      <p style="color:var(--muted);font-size:12px;margin:0;">
        Week of <strong>${lbl}</strong> ·
        Scope: <strong>${dataScope.charAt(0).toUpperCase()+dataScope.slice(1)}</strong> ·
        ${activeTier === 'ALL' ? 'All Cities' : activeTier + ' Cities'} ·
        All metrics vs 8-week rolling average
      </p>
    </div>

    <!-- KPI Strip -->
    ${buildKPIStrip()}

    <!-- Main 3-column grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;align-items:start;">
      ${buildBeatMissHistory()}
      ${buildCategoryMix()}
    </div>

    <!-- Trend chart -->
    ${buildTrendChart()}

    <!-- Channel + City tables -->
    ${buildChannelTable()}
    ${buildCityTable()}

    <div style="text-align:center;color:#94a3b8;font-size:11px;margin:20px 0 40px;">
      Data: appointments CSV (calls done, bookings, B2D%) ·
      Category mix: all scopes combined ·
      8wk avg = rolling average of 8 weeks preceding selected week
    </div>
  `;

  // Render charts after DOM is ready
  requestAnimationFrame(() => renderTrendChart());
}

// ── CONTROLS ──────────────────────────────────────────────────────────────
function setScope(scope) {
  dataScope = scope;
  ['sAll','sOffline','sOnline'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const m = { all:'sAll', offline:'sOffline', online:'sOnline' };
  document.getElementById(m[scope])?.classList.add('active');
  render();
}
function setTier(tier) {
  activeTier = tier;
  ['tAll','tT1','tT2'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const m = { ALL:'tAll', T1:'tT1', T2:'tT2' };
  document.getElementById(m[tier])?.classList.add('active');
  render();
}
function setWeek(val) {
  activeWkIdx = parseInt(val, 10);
  render();
}
function setMet(met) {
  activeMet = met;
  ['mCalls','mBookings','mLeads'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const m = { calls_done:'mCalls', new_bookings:'mBookings', total_leads:'mLeads', gmb_leads:'mLeads' };
  document.getElementById(m[met])?.classList.add('active');
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('data.json not found');
    JDATA = await res.json();

    // Build ALL_WEEKS newest-first (data.json weeks are oldest-first)
    ALL_WEEKS = [...(JDATA.weeks || [])].reverse();

    // Build week selector
    const sel = document.getElementById('weekSel');
    ALL_WEEKS.forEach((wk, i) => {
      const lbl = JDATA.all?.weekly_funnel?.[wk]?.label || wk;
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = lbl;
      if (i === 0) opt.selected = true;
      sel.appendChild(opt);
    });

    render();

    // Load total leads from L0 sheet (non-blocking, shares cache with efficiency tab)
    loadTotalLeads().then(() => {
      if (activeMet === 'total_leads') render();
    });

    // Load GMB leads from demand tracker sheet (non-blocking — kept for backward compat)
    fetch(OV_SHEET_URL)
      .then(r => r.ok ? r.text() : null)
      .then(text => {
        if (text) {
          GMB_LEADS_BY_CITY = parseGmbLeads(text);
          if (activeMet === 'gmb_leads') render();
        }
      })
      .catch(() => {});

  } catch (err) {
    document.getElementById('root').innerHTML =
      `<div class="loading" style="color:#dc2626;">⚠ ${err.message}<br>Make sure the server is running and data.json is present.</div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
