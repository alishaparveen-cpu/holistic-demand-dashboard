    return `<tr>
      <td style="font-weight:600;">
        <span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${color};margin-right:7px;vertical-align:middle;"></span>${ch}
      </td>
      <td class="cell-r">
        <span class="val-main">${fmtN(cur)}</span>
        <span class="val-sub">${wowStr != null ? wowHtml(wowStr) : ''}</span>
        <div style="margin-top:5px;">${wkChips(arr, activeWkIdx, fmtN)}</div>
      </td>
      <td class="cell-r">${vsAvgStr} <span style="font-size:10px;color:#94a3b8;">${avgV != null ? fmtN(avgV) + ' avg' : ''}</span></td>
      <td class="cell-r">
        <span class="val-main">${share != null ? share.toFixed(1)+'%' : '—'}</span>
      </td>
      <td class="cell-r">
        <span class="val-main" style="color:${b2dCur >= 70 ? '#059669' : b2dCur >= 60 ? '#d97706' : b2dCur ? '#dc2626' : '#94a3b8'};">${fmtPct(b2dCur)}</span>
        <span class="val-sub" style="color:#94a3b8;">${b2dAvg != null ? 'avg '+b2dAvg.toFixed(1)+'%' : ''}</span>
      </td>
      <td style="padding-right:12px;">${spark(sparkVals, color, 84, 24)}</td>
    </tr>`;
  }).join('');

  const noteHtml = activeMet === 'total_leads' ? `<span style="font-size:10px;color:#f59e0b;margin-left:8px;">⚠ Leads per channel not in JDATA — showing Slot Booked as proxy</span>` : '';

  return `<div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="sec-hdr">Channel Breakdown</span>
      <span class="sec-sub">${metLbl} · ${dataScope} · with 8-week rolling average</span>
      ${noteHtml}
    </div>
    <div style="padding:0 14px 2px;">${buildChannelInsight()}</div>
    <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr>
        <th>Channel</th>
        <th class="r">${metLbl}</th>
        <th class="r">vs 8wk Avg</th>
        <th class="r">Share %</th>
        <th class="r">B2D %</th>
        <th>9wk Trend</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div>`;
}

// ── BUILD CITY TABLE ──────────────────────────────────────────────────────
function buildCityTable() {
  if (dataScope === 'online') {
    return `<div class="card" style="margin-bottom:20px;padding:16px 20px;color:#94a3b8;font-size:12px;">
      City-level data is not available for Online scope (data.json limitation)
    </div>`;
  }

  const wk   = ALL_WEEKS[activeWkIdx];
  const wkP  = ALL_WEEKS[activeWkIdx + 1];
  const cityObj = JDATA?.[dataScope]?.weekly_city?.[wk] || {};
  const cities  = Object.keys(cityObj).filter(c => c && c !== 'Online');

  // Filter by city (takes precedence) or tier
  const filtered = cities.filter(c => {
    if (activeCity !== 'ALL') return c === activeCity;
    if (activeTier === 'ALL') return true;
    return cityTier(c) === activeTier;
  });

  if (!filtered.length) return '';

  // Map activeMet to JDATA city field
  const cityMetricKey = activeMet === 'new_bookings' ? 'gross'
                      : activeMet === 'total_leads'  ? 'slot_booked'
                      : 'calls_done';
  const metLbl = metLabel(activeMet);

  const sorted = filtered
    .map(city => ({
      city,
      arr:    cityArr(city, cityMetricKey),
      b2dArr: cityArr(city, 'b2d_pct'),
    }))
    .map(o => ({
      ...o,
      cur:    o.arr[activeWkIdx],
      prev:   o.arr[activeWkIdx + 1],
      avgV:   avg8(o.arr, activeWkIdx),
      b2dCur: o.b2dArr[activeWkIdx],
      b2dAvg: avg8(o.b2dArr, activeWkIdx),
    }))
    .sort((a, b) => (b.cur || 0) - (a.cur || 0));

  const maxCalls = Math.max(...sorted.map(o => o.cur || 0), 1);

  const rows = sorted.map(({ city, arr, b2dArr, cur, prev, avgV, b2dCur, b2dAvg }) => {
    const tier   = cityTier(city);
    const tierB  = tier === 'T1' ? `<span class="t1b">T1</span>` : tier === 'T2' ? `<span class="t2b">T2</span>` : '';
    const wowStr = wowPct(cur, prev);
    const barW   = Math.round((cur || 0) / maxCalls * 100);
    const color  = (avgV != null && cur != null && cur > avgV) ? '#10b981'
                 : (avgV != null && cur != null && cur < avgV) ? '#ef4444' : '#6366f1';

    // Sparkline: 9 weeks, chronological
    const sparkVals = arr.slice(0, 9).reverse();

    const b2dColor = b2dCur >= 70 ? '#059669' : b2dCur >= 60 ? '#d97706' : b2dCur ? '#dc2626' : '#94a3b8';

    return `<tr>
      <td style="font-weight:600;">
        ${city} ${tierB}
        <div style="height:3px;width:${barW}%;background:${color}66;border-radius:2px;margin-top:4px;max-width:80px;"></div>
      </td>
      <td class="cell-r">
        <span class="val-main">${fmtN(cur)}</span>
        <span class="val-sub">${wowStr != null ? wowHtml(wowStr) : ''}</span>
        <div style="margin-top:5px;">${wkChips(arr, activeWkIdx, fmtN)}</div>
      </td>
      <td class="cell-r">${vsAvgHtml(cur, avgV)} <span style="font-size:10px;color:#94a3b8;">${avgV != null ? fmtN(Math.round(avgV)) + ' avg' : ''}</span></td>
      <td class="cell-r">
        <span class="val-main" style="color:${b2dColor};">${fmtPct(b2dCur)}</span>
        <span class="val-sub" style="color:#94a3b8;">${b2dAvg != null ? 'avg '+b2dAvg.toFixed(1)+'%' : ''}</span>
      </td>
      <td>${spark(sparkVals, color, 80, 22)}</td>
    </tr>`;
  }).join('');

  const cityNoteHtml = activeMet === 'total_leads' ? `<span style="font-size:10px;color:#f59e0b;margin-left:8px;">⚠ Showing Slot Booked as proxy for Leads per city</span>` : '';

  return `<div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="sec-hdr">City Breakdown</span>
      <span class="sec-sub">${metLbl} · ${dataScope} · ${activeTier === 'ALL' ? 'All tiers' : activeTier} · with 8wk avg</span>
      ${cityNoteHtml}
    </div>
    <div style="padding:0 14px 2px;">${buildCityInsight()}</div>
    <div style="overflow-x:auto;max-height:480px;overflow-y:auto;">
    <table class="tbl">
      <thead><tr>
        <th>City</th>
        <th class="r">${metLbl}</th>
        <th class="r">vs 8wk Avg</th>
        <th class="r">B2D %</th>
        <th>9wk Trend</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  if (!JDATA) return;
  const wk  = ALL_WEEKS[activeWkIdx];
  const lbl = JDATA?.[dataScope]?.weekly_funnel?.[wk]?.label || wk;
  const isAll = activeMet === 'all';

  document.getElementById('root').innerHTML = `
    <!-- Page title -->
    <div style="margin-bottom:16px;">
      <h1 style="font-size:22px;font-weight:700;margin:0 0 4px;">Overall Demand View</h1>
      <p style="color:var(--muted);font-size:12px;margin:0;">
        Week of <strong>${lbl}</strong> ·
        Scope: <strong>${dataScope.charAt(0).toUpperCase()+dataScope.slice(1)}</strong> ·
        ${activeCity !== 'ALL' ? `<span style="color:#6366f1;font-weight:600;">📍 ${activeCity}</span>` : activeTier === 'ALL' ? 'All Cities' : activeTier + ' Cities'}
        ${activeCity !== 'ALL' ? `<button onclick="setCity('ALL')" style="margin-left:6px;font-size:10px;color:#94a3b8;border:1px solid #e2e8f0;border-radius:4px;padding:1px 7px;background:#fff;cursor:pointer;">✕ Clear</button>` : ''}
      </p>
    </div>

    <!-- ① DEMAND STORY: Pulse + Funnel + Diagnosis merged in one card -->
    ${buildDemandStory()}

    <!-- ② 12-WEEK TREND (moved up for immediate visibility) -->
    ${buildTrendChart()}

    <!-- ③ GROWTH DECOMPOSITION — same-store vs new clinic -->
    ${buildGrowthDecomposition()}

    ${isAll ? `
      <!-- ═══ ALL MODE ═══ -->

      <!-- ④ Full funnel by channel -->
      ${buildFullFunnelTable('channel')}

      <!-- ⑤ City section: funnel + availability (clinics inside city) -->
      <div style="margin-bottom:8px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#94a3b8;white-space:nowrap;">🏙️ City &amp; Clinic View${activeCity !== 'ALL' ? ' · <span style="color:#6366f1;">'+activeCity+'</span>' : ''}</span>
        <div style="flex:1;height:1px;background:#e2e8f0;"></div>
      </div>
      ${buildFullFunnelTable('city')}
      ${buildAvailabilityIndex()}

      <!-- ⑥ Beat/Miss + Category Mix -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;align-items:start;">
        ${buildBeatMissHistory()}
        ${buildCategoryMix()}
      </div>
    ` : `
      <!-- ═══ SINGLE-METRIC MODE ═══ -->

      <!-- ④ Beat/Miss + Category Mix -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;align-items:start;">
        ${buildBeatMissHistory()}
        ${buildCategoryMix()}
      </div>

      <!-- ⑤ Channel table -->
      ${buildChannelTable()}

      <!-- ⑥ City section with availability (clinics inside city) -->
      <div style="margin-bottom:8px;display:flex;align-items:center;gap:10px;">
        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#94a3b8;white-space:nowrap;">🏙️ City &amp; Clinic View${activeCity !== 'ALL' ? ' · <span style="color:#6366f1;">'+activeCity+'</span>' : ''}</span>
        <div style="flex:1;height:1px;background:#e2e8f0;"></div>
      </div>
      ${buildCityTable()}
      ${buildAvailabilityIndex()}
    `}

    <!-- 📊 COMPARISON PANEL -->
    ${buildComparePanel_ov()}

    <div style="text-align:center;color:#94a3b8;font-size:11px;margin:20px 0 40px;">
      Data: appointments CSV · Category mix: all scopes · 8wk avg = 8 weeks preceding selected week ·
      chips show W, W-1, W-2
    </div>
  `;

  requestAnimationFrame(() => { renderTrendChart(); renderCmpChart_ov(); });
}

// ── CONTROLS ──────────────────────────────────────────────────────────────
function setScope(scope) {
  dataScope = scope;
  ['sAll','sOffline','sOnline'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const m = { all:'sAll', offline:'sOffline', online:'sOnline' };
  document.getElementById(m[scope])?.classList.add('active');
  render();
}
function setTier(tier) {
  activeTier = tier;
  activeCity = 'ALL'; // reset city filter when tier changes
  const sel = document.getElementById('citySel');
  if (sel) sel.value = 'ALL';
  ['tAll','tT1','tT2'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const m = { ALL:'tAll', T1:'tT1', T2:'tT2' };
  document.getElementById(m[tier])?.classList.add('active');
  render();
}
function setCity(city) {
  activeCity = city;
  // When a specific city is selected, clear tier filter to avoid confusion
  if (city !== 'ALL') { activeTier = 'ALL'; ['tAll','tT1','tT2'].forEach(id => document.getElementById(id)?.classList.remove('active')); document.getElementById('tAll')?.classList.add('active'); }
  render();
}
function setWeek(val) {
  activeWkIdx = parseInt(val, 10);
  render();
}
function setMet(met) {
  activeMet = met;
  ['mAll','mCalls','mBookings','mLeads'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const m = { all:'mAll', calls_done:'mCalls', new_bookings:'mBookings', total_leads:'mLeads', gmb_leads:'mLeads' };
  document.getElementById(m[met])?.classList.add('active');
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('data.json not found');
    JDATA = await res.json();

    // Build ALL_WEEKS newest-first (data.json weeks are oldest-first)
    ALL_WEEKS = [...(JDATA.weeks || [])].reverse();

    // Build city selector
    const citySel = document.getElementById('citySel');
    if (citySel) {
      const cities = (JDATA?.offline?.cities || []).filter(c => c && c !== 'Online').sort();
      cities.forEach(city => {
        const opt = document.createElement('option');
        opt.value = city; opt.textContent = city;
        citySel.appendChild(opt);
      });
    }

    // Build week selector
    const sel = document.getElementById('weekSel');
    ALL_WEEKS.forEach((wk, i) => {
      const lbl = JDATA.all?.weekly_funnel?.[wk]?.label || wk;
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = lbl;
      if (i === 0) opt.selected = true;
      sel.appendChild(opt);
    });

    render();

    // Load total leads from L0 sheet (non-blocking, shares cache with efficiency tab)
    loadTotalLeads().then(() => {
      if (activeMet === 'total_leads') render();
    });

    // Load GMB Insights (data_gmb.json — generated by scripts/fetch_gmb.py)
    // Non-blocking: renders setup prompt until file exists, then shows live data.
    loadGmbInsights().then(() => {
      if (GMB_INSIGHTS) render();
    });

    // Load GMB leads + availability data from demand tracker sheet (non-blocking)
    fetch(OV_SHEET_URL)
      .then(r => r.ok ? r.text() : null)
      .then(text => {
        if (text) {
          GMB_LEADS_BY_CITY = parseGmbLeads(text);
          const _parsed     = parseAvailData(text);  // avail + allBk per city & clinic
          OV_SDATA          = _parsed.byCity;
          OV_SDATA_CLINICS  = _parsed.byClinic;
          if (activeMet === 'gmb_leads' || activeMet === 'all') render();
        }
      })
      .catch(() => {});

  } catch (err) {
    document.getElementById('root').innerHTML =
      `<div class="loading" style="color:#dc2626;">⚠ ${err.message}<br>Make sure the server is running and data.json is present.</div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
