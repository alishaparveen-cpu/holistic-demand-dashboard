<style>
:root{
  --ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --red:#ef4444;--amber:#f59e0b;--green:#10b981;
}
html,body{background:#f8fafc;color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;margin:0;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(15,23,42,.05);}
/* KPI cards */
.kpi-card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:18px 20px;box-shadow:0 1px 2px rgba(15,23,42,.04);position:relative;overflow:hidden;}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-size:26px;font-weight:700;color:var(--ink);line-height:1.1;margin-bottom:4px;}
.kpi-wow{font-size:11px;margin-bottom:3px;}
.kpi-avg{font-size:11px;}
.wow-up{color:#059669;} .wow-dn{color:#dc2626;} .wow-flat{color:#94a3b8;}
/* Beat/Miss chip */
.beat{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#ecfdf5;color:#065f46;}
.miss{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#fef2f2;color:#991b1b;}
.flat{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#f1f5f9;color:#475569;}
/* Toggle */
.toggle-btn{padding:4px 12px;font-size:12px;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:#fff;color:var(--ink);transition:all .12s;}
.toggle-btn.active{background:#0f172a;color:#fff;border-color:#0f172a;}
/* Table */
.tbl{width:100%;border-collapse:separate;border-spacing:0;}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;position:sticky;top:0;}
.tbl th.r{text-align:right;}
.tbl td{padding:8px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#f8fafc;}
.cell-r{text-align:right;}
.val-main{font-weight:600;display:block;}
.val-sub{font-size:10px;display:block;margin-top:1px;}
/* Tier badge */
.t1b{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#ede9fe;color:#6d28d9;}
.t2b{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#e0f2fe;color:#0369a1;}
/* Nav */
.nav-link{font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border-radius:6px;transition:background .12s;}
.nav-link:hover{background:#f1f5f9;color:#0f172a;}
.nav-link.active{font-weight:700;color:#0f172a;background:#f1f5f9;}
/* Section header */
.sec-hdr{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.sec-sub{font-size:11px;color:var(--muted);}
/* Beat bar (week-by-week) */
.wk-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;}
.wk-row:last-child{border-bottom:none;}
.wk-label{font-size:11px;color:#64748b;width:80px;flex-shrink:0;}
.wk-bar-wrap{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden;}
.wk-bar{height:100%;border-radius:4px;transition:width .4s;}
.wk-val{font-size:11px;font-weight:600;width:40px;text-align:right;flex-shrink:0;}
.wk-chip{width:46px;flex-shrink:0;}
/* Loading */
.loading{text-align:center;padding:60px;color:var(--muted);}
/* Category dot */
.cat-dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0;}
/* ── Insight layer ── */
.brief-card{border-radius:14px;padding:18px 22px;margin-bottom:20px;border:2px solid;}
.brief-card.ok   {background:#ecfdf5;border-color:#10b981;}
.brief-card.warn {background:#fffbeb;border-color:#f59e0b;}
.brief-card.bad  {background:#fef2f2;border-color:#ef4444;}
.brief-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.brief-row:last-child{border-bottom:none;padding-bottom:0;}
.brief-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.brief-text{font-size:12px;line-height:1.5;flex:1;}
.brief-text strong{color:#0f172a;}
.insight-bar{border-radius:8px;padding:9px 14px;margin-bottom:14px;font-size:12px;line-height:1.6;display:flex;align-items:flex-start;gap:8px;}
.insight-bar.ok   {background:#ecfdf5;color:#065f46;border-left:3px solid #10b981;}
.insight-bar.warn {background:#fffbeb;color:#92400e;border-left:3px solid #f59e0b;}
.insight-bar.bad  {background:#fef2f2;color:#991b1b;border-left:3px solid #ef4444;}
.insight-bar.gray {background:#f8fafc;color:#475569;border-left:3px solid #e2e8f0;}
.insight-icon{font-size:15px;flex-shrink:0;margin-top:1px;}
/* ── 3-week chips & pulse card ──────────────────────── */
.chip3{display:flex;gap:3px;flex-wrap:nowrap;}
.chip3-item{border-radius:6px;padding:3px 7px;text-align:center;min-width:48px;flex-shrink:0;}
.chip3-item .c-lbl{font-size:8px;color:#94a3b8;white-space:nowrap;margin-bottom:1px;}
.chip3-item .c-val{font-size:11px;font-weight:700;white-space:nowrap;}
.pulse-card{border-radius:14px;padding:20px 24px;margin-bottom:20px;border:2px solid;}
.pulse-card.ok  {background:linear-gradient(135deg,#ecfdf5,#f0fdf4);border-color:#10b981;}
.pulse-card.warn{background:linear-gradient(135deg,#fffbeb,#fef9ec);border-color:#f59e0b;}
.pulse-card.bad {background:linear-gradient(135deg,#fef2f2,#fef1f1);border-color:#ef4444;}
.pulse-card.gray{background:#f8fafc;border-color:#e2e8f0;}
.pulse-kpi{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(15,23,42,.06);}
/* root-cause signal cards */
.rc-card{border-radius:12px;padding:14px 16px;border:1px solid;}
.rc-card.ok  {background:#f0fdf4;border-color:#bbf7d0;}
.rc-card.warn{background:#fffbeb;border-color:#fde68a;}
.rc-card.bad {background:#fef2f2;border-color:#fecaca;}
.rc-card.gray{background:#f8fafc;border-color:#e2e8f0;}
</style>
</head>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const CITY_TIERS = {
  T1: ['Bangalore','Mumbai','Pune','Hyderabad','Chennai'],
  T2: ['Navi Mumbai','Coimbatore','Nagpur','Ranchi','Jaipur','Ahmedabad',
       'Surat','Nashik','Aurangabad','Hubli','Mysuru','Mangaluru',
       'Bhopal','Visakhapatnam','Thane','Gandhinagar','Vijayawada'],
};
function cityTier(c) {
  return CITY_TIERS.T1.includes(c) ? 'T1' : CITY_TIERS.T2.includes(c) ? 'T2' : null;
}

const CAT_COLORS = {
  'STI':   '#6366f1', 'ED+':   '#10b981', 'PE+':   '#f59e0b',
  'ED+PE+':'#3b82f6', 'NSSD':  '#ec4899', 'oth':   '#94a3b8',
};
const CAT_LABELS = { 'STI':'STI', 'ED+':'ED+', 'PE+':'PE+', 'ED+PE+':'ED+PE+', 'NSSD':'NSSD', 'oth':'Other' };

const CH_COLORS = {
  GMB:'#34A853', Google:'#4285F4', Practo:'#6B4EFF',
  Organic:'#10b981', Meta:'#1877F2', Others:'#94a3b8',
};

// Sheet for GMB Leads (same demand-tracker sheet as diagnostic tab)
const OV_SHEET_ID   = '1bZWGVKu6b4EFPDt3aKHn21gYjdhN1aT1-LT60BFe8g0';
const OV_SHEET_URL  = `https://docs.google.com/spreadsheets/d/${OV_SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Booking%20and%20Leads%20trend%20summary`;
// Week keys matching data.json, newest-first (7 weeks covered by the GMB section cols 27-33)
const OV_SHEET_WEEKS = ['2026-05-25','2026-05-18','2026-05-11','2026-05-04','2026-04-27','2026-04-20','2026-04-13'];
const OV_GMB_C = 27; // 0-indexed column start for GMB leads (7 weeks newest→oldest)

// L0 sheet — for total leads (shared cache with efficiency tab)
const L0_ID        = '1jyyFYpd7gfYyAQ3U7E56c7OA3OuQQAVgJrAGyQr90XM';
const L0_CSV_URL   = `https://docs.google.com/spreadsheets/d/${L0_ID}/gviz/tq?tqx=out:csv&sheet=L0`;
const L0_CACHE_KEY = 'allo_eff_l0_v3'; // bumped 2026-06-01: col 2 = W-1 (May 25-31)
const L0_CACHE_TTL = 45 * 60 * 1000;
const L0_WK_KEYS   = ['2026-05-25','2026-05-18','2026-05-11','2026-05-04','2026-04-27','2026-04-20','2026-04-13'];
const L0_WK_COLS   = [2,3,4,5,6,7,8]; // col 2 = W-1 (25–31 May); shift +1 each new week

// ── STATE ─────────────────────────────────────────────────────────────────
let JDATA      = null;
let ALL_WEEKS  = []; // newest-first week keys
let WK_LABELS  = {}; // wkKey → label string
let dataScope  = 'all';
let activeTier = 'ALL';
let activeCity = 'ALL'; // specific city filter — 'ALL' = no city filter
let activeWkIdx = 0;  // index into ALL_WEEKS (0 = newest)
let activeMet  = 'all'; // 'all' | 'calls_done' | 'new_bookings' | 'total_leads'
let GMB_LEADS_BY_CITY = {};    // weekKey → city → GMB leads (loaded from OV sheet)
let TOTAL_LEADS_WK    = {};    // weekKey → total leads (loaded from L0 sheet)
let OV_SDATA         = {};     // city → { avail:[7], allBk:[7] }  (newest-first, from same sheet)
let OV_SDATA_CLINICS = {};     // city → { clinic → { avail:[7], allBk:[7] } }
let charts     = {};
let GMB_INSIGHTS = null;  // loaded from data_gmb.json (null if not yet generated)

// ── COMPARISON PANEL STATE ─────────────────────────────────────────────────
const CMP_OV_METRICS = [
  { key:'new_bookings', lbl:'New Bookings', type:'count' },
  { key:'calls_done',   lbl:'Calls Done',   type:'count' },
  { key:'slot_booked',  lbl:'Leads (Slots)',type:'count' },
  { key:'b2d_pct',      lbl:'B2D %',        type:'pct'   },
  { key:'ns_pct',       lbl:'No-Show %',    type:'pct'   },
  { key:'gross',        lbl:'Gross Bookings',type:'count' },
];
let cmpA_ov = 'calls_done', cmpB_ov = 'b2d_pct', cmpSeg_ov = 'all';

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmtN(v) {
  if (v == null) return '—';
  return Math.round(v).toLocaleString();
}
function fmtPct(v, dec=1) {
  if (v == null) return '—';
  return v.toFixed(dec) + '%';
}
function fmtINR(v) {
  if (v == null) return '—';
  if (v >= 100000) return '₹' + (v/100000).toFixed(1) + 'L';
  if (v >= 1000)   return '₹' + (v/1000).toFixed(0) + 'K';
  return '₹' + Math.round(v);
}

// WoW % change
function wowPct(cur, prev) {
  if (cur == null || prev == null || prev === 0) return null;
  return (cur - prev) / Math.abs(prev) * 100;
}
// Percentage-point change (for rates)
function wowPp(cur, prev) {
  if (cur == null || prev == null) return null;
  return cur - prev;
}

function wowHtml(pct, inverted=false) {
  if (pct === null) return '<span class="wow-flat">—</span>';
  const up = pct > 0;
  const isGood = inverted ? !up : up;
  const cls = Math.abs(pct) < 1 ? 'wow-flat' : isGood ? 'wow-up' : 'wow-dn';
  return `<span class="${cls}">${up?'▲':'▼'} ${Math.abs(pct).toFixed(1)}%</span>`;
}
function ppHtml(pp, inverted=false) {
  if (pp === null) return '<span class="wow-flat">—</span>';
  const up = pp > 0;
  const isGood = inverted ? !up : up;
  const cls = Math.abs(pp) < 0.3 ? 'wow-flat' : isGood ? 'wow-up' : 'wow-dn';
  const sign = pp >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${pp.toFixed(1)}pp</span>`;
}

// 8-week average of an array (all_weeks-indexed newest-first), starting from fromIdx+1
function avg8(arr, fromIdx) {
  const vals = arr.slice(fromIdx + 1, fromIdx + 9).filter(v => v != null && !isNaN(v));
  if (!vals.length) return null;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}

// vs-average chip
function vsAvgHtml(cur, avgVal, isRate=false) {
  if (cur == null || avgVal == null || avgVal === 0) return '';
  const diff = isRate ? (cur - avgVal) : (cur - avgVal) / avgVal * 100;
  const isGood = diff > 0;
  const abs = Math.abs(diff);
  if (abs < (isRate ? 0.3 : 1.5)) return `<span class="flat">→ avg</span>`;
  const label = isRate
    ? `${diff >= 0 ? '+' : ''}${diff.toFixed(1)}pp vs avg`
    : `${diff >= 0 ? '+' : ''}${diff.toFixed(0)}% vs avg`;
  return isGood
    ? `<span class="beat">${label}</span>`
    : `<span class="miss">${label}</span>`;
}

// SVG sparkline
function spark(vals, color='#6366f1', w=80, h=22, _fill, opts={}) {
  const v = (vals||[]).filter(x => x != null);
  const safeVals   = JSON.stringify(vals||[]).replace(/'/g,'&#39;');
  const safeLabels = (opts.labels?JSON.stringify(opts.labels):'null').replace(/'/g,'&#39;');
  const safeTitle  = (opts.title||'').replace(/"/g,'&quot;');
  const datAttrs   = `data-sparkvals='${safeVals}' data-sparklabels='${safeLabels}' data-sparkcolor='${color}' data-sparktitle="${safeTitle}" data-sparkfmt='${opts.fmt||''}'`;
  if (v.length < 2) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;"></svg></div>`;
  const mn = Math.min(...v), mx = Math.max(...v);
  const range = mx - mn || 1;
  const n = vals.length;
  const pts = [];
  (vals||[]).forEach((val, i) => {
    if (val == null) return;
    const x = ((i / (n - 1)) * (w - 4) + 2).toFixed(1);
    const y = (h - 2 - ((val - mn) / range) * (h - 4)).toFixed(1);
    pts.push(`${x},${y}`);
  });
  if (pts.length < 2) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;"></svg></div>`;
  const poly = pts.join(' ');
  const [fx] = pts[0].split(',');
  const [lx, ly] = pts[pts.length - 1].split(',');
  return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;overflow:visible;">
    <polygon points="${fx},${h} ${poly} ${lx},${h}" fill="${color}20" stroke="none"/>
    <polyline points="${poly}" stroke="${color}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/>
  </svg></div>`;
}

// ── DATA ACCESSORS ────────────────────────────────────────────────────────
function funnel(wkKey) {
  // City filter takes precedence — pull single city from weekly_city
  if (activeCity !== 'ALL' && dataScope !== 'online') {
    const d = JDATA?.[dataScope]?.weekly_city?.[wkKey]?.[activeCity] || {};
    return {
      calls_done:   d.calls_done || 0,
      gross:        d.gross      || 0,
      no_show:      d.no_show    || 0,
      new_bookings: d.gross      || 0,
      b2d_pct:      (d.gross > 0) ? (d.calls_done || 0) / d.gross * 100 : null,
      ns_pct:       (d.gross > 0) ? (d.no_show    || 0) / d.gross * 100 : null,
      label: JDATA?.[dataScope]?.weekly_funnel?.[wkKey]?.label,
    };
  }
  // When a tier is selected (and not online scope), aggregate from per-city data
  // so KPI cards, beat/miss, and trend chart all reflect the selected tier.
  if (activeTier !== 'ALL' && dataScope !== 'online') {
    const tierCities = CITY_TIERS[activeTier] || [];
    let calls=0, gross=0, noShow=0, newBk=0, n=0;
    for (const city of tierCities) {
      const d = JDATA?.[dataScope]?.weekly_city?.[wkKey]?.[city];
      if (!d) continue;
      calls  += d.calls_done || 0;
      gross  += d.gross      || 0;
      noShow += d.no_show    || 0;
      newBk  += d.gross      || 0; // weekly_city has no new_bookings; gross ≈ new_bookings (within ~1%)
      n++;
    }
    if (n > 0) return {
      calls_done:   calls,
      gross,
      no_show:      noShow,
      new_bookings: newBk,
      b2d_pct:      gross > 0 ? calls / gross * 100 : null,
      ns_pct:       gross > 0 ? noShow / gross * 100 : null,
      label: JDATA?.[dataScope]?.weekly_funnel?.[wkKey]?.label,
    };
  }
  return JDATA?.[dataScope]?.weekly_funnel?.[wkKey] || {};
}
function chanData(wkKey, ch) {
  return JDATA?.[dataScope]?.weekly_channel?.[wkKey]?.[ch] || {};
}
function cityData(wkKey, city) {
  return JDATA?.[dataScope]?.weekly_city?.[wkKey]?.[city] || {};
}
function catData(wkKey) {
  return JDATA?.all?.weekly_total?.[wkKey]?.by_cat || {};
}

// All weeks array for a funnel metric (newest-first)
function funnelArr(metric) {
  return ALL_WEEKS.map(wk => funnel(wk)[metric] ?? null);
}
function chanArr(ch, metric) {
  return ALL_WEEKS.map(wk => chanData(wk, ch)[metric] ?? null);
}
function cityArr(city, metric) {
  return ALL_WEEKS.map(wk => cityData(wk, city)[metric] ?? null);
}

// ── TOTAL LEADS FROM L0 (shared cache with efficiency tab) ────────────────
async function loadTotalLeads() {
  try {
    let text = null;
    // Re-use the efficiency tab's L0 cache if available — zero extra cost
    const cached = localStorage.getItem(L0_CACHE_KEY);
    if (cached) {
      const { ts, text: t } = JSON.parse(cached);
      if (Date.now() - ts < L0_CACHE_TTL) text = t;
    }
    if (!text) {
      const res = await fetch(L0_CSV_URL).catch(() => ({ ok: false }));
      if (!res.ok) return;
      text = await res.text();
      try { localStorage.setItem(L0_CACHE_KEY, JSON.stringify({ ts: Date.now(), text })); } catch(e) {}
    }
    // Minimal CSV parse — just need row 4 (overall total leads, 0-indexed)
    const rows = [];
    for (const line of text.split('\n')) {
      if (!line.trim()) continue;
      const row = []; let cur = '', inQ = false;
      for (const c of line) {
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
        else cur += c;
      }
      row.push(cur.trim());
      rows.push(row);
    }
    const leadsRow = rows[4]; // overall leads
    if (!leadsRow) return;
    L0_WK_COLS.forEach((col, i) => {
      const wk  = L0_WK_KEYS[i];
      const raw = (leadsRow[col] || '').replace(/[^\d.]/g, '');
      const v   = parseFloat(raw);
      if (!isNaN(v) && v > 0) TOTAL_LEADS_WK[wk] = v;
    });
  } catch(e) {}
}

// ── GMB LEADS HELPERS ─────────────────────────────────────────────────────
function parseCSVSimple(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const row = []; let inQ = false, cell = '';
    for (const c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { row.push(cell.trim()); cell = ''; }
      else { cell += c; }
    }
    row.push(cell.trim());
    rows.push(row);
  }
  return rows;
}
function parseGmbLeads(text) {
  const rows = parseCSVSimple(text);
  const out = {}; // weekKey → city → total
  let curCity = '';
  for (let ri = 3; ri < rows.length; ri++) {
    const r = rows[ri];
    if (!r || r.length < OV_GMB_C + 7) continue;
    const c0 = r[0]||'', c1 = r[1]||'', c2 = r[2]||'', c3 = r[3]||'';
    if (c1 && !c1.startsWith('<>')) curCity = c1;
    if (c0 && !c0.startsWith('<>')) curCity = c0;
    if (!curCity || c2 === '<>All' || c2 === '<>ALL' || c3 === '<>All') continue;
    if (!c2) continue;
    for (let wi = 0; wi < OV_SHEET_WEEKS.length; wi++) {
      const wk = OV_SHEET_WEEKS[wi];
      const v = parseInt((r[OV_GMB_C+wi]||'').replace(/[^\d]/g,''), 10);
      if (!isNaN(v) && v > 0) {
        if (!out[wk]) out[wk] = {};
        out[wk][curCity] = (out[wk][curCity] || 0) + v;
      }
    }
  }
  return out;
}
function leadsVal(wkKey) {
  const byCity = GMB_LEADS_BY_CITY[wkKey];
  if (!byCity) return null;
  if (activeTier === 'ALL') {
    const t = Object.values(byCity).reduce((s, v) => s + v, 0);
    return t || null;
  }
  const cities = CITY_TIERS[activeTier] || [];
  const t = cities.reduce((s, c) => s + (byCity[c] || 0), 0);
  return t || null;
}
function leadsArr() { return ALL_WEEKS.map(wk => leadsVal(wk)); }
function metLabel(met) {
  return { all:'All Metrics', calls_done:'Calls Done', new_bookings:'New Bookings', total_leads:'Total Leads', gmb_leads:'GMB Leads' }[met] || met;
}
function metArr(met) {
  if (met === 'all')         return funnelArr('calls_done'); // 'all' view uses calls_done as primary
  if (met === 'total_leads') return ALL_WEEKS.map(wk => TOTAL_LEADS_WK[wk] ?? null);
  if (met === 'gmb_leads')   return leadsArr();
  return funnelArr(met);
}

// ── AVAILABILITY DATA PARSER ──────────────────────────────────────────────
// Reads from same sheet as GMB leads (cols 4-10 = avail "wd|we", cols 20-26 = allBk)
// Returns: city → { avail:[7], allBk:[7] }  (index 0 = newest week)
const OV_AVAIL_C = 4, OV_ALLBK_C = 20;
function pnOv(s) {
  const n = parseInt((s||'').replace(/[^\d.-]/g,''), 10);
  return isNaN(n) ? 0 : n;
}
function pAvailOv(s) {
  // format is "wd|we" (e.g. "5|2") — sum weekday + weekend days
  if (!s || s.trim() === '' || s === '-') return 0;
  return s.trim().split('|').reduce((acc, p) => acc + (parseInt(p.trim()) || 0), 0);
}
function parseAvailData(text) {
  const rows     = parseCSVSimple(text);
  const byCity   = {};  // city → { avail:[7], allBk:[7] }
  const byClinic = {};  // city → { clinicName → { avail:[7], allBk:[7] } }
  let curCity = '';
  for (let ri = 3; ri < rows.length; ri++) {
    const r  = rows[ri];
    if (!r || r.length < OV_ALLBK_C + 7) continue;
    const c0=r[0]||'', c1=r[1]||'', c2=r[2]||'';
    if (c1 && !c1.startsWith('<>')) curCity = c1;
    if (c0 && !c0.startsWith('<>')) curCity = c0;
    if (!curCity || c2 === '<>All' || c2 === '<>ALL') continue;
    if (!c2) continue;
    // City-level accumulation
    if (!byCity[curCity]) byCity[curCity] = { avail: Array(7).fill(0), allBk: Array(7).fill(0) };
    // Clinic-level capture
    if (!byClinic[curCity]) byClinic[curCity] = {};
    const clinicKey = c2.trim();
    if (!byClinic[curCity][clinicKey]) byClinic[curCity][clinicKey] = { avail: Array(7).fill(0), allBk: Array(7).fill(0) };
    for (let i = 0; i < 7; i++) {
      const av = pAvailOv(r[OV_AVAIL_C + i]);
      const bk = pnOv(r[OV_ALLBK_C + i]);
      byCity[curCity].avail[i]                     += av;
      byCity[curCity].allBk[i]                     += bk;
      byClinic[curCity][clinicKey].avail[i]         += av;
      byClinic[curCity][clinicKey].allBk[i]         += bk;
    }
  }
  return { byCity, byClinic };
}

// ── 3-WEEK CHIP HELPER ────────────────────────────────────────────────────
// arr = newest-first array aligned with ALL_WEEKS.
// fromIdx = current selected week index. Renders 3 chips: W, W-1, W-2.
// Shows the 3 weeks PRIOR to fromIdx (W-1, W-2, W-3).
// Each chip is colored based on how that week compared to the week before it (its own WoW).
function wkChips(arr, fromIdx, fmtFn, isRate=false) {
  const chips = [];
  for (let i = fromIdx + 1; i < Math.min(fromIdx + 4, arr.length); i++) {
    const val  = arr[i];
    const prev = arr[i + 1];
    const w    = isRate ? wowPp(val, prev) : wowPct(val, prev);
    const rawLbl = (JDATA?.[dataScope]?.weekly_funnel?.[ALL_WEEKS[i]]?.label || ALL_WEEKS[i] || '');
    const match  = rawLbl.match(/([A-Z][a-z]+ \d+)/);
    const shortLbl = match ? match[1] : (ALL_WEEKS[i]||'').slice(5);
    const valStr = val != null ? fmtFn(val) : '—';
    let bg, col;
    if (w == null)                    { bg='#f8fafc'; col='#94a3b8'; }
    else if (w >= (isRate ? 1 : 3))   { bg='#f0fdf4'; col='#16a34a'; }
    else if (w >= (isRate ? -1 : -5)) { bg='#fefce8'; col='#ca8a04'; }
    else                              { bg='#fef2f2'; col='#dc2626'; }
    chips.push(`<div class="chip3-item" style="background:${bg};">
      <div class="c-lbl">${shortLbl}</div>
      <div class="c-val" style="color:${col};">${valStr}</div>
    </div>`);
  }
  return `<div class="chip3">${chips.join('')}</div>`;
}

// ── DEMAND STORY (merged pulse + funnel + diagnosis) ─────────────────────
// Replaces buildDemandHealthPulse + buildFunnelAnalysis + buildSituationBriefing + buildRootCauseBoard
// One card: header status → signal badges → KPI boxes → funnel with sparklines → auto-diagnosis
function buildDemandStory() {
  const wk  = ALL_WEEKS[activeWkIdx];
  const wkP = ALL_WEEKS[activeWkIdx + 1];
  if (!wk) return '';

  const f  = funnel(wk);
  const fP = wkP ? funnel(wkP) : {};
  const lbl = f.label || wk;

  // ── Arrays ──────────────────────────────────────────────────────────────
  const ldArr  = ALL_WEEKS.map(w => TOTAL_LEADS_WK[w] ?? slotBookedTotal(w));
  const bkArr  = funnelArr('new_bookings');
  const cdArr  = funnelArr('calls_done');
  const b2dArr = funnelArr('b2d_pct');

  const bkCur  = bkArr[activeWkIdx];  const bkPrev = bkArr[activeWkIdx+1];
  const cdCur  = cdArr[activeWkIdx];  const cdPrev = cdArr[activeWkIdx+1];
  const b2dCur = b2dArr[activeWkIdx]; const b2dPrev = b2dArr[activeWkIdx+1];

  const ldW  = wowPct(ldCur,  ldPrev);
  const bkW  = wowPct(bkCur,  bkPrev);
  const cdW  = wowPct(cdCur,  cdPrev);
  const b2dW = wowPp(b2dCur, b2dPrev);

  // ── Overall severity (worst of 4 signals) ──────────────────────────────
  const sevOrder = ['bad','warn','ok','gray'];
  const severities = [wowSev(ldW), wowSev(bkW), wowSev(cdW), ppSev(b2dW)];
  const overallSev = severities.reduce((worst, s) =>
    sevOrder.indexOf(s) < sevOrder.indexOf(worst) ? s : worst, 'gray');

  const statusIcon = {ok:'🟢', warn:'🟡', bad:'🔴', gray:'⚪'}[overallSev];
  const statusText = {
    ok:   'Demand healthy — all stages on track',
    warn: 'Watch — some stages softening',
    bad:  'Action needed — funnel breaking',
    gray: 'Tracking — no strong signal',
  }[overallSev];

  // ── Compact signal badges (5 quick checks replacing root cause) ─────────
  function signalBadge(icon, label, sev) {
    const s = {
      ok:   { bg:'#ecfdf5', col:'#059669', border:'#bbf7d0' },
      warn: { bg:'#fffbeb', col:'#d97706', border:'#fde68a' },
      bad:  { bg:'#fef2f2', col:'#dc2626', border:'#fecaca' },
      gray: { bg:'#f8fafc', col:'#64748b', border:'#e2e8f0' },
    }[sev] || { bg:'#f8fafc', col:'#64748b', border:'#e2e8f0' };
    return `<span style="font-size:10px;padding:3px 9px;border-radius:999px;font-weight:600;
        background:${s.bg};color:${s.col};border:1px solid ${s.border};
        white-space:nowrap;display:inline-flex;align-items:center;gap:3px;">${icon} ${label}</span>`;
  }

  const l2bCur  = ldCur  && bkCur  ? bkCur  / ldCur  * 100 : null;
  const l2bPrev = ldPrev && bkPrev ? bkPrev / ldPrev * 100 : null;
  const l2bW    = wowPp(l2bCur, l2bPrev);

  const ldBadge  = ldCur != null
    ? signalBadge('🎯', ldW != null ? `Leads ${ldW>=0?'▲':'▼'}${Math.abs(ldW).toFixed(0)}%` : `Leads ${fmtN(ldCur)}`, wowSev(ldW))
    : signalBadge('🎯', 'Leads: no data', 'gray');
  const l2bBadge = l2bCur != null
    ? signalBadge('📅', `L→B ${l2bCur.toFixed(0)}%`, l2bCur >= 25 ? 'ok' : l2bCur >= 15 ? 'warn' : 'bad')
    : signalBadge('📅', 'L→B: —', 'gray');
  const b2dBadge = signalBadge('📞',
    `B2D ${b2dCur != null ? b2dCur.toFixed(0)+'%' : '—'}`,
    b2dCur == null ? 'gray' : b2dCur >= 70 ? 'ok' : b2dCur >= 60 ? 'warn' : 'bad');

  // Worst city WoW
  let worstCity = null, worstCityWow = null;
  if (dataScope !== 'online') {
    const cityObj  = JDATA?.[dataScope]?.weekly_city?.[wk]  || {};
    const cityObjP = JDATA?.[dataScope]?.weekly_city?.[wkP] || {};
    for (const [city, d] of Object.entries(cityObj)) {
      if (!city || city === 'Online') continue;
      const w = wowPct(d.calls_done, cityObjP[city]?.calls_done);
      if (w != null && (worstCityWow == null || w < worstCityWow)) { worstCityWow = w; worstCity = city; }
    }
  }
  const cityBadge = worstCity
    ? signalBadge('🏙️', `${worstCity} ${worstCityWow!=null?(worstCityWow>=0?'▲':'▼')+Math.abs(worstCityWow).toFixed(0)+'%':''}`,
        worstCityWow != null ? (worstCityWow < -15 ? 'bad' : worstCityWow < -5 ? 'warn' : 'ok') : 'gray')
    : signalBadge('🏙️', 'Cities OK', 'gray');

  // Worst channel WoW
  let topDropCh = null, topDropW = Infinity;
  const chNow = JDATA?.[dataScope]?.weekly_channel?.[wk];
  if (chNow && wkP) {
    const chPrev = JDATA?.[dataScope]?.weekly_channel?.[wkP] || {};
    for (const [ch, d] of Object.entries(chNow)) {
      const w = wowPct(d.calls_done, chPrev[ch]?.calls_done);
      if (w != null && w < topDropW) { topDropW = w; topDropCh = ch; }
    }
  }
  const chBadge = topDropCh
    ? signalBadge('📡', `${topDropCh} ${topDropW>=0?'▲':'▼'}${Math.abs(topDropW).toFixed(0)}%`,

    : signalBadge('📡', 'Channels OK', 'gray');

  // ── KPI boxes ────────────────────────────────────────────────────────────
  function kpiBox(label, arr, fmtFn, isRate=false, subLbl='') {
    const cur  = arr[activeWkIdx];
    const prev = arr[activeWkIdx+1];
    const w    = isRate ? wowPp(cur, prev) : wowPct(cur, prev);
    const wCol = w == null ? '#94a3b8'
               : isRate  ? (w >  1.5 ? '#059669' : w < -1.5 ? '#dc2626' : '#d97706')

      <div style="margin-top:8px;">${wkChips(arr, activeWkIdx, fmtFn, isRate)}</div>
      ${subLbl ? `<div style="font-size:9px;color:#94a3b8;margin-top:3px;">${subLbl}</div>` : ''}
    </div>`;
  }

  const ldSub = ldArr[activeWkIdx] != null && TOTAL_LEADS_WK[wk] == null ? 'slot booked proxy' : '';
  const ldIsProxy = TOTAL_LEADS_WK[wk] == null && ldCur != null;
  const hasLeads = ldCur != null;

  // ── Funnel stages with inline sparklines ────────────────────────────────
  const avg8ld = avg8(ALL_WEEKS.map(w => TOTAL_LEADS_WK[w] ?? slotBookedTotal(w)), activeWkIdx);
  const avg8bk = avg8(bkArr, activeWkIdx);
  const avg8cd = avg8(cdArr, activeWkIdx);

  function funnelStage(label, val, wow, sparkArr, icon, avgVal) {
    const col      = wow == null ? '#6366f1' : wow >= 5 ? '#10b981' : wow >= -5 ? '#f59e0b' : '#ef4444';
    const wowColor = wow == null ? '#94a3b8' : wow >= 5 ? '#059669' : wow >= -5 ? '#d97706' : '#dc2626';
    const wowTxt   = wow != null
      ? `<span style="font-weight:700;color:${wowColor};">${wow>=0?'▲':'▼'}${Math.abs(wow).toFixed(1)}% WoW</span>`
      : `<span style="color:#94a3b8;font-size:10px;">—</span>`;
    let vsAvg = '';
    if (val != null && avgVal != null && avgVal > 0) {
      const diff = (val - avgVal) / avgVal * 100;
      const aC = diff > 3 ? '#059669' : diff < -3 ? '#dc2626' : '#94a3b8';
      const aBg = diff > 3 ? '#ecfdf5' : diff < -3 ? '#fef2f2' : '#f1f5f9';
      vsAvg = `<span style="font-size:9px;font-weight:600;color:${aC};background:${aBg};padding:1px 6px;border-radius:999px;">${diff>=0?'+':''}${diff.toFixed(0)}% vs avg</span>`;
    }
    const spk = sparkArr ? spark(sparkArr.slice(0,9).reverse(), col, 88, 20) : '';
    return `<div style="border:2px solid ${col}40;background:${col}06;border-radius:12px;padding:14px 10px;text-align:center;">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:6px;">${icon}&nbsp;${label}</div>
      <div style="font-size:22px;font-weight:800;color:#0f172a;line-height:1;margin-bottom:4px;">${val!=null?fmtN(val):'—'}</div>

      <div style="margin-top:4px;">${vsAvg}</div>
      <div style="margin-top:8px;display:flex;justify-content:center;">${spk}</div>
    </div>`;
  }

  function convArrow(rateLabel, rate, rateWow) {
    if (rate == null) return `<div style="display:flex;align-items:center;justify-content:center;font-size:22px;color:#e2e8f0;padding:0 2px;">→</div>`;
    const rc = rate >= 60 ? '#059669' : rate >= 35 ? '#d97706' : '#dc2626';
    const pc = rateWow == null ? '#94a3b8' : rateWow >= 0 ? '#059669' : '#dc2626';
    const ppStr = rateWow != null ? `<div style="font-size:10px;font-weight:600;color:${pc};">${rateWow>=0?'+':''}${rateWow.toFixed(1)}pp</div>` : '';
    return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:0 4px;min-width:54px;">
      <div style="font-size:14px;font-weight:800;color:${rc};">${rate.toFixed(0)}%</div>
      <div style="font-size:20px;color:#cbd5e1;line-height:1;">→</div>
      ${ppStr}
      <div style="font-size:8px;color:#94a3b8;text-align:center;line-height:1.4;max-width:52px;">${rateLabel}</div>
    </div>`;
  }

  // ── Auto-diagnosis ────────────────────────────────────────────────────────
  const T = -5;
  const ldSig = ldW != null && ldW < T;
  const bkSig = bkW != null && bkW < T;

  if (!hasLeads) {

    else if (bkSig && cdSig)              diag = {sev:'bad',  icon:'📉', title:'Bookings & calls both falling',
      text:`Bookings <strong>▼${Math.abs(bkW).toFixed(0)}%</strong> · Calls <strong>▼${Math.abs(cdW).toFixed(0)}%</strong> WoW. Top-funnel likely affected — open Efficiency tab to load L0 lead data.`};
    else if ((bkW??0)>=3 && (cdW??0)>=3) diag = {sev:'ok',   icon:'📈', title:'Both stages growing — healthy momentum',
      text:`Bookings ▲${(bkW??0).toFixed(0)}% · Calls ▲${(cdW??0).toFixed(0)}% WoW. Funnel executing well.`};
    else                                  diag = {sev:'gray', icon:'📊', title:'Within normal variance',
      text:`Bookings ${bkW!=null?(bkW>=0?'▲':'▼')+Math.abs(bkW).toFixed(0)+'%':'—'} · Calls ${cdW!=null?(cdW>=0?'▲':'▼')+Math.abs(cdW).toFixed(0)+'%':'—'} WoW. No significant break detected.`};

  function filteredVal(metric, wk) {

    let total = 0;

    }
    return total || null;
  }

  const disc  = filteredVal('queries_indirect', wkKey);
  const dir   = filteredVal('queries_direct',   wkKey);
