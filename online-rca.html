<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Online Demand RCA · source-wise</title>
<style>
  :root{--ink:#1a1a17;--mut:#5f5e5a;--line:#e6e4dc;--bg:#faf9f5;--card:#fff}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  header{padding:20px 24px;border-bottom:1px solid var(--line);background:var(--card)}
  header h1{margin:0;font-size:20px;font-weight:600}
  header p{margin:4px 0 0;color:var(--mut);font-size:13px}
  .wrap{max-width:1000px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .ctrlrow{display:flex;gap:14px;align-items:flex-end;margin:4px 0 10px;flex-wrap:wrap}
  .fld{display:flex;flex-direction:column;gap:3px}.fld label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut)}
  select{padding:7px 9px;font-size:13px;border:1px solid var(--line);border-radius:7px;background:#fff;min-width:150px;cursor:pointer}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:10px;margin:4px 0 14px}
  .mc{background:var(--bg);border-radius:8px;padding:10px 12px;cursor:pointer;border:1px solid transparent;border-left:3px solid #888}
  .mc.sel{border-color:var(--ink)}
  .mc .l{font-size:11px;color:var(--mut);display:flex;align-items:center;gap:5px}
  .mc .l i{width:9px;height:9px;border-radius:2px;display:inline-block}
  .mc .v{font-size:18px;font-weight:600;margin-top:3px}
  .mc .d{font-size:12px;font-weight:600;margin-top:1px}
  .up{color:#0f6e56}.down{color:#c0392b}.flat{color:var(--mut)}
  .chartbox{position:relative;height:300px;width:100%;margin-top:6px}
  .ins{margin-top:14px;padding:11px 13px;border-radius:8px;background:var(--bg);border-left:3px solid #0f6e56;font-size:13px;line-height:1.7}
  .ins b{color:var(--ink)} .ins .tag{font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.04em}
  .foot{color:var(--mut);font-size:12px;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Online demand RCA — source-wise</h1>
    <p>Online / national pool only (no physical clinic). Leads → bookings → done over 18 months. Break done by source or category; click a card to isolate.</p>
  </header>
  <div class="wrap"><div class="card" id="main"></div></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
const COL={Organic:'#0f6e56',Meta:'#993556',FB:'#993556',Google:'#ba7517',Other:'#888780',JustDial:'#534ab7',GMB:'#185fa5',Practo:'#1d9e75',WhatsApp:'#5dcaa5',SH:'#d85a30',STI:'#534ab7'};
const fmtM=m=>{const [y,mo]=m.split('-');return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+mo-1]+" '"+y.slice(2);};
const fmtN=v=>{if(v==null)return '';const a=Math.abs(v);if(a>=1000)return (v/1000).toFixed(a>=10000?0:1)+'k';return ''+Math.round(v);};
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const sum=a=>a.reduce((x,y)=>x+y,0);
let DB,M,isDark=matchMedia('(prefers-color-scheme: dark)').matches,chart;
const METLAB={leads:'Leads',bookings:'New bookings',done:'Done (completed SC)'};
async function boot(){
  if(window.ChartDataLabels)Chart.register(ChartDataLabels);
  DB=await (await fetch('data_online_rca.json')).json(); M=DB._meta.months;
  const c=document.getElementById('main');
  c.innerHTML=`<div class="ctrlrow">
    <div class="fld"><label>Metric</label><select id="met"><option value="leads">Leads</option><option value="bookings">New bookings</option><option value="done">Done (completed SC)</option></select></div>
    <div class="fld"><label>Break by</label><select id="brk"><option value="src">Source</option><option value="cat">Category (SH/STI)</option></select></div>
    <div class="fld"><label>Isolate</label><select id="grp"></select></div>
    <div class="fld"><label>View</label><select id="mode"><option value="abs">Absolute</option><option value="pct">% mix</option></select></div>
  </div>
  <div class="cards" id="cards"></div>
  <div class="chartbox"><canvas role="img" aria-label="Online demand over time"></canvas></div>
  <div class="ins" id="ins"></div>
  <div class="foot" id="foot"></div>`;
  const met=c.querySelector('#met'),brk=c.querySelector('#brk'),grp=c.querySelector('#grp'),mode=c.querySelector('#mode');
  function groupsObj(){ if(brk.value==='cat'){const k=met.value+'_cat'; if(DB[k]) return DB[k];} return DB[met.value]; }
  function keys(){const g=groupsObj();return Object.keys(g).sort((a,b)=>sum(g[b])-sum(g[a]));}
  function fillGrp(){grp.innerHTML='<option value="__all">All (stacked)</option>'+keys().map(k=>`<option value="${k}">${k}</option>`).join('');}
  function cards(){
    const g=groupsObj(),K=keys(),host=c.querySelector('#cards');
    host.innerHTML=K.map(k=>{const a=g[k],e=avg(a.slice(0,3)),r=avg(a.slice(-3)),d=e?Math.round((r-e)/e*100):0;
      const cls=d<=-12?'down':d>=12?'up':'flat';const col=COL[k]||'#888';
      return `<div class="mc${grp.value===k?' sel':''}" data-k="${k}" style="border-left-color:${col}">
        <div class="l"><i style="background:${col}"></i>${k}</div><div class="v">${fmtN(r)}<span style="font-size:11px;color:var(--mut)">/mo</span></div><div class="d ${cls}">${d>=0?'+':''}${d}%</div></div>`;}).join('');
    host.querySelectorAll('.mc').forEach(el=>el.onclick=()=>{grp.value=el.dataset.k;draw();});
  }
  function genInsight(g,K,isCat){
    const tot=M.map((_,i)=>K.reduce((s,k)=>s+g[k][i],0));
    const oE=avg(tot.slice(0,3)),oR=avg(tot.slice(-3)),oP=oE?Math.round((oR-oE)/oE*100):0;
    const peak=Math.max(...tot),pk=tot.indexOf(peak),offPk=peak?Math.round((oR-peak)/peak*100):0;
    const st=K.map(k=>{const a=g[k],e=avg(a.slice(0,3)),r=avg(a.slice(-3));return {k,e,r,d:e?Math.round((r-e)/e*100):0};}).filter(x=>x.r>=1);
    if(!st.length) return '';
    const byR=st.slice().sort((a,b)=>b.r-a.r),byD=st.filter(x=>x.e>=3).slice().sort((a,b)=>b.d-a.d);
    const dom=byR[0],grower=byD[0],decl=byD.length?byD[byD.length-1]:null,domShare=oR?Math.round(dom.r/oR*100):0;
    const dead=st.filter(x=>x.d<=-80).map(x=>x.k);
    const lbl=METLAB[met.value].toLowerCase();
    const dir=oP>=12?'up':oP<=-12?'down':'flat';
    let s=`<span class="tag" style="color:${dir==='down'?'#c0392b':dir==='up'?'#0f6e56':'#5f5e5a'}">Online ${lbl} ${dir==='up'?'growing':dir==='down'?'falling':'flat'}</span> &nbsp;`;
    s+=`total <b>${fmtN(oE)}→${fmtN(oR)}/mo</b> (${oP>=0?'+':''}${oP}% vs a year ago)`;
    s+= pk<M.length-3 ? `, peaked <b>${fmtN(peak)}</b> in ${fmtM(M[pk])} — now ${offPk>=0?'+':''}${offPk}% off peak. ` : `. `;
    s+=`<b>${dom.k}</b> is the biggest ${isCat?'category':'channel'} (${domShare}% of recent ${lbl}). `;
    if(grower&&grower.d>=15&&grower.k!==dom.k) s+=`Fastest-growing: <b>${grower.k}</b> (+${grower.d}%). `;
    if(decl&&decl.d<=-12) s+=`Falling: <b>${decl.k}</b> (${decl.d}%). `;
    if(dead.length) s+=`Effectively gone: ${dead.join(', ')}. `;
    return s;
  }
  function draw(){
    const g=groupsObj(),K=keys(),scope=grp.value,pct=mode.value==='pct'&&scope==='__all';
    let datasets;
    if(scope==='__all'){
      const totals=M.map((_,i)=>K.reduce((s,k)=>s+g[k][i],0));
      datasets=K.map((k,ki)=>({label:k,data:g[k].map((v,i)=>pct?(totals[i]?Math.round(v/totals[i]*100):0):v),backgroundColor:COL[k]||'#888',stack:'s',borderWidth:0,_top:ki===K.length-1,_tot:totals}));
    } else datasets=[{label:scope,data:g[scope]||M.map(()=>0),backgroundColor:COL[scope]||'#888',borderWidth:0,_single:true}];
    if(chart)chart.destroy();
    const grid=isDark?'rgba(255,255,255,.1)':'rgba(0,0,0,.07)',tick=isDark?'#b4b2a9':'#5f5e5a',single=scope!=='__all';
    chart=new Chart(c.querySelector('canvas'),{type:'bar',data:{labels:M.map(fmtM),datasets},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},
          datalabels:{color:isDark?'#e6e4dc':'#1a1a17',font:{size:9,weight:'500'},clip:false,
            display:ctx=> single || (!pct && ctx.dataset._top) ? 'auto' : false,
            anchor:'end',align:'top',
            formatter:(v,ctx)=> single ? fmtN(v) : (ctx.dataset._top ? fmtN(ctx.dataset._tot[ctx.dataIndex]) : '')},
          tooltip:{callbacks:{label:cx=>`${cx.dataset.label}: ${pct?cx.raw+'%':Math.round(cx.raw).toLocaleString()}`}}},
        scales:{x:{stacked:!single,grid:{color:grid},ticks:{color:tick,maxRotation:45,autoSkip:true,maxTicksLimit:12}},
          y:{stacked:!single,grid:{color:grid},ticks:{color:tick,callback:v=>pct?v+'%':fmtN(v)},title:{display:true,text:pct?'% of '+METLAB[met.value]:METLAB[met.value]+' / month',color:tick},beginAtZero:true,max:pct?100:undefined,grace:'14%'}}}});
    cards();
    c.querySelector('#ins').innerHTML=genInsight(g,K,brk.value==='cat'&&!!DB[met.value+'_cat']);
    const catNote=brk.value==='cat'&&!DB[met.value+'_cat']?` <b style="color:#c0392b">Category only available for Done</b> — showing source. `:'';
    c.querySelector('#foot').innerHTML=`${catNote}Online = null-city/national pool. Numbers on cards = last-3-mo avg/mo + Δ vs first 3 mo. ${brk.value==='cat'?'Category = diagnosis (SH=ED/PE, STI=GUI/PEP/etc, Other=rest), description-based.':'Leads source from main_source_wise_leads; bookings/done source via lead utm + Practo phone-match.'}`;
  }
  met.onchange=()=>{fillGrp();draw();};brk.onchange=()=>{fillGrp();draw();};grp.onchange=draw;mode.onchange=draw;
  fillGrp();draw();
}
window.addEventListener('DOMContentLoaded',boot);
</script>
</body>
</html>
