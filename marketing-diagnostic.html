<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Marketing Diagnostic · Allo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#EDF3F9;--sheet:#fff;--inset:#E4EDF6;--hover:#D2E1F1;--ink:#16232E;--ink2:#44566A;--muted:#7B8A9B;--faint:#A6B4C3;
    --line:#D5DFEA;--line2:#E5ECF3;--accent:#2C6CAE;--good:#1F6F5C;--bad:#C24A6B;--warn:#B8862E;--r:12px;
    --gbg:#E5F0EB;--rbg:#FCE8DA;--drbg:#FAD4DE;--abg:#FAF2E6;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 'Inter',-apple-system,sans-serif}
  .wrap{max-width:1340px;margin:0 auto;padding:16px 22px 80px}
  a.back{font-size:12.5px;color:var(--muted);text-decoration:none}a.back:hover{color:var(--accent)}
  h1{font-family:'Fraunces',serif;font-size:28px;font-weight:600;margin:8px 0 2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px;max-width:880px}
  .ctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .lab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  select{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:600;font-family:Inter;cursor:pointer}
  .fbtn{background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter;white-space:nowrap}
  .fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .modebtn{background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:10px 18px;font-size:14px;font-weight:700;color:var(--ink2);cursor:pointer;font-family:Inter;transition:all .15s}
  .modebtn:hover{border-color:var(--accent)} .modebtn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(31,111,92,.2)}
  .mbtn{background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 11px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter;white-space:nowrap}
  .mbtn:hover{border-color:var(--ink2)} .mbtn.on{background:var(--ink2);border-color:var(--ink2);color:#fff}
  .mbtn.primary{background:var(--ink);border-color:var(--ink)}   /* the sort metric: slightly darker, no heavy ring (header states "sorted by X") */
  .tbtn{background:#fff;border:1.5px solid var(--accent);border-radius:8px;padding:5px 11px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);cursor:pointer;font-family:Inter;white-space:nowrap;min-width:88px;text-align:left;box-shadow:0 1px 2px rgba(30,60,90,.08);transition:background .12s}
  .tbtn:hover{background:var(--accent);color:#fff} .tbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .ctltag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--faint);margin:0 0 3px 2px}
  @keyframes stageflash{0%{box-shadow:0 0 0 3px var(--accent)}100%{box-shadow:0 0 0 0 rgba(0,0,0,0)}}
  .stage.flash{animation:stageflash 1.1s ease-out}
  .cmpnote{color:var(--muted);font-size:11.5px;margin:-6px 0 14px}
  .chiprow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .ichip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter}
  .ichip b{color:var(--ink);margin-left:4px}.ichip.on{background:var(--accent);border-color:var(--accent);color:#fff}.ichip.on b{color:#fff}
  .ichip.zero{opacity:.4} .ichip:hover{border-color:var(--accent)}
  .densrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .ms{position:relative;display:inline-block}
  .mspanel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:40;background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:0 8px 26px rgba(0,0,0,.16);max-height:360px;overflow:auto;min-width:240px;padding:5px}
  .mspanel.on{display:block}
  .msq{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;margin-bottom:4px;font-family:Inter;box-sizing:border-box}
  .msact{display:flex;gap:12px;padding:4px 9px 6px;border-bottom:1px solid var(--line);margin-bottom:3px}.msact a{color:var(--accent);font-size:11px;font-weight:700;cursor:pointer}
  .msi{display:flex;align-items:center;gap:8px;padding:5px 9px;font-size:12.5px;cursor:pointer;border-radius:5px;white-space:nowrap}.msi:hover{background:var(--inset)} .msi .c{margin-left:auto;color:var(--muted);font-size:10.5px;font-family:'JetBrains Mono'}
  #docPanel{min-width:290px}
  .docclin{margin-left:auto;color:var(--muted);font-size:10.5px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;padding-left:10px}
  .mc{display:inline-block;min-width:34px;text-align:center;font-family:'JetBrains Mono';font-size:14px;font-weight:700;border-radius:6px;padding:5px 8px;margin-right:4px}
  .mc.base{background:var(--inset);color:var(--ink2);box-shadow:inset 0 0 0 1px var(--line)} .mc.red{background:var(--drbg);color:#99304F} .mc.lred{background:var(--rbg);color:#B05C22} .mc.amber{background:var(--abg);color:#8a6412} .mc.green{background:var(--gbg);color:var(--good)}
  .mc.now{background:#fff;color:var(--ink);font-weight:800;box-shadow:inset 0 0 0 1.5px var(--line)}
  .mcp{display:block;font-size:10.5px;font-weight:800;color:#2C6CAE;background:#e9f1fa;border-radius:5px;padding:2px 0;margin-top:3px;line-height:1.2}
  .bdchk{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-size:12.5px;font-weight:700;color:var(--ink2);cursor:pointer;white-space:nowrap;user-select:none}
  .bdchk:hover{border-color:var(--accent)} .bdchk.on{background:var(--accent);color:#fff;border-color:var(--accent)} .bdchk.on .dot{box-shadow:0 0 0 1.5px #fff}
  .bdgrp{display:flex;align-items:flex-start;gap:6px;padding:4px 0}
  .bdlc{flex:none;width:158px;display:flex;align-items:center;min-height:32px} .bdlc.bdglab{font-size:11.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .bdkids{flex:1 1 auto;display:flex;flex-wrap:wrap;gap:7px;align-items:center;min-height:32px}
  .bdchk.bdpar{border-color:var(--accent);color:var(--accent);background:#eef4fb} .bdchk.bdpar.on{background:var(--accent);color:#fff}
  .bdarrow{color:var(--faint);font-weight:800;font-size:15px;flex:none;margin-top:5px}
  .bdlvlgap{height:11px}
  .avgmk .mcp{display:inline-block;margin-left:5px;margin-top:0;padding:1px 5px;font-size:11px}
  .metpk{display:inline-flex;align-items:center;gap:3px;min-width:104px;font-family:Inter;font-size:12px;color:var(--ink2);margin-right:10px;vertical-align:middle}
  .metpk b{min-width:52px;text-align:center;font-weight:700}
  .marr{cursor:pointer;color:var(--muted);font-weight:800;font-size:16px;line-height:1;padding:1px 5px;border-radius:5px}
  .marr:hover{color:var(--accent);background:var(--hover)}
  .metpk.peek{color:var(--accent)} .metpk.peek b{color:var(--accent)}
  .condgrp{display:inline-flex;align-items:center;gap:7px;background:var(--sheet);border:1px solid var(--line);border-radius:9px;padding:3px 5px 3px 10px}
  .condlab{font-size:12px;font-weight:700;color:var(--ink2)}
  .cseg-wrap{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .cseg{border:none;background:var(--inset);padding:4px 9px;font-size:12px;cursor:pointer;color:var(--muted);font-family:Inter;font-weight:600;border-right:1px solid var(--line)}
  .cseg:last-child{border-right:none}
  .cseg.on{background:var(--accent);color:#fff;box-shadow:inset 0 0 0 1px var(--accent)}
  .cseg:hover:not(.on){background:var(--hover);color:var(--ink)}
  .subsel{margin-left:5px;font-size:11.5px;border:1px solid var(--line);border-radius:6px;padding:3px 6px;background:var(--inset);font-family:Inter;font-weight:600;color:var(--accent);cursor:pointer;vertical-align:middle}
  #filterbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px 10px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 13px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  #filterbar .fchips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex:1;min-width:0}
  .fchip{display:inline-flex;align-items:baseline;gap:5px;background:var(--inset);border-radius:7px;padding:3px 9px;font-size:12px;color:var(--ink)}
  .fchip .fk{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .fchip b{font-weight:700}
  .fwin{margin-left:auto;display:inline-flex;align-items:baseline;gap:6px;font-size:12px;color:var(--ink2);white-space:nowrap;font-family:'JetBrains Mono'}
  .fwin .fk{font-family:Inter;font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
  .fstale{color:var(--bad);font-weight:800;font-family:Inter}
  /* clean single-panel filters (ported from master2) */
  .ctlpanel{border:1px solid var(--line);border-radius:13px;background:#fff;padding:2px 15px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .ctltier{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:5px 0;border-bottom:1px dashed var(--line2);min-height:26px} .ctltier select{padding:4px 6px;font-size:12px}
  .ctltier:last-child{border-bottom:none}
  .ctltag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);min-width:60px;flex:0 0 60px}
  .ctltag.inl{min-width:auto;flex:none;margin-left:6px}
  .ctlsep{width:1px;height:18px;background:var(--line);margin:0 3px;flex:none}
  .chelp{font-size:11px;font-weight:500;color:var(--muted);margin-left:8px}
  .scopecount{margin-left:auto;font-size:11px;color:var(--muted);font-family:'JetBrains Mono';white-space:nowrap;padding-left:10px}
  .shareln{background:var(--inset);border-radius:8px;padding:7px 12px;margin:0 0 8px;font-size:12.5px;color:var(--ink2);display:inline-block}
  .shareln .son{color:var(--accent)} .shareln .smut{color:var(--muted);font-size:11.5px}
  .nvlbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--faint);margin-right:5px;letter-spacing:.03em}
  .avgmk{font-family:'JetBrains Mono';font-weight:800;font-size:14.5px;color:var(--ink2);white-space:nowrap;display:inline-flex;align-items:baseline;gap:0}
  .avgmk.avgbefore{margin-left:16px}.avgmk.avgnow{margin-left:10px}
  .crow .avgmk.avgbefore{margin-left:auto}   /* By-metric rows keep before/now pushed to the right */
  .avgmk.red{color:#99304F}.avgmk.lred{color:#B05C22}.avgmk.amber{color:#8a6412}.avgmk.green{color:var(--good)}
  .avgmk .avglab{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--faint);margin-right:4px;letter-spacing:.03em}
  .mlab{font-size:11px;color:var(--ink2);font-weight:600;margin-right:7px;display:inline-block;min-width:78px}
  .crow{display:flex;align-items:center;gap:6px;margin:3px 0;cursor:default;border-radius:7px;padding:2px 5px;transition:background .12s} .crow .mc,.crow .avgmk,.crow .zoomico{cursor:zoom-in}
  .crow:hover{background:var(--hover)}
  .crow .clab{width:210px;flex:none;box-sizing:border-box;font-size:11.5px;font-weight:600;color:var(--ink2);white-space:normal;line-height:1.3}
  /* By-metric row = uniform fixed columns so every row (and the header) lines up vertically: metric · change · weekly values · before→now */
  .crow .mc{width:58px;min-width:58px;flex:none;box-sizing:border-box;text-align:center;margin-right:4px}   /* change pill + each weekly value chip = one equal column width → header labels sit exactly above their data */
  .crow .avgmk.avgbefore{min-width:84px;margin-left:auto}.crow .avgmk.avgnow{min-width:70px}   /* before-avg & now pinned right, equal width across rows */
  /* column-name header row — same widths as the data rows so every label sits above its column */
  .crow.chead{cursor:default;border-bottom:1.5px solid var(--line);border-radius:0;margin:0 0 4px;padding-bottom:4px}
  .crow.chead:hover{background:none}
  .crow.chead .clab,.crow.chead .mc,.crow.chead .avgmk{font-size:9.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;color:var(--faint);font-family:inherit}
  .crow.chead .mc{background:none;box-shadow:none;padding:0;text-align:center}
  .crow .clab .mnm{color:var(--ink);font-weight:700} .crow .clab .mseg{color:var(--muted);font-weight:500;font-size:10.5px} .crow .clab .msub{color:var(--accent);font-weight:600;font-size:10.5px}
  .wc{font-size:10.5px;color:var(--bad);margin-left:6px} .fixt{font-size:10.5px;color:var(--muted);margin-left:8px}
  .slope{display:inline-block;font-weight:800;font-size:13px;margin-right:7px;width:13px;text-align:center;cursor:help}
  .slope.down{color:var(--bad)}.slope.amber{color:var(--warn)}.slope.up{color:var(--good)}.slope.flat{color:var(--faint)}
  .sp{cursor:zoom-in} .zsp{cursor:zoom-in;display:inline-block}
  .modal{position:fixed;inset:0;background:rgba(20,25,22,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.on{display:flex}
  .mbox{background:#fff;border-radius:14px;padding:18px 20px;max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .mhd{display:flex;justify-content:space-between;align-items:center;font-family:Fraunces;font-size:17px;font-weight:600;margin-bottom:6px;gap:12px}
  .mhd button{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted)}
  .pickbar{font-size:12px;color:var(--ink2);min-height:20px;margin:2px 0 6px}
  .pclear{color:var(--muted);cursor:pointer;font-size:11px;margin-left:6px} .pclear:hover{color:var(--bad)}
  .lgd{font-size:11px;color:var(--muted);margin-top:6px}
  /* ---- founder question chips ---- */
  .qgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:10px;margin-bottom:16px}
  .qc{background:var(--sheet);border:1px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;transition:box-shadow .15s}
  .qc:hover{box-shadow:0 4px 14px rgba(0,0,0,.07)}.qc.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(31,111,92,.14)}
  .qc .qn{font-size:26px;font-weight:700;font-family:'JetBrains Mono';line-height:1}
  .qc .ql{font-size:12px;color:var(--ink2);margin-top:5px;line-height:1.35}
  .qc.red .qn{color:var(--bad)}.qc.warn .qn{color:var(--warn)}.qc.acc .qn{color:var(--accent)}
  /* ---- scan table ---- */
  .fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto}
  table.fm{border-collapse:collapse;width:100%;font-size:13.5px;min-width:820px}
  table.fm th{font-family:'JetBrains Mono';font-size:13.5px;letter-spacing:.02em;text-transform:uppercase;color:var(--ink2);font-weight:700;text-align:center;padding:13px 12px;background:var(--inset);border-bottom:1px solid var(--line);white-space:nowrap}
  table.fm th:first-child{text-align:left}
  table.fm td{padding:11px 12px;text-align:center;border-bottom:1px solid var(--line2);white-space:nowrap;font-family:'JetBrains Mono';font-variant-numeric:tabular-nums}
  table.fm td:first-child{text-align:left;font-family:Inter;font-weight:600}
  table.fm tbody tr[onclick]{cursor:pointer}
  table.fm tbody tr[onclick]:hover td{background:var(--hover)}
  table.fm tbody tr[onclick]:hover td:first-child{color:var(--accent);font-weight:700}
  .drillco{color:var(--faint);font-weight:700;padding-left:6px}
  table.fm tbody tr[onclick]:hover .drillco{color:var(--accent)}
  tr.hide{display:none}
  .cell{display:inline-block;min-width:52px;border-radius:6px;padding:2px 7px;font-weight:700;font-size:12px}
  .cell.red{background:var(--drbg);color:#99304F}.cell.lred{background:var(--rbg);color:#B05C22}.cell.amber{background:var(--abg);color:#8a6412}.cell.green{color:var(--muted);background:transparent}
  .brk{font-family:Inter;font-weight:700;white-space:nowrap}.brk.red{color:var(--bad)}.brk.amber{color:var(--warn)}.brk.green{color:var(--good);font-weight:600;opacity:.85}.brk.none{color:var(--muted);font-weight:500}
  .why{font-family:Inter;color:var(--ink2);text-align:left!important;font-size:13px;white-space:normal;max-width:420px}
  td.chipzoom{cursor:zoom-in} table.fm tbody tr[onclick]:hover td.chipzoom{background:var(--inset)!important;box-shadow:inset 0 0 0 1.5px var(--line)}
  tr.totalrow td{background:var(--inset);border-bottom:2px solid var(--line)} tr.totalrow td:first-child{color:var(--accent);font-weight:800}
  /* ---- per-clinic funnel (drill) ---- */
  .verdict{background:var(--sheet);border:1px solid var(--line);border-left:4px solid var(--bad);border-radius:var(--r);padding:14px 18px;margin-bottom:16px}
  .verdict.ok{border-left-color:var(--good)}
  .verdict .vh{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:3px}.verdict .vd{color:var(--ink2);font-size:13px;line-height:1.55}
  .stagerow{display:flex;align-items:stretch;gap:14px}
  .stage{flex:1;background:var(--sheet);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:var(--r);padding:14px 18px;transition:box-shadow .15s;display:flex;align-items:flex-start;gap:14px;cursor:default}
  .stage:hover{box-shadow:0 3px 12px rgba(20,50,80,.08)}
  .stage.red{border-left-color:var(--bad)}
  .stage.amber{border-left-color:var(--warn)}
  .stage.green{border-left-color:var(--good)}
  .snum{width:32px;height:32px;flex:none;border-radius:9px;background:var(--inset);color:var(--accent);font-family:'JetBrains Mono';font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center}
  .stage.red .snum{background:var(--bad);color:#fff}.stage.amber .snum{background:var(--warn);color:#fff}.stage.green .snum{background:var(--good);color:#fff}
  .sbody{flex:1;min-width:0}.sname{font-weight:700;font-size:16px;color:var(--ink)}
  .sname .chan{font-weight:600;color:var(--muted);font-size:13px}
  .sname .caret{font-size:11px;color:var(--faint);margin-left:7px;font-weight:600;vertical-align:middle}
  .ssub{color:var(--muted);font-size:12px;margin-top:2px}
  .sval{text-align:right;font-family:'JetBrains Mono';flex:none;min-width:132px}.sval .v{font-size:24px;font-weight:700}.sval .d{font-size:12px;font-weight:700;margin-top:1px}
  .sval .zsp{margin-left:auto;display:block}
  .up{color:var(--good)}.down{color:var(--bad)}.flat{color:var(--muted)}
  svg.sp{display:block}
  .chip{flex:none;width:180px;border-radius:10px;padding:9px 12px;font-size:11.5px;line-height:1.4;border:1px solid var(--line);background:var(--sheet);color:var(--muted)}
  .chip.red{border-color:#E6C5C0;background:var(--rbg);color:#7a2b22}.chip.amber{border-color:#E8D6B0;background:var(--abg);color:#7a5a12}
  .chip b{display:block;font-size:12.5px;color:inherit;margin-bottom:1px}
  .dtag{font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle;white-space:nowrap}
  .dtag.red{background:var(--rbg);color:#a8352a}.dtag.amber{background:var(--abg);color:#8a6412}
  .conn{height:16px;width:2px;background:var(--line);margin:0 auto}
  .drill{background:var(--inset);border:1px solid var(--line);border-radius:10px;margin:3px 0 4px;padding:12px 16px;display:none}.drill.open{display:block}
  table.d{border-collapse:collapse;width:100%;font-size:12px;table-layout:fixed}
  table.d td,table.d th{padding:5px 6px;text-align:right;font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  table.d td:first-child,table.d th:first-child{text-align:left;font-family:Inter;font-weight:600;width:172px;white-space:normal;overflow-wrap:anywhere;padding-right:8px}
  table.d td:last-child,table.d th:last-child{width:96px}
  table.d thead th{font-size:8.5px!important}

<script>
let D=null, AGE={}, CURN=1, BASEN=1, MODE='ov', C=null, OPEN={}, QF='any', CITYF=new Set(), CLINF=new Set(), TIERF=new Set(), MATF=new Set(), DOCF=new Set(), CATF=new Set(), SEG='offline', DENSITY='compact', MET='', OVMODE='cockpit', METSEL=[], MCOND={}, MSUB={}, GRP='city', CLUB=1, GRAIN='weekly', SHOWSHARE=false, CATPCT=false, FCATDETAIL=false, FGCOLLAPSE=new Set(), FSCOLLAPSE=new Set(), CLUBAGG='sum', METFRESH=false, WEND=0, FPCT=false, SCOPE_ORDER=[];   // SCOPE_ORDER: dimensions in the order the user activated them → chips reorder so the active scope reads left-to-right   // FPCT: funnel "% of total" — show each breakdown row as its share of the stage headline   // WEND: weeks trimmed off the newest end → rebase "now" to an earlier week (0 = the true latest week)   // METFRESH: selection is still the untouched default → next pick replaces it (kills the "pinned bookings" feel)
let QD=null, FUNNEL2='sc';   // SC/FU/Combined — data sourced from master demand (data_quick_diag.json)
function setFunnel2(v){FUNNEL2=v;['sc','fu','all'].forEach(x=>{const b=$('fn2'+x);if(b)b.classList.toggle('on',x===v);});applyVariant();if(MODE==='cl'&&C){const s=C._slug;C=D.clinics[s]||C;}render();}
function applyVariant(){   // overlay the matched SC/FU/Combined numbers onto each clinic (remapped to D.weeks)
  if(!QD)return; _SRCU=null;   // booking sources vary by variant (FU has none) → recompute the source union
  const dw=D.weeks, qw=QD.weeks, qi=qw.map(w=>dw.indexOf(w));
  const rm=arr=>{const o=Array(dw.length).fill(null);(arr||[]).forEach((v,i)=>{const g=qi[i];if(g>=0)o[g]=v;});return o;};
  const rmObj=o=>{const r={};for(const k in o){r[k]=Array.isArray(o[k])?rm(o[k]):rmObj(o[k]);}return r;};
  for(const slug in QD.clinics){const c=D.clinics[slug];if(!c)continue;const v=QD.clinics[slug][FUNNEL2];if(!v)continue;
    if(!c._slug)c._slug=slug;
    c.bookings=rmObj(v.bookings); c.done=rmObj(v.done); c.availability=Object.assign({},c.availability,rmObj(v.availability));
    if(!c._velSplit&&c.velocity)c._velSplit={wday_days:c.velocity.wday_days,wend_days:c.velocity.wend_days,bk_wday:c.velocity.bk_wday,bk_wend:c.velocity.bk_wend,per_weekday:c.velocity.per_weekday,per_weekend:c.velocity.per_weekend};   // base data's SC weekday/weekend split (fallback if QD lacks it)
    c.velocity=rmObj(v.velocity); c.by_doctor=rmObj(v.by_doctor);
    const hasSplit=c.velocity.per_weekday&&c.velocity.per_weekday.some(x=>x!=null);   // QD now carries the split for sc/fu/all (appt day-of-week)
    if(!hasSplit&&FUNNEL2==='sc'&&c._velSplit)c.velocity=Object.assign({},c.velocity,c._velSplit);   // stale-data fallback: base SC split
    if(v.revenue)c.revenue=rmObj(v.revenue); if(v.purchased)c.purchased=rmObj(v.purchased);}
  buildOnlineClinics();   // rebuild the national 🌐 Online pseudo-clinic for this variant (SC/FU/All)
}
// availability / leads / bookings-per-active-day don't exist for online (national telehealth, no clinics/roster)
function naMetric(c,key){return (!!(c&&c._online)&&(key==='availability'||key==='demand'||key==='velocity'||key==='donevel'||key==='roster'))||(!!(c&&c._doctor)&&(key==='availability'||key==='demand'||key==='roster'))||(!!(c&&c._catrow)&&!CAT_OK.has(key))||(FUNNEL2==='fu'&&key==='demand');}   // category rows: only diagnosis-stage metrics have values   // doctor rows: leads/availability/roster are clinic-level; velocity (her bookings ÷ clinic active-days) IS shown   // doctor rows: leads/availability/velocity/roster are clinic-level, not per-doctor. follow-ups have no new-lead concept. NB: under a category filter, pre-diagnosis metrics (availability/leads/bookings/velocity/B2D) stay VISIBLE at full clinic level (tagged "all cats") rather than n/a — only the diagnosis metrics (CAT_OK) get sliced
const T1CITIES=new Set(['Bangalore','Mumbai','Navi Mumbai','Pune','Hyderabad','Chennai']);
function tierOf(city){return T1CITIES.has(city)?'T1':'T2';}
function clinMonths(slug){const d=AGE[D.clinics[slug].loc];if(!d)return null;const t=Date.parse(d);return isNaN(t)?null:(Date.now()-t)/(1000*60*60*24*30.44);}
function matBucket(m){return m==null?null:(m<3?'<3mo':m<6?'3-6mo':m<12?'6-12mo':'>1yr');}
function inCity(city){return !CITYF.size||CITYF.has(city);}
// online is national/by-city and has no clinic-level identity — CLINF (maturity + clinic multiselect) is offline slugs only.
// gate online by the cities implied by the current scope: explicit city filter, else the cities of the selected offline clinics, else all.
function effCityOK(city){if(CITYF.size)return CITYF.has(city);if(CLINF.size){for(const s of CLINF){const c=D.clinics[s];if(c&&!c._online&&c.city===city)return true;}return false;}return true;}
function inScope(slug){const c=D.clinics[slug];
  const on=!!c._online;
  if(SEG==='offline'&&on)return false;
  if(SEG==='online'&&!on)return false;
  if(on){
    if(c.city==='Online')return (SEG==='online'||SEG==='all')&&!CITYF.size&&!CLINF.size&&!TIERF.size;   // residual national online (unmapped providers) — only at national online/all scope
    // per-clinic online (attributed to the provider's home clinic) has a REAL city → same geo filters as offline
    if(TIERF.size&&!TIERF.has(tierOf(c.city)))return false;
    if(DOCF.size&&(!c.by_doctor||![...DOCF].some(dr=>c.by_doctor[dr]&&sum(c.by_doctor[dr].booked))))return false;
    if(CLINF.size)return CLINF.has(slug)||CLINF.has(slug.replace(/__online$/,''));
    return inCity(c.city);
  }
  if(!sum(c.bookings.total))return false;   // hide non-functional clinics (0 bookings across the window)
  if(TIERF.size&&!TIERF.has(tierOf(c.city)))return false;
  // maturity no longer gates here — togMat selects the matching clinics into CLINF (like master), so CLINF drives it
  if(DOCF.size&&(!c.by_doctor||![...DOCF].some(dr=>c.by_doctor[dr]&&sum(c.by_doctor[dr].booked))))return false;   // only clinics where the selected doctor actually books (hide 0-booking associations)
  return CLINF.size?CLINF.has(slug):inCity(c.city);}
// scoped-clinic accessor: when doctors are selected in scope, rescale the doctor-attributable metrics
// (bookings, book→done, done, purchased, revenue, bookings/active-day) to just those doctors' slices.
// availability & leads aren't doctor-attributable, so they stay clinic-level.
// category-scoped clinic: sum the diagnosis metrics (done/purchased/revenue → and derived D2P/RPC)
// over the selected categories, using each metric's by_cat. Non-diagnosis metrics are left as-is
// (naMetric marks them n/a). Doctor and category filters don't compose (no doctor×category cube),
// so a category slice takes precedence over the doctor rescale for the diagnosis metrics.
function catScope(c){if(!CATF.size)return c;
  const N=D.weeks.length,sel=[...CATF];

// readable inline multi-line chart — main series bold + value labels, breakdown thin; last ~12 weeks
function miniChart(series,labels,pct){
  const W=720,H=176,pad=36,padT=16,padB=28,SHOW=Math.min(labels.length,12),off=labels.length-SHOW;
  const L=labels.slice(off),n=L.length;
  const S=series.map(s=>({...s,v:s.arr.slice(off).map(x=>x==null||isNaN(x)?null:x)}));
  let all=[];S.forEach(s=>s.v.forEach(x=>{if(x!=null)all.push(x);}));
  const vmn=all.length?Math.min(...all):0,vmx=all.length?Math.max(...all):1,rng=(vmx-vmn)||Math.abs(vmx)||1;
  const lo=Math.max(0,vmn-rng*0.12),hi=vmx+rng*0.20;
  const x=i=>pad+i*(W-pad-10)/((n-1)||1),y=v=>H-padB-((v-lo)/((hi-lo)||1))*(H-padB-padT);
  const F=v=>v==null?'':(pct?Math.round(v)+'%':(Math.round(v*10)/10));
  let gl='';[0,.5,1].forEach(f=>{const yy=H-padB-(f*(H-padB-padT));gl+='<line x1="'+pad+'" y1="'+yy.toFixed(1)+'" x2="'+(W-10)+'" y2="'+yy.toFixed(1)+'" stroke="#EAE6DB"/><text x="2" y="'+(yy+3).toFixed(1)+'" font-size="10" fill="#B0A99A">'+F(lo+f*(hi-lo))+'</text>';});
  let xl='';L.forEach((l,i)=>{if(n>7&&i%2===1&&i!==n-1)return;xl+='<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" font-size="9.5" fill="#8A8A80" text-anchor="middle">'+l.split('–')[0].split(' → ')[0]+'</text>';});
  let lines='';S.forEach(s=>{let prev=null;s.v.forEach((val,i)=>{if(val==null){prev=null;return;}if(prev!=null)lines+='<line x1="'+x(prev.i).toFixed(1)+'" y1="'+y(prev.v).toFixed(1)+'" x2="'+x(i).toFixed(1)+'" y2="'+y(val).toFixed(1)+'" stroke="'+s.color+'" stroke-width="'+(s.main?2.6:1.4)+'" opacity="'+(s.main?1:0.8)+'"/>';prev={i,v:val};});});
  let mk='';S.forEach(s=>{if(!s.main)return;s.v.forEach((val,i)=>{if(val==null)return;const lab=(n>9&&i%2===1&&i!==n-1)?'':F(val);mk+='<circle cx="'+x(i).toFixed(1)+'" cy="'+y(val).toFixed(1)+'" r="2.7" fill="'+s.color+'"/>'+(lab?'<text x="'+x(i).toFixed(1)+'" y="'+(y(val)-7).toFixed(1)+'" font-size="10.5" fill="'+s.color+'" text-anchor="middle" font-weight="700">'+lab+'</text>':'');});});
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'+gl+xl+lines+mk+'</svg>';
}

function whyText(s,fb){
  if(fb<0){const amb=STAGES.findIndex(st=>s[st.key].st==='amber');return amb<0?'stable':'watch: '+STAGES[amb].name.toLowerCase()+' '+Math.round(s[STAGES[amb].key].d*100)+'%';}
  const st=STAGES[fb],x=s[st.key];let why='<b>'+st.diag.split(' — ')[0]+'</b> · '+cap(x.hm.nm)+' '+Math.round(x.d*100)+'%';

  list.sort((a,b)=>{const rc=redCount(b.s)-redCount(a.s);if(rc)return rc;const ic=issueCount(b.s)-issueCount(a.s);if(ic)return ic;const fa=brokenIdx(a.s)[0];const fb2=brokenIdx(b.s)[0];return (fa==null?9:fa)-(fb2==null?9:fb2);});
  const scopeMsg=selIdx>=0?(' with a <b>'+STAGES[selIdx].name+'</b> issue'):' to look at';
  h+='<div class="densrow"><span class="lab" style="text-transform:none;font-weight:600;color:'+(banner?'var(--good)':'var(--ink2)')+'">'+(banner||(list.length+' clinic'+(list.length===1?'':'s')+scopeMsg+' · '+healthy+' healthy · a clinic shows under <b>every</b> stage it is down on'))+'</span><button class="fbtn" onclick="toggleDens()">'+(DENSITY==='full'?'▾ hide Δ matrix':'▸ Δ matrix (all stages)')+'</button></div>';

      h+='<tr onclick="goClinic(\''+r.slug+'\')" title="open funnel"><td>'+r.c.disp+'</td>'+cells+'<td class="why">'+badges(s,selIdx)+'</td></tr>';});

    if(!list.length)h+='<tr><td colspan="3" style="color:var(--muted);padding:16px;text-align:left">Nothing here — healthy for this filter/city.</td></tr>';

function setMet(v){MODE='ov';
  if(OVMODE==='funnel')return jumpToStage(v);   // in funnel view the buttons are jump-to-stage nav
  // metric view: clean multi-select — first deliberate pick REPLACES the sticky default (so nothing stays pinned);
  // after that, clicking toggles a metric in/out. Sort = the first still-selected metric (shown in the header).
  const i=METSEL.indexOf(v);

function setTier(t){MODE='ov';const grp=FUNNEL_GROUPS.find(g=>g.tier===t);
  if(OVMODE==='funnel'){if(grp)FGCOLLAPSE.delete(grp.name);render();const el=$('fgrp-'+t);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});return;}

let _CHU=null;
function chanUnion(){if(_CHU)return _CHU;const s=new Set();Object.values(D.clinics).forEach(c=>{if(c.demand&&c.demand.by_channel)Object.keys(c.demand.by_channel).forEach(ch=>s.add(ch));});_CHU=[...s].sort();return _CHU;}
const KEEP_CHAN=['GMB','Google','Fb','Practo','Organic'],CHAN_ORDER=['GMB','Google','Fb','Practo','Organic','Others'];   // only these leads channels matter; everything else → Others
function chanKey(n){const l=(n||'').toLowerCase();if(l.indexOf('gmb')>=0)return 'GMB';if(l.indexOf('google')>=0)return 'Google';if(l==='fb'||l.indexOf('facebook')>=0||l.indexOf('meta')>=0||l.indexOf('insta')>=0)return 'Fb';if(l.indexOf('practo')>=0)return 'Practo';if(l.indexOf('organic')>=0)return 'Organic';return 'Others';}
function chanConsol(bc){const out={};for(const ch in (bc||{})){const k=chanKey(ch),a=bc[ch]||[];out[k]=(out[k]||Z()).map((v,i)=>v+(a[i]||0));}return out;}
// map our raw source buckets → the city-head sheet's labels (Meta→fb; Direct/none folded into Others)
const SRC_DISP={'Meta':'fb'};   // Meta→fb; 'Direct / none' kept as its OWN bucket (city-head sheet leaves direct/walk-in unclassified, not in Others)
function srcDisp(raw){return SRC_DISP[raw]||raw;}
function srcRecArr(rec,field){return Array.isArray(rec)?(field==='done'?[]:rec):((rec&&rec[field])||[]);}   // by_source[src] is now {booked,done,+grain}; legacy array = booked
function bookingSources(c){const bs=(c.bookings&&c.bookings.by_source)||{},out={};for(const raw in bs){const d=srcDisp(raw),a=srcRecArr(bs[raw],'booked');out[d]=out[d]?out[d].map((v,i)=>(v||0)+(a[i]||0)):a.slice();}return out;}   // booked per display-labelled source
function doneSources(c){const bs=(c.bookings&&c.bookings.by_source)||{},out={};for(const raw in bs){const d=srcDisp(raw),a=srcRecArr(bs[raw],'done');if(!a.some(v=>v))continue;out[d]=out[d]?out[d].map((v,i)=>(v||0)+(a[i]||0)):a.slice();}return out;}   // done per display-labelled source
// cross-cut: new / repeat patients WITHIN each source
function fieldSources(c,field){const bs=(c.bookings&&c.bookings.by_source)||{},out={};for(const raw in bs){const d=srcDisp(raw),a=srcRecArr(bs[raw],field);if(!a.some(v=>v))continue;out[d]=out[d]?out[d].map((v,i)=>(v||0)+(a[i]||0)):a.slice();}return out;}
let _SRCU=null;   // union of booking sources (display labels) across clinics, ordered by total volume
function srcUnion(){if(_SRCU)return _SRCU;const tot={};Object.values(D.clinics).forEach(c=>{const bs=bookingSources(c);for(const sr in bs)tot[sr]=(tot[sr]||0)+sum(bs[sr]||[]);});_SRCU=Object.keys(tot).sort((a,b)=>tot[b]-tot[a]);return _SRCU;}
// hierarchical category breakdown: MH · STI · SH (top), then SH · ED+ / ED+PE+ / PE+ / other (Oth+NOS)
// grouped category lines (MH · STI · SH) for the funnel stage breakdown
function catGroupLines(byCat){const Z=()=>new Array(D.weeks.length).fill(0),lines=[];
  CAT_TREE.forEach((g,k)=>{const o=Z();g.cats.forEach(ct=>{const a=(byCat||{})[ct];if(a)for(let i=0;i<a.length;i++)o[i]+=(a[i]||0);});if(sum(o))lines.push({label:g.name,arr:o,color:BPAL[k]});});return lines;}
// collapsible category tree for the funnel: top groups (MH·STI·SH) at depth 1; sub-categories at depth 2 only when FCATDETAIL is on
function catGroupTree(byCat){const Z=()=>new Array(D.weeks.length).fill(0),t=[];
  const S=cats=>{const o=Z();cats.forEach(ct=>{const a=(byCat||{})[ct];if(a)for(let i=0;i<a.length;i++)o[i]+=(a[i]||0);});return o;};
  CAT_TREE.forEach((g,k)=>{const arr=S(g.cats);if(!sum(arr))return;
    const kids=g.children&&g.children.some(ch=>sum(S(ch.cats))>0);
    t.push({label:g.name,arr,color:BPAL[k%BPAL.length],depth:1,grp:'cat',ck:kids?g.name:null});
    if(g.children)g.children.forEach((ch,j)=>{const ca=S(ch.cats);if(sum(ca))t.push({label:g.name+' · '+ch.name,arr:ca,color:BPAL[(k+j+2)%BPAL.length],depth:2,grp:'cat',par:g.name});});});
  return t;}
// category tree for the DONE stage: each row carries its % contribution of total done (current window). Sub-cats show when FCATDETAIL (collapsible).
function catContribTree(byCat,totArr){const Z=()=>new Array(D.weeks.length).fill(0),t=[];
  const S=cats=>{const o=Z();cats.forEach(ct=>{const a=(byCat||{})[ct];if(a)for(let i=0;i<a.length;i++)o[i]+=(a[i]||0);});return o;};
  const cwin=a=>{a=(a||[]).slice(0,a.length-WEND);return a.slice(-CURN).reduce((s,v)=>s+(v||0),0);};
  const den=cwin(totArr),share=a=>den?' · '+Math.round(100*cwin(a)/den)+'% of done':'';
  CAT_TREE.forEach((g,k)=>{const arr=S(g.cats);if(!sum(arr))return;
    const kids=g.children&&g.children.some(ch=>sum(S(ch.cats))>0);
    t.push({label:g.name+share(arr),arr,color:BPAL[k%BPAL.length],depth:1,grp:'cat',ck:kids?g.name:null});
    if(g.children)g.children.forEach((ch,j)=>{const ca=S(ch.cats);if(sum(ca))t.push({label:g.name+' · '+ch.name+share(ca),arr:ca,color:BPAL[(k+j+2)%BPAL.length],depth:2,grp:'cat',par:g.name});});});
  return t;}
// funnel category tree for a RATE stage (RPC/AOV/D2P): per-category rate = cat-numerator ÷ cat-denominator.
// top level MH·STI·SH; expands to sub-cats when FCATDETAIL. Rows with no denominator (e.g. doctor scope drops by_cat) are dropped upstream.
function catRateTree(numBc,denBc,mult,prefix){const Z=()=>new Array(D.weeks.length).fill(0),t=[];
  const S=(bc,cats)=>{const o=Z();cats.forEach(ct=>{const a=(bc||{})[ct];if(a)for(let i=0;i<a.length;i++)o[i]+=(a[i]||0);});return o;};
  CAT_TREE.forEach((g,k)=>{const den=S(denBc,g.cats);if(!sum(den))return;
    const kids=g.children&&g.children.some(ch=>sum(S(denBc,ch.cats))>0);
    t.push({label:(prefix||'')+g.name,arr:ratioArr(S(numBc,g.cats),den,mult),color:BPAL[k%BPAL.length],depth:1,rate:1,grp:'cat',ck:kids?(prefix||'')+g.name:null});
    if(g.children)g.children.forEach((ch,j)=>{const d2=S(denBc,ch.cats);if(sum(d2))t.push({label:(prefix||'')+g.name+' · '+ch.name,arr:ratioArr(S(numBc,ch.cats),d2,mult),color:BPAL[(k+j+2)%BPAL.length],depth:2,rate:1,grp:'cat',par:(prefix||'')+g.name});});});
  return t;}
function catBreakdown(allLabel,byCatFn,totalFn){const Z=()=>new Array(D.weeks.length).fill(0);
  const S=cats=>c=>{const bc=byCatFn(c)||{},o=Z();cats.forEach(ct=>{const a=bc[ct];if(a)for(let i=0;i<a.length;i++)o[i]+=(a[i]||0);});return o;};
  const out=[{label:allLabel,get:totalFn}];
  CAT_TREE.forEach(g=>{out.push({label:g.name,get:S(g.cats)});if(g.children)g.children.forEach(ch=>out.push({label:g.name+' · '+ch.name,get:S(ch.cats)}));});
  return out;}
// category breakdown for a RATE metric (RPC/AOV/D2P): each category row = its own rate (cat numerator ÷ cat denominator).
// rate:1 tells the % toggle to leave these alone — a "share of a ratio" is meaningless, so they keep their real value.
function catRateBreakdown(baseLabel,baseGet,numByCatFn,denByCatFn,mult){const Z=()=>new Array(D.weeks.length).fill(0);
  const S=(byCatFn,cats)=>c=>{const bc=byCatFn(c)||{},o=Z();cats.forEach(ct=>{const a=bc[ct];if(a)for(let i=0;i<a.length;i++)o[i]+=(a[i]||0);});return o;};
  const R=cats=>c=>ratioArr(S(numByCatFn,cats)(c),S(denByCatFn,cats)(c),mult);
  const out=[{label:baseLabel,get:baseGet,rate:1}];
  CAT_TREE.forEach(g=>{out.push({label:g.name,get:R(g.cats),rate:1});if(g.children)g.children.forEach(ch=>out.push({label:g.name+' · '+ch.name,get:R(ch.cats),rate:1}));});

// category rows for a metric that CAN'T be split by diagnosis (leads·bookings·availability·velocity·roster·B2D are pre-diagnosis).

      h+='<div class="stagerow" id="stage-'+s.key+'"><div class="stage '+e.status+'"><div class="snum">'+(++di)+'</div>'

// sum all in-scope clinics into one clinic-shaped object for a city-level (or any-scope) funnel
function aggregate(slugs,label){
  const N=D.weeks.length,Z=()=>new Array(N).fill(0),add=(a,b)=>a.map((v,i)=>(v||0)+(b?(b[i]||0):0));
  const a={disp:label,
    availability:{active_days:Z(),wday_days:Z(),wend_days:Z(),attend_days:Z(),attend_wday:Z(),attend_wend:Z(),hours:Z(),avail_hours:Z(),sc_slots:Z(),rpt_slots:Z(),rostered_hrs:Z(),shrink_hrs:Z(),opened_ash:Z(),net_sc_hrs_r:Z(),net_rpt_hrs:Z(),net_avail_hrs:Z(),dead_hrs:Z()},
    demand:{leads:Z(),by_channel:{},lead_book_pct:Z()},
    bookings:{total:Z(),new_tw:Z(),new_old:Z(),no1w:Z(),no2_4w:Z(),no1_3mo:Z(),no3mo:Z(),rebook:Z(),relapse:Z(),by_source:{}},
    done:{booked:Z(),done:Z(),book_done_pct:Z(),by_cat:Object.fromEntries(CATS.map(c=>[c,Z()]))},
    purchased:{total:Z(),by_cat:Object.fromEntries(CATS.map(c=>[c,Z()]))},
    revenue:Object.assign({rev:Z(),by_cat:Object.fromEntries(CATS.map(c=>[c,Z()]))},Object.fromEntries(['meds','test','ther','cons'].map(nm=>[nm,{tot:Z(),by_cat:Object.fromEntries(CATS.map(c=>[c,Z()]))}]))),
    doctors:{count:Z()},by_doctor:{},
    velocity:{bookings:Z(),wday_days:Z(),wend_days:Z(),bk_wday:Z(),bk_wend:Z(),done_wday:Z(),done_wend:Z(),per_active_day:Z(),per_weekday:Z(),per_weekend:Z(),done_per_weekday:Z(),done_per_weekend:Z()}};

  const _agCities=new Set(slugs.map(s=>(D.clinics[s]||{}).city).filter(Boolean));
  const GR=_agCities.size<=1?'city':'nat';
  slugs.forEach(sl=>{const c=CL(sl);
    ['active_days','wday_days','wend_days','attend_days','attend_wday','attend_wend','hours','avail_hours','sc_slots','rpt_slots','rostered_hrs','shrink_hrs','opened_ash','net_sc_hrs_r','net_rpt_hrs','net_avail_hrs','dead_hrs'].forEach(k=>a.availability[k]=add(a.availability[k],c.availability[k]));
    a.demand.leads=add(a.demand.leads,c.demand.leads);
    for(const ch in c.demand.by_channel)a.demand.by_channel[ch]=add(a.demand.by_channel[ch]||Z(),c.demand.by_channel[ch]);
    // headline 'total' uses the grain-distinct count; new/repeat sub-splits stay per-clinic (1st-time already distinct; only cross-clinic repeats slightly over-count)
    a.bookings.total=add(a.bookings.total,(c.bookings[GR]||c.bookings.total));
    ['new_tw','new_old','no1w','no2_4w','no1_3mo','no3mo','rebook','relapse'].forEach(k=>a.bookings[k]=add(a.bookings[k],c.bookings[k]));
    if(c.bookings.by_source)for(const sr in c.bookings.by_source){const rec=c.bookings.by_source[sr]||{};const bk=Array.isArray(rec)?rec:(rec['booked_'+GR]||rec.booked||Z());const dn=Array.isArray(rec)?Z():(rec['done_'+GR]||rec.done||Z());const nw=Array.isArray(rec)?Z():(rec.new||Z());const rp=Array.isArray(rec)?Z():(rec.repeat||Z());const t=a.bookings.by_source[sr]=a.bookings.by_source[sr]||{booked:Z(),done:Z(),new:Z(),repeat:Z(),fresh:Z(),older:Z(),never:Z(),relapse:Z()};t.booked=add(t.booked,bk);t.done=add(t.done,dn);t.new=add(t.new,nw);t.repeat=add(t.repeat,rp);['fresh','older','never','relapse'].forEach(f=>{t[f]=add(t[f],Array.isArray(rec)?Z():(rec[f]||Z()));});}   // carry the per-source sub-bucket splits (fresh/older/never/relapse × channel)
    a.done.booked=add(a.done.booked,(c.done['booked_'+GR]||c.done.booked));a.done.done=add(a.done.done,(c.done['done_'+GR]||c.done.done));
    if(c.done._all!=null)a.done._all=add(a.done._all||Z(),c.done._all);   // carry the all-category total for contribution %
    CATS.forEach(ct=>a.done.by_cat[ct]=add(a.done.by_cat[ct],(c.done.by_cat||{})[ct]));
    if(c.purchased){a.purchased.total=add(a.purchased.total,c.purchased.total);if(c.purchased._all!=null)a.purchased._all=add(a.purchased._all||Z(),c.purchased._all);CATS.forEach(ct=>a.purchased.by_cat[ct]=add(a.purchased.by_cat[ct],(c.purchased.by_cat||{})[ct]));}
    if(c.revenue){a.revenue.rev=add(a.revenue.rev,c.revenue.rev);['pres_val','pres_meds','pres_test','pres_ther'].forEach(pk=>a.revenue[pk]=add(a.revenue[pk]||Z(),c.revenue[pk]||Z()));if(c.revenue._all!=null)a.revenue._all=add(a.revenue._all||Z(),c.revenue._all);CATS.forEach(ct=>a.revenue.by_cat[ct]=add(a.revenue.by_cat[ct],(c.revenue.by_cat||{})[ct]));
      ['meds','test','ther','cons'].forEach(nm=>{const L=c.revenue[nm];if(L){a.revenue[nm].tot=add(a.revenue[nm].tot,L.tot);if(L._all!=null)a.revenue[nm]._all=add(a.revenue[nm]._all||Z(),L._all);CATS.forEach(ct=>a.revenue[nm].by_cat[ct]=add(a.revenue[nm].by_cat[ct],(L.by_cat||{})[ct]));}});}
    if(c.by_doctor)for(const dr in c.by_doctor){const bd=a.by_doctor[dr]=a.by_doctor[dr]||{booked:Z(),done:Z(),purchased:Z(),rev:Z()};['booked','done','purchased','rev'].forEach(k=>bd[k]=add(bd[k],c.by_doctor[dr][k]));}
    ['bk_wday','bk_wend','done_wday','done_wend'].forEach(k=>a.velocity[k]=add(a.velocity[k],c.velocity[k]));});
  // (per-clinic online buckets are real D.clinics entries now — their by_doctor is merged by the normal loop above; no special national merge needed)
  // active doctors = DISTINCT providers with a booking that week (from the scoped by_doctor) — no double-count across clinics, responds to every filter
  a.doctors.count=Array.from({length:N},(_,i)=>Object.values(a.by_doctor).filter(bd=>(bd.booked[i]||0)>0).length);

  a.done.book_done_pct=a.done.booked.map((B,i)=>B?Math.round(100*(((a.done._all&&a.done._all[i])||a.done.done[i])||0)/B):null);   // B2D uses full done (_all) so a category slice doesn't deflate the conversion
  a.velocity.bookings=a.bookings.total;a.velocity.wday_days=a.availability.wday_days;a.velocity.wend_days=a.availability.wend_days;
  a.velocity.per_active_day=rate(a.bookings.total,a.availability.active_days);

  a.velocity.per_weekend=rate(a.velocity.bk_wend,a.availability.wend_days);
  a.velocity.done_per_weekday=rate(a.velocity.done_wday,a.availability.wday_days);
  a.velocity.done_per_weekend=rate(a.velocity.done_wend,a.availability.wend_days);
  a.slots={};SLOT_F.forEach(f=>a.slots[f]=Z());   // slot-level (SC offline) summed across the scoped clinics
  slugs.forEach(s=>{const c=D.clinics[s];if(c&&c.slots)SLOT_F.forEach(f=>a.slots[f]=add(a.slots[f],c.slots[f]));});
  a.rx={};RX_F.forEach(f=>a.rx[f]=Z());   // prescribed→purchase per line summed across the scoped clinics
  slugs.forEach(s=>{const c=D.clinics[s];if(c&&c.rx)RX_F.forEach(f=>a.rx[f]=add(a.rx[f],c.rx[f]));});
  return a;
}

    availability:{active_days:NA(),wday_days:NA(),wend_days:NA(),attend_days:NA(),attend_wday:NA(),attend_wend:NA(),hours:NA(),avail_hours:NA()},
    demand:{leads:NA(),by_channel:{},lead_book_pct:NA(),has_leads:false},

let ONLINE_CLIN={sc:{},fu:{},all:{}};
async function loadOnlineDoc(){
  const g=async u=>{try{return await fetch(u+'?v='+Date.now()).then(r=>r.ok?r.json():null);}catch(e){return null;}};
  const [scb,fub,sce,fue]=await Promise.all([g('data_sc_bookings_online.json'),g('data_fu_bookings_online.json'),g('data_d2p_econ_online.json'),g('data_fu_econ_online.json')]);
  const dw=D.weeks,Zz=()=>new Array(dw.length).fill(0);
  const rm=(arr,cw)=>{const o=Zz();(cw||[]).forEach((w,i)=>{const gi=dw.indexOf(w);if(gi>=0)o[gi]=(arr||[])[i]||0;});return o;};
  const rev4=(src,ew)=>['meds_val','test_val','ther_val','cons_val'].reduce((a,fl)=>a.map((v,i)=>v+rm((src||{})[fl],ew)[i]),Zz());
  function variant(bk,ec){const out={},bw=bk&&bk._meta.weeks,ew=ec&&ec._meta.weeks;

      const bd=bc.by_doctor||{},ed=ecl.by_doctor||{};
      new Set([...Object.keys(bd),...Object.keys(ed)]).forEach(dr=>{gg.by_doctor[dr]={booked:rm((bd[dr]||{}).booked,bw),done:rm((bd[dr]||{}).done,bw),purchased:rm((ed[dr]||{}).purchased,ew),rev:rev4(ed[dr],ew)};});});
    return out;}
  ONLINE_CLIN.sc=variant(scb,sce);ONLINE_CLIN.fu=variant(fub,fue);
  const all={};[ONLINE_CLIN.sc,ONLINE_CLIN.fu].forEach(v=>{for(const k in v){const s=v[k],gk=all[k]=all[k]||{booked:Zz(),done:Zz(),purchased:Zz(),rev:Zz(),by_doctor:{}};
    ['booked','done','purchased','rev'].forEach(f=>gk[f]=gk[f].map((x,i)=>x+s[f][i]));

  const rm=arr=>{const o=Zz();(sw||[]).forEach((w,i)=>{const gi=dw.indexOf(w);if(gi>=0)o[gi]=(arr||[])[i]||0;});return o;};
  const slugOf=k=>{const p=k.split('|');return ((p[1]||'')+'_'+p[0]).toLowerCase().replace(/ /g,'_');};
  for(const k in sl.clinics){const c=sl.clinics[k],slug=slugOf(k);if(!D.clinics[slug])continue;

}
// Prescribed→Purchase per line (meds/tests/therapy), SC offline — per clinic + by_doctor
const RX_F=['meds_pres','meds_purch','test_pres','test_purch','ther_pres','ther_purch','any_pres','any_purch'];
async function loadRx(){
  let rx=null;try{rx=await fetch('data_prescribe.json?v='+Date.now()).then(r=>r.ok?r.json():null);}catch(e){}
  if(!rx)return;
  const dw=D.weeks,Zz=()=>new Array(dw.length).fill(0),rw=rx._meta.weeks;
  const rm=arr=>{const o=Zz();(rw||[]).forEach((w,i)=>{const gi=dw.indexOf(w);if(gi>=0)o[gi]=(arr||[])[i]||0;});return o;};
  const slugOf=k=>{const p=k.split('|');return ((p[1]||'')+'_'+p[0]).toLowerCase().replace(/ /g,'_');};
  for(const k in rx.clinics){const c=rx.clinics[k],slug=slugOf(k);if(!D.clinics[slug])continue;
    const s={by_doctor:{}};RX_F.forEach(f=>s[f]=rm(c[f]));
    for(const dr in (c.by_doctor||{})){const dd={};RX_F.forEach(f=>dd[f]=rm(c.by_doctor[dr][f]));s.by_doctor[dr]=dd;}
    D.clinics[slug].rx=s;}
}
async function boot(){
  try{D=await fetch('data_weekly_diag.json?v='+Date.now()).then(r=>r.json());}
  catch(e){$('root').innerHTML='<div class="err">Failed to load data_weekly_diag.json</div>';return;}
  try{AGE=await fetch('data_clinic_age.json?v='+Date.now()).then(r=>r.ok?r.json():{open:{}}).then(a=>(a&&a.open)||{});}catch(e){AGE={};}
  try{QD=await fetch('data_quick_diag.json?v='+Date.now()).then(r=>r.ok?r.json():null);}catch(e){QD=null;}
  if(QD)applyVariant();   // master-demand matched numbers become the source of truth (SC default)
  buildOnlineClinics();
  await loadOnlineDoc();
  await loadSlots();   // attach SC-offline slot-level data (total_slots/completed/no_show/reschedule) to each clinic + by_doctor
  await loadRx();   // attach prescribed→purchase per line (meds/tests/therapy) to each clinic + by_doctor
  buildOnlineClinics();   // now that per-provider online data is loaded, build the per-clinic online buckets
  ALLCITIES=[...new Set(Object.values(D.clinics).filter(c=>!c._online&&c.city!=='Online').map(c=>c.city))].sort((a,b)=>{const ta=tierOf(a)==='T1',tb=tierOf(b)==='T1';return ta!==tb?(ta?-1:1):a.localeCompare(b);});   // exclude the Online pseudo-city; Tier-1 cities first so heads click fast
  try{const saved=JSON.parse(localStorage.getItem('wd_city')||'[]');if(Array.isArray(saved))saved.forEach(c=>{if(ALLCITIES.includes(c))CITYF.add(c);});}catch(e){}
  $('cityBtn').textContent=cityBtnLabel();$('cityBtn').classList.toggle('on',!!CITYF.size);
  $('clinBtn').textContent=clinBtnLabel();
  document.addEventListener('click',e=>{if(!e.target.closest('.ms'))closePanels();});
  fillSel('curn',curPresetsC(),CURN,'weeks');updateBasenLbl();fillWkEnd();
  C=D.clinics[Object.keys(D.clinics)[0]];syncMode();render();
}
window.addEventListener('DOMContentLoaded',boot);
</script>
