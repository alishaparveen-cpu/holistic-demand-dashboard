<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Demand Review · Allo Health</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
/* ── Base ───────────────────────────────────────────────────────────────── */
:root{
  --ink:#0f172a; --ink2:#1e293b; --muted:#64748b; --faint:#94a3b8;
  --line:#e2e8f0; --bg:#f1f5f9;
  --red:#ef4444; --amber:#f59e0b; --green:#10b981; --purple:#6366f1;
}
html,body{background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;margin:0;}

/* ── Nav ────────────────────────────────────────────────────────────────── */
.nav-link{font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border-radius:6px;transition:background .12s;}
.nav-link:hover{background:#f1f5f9;color:#0f172a;}
.nav-link.active{font-weight:700;color:#0f172a;background:#f1f5f9;}

/* ── Card ───────────────────────────────────────────────────────────────── */
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(15,23,42,.05);}
.sect{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,.05);margin-bottom:16px;overflow:hidden;}
.sect>summary{list-style:none;cursor:pointer;padding:13px 18px;display:flex;align-items:center;gap:12px;user-select:none;}
.sect>summary::-webkit-details-marker{display:none;}
.sect>summary:hover{background:#fafaff;}
.sect>summary .sect-t{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;}
.sect>summary .sect-s{font-size:11.5px;color:#64748b;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sect>summary .sect-cv{margin-left:auto;color:#94a3b8;font-size:11px;transition:transform .15s;flex-shrink:0;}
.sect[open]>summary .sect-cv{transform:rotate(90deg);}
.sect[open]>summary{border-bottom:1px solid var(--line);}
.sect-body{padding:14px 16px;}

/* ── Hero: Source drops ─────────────────────────────────────────────────── */
.hero-src{
  background:linear-gradient(140deg,#0f172a 0%,#1e293b 55%,#162240 100%);
  border:1px solid #2d3e56;
  border-radius:16px;
  padding:24px 28px;
  margin-bottom:20px;
  color:#f1f5f9;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
}
.hero-src-divider{height:1px;background:rgba(255,255,255,.07);margin:10px 0 14px;}

/* ── Source label row ───────────────────────────────────────────────────── */
.src-label-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.src-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.src-name{font-size:13px;font-weight:800;color:#f1f5f9;}
.src-count-badge{font-size:10px;font-weight:600;padding:1px 8px;border-radius:999px;background:rgba(255,255,255,.1);color:#94a3b8;}

/* ── Clinic chips (hero) ────────────────────────────────────────────────── */
.clinic-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:8px;border:1px solid;
  margin:3px 4px 3px 0;font-size:11px;cursor:pointer;
  transition:opacity .12s, transform .1s;white-space:nowrap;
}
.clinic-chip:hover{opacity:.82;transform:translateY(-1px);}
.chip-crit{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45);}
.chip-bad {background:rgba(239,68,68,.10);border-color:rgba(239,68,68,.28);}
.chip-warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);}
.chip-cname{font-weight:700;color:#f1f5f9;}
.chip-city{color:#64748b;font-size:10px;}
.chip-pct-crit{font-weight:800;color:#fca5a5;font-size:12px;}
.chip-pct-bad{font-weight:800;color:#fda4af;font-size:12px;}
.chip-pct-warn{font-weight:800;color:#fcd34d;font-size:12px;}
.chip-meta{color:#4b5563;font-size:10px;}
.chip-both{font-size:9px;font-weight:700;color:#f87171;background:rgba(239,68,68,.25);padding:0 5px;border-radius:3px;}

/* ── Stat cards ─────────────────────────────────────────────────────────── */
.stat-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 20px;text-align:center;border-left-width:3px;}
.stat-num{font-size:28px;font-weight:800;color:var(--ink);line-height:1;}
.stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:4px;}

/* ── Cat pills ──────────────────────────────────────────────────────────── */
.cat-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:10px;font-weight:700;white-space:nowrap;}
.cat-drop-both{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5;}
.cat-drop-week{background:#fff7ed;color:#9a3412;border:1px solid #fdba74;}
.cat-recovering{background:#fffbeb;color:#92400e;border:1px solid #fcd34d;}
.cat-okay{background:#ecfdf5;color:#065f46;border:1px solid #6ee7b7;}
.cat-insufficient{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;}

/* ── City cards ─────────────────────────────────────────────────────────── */
.city-card{
  background:#fff;border:1px solid var(--line);border-radius:12px;
  padding:16px;border-left-width:4px;cursor:pointer;
  transition:box-shadow .15s, transform .15s;
}
.city-card:hover{box-shadow:0 4px 20px rgba(15,23,42,.1);transform:translateY(-2px);}
.city-card.city-active{outline:2px solid #6366f1;outline-offset:1px;}

/* ── Table ──────────────────────────────────────────────────────────────── */
.tbl{width:100%;border-collapse:separate;border-spacing:0;}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
  padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line);
  text-align:left;white-space:nowrap;}
.tbl th.r{text-align:right;}
.tbl td{padding:9px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr.clinic-row:hover td{background:#fafafa;}
.tbl tr.detail-row td{background:#f8fafc;padding:0;}
.cell-r{text-align:right;}

/* ── Severity left border ───────────────────────────────────────────────── */
.sev-crit td:first-child{border-left:3px solid #ef4444;}
.sev-bad  td:first-child{border-left:3px solid #f97316;}
.sev-warn td:first-child{border-left:3px solid #f59e0b;}
.sev-ok   td:first-child{border-left:3px solid #10b981;}
.sev-na   td:first-child{border-left:3px solid #e2e8f0;}

/* ── Inline source chips (table) ────────────────────────────────────────── */
.sc{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;white-space:nowrap;margin:1px;}
.sc-ok  {background:#ecfdf5;color:#059669;}
.sc-warn{background:#fffbeb;color:#b45309;}
.sc-bad {background:#fef2f2;color:#dc2626;}
.sc-flat{background:#f1f5f9;color:#64748b;}

/* ── Toggle / filter buttons ────────────────────────────────────────────── */
.fbtn{padding:4px 12px;font-size:12px;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:#fff;color:var(--ink);transition:all .12s;}
.fbtn:hover{border-color:#94a3b8;}
.fbtn.active{background:#0f172a;color:#fff;border-color:#0f172a;}

/* ── Tier badges ────────────────────────────────────────────────────────── */
.t1b{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#ede9fe;color:#6d28d9;}
.t2b{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#e0f2fe;color:#0369a1;}

/* ── Expand icon ────────────────────────────────────────────────────────── */
.xicon{display:inline-block;font-size:9px;color:#94a3b8;margin-right:4px;transition:transform .15s;user-select:none;}
.xicon.open{transform:rotate(90deg);}

/* ── Section header ─────────────────────────────────────────────────────── */
.sec-hdr{font-size:14px;font-weight:700;color:var(--ink);}
.sec-sub{font-size:11px;color:var(--muted);}

/* ── Copy toast ─────────────────────────────────────────────────────────── */
#copyToast{display:none;padding:6px 14px;background:rgba(16,185,129,.15);color:#059669;
  border:1px solid rgba(16,185,129,.3);border-radius:6px;font-size:11px;font-weight:600;
  margin-bottom:10px;}
</style>
</head>
<body>
<script>if(!sessionStorage.getItem('allo_dash_auth'))location.replace('index.html');</script>

<!-- ── NAV ───────────────────────────────────────────────────────────────── -->
<div style="background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;">
  <div style="max-width:1320px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
    <a href="index.html"            class="nav-link">← Dashboard</a>
    <span style="color:#e2e8f0;">|</span>
    <a href="overview.html"         class="nav-link">Overview</a>
    <a href="diagnostic.html"       class="nav-link">Diagnostic</a>
    <a href="category.html"         class="nav-link">Category</a>
    <a href="city.html"             class="nav-link">City</a>
    <a href="clinic.html"           class="nav-link">Clinics</a>
    <a href="channel.html"          class="nav-link">Channel</a>
    <a href="efficiency.html"       class="nav-link">Efficiency</a>
    <a href="demand-review.html"    class="nav-link active">Demand Review</a>
    <a href="comparison.html"       class="nav-link">Comparison →</a>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
      <span id="genAt" style="font-size:10px;color:#94a3b8;"></span>
      <button id="refreshBtn" onclick="refreshData()"
        style="display:flex;align-items:center;gap:5px;padding:5px 13px;font-size:11px;font-weight:600;
               background:#0f172a;color:#fff;border:none;border-radius:7px;cursor:pointer;transition:opacity .15s;"
        title="Re-runs build_clinic_data.py against Redshift (needs AWS SSO)">
        <span id="refreshIcon">🔄</span> Refresh Data
      </button>
    </div>
  </div>
</div>

<div id="root" style="max-width:1320px;margin:0 auto;padding:24px 20px 80px;">
  <div style="text-align:center;padding:60px;color:#94a3b8;">Loading demand review data…</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   CONSTANTS & HELPERS
   ═══════════════════════════════════════════════════════════════════════════ */
const T1 = new Set(['Bangalore','Mumbai','Chennai','Hyderabad','Pune','Delhi']);
function cityTier(c) { return T1.has(c) ? 'T1' : 'T2'; }
function tierBadge(c) {
  return cityTier(c) === 'T1'
    ? '<span class="t1b">T1</span>'
    : '<span class="t2b">T2</span>';
}

function catPill(cat) {
  const cls = {
    'Drop Both Week':'cat-drop-both','Drop this week':'cat-drop-week',
    'Recovering':'cat-recovering','Okay':'cat-okay','Insufficient Data':'cat-insufficient',
  }[cat] || 'cat-insufficient';
  const icon = {'Drop Both Week':'🔴','Drop this week':'🟠','Recovering':'🟡','Okay':'✅','Insufficient Data':'⬜'}[cat]||'';
  return `<span class="cat-pill ${cls}">${icon} ${cat}</span>`;
}

function fmt(n, d=0) {
  if (n == null) return '—';
  return typeof n === 'number' ? n.toFixed(d) : String(n);
}

function gapBadge(pct) {
  if (pct == null) return '<span style="color:#94a3b8;">—</span>';
  const sign = pct >= 0 ? '+' : '';
  const col = pct >= -5 ? '#059669' : pct >= -15 ? '#d97706' : '#dc2626';
  const bg  = pct >= -5 ? '#ecfdf5' : pct >= -15 ? '#fffbeb' : '#fef2f2';
  return `<span style="display:inline-flex;align-items:center;padding:1px 7px;border-radius:5px;background:${bg};color:${col};font-weight:700;font-size:11px;">${sign}${pct.toFixed(1)}%</span>`;
}

/* Visual horizontal bar: actual vs expected */
function actExpBar(act, exp, label='') {
  if (act == null) return '<span style="color:#94a3b8;font-size:12px;">—</span>';
  const expV = (exp != null && exp > 0) ? exp : Math.max(act, 1);
  const fillPct = Math.min((act / expV) * 100, 100);
  const col = fillPct >= 90 ? '#10b981' : fillPct >= 72 ? '#f59e0b' : '#ef4444';
  const expLabel = exp != null ? fmt(exp,0) : '—';
  return `
  <div style="min-width:120px;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;">
      <span style="font-size:13px;font-weight:800;color:${col};">${act}</span>
      <span style="font-size:10px;color:#94a3b8;">/ ${expLabel} exp</span>
    </div>
    <div style="background:#f1f5f9;border-radius:4px;height:5px;overflow:hidden;position:relative;">
      <div style="width:${fillPct}%;background:${col};height:5px;border-radius:4px;transition:width .3s;"></div>
    </div>
  </div>`;
}

/* Source order & names */
const SRC_ORDER = ['gmb','google','practo','organic','fb','directwalkin','other'];
const SRC_NAMES = {gmb:'GMB',google:'Google',practo:'Practo',organic:'Organic',fb:'FB',directwalkin:'Walk-in',other:'Other'};
const SRC_COLORS = {gmb:'#4ade80',google:'#60a5fa',practo:'#f472b6',organic:'#a78bfa',fb:'#fb923c',directwalkin:'#34d399',other:'#94a3b8'};

function srcChips(sources, week) {
  if (!sources) return '';
  return SRC_ORDER.filter(k => sources[k]).map(k => {
    const v = sources[k];
    const val = v[week]; const avg = v.avg;
    if (!val && avg < 0.5) return '';
    const pct = avg > 0 ? (val - avg) / avg * 100 : null;
    const cls = pct == null ? 'sc-flat' : pct >= -10 ? 'sc-ok' : pct >= -25 ? 'sc-warn' : 'sc-bad';
    const pStr = pct != null ? ` ${pct>=0?'+':''}${pct.toFixed(0)}%` : '';
    return `<span class="sc ${cls}" title="${SRC_NAMES[k]}: 8wk avg ${avg} → ${week.toUpperCase()} ${val}">${SRC_NAMES[k]} ${val}${pStr}</span>`;
  }).join(' ');
}

/* ═══════════════════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════════════════ */
let DATA = null;
let activeCat  = 'all';
let activeCity = null;    // city name filter from city card click
let expandedRows = new Set();
let rowIdMap = {};        // clinic name → row id

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 1 ▸ SOURCE DROPS HERO (the "final view" — Slack format)
   ═══════════════════════════════════════════════════════════════════════════ */
function buildSlackHero() {
  const d = DATA;
  const DROP_SHOW = -20;

  /* Collect drops per source */
  const src_drops = {};
  for (const c of d.clinics) {
    if (c.cat !== 'Drop Both Week' && c.cat !== 'Drop this week') continue;
    for (const [bkt, sv] of Object.entries(c.sources || {})) {
      const exp = sv.exp_w6 != null ? sv.exp_w6 : sv.avg;
      if (exp < 0.5) continue;
      const pct = (sv.w6 - exp) / exp * 100;
      if (pct > DROP_SHOW) continue;
      if (!src_drops[bkt]) src_drops[bkt] = [];
      src_drops[bkt].push({ city:c.city, clinic:c.clinic, exp, act:sv.w6, pct, cat:c.cat });
    }
  }
  for (const s of Object.keys(src_drops)) src_drops[s].sort((a,b) => a.pct - b.pct);

  const hasDrop = Object.values(src_drops).some(v => v.length);
  if (!hasDrop) return '<div style="padding:20px;text-align:center;color:#94a3b8;">No significant source drops this week.</div>';

  /* Build Slack clipboard text */
  window._slackText = (() => {
    let txt = `*Source-wise demand drop remarks — W6 (${d.w6})*\n`;
    txt += `_Expected = avail-indexed (source share × clinic avail-expected). ≥−20% vs expected shown._\n\n`;
    for (const s of SRC_ORDER) {
      const items = src_drops[s];
      if (!items || !items.length) continue;
      txt += `• *${SRC_NAMES[s]}*\n`;
      txt += items.map(r => `  ${r.clinic} (${r.city}) W6:${r.pct.toFixed(0)}% (exp:${Math.round(r.exp)} act:${r.act})`).join(' | ') + '\n\n';
    }
    return txt.trim();
  })();

  /* Count affected clinics */
  const affectedSet = new Set();
  for (const items of Object.values(src_drops)) for (const r of items) affectedSet.add(r.clinic);

  /* Build per-source blocks */
  const sections = SRC_ORDER
    .filter(s => src_drops[s] && src_drops[s].length)
    .map((s, si, arr) => {
      const items = src_drops[s];
      const col = SRC_COLORS[s] || '#94a3b8';

      const chips = items.map(r => {
        const expR = Math.round(r.exp);
        const isCrit = r.pct <= -50;
        const isBad  = r.pct <= -30;
        const chipCls = isCrit ? 'chip-crit' : isBad ? 'chip-bad' : 'chip-warn';
        const pctCls  = isCrit ? 'chip-pct-crit' : isBad ? 'chip-pct-bad' : 'chip-pct-warn';
        const bothBadge = r.cat === 'Drop Both Week'
          ? '<span class="chip-both">↓↓</span>' : '';
        return `<span class="clinic-chip ${chipCls}"
          onclick="jumpToClinic('${r.clinic.replace(/'/g, "\\'")}')"
          title="Click to jump to clinic row">
          <span class="chip-cname">${r.clinic}</span>
          <span class="chip-city">(${r.city})</span>
          <span class="${pctCls}">${r.pct.toFixed(0)}%</span>
          <span class="chip-meta">exp:${expR} act:${r.act}</span>
          ${bothBadge}
        </span>`;
      }).join('');

      const divider = si < arr.length - 1 ? '<div class="hero-src-divider"></div>' : '';

      return `<div>
        <div class="src-label-row">
          <span class="src-dot" style="background:${col};box-shadow:0 0 6px ${col}80;"></span>
          <span class="src-name">${SRC_NAMES[s]}</span>
          <span class="src-count-badge">${items.length} clinic${items.length>1?'s':''} ≥−20%</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;">${chips}</div>
      </div>${divider}`;
    }).join('');

  return `
  <div class="hero-src" id="slackHeroCard">
    <!-- Hero header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:18px;">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
          <span style="font-size:20px;">📡</span>
          <h2 style="font-size:19px;font-weight:800;color:#f1f5f9;margin:0;letter-spacing:-.02em;">
            W6 Source-wise Drop Remarks
          </h2>
          <span style="font-size:10px;font-weight:700;padding:2px 10px;border-radius:999px;
                       background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.3);">
            action required
          </span>
        </div>
        <p style="color:#475569;font-size:11px;margin:0;line-height:1.6;">
          W6 = <strong style="color:#94a3b8;">${d.w6}</strong> ·
          Expected = <strong style="color:#94a3b8;">availability-indexed</strong>
          (source share × clinic avail-expected) · ≥−20% drop shown ·
          <span style="color:#f87171;font-weight:700;">↓↓</span> = dropped both W5 &amp; W6
        </p>
        <p style="color:#374151;font-size:11px;margin:4px 0 0;">
          ${affectedSet.size} affected clinics ·
          ${d.practo_phones_loaded || 0} Practo phones matched via phone number
          <span style="color:#4b5563;">(not UTM)</span>
        </p>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;">
        <button onclick="copySlack()" id="copySlackBtn"
          style="padding:8px 16px;font-size:12px;font-weight:700;
                 background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
                 border-radius:8px;cursor:pointer;color:#f1f5f9;
                 display:flex;align-items:center;gap:6px;transition:background .12s;"
          onmouseover="this.style.background='rgba(255,255,255,.18)'"
          onmouseout="this.style.background='rgba(255,255,255,.1)'">
          📋 Copy for Slack
        </button>
        <div id="copyToast">✅ Copied to clipboard!</div>
      </div>
    </div>
    <!-- Source sections -->
    ${sections}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 2 ▸ SUMMARY STAT CARDS
   ═══════════════════════════════════════════════════════════════════════════ */
function buildSummaryCards() {
  const counts = {};
  for (const c of DATA.clinics) counts[c.cat] = (counts[c.cat]||0) + 1;
  const total = DATA.clinics.length;
  function card(n, lbl, borderCol, icon) {
    return `<div class="stat-card" style="border-left-color:${borderCol};">
      <div style="font-size:22px;margin-bottom:6px;">${icon}</div>
      <div class="stat-num">${n}</div>
      <div class="stat-lbl">${lbl}</div>
    </div>`;
  }
  return `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;">
    ${card(total,                          'Total Clinics',   '#6366f1', '🏥')}
    ${card(counts['Drop Both Week']   ||0, 'Drop Both Weeks', '#ef4444', '🔴')}
    ${card(counts['Drop this week']   ||0, 'New Drop (W6)',   '#f97316', '🟠')}
    ${card(counts['Recovering']       ||0, 'Recovering',      '#f59e0b', '🟡')}
    ${card(counts['Okay']             ||0, 'Okay',            '#10b981', '✅')}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 2b ▸ NETWORK CHANNEL FUNNEL (new — shows where leads are coming from
   and which channels are below expected in drop clinics)
   ═══════════════════════════════════════════════════════════════════════════ */
function buildNetworkFunnel() {
  const d = DATA;

  // Network-wide W5 vs W6 totals across all clinics
  let netW5Exp=0, netW5Act=0, netW6Exp=0, netW6Act=0, netSlots=0;
  for (const c of d.clinics) {
    netW5Exp  += c.w5?.exp  || 0;
    netW5Act  += c.w5?.act  || 0;
    netW6Exp  += c.w6?.exp  || 0;
    netW6Act  += c.w6?.act  || 0;
    netSlots  += (c.w6?.wda || 0) + (c.w6?.wea || 0);
  }
  const netGapPct   = netW6Exp > 0 ? (netW6Act / netW6Exp - 1) * 100 : null;
  const netWowPct   = netW5Act > 0  ? (netW6Act / netW5Act  - 1) * 100 : null;
  const slotUtil    = netSlots > 0  ? netW6Act / netSlots * 100 : null;

  // Source-level breakdown for DROP clinics (Drops = where the problem is)
  const dropClinics = d.clinics.filter(c => c.cat === 'Drop Both Week' || c.cat === 'Drop this week');
  const srcAgg = {};
  for (const c of dropClinics) {
    for (const [src, sv] of Object.entries(c.sources || {})) {
      if (!srcAgg[src]) srcAgg[src] = { exp5:0, act5:0, exp6:0, act6:0 };
      const e5 = sv.exp_w5 != null ? sv.exp_w5 : sv.avg;
      const e6 = sv.exp_w6 != null ? sv.exp_w6 : sv.avg;
      if (e5 > 0.3) { srcAgg[src].exp5 += e5; srcAgg[src].act5 += sv.w5 || 0; }
      if (e6 > 0.3) { srcAgg[src].exp6 += e6; srcAgg[src].act6 += sv.w6 || 0; }
    }
  }

  const srcRows = SRC_ORDER.filter(k => srcAgg[k] && srcAgg[k].exp6 > 1).map(k => {
    const s = srcAgg[k];
    const gap6 = s.exp6 > 0 ? (s.act6 / s.exp6 - 1) * 100 : null;
    const gap5 = s.exp5 > 0 ? (s.act5 / s.exp5 - 1) * 100 : null;
    const trend = (gap6 != null && gap5 != null) ? gap6 - gap5 : null;
    const col  = gap6 == null ? '#94a3b8' : gap6 >= -10 ? '#059669' : gap6 >= -25 ? '#d97706' : '#dc2626';
    const bg   = gap6 == null ? '#f1f5f9' : gap6 >= -10 ? '#ecfdf5' : gap6 >= -25 ? '#fffbeb' : '#fef2f2';
    const gStr = gap6 != null ? (gap6>=0?'+':'')+gap6.toFixed(0)+'%' : '—';
    const fillW5 = s.exp5 > 0 ? Math.min(s.act5/s.exp5*100,120) : 0;
    const fillW6 = s.exp6 > 0 ? Math.min(s.act6/s.exp6*100,120) : 0;
    const trendHtml = trend != null
      ? `<span style="font-size:10px;color:${trend >= 0 ? '#059669' : '#dc2626'};font-weight:700;">${trend>=0?'▲':'▼'}${Math.abs(trend).toFixed(0)}pp</span>`
      : '';
    return `<tr>
      <td style="padding:8px 12px;font-weight:600;white-space:nowrap;">
        <span style="display:inline-flex;align-items:center;gap:6px;">
          <span style="width:8px;height:8px;border-radius:50%;background:${SRC_COLORS[k]||'#94a3b8'};display:inline-block;flex-shrink:0;"></span>
          ${SRC_NAMES[k]||k}
        </span>
      </td>
      <td style="padding:8px 12px;text-align:right;font-size:12px;">${Math.round(s.act5)} <span style="color:#94a3b8;font-size:10px;">/ ${Math.round(s.exp5)}</span></td>
      <td style="padding:8px 12px;text-align:right;font-size:12px;">${Math.round(s.act6)} <span style="color:#94a3b8;font-size:10px;">/ ${Math.round(s.exp6)}</span></td>
      <td style="padding:8px 12px;min-width:120px;">
        <div style="height:12px;background:#f1f5f9;border-radius:3px;position:relative;overflow:hidden;">
          <div style="position:absolute;top:1px;left:0;width:${fillW5}%;height:10px;background:#e2e8f0;border-radius:2px;"></div>
          <div style="position:absolute;top:1px;left:0;width:${fillW6}%;height:10px;background:${col}88;border-radius:2px;"></div>
        </div>
      </td>
      <td style="padding:8px 12px;text-align:right;">
        <span style="font-size:11px;font-weight:700;color:${col};background:${bg};padding:2px 8px;border-radius:999px;">${gStr}</span>
      </td>
      <td style="padding:8px 12px;text-align:right;">${trendHtml}</td>
    </tr>`;
  });

  const fmtGap = (v, d=0) => v == null ? '—' : (v>=0?'+':'')+v.toFixed(d)+'%';
  const gapCol  = netGapPct == null ? '#94a3b8' : netGapPct >= -5 ? '#059669' : netGapPct >= -15 ? '#d97706' : '#dc2626';
  const wowCol  = netWowPct == null ? '#94a3b8' : netWowPct >=  0 ? '#059669' : '#dc2626';

  return `<div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;">
    <!-- Header -->
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:16px;">🔁</span>
        <span class="sec-hdr">Network Booking Funnel</span>
        <span class="sec-sub">· Availability → Expected → Actual · W5 vs W6</span>
      </div>
    </div>
    <!-- Network KPI strip -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-bottom:1px solid var(--line);">
      ${[
        ['Doctor slots avail', netSlots, 'W6 wd+we', '#6366f1'],
        ['Expected bookings', Math.round(netW6Exp), 'avail-indexed', '#3b82f6'],
        ['Actual bookings', Math.round(netW6Act), 'W6 all clinics', gapCol],
        ['vs Expected', fmtGap(netGapPct,0), 'demand gap', gapCol],
        ['WoW change', fmtGap(netWowPct,0), 'W5 → W6', wowCol],
      ].map(([lbl, val, sub, col], i) => `
        <div style="padding:14px 16px;${i>0?'border-left:1px solid var(--line);':''}text-align:center;">
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;margin-bottom:5px;">${lbl}</div>
          <div style="font-size:20px;font-weight:800;color:${col};line-height:1;">${val}</div>
          <div style="font-size:10px;color:#64748b;margin-top:3px;">${sub}</div>
        </div>`).join('')}
    </div>
    <!-- Channel breakdown for drop clinics -->
    ${dropClinics.length > 0 ? `
    <div style="padding:12px 20px 6px;">
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;">
        Channel breakdown — <span style="color:#dc2626;">drop clinics only (${dropClinics.length} clinics)</span>
        <span style="font-size:10px;font-weight:400;color:#94a3b8;margin-left:6px;">· Which channels are underperforming vs availability-indexed expectation?</span>
      </div>
      <div style="overflow-x:auto;">
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#f8fafc;">
          <th style="padding:6px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;text-align:left;">Source</th>
          <th style="padding:6px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;text-align:right;">W5 Act/Exp↗</th>
          <th style="padding:6px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;text-align:right;">W6 Act/Exp↗</th>
          <th style="padding:6px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;">W5→W6 fill</th>
          <th style="padding:6px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;text-align:right;">W6 gap</th>
          <th style="padding:6px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;text-align:right;">Trend</th>
        </tr></thead>
        <tbody>${srcRows.join('')}</tbody>
      </table>
      </div>
      <div style="padding:8px 0 6px;font-size:10px;color:#94a3b8;line-height:1.5;">
        Bar: grey = W5 fill vs expected, colored = W6 fill vs expected.
        Gap = W6 actual ÷ availability-indexed expected − 1. Only showing channels with exp &gt; 1 across drop clinics.
        <a href="efficiency.html" style="color:#6366f1;font-weight:600;margin-left:4px;">→ Efficiency tab</a> for impressions / clicks / CTR by channel.
      </div>
    </div>` : `<div style="padding:16px 20px;font-size:12px;color:#94a3b8;">No drop clinics this week — all channels healthy.</div>`}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 3 ▸ CITY CARDS GRID
   ═══════════════════════════════════════════════════════════════════════════ */
function buildCityCards() {
  const d = DATA;
  const catOrder = {'Drop Both Week':0,'Drop this week':1,'Recovering':2,'Okay':3,'Insufficient Data':4};
  const cities = [...d.cities].sort((a,b) =>
    (catOrder[a.cat]??5) - (catOrder[b.cat]??5) || (a.w6?.gap_pct??0) - (b.w6?.gap_pct??0)
  );

  const borderFor = cat => ({
    'Drop Both Week':'#ef4444','Drop this week':'#f97316',
    'Recovering':'#f59e0b','Okay':'#10b981','Insufficient Data':'#e2e8f0'
  }[cat] || '#e2e8f0');

  const cards = cities.map(c => {
    const w5 = c.w5 || {}; const w6 = c.w6 || {};
    const b = borderFor(c.cat);
    const w5fill = w5.exp ? Math.min((w5.act/w5.exp)*100,100) : 0;
    const w6fill = w6.exp ? Math.min((w6.act/w6.exp)*100,100) : 0;
    const wCol = g => g == null ? '#94a3b8' : g >= -5 ? '#10b981' : g >= -15 ? '#f59e0b' : '#ef4444';

    /* W5→W6 trend */
    let trend = '';
    if (w5.gap_pct != null && w6.gap_pct != null) {
      const delta = w6.gap_pct - w5.gap_pct;
      trend = delta > 3  ? '<span style="color:#10b981;font-size:16px;font-weight:800;">↗</span>'
            : delta < -3 ? '<span style="color:#ef4444;font-size:16px;font-weight:800;">↘</span>'
            :               '<span style="color:#94a3b8;font-size:16px;">→</span>';
    }

    const isActive = activeCity === c.city;
    return `<div class="city-card${isActive?' city-active':''}" style="border-left-color:${b};"
             onclick="filterByCity('${c.city.replace(/'/g,"\\'")}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
        <div>
          <div style="font-size:14px;font-weight:800;color:#0f172a;">${c.city} ${tierBadge(c.city)}</div>
          <div style="margin-top:5px;">${catPill(c.cat)}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:#94a3b8;">${c.n_clinics} clinic${c.n_clinics!==1?'s':''}</div>
          <div style="margin-top:2px;">${trend}</div>
        </div>
      </div>
      <!-- W5 bar -->
      <div style="margin-bottom:7px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
          <span style="font-size:10px;color:#94a3b8;font-weight:600;">W5</span>
          <span style="display:flex;align-items:center;gap:5px;">
            <span style="font-size:11px;font-weight:700;color:${wCol(w5.gap_pct)};">${fmt(w5.act)}</span>
            <span style="font-size:10px;color:#94a3b8;">/ ${fmt(w5.exp,0)}</span>
            ${gapBadge(w5.gap_pct)}
          </span>
        </div>
        <div style="background:#f1f5f9;border-radius:3px;height:4px;">
          <div style="width:${w5fill}%;background:${wCol(w5.gap_pct)};height:4px;border-radius:3px;"></div>
        </div>
      </div>
      <!-- W6 bar -->
      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:2px;">
          <span style="font-size:10px;color:#94a3b8;font-weight:600;">W6</span>
          <span style="display:flex;align-items:center;gap:5px;">
            <span style="font-size:11px;font-weight:700;color:${wCol(w6.gap_pct)};">${fmt(w6.act)}</span>
            <span style="font-size:10px;color:#94a3b8;">/ ${fmt(w6.exp,0)}</span>
            ${gapBadge(w6.gap_pct)}
          </span>
        </div>
        <div style="background:#f1f5f9;border-radius:3px;height:4px;">
          <div style="width:${w6fill}%;background:${wCol(w6.gap_pct)};height:4px;border-radius:3px;"></div>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div style="margin-bottom:24px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <span style="font-size:16px;">🏙️</span>
      <span class="sec-hdr">City Overview</span>
      <span class="sec-sub">· click a city to filter clinics below</span>
      ${activeCity ? `<button onclick="clearCityFilter()" class="fbtn" style="font-size:11px;padding:2px 10px;margin-left:4px;">✕ Clear city filter</button>` : ''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;">
      ${cards}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 4 ▸ CATEGORY FILTER BAR
   ═══════════════════════════════════════════════════════════════════════════ */
function buildCatFilter() {
  const counts = {};
  for (const c of DATA.clinics) counts[c.cat] = (counts[c.cat]||0)+1;
  const cats = ['all','Drop Both Week','Drop this week','Recovering','Okay','Insufficient Data'];
  const labels = {
    all:'All',
    'Drop Both Week':'🔴 Drop Both',
    'Drop this week':'🟠 New Drop',
    'Recovering':'🟡 Recovering',
    'Okay':'✅ Okay',
    'Insufficient Data':'⬜ Insufficient',
  };
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
    ${cats.map(c => {
      const n = c === 'all' ? DATA.clinics.length : (counts[c]||0);
      return `<button class="fbtn ${activeCat===c?'active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">
        ${labels[c]} <span style="opacity:.65;font-size:10px;">(${n})</span>
      </button>`;
    }).join('')}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   SECTION 5 ▸ CLINIC TABLE (visual bars + expandable detail)
   ═══════════════════════════════════════════════════════════════════════════ */
function buildClinicTable() {
  const d = DATA;
  const catOrder = {'Drop Both Week':0,'Drop this week':1,'Recovering':2,'Okay':3,'Insufficient Data':4};

  let clinics = [...d.clinics];
  /* Apply category filter */
  if (activeCat !== 'all') clinics = clinics.filter(c => c.cat === activeCat);
  /* Apply city filter */
  if (activeCity) clinics = clinics.filter(c => c.city === activeCity);

  /* Sort: worst W6 gap within category */
  clinics.sort((a,b) =>
    (catOrder[a.cat]??5) - (catOrder[b.cat]??5) ||
    (a.w6?.gap_pct??0) - (b.w6?.gap_pct??0)
  );

  if (!clinics.length) return `<div class="card" style="text-align:center;padding:40px;color:#94a3b8;">No clinics match the current filter.</div>`;

  rowIdMap = {};
  let rid = 0;
  const rows = clinics.map(c => {
    const id = rid++;
    rowIdMap[c.clinic] = id;
    const w5 = c.w5 || {}; const w6 = c.w6 || {};

    const sevCls = {
      'Drop Both Week':'sev-crit','Drop this week':'sev-bad',
      'Recovering':'sev-warn','Okay':'sev-ok'
    }[c.cat] || 'sev-na';
    const sevBorderCol = {
      'sev-crit':'#ef4444','sev-bad':'#f97316','sev-warn':'#f59e0b','sev-ok':'#10b981','sev-na':'#e2e8f0'
    }[sevCls] || '#e2e8f0';

    /* W5→W6 trend indicator */
    let trendArrow = '';
    if (w5.gap_pct != null && w6.gap_pct != null) {
      const delta = w6.gap_pct - w5.gap_pct;
      trendArrow = delta > 3  ? '<span style="color:#10b981;font-size:13px;margin-left:4px;">↗</span>'
                : delta < -3  ? '<span style="color:#ef4444;font-size:13px;margin-left:4px;">↘</span>'
                :                '<span style="color:#94a3b8;font-size:13px;margin-left:4px;">→</span>';
    }

    /* Expanded detail */
    const srcRows = SRC_ORDER.filter(k => c.sources?.[k]).map(k => {
      const v = c.sources[k];
      const exp5 = v.exp_w5 != null ? v.exp_w5 : v.avg;
      const exp6 = v.exp_w6 != null ? v.exp_w6 : v.avg;
      const p5 = exp5 > 0 ? (v.w5 - exp5) / exp5 * 100 : null;
      const p6 = exp6 > 0 ? (v.w6 - exp6) / exp6 * 100 : null;
      const gc = p => p==null ? '#94a3b8' : p >= -10 ? '#059669' : p >= -25 ? '#d97706' : '#dc2626';
      const gb = p => p==null ? 'transparent' : p >= -10 ? '#ecfdf5' : p >= -25 ? '#fffbeb' : '#fef2f2';
      const pf = p => p==null ? '—' : `${p>=0?'+':''}${p.toFixed(0)}%`;
      const isIndexed = v.exp_w5 != null || v.exp_w6 != null;
      return `<tr>
        <td style="font-weight:600;padding:5px 10px;white-space:nowrap;">
          <span style="display:inline-flex;align-items:center;gap:5px;">
            <span style="width:6px;height:6px;border-radius:50%;background:${SRC_COLORS[k]||'#94a3b8'};display:inline-block;"></span>
            ${SRC_NAMES[k]||k}
            ${isIndexed ? '<span style="font-size:8px;color:#6366f1;font-weight:700;padding:0 4px;background:#ede9fe;border-radius:3px;">↗</span>' : ''}
          </span>
        </td>
        <td style="text-align:right;padding:5px 10px;color:#94a3b8;font-size:11px;">${v.avg}</td>
        <td style="text-align:right;padding:5px 10px;">
          <span style="font-weight:700;">${v.w5}</span>
          <div style="font-size:9px;color:#94a3b8;">exp ${exp5}</div>
        </td>
        <td style="text-align:right;padding:5px 10px;">
          <span style="padding:1px 8px;border-radius:5px;font-size:11px;font-weight:700;
                background:${gb(p5)};color:${gc(p5)};">${pf(p5)}</span>
        </td>
        <td style="text-align:right;padding:5px 10px;">
          <span style="font-weight:700;">${v.w6}</span>
          <div style="font-size:9px;color:#94a3b8;">exp ${exp6}</div>
        </td>
        <td style="text-align:right;padding:5px 10px;">
          <span style="padding:1px 8px;border-radius:5px;font-size:11px;font-weight:700;
                background:${gb(p6)};color:${gc(p6)};">${pf(p6)}</span>
        </td>
      </tr>`;
    }).join('');

    const detailBorder = sevBorderCol;

    const remarkHtml = c.remark
      ? `<div style="margin-top:10px;padding:9px 12px;background:#fff7ed;border-radius:7px;
                    border:1px solid #fed7aa;font-size:11px;color:#92400e;line-height:1.5;">${c.remark}</div>`
      : '';

    return `
    <tr class="clinic-row ${sevCls}" id="clinic-row-${id}" onclick="toggleRow(${id})" style="cursor:pointer;">
      <td style="font-weight:700;white-space:nowrap;padding-left:16px;">
        <span class="xicon" id="xicon-${id}">▶</span>${c.clinic}
      </td>
      <td style="font-size:12px;color:#64748b;white-space:nowrap;">${c.city} ${tierBadge(c.city)}</td>
      <td>${catPill(c.cat)}</td>
      <td>${actExpBar(w5.act, w5.exp)}</td>
      <td>${actExpBar(w6.act, w6.exp)}${trendArrow}</td>
      <td class="cell-r">
        ${(() => {
          const slots = (w6.wda||0)+(w6.wea||0);
          if (!slots) return '<span style="color:#94a3b8;">—</span>';
          const util = slots > 0 ? Math.round(w6.act/slots*100) : null;
          const uc = util == null ? '#94a3b8' : util >= 70 ? '#059669' : util >= 50 ? '#d97706' : '#dc2626';
          return `<div style="font-size:12px;font-weight:700;">${slots}</div><div style="font-size:10px;color:${uc};">${util != null ? util+'% util' : ''}</div>`;
        })()}
      </td>
      <td><div style="display:flex;flex-wrap:wrap;gap:2px;">${srcChips(c.sources,'w6')}</div></td>
    </tr>
    <tr class="detail-row" id="detail-${id}" style="display:none;">
      <td colspan="7" style="padding:0;border-left:3px solid ${detailBorder};">
        <div style="padding:14px 20px 18px 36px;background:#f8fafc;">
          <!-- W5 vs W6 comparison cards -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;">
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:8px;">W5 · ${d.w5}</div>
              <div style="font-size:22px;font-weight:800;color:#0f172a;">${fmt(w5.act)}<span style="font-size:13px;color:#94a3b8;font-weight:400;margin-left:4px;">bookings</span></div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
                <span style="font-size:12px;color:#64748b;">exp: ${fmt(w5.exp,1)}</span>
                ${gapBadge(w5.gap_pct)}
              </div>
              ${(w5.wda != null || w5.wea != null)
                ? `<div style="font-size:10px;color:#94a3b8;margin-top:5px;">Avail slots: ${w5.wda??'?'} wd + ${w5.wea??'?'} we</div>` : ''}
            </div>
            <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;">
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:8px;">W6 · ${d.w6}</div>
              <div style="font-size:22px;font-weight:800;color:#0f172a;">${fmt(w6.act)}<span style="font-size:13px;color:#94a3b8;font-weight:400;margin-left:4px;">bookings</span></div>
              <div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
                <span style="font-size:12px;color:#64748b;">exp: ${fmt(w6.exp,1)}</span>
                ${gapBadge(w6.gap_pct)}
              </div>
              ${(w6.wda != null || w6.wea != null)
                ? `<div style="font-size:10px;color:#94a3b8;margin-top:5px;">Avail slots: ${w6.wda??'?'} wd + ${w6.wea??'?'} we</div>` : ''}
            </div>
          </div>
          <!-- Source breakdown table -->
          ${srcRows ? `
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:7px;">
            Source breakdown
            <span style="font-size:9px;font-weight:600;background:#ede9fe;color:#6d28d9;padding:0 6px;border-radius:3px;margin-left:6px;">↗ = avail-indexed expected</span>
          </div>
          <div style="overflow-x:auto;">
          <table style="width:100%;border-collapse:collapse;font-size:12px;">
            <thead>
              <tr style="background:#f1f5f9;">
                <th style="text-align:left;padding:5px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;">Source</th>
                <th style="text-align:right;padding:5px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;">8wk Avg</th>
                <th style="text-align:right;padding:5px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;">W5 Act / Exp↗</th>
                <th style="text-align:right;padding:5px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;">W5 Gap</th>
                <th style="text-align:right;padding:5px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;">W6 Act / Exp↗</th>
                <th style="text-align:right;padding:5px 10px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;">W6 Gap</th>
              </tr>
            </thead>
            <tbody>${srcRows}</tbody>
          </table>
          </div>` : ''}
          <!-- Channel issue finder: rank sources by W6 gap contribution -->
          ${(() => {
            if (!c.sources) return '';
            const ranked = SRC_ORDER
              .filter(k => c.sources[k])
              .map(k => {
                const sv = c.sources[k];
                const exp6 = sv.exp_w6 != null ? sv.exp_w6 : sv.avg;
                if (!exp6 || exp6 < 0.5) return null;
                const gap6Pct = (sv.w6 - exp6) / exp6 * 100;
                const gap6Abs = sv.w6 - exp6;
                return { k, name: SRC_NAMES[k]||k, act6: sv.w6, exp6, gap6Pct, gap6Abs };
              })
              .filter(Boolean)
              .sort((a,b) => a.gap6Abs - b.gap6Abs); // worst absolute gap first
            if (!ranked.length) return '';
            const worstSrc = ranked[0];
            const hasProblem = worstSrc.gap6Pct < -15;
            const maxAbs = Math.max(...ranked.map(r => Math.abs(r.gap6Abs)), 1);
            const srcBars = ranked.map(r => {
              const pctStr = (r.gap6Pct>=0?'+':'')+r.gap6Pct.toFixed(0)+'%';
              const col = r.gap6Pct >= -10 ? '#059669' : r.gap6Pct >= -25 ? '#d97706' : '#dc2626';
              const barW = Math.min(Math.abs(r.gap6Abs)/maxAbs*100, 100);
              const isNeg = r.gap6Abs < 0;
              return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">
                <div style="width:70px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.name}</div>
                <div style="flex:1;height:10px;background:#f1f5f9;border-radius:3px;overflow:hidden;">
                  <div style="width:${barW}%;height:10px;background:${col}88;border-radius:3px;"></div>
                </div>
                <div style="width:70px;text-align:right;font-size:11px;font-weight:700;color:${col};">${pctStr}</div>
                <div style="width:80px;text-align:right;font-size:10px;color:#64748b;">${r.act6} / ${r.exp6.toFixed(0)} exp</div>
              </div>`;
            }).join('');
            return `<div style="margin-top:14px;padding:12px 16px;background:${hasProblem?'#fef9c3':'#f0fdf4'};border:1px solid ${hasProblem?'#fde047':'#bbf7d0'};border-radius:10px;">
              <div style="font-size:11px;font-weight:700;color:#0f172a;margin-bottom:10px;">
                🔍 Channel Issue Finder
                ${hasProblem ? `— <span style="color:#dc2626;">${worstSrc.name} is the primary drop driver (${worstSrc.gap6Pct.toFixed(0)}% below expected)</span>` : '— no significant channel issues detected'}
              </div>
              ${srcBars}
              <div style="margin-top:8px;font-size:10px;color:#64748b;">
                For impressions · clicks · CTR analysis → <a href="efficiency.html" style="color:#6366f1;font-weight:600;">Efficiency tab</a>
              </div>
            </div>`;
          })()}
          ${remarkHtml}
        </div>
      </td>
    </tr>`;
  }).join('');

  const cityHdr = activeCity
    ? ` · <span style="color:#6366f1;font-weight:700;">${activeCity}</span>`
    : '';

  return `<div class="card" style="padding:0;overflow:hidden;" id="clinicTableCard">
    <div style="padding:12px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:15px;">🏥</span>
        <span class="sec-hdr">Clinic-Level Analysis${cityHdr}</span>
        <span class="sec-sub">· ${clinics.length} clinics · click any row to expand source drill-down</span>
      </div>
    </div>
    <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr>
        <th style="min-width:170px;">Clinic</th>
        <th>City</th>
        <th>Status</th>
        <th class="r" style="min-width:140px;">W5 Act / Exp</th>
        <th class="r" style="min-width:140px;">W6 Act / Exp</th>
        <th class="r" style="min-width:80px;">W6 Slots</th>
        <th style="min-width:200px;">W6 Source Breakdown</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    <div style="padding:8px 20px;font-size:10px;color:#94a3b8;border-top:1px solid var(--line);line-height:1.6;">
      Bar fill = actual ÷ avail-indexed expected (100% = met expectation). Practo via phone matching — not UTM. ↗ = avail-indexed (source share × clinic expected).
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════════════════
   RENDER & STATE
   ═══════════════════════════════════════════════════════════════════════════ */
function render() {
  if (!DATA) return;
  expandedRows.clear();
  rowIdMap = {};

  const d = DATA;
  const ga = d.generated_at;
  const genEl = document.getElementById('genAt');
  if (genEl && ga) genEl.textContent = 'Generated ' + ga.slice(0,10);

  // ── Data freshness check ─────────────────────────────────────────────────
  // Compute the latest complete week start (most recent Monday ≤ today - 1 day)
  function latestCompleteWeekStart() {
    const today = new Date();
    const day = today.getDay(); // 0=Sun, 1=Mon...
    // Go back to last Sunday first, then find last Monday before that
    const daysToLastSun = day === 0 ? 7 : day;
    const lastSun = new Date(today); lastSun.setDate(today.getDate() - daysToLastSun);
    const lastMon = new Date(lastSun); lastMon.setDate(lastSun.getDate() - 6);
    return lastMon.toISOString().slice(0, 10);
  }
  const latestWk    = latestCompleteWeekStart();
  const w6Date      = d.w6 || '';
  const isStale     = w6Date < latestWk;
  const weeksBehind = isStale ? Math.round((new Date(latestWk) - new Date(w6Date)) / 604800000) : 0;

  // Format a week date range label
  function wkLabel(startISO) {
    if (!startISO) return startISO;
    const s = new Date(startISO);
    const e = new Date(s); e.setDate(s.getDate() + 6);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${s.getDate()} ${months[s.getMonth()]} – ${e.getDate()} ${months[e.getMonth()]}`;
  }

  const freshnessBanner = isStale
    ? `<div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;margin-bottom:16px;">
        <span style="font-size:18px;flex-shrink:0;">⚠️</span>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px;">
            Data is ${weeksBehind} week${weeksBehind>1?'s':''} behind — showing W6 = ${wkLabel(w6Date)}
          </div>
          <div style="font-size:12px;color:#78350f;line-height:1.6;">
            Latest complete week <strong>${wkLabel(latestWk)}</strong> is available but not yet loaded.
            Click <strong>Refresh Data</strong> (top-right) to regenerate with the latest week from Redshift.
            Requires AWS SSO (<code style="background:#fef3c7;padding:1px 5px;border-radius:3px;">redshift-data</code> profile) and <code style="background:#fef3c7;padding:1px 5px;border-radius:3px;">python3 server.py</code> running.
          </div>
        </div>
        <button onclick="refreshData()"
          style="flex-shrink:0;padding:6px 14px;font-size:11px;font-weight:700;background:#92400e;color:#fff;border:none;border-radius:7px;cursor:pointer;">
          🔄 Refresh Now
        </button>
      </div>`
    : `<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:8px;margin-bottom:16px;font-size:12px;color:#065f46;">
        ✅ Data is up to date — W6 = <strong>${wkLabel(w6Date)}</strong>
      </div>`;

  document.getElementById('root').innerHTML = `
    <!-- Page title strip -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:12px;">
      <div>
        <h1 style="font-size:22px;font-weight:800;color:#0f172a;margin:0 0 4px;letter-spacing:-.02em;">📋 Weekly Demand Review</h1>
        <p style="color:#64748b;font-size:12px;margin:0;">
          W5 = ${wkLabel(d.w5)} · W6 = ${wkLabel(d.w6)} · Drop threshold = ${d.drop_threshold}% ·
          Availability-indexed · Practo via phone matching
        </p>
      </div>
    </div>
    ${freshnessBanner}

    ${buildSlackHero()}
    ${buildSummaryCards()}
    ${buildNetworkFunnel()}

    <div style="margin:18px 0 8px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#94a3b8;white-space:nowrap;">Drill down</span>
      <div style="flex:1;height:1px;background:#e2e8f0;"></div>
      <span style="font-size:10px;color:#cbd5e1;">click any section to expand</span>
    </div>

    <details class="sect"><summary><span class="sect-t">🏙️ City Overview</span><span class="sect-s">Per-city W5→W6 booking change, availability &amp; drop flags</span><span class="sect-cv">▶</span></summary><div class="sect-body">${buildCityCards()}</div></details>

    <details class="sect" open><summary><span class="sect-t">🏥 Clinic-Level Detail</span><span class="sect-s">Every clinic's W5→W6 change with category filter · click a row to expand</span><span class="sect-cv">▶</span></summary><div class="sect-body">${buildCatFilter()}${buildClinicTable()}</div></details>
  `;
}

function toggleRow(id) {
  const det  = document.getElementById('detail-' + id);
  const icon = document.getElementById('xicon-' + id);
  if (!det) return;
  if (expandedRows.has(id)) {
    det.style.display = 'none';
    expandedRows.delete(id);
    if (icon) { icon.textContent='▶'; icon.classList.remove('open'); }
  } else {
    det.style.display = 'table-row';
    expandedRows.add(id);
    if (icon) { icon.textContent='▼'; icon.classList.add('open'); }
  }
}

function setCat(c) {
  activeCat = c;
  render();
  const el = document.getElementById('clinicTableCard');
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

function filterByCity(city) {
  if (activeCity === city) { activeCity = null; }
  else { activeCity = city; activeCat = 'all'; }
  render();
  const el = document.getElementById('clinicTableCard');
  if (el) setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),60);
}

function clearCityFilter() {
  activeCity = null;
  render();
}

function jumpToClinic(name) {
  /* Clear city filter, show all, then scroll to clinic table + open the row */
  activeCity = null;
  activeCat = 'all';
  render();
  setTimeout(() => {
    const id = rowIdMap[name];
    if (id == null) return;
    const rowEl = document.getElementById('clinic-row-' + id);
    if (rowEl) {
      rowEl.scrollIntoView({behavior:'smooth', block:'center'});
      rowEl.style.background = '#fef9c3';
      setTimeout(()=>rowEl.style.background='', 1200);
    }
    if (!expandedRows.has(id)) toggleRow(id);
  }, 100);
}

function copySlack() {
  const txt = window._slackText || '';
  navigator.clipboard.writeText(txt).then(() => {
    const t = document.getElementById('copyToast');
    if (t) { t.style.display='block'; setTimeout(()=>t.style.display='none', 2500); }
  });
}

/* ═══════════════════════════════════════════════════════════════════════════
   SERVER HEALTH CHECK
   ═══════════════════════════════════════════════════════════════════════════ */
async function checkServerStatus() {
  try {
    const r = await fetch('/api/health', { cache: 'no-store' });
    if (r.ok) {
      document.getElementById('serverBanner')?.remove();
    }
  } catch(e) {
    const banner = document.getElementById('serverBanner');
    if (!banner) {
      const b = document.createElement('div');
      b.id = 'serverBanner';
      b.style.cssText = 'background:#fef2f2;border-bottom:1.5px solid #fca5a5;padding:7px 20px;font-size:12px;color:#991b1b;display:flex;align-items:center;gap:8px;';
      b.innerHTML = `⚠️ <strong>server.py is not running.</strong>&nbsp;
        The <em>Refresh Data</em> button will fail.&nbsp;
        Start it with: <code style="background:#fca5a520;padding:1px 6px;border-radius:4px;">cd /Users/alishaparveen/holistic-demand-dashboard &amp;&amp; python3 server.py</code>
        <button onclick="this.closest('#serverBanner').remove()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#991b1b;font-size:14px;">✕</button>`;
      // Insert after nav bar
      const nav = document.querySelector('.border-b');
      if (nav) nav.after(b);
      else document.body.prepend(b);
    }
  }
}

/* ═══════════════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════════════ */
async function init() {
  checkServerStatus();
  try {
    const r = await fetch('data_clinic.json');
    if (!r.ok) throw new Error('data_clinic.json not found');
    DATA = await r.json();
    render();
  } catch(e) {
    document.getElementById('root').innerHTML = `
      <div class="card" style="text-align:center;padding:60px;color:#dc2626;">
        <div style="font-size:36px;margin-bottom:12px;">⚠️</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;">data_clinic.json not found</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:16px;">
          Run the data pipeline first:
        </div>
        <code style="background:#f1f5f9;padding:6px 16px;border-radius:6px;font-size:12px;color:#334155;">
          AWS_PROFILE=redshift-data python3 scripts/build_clinic_data.py
        </code>
        <div style="font-size:11px;color:#94a3b8;margin-top:16px;">
          Or click <strong>Refresh Data</strong> in the top-right (requires active AWS SSO session)
        </div>
      </div>`;
  }
}

document.addEventListener('DOMContentLoaded', init);

/* ═══════════════════════════════════════════════════════════════════════════
   REFRESH — SSE-streaming modal
   ═══════════════════════════════════════════════════════════════════════════ */
function refreshData() {
  let modal = document.getElementById('refreshModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'refreshModal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(15,23,42,.75);display:flex;align-items:center;justify-content:center;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:16px;padding:28px 32px;width:580px;max-width:92vw;
                  box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:82vh;display:flex;flex-direction:column;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div style="font-size:16px;font-weight:800;color:#0f172a;">🔄 Refreshing Clinic Data</div>
          <button id="modalClose" onclick="closeRefreshModal()"
            style="background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;display:none;">✕</button>
        </div>
        <div id="progressStatus" style="font-size:12px;font-weight:600;color:#6366f1;margin-bottom:10px;">Connecting to Redshift…</div>
        <div id="progressLog"
          style="flex:1;overflow-y:auto;font-family:ui-monospace,monospace;font-size:11px;
                 background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;
                 max-height:380px;color:#334155;line-height:1.7;white-space:pre-wrap;"></div>
        <div id="progressFooter" style="margin-top:14px;font-size:11px;color:#94a3b8;text-align:center;">
          This takes ~30–60 seconds. Don't close this window.
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  const logEl    = document.getElementById('progressLog');
  const statusEl = document.getElementById('progressStatus');
  const footerEl = document.getElementById('progressFooter');
  const closeBtn = document.getElementById('modalClose');
  const btn      = document.getElementById('refreshBtn');

  modal.style.display = 'flex';
  logEl.textContent   = '';
  statusEl.textContent = 'Connecting to Redshift…';
  statusEl.style.color = '#6366f1';
  footerEl.textContent = 'This takes ~30–60 seconds. Don\'t close this window.';
  closeBtn.style.display = 'none';
  btn.disabled = true;
  btn.style.opacity = '.5';
  document.getElementById('refreshIcon').textContent = '⏳';

  fetch('/api/refresh-clinic-data', { method:'POST' })
    .then(resp => {
      if (!resp.ok || !resp.body) throw new Error(`Server error ${resp.status} — is server.py running?`);
      const reader = resp.body.getReader();
      const dec    = new TextDecoder();
      let buf = '';

      function pump() {
        return reader.read().then(({ done, value }) => {
          if (value) buf += dec.decode(value, { stream: !done });
          const parts = buf.split('\n\n');
          buf = parts.pop();
          for (const part of parts) {
            const line = part.replace(/^data: ?/, '').trim();
            if (!line) continue;
            if (line === '__DONE__') {
              statusEl.textContent = '✅ Done! Reloading data…';
              statusEl.style.color = '#059669';
              footerEl.textContent = '';
              closeBtn.style.display = 'block';
              btn.disabled = false; btn.style.opacity = '1';
              document.getElementById('refreshIcon').textContent = '🔄';
              fetch('data_clinic.json?_=' + Date.now())
                .then(r => r.json()).then(d => { DATA = d; render(); }).catch(()=>{});
              return;
            }
            if (line.startsWith('__ERROR__')) {
              statusEl.textContent = '❌ Error — see log below';
              statusEl.style.color = '#dc2626';
              footerEl.textContent = 'Check AWS SSO: run `aws sso login --profile redshift-data` in terminal';
              closeBtn.style.display = 'block';
              btn.disabled = false; btn.style.opacity = '1';
              document.getElementById('refreshIcon').textContent = '🔄';
              logEl.textContent += '\n' + line.replace('__ERROR__ ','');
              return;
            }
            if (line.match(/\[[\d\/]+\]/)) statusEl.textContent = '⏳ ' + line.trim();
            logEl.textContent += line + '\n';
            logEl.scrollTop = logEl.scrollHeight;
          }
          if (!done) return pump();
        });
      }
      return pump();
    })
    .catch(err => {
      statusEl.textContent = '❌ Could not connect';
      statusEl.style.color = '#dc2626';
      logEl.textContent = err.message + '\n\nMake sure you started the server with:\n  python3 server.py\n(not python3 -m http.server)';
      footerEl.textContent = '';
      closeBtn.style.display = 'block';
      btn.disabled = false; btn.style.opacity = '1';
      document.getElementById('refreshIcon').textContent = '🔄';
    });
}

function closeRefreshModal() {
  const m = document.getElementById('refreshModal');
  if (m) m.style.display = 'none';
}
</script>
