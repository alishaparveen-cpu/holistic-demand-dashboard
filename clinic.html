<style>
:root{
  --ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --red:#ef4444;--amber:#f59e0b;--green:#10b981;
}
html,body{background:#f8fafc;color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;margin:0;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(15,23,42,.05);}
.sect{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,.05);margin-bottom:16px;overflow:hidden;}
.sect>summary{list-style:none;cursor:pointer;padding:13px 18px;display:flex;align-items:center;gap:12px;user-select:none;}
.sect>summary::-webkit-details-marker{display:none;}
.sect>summary:hover{background:#fafaff;}
.sect>summary .sect-t{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;}
.sect>summary .sect-s{font-size:11.5px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sect>summary .sect-cv{margin-left:auto;color:#94a3b8;font-size:11px;transition:transform .15s;flex-shrink:0;}
.sect[open]>summary .sect-cv{transform:rotate(90deg);}
.sect[open]>summary{border-bottom:1px solid var(--line);}
.sect-body{padding:16px 18px;}
/* KPI cards */
.kpi-card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:18px 20px;box-shadow:0 1px 2px rgba(15,23,42,.04);}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-size:26px;font-weight:700;color:var(--ink);line-height:1.1;margin-bottom:4px;}
.kpi-wow{font-size:11px;margin-bottom:3px;}
.kpi-avg{font-size:11px;}
.wow-up{color:#059669;} .wow-dn{color:#dc2626;} .wow-flat{color:#94a3b8;}
/* Beat/Miss chip */
.beat{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#ecfdf5;color:#065f46;}
.miss{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#fef2f2;color:#991b1b;}
.flat{display:inline-block;padding:1px 7px;border-radius:999px;font-size:9px;font-weight:700;background:#f1f5f9;color:#475569;}
/* Toggle */
.toggle-btn{padding:4px 12px;font-size:12px;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:#fff;color:var(--ink);transition:all .12s;}
.toggle-btn.active{background:#0f172a;color:#fff;border-color:#0f172a;}
/* Table */
.tbl{width:100%;border-collapse:separate;border-spacing:0;}
.tbl th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 12px;background:#f8fafc;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:1;}
.tbl th.r{text-align:right;}
.tbl td{padding:8px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#f8fafc;}
.cell-r{text-align:right;}
.val-main{font-weight:600;display:block;}
.val-sub{font-size:10px;display:block;margin-top:1px;}
/* Tier badge */
.t1b{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#ede9fe;color:#6d28d9;}
.t2b{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;background:#e0f2fe;color:#0369a1;}
/* Nav */
.nav-link{font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border-radius:6px;transition:background .12s;}
.nav-link:hover{background:#f1f5f9;color:#0f172a;}
.nav-link.active{font-weight:700;color:#0f172a;background:#f1f5f9;}
/* Section header */
.sec-hdr{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.sec-sub{font-size:11px;color:var(--muted);}
/* Loading */
.loading{text-align:center;padding:60px;color:var(--muted);}
/* City select */
.city-sel{padding:5px 10px;border:1px solid var(--line);border-radius:7px;font-size:12px;background:#fff;cursor:pointer;}
/* Sort icon */
.sort-btn{cursor:pointer;user-select:none;}
.sort-btn:hover{color:#0f172a;}
/* Clinic cards */
.clinic-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(15,23,42,.05);transition:box-shadow .15s;}
.clinic-card:hover{box-shadow:0 4px 14px rgba(15,23,42,.09);}
.clinic-card .spark-wrap{display:flex;justify-content:center;}
/* Channel bar */
.ch-bar-wrap{height:5px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-top:2px;}
.ch-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
</style>
</head>

<div style="max-width:1400px;margin:0 auto;padding:20px;" id="root">
  <div class="loading">Loading clinic data…</div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const NS_TARGET = 25;   // No-show % target: below this is acceptable
const B2D_TARGET = 65;  // B2D% target: above this is good

const CITY_TIERS = {
  T1: ['Bangalore','Mumbai','Pune','Hyderabad','Chennai'],
  T2: ['Navi Mumbai','Coimbatore','Nagpur','Ranchi','Jaipur','Ahmedabad',
       'Surat','Nashik','Aurangabad','Hubli','Mysuru','Mangaluru',
       'Bhopal','Visakhapatnam','Thane','Gandhinagar','Vijayawada'],
};
function cityTier(c) {
  return CITY_TIERS.T1.includes(c) ? 'T1' : CITY_TIERS.T2.includes(c) ? 'T2' : null;
}

// ── STATE ─────────────────────────────────────────────────────────────────
let JDATA          = null;
let CDATA          = null;   // data_clinic.json
let LF             = null;   // data_clinic_funnel.json — clinic lead-source funnel (GMB/paid/web + AI relevant)
let PL             = null;   // data_practo_leads.json — Practo leads per clinic
let ALL_WEEKS      = [];     // newest-first
let activeTier     = 'ALL';
let activeCity     = 'ALL';
let activeWkIdx    = 0;
let sortCol        = 'calls_done';
let sortAsc        = false;
let clinicSearch   = '';
let cardViewMode   = 'cards';     // 'cards' only now
let expandedCards  = new Set();   // clinic keys with channel breakdown open
let activeMaturity = 'ALL';       // 'ALL' | 'matured' | 'maturing' | 'new'

// ── COMPARISON PANEL STATE ─────────────────────────────────────────────────
const CMP_CL_METRICS = [
  { key:'calls_done',  lbl:'Calls Done',   type:'count' },
  { key:'gross',       lbl:'Bookings',     type:'count' },
  { key:'slot_booked', lbl:'Slots',        type:'count' },
  { key:'b2d_pct',     lbl:'B2D %',        type:'pct'   },
];
let cmpA_cl = 'calls_done', cmpB_cl = 'b2d_pct', cmpClinic_cl = 'ALL';
let cmpChartCl = null;

// ── HELPERS ───────────────────────────────────────────────────────────────
function fmtN(v)  { if (v == null) return '—'; return Math.round(v).toLocaleString(); }
function fmtPct(v){ if (v == null) return '—'; return v.toFixed(1) + '%'; }

function wowPct(cur, prev) {
  if (cur == null || prev == null || prev === 0) return null;
  return (cur - prev) / Math.abs(prev) * 100;
}
function wowPp(cur, prev) {
  if (cur == null || prev == null) return null;
  return cur - prev;
}
function wowHtml(pct, inverted=false) {
  if (pct === null) return '<span class="wow-flat">—</span>';
  const up = pct > 0;
  const isGood = inverted ? !up : up;
  const cls = Math.abs(pct) < 1 ? 'wow-flat' : isGood ? 'wow-up' : 'wow-dn';
  return `<span class="${cls}">${up?'▲':'▼'} ${Math.abs(pct).toFixed(1)}%</span>`;
}
function ppHtml(pp, inverted=false) {
  if (pp === null) return '<span class="wow-flat">—</span>';
  const up = pp > 0;
  const isGood = inverted ? !up : up;
  const cls = Math.abs(pp) < 0.3 ? 'wow-flat' : isGood ? 'wow-up' : 'wow-dn';
  const sign = pp >= 0 ? '+' : '';
  return `<span class="${cls}">${sign}${pp.toFixed(1)}pp</span>`;
}
function avg8(arr, fromIdx) {
  const vals = arr.slice(fromIdx + 1, fromIdx + 9).filter(v => v != null && !isNaN(v));
  if (!vals.length) return null;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}
function vsAvgHtml(cur, avgVal, isRate=false) {
  if (cur == null || avgVal == null || avgVal === 0) return '';
  const diff = isRate ? (cur - avgVal) : (cur - avgVal) / avgVal * 100;
  const isGood = diff > 0;
  const abs = Math.abs(diff);
  if (abs < (isRate ? 0.3 : 1.5)) return `<span class="flat">→ avg</span>`;
  const label = isRate
    ? `${diff >= 0 ? '+' : ''}${diff.toFixed(1)}pp vs avg`
    : `${diff >= 0 ? '+' : ''}${diff.toFixed(0)}% vs avg`;
  return isGood ? `<span class="beat">${label}</span>` : `<span class="miss">${label}</span>`;
}
function spark(vals, color='#6366f1', w=80, h=22, _fill, opts={}) {
  const v = (vals||[]).filter(x => x != null);
  const safeVals   = JSON.stringify(vals||[]).replace(/'/g,'&#39;');
  const safeLabels = (opts.labels?JSON.stringify(opts.labels):'null').replace(/'/g,'&#39;');
  const safeTitle  = (opts.title||'').replace(/"/g,'&quot;');
  const datAttrs   = `data-sparkvals='${safeVals}' data-sparklabels='${safeLabels}' data-sparkcolor='${color}' data-sparktitle="${safeTitle}" data-sparkfmt='${opts.fmt||''}'`;
  if (v.length < 2) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;"></svg></div>`;
  const mn = Math.min(...v), mx = Math.max(...v);
  const range = mx - mn || 1;
  const n = vals.length;
  const pts = [];
  (vals||[]).forEach((val, i) => {
    if (val == null) return;
    const x = ((i / (n - 1)) * (w - 4) + 2).toFixed(1);
    const y = (h - 2 - ((val - mn) / range) * (h - 4)).toFixed(1);
    pts.push(`${x},${y}`);
  });
  if (pts.length < 2) return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;"></svg></div>`;
  const poly = pts.join(' ');
  const [fx] = pts[0].split(',');
  const [lx, ly] = pts[pts.length - 1].split(',');
  return `<div class="spark-wrap" ${datAttrs}><svg width="${w}" height="${h}" style="display:block;overflow:visible;">
    <polygon points="${fx},${h} ${poly} ${lx},${h}" fill="${color}20" stroke="none"/>
    <polyline points="${poly}" stroke="${color}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lx}" cy="${ly}" r="2.5" fill="${color}"/>
  </svg></div>`;
}

// ── DATA ACCESSORS ────────────────────────────────────────────────────────
function clinicData(wkKey, clinic) {
  return JDATA?.offline?.weekly_clinic?.[wkKey]?.[clinic] || {};
}
function clinicArr(clinic, metric) {
  return ALL_WEEKS.map(wk => {
    const v = clinicData(wk, clinic)[metric];
    return v != null ? v : null;
  });
}
function clinicKey_city(key) { return key.split('_')[0]; }
function clinicKey_name(key) { return key.split('_').slice(1).join(' '); }

// ── CLINIC MATURITY ───────────────────────────────────────────────────────
// Matured: ≥6 weeks with data AND avg calls_done ≥20
// Maturing: ≥3 weeks with data AND avg calls_done 8-20
// New: <3 weeks data OR avg calls_done <8
function clinicMaturity(key) {
  const arr = clinicArr(key, 'calls_done');
  const valid = arr.filter(v => v != null && v >= 0);
  if (valid.length < 3) return 'new';
  const avg = valid.reduce((a, b) => a + b, 0) / valid.length;
  if (avg >= 20 && valid.length >= 6) return 'matured';
  if (avg >= 8) return 'maturing';
  return 'new';
}

// Lookup clinic in data_clinic.json by data.json key
function getClinicAnalysis(key) {
  if (!CDATA?.clinics) return null;
  const city = clinicKey_city(key);
  const name = clinicKey_name(key);
  return CDATA.clinics.find(c => c.city === city && c.clinic === name) || null;
}

// ── GET FILTERED CLINIC LIST ──────────────────────────────────────────────
function getFilteredClinics() {
  const wk = ALL_WEEKS[activeWkIdx];
  const allClinics = Object.keys(JDATA?.offline?.weekly_clinic?.[wk] || {});
  const searchQ = clinicSearch.toLowerCase().trim();
  return allClinics.filter(key => {
    const city = clinicKey_city(key);
    const name = clinicKey_name(key);
    if (activeCity !== 'ALL' && city !== activeCity) return false;
    if (activeTier !== 'ALL' && cityTier(city) !== activeTier) return false;
    if (activeMaturity !== 'ALL' && clinicMaturity(key) !== activeMaturity) return false;
    if (searchQ && !name.toLowerCase().includes(searchQ) && !city.toLowerCase().includes(searchQ)) return false;
    return true;
  });
}

// ── BUILD KPI STRIP ────────────────────────────────────────────────────────
function buildKPIStrip() {
  const wk    = ALL_WEEKS[activeWkIdx];
  const wkPrv = ALL_WEEKS[activeWkIdx + 1];
  const clinics = getFilteredClinics();

  function aggMetric(wkKey, metric) {
    let s = 0, n = 0;
    for (const c of clinics) {
      const v = clinicData(wkKey, c)[metric];
      if (v != null) { s += v; n++; }
    }
    return n ? s : null;
  }

  const curCalls = aggMetric(wk,    'calls_done');
  const prvCalls = aggMetric(wkPrv, 'calls_done');
  const curGross = aggMetric(wk,    'gross');
  const prvGross = aggMetric(wkPrv, 'gross');
  const curSlots = aggMetric(wk,    'slot_booked');
  const prvSlots = aggMetric(wkPrv, 'slot_booked');
  const curB2d   = curGross > 0 ? curCalls / curGross * 100 : null;
  const prvB2d   = prvGross > 0 ? prvCalls / prvGross * 100 : null;
  const slotConv = curSlots > 0 ? curGross / curSlots * 100 : null;
  const slotConvP = prvSlots > 0 ? prvGross / prvSlots * 100 : null;

  function aggArr(metric) {
    return ALL_WEEKS.map(wkKey => aggMetric(wkKey, metric));
  }
  const cdArr = aggArr('calls_done');
  const grArr = aggArr('gross');
  const slArr = aggArr('slot_booked');

  function avgB2d(fromIdx) {
    let s=0, n=0;
    for (let i=fromIdx+1; i<=Math.min(fromIdx+8, ALL_WEEKS.length-1); i++) {
      const c = aggMetric(ALL_WEEKS[i], 'calls_done');
      const g = aggMetric(ALL_WEEKS[i], 'gross');
      if (c != null && g > 0) { s += c/g*100; n++; }
    }
    return n ? s/n : null;
  }
  function avgSlotConv(fromIdx) {
    let s=0, n=0;
    for (let i=fromIdx+1; i<=Math.min(fromIdx+8, ALL_WEEKS.length-1); i++) {
      const sl = aggMetric(ALL_WEEKS[i], 'slot_booked');
      const g  = aggMetric(ALL_WEEKS[i], 'gross');
      if (sl != null && sl > 0) { s += g/sl*100; n++; }
    }
    return n ? s/n : null;
  }

  function kpiCard(label, curVal, prevVal, avgVal, fmt, isRate=false, inverted=false) {
    const wow   = isRate ? ppHtml(wowPp(curVal, prevVal), inverted) : wowHtml(wowPct(curVal, prevVal), inverted);
    const vsAvg = vsAvgHtml(curVal, avgVal, isRate);
    const avgStr = avgVal != null ? `8wk avg: ${fmt(avgVal)}` : '';
    let accent = '';
    if (avgVal != null && curVal != null) {
      const diff = isRate ? (curVal - avgVal) : (curVal - avgVal)/avgVal*100;
      if (!inverted && diff > 2 || inverted && diff < -2) accent = 'border-left:3px solid #10b981;';
      else if (!inverted && diff < -2 || inverted && diff > 2) accent = 'border-left:3px solid #ef4444;';
    }
    return `<div class="kpi-card" style="${accent}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-val">${curVal != null ? fmt(curVal) : '—'}</div>
      <div class="kpi-wow">${wow} <span style="color:#94a3b8;font-size:10px;">WoW</span></div>
      <div class="kpi-avg">${vsAvg} <span style="color:#94a3b8;font-size:10px;">${avgStr}</span></div>
    </div>`;
  }

  const clinicCount = clinics.length;

  // Count status breakdown from CDATA
  let dropCount = 0, recoverCount = 0, okCount = 0;
  if (CDATA?.clinics) {
    for (const key of clinics) {
      const a = getClinicAnalysis(key);
      if (!a) continue;
      if (a.cat === 'Drop Both Week' || a.cat === 'Drop this week') dropCount++;
      else if (a.cat === 'Recovering') recoverCount++;
      else if (a.cat === 'Okay') okCount++;
    }
  }

  const statusBadges = CDATA ? `
    <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#fef2f2;color:#991b1b;font-weight:600;margin-left:4px;">${dropCount} dropping</span>
    <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#fefce8;color:#a16207;font-weight:600;">${recoverCount} recovering</span>
    <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#f0fdf4;color:#166534;font-weight:600;">${okCount} okay</span>
  ` : '';

  const maturityLabel = activeMaturity !== 'ALL' ? ` · <strong>${activeMaturity}</strong> clinics` : '';

  return `<div style="margin-bottom:6px;font-size:11px;color:#64748b;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
    <strong>${clinicCount}</strong> clinic${clinicCount!==1?'s':''} ·
    ${activeCity !== 'ALL' ? activeCity : activeTier !== 'ALL' ? activeTier + ' cities' : 'all cities'}
    ${maturityLabel}
    ${statusBadges}
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;">
    ${kpiCard('Calls Done',     curCalls, prvCalls, avg8(cdArr, activeWkIdx), fmtN)}
    ${kpiCard('Gross Bookings', curGross, prvGross, avg8(grArr, activeWkIdx), fmtN)}
    ${kpiCard('B2D %',          curB2d,   prvB2d,   avgB2d(activeWkIdx),     fmtPct, true)}
    ${kpiCard('Slots Booked',   curSlots, prvSlots, avg8(slArr, activeWkIdx), fmtN)}
    ${kpiCard('Slot→Booking % <small style="font-weight:400;color:#94a3b8;font-size:9px;">slot conv.</small>', slotConv, slotConvP, avgSlotConv(activeWkIdx), fmtPct, true)}
  </div>`;
}

// ── BUILD CLINIC CARDS ────────────────────────────────────────────────────
const CAT_ORDER = { 'Drop Both Week': 0, 'Drop this week': 1, 'Recovering': 2, 'Okay': 3, 'Insufficient Data': 4 };
const STATUS_STYLE = {
  'Drop Both Week':    { bg:'#fef2f2', color:'#991b1b', border:'#fecaca', dot:'#ef4444', label:'Drop Both Weeks' },
  'Drop this week':    { bg:'#fff7ed', color:'#c2410c', border:'#fed7aa', dot:'#f97316', label:'Dropping Now' },
  'Recovering':        { bg:'#fefce8', color:'#a16207', border:'#fde68a', dot:'#eab308', label:'Recovering' },
  'Okay':              { bg:'#f0fdf4', color:'#166534', border:'#bbf7d0', dot:'#10b981', label:'Okay' },
  'Insufficient Data': { bg:'#f8fafc', color:'#64748b', border:'#e2e8f0', dot:'#94a3b8', label:'Low Data' },
};
const BORDER_COLOR = {
  'Drop Both Week': '#ef4444', 'Drop this week': '#f97316',
  'Recovering': '#eab308', 'Okay': '#10b981', 'Insufficient Data': '#cbd5e1',
};

function buildClinicCards() {
  const clinics = getFilteredClinics();
  if (!clinics.length) {
    return `<div class="card" style="padding:20px;color:var(--muted);">No clinics found for the selected filter.</div>`;
  }

  // Sort: drops first, then by calls done
  const sorted = [...clinics].sort((a, b) => {
    const ca = getClinicAnalysis(a);
    const cb = getClinicAnalysis(b);
    const oa = ca ? (CAT_ORDER[ca.cat] ?? 5) : 5;
    const ob = cb ? (CAT_ORDER[cb.cat] ?? 5) : 5;
    if (oa !== ob) return oa - ob;
    const av = clinicData(ALL_WEEKS[activeWkIdx], a).calls_done || 0;
    const bv = clinicData(ALL_WEEKS[activeWkIdx], b).calls_done || 0;
    return bv - av;
  });

  // Split: clinics needing attention (Drop/Recovering) shown open, Okay/Insufficient collapsed
  const attn = sorted.filter(k => (CAT_ORDER[getClinicAnalysis(k)?.cat] ?? 5) <= 2);
  const okay = sorted.filter(k => (CAT_ORDER[getClinicAnalysis(k)?.cat] ?? 5) >= 3);
  const gridOf = keys => `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;">${keys.map(buildClinicCard).join('')}</div>`;

  const header = `<div style="margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
    <div>
      <span style="font-size:14px;font-weight:700;color:#0f172a;">📋 Clinics Needing Attention</span>
      <span style="font-size:11px;color:#64748b;margin-left:8px;">${attn.length} of ${sorted.length} clinics dropped or recovering · click a sparkline to zoom · ▼ for channel breakdown</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;font-size:11px;color:#64748b;">
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#ef4444;display:inline-block;"></span> Drop</span>
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#eab308;display:inline-block;"></span> Recovering</span>
      <span style="display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:2px;background:#10b981;display:inline-block;"></span> Okay</span>
    </div>
  </div>`;

  const attnHtml = attn.length
    ? gridOf(attn)
    : `<div class="card" style="padding:16px;color:#059669;font-size:13px;">✅ No clinics are dropping or recovering this week — all stable.</div>`;

  const okayHtml = okay.length
    ? `<details class="sect" style="margin-top:16px;">
         <summary><span class="sect-t">✅ Stable / Okay clinics</span><span class="sect-s">${okay.length} clinics performing in range · click to expand</span><span class="sect-cv">▶</span></summary>
         <div class="sect-body">${gridOf(okay)}</div>
       </details>`
    : '';

  return header + attnHtml + okayHtml;
}

function buildClinicCard(key) {
  const city = clinicKey_city(key);
  const name = clinicKey_name(key);
  const tier = cityTier(city);
  const tierBadge = tier === 'T1' ? `<span class="t1b">T1</span>` : `<span class="t2b">T2</span>`;

  const analysis = getClinicAnalysis(key);
  const cat = analysis?.cat || null;
  const st  = cat ? (STATUS_STYLE[cat] || STATUS_STYLE['Insufficient Data']) : null;
  const bColor = BORDER_COLOR[cat] || '#e2e8f0';

  // 4-week data (newest first → reverse for sparkline left=oldest)
  const n4     = ALL_WEEKS.slice(0, Math.min(4, ALL_WEEKS.length));
  const wkLbls = n4.map(wk => JDATA?.offline?.weekly_funnel?.[wk]?.label || wk.slice(5)).reverse();

  const calls4 = n4.map(wk => clinicData(wk, key).calls_done ?? null).reverse();
  const gross4 = n4.map(wk => clinicData(wk, key).gross ?? null).reverse();
  const slots4 = n4.map(wk => clinicData(wk, key).slot_booked ?? null).reverse();
  const b2d4   = n4.map(wk => {
    const d = clinicData(wk, key);
    return d.b2d_pct ?? (d.gross > 0 ? (d.calls_done || 0) / d.gross * 100 : null);
  }).reverse();

  const curCalls = calls4[calls4.length - 1];
  const prvCalls = calls4[calls4.length - 2] ?? null;
  const curGross = gross4[gross4.length - 1];
  const prvGross = gross4[gross4.length - 2] ?? null;
  const curSlots = slots4[slots4.length - 1];
  const prvSlots = slots4[slots4.length - 2] ?? null;
  const curB2d   = b2d4[b2d4.length - 1];
  const prvB2d   = b2d4[b2d4.length - 2] ?? null;

  // 8-week avg for calls
  const callsFullArr = clinicArr(key, 'calls_done');
  const avg8Calls = avg8(callsFullArr, activeWkIdx);

  // vs expected badge from data_clinic.json w6
  const w6Gap = analysis?.w6?.gap_pct;
  const gapBadge = w6Gap != null
    ? `<span style="font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;background:${w6Gap <= -20 ? '#fef2f2' : w6Gap <= -5 ? '#fff7ed' : w6Gap >= 10 ? '#f0fdf4' : '#f8fafc'};color:${w6Gap <= -20 ? '#dc2626' : w6Gap <= -5 ? '#c2410c' : w6Gap >= 10 ? '#059669' : '#64748b'};">${w6Gap > 0 ? '+' : ''}${w6Gap.toFixed(0)}% vs exp</span>`
    : '';

  const isExpanded = expandedCards.has(key);

  // Inline sparkline builder for cards (compact, 80×30)
  function cardSpark(vals, color, title, fmt) {
    const safeVals   = JSON.stringify(vals || []).replace(/'/g, '&#39;');
    const safeLabels = JSON.stringify(wkLbls).replace(/'/g, '&#39;');
    const safeTitle  = (title || '').replace(/"/g, '&quot;');
    const datAttrs   = `data-sparkvals='${safeVals}' data-sparklabels='${safeLabels}' data-sparkcolor='${color}' data-sparktitle="${safeTitle}" data-sparkfmt='${fmt || ''}'`;
    const v = (vals || []).filter(x => x != null);
    if (v.length < 2) return `<div class="spark-wrap" ${datAttrs} style="display:flex;justify-content:center;"><svg width="80" height="30" style="display:block;"></svg></div>`;
    const w = 80, h = 30;
    const mn = Math.min(...v), mx = Math.max(...v), range = mx - mn || 1;
    const n = vals.length;
    const pts = [];
    vals.forEach((val, i) => {
      if (val == null) return;
      const x = ((i / (n - 1)) * (w - 6) + 3).toFixed(1);
      const y = (h - 3 - ((val - mn) / range) * (h - 8)).toFixed(1);
      pts.push(`${x},${y}`);
    });
    if (pts.length < 2) return `<div class="spark-wrap" ${datAttrs} style="display:flex;justify-content:center;"><svg width="${w}" height="${h}" style="display:block;"></svg></div>`;
    const poly = pts.join(' ');
    const [fx] = pts[0].split(',');
    const [lx, ly] = pts[pts.length - 1].split(',');
    return `<div class="spark-wrap" ${datAttrs} style="display:flex;justify-content:center;cursor:zoom-in;">
      <svg width="${w}" height="${h}" style="display:block;overflow:visible;">
        <polygon points="${fx},${h} ${poly} ${lx},${h}" fill="${color}18" stroke="none"/>
        <polyline points="${poly}" stroke="${color}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${lx}" cy="${ly}" r="2.8" fill="${color}"/>
      </svg>
    </div>`;
  }

  const b2dColor = curB2d >= 70 ? '#059669' : curB2d >= 60 ? '#d97706' : curB2d ? '#dc2626' : '#94a3b8';
  const slotColor = '#0ea5e9';

  // Channel breakdown (expanded)
  const channelSection = isExpanded
    ? (analysis ? buildChannelBreakdown(analysis) : '') + buildLeadFunnel(key)
    : '';

  // Expand button (only if data_clinic.json has this clinic)
  const expandBtn = analysis
    ? `<button onclick="toggleCard('${key.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"
         style="margin-top:10px;width:100%;padding:5px 10px;border:1px solid #e2e8f0;border-radius:7px;background:#f8fafc;cursor:pointer;font-size:11px;color:#475569;display:flex;justify-content:space-between;align-items:center;font-weight:600;">
        <span>📊 Channel Breakdown + 🎯 Lead-source funnel</span>
        <span style="font-size:10px;">${isExpanded ? '▲ Hide' : '▼ Show'}</span>
      </button>
      ${channelSection}`
    : `<div style="margin-top:8px;font-size:10px;color:#cbd5e1;text-align:center;">No recent channel data</div>`;

  return `<div class="clinic-card" style="border-left:3px solid ${bColor};">
    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
      <div>
        <div style="font-size:13px;font-weight:700;color:#0f172a;line-height:1.3;">${name}</div>
        <div style="font-size:11px;color:#64748b;margin-top:2px;">${city} ${tierBadge}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        ${st ? `<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;background:${st.bg};color:${st.color};border:1px solid ${st.border};white-space:nowrap;"><span style="color:${st.dot};">●</span> ${st.label}</span>` : ''}
        ${gapBadge}
      </div>
    </div>

    <!-- 4-week sparklines grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:4px;">
      <!-- Calls Done -->
      <div style="text-align:center;">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:2px;line-height:1.2;">Calls</div>
        ${cardSpark(calls4, '#6366f1', name + ' — Calls Done', '')}
        <div style="font-size:13px;font-weight:700;color:#0f172a;margin-top:2px;">${fmtN(curCalls)}</div>
        <div style="font-size:10px;line-height:1.4;">${wowHtml(wowPct(curCalls, prvCalls))}</div>
      </div>
      <!-- Gross Bookings -->
      <div style="text-align:center;">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:2px;line-height:1.2;">Bookings</div>
        ${cardSpark(gross4, '#0ea5e9', name + ' — Gross Bookings', '')}
        <div style="font-size:13px;font-weight:700;color:#0f172a;margin-top:2px;">${fmtN(curGross)}</div>
        <div style="font-size:10px;line-height:1.4;">${wowHtml(wowPct(curGross, prvGross))}</div>
      </div>
      <!-- B2D % -->
      <div style="text-align:center;">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:2px;line-height:1.2;">B2D %</div>
        ${cardSpark(b2d4, '#10b981', name + ' — B2D %', 'pct')}
        <div style="font-size:13px;font-weight:700;color:${b2dColor};margin-top:2px;">${curB2d != null ? curB2d.toFixed(1) + '%' : '—'}</div>
        <div style="font-size:10px;line-height:1.4;">${ppHtml(wowPp(curB2d, prvB2d))}</div>
      </div>
      <!-- Slots (Leads / slot_booked) -->
      <div style="text-align:center;">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:2px;line-height:1.2;">Slots</div>
        ${cardSpark(slots4, slotColor, name + ' — Slots Booked', '')}
        <div style="font-size:13px;font-weight:700;color:${slotColor};margin-top:2px;">${fmtN(curSlots)}</div>
        <div style="font-size:10px;line-height:1.4;">${wowHtml(wowPct(curSlots, prvSlots))}</div>
      </div>
    </div>

    <!-- Channel drill-down -->
    ${expandBtn}
  </div>`;
}

// ── CHANNEL BREAKDOWN ─────────────────────────────────────────────────────
function buildChannelBreakdown(analysis) {
  if (!analysis?.sources) return '';

  const sources    = CDATA?.source_order  || ['gmb','google','organic','fb','practo','directwalkin','other'];
  const srcNames   = CDATA?.source_names  || {};

  // Filter to sources with meaningful data
  const active = sources.filter(s => {
    const d = analysis.sources[s];
    return d && (d.avg >= 0.5 || d.w6 > 0);
  });

  // Max for bar scaling
  const maxExp = Math.max(...active.map(s => analysis.sources[s]?.exp_w6 || 0), 1);

  // Sort: worst gap first
  const sorted = [...active].sort((a, b) => {
    const ga = (analysis.sources[a]?.w6 || 0) - (analysis.sources[a]?.exp_w6 || 0);
    const gb = (analysis.sources[b]?.w6 || 0) - (analysis.sources[b]?.exp_w6 || 0);
    return ga - gb;
  });

  const rows = sorted.map((src, idx) => {
    const d = analysis.sources[src];
    if (!d) return '';
    const act  = d.w6  ?? 0;
    const exp  = d.exp_w6 ?? 0;
    const actW5 = d.w5 ?? 0;
    const gap  = act - exp;
    const gapPct = exp > 0 ? gap / exp * 100 : 0;
    const actBar = Math.min(100, Math.round(act / maxExp * 100));
    const expBar = Math.min(100, Math.round(exp / maxExp * 100));
    const isWorst = idx === 0 && gap < -1;
    const barColor = gapPct <= -30 ? '#ef4444' : gapPct <= -10 ? '#f97316' : gapPct <= -5 ? '#f59e0b' : gapPct >= 10 ? '#10b981' : '#6366f1';
    const wowDir = act > actW5 ? '▲' : act < actW5 ? '▼' : '→';
    const wowClr = act > actW5 ? '#059669' : act < actW5 ? '#dc2626' : '#94a3b8';

    return `<div style="margin-bottom:7px;${isWorst ? 'padding:4px 6px;border-radius:7px;background:#fef2f208;border:1px solid #fecaca40;' : ''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
        <span style="font-size:11px;font-weight:700;color:${isWorst ? '#dc2626' : '#374151'};">${srcNames[src] || src}${isWorst ? ' ⚠' : ''}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:10px;color:${wowClr};font-weight:600;">${wowDir} W5: ${actW5}</span>
          <span style="font-size:10px;color:${gapPct <= -10 ? '#dc2626' : gapPct >= 10 ? '#059669' : '#64748b'};font-weight:600;">${act} / ${exp.toFixed(0)} (${gapPct > 0 ? '+' : ''}${gapPct.toFixed(0)}%)</span>
        </div>
      </div>
      <div style="position:relative;height:5px;background:#f1f5f9;border-radius:3px;overflow:hidden;">
        <div style="position:absolute;left:0;top:0;height:100%;width:${expBar}%;background:#e2e8f0;border-radius:3px;"></div>
        <div style="position:absolute;left:0;top:0;height:100%;width:${actBar}%;background:${barColor};border-radius:3px;"></div>
      </div>
    </div>`;
  }).join('');

  const remark = analysis.remark || '';
  const remarkSnip = remark.length > 90 ? remark.slice(0, 90) + '…' : remark;

  return `<div style="margin-top:8px;padding:10px 12px;background:#f8fafc;border-radius:9px;border:1px solid #e2e8f0;">
    <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;margin-bottom:6px;">
      W6 Actual vs Expected · bar = actual / dashed = expected
    </div>
    ${rows}
    ${remark ? `<div style="font-size:10px;color:#475569;margin-top:6px;line-height:1.5;border-top:1px solid #e2e8f0;padding-top:6px;">💬 ${remarkSnip}</div>` : ''}
  </div>`;
}

// ── LEAD-SOURCE FUNNEL (clinic-wise): Lead → Rel Lead → Book → Done, split by
//    GMB call / Google paid / Web / Practo. Styled after the google-ads-audit consolidated funnel.
//    GMB & Practo are clinic-direct; Google-paid & Web are clinic-engaged (tracked leads that booked
//    here, from data_clinic_funnel); Rel Lead is the AI call-audit relevant subset (live from 27 May).
function buildLeadFunnel(key, nWeeks) {
  if (!LF?.clinics) return '';
  const fk = clinicKey_city(key) + '|' + clinicKey_name(key);
  const o = LF.clinics[fk];
  if (!o) return '';
  const pl = (PL && PL[fk]) || null;
  const W = LF._meta.weeks;                               // newest-first
  const ncol = Math.min(nWeeks || 4, W.length);           // card = 4 weeks; zoom = all weeks side by side
  const cols = []; for (let i = ncol - 1; i >= 0; i--) cols.push(i);   // oldest → newest
  const A = a => a || [];
  const gmb = A(o.lead.gmb_organic_calls), paid = A(o.lead.by_chan.google_ad),
        web = A(o.lead.by_chan.organic),  practo = A(pl && pl.leads);
  const lead = W.map((_, i) => (gmb[i] || 0) + (paid[i] || 0) + (web[i] || 0) + (practo[i] || 0));
  const rel = A(o.lead.ai_relevant), book = A(o.booking.bookings), done = A(o.done.done);
  const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const wkLab = wk => { const d = new Date(wk + 'T00:00:00'); d.setDate(d.getDate() + 6); return d.getDate() + ' ' + MON[d.getMonth()]; };
  const pc = (n, d) => d > 0 ? Math.round(n / d * 100) + '%' : '—';
  const td = (v, st) => `<td style="text-align:right;padding:2px 7px;${st || ''}">${v}</td>`;
  const stageRow = (label, arr) => `<tr style="background:#f8fafc;"><td style="padding:3px 8px;font-weight:800;color:#0f172a;">${label}</td>${cols.map((i, c) => td(arr[i] ?? 0, 'font-weight:800;' + (c === cols.length - 1 ? 'color:#4338ca;' : ''))).join('')}</tr>`;
  const subRow = (label, arr) => `<tr><td style="padding:2px 8px;color:#64748b;font-size:10px;"><span style="color:#cbd5e1;">·</span> ${label}</td>${cols.map(i => td(arr[i] ?? 0, 'color:#475569;')).join('')}</tr>`;
  const pctRow = (label, num, den) => `<tr><td style="padding:1px 8px 1px 16px;color:#94a3b8;font-size:9.5px;">${label}</td>${cols.map(i => td(pc(num[i], den[i]), 'color:#94a3b8;font-size:9.5px;')).join('')}</tr>`;
  return `<div style="margin-top:10px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
    <div style="font-size:10px;font-weight:700;color:#475569;padding:6px 8px;background:#f1f5f9;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;">
      <span>🎯 Lead-source funnel · ${clinicKey_name(key)}</span>
      ${nWeeks ? '' : `<button onclick="zoomLeadFunnel('${key.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')" title="Compare all weeks side by side" style="border:1px solid #cbd5e1;background:#fff;border-radius:5px;cursor:pointer;font-size:11px;line-height:1;color:#64748b;padding:2px 6px;">⛶ all weeks</button>`}
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:11px;">
      <tr><th style="text-align:left;padding:2px 8px;font-size:9px;color:#94a3b8;font-weight:600;">stage</th>${cols.map(i => `<th style="text-align:right;padding:3px 7px;font-size:9px;color:#94a3b8;font-weight:600;">${wkLab(W[i])}</th>`).join('')}</tr>
      ${stageRow('Lead', lead)}
      ${subRow('GMB call', gmb)}
      ${subRow('Google paid', paid)}
      ${subRow('Web', web)}
      ${subRow('Practo', practo)}
      ${stageRow('Rel Lead (AI)', rel)}
      ${pctRow('Lead → Rel %', rel, lead)}
      ${stageRow('Booked', book)}
      ${pctRow('Lead → Book %', book, lead)}
      ${stageRow('Done', done)}
      ${pctRow('Book → Done %', done, book)}
    </table>
    <div style="font-size:8.5px;color:#94a3b8;padding:5px 8px;line-height:1.45;background:#fafafa;border-top:1px solid #eef2f7;">GMB &amp; Practo = clinic-direct · Google-paid &amp; Web = clinic-engaged (tracked leads that booked here) · Rel Lead = AI call-audit relevant subset (from 27 May). Latest week ends ${wkLab(W[0])}.</div>
  </div>`;
}

// Pop the lead-source funnel out to a modal showing ALL weeks side by side (week-over-week compare).
function zoomLeadFunnel(key) {
  let m = document.getElementById('funnelModal');
  if (!m) {
    m = document.createElement('div'); m.id = 'funnelModal';
    m.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:9999;align-items:flex-start;justify-content:center;padding:28px 14px;overflow:auto;';
    m.onclick = e => { if (e.target === m) closeFunnelModal(); };
    m.innerHTML = '<div style="background:#fff;border-radius:12px;max-width:97vw;box-shadow:0 20px 60px rgba(0,0,0,.3);">'
      + '<div style="display:flex;justify-content:flex-end;padding:6px 10px 0;"><button onclick="closeFunnelModal()" style="border:none;background:none;font-size:18px;cursor:pointer;color:#94a3b8;line-height:1;">✕</button></div>'
      + '<div id="funnelModalBody" style="padding:0 16px 18px;overflow-x:auto;"></div></div>';
    document.body.appendChild(m);
  }
  document.getElementById('funnelModalBody').innerHTML = buildLeadFunnel(key, 99);  // 99 → all available weeks
  m.style.display = 'flex';
}
function closeFunnelModal() { const m = document.getElementById('funnelModal'); if (m) m.style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFunnelModal(); });

// ── BUILD CLINIC TABLE (compact, sortable — shown when table mode is active) ─
function buildClinicTable() {
  const wk   = ALL_WEEKS[activeWkIdx];
  const wkP  = ALL_WEEKS[activeWkIdx + 1];
  const clinics = getFilteredClinics();
  if (!clinics.length) {
    return `<div class="card" style="padding:20px;color:var(--muted);">No clinics found for the selected filter.</div>`;
  }

  const rows = clinics.map(key => {
    const city   = clinicKey_city(key);
    const name   = clinicKey_name(key);
    const arr    = clinicArr(key, 'calls_done');
    const grArr  = clinicArr(key, 'gross');
    const b2dArr = clinicArr(key, 'b2d_pct');
    const nsArr  = clinicArr(key, 'no_show');
    const nsPArr = clinicArr(key, 'ns_pct');

    const cur     = arr[activeWkIdx];
    const prev    = arr[activeWkIdx + 1];
    const avgV    = avg8(arr, activeWkIdx);
    const curGross = grArr[activeWkIdx];
    const prvGross = grArr[activeWkIdx + 1];
    const b2dCur  = b2dArr[activeWkIdx];
    const b2dAvg  = avg8(b2dArr, activeWkIdx);
    const nsCur   = nsArr[activeWkIdx];
    const nsPCur  = nsPArr[activeWkIdx];

    return { key, city, name, cur, prev, avgV, curGross, prvGross, b2dCur, b2dAvg, nsCur, nsPCur, arr, b2dArr };
  });

  const sortFn = {
    calls_done: (a,b) => (b.cur||0) - (a.cur||0),
    gross:      (a,b) => (b.curGross||0) - (a.curGross||0),
    b2d_pct:    (a,b) => (b.b2dCur||0) - (a.b2dCur||0),
    no_show:    (a,b) => (b.nsCur||0) - (a.nsCur||0),
    city:       (a,b) => a.city.localeCompare(b.city),
    clinic:     (a,b) => a.name.localeCompare(b.name),
  }[sortCol] || ((a,b) => (b.cur||0) - (a.cur||0));
  const sorted = [...rows].sort(sortFn);
  if (sortAsc) sorted.reverse();

  const maxCalls = Math.max(...sorted.map(r => r.cur || 0), 1);

  function sortHdr(label, col) {
    const active = sortCol === col;
    const icon = active ? (sortAsc ? ' ↑' : ' ↓') : '';
    return `<span class="sort-btn" onclick="setSort('${col}')" style="${active?'color:#0f172a;font-weight:700;':''}">${label}${icon}</span>`;
  }

  const tableRows = sorted.map(({ key, city, name, cur, prev, avgV, curGross, prvGross, b2dCur, b2dAvg, nsCur, nsPCur, arr, b2dArr }) => {
    const tier   = cityTier(city);
    const tierB  = tier === 'T1' ? `<span class="t1b">T1</span>` : tier === 'T2' ? `<span class="t2b">T2</span>` : '';
    const wowStr = wowPct(cur, prev);
    const barW   = Math.round((cur || 0) / maxCalls * 100);
    const color  = avgV != null && cur != null
      ? (cur > avgV * 1.03 ? '#10b981' : cur < avgV * 0.97 ? '#ef4444' : '#6366f1')
      : '#6366f1';
    const b2dColor = b2dCur >= 70 ? '#059669' : b2dCur >= 60 ? '#d97706' : b2dCur ? '#dc2626' : '#94a3b8';
    const sparkVals = arr.slice(0, 9).reverse();
    const analysis = getClinicAnalysis(key);
    const cat = analysis?.cat;
    const bColor = BORDER_COLOR[cat] || 'transparent';

    return `<tr style="border-left:3px solid ${bColor};">
      <td style="min-width:140px;">
        <div style="font-weight:600;">${name}</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:1px;">${city} ${tierB}</div>
        <div style="height:3px;width:${barW}%;background:${color}66;border-radius:2px;margin-top:4px;max-width:80px;"></div>
      </td>
      <td class="cell-r">
        <span class="val-main">${fmtN(cur)}</span>
        <span class="val-sub">${wowStr != null ? wowHtml(wowStr) : ''}</span>
      </td>
      <td class="cell-r">${vsAvgHtml(cur, avgV)} <span style="font-size:10px;color:#94a3b8;">${avgV != null ? fmtN(Math.round(avgV)) + ' avg' : ''}</span></td>
      <td class="cell-r">
        <span class="val-main">${fmtN(curGross)}</span>
        <span class="val-sub" style="color:#94a3b8;">${wowHtml(wowPct(curGross, prvGross))}</span>
      </td>
      <td class="cell-r">
        <span class="val-main" style="color:${b2dColor};">${fmtPct(b2dCur)}</span>
        <span class="val-sub" style="color:#94a3b8;">${b2dAvg != null ? 'avg ' + b2dAvg.toFixed(1) + '%' : ''}</span>
      </td>
      <td class="cell-r">
        <span class="val-main">${fmtN(nsCur)}</span>
        <span class="val-sub" style="color:${nsPCur >= NS_TARGET+10 ? '#dc2626' : nsPCur >= NS_TARGET ? '#d97706' : '#94a3b8'};">${nsPCur != null ? nsPCur.toFixed(1)+'% '+(nsPCur>=NS_TARGET?'⚠':'✓') : ''}</span>
      </td>
      <td style="padding-right:12px;">${spark(sparkVals, color, 84, 24)}</td>
    </tr>`;
  }).join('');

  return `<div class="card" style="padding:0;overflow:hidden;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="sec-hdr">Clinic Breakdown</span>
      <span class="sec-sub">Calls Done · Offline · ${activeCity !== 'ALL' ? activeCity : activeTier !== 'ALL' ? activeTier : 'All Cities'} · with 8wk avg</span>
      <span style="margin-left:auto;font-size:11px;color:#94a3b8;">Click column headers to sort</span>
    </div>
    <div style="overflow-x:auto;max-height:600px;overflow-y:auto;">
    <table class="tbl">
      <thead><tr>
        <th>${sortHdr('Clinic', 'clinic')}</th>
        <th class="r">${sortHdr('Calls Done', 'calls_done')}</th>
        <th class="r">vs 8wk Avg</th>
        <th class="r">${sortHdr('Gross Bkgs', 'gross')}</th>
        <th class="r">${sortHdr('B2D %', 'b2d_pct')}</th>
        <th class="r">${sortHdr('No Show', 'no_show')} <div style="font-size:8px;font-weight:400;color:#94a3b8;margin-top:1px;">target &lt;${NS_TARGET}%</div></th>
        <th>9wk Trend</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    </div>
  </div>`;
}

// ── BUILD CITY SUMMARY ────────────────────────────────────────────────────
function buildCitySummary() {
  if (activeCity !== 'ALL') return '';

  const wk  = ALL_WEEKS[activeWkIdx];
  const wkP = ALL_WEEKS[activeWkIdx + 1];

  const allClinics = Object.keys(JDATA?.offline?.weekly_clinic?.[wk] || {});
  const cityMap = {};
  for (const key of allClinics) {
    const city = clinicKey_city(key);
    const tier = cityTier(city);
    if (activeTier !== 'ALL' && tier !== activeTier) continue;
    if (!cityMap[city]) cityMap[city] = { calls: 0, callsPrv: 0, gross: 0, grossPrv: 0, count: 0, drops: 0, recovering: 0 };
    const d  = clinicData(wk,  key);
    const dP = clinicData(wkP, key);
    cityMap[city].calls    += d.calls_done || 0;
    cityMap[city].callsPrv += dP.calls_done || 0;
    cityMap[city].gross    += d.gross || 0;
    cityMap[city].grossPrv += dP.gross || 0;
    cityMap[city].count++;
    const a = getClinicAnalysis(key);
    if (a?.cat === 'Drop Both Week' || a?.cat === 'Drop this week') cityMap[city].drops++;
    else if (a?.cat === 'Recovering') cityMap[city].recovering++;
  }

  const cityArr2 = Object.entries(cityMap).sort((a,b) => b[1].calls - a[1].calls);
  if (!cityArr2.length) return '';

  const maxCalls = Math.max(...cityArr2.map(([,v]) => v.calls), 1);

  const cityRows = cityArr2.map(([city, v]) => {
    const tier = cityTier(city);
    const tierB = tier === 'T1' ? `<span class="t1b">T1</span>` : tier === 'T2' ? `<span class="t2b">T2</span>` : '';
    const wow = wowPct(v.calls, v.callsPrv);
    const b2d = v.gross > 0 ? v.calls / v.gross * 100 : null;
    const barW = Math.round(v.calls / maxCalls * 100);
    const statusHtml = v.drops > 0 ? `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#fef2f2;color:#991b1b;font-weight:600;margin-left:4px;">${v.drops}▼</span>` :
      v.recovering > 0 ? `<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:#fefce8;color:#a16207;font-weight:600;margin-left:4px;">${v.recovering}↗</span>` : '';

    return `<tr style="cursor:pointer;" onclick="setCity('${city}');document.getElementById('citySel').value='${city}';">
      <td style="font-weight:600;">
        ${city} ${tierB} ${statusHtml}
        <div style="height:3px;width:${barW}%;background:#6366f166;border-radius:2px;margin-top:4px;max-width:80px;"></div>
      </td>
      <td class="cell-r" style="font-size:11px;color:#64748b;">${v.count} clinic${v.count!==1?'s':''}</td>
      <td class="cell-r">
        <span class="val-main">${fmtN(v.calls)}</span>
        <span class="val-sub">${wow != null ? wowHtml(wow) : ''}</span>
      </td>
      <td class="cell-r">${fmtN(v.gross)}</td>
      <td class="cell-r" style="color:${b2d >= 70 ? '#059669' : b2d >= 60 ? '#d97706' : b2d ? '#dc2626' : '#94a3b8'};">${fmtPct(b2d)}</td>
    </tr>`;
  }).join('');

  return `<div class="card" style="margin-bottom:20px;padding:0;overflow:hidden;">
    <div style="padding:14px 20px;border-bottom:1px solid var(--line);">
      <span class="sec-hdr">City Summary</span>
      <span class="sec-sub" style="margin-left:8px;">Click a city row to drill down · ${activeTier !== 'ALL' ? activeTier : 'All Cities'} · badge = dropping clinics ▼ or recovering ↗</span>
    </div>
    <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr>
        <th>City</th><th class="r">Clinics</th>
        <th class="r">Calls Done</th><th class="r">Gross Bkgs</th><th class="r">B2D %</th>
      </tr></thead>
      <tbody>${cityRows}</tbody>
    </table>
    </div>
  </div>`;
}

// ── COMPARISON PANEL ──────────────────────────────────────────────────────
function cmpArr_cl(metricKey) {
  const weeks = [...ALL_WEEKS].reverse(); // oldest → newest for chart
  if (cmpClinic_cl === 'ALL') {
    const filtered = getFilteredClinics();
    return weeks.map(wk => {
      let total = 0, pctSum = 0, count = 0;
      for (const key of filtered) {
        const v = clinicData(wk, key)[metricKey];
        if (v != null) {
          if (metricKey === 'b2d_pct') { pctSum += v; count++; }
          else { total += v; count++; }
        }
      }
      if (!count) return null;
      return metricKey === 'b2d_pct' ? pctSum / count : total;
    });
  }
  return weeks.map(wk => clinicData(wk, cmpClinic_cl)[metricKey] ?? null);
}

function renderCmpChart_cl() {
  if (cmpChartCl) { cmpChartCl.destroy(); cmpChartCl = null; }
  if (!JDATA) return;
  const el = document.getElementById('cmpCanvas_cl');
  if (!el) return;
  const weeks = [...ALL_WEEKS].reverse();
  const labels = weeks.map(wk =>
    JDATA?.offline?.weekly_funnel?.[wk]?.label || JDATA?.all?.weekly_funnel?.[wk]?.label || wk);
  const mA = CMP_CL_METRICS.find(m => m.key === cmpA_cl);
  const mB = CMP_CL_METRICS.find(m => m.key === cmpB_cl);
  if (!mA || !mB) return;
  const dataA = cmpArr_cl(cmpA_cl);
  const dataB = cmpArr_cl(cmpB_cl);
  const useDual = mA.type !== mB.type;
  const fmtA = mA.type === 'pct' ? v => v.toFixed(1)+'%' : v => Math.round(v).toLocaleString();
  const fmtB = mB.type === 'pct' ? v => v.toFixed(1)+'%' : v => Math.round(v).toLocaleString();
  const segLabel = cmpClinic_cl === 'ALL'
    ? ' (all filtered)' : ` · ${clinicKey_name(cmpClinic_cl)} (${clinicKey_city(cmpClinic_cl)})`;
  cmpChartCl = new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: mA.lbl + segLabel, data: dataA,
          borderColor:'#6366f1', backgroundColor:'#6366f115', fill:true,
          tension:0.3, borderWidth:2.5, pointRadius:3, pointBackgroundColor:'#6366f1',
          spanGaps:true, yAxisID:'yA' },
        { label: mB.lbl + segLabel, data: dataB,
          borderColor:'#f59e0b', backgroundColor:'transparent',
          tension:0.3, borderWidth:2.5, pointRadius:3, pointBackgroundColor:'#f59e0b',
          spanGaps:true, yAxisID: useDual ? 'yB' : 'yA' },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      scales: {
        x:  { grid:{display:false}, ticks:{font:{size:9},maxRotation:45} },
        yA: { position:'left',  grid:{color:'#f1f5f9'}, ticks:{callback:fmtA,font:{size:9}} },
        ...(useDual ? { yB:{ position:'right', grid:{display:false}, ticks:{callback:fmtB,font:{size:9}} } } : {})
      },
      plugins: {
        legend:  { position:'top', labels:{font:{size:10},boxWidth:10,padding:8} },
        tooltip: { mode:'index', intersect:false,
          callbacks:{ label: ctx => `${ctx.dataset.label}: ${ctx.datasetIndex===0 ? fmtA(ctx.raw??0) : fmtB(ctx.raw??0)}` }
        }
      }
    }
  });
}

function buildComparePanel_cl() {
  if (!JDATA) return '';
  const filtered = getFilteredClinics();
  const clinicOpts = ['<option value="ALL">All filtered clinics</option>'];
  filtered.slice(0, 60).forEach(key => {
    const city = clinicKey_city(key);
    const name = clinicKey_name(key);
    clinicOpts.push(`<option value="${key}"${key===cmpClinic_cl?' selected':''}>${name} (${city})</option>`);
  });
  const metOptsA = CMP_CL_METRICS.map(m => `<option value="${m.key}"${m.key===cmpA_cl?' selected':''}>${m.lbl}</option>`).join('');
  const metOptsB = CMP_CL_METRICS.map(m => `<option value="${m.key}"${m.key===cmpB_cl?' selected':''}>${m.lbl}</option>`).join('');
  return `
  <div class="card" style="margin-bottom:20px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <span style="font-size:13px;font-weight:700;color:var(--ink);">📊 Compare Parameters</span>
      <span class="sec-sub">any two metrics over all weeks</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
        <select onchange="cmpClinic_cl=this.value;renderCmpChart_cl()"
          style="padding:4px 8px;border:1px solid var(--line);border-radius:6px;font-size:11px;background:#fff;max-width:200px;">
          ${clinicOpts.join('')}
        </select>
        <select onchange="cmpA_cl=this.value;renderCmpChart_cl()"
          style="padding:4px 8px;border:1px solid var(--line);border-radius:6px;font-size:11px;background:#fff;color:#6366f1;border-color:#c7d2fe;font-weight:600;">
          ${metOptsA}
        </select>
        <span style="font-size:11px;color:#94a3b8;font-weight:600;">vs</span>
        <select onchange="cmpB_cl=this.value;renderCmpChart_cl()"
          style="padding:4px 8px;border:1px solid var(--line);border-radius:6px;font-size:11px;background:#fff;color:#d97706;border-color:#fde68a;font-weight:600;">
          ${metOptsB}
        </select>
      </div>
    </div>
    <div style="height:220px;position:relative;"><canvas id="cmpCanvas_cl"></canvas></div>
  </div>`;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  if (!JDATA) return;
  const wk  = ALL_WEEKS[activeWkIdx];
  const lbl = JDATA?.offline?.weekly_funnel?.[wk]?.label || wk;

  const cityLabel = activeCity !== 'ALL'
    ? `<strong>${activeCity}</strong> <a href="#" onclick="setCity('ALL');document.getElementById('citySel').value='ALL';return false;" style="font-size:10px;color:#94a3b8;text-decoration:none;margin-left:4px;">✕ Clear</a>`
    : activeTier !== 'ALL' ? `<strong>${activeTier}</strong> cities` : 'All cities';

  document.getElementById('root').innerHTML = `
    <div style="margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <div>
        <h1 style="font-size:22px;font-weight:700;margin:0 0 4px;">Clinic Analysis</h1>
        <p style="color:var(--muted);font-size:12px;margin:0;">
          Week of <strong>${lbl}</strong> · ${cityLabel} · Offline only · 4-week trends per clinic
        </p>
      </div>
    </div>

    ${buildKPIStrip()}
    ${buildClinicCards()}

    <!-- 📊 COMPARISON PANEL (collapsed) -->
    <details class="sect">
      <summary><span class="sect-t">📊 Compare Clinics</span><span class="sect-s">Build your own multi-week clinic comparison across any metric</span><span class="sect-cv">▶</span></summary>
      <div class="sect-body">${buildComparePanel_cl()}</div>
    </details>

    <div style="text-align:center;color:#94a3b8;font-size:11px;margin:20px 0 40px;">
      Data: appointments CSV (calls done, gross bookings, B2D%, no-show) · Offline scope only ·
      Channel breakdown from recent 2-week analysis · 8wk avg = rolling average
    </div>
  `;

  requestAnimationFrame(() => renderCmpChart_cl());
}

// ── CONTROLS ──────────────────────────────────────────────────────────────
function setTier(tier) {
  activeTier = tier;
  activeCity = 'ALL';
  document.getElementById('citySel').value = 'ALL';
  ['tAll','tT1','tT2'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const m = { ALL:'tAll', T1:'tT1', T2:'tT2' };
  document.getElementById(m[tier])?.classList.add('active');
  render();
}
function setCity(city) {
  activeCity = city;
  render();
}
function setWeek(val) {
  activeWkIdx = parseInt(val, 10);
  expandedCards.clear(); // close all expanded cards on week change
  render();
}
function setSort(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = false; }
  render();
}
function setClinicSearch(val) {
  clinicSearch = val;
  render();
}
function setMaturity(m) {
  activeMaturity = m;
  ['mAll','mMatured','mMaturing','mNew'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const map = { ALL:'mAll', matured:'mMatured', maturing:'mMaturing', new:'mNew' };
  document.getElementById(map[m])?.classList.add('active');
  render();
}
function toggleCard(key) {
  if (expandedCards.has(key)) expandedCards.delete(key);
  else expandedCards.add(key);
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    // Fetch both data files in parallel
    const [res, cRes, fRes, pRes] = await Promise.all([
      fetch('data.json'),
      fetch('data_clinic.json').catch(() => null),
      fetch('data_clinic_funnel.json').catch(() => null),
      fetch('data_practo_leads.json').catch(() => null),
    ]);
    if (!res.ok) throw new Error('data.json not found');
    JDATA = await res.json();
    if (cRes?.ok) {
      try { CDATA = await cRes.json(); } catch(e) { CDATA = null; }
    }
    if (fRes?.ok) { try { LF = await fRes.json(); } catch(e) { LF = null; } }
    if (pRes?.ok) { try { PL = await pRes.json(); } catch(e) { PL = null; } }

    // Build ALL_WEEKS newest-first
    ALL_WEEKS = [...(JDATA.weeks || [])].reverse();

    // Build city dropdown
    const citySet = new Set();
    for (const wk of ALL_WEEKS) {
      for (const key of Object.keys(JDATA?.offline?.weekly_clinic?.[wk] || {})) {
        citySet.add(clinicKey_city(key));
      }
    }
    const citySel = document.getElementById('citySel');
    [...citySet].sort().forEach(city => {
      const tier = cityTier(city);
      const opt = document.createElement('option');
      opt.value = city;
      opt.textContent = `${city}${tier ? ' ('+tier+')' : ''}`;
      citySel.appendChild(opt);
    });

    // Build week selector
    const sel = document.getElementById('weekSel');
    ALL_WEEKS.forEach((wk, i) => {
      const lbl = JDATA.offline?.weekly_funnel?.[wk]?.label || JDATA.all?.weekly_funnel?.[wk]?.label || wk;
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = lbl;
      if (i === 0) opt.selected = true;
      sel.appendChild(opt);
    });

    render();
  } catch (err) {
    document.getElementById('root').innerHTML =
      `<div class="loading" style="color:#dc2626;">⚠ ${err.message}<br>Make sure the server is running and data.json is present.</div>`;
  }
}

// Resize charts when a collapsed <details class="sect"> is opened
document.addEventListener('toggle', e => {
  const d = e.target;
  if (d.tagName !== 'DETAILS' || !d.classList.contains('sect') || !d.open) return;
  requestAnimationFrame(() => d.querySelectorAll('canvas').forEach(cv => {
    try { const c = window.Chart && Chart.getChart(cv); if (c) c.resize(); } catch(_) {}
  }));
}, true);

document.addEventListener('DOMContentLoaded', init);
</script>
