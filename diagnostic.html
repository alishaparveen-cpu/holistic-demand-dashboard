<!doctype html>

<style>
:root{
  --ink:#0f172a;--muted:#64748b;--dim:#94a3b8;--line:#e2e8f0;
  --red:#dc2626;--amber:#d97706;--green:#059669;--blue:#0ea5e9;--purple:#7c3aed;--indigo:#4f46e5;
}
html,body{background:#f8fafc;color:var(--ink);font-family:ui-sans-serif,system-ui,sans-serif;font-size:13px;margin:0;}
.nav-link{font-size:12px;color:#64748b;text-decoration:none;padding:4px 8px;border-radius:6px;}
.nav-link:hover{background:#f1f5f9;color:#0f172a;}
.nav-link.active{font-weight:700;color:#0f172a;background:#f1f5f9;}
.nav-sep{color:#e2e8f0;font-size:14px;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:0 1px 3px rgba(15,23,42,.05);margin-bottom:16px;}
.sec-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;background:#eef2ff;color:#4338ca;font-weight:800;font-size:11px;margin-right:8px;flex-shrink:0;}
.sec-h{font-size:15px;font-weight:800;color:var(--ink);display:flex;align-items:center;margin-bottom:4px;}
.sec-sub{font-size:11.5px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.toggle{display:flex;gap:3px;background:#f1f5f9;border-radius:10px;padding:3px;}
.toggle button{padding:5px 14px;border:none;background:none;border-radius:8px;font-size:12px;font-weight:700;color:#64748b;cursor:pointer;font-family:inherit;}
.toggle button.on{background:#0f172a;color:#fff;box-shadow:0 1px 3px rgba(15,23,42,.2);}
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700;}
table.rca{width:100%;border-collapse:collapse;font-size:12px;}
table.rca th{background:#f8fafc;color:#64748b;font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:7px 9px;text-align:left;border-bottom:2px solid var(--line);white-space:nowrap;}
table.rca td{padding:7px 9px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
table.rca tr:hover td{background:#fafaff;}
table.rca td.r,table.rca th.r{text-align:right;}
table.rca td.c,table.rca th.c{text-align:center;}
.dim-ok{color:var(--green);font-weight:800;}
.dim-bad{color:var(--red);font-weight:800;}
.kpi{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 16px;}
/* collapsible diagnostic step */
.accstep{border:1px solid var(--line);border-radius:13px;margin-bottom:11px;background:#fff;box-shadow:0 1px 3px rgba(15,23,42,.04);overflow:hidden;}
.accstep>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:13px 15px;user-select:none;}
.accstep>summary::-webkit-details-marker{display:none;}
.accstep>summary:hover{background:#fafbff;}
.accstep .chev{margin-left:auto;color:#cbd5e1;font-size:13px;transition:transform .18s;flex:none;}
.accstep[open] .chev{transform:rotate(180deg);}
.accstep .accbody{padding:2px 15px 15px;}
.stepbadge{display:inline-flex;align-items:center;justify-content:center;width:25px;height:25px;border-radius:50%;color:#fff;font-size:12.5px;font-weight:800;flex:none;}
/* horizontal step tabs for the clinic deep-dive */
.diagtabs{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 9px;margin-bottom:14px;border-bottom:2px solid var(--line);-webkit-overflow-scrolling:touch;}
.diagtab{flex:none;display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:#64748b;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:8px 13px;cursor:pointer;white-space:nowrap;transition:box-shadow .12s,border-color .12s;}
.diagtab:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);}
.diagtab.on{box-shadow:0 3px 12px rgba(0,0,0,.08);}
.diagtab .dt-num{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:#eef2ff;color:#4338ca;font-size:11px;font-weight:800;flex:none;}
.diagtab .dt-stat{font-weight:800;font-size:11px;}
.vchip{border:1px solid var(--line);border-radius:11px;padding:9px 11px;background:#fff;}
.vchip .vc-l{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--dim);}
.vchip .vc-v{font-size:21px;font-weight:800;line-height:1;margin:3px 0 1px;}
.kpi-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dim);}
.kpi-v{font-size:30px;font-weight:800;line-height:1.05;margin-top:5px;}
.kpi-s{font-size:11px;color:var(--muted);margin-top:4px;}
.barrow{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.barrow .bl{width:150px;flex-shrink:0;font-size:11.5px;color:#475569;text-align:right;font-weight:600;}
.barrow .bt{flex:1;height:22px;background:#f1f5f9;border-radius:5px;overflow:hidden;position:relative;}
.barrow .bf{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-size:10.5px;font-weight:800;color:#fff;}
.loading-msg{display:flex;align-items:center;justify-content:center;min-height:240px;color:var(--muted);}
code{background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:11px;}
</style>
</head>

<script>
// ═══════════════ CONFIG ═══════════════
const SHEET_ID  = '1bZWGVKu6b4EFPDt3aKHn21gYjdhN1aT1-LT60BFe8g0';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Booking%20and%20Leads%20trend%20summary`;
const PRACTO_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=RD_Practo_Leads`;
const L0_ID  = '1jyyFYpd7gfYyAQ3U7E56c7OA3OuQQAVgJrAGyQr90XM';
const L0_URL = `https://docs.google.com/spreadsheets/d/${L0_ID}/gviz/tq?tqx=out:csv&sheet=L0`;
const L0_WEEK_COLS = [2,3,4,5,6,7,8];

// Core leads/availability/bookings come from the demand-tracker sheet, which keeps
// a rolling 7-week window (Availability block has 7 columns). Roster hours/shrinkage
// (data_roster.json) carry 12 weeks, but we cap WEEKS to the sheet so every metric
// is real (no false zeros for older weeks).
const WEEKS = [
  { sheet:'31/05/2026', json:'2026-05-25', label:'25–31 May' },
  { sheet:'24/05/2026', json:'2026-05-18', label:'18–24 May' },
  { sheet:'17/05/2026', json:'2026-05-11', label:'11–17 May' },
  { sheet:'10/05/2026', json:'2026-05-04', label:'4–10 May'  },
  { sheet:'03/05/2026', json:'2026-04-27', label:'27 Apr–3 May' },
  { sheet:'26/04/2026', json:'2026-04-20', label:'20–26 Apr' },
  { sheet:'19/04/2026', json:'2026-04-13', label:'13–19 Apr' },
  { sheet:'12/04/2026', json:'2026-04-06', label:'6–12 Apr' },
  { sheet:'05/04/2026', json:'2026-03-30', label:'30 Mar–5 Apr' },
  { sheet:'29/03/2026', json:'2026-03-23', label:'23–29 Mar' },
  { sheet:'22/03/2026', json:'2026-03-16', label:'16–22 Mar' },
  { sheet:'15/03/2026', json:'2026-03-09', label:'9–15 Mar' },
];
const AVAIL_C = 4, ALLBK_C = 20, GMB_C = 27;   // sheet column offsets (Availability "Total | Weekend", bookings, GMB+Google leads)

const CAUSE = {
  avail:{label:'Availability', short:'availability', col:'#7c3aed', bg:'#f5f3ff', owner:'Supply / roster',     desc:'doctor active-days fell — there was no slot to book into'},
  l2b:  {label:'L2B conversion', short:'conversion', col:'#d97706', bg:'#fffbeb', owner:'Call-handling',       desc:'leads & doctor-days held, yet fewer booked — a conversion gap'},
  leads:{label:'Clinic leads', short:'leads', col:'#0ea5e9', bg:'#eff6ff', owner:'Local mktg / GMB',          desc:'inbound leads fell — demand at the clinic, not conversion'},
};
const MIXCOL='#be185d';

// ═══════════════ STATE ═══════════════
let JDATA=null, SDATA={}, L0=null, PRACTO={}, ROSTER={};   // PRACTO['City|Clinic'] = [7 weekly counts aligned to WEEKS]; ROSTER['City|Clinic']={hrs:[7],we_hrs:[7]} scheduled bookable hours
let LEADS={}, REVIEWS={}, MKT=null, BOOKTYPE={}, GACITY={}, NEGREV={}, GMBINS={};   // Redshift leads-by-source · GMB review velocity · Google Ads impression-share · booking-type split · city-level Google Ads health · recent negative reviews · GMB profile Insights (searches/interactions)
function gmbInsArr(city,clinic,field){ const o=GMBINS[city+'|'+clinic]; return o&&o[field] ? o[field].slice(0,WEEKS.length) : Array(WEEKS.length).fill(0); }
function hasGmbIns(city,clinic){ return !!GMBINS[city+'|'+clinic]; }
let LEADAGE={};   // data_lead_age.json — bookings split by lead age (same/last/older week)
function leadAgeArr(city,clinic,field){ const o=LEADAGE[city+'|'+clinic]; return o&&o[field] ? o[field].slice(0,WEEKS.length) : Array(WEEKS.length).fill(0); }
function hasLeadAge(city,clinic){ return !!LEADAGE[city+'|'+clinic]; }
let DMF={};   // data_demand_funnel.json — inbound-call relevance funnel + call attempts (demand_data_week_superset)
function dmfArr(city,clinic,group,field){ const o=DMF[city+'|'+clinic]; const g=o&&o[group]; return g&&g[field] ? g[field].slice(0,WEEKS.length) : Array(WEEKS.length).fill(0); }
function hasDmf(city,clinic){ return !!DMF[city+'|'+clinic]; }
let PRACTOBK={};   // data_practo_booked.json — TRUE Practo bookings (phone-match vs appointments), per clinic/week
function practoBkTrueArr(city,clinic){ const a=PRACTOBK[city+'|'+clinic]; if(!a) return Array(WEEKS.length).fill(0); const b=a.slice(0,WEEKS.length); while(b.length<WEEKS.length)b.push(0); return b; }
function hasPractoBkTrue(city,clinic){ return !!PRACTOBK[city+'|'+clinic]; }
let LEADMAT={};   // data_lead_maturation.json — Google/GMB/Organic lead→booking maturation curve (cumulative % by lag), clinic + network
function leadMat(city,clinic){ return LEADMAT[city+'|'+clinic] || (LEADMAT._meta&&LEADMAT._meta.network) || null; }
let PRACTODOC={};   // data_practo_by_doctor.json — Practo leads/booked per clinic split by Doctor Name
let LEADCONV=null;  // data_lead_conv.json — lead→booking conversion by contact mode + source (network)
let AVAILHOD=null;  // data_avail_hod.json — per-clinic dow×hour bookings + slots/shrinkage (hour-granular availability)
let hodRate=false;  // heatmap value mode: false=total over window, true=per-week average
function setHodRate(v){ hodRate=v; render(); }
function availHodArr(city,clinic){ return AVAILHOD&&AVAILHOD.by_clinic ? AVAILHOD.by_clinic[city+'|'+clinic] : null; }
// Heatmaps by dow×hour: bookings (volume), UTILIZATION (booked÷available = how busy), shrinkage. + hour loss.
// Windows over the last winN weeks (follows the view's window control) — data carries per-week arrays.
function availHeatmaps(r, winN){
  const m=availHodArr(r.city,r.clinic); if(!m) return '';
  const nWk=(AVAILHOD&&AVAILHOD.weeks?AVAILHOD.weeks.length:12), WN=Math.min(winN||8,nWk);
  const slL=arr=>{ arr=arr||[]; let s=0; for(let i=Math.max(0,arr.length-WN);i<arr.length;i++) s+=arr[i]||0; return s; };
  const cv=(dw,h)=>{ const c=(m[dw]||{})[h]||{}; return {b:slL(c.b),x:slL(c.x),a:slL(c.a),s:slL(c.s)}; };
  const hours=new Set(); Object.values(m).forEach(hrs=>Object.keys(hrs).forEach(h=>hours.add(+h)));
  const hrs=[...hours].sort((a,b)=>a-b); if(!hrs.length) return '';
  const days=[['1','Mon'],['2','Tue'],['3','Wed'],['4','Thu'],['5','Fri'],['6','Sat'],['0','Sun']];
  const dn={'0':'Sun','1':'Mon','2':'Tue','3':'Wed','4':'Thu','5':'Fri','6':'Sat'};
  const hl=h=>{const x=+h;return (x%12||12)+(x<12?'a':'p');};
  const minA=Math.max(2,Math.ceil(WN*0.5));   // ignore noisy near-empty cells for the "busiest" pick
  let maxB=0,maxX=0,loss=0,peakB={c:0},peakU={u:-1};
  days.forEach(([dw])=>hrs.forEach(h=>{ const c=cv(dw,h); const b=c.b,x=c.x,a=c.a;
    if(b>maxB)maxB=b; if(b>peakB.c)peakB={c:b,dw,h}; if(x>maxX)maxX=x;
    if(a>0){ loss+=(b/a)*x; const u=b/a; if(a>=minA && u>peakU.u) peakU={u,dw,h,b,a}; } }));
  const grid=(valFn,maxV,rgb,suf)=>{
    const head=`<tr><td></td>${hrs.map(h=>`<td style="font-size:7px;color:#cbd5e1;text-align:center">${hl(h)}</td>`).join('')}</tr>`;
    const rows=days.map(([dw,lbl])=>`<tr><td style="font-size:8.5px;color:#64748b;font-weight:600;padding-right:4px;text-align:right">${lbl}</td>${hrs.map(h=>{const v=valFn(cv(dw,h));const al=maxV>0?Math.min(1,v/maxV):0;
      return `<td title="${dn[dw]} ${hl(h)}" style="width:18px;height:15px;text-align:center;font-size:7px;background:${v===0?'#f8fafc':'rgba('+rgb+','+(0.14+al*0.85)+')'};color:${al>0.55?'#fff':'#64748b'};border-radius:2px">${v?v+(suf||''):''}</td>`;}).join('')}</tr>`).join('');
    return `<table style="border-spacing:1.5px;border-collapse:separate"><tbody>${head}${rows}</tbody></table>`;
  };
  const util=c=>c.a>0?Math.round(c.b/c.a*100):0;
  const rk=hodRate?1/WN:1, rnum=x=>{ const v=x*rk; return hodRate?Math.round(v*10)/10:Math.round(v); };
  const winBtns=[1,2,4,8,12].filter(v=>v<=nWk).map(v=>`<button onclick="setTrendWin(${v})" style="font-size:10px;padding:2px 8px;border-radius:6px;border:1.5px solid ${WN===v?'#0d9488':'var(--line)'};background:${WN===v?'#f0fdfa':'#fff'};color:${WN===v?'#0f766e':'#64748b'};font-weight:${WN===v?700:500};cursor:pointer;">${v}w</button>`).join('');
  const rateBtn=(v,l)=>`<button onclick="setHodRate(${v})" style="font-size:10px;padding:2px 8px;border-radius:6px;border:1.5px solid ${hodRate===v?'#4338ca':'var(--line)'};background:${hodRate===v?'#eef2ff':'#fff'};color:${hodRate===v?'#4338ca':'#64748b'};font-weight:${hodRate===v?700:500};cursor:pointer;">${l}</button>`;
  return `<div style="margin-top:12px;border-top:1px dashed var(--line);padding-top:10px;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
      <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;">When are doctors busiest? — hour × day <span style="font-weight:500;text-transform:none;">(IST)</span></span>
      <span style="display:flex;gap:4px;align-items:center;"><span style="font-size:9px;color:#cbd5e1;font-weight:700;text-transform:uppercase;">Window</span>${winBtns}</span>
      <span style="display:flex;gap:4px;align-items:center;"><span style="font-size:9px;color:#cbd5e1;font-weight:700;text-transform:uppercase;">Bookings/Shrinkage</span>${rateBtn(false,'Total')}${rateBtn(true,'/week')}</span></div>
    ${peakU.u>=0?`<div style="font-size:11.5px;color:#0f766e;background:#f0fdfa;border:1px solid #99f6e4;border-radius:9px;padding:8px 12px;margin-bottom:10px;"><b>Busiest slot: ${dn[peakU.dw]} ${hl(peakU.h)} at ${Math.round(peakU.u*100)}% utilization</b> (${peakU.b} booked of ${peakU.a} available, last ${WN}w). Utilization = booked ÷ available slots — that's the real "how busy", not just volume.</div>`:''}
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
      <div><div style="font-size:10px;color:#0d9488;font-weight:700;margin-bottom:3px;">⚡ Utilization (booked ÷ available)</div>${grid(util,100,'13,148,136','%')}</div>
      <div><div style="font-size:10px;color:#4338ca;font-weight:700;margin-bottom:3px;">📅 Bookings ${hodRate?'(per week)':'(volume)'} ${peakB.c?`· peak ${dn[peakB.dw]} ${hl(peakB.h)}`:''}</div>${grid(c=>rnum(c.b),maxB*rk||1,'79,70,229')}</div>
      <div><div style="font-size:10px;color:#dc2626;font-weight:700;margin-bottom:3px;">✂️ Doctor shrinkage ${hodRate?'(blocked/week)':'(blocked slots)'}</div>${grid(c=>rnum(c.x),maxX*rk||1,'220,38,38')}</div>
    </div>
    <div style="font-size:10.5px;color:#94a3b8;margin-top:6px;">Last <b>${WN} week${WN>1?'s':''}</b> (change with Window). Bookings/Shrinkage show <b>${hodRate?'per-week average':'window total'}</b> (toggle above); utilization is always a rate. Volume = <i>where bookings land</i>; utilization = <i>where slots are full</i>.</div>
    <div style="font-size:11.5px;color:#334155;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:9px;padding:9px 12px;margin-top:10px;line-height:1.5;">
      <b>~${Math.round(loss)} bookings lost to availability over ${WN}w (~${Math.round(loss/WN)}/wk)</b> — each blocked slot × that exact hour's utilization (bookings ÷ available). A block at a <b>${peakU.u>=0?Math.round(peakU.u*100)+'%-full':'high-util'}</b> hour costs real bookings; a block at a near-empty hour costs ~nothing.
      <div style="color:#7c2d12;margin-top:5px;font-size:10.5px;">⚠ Caveat: assumes demand would have filled those slots. If <b>leads</b> also fell, some of the gap is missing demand, not blocked supply.</div>
    </div>
  </div>`;
}
// Lead→conversion panel: how leads we engage convert to bookings, by contact mode + source. Network-level.
// Channel funnel Sankey: Leads (by channel) → Booked / Not booked → Done / No-show. Lead-attributed only.
function leadSankey(){
  if(!LEADCONV||!LEADCONV.by_source) return '';
  const COL={'Google/Call':'#6366f1','GMB':'#0d9488','Meta':'#2563eb','WhatsApp':'#16a34a','Practo':'#f59e0b','Organic/Direct':'#d97706','Other':'#94a3b8'};
  const chans=LEADCONV.by_source.filter(s=>s.leads>0).slice().sort((a,b)=>b.leads-a.leads);
  if(!chans.length) return '';
  const L=chans.reduce((a,s)=>a+s.leads,0), BK=chans.reduce((a,s)=>a+s.booked,0), DN=chans.reduce((a,s)=>a+(s.done||0),0), NC=L-BK, ND=BK-DN;
  if(L<=0||BK<=0) return '';
  const H=300,gap=14,scale=H/L,barW=12,xCh=4,xMid=378,xRb=726, pct=(a,b)=>b>0?Math.round(a/b*100):0;
  let cy=0; const chN=chans.map(s=>{const h=s.leads*scale;const n=Object.assign({},s,{y:cy,h});cy+=h;return n;});

          leadsBroke,actBroke,weBroke,availBroke,cause,mixWith,comp,L,mat,note,

          bkArr:bk,bkWeArr:bkWe,bkNewArr:bkNew,bkRepeatArr:bkRepeat,bkDoneArr:bkDone,bkDoneNewArr:bkDoneNew,bkDoneRepeatArr:bkDoneRepeat,bkReschedArr:bkResched,bkMissedArr:bkMissed,bkCancelledArr:bkCancelled,ldArr:ld,avArr:av,weArr:we,gmbArr:gmb,prArr:pr,wdArr:wd,

function allClinicRCA(){
  const out=[];
  for(const city of Object.keys(SDATA)) for(const clinic of Object.keys(SDATA[city])) if(clinic!=='_total'){
    const r=SDATA[city][clinic]._total; if(sum(r.allBk)===0) continue;
    out.push(rcaClinic(city,clinic));
  }
  return out;
}
function netSeries(){ // network offline bookings per week (sum of all clinics)
  const s=Array(WEEKS.length).fill(0);
  for(const city of Object.keys(SDATA)){ const t=SDATA[city]._total; for(let i=0;i<WEEKS.length;i++) s[i]+=(t.allBk[i]||0); }
  return s;
}
// attributed cause totals (sum each clinic's split across material-loss clinics) + clinics grouped by primary cause
function aggCauses(rows){
  const buckets={avail:[],l2b:[],leads:[]}; const causeTotals={avail:0,l2b:0,leads:0}; let growth=0;
  for(const r of rows){
    if(r.cause==='grew'||r.cause==='ok'){ if(r.dBk>0) growth+=r.dBk; continue; }
    if(buckets[r.cause]) buckets[r.cause].push(r);
    causeTotals.avail-=r.comp.avail; causeTotals.l2b-=r.comp.l2b; causeTotals.leads-=r.comp.leads;
  }
  const totalLost=causeTotals.avail+causeTotals.l2b+causeTotals.leads;
  const mixCount=rows.filter(r=>r.mixWith).length;
  return {buckets,causeTotals,totalLost,growth,mixCount};
}
function rcaOffline(){
  const rows=allClinicRCA();
  const A=aggCauses(rows);
  const series=netSeries(), W=wkIdx;
  const netW=series[W], netPeak=Math.max(...series.slice(W+1,W+3)), netAvg=avg(series.slice(W+1,W+6));
  const netBase = expectedOf(series, W);
  const mat={New:{g:0,l:0},Maturing:{g:0,l:0},Mature:{g:0,l:0}};
  for(const r of rows){ const b=mat[r.mat]; if(r.dBk>0)b.g+=r.dBk; else b.l+=r.dBk; }
  const watch=rows.filter(r=>r.dLeadPct<=-25 && r.dBk>-3).sort((a,b)=>a.dLeadPct-b.dLeadPct);
  return {rows,...A,netW,netPeak,netAvg,netBase,mat,watch,series};
}

// ═══════════════ ONLINE RCA ENGINE ═══════════════
function rcaOnline(){
  const W=wkIdx;
  const ser=k=>{ const o=JDATA.online.weekly_total; return WEEKS.map(w=>o[w.json]?.total||0); };
  const bk=ser(), bkW=bk[W], bkAvg=avg(bk.slice(W+1,W+6));
  const callsArr=WEEKS.map(w=>JDATA.online.weekly_funnel?.[w.json]?.calls_done||0);
  const ch={};
  if(L0){ const ovl=L0.overallLeads||[]; const goodWk=i=>ovl[i]!=null && ovl[i]>2000;   // skip incomplete L0 weeks
    for(const k of ['fb','google','gmb','practo']){ const a=L0[k]||[]; const bv=[];
      for(let i=W+1;i<=W+5;i++){ if(goodWk(i)&&a[i]!=null) bv.push(a[i]); }
      ch[k]={w:a[W]||0, base: bv.length? bv.reduce((x,y)=>x+y,0)/bv.length : 0 }; } }
  // dominant lead mover (the channel that fell most)
  let driver=null,worst=0;
  for(const [k,v] of Object.entries(ch)){ const d=v.w-v.base; if(d<worst){worst=d;driver=k;} }
  return {bk,bkW,bkAvg,dBk:bkW-bkAvg,callsArr,callsW:callsArr[W],callsAvg:avg(callsArr.slice(W+1,W+6)),ch,driver,driverDelta:worst};
}

  const days = r.actBroke
    ? `doctor-days <b style="color:${ac}">fell ${signed(r1(r.dAct))}</b>`
    : `doctor-days held <span style="color:#059669">(${signed(r1(r.dAct))}) ✓</span>`;
  const wknd = r.weBroke
    ? `weekend cover <b style="color:${ac}">−${r1(r.weLost)}d</b>`

  } else if(r.cause==='avail'){

function cityRollup(R){

function renderOffline(){

  const detail=`<div class="card">

// Dedicated Practo section for the Quick View — leads + phone-matched bookings + by-doctor,
// aggregated over the selected clinic(s). Always expanded.
function practoSection(rows){
  if(!rows||!rows.length) return '';
  const W=wkIdx, NWK=WEEKS.length;
  const winN=trendWin==='all'?NWK:Math.min(+trendWin||6,NWK);
  const rev=a=>a.slice(0,NWK).reverse().slice(-winN), hi=(winN-1)-W;
  const nrm=a=>{ const w=(a||[]).slice(0,winN).filter(x=>x!=null&&!isNaN(x)); return w.length?w.reduce((s,x)=>s+(+x||0),0)/w.length:0; };
  const mini=(label,col,sub,svg)=>`<div style="margin-bottom:9px;"><div style="font-size:12px;font-weight:700;color:${col};">${label}</div><div style="font-size:10px;color:#94a3b8;margin-bottom:3px;">${sub}</div>${svg}</div>`;
  const add=(acc,arr)=>{ for(let i=0;i<NWK;i++) acc[i]=(acc[i]||0)+((arr&&arr[i])||0); return acc; };
  let leads=Array(NWK).fill(0), booked=Array(NWK).fill(0); const byDoc={}; let anyP=false, anyB=false;
  rows.forEach(r=>{ const l=practoArr(r.city,r.clinic); if(l.some(x=>x>0)) anyP=true; add(leads,l);
    const b=practoBkTrueArr(r.city,r.clinic); if(b.some(x=>x>0)) anyB=true; add(booked,b);
    const bd=practoByDoctor(r.city,r.clinic); if(bd){ Object.keys(bd).forEach(d=>{ byDoc[d]=byDoc[d]||Array(NWK).fill(0); add(byDoc[d], bd[d].leads||[]); }); } });
  if(!anyP && !anyB && !Object.keys(byDoc).length) return '';
  const lw=leads[W]||0, ln=nrm(leads), dL=ln?Math.round((lw-ln)/ln*100):0;
  const bw=booked[W]||0, bn=nrm(booked), dB=bn?Math.round((bw-bn)/bn*100):0;
  const l2b = lw>0?Math.round(bw/lw*100):null;
  const docs=Object.keys(byDoc).map(d=>({d,w:byDoc[d][W]||0,tot:byDoc[d].slice(0,winN).reduce((a,b)=>a+b,0),arr:byDoc[d]})).filter(x=>x.tot>0).sort((a,b)=>b.w-a.w||b.tot-a.tot);
  const mx=Math.max(1,...docs.map(x=>x.w));
  const docList=docs.length?`<details open style="margin-top:8px;"><summary style="cursor:pointer;font-size:11px;font-weight:700;color:#b45309;padding:3px 0;">Practo leads by doctor — ${WEEKS[W].label} (click a doctor for trend) · ${docs.length} with leads</summary>
    <div style="padding:5px 0 2px;">${docs.map(x=>{ const dn=nrm(x.arr); return `<details style="margin-bottom:2px;"><summary style="cursor:pointer;list-style:none;display:flex;align-items:center;gap:7px;font-size:11px;padding:2px 0;">
      <span style="flex:0 0 42%;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${x.d}">▸ ${x.d.replace(/^Dr\.?\s*/,'')}</span>
      <span style="flex:1;height:10px;background:#fff7ed;border-radius:3px;overflow:hidden;"><span style="display:block;height:100%;width:${x.w/mx*100}%;background:#f59e0b;"></span></span>
      <span style="flex:0 0 auto;font-weight:800;color:#0f172a;">${x.w}</span></summary>
      <div style="padding:2px 0 7px 10px;"><div style="font-size:9px;color:#94a3b8;margin-bottom:1px;">weekly Practo leads · ${x.tot} in last ${winN}w · dashed = ${winN}-wk avg</div>${spark(rev(x.arr),'#f59e0b',hi,null,dn)}</div></details>`; }).join('')}</div></details>`:'<div style="font-size:10.5px;color:#94a3b8;margin-top:6px;">No per-doctor Practo leads for this scope.</div>';
  const scopeLbl = rows.length===1?`${rows[0].clinic} · ${rows[0].city}`:((geoSel.size?geoScopeText():'all clinics')+` · ${rows.length} clinics`);
  return `<div class="card" style="border-top:3px solid #f59e0b;">
    <div class="sec-h"><span class="sec-num" style="background:#f59e0b;">P</span>Practo — ${scopeLbl}</div>
    <div class="sec-sub">Practo profile leads &amp; phone-matched bookings for the selected scope · ${WEEKS[W].label} · dashed = ${winN}-wk norm</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:12px;">
      <div class="kpi"><div class="kpi-l">Practo leads · ${WEEKS[W].label}</div><div class="kpi-v">${lw}</div><div class="kpi-s" style="color:${dCol(dL)}">${signed(dL,'%')} vs ${winN}-wk avg</div></div>
      <div class="kpi"><div class="kpi-l">Practo booked (true)</div><div class="kpi-v">${bw}</div><div class="kpi-s" style="color:${dCol(dB)}">${signed(dB,'%')} vs avg</div></div>
      <div class="kpi"><div class="kpi-l">Lead → booked</div><div class="kpi-v">${l2b==null?'—':l2b+'%'}</div><div class="kpi-s">phone-matched, this scope</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;">
      ${anyP?mini('Practo leads trend','#f59e0b','profile leads · dashed = '+winN+'-wk avg',spark(rev(leads),'#f59e0b',hi,null,ln)):''}
      ${anyB?mini('Practo booked trend','#ea580c','phone-matched true bookings · dashed = '+winN+'-wk avg',spark(rev(booked),'#ea580c',hi,null,bn)):''}
    </div>
    ${docList}
  </div>`;
}

// inline SVG trend sparkline with value labels; hiIdx = highlighted (selected) point.
// refVal (optional) draws a dashed "normal/expected" baseline so the reader can
// see at a glance how the latest point sits vs the clinic's recent norm.
function spark(vals, color, hiIdx, fmt, refVal){
  const w=340,h=90,pad=10;
  const valid=vals.filter(x=>x!=null);                 // null = no data that week → render as a gap, not 0
  if(valid.length<2) return '<div style="color:#94a3b8;font-size:11px;">no trend</div>';
  const hasRef = refVal!=null && isFinite(refVal);
  const mn=Math.min(...valid,0,hasRef?refVal:Infinity), mx=Math.max(...valid,1,hasRef?refVal:-Infinity), rng=(mx-mn)||1;
  const X=i=>pad+i/(vals.length-1)*(w-2*pad), Y=v=>h-pad-(v-mn)/rng*(h-2*pad);
  let path='', pen=false;                              // break the line across null gaps
  vals.forEach((v,i)=>{ if(v==null){ pen=false; return; } path+=(pen?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' '; pen=true; });
  const dots=vals.map((v,i)=> v==null?'':`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="${i===hiIdx?4:2.5}" fill="${i===hiIdx?color:'#fff'}" stroke="${color}" stroke-width="1.5"/>`).join('');
  const labs=vals.map((v,i)=> v==null?'':`<text x="${X(i).toFixed(1)}" y="${(Y(v)-7).toFixed(1)}" font-size="9" fill="${i===hiIdx?color:'#64748b'}" text-anchor="middle" font-weight="${i===hiIdx?800:500}">${fmt?fmt(v):v}</text>`).join('');
  let ref='';
  if(hasRef){ const ry=Y(refVal).toFixed(1);
    ref=`<line x1="${pad}" y1="${ry}" x2="${w-pad}" y2="${ry}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>`+
        `<text x="${w-pad}" y="${(+ry-3).toFixed(1)}" font-size="8" fill="#94a3b8" text-anchor="end">norm ${fmt?fmt(refVal):r1(refVal)}</text>`; }
  return `<svg width="100%" viewBox="0 0 ${w} ${h+4}" style="overflow:visible;">${ref}<path d="${path}" fill="none" stroke="${color}" stroke-width="2"/>${dots}${labs}</svg>`;
}
// Multi-line sparkline — e.g. Total / GMB+Google / Practo leads on one chart so
// you can see WHERE a lead gap came from. series=[{vals,color,label,width}].
function sparkMulti(series, hiIdx, showAvg, labelMode, hide, toggle){
  labelMode = labelMode||'all';   // 'all' = label every point · 'hi' = only the highlighted week · 'none'
  hide = hide||new Set();         // Set of series labels to hide · toggle = handler name for clickable legend
  const w=340,h=92,pad=12;
  const vis=series.filter(s=>!hide.has(s.label));         // only visible series drive the chart + scale
  const all=vis.flatMap(s=>s.vals.map(x=>x==null?0:x));
  const mn=Math.min(0,...all), mx=Math.max(1,...all), rng=(mx-mn)||1;
  const n=series[0].vals.length;
  const X=i=>pad+i/(n-1)*(w-2*pad), Y=v=>h-pad-(v-mn)/rng*(h-2*pad);
  // optional per-series average lines (only drawn when toggled on)
  let avgLines='';
  if(showAvg){ avgLines=vis.map(s=>{ const a=s.vals.map(x=>x==null?0:x); const m=a.reduce((x,y)=>x+y,0)/(a.length||1); const y=Y(m).toFixed(1);
    return `<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="${s.color}" stroke-width="1" stroke-dasharray="4 3" opacity="0.65"/><text x="${pad+2}" y="${(+y-2).toFixed(1)}" font-size="7.5" fill="${s.color}" opacity="0.9" font-weight="700">avg ${Math.round(m)}</text>`; }).join(''); }
  // lines + dots (visible only)
  const lines=vis.map(s=>{
    const a=s.vals.map(x=>x==null?0:x);
    const path=a.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    const dots=a.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="${i===hiIdx?3.4:1.9}" fill="${s.color}"/>`).join('');
    return `<path d="${path}" fill="none" stroke="${s.color}" stroke-width="${s.width||1.7}" stroke-linejoin="round"/>${dots}`;
  }).join('');
  // value labels — per-column collision resolution so the numbers never overlap (visible series only)
  const minGap=9; let labels='';
  for(let i=0;i<n;i++){
    if(labelMode==='none') break;
    if(labelMode==='hi' && i!==hiIdx) continue;
    const items=vis.map(s=>{ const v=s.vals[i]==null?0:s.vals[i]; return {color:s.color, v, y:Y(v), hi:i===hiIdx}; })
                      .sort((a,b)=>a.y-b.y);
    let prev=-1e9;
    items.forEach(it=>{ let ly=it.y-4; if(ly<prev+minGap) ly=prev+minGap; prev=ly;
      labels+=`<text x="${X(i).toFixed(1)}" y="${ly.toFixed(1)}" font-size="8" fill="${it.color}" text-anchor="middle" font-weight="${it.hi?800:600}" style="paint-order:stroke;stroke:#fff;stroke-width:2.6px;stroke-linejoin:round;">${it.v}</text>`; });
  }
  const legend=series.map(s=>{ const a=s.vals.map(x=>x==null?0:x), off=hide.has(s.label);
    const click=toggle?`onclick="event.stopPropagation();${toggle}('${encodeURIComponent(s.label)}')" style="cursor:pointer;`:`style="`;
    return `<span ${click}font-size:10px;color:#475569;font-weight:600;margin-right:11px;white-space:nowrap;opacity:${off?0.4:1};${off?'text-decoration:line-through;':''}"><span style="display:inline-block;width:11px;height:3px;background:${s.color};vertical-align:middle;border-radius:2px;margin-right:4px;"></span>${s.label} <b style="color:${s.color};">${a[hiIdx]}</b></span>`; }).join('');
  return `<div style="margin-bottom:3px;">${legend}</div><svg width="100%" viewBox="0 0 ${w} ${h+4}" style="overflow:visible;">${avgLines}${lines}${labels}</svg>`;
}
// Availability split — a clean stacked bar per week: weekday doctor-days (dark)
// + weekend doctor-days (light). Each segment and the weekly total are labelled,
// and a dashed line marks the recent norm. wd/we are display-ordered (old→new).
function availSplitChart(wd, we, hi, normTot, weeks){
  const wkOf=i=>(weeks&&weeks[i])?weeks[i]+' · ':'';
  const w=340,h=112,padX=8,padB=15,padT=15;
  const n=wd.length;
  const tot=wd.map((d,i)=>(d||0)+(we[i]||0));
  const mx=Math.max(1,...tot, normTot||0)*1.14;
  const bw=(w-2*padX)/n*0.6, slot=(w-2*padX)/n;
  const X=i=>padX+(i+0.5)/n*(w-2*padX);
  const base=h-padB;
  const Y=v=>base-(v/mx)*(base-padT);
  const normY=(normTot&&normTot>0)?Y(normTot):null;
  const norm=normY!=null?`<line x1="${padX}" y1="${normY.toFixed(1)}" x2="${w-padX}" y2="${normY.toFixed(1)}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/><text x="${w-padX}" y="${(normY-3).toFixed(1)}" font-size="8" fill="#94a3b8" text-anchor="end">norm ${r1(normTot)}</text>`:'';
  const bars=tot.map((t,i)=>{
    const x=X(i)-bw/2, wdv=wd[i]||0, wev=we[i]||0, hl=i===hi;
    const wdTop=Y(wdv), totTop=Y(t), wdH=base-wdTop, weH=wdTop-totTop;
    let s='';
    if(wdv>0) s+=`<rect x="${x.toFixed(1)}" y="${wdTop.toFixed(1)}" width="${bw.toFixed(1)}" height="${wdH.toFixed(1)}" fill="#7c3aed" opacity="${hl?1:.82}" rx="2"/>`;
    if(wev>0) s+=`<rect x="${x.toFixed(1)}" y="${totTop.toFixed(1)}" width="${bw.toFixed(1)}" height="${weH.toFixed(1)}" fill="#c4b5fd" opacity="${hl?1:.88}" rx="2"/>`;
    if(wdv>0 && wdH>=11) s+=`<text x="${X(i).toFixed(1)}" y="${(base-wdH/2+3).toFixed(1)}" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">${r1(wdv)}</text>`;
    if(wev>0 && weH>=11) s+=`<text x="${X(i).toFixed(1)}" y="${(totTop+weH/2+3).toFixed(1)}" font-size="8.5" fill="#5b21b6" text-anchor="middle" font-weight="700">${r1(wev)}</text>`;
    s+=`<text x="${X(i).toFixed(1)}" y="${(totTop-4).toFixed(1)}" font-size="9.5" fill="${hl?'#4c1d95':'#334155'}" text-anchor="middle" font-weight="800">${r1(t)}</text>`;
    // full-height transparent hover target → tooltip for just this week
    s+=`<rect x="${(X(i)-slot/2).toFixed(1)}" y="${padT.toFixed(1)}" width="${slot.toFixed(1)}" height="${(base-padT).toFixed(1)}" fill="transparent"><title>${wkOf(i)}${r1(t)} doctor-days = ${r1(wdv)} weekday + ${r1(wev)} weekend</title></rect>`;
    return s;
  }).join('');
  const legend=`<div style="margin-bottom:4px;font-size:10px;color:#475569;font-weight:600;">
    <span style="margin-right:12px;"><span style="display:inline-block;width:10px;height:10px;background:#7c3aed;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>Weekday days</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#c4b5fd;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>Weekend days</span></div>`;
  return `${legend}<svg width="100%" viewBox="0 0 ${w} ${h+2}" style="overflow:visible;">${norm}${bars}</svg>`;
}
// Stacked composition bars — N sources stacked per week so the bar HEIGHT = total leads and
// each colour band = that source's share. No crossing lines (unlike a multi-line). Clickable
// legend isolates a source. series:[{label,vals(old→new),color}] · toggle = handler name.
function stackBars(series, hi, weeks, hide, toggle){
  hide=hide||new Set();
  const wkOf=i=>(weeks&&weeks[i])?weeks[i]+' · ':'';
  const vis=series.filter(s=>!hide.has(s.label));
  const w=340,h=124,padX=8,padB=15,padT=16;
  const n=series[0].vals.length;
  const tot=Array.from({length:n},(_,i)=>vis.reduce((a,s)=>a+(s.vals[i]||0),0));
  const mx=Math.max(1,...tot)*1.16;
  const bw=(w-2*padX)/n*0.62, slot=(w-2*padX)/n;
  const X=i=>padX+(i+0.5)/n*(w-2*padX);
  const base=h-padB, Y=v=>base-(v/mx)*(base-padT);
  const bars=Array.from({length:n},(_,i)=>{
    const hl=i===hi; let cum=0; let s='';
    vis.forEach(sr=>{ const v=sr.vals[i]||0; if(v<=0) return;
      const y0=Y(cum), y1=Y(cum+v), hgt=y0-y1; cum+=v;
      s+=`<rect x="${(X(i)-bw/2).toFixed(1)}" y="${y1.toFixed(1)}" width="${bw.toFixed(1)}" height="${hgt.toFixed(1)}" fill="${sr.color}" opacity="${hl?1:.84}" rx="1.5"/>`;
      if(hgt>=11) s+=`<text x="${X(i).toFixed(1)}" y="${(y1+hgt/2+3).toFixed(1)}" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">${v}</text>`;
    });
    s+=`<text x="${X(i).toFixed(1)}" y="${(Y(cum)-4).toFixed(1)}" font-size="9.5" fill="${hl?'#0f172a':'#334155'}" text-anchor="middle" font-weight="800">${cum}</text>`;
    const bd=vis.map(sr=>`${sr.label.split('+')[0].split(' ')[0]} ${sr.vals[i]||0}`).join(' · ');
    s+=`<rect x="${(X(i)-slot/2).toFixed(1)}" y="${padT}" width="${slot.toFixed(1)}" height="${(base-padT).toFixed(1)}" fill="transparent"><title>${wkOf(i)}${cum} leads — ${bd}</title></rect>`;
    return s;
  }).join('');
  const legend=series.map(s=>{ const off=hide.has(s.label);
    const click=toggle?`onclick="event.stopPropagation();${toggle}('${encodeURIComponent(s.label)}')" style="cursor:pointer;`:`style="`;
    return `<span ${click}font-size:10px;color:#475569;font-weight:600;margin-right:11px;white-space:nowrap;opacity:${off?0.4:1};${off?'text-decoration:line-through;':''}"><span style="display:inline-block;width:10px;height:10px;background:${s.color};vertical-align:middle;border-radius:2px;margin-right:4px;"></span>${s.label} <b style="color:${s.color};">${s.vals[hi]||0}</b></span>`; }).join('');
  return `<div style="margin-bottom:4px;">${legend}</div><svg width="100%" viewBox="0 0 ${w} ${h+2}" style="overflow:visible;">${bars}</svg>`;
}
// Grouped bars — two series side-by-side per week, each labelled on top. For NON-additive
// metrics like weekday vs weekend booking RATE (which you can't stack).
function groupBars(series, hi, fmt, normVal, weeks){
  const wkOf=i=>(weeks&&weeks[i])?weeks[i]+' · ':'';
  const w=340,h=98,padX=8,padB=13,padT=15, n=series[0].vals.length, g=series.length;
  const all=series.flatMap(s=>s.vals.map(x=>x==null?0:x));
  const mx=Math.max(1,...all, normVal||0)*1.18;
  const slot=(w-2*padX)/n, bw=slot*0.74/g, base=h-padB, Y=v=>base-(v/mx)*(base-padT);
  const normY=(normVal&&normVal>0)?Y(normVal):null;
  const norm=normY!=null?`<line x1="${padX}" y1="${normY.toFixed(1)}" x2="${w-padX}" y2="${normY.toFixed(1)}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>`:'';
  let bars='', labels='';
  for(let i=0;i<n;i++){ const x0=padX+i*slot+slot*0.13;
    series.forEach((s,j)=>{ const v=s.vals[i]==null?0:s.vals[i]; const x=x0+j*bw, y=Y(v), hl=i===hi;
      // taller transparent hit-area behind each bar so thin/short bars are easy to hover
      bars+=`<rect x="${x.toFixed(1)}" y="${padT.toFixed(1)}" width="${(bw*0.86).toFixed(1)}" height="${(base-padT).toFixed(1)}" fill="transparent"><title>${wkOf(i)}${s.label}: ${fmt?fmt(v):v}</title></rect>`;
      bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(bw*0.86).toFixed(1)}" height="${(base-y).toFixed(1)}" fill="${s.color}" opacity="${hl?1:.72}" rx="1.5" pointer-events="none"/>`;
      if(v>0) labels+=`<text x="${(x+bw*0.43).toFixed(1)}" y="${(y-2).toFixed(1)}" font-size="7.5" fill="${s.color}" text-anchor="middle" font-weight="${hl?800:600}">${fmt?fmt(v):v}</text>`;
    });
  }
  const legend=series.map(s=>`<span style="font-size:10px;color:#475569;font-weight:600;margin-right:11px;white-space:nowrap;"><span style="display:inline-block;width:10px;height:10px;background:${s.color};border-radius:2px;vertical-align:middle;margin-right:4px;"></span>${s.label} <b style="color:${s.color}">${fmt?fmt(s.vals[hi]==null?0:s.vals[hi]):(s.vals[hi]||0)}</b></span>`).join('');
  return `<div style="margin-bottom:3px;">${legend}</div><svg width="100%" viewBox="0 0 ${w} ${h+2}" style="overflow:visible;">${norm}${bars}${labels}</svg>`;
}
// Per-day-of-week scheduled-hours bars for the selected week. Each day is a bar
// filled to its actual scheduled hours; the dashed marker is that day's recent
// norm — so a day the doctor didn't sit (or got shrunk) is obvious.
// Day-by-day roster: each bar = SCHEDULED bookable hours (striped) with the estimated
// BOOKABLE-AFTER-SHRINKAGE portion solid at the bottom (scheduled × (1 − week shrink%)).
// The striped gap on top = hours the doctor blocked. shrink = week-level fraction (0–1).
function dayBarsChart(wk, norm, shrink){
  shrink=Math.max(0,Math.min(0.95, shrink||0));
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const track=58, mx=Math.max(1,...wk.map(x=>x||0),...norm.map(x=>x||0));
  return `<div style="display:flex;gap:6px;align-items:flex-end;">${days.map((d,i)=>{
    const h=wk[i]||0, nh=norm[i]||0, isWe=i>=5, col=isWe?'#a855f7':'#7c3aed';
    const actH=h*(1-shrink);
    const schedPx=Math.round(h/mx*track), actPx=Math.round(actH/mx*track), normH=Math.round(nh/mx*track);
    return `<div style="flex:1;text-align:center;">
      <div style="font-size:9.5px;font-weight:700;color:${h?col:'#cbd5e1'};margin-bottom:2px;">${h?h+'h':'0'}${(h&&shrink>0.02)?`<span style="font-size:8px;font-weight:600;color:#94a3b8;"> →${r1(actH)}</span>`:''}</div>
      <div style="position:relative;height:${track}px;background:#f1f5f9;border-radius:3px;">
        <div title="scheduled ${r1(h)}h" style="position:absolute;bottom:0;left:0;right:0;height:${schedPx}px;border-radius:3px;background:repeating-linear-gradient(135deg,${col}40,${col}40 3px,${col}14 3px,${col}14 6px);"></div>
        <div title="bookable after shrinkage ≈ ${r1(actH)}h" style="position:absolute;bottom:0;left:0;right:0;height:${actPx}px;background:${col};border-radius:3px;"></div>
        ${nh>0.3?`<div title="norm ${r1(nh)}h" style="position:absolute;bottom:${normH}px;left:-1px;right:-1px;border-top:1.5px dashed #64748b;"></div>`:''}
      </div>
      <div style="font-size:9px;color:${isWe?'#a855f7':'#94a3b8'};font-weight:${isWe?700:500};margin-top:3px;">${d}</div>
    </div>`;
  }).join('')}</div>`;
}
// Hour-of-day coverage for the selected week: how many days each clock-hour was
// bookable (0–7). Reveals the actual open window (e.g. only 5–7pm) — far more
// granular than "active days". hodWk is aligned to HOD_HOURS (9am→9pm).
function hourCoverageChart(hodWk){
  const track=46, maxD=7, fmtH=h=>h===12?'12p':h>12?(h-12)+'p':h+'a';
  const openHrs=HOD_HOURS.filter((h,i)=>(hodWk[i]||0)>0);
  const span=openHrs.length?`${fmtH(openHrs[0])}–${fmtH(openHrs[openHrs.length-1]+1)}`:'—';
  return `<div>
    <div style="display:flex;gap:3px;align-items:flex-end;">${HOD_HOURS.map((h,i)=>{
      const d=hodWk[i]||0, frac=d/maxD, on=d>0;
      const col = !on?'#f1f5f9' : d>=5?'#7c3aed' : d>=3?'#a78bfa' : '#ddd6fe';
      return `<div style="flex:1;text-align:center;" title="${fmtH(h)}: covered ${d} day${d===1?'':'s'} this week">
        <div style="height:${track}px;display:flex;flex-direction:column;justify-content:flex-end;">
          <div style="height:${Math.max(on?3:0,Math.round(frac*track))}px;background:${col};border-radius:2px;"></div>
        </div>
        <div style="font-size:7.5px;color:${on?'#6d28d9':'#cbd5e1'};font-weight:${on?700:400};margin-top:2px;">${fmtH(h)}</div>
      </div>`;
    }).join('')}</div>
    <div style="font-size:10.5px;color:#475569;margin-top:6px;">Open window this week: <b>${span}</b> · darker bar = more days that hour was covered (max 7). Hours left white were never bookable.</div>
  </div>`;
}
// Slots & shrinkage stacked bars: available (purple) + shrunk-by-doctor (red) =
// scheduled, per week. shrinkage = doctor blocked the slot (appointment_blocks).
function shrinkChart(sched, shrunk, avail, hi){
  const w=340,h=92,padX=8,padB=22,padT=12, n=sched.length;
  const mx=Math.max(1,...sched);
  const bw=(w-2*padX)/n*0.6, X=i=>padX+(i+0.5)/n*(w-2*padX), base=h-padB, Y=v=>base-(v/mx)*(base-padT);
  const bars=sched.map((s,i)=>{ if(!s) return ''; const x=X(i)-bw/2, av=avail[i]||0, sh=shrunk[i]||0, hl=i===hi;
    const avTop=Y(av), shTop=Y(av+sh);
    let r=`<rect x="${x.toFixed(1)}" y="${avTop.toFixed(1)}" width="${bw.toFixed(1)}" height="${(base-avTop).toFixed(1)}" fill="#7c3aed" opacity="${hl?1:.82}" rx="2"/>`;
    if(sh>0) r+=`<rect x="${x.toFixed(1)}" y="${shTop.toFixed(1)}" width="${bw.toFixed(1)}" height="${(avTop-shTop).toFixed(1)}" fill="#ef4444" opacity="${hl?1:.85}" rx="2"/>`;
    const pct=s?Math.round(sh/s*100):0;
    // % blocked on top
    r+=`<text x="${X(i).toFixed(1)}" y="${(shTop-3).toFixed(1)}" font-size="8.5" fill="${pct>0?'#dc2626':'#94a3b8'}" text-anchor="middle" font-weight="700">${pct>0?pct+'%':'0'}</text>`;
    // available-slot count inside the purple segment (white)
    if(av>0 && (base-avTop)>=13) r+=`<text x="${X(i).toFixed(1)}" y="${((avTop+base)/2+3).toFixed(1)}" font-size="8.5" fill="#fff" text-anchor="middle" font-weight="700">${av}</text>`;
    // shrunk-slot count inside the red segment (white)
    if(sh>0 && (avTop-shTop)>=12) r+=`<text x="${X(i).toFixed(1)}" y="${((shTop+avTop)/2+3).toFixed(1)}" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">${sh}</text>`;
    return r; }).join('');
  const legend=`<div style="margin-bottom:4px;font-size:10px;color:#475569;font-weight:600;">
    <span style="margin-right:12px;"><span style="display:inline-block;width:10px;height:10px;background:#7c3aed;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>Available slots</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:#ef4444;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>Shrunk (doctor blocked)</span>
    <span style="color:#94a3b8;font-weight:500;margin-left:8px;">numbers = slot counts · top = % blocked</span></div>`;
  return `${legend}<svg width="100%" viewBox="0 0 ${w} ${h+2}" style="overflow:visible;">${bars}</svg>`;
}
// ═══════════════ BOOKING-RATE / EXPECTED MODEL ═══════════════
// This clinic's own bookings-per-open-day, split weekday vs weekend, over the prior weeks.
// Lets us separate "how many days were open" (availability) from "how well each open day
// converted" (demand / conversion). Expected = wd_rate·weekday-days-open + we_rate·weekend-days-open.
function bookingRateCard(r){
  const W=wkIdx, sl=a=>a.slice(W+1,W+6);
  // Capacity = bookable HOURS (roster) when available — a day open 3h ≠ a day open 8h — else fall back to days.
  const ros=rosterArr(r.city,r.clinic);
  const hasHrs = ros.hrs && ros.hrs.some(x=>x!=null && x>0);
  const unit=hasHrs?'/hr':'/day', uName=hasHrs?'bookable hour':'open day', uShort=hasHrs?'h':'d';
  // doctor shrinkage per week (slots blocked / scheduled) — discount scheduled hours to ACTUAL bookable hours
  const shrFrac=i=>{ const sc=(ros.shr&&ros.shr.sched&&ros.shr.sched[i])||0, sh=(ros.shr&&ros.shr.shrunk&&ros.shr.shrunk[i])||0; return sc>0?Math.min(0.95,sh/sc):0; };
  const hasShrink = ros.shr && ros.shr.sched && ros.shr.sched.some(x=>x>0);
  const capWd=i=> hasHrs ? Math.max(0,((ros.hrs[i]||0)-(ros.we_hrs[i]||0)))*(1-shrFrac(i)) : Math.max(0,(r.avArr[i]||0)-(r.weArr[i]||0));
  const capWe=i=> hasHrs ? (ros.we_hrs[i]||0)*(1-shrFrac(i)) : (r.weArr[i]||0);
  const bkP=sl(r.bkArr), weBkP=sl(r.bkWeArr||[]);
  let wdBk=0,weBk=0,wdCap=0,weCap=0,nW=0;
  for(let k=0;k<bkP.length;k++){ const i=W+1+k, cw=capWd(i), ce=capWe(i); if((cw+ce)<=0) continue;   // skip closed weeks
    const b=bkP[k]||0, wb=weBkP[k]||0; wdBk+=(b-wb); weBk+=wb; wdCap+=cw; weCap+=ce; nW++; }
  if(nW<2) return '';                                   // not enough history for a stable rate
  const wkBk=wdBk+weBk, wkCap=wdCap+weCap;
  const wdRate=wdCap>0?wdBk/wdCap:0, weRate=weCap>0?weBk/weCap:0, wkRate=wkCap>0?wkBk/wkCap:0;
  const wdOpen=capWd(W), weOpen=capWe(W);               // THIS week's weekday/weekend capacity (hours or days)
  const expCap=wdRate*wdOpen+weRate*weOpen;             // expected at this week's bookable hours
  const bkNorm=wkBk/nW;                                 // normal weekly bookings (rate × normal capacity)
  const capEffect=expCap-bkNorm;                        // gap from capacity (hours open) differing from normal
  const rateEffect=r.bk_w-expCap;                       // gap from bookings-per-hour differing
  const gap=r.bk_w-bkNorm;
  const daysWk=r1(r.av_w);                              // days open this week (context)
  const weHotter=weRate>wdRate*1.15;
  const tile=(lbl,val,u,col,sub)=>`<div style="flex:1;min-width:96px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;"><div style="font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;font-weight:700;">${lbl}</div><div style="font-size:21px;font-weight:800;color:${col};line-height:1.15;">${val}<span style="font-size:10px;font-weight:600;color:#94a3b8;">${u}</span></div><div style="font-size:9.5px;color:#94a3b8;">${sub||''}</div></div>`;
  const driver = Math.abs(capEffect)>=Math.abs(rateEffect)
    ? `<b style="color:#7c3aed">fewer bookable ${hasHrs?'hours':'days'} (availability)</b>` : `<b style="color:#d97706">lower bookings per ${uName} (demand / conversion)</b>`;
  const verdict = Math.abs(gap)<1.5
    ? `Bookings landed about where this clinic's rate × ${hasHrs?'hours':'days'}-open predicts (${r1(expCap)}).`
    : `At its normal rates the clinic should book ~<b>${r1(expCap)}</b> on the <b>${r1(wdOpen)} weekday + ${r1(weOpen)} weekend ${uShort}</b> it opened this week; it booked <b>${r.bk_w}</b> (${signed(r1(gap))} vs its ${r1(bkNorm)} norm). Of that gap, ≈<b style="color:#7c3aed">${signed(r1(capEffect))}</b> is ${hasHrs?'hours':'days'}-open and ≈<b style="color:#d97706">${signed(r1(rateEffect))}</b> is rate-per-${uShort} → mostly ${driver}.`;
  // this week's scheduled → shrinkage → actual bookable chain (hours path only)
  const schWd=hasHrs?Math.max(0,(ros.hrs[W]||0)-(ros.we_hrs[W]||0)):0, schWe=hasHrs?(ros.we_hrs[W]||0):0, schTot=schWd+schWe;
  const shrThis=shrFrac(W), actTot=wdOpen+weOpen;
  const chainRow = (hasHrs && hasShrink && schTot>0) ? `<div style="font-size:11.5px;background:#f5f3ff;border:1px solid #ddd6fe;border-radius:9px;padding:9px 12px;margin-bottom:10px;line-height:1.6;color:#475569;">
      <b>Scheduled ${r1(schTot)}h</b> → doctor blocked <b style="color:#dc2626">${Math.round(shrThis*100)}%</b> (shrinkage) → <b style="color:#7c3aed">${r1(actTot)}h actually bookable</b> → at this clinic's rate that's <b>${r1(expCap)}</b> expected bookings. Rates &amp; expected below are all on <b>actual</b> (post-shrinkage) hours.
    </div>` : '';
  // ── step-by-step waterfall: scheduled hours → shrinkage → leads → conversion → actual ──
  const E_sched=wdRate*schWd+weRate*schWe;                // this week's SCHEDULED hours × rate (no shrinkage)
  const E_actual=expCap;                                  // after shrinkage (actual bookable hours)
  const shrinkageLoss=Math.max(0, E_sched-E_actual);      // bookings lost to doctor shrinkage
  const rateGap=Math.max(0, E_actual-r.bk_w);             // booked fewer than the norm rate predicts (demand/conversion)
  const convPerLead=r.bkPerLead||0;   // NEW bookings per lead — leads create new bookings, not reschedules/repeats
  const leadShort=Math.max(0, r.ld_avg-r.ld_w);
  const leadsLoss=Math.max(0, Math.min(rateGap, leadShort*convPerLead));   // leads share of the rate gap
  const convLoss=Math.max(0, rateGap-leadsLoss);          // conversion / call-handling share
  const E_afterLeads=E_actual-leadsLoss;
  // ── "how it's calculated" popovers for each waterfall step ──
  const _shrChip=calcChip('Bookings lost to doctor shrinkage', `
    <p><b>What it answers:</b> if the doctor hadn’t blocked slots, how many more bookings could this week have held?</p>
    ${calcStep(`scheduled hours <b>${r1(schTot)}h</b> × your usual rate <b>${r1(wkRate)}/${uShort}</b> = <b>${r1(E_sched)}</b> expected<br>actually-bookable hours <b>${r1(actTot)}h</b> → <b>${r1(E_actual)}</b> expected<br><b>loss = ${r1(E_sched)} − ${r1(E_actual)} = ${r1(shrinkageLoss)}</b>`)}
    <p>Shrinkage this week was <b>${Math.round(shrThis*100)}%</b> of scheduled slots (doctor <code>appointment_blocks</code>).</p>${calcBasis()}`);
  const _leadsChip=calcChip('Bookings lost to fewer leads', `
    <p><b>What it answers:</b> you got fewer inbound leads than normal — how many bookings did that cost?</p>
    ${calcStep(`new bookings per lead = normal <b>new</b> bookings <b>${r1(r.bkNew_avg)}</b> ÷ normal leads <b>${r1(r.ld_avg)}</b> = <b>${(convPerLead).toFixed(2)}</b> per lead${(r.ld_avg>0&&r.bkNew_avg/r.ld_avg>1)?' (capped at 1.00)':''}<br>fewer leads = norm <b>${Math.round(r.ld_avg)}</b> − this week <b>${r.ld_w}</b> = <b>${r1(leadShort)}</b><br><b>loss = ${r1(leadShort)} × ${(convPerLead).toFixed(2)} = ${r1(leadShort*convPerLead)}</b>${leadsLoss<leadShort*convPerLead-0.05?` → capped to <b>${r1(leadsLoss)}</b> (can’t exceed the week’s total shortfall)`:''}`)}
    <p>Leads create <b>new</b> first-time bookings, not reschedules/repeats — so each missing lead costs ≈ <b>${(convPerLead).toFixed(2)}</b> new bookings, your clinic’s own lead→new-booking conversion (<b>${Math.round(convPerLead*100)}%</b>) over the selected window, <i>not</i> a flat assumption.</p>${calcBasis()}`);
  const _convChip=calcChip('Bookings lost to conversion / call-handling', `
    <p><b>What it answers:</b> leads &amp; hours were there, but fewer booked than usual — the residual gap.</p>
    ${calcStep(`rate gap = expected <b>${r1(E_actual)}</b> − booked <b>${r.bk_w}</b> = <b>${r1(rateGap)}</b><br>of which fewer-leads explains <b>${r1(leadsLoss)}</b><br><b>conversion = ${r1(rateGap)} − ${r1(leadsLoss)} = ${r1(convLoss)}</b>`)}
    <p>This is the leftover after availability and leads — i.e. call-handling / scheduling / connect-rate (an ops lever).</p>${calcBasis()}`);
  const wfRow=(icon,label,val,delta,note,col)=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9;">
    <div style="flex:none;font-size:14px;width:20px;text-align:center;">${icon}</div>
    <div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:700;color:#0f172a;">${label}</div>${note?`<div style="font-size:9.5px;color:#94a3b8;line-height:1.35;">${note}</div>`:''}</div>
    <div style="text-align:right;flex:none;"><div style="font-size:17px;font-weight:800;color:${col||'#0f172a'};">${val}</div>${delta!=null?`<div style="font-size:10px;font-weight:700;color:${delta<0?'#dc2626':'#94a3b8'};">${delta<0?signed(r1(delta)):'—'}</div>`:''}</div></div>`;
  const wfLevers=[['doctor shrinkage',shrinkageLoss,'#dc2626'],['fewer leads',leadsLoss,'#0ea5e9'],['conversion',convLoss,'#d97706']].sort((a,b)=>b[1]-a[1]);
  const waterfall = (hasHrs && hasShrink && schTot>0) ? `
    <div style="font-size:11.5px;font-weight:800;color:#0f172a;margin:8px 0 3px;">🔬 Deep dive — expected bookings, step by step</div>
    <div style="font-size:10px;color:#94a3b8;margin-bottom:6px;">Start from your scheduled hours, then peel off each loss: shrinkage → leads → conversion → what you actually booked.</div>
    <div style="border:1px solid var(--line);border-radius:10px;padding:3px 13px;background:#fff;margin-bottom:9px;">
      ${wfRow('🗓️','At this week\'s scheduled hours ('+r1(schTot)+'h)',r1(E_sched),null,'if every scheduled hour booked at your usual rate ('+r1(wkRate)+'/'+uShort+') — before any shrinkage','#0f172a')}
      ${wfRow('✂️','− Doctor shrinkage ('+Math.round(shrThis*100)+'% → '+r1(actTot)+'h bookable)'+_shrChip,r1(E_actual),-shrinkageLoss, (shrinkageLoss>0.4?'blocked slots cost ~'+r1(shrinkageLoss)+' bookings':'minimal — little shrinkage this week'), shrinkageLoss>0.4?'#dc2626':'#475569')}
      ${wfRow('🔎','− Fewer leads'+(leadsLoss>0.4?'':' — leads held ✓')+_leadsChip,r1(E_afterLeads),-leadsLoss, (leadsLoss>0.4?'leads '+r.ld_w+' vs '+Math.round(r.ld_avg)+' norm · ~'+(convPerLead).toFixed(2)+' bookings/lead → ~'+r1(leadsLoss)+' fewer bookings (a marketing lever)':'leads '+r.ld_w+' ≈ '+Math.round(r.ld_avg)+' norm — leads were not the issue'), leadsLoss>0.4?'#0ea5e9':'#475569')}
      ${wfRow('⚙️','− Conversion / call-handling'+(convLoss>0.4?'':' — held ✓')+_convChip,r.bk_w,-convLoss, (convLoss>0.4?'leads came but fewer booked per hour → ~'+r1(convLoss)+' fewer (an ops lever)':(rateGap<0.4?'converted about as usual':'converted about as usual')), convLoss>0.4?'#d97706':'#475569')}
    </div>
    <div style="font-size:11px;color:#475569;background:#f8fafc;border-radius:8px;padding:9px 12px;line-height:1.6;">
      ${(shrinkageLoss+rateGap)>1.5?`Biggest lever this week: <b style="color:${wfLevers[0][2]}">${wfLevers[0][0]}</b> (~<b>${r1(wfLevers[0][1])}</b> bookings). Fix that alone and you'd book ~<b>${r1(r.bk_w+wfLevers[0][1])}</b>.`:`Booked about where scheduled hours × your rate predicts — no single factor stands out this week.`}
    </div>` : '';
  return `<div class="card"><div class="sec-h"><span class="sec-num">📊</span>Booking rate &amp; expected — what each factor cost</div>
    <div class="sec-sub">Bookings per <b>actual bookable ${uShort}</b> (scheduled ${hasHrs?'hours':'days'} <b>minus doctor shrinkage</b>), weekday vs weekend, over the prior ${nW} weeks — then a counterfactual deep-dive: how many bookings you'd have got if availability / shrinkage / leads had each been normal. · ${WEEKS[wkIdx].label}</div>
    <div style="font-size:10.5px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;margin:2px 0 6px;">1 · This clinic's rate</div>
    <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:10px;">
      ${tile('Weekday rate',r1(wdRate),unit,'#7c3aed','per weekday '+uName)}
      ${tile('Weekend rate',r1(weRate),unit,weHotter?'#db2777':'#a855f7',weHotter?'busier — high-demand':'per weekend '+uName)}
      ${tile('Overall rate',r1(wkRate),unit,'#475569','blended per '+uName)}
    </div>
    ${chainRow}
    <div style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:8px;">
      ${tile('Bookable this week',r1(wdOpen)+' + '+r1(weOpen),' '+uShort,'#0f172a',hasHrs?'wkday + wkend hrs · after shrinkage':'weekday + weekend days')}
      ${tile('Expected',r1(expCap),'','#475569','rate × actual '+(hasHrs?'hours':'days')+' open')}
      ${tile('Actual',r.bk_w,'',gap>=0?'#059669':'#dc2626','booked this week')}
    </div>
    <div style="font-family:ui-monospace,monospace;font-size:11.5px;background:#0f172a;color:#e2e8f0;border-radius:8px;padding:8px 12px;margin-bottom:12px;line-height:1.5;">
      Expected = <span style="color:#c4b5fd">${r1(wdRate)}</span>×<span style="color:#c4b5fd">${r1(wdOpen)}</span> wkday-${uShort} + <span style="color:#f0abfc">${r1(weRate)}</span>×<span style="color:#f0abfc">${r1(weOpen)}</span> wkend-${uShort} = <b style="color:#fff">${r1(expCap)}</b> &nbsp;vs&nbsp; actual <b style="color:${gap>=0?'#86efac':'#fca5a5'}">${r.bk_w}</b></div>
    ${weHotter?`<div style="font-size:10.5px;color:#be185d;background:#fdf2f8;border-radius:8px;padding:7px 11px;margin-bottom:9px;">Weekends convert <b>${r1(weRate/Math.max(0.01,wdRate))}×</b> a weekday ${uName} here — the high-demand window.</div>`:''}
    ${waterfall || `<div style="font-size:11.5px;background:#f8fafc;border-radius:9px;padding:10px 13px;line-height:1.6;color:#475569;">${verdict}</div>`}
  </div>`;
}
// ═══════════════ MARKETING vs OPS — split the new-booking gap ═══════════════
// Two-factor decomposition of the new-patient booking change:  new = leads × (new/lead).
//   marketing (lead volume) = conv_norm · Δleads     →  is demand coming in?
//   ops (lead→book convert)  = leads_now · Δconv      →  are leads being handled?
// (Leads here are essentially unique inquiries — the source table is de-duped, ~1% re-inquire —
//  so there's no meaningful "repeat lead" split; marketing-vs-ops is the useful cut.)
function marketingVsOpsCard(r){
  const W=wkIdx, nw=r.bkNewArr||[], dn=r.bkDoneArr||[], bk=r.bkArr||[];
  const ld_w=r.ld_w||0, ld_n=r.ld_avg||0, new_w=nw[W]||0, new_n=avg(nw.slice(W+1,W+6));
  if(ld_n<=0 && new_n<=0) return '';
  const conv_w=ld_w>0?new_w/ld_w:0, conv_n=ld_n>0?new_n/ld_n:0;
  const mkt=conv_n*(ld_w-ld_n), ops=ld_w*(conv_w-conv_n), gapNew=new_w-new_n;
  const rp=r.bkRepeatArr||[], rep_w=rp[W]||0, rep_n=avg(rp.slice(W+1,W+6)), retention=rep_w-rep_n;  // returning patients
  const done_w=dn[W]||0, doneR_w=r.bk_w>0?done_w/r.bk_w:0, doneR_n=(avg(bk.slice(W+1,W+6))>0?avg(dn.slice(W+1,W+6))/avg(bk.slice(W+1,W+6)):0);
  const segs=[['Marketing · new-lead volume',mkt,'#0ea5e9'],['Ops · lead→book conversion',ops,'#d97706'],['Retention · returning patients',retention,'#0891b2']];
  const tot=segs.reduce((s,x)=>s+Math.abs(x[1]),0)||1;
  const bar=segs.map(s=>`<div title="${s[0]}: ${signed(r1(s[1]))}" style="width:${Math.abs(s[1])/tot*100}%;background:${s[2]};display:flex;align-items:center;justify-content:center;color:#fff;font-size:10.5px;font-weight:800;">${Math.abs(s[1])/tot>=0.12?signed(r1(s[1])):''}</div>`).join('');
  const ranked=segs.slice().sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]));
  const leadName=ranked[0][0].split(' · ')[0].toLowerCase(), leadCol=ranked[0][2];
  const leg=segs.map(s=>`<span style="font-size:11px;color:#475569;margin-right:14px;white-space:nowrap;"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${s[2]};vertical-align:middle;margin-right:4px;"></span>${s[0]} <b>${signed(r1(s[1]))}</b></span>`).join('');
  const totalGap=gapNew+retention;
  return `<div class="card" style="border-left:4px solid ${leadCol};">
    <div class="sec-h"><span class="sec-num">🧭</span>Marketing vs Ops vs Retention — where's the booking gap?</div>
    <div class="sec-sub">Splits the booking change three ways: <b>marketing</b> (new-lead volume), <b>ops</b> (lead→book conversion), <b>retention</b> (returning patients re-booking). · ${WEEKS[W].label}</div>
    <div style="display:flex;height:30px;border-radius:8px;overflow:hidden;border:1px solid var(--line);margin:6px 0 8px;">${bar}</div>
    <div style="margin-bottom:9px;">${leg}</div>
    <div style="font-size:11.5px;background:#f8fafc;border-radius:9px;padding:10px 13px;line-height:1.65;color:#475569;">
      Bookings <b>${signed(r1(totalGap))}</b> vs norm. <b style="color:#0ea5e9">Marketing</b> ${signed(r1(mkt))}: leads <b>${ld_w}</b> vs ${r1(ld_n)} (${signed(Math.round(r.dLeadPct),'%')}). <b style="color:#d97706">Ops</b> ${signed(r1(ops))}: <b>${Math.round(conv_w*100)}%</b> of leads booked vs ${Math.round(conv_n*100)}% normally. <b style="color:#0891b2">Retention</b> ${signed(r1(retention))}: returning patients <b>${rep_w}</b> vs ${r1(rep_n)}. Biggest lever: <b style="color:${leadCol}">${leadName}</b>.${doneR_n>0&&doneR_w<doneR_n-0.05?` Plus only <b>${Math.round(doneR_w*100)}%</b> of booked calls completed (vs ${Math.round(doneR_n*100)}%) — extra <b style="color:#d97706">ops</b> leakage (no-shows / reschedules).`:''}</div>
    <div style="font-size:10px;color:#94a3b8;margin-top:6px;">New bookings = marketing + ops (leads-driven); returning patients = retention. Leads themselves are unique inquiries (source de-duped, ~1% re-inquire), so there's no "repeat lead" to split.</div>
  </div>`;
}
// ═══════════════ LEADS → BOOKED → DONE funnel + booked→done disposition ═══════════════
// Explains why only N of M booked calls actually completed: rescheduled (delayed, not lost),
// no-show (confirmation/reminder gap), cancelled (demand quality), or pending (upcoming).
// ═══ shared funnel helpers (used by the Convert-tab story cards) ═══
function _fStep(n,col){ return `<span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${col};color:#fff;font-size:13px;font-weight:800;margin-right:9px;flex:0 0 auto;">${n}</span>`; }
function _fStage(lbl,val,sub,col){ return `<div style="flex:1;min-width:80px;text-align:center;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;font-weight:700;">${lbl}</div><div style="font-size:27px;font-weight:800;color:${col};line-height:1.02;">${val}</div><div style="font-size:9px;color:#94a3b8;">${sub}</div></div>`; }
function _fConv(pct,lbl){ return `<div style="align-self:center;text-align:center;min-width:56px;"><div style="font-size:14px;font-weight:800;color:#475569;line-height:1;">${pct}</div><div style="font-size:8px;color:#94a3b8;text-transform:uppercase;letter-spacing:.03em;">${lbl}</div><div style="font-size:15px;color:#cbd5e1;line-height:.9;">▸</div></div>`; }
function _fTake(txt){ return `<div style="font-size:11px;background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:8px 11px;margin-top:9px;color:#475569;line-height:1.55;"><b style="color:#0f172a;">⮕ This week:</b> ${txt}</div>`; }

// ═══ Convert tab — DIAGNOSIS BANNER: "what happened this week", in one glance ═══
function convDiagnosisCard(r){
  const W=wkIdx, sl=a=>(a||[]).slice(W+1,W+6);
  const bk_w=r.bk_w||0, ld_w=r.ld_w||0; if(bk_w<=0 && ld_w<=0) return '';
  const bk_n=avg(sl(r.bkArr));
  const done_w=(r.bkDoneArr&&r.bkDoneArr[W])||0, ld_n=r.ld_avg||0;
  const newbk=(r.bkNewArr&&r.bkNewArr[W])||0, new_n=avg(sl(r.bkNewArr));
  const conv_w=ld_w>0?newbk/ld_w:0, conv_n=ld_n>0?new_n/ld_n:0;
  const rep_w=(r.bkRepeatArr&&r.bkRepeatArr[W])||0, rep_n=avg(sl(r.bkRepeatArr));
  const bkA_n=avg(sl(r.bkArr)), b2d_w=bk_w>0?done_w/bk_w:0, b2d_n=bkA_n>0?avg(sl(r.bkDoneArr))/bkA_n:0;
  const mkt=conv_n*(ld_w-ld_n), ops=ld_w*(conv_w-conv_n), retention=rep_w-rep_n, gap=bk_w-bk_n;
  const segs=[['fewer leads (marketing)',mkt,'#0ea5e9'],['lead→book conversion (ops)',ops,'#d97706'],['returning-patient retention',retention,'#0891b2']];
  const lever=segs.slice().sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]))[0];
  const tile=(lbl,val,dlt,dtxt)=>{ const up=dlt>=0, flat=Math.abs(dlt)<0.5, col=flat?'#64748b':(up?'#059669':'#dc2626');
    return `<div style="flex:1;min-width:104px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;"><div style="font-size:9px;text-transform:uppercase;letter-spacing:.04em;color:#94a3b8;font-weight:700;">${lbl}</div><div style="font-size:23px;font-weight:800;color:#0f172a;line-height:1.05;">${val}</div><div style="font-size:10px;font-weight:700;color:${col};">${flat?'▬ flat':((up?'▲ ':'▼ ')+dtxt)} vs norm</div></div>`; };
  const edge = gap<-1?'#dc2626':gap>1?'#059669':'#94a3b8';
  const verdict = gap<-1
    ? `Down <b>${signed(r1(gap))}</b> vs its recent norm of ${r1(bk_n)}. Biggest driver: <b style="color:${lever[2]}">${lever[0]}</b>.`
    : gap>1 ? `Up <b style="color:#059669">${signed(r1(gap))}</b> vs norm — booking momentum is positive. Main lift: <b style="color:${lever[2]}">${lever[0]}</b>.`
    : `Holding steady (${signed(r1(gap))} vs norm of ${r1(bk_n)}). No single factor is off.`;
  return `<div class="card" style="border-left:4px solid ${edge};">
    <div class="sec-h"><span class="sec-num">📋</span>What happened this week — ${r.clinic}</div>
    <div class="sec-sub">The one-glance read before the funnels below break down <b>where</b>. · Redshift · ${WEEKS[wkIdx].label}</div>
    <div style="display:flex;gap:8px;margin:6px 0 10px;flex-wrap:wrap;">
      ${tile('Booked', bk_w, gap, signed(r1(gap)))}
      ${tile('Lead → Book', Math.round(conv_w*100)+'%', (conv_w-conv_n)*100, signed(Math.round((conv_w-conv_n)*100),'pt'))}
      ${tile('Book → Done', Math.round(b2d_w*100)+'%', (b2d_w-b2d_n)*100, signed(Math.round((b2d_w-b2d_n)*100),'pt'))}
    </div>
    <div style="font-size:11.5px;background:#f8fafc;border-radius:9px;padding:10px 13px;line-height:1.6;color:#475569;">${verdict} The three funnels below trace it step by step — new demand (leads → bookings → done), inbound calls, and what happened to booked calls.</div>
  </div>`;
}

// ═══ FUNNEL ① — new-demand funnel: New leads → New bookings → Done (with returning shown separately, lead-age cohort nested) ═══

// ═══ FUNNEL ④ — booked → outcome: where booked calls leaked (done / resched / no-show / cancel) ═══
function funnelOutcomeCard(r){
  const W=wkIdx; const bk=r.bk_w||0, done=(r.bkDoneArr&&r.bkDoneArr[W])||0;
  const res=(r.bkReschedArr&&r.bkReschedArr[W])||0, mis=(r.bkMissedArr&&r.bkMissedArr[W])||0, can=(r.bkCancelledArr&&r.bkCancelledArr[W])||0;
  const pend=Math.max(0, bk-done-res-mis-can);

  const relevCol=relevPct>=15?'#dc2626':relevPct>=8?'#d97706':'#059669';
  const agentCol=agentPct>=15?'#dc2626':agentPct>=8?'#d97706':'#059669';

  const oseg=(n,c,ttl)=>n>0?`<div title="${ttl}: ${n}" style="width:${n/bk*100}%;background:${c};color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;">${n/bk>=0.07?n:''}</div>`:'';
  const rev=a=>(a||[]).slice(0,WEEKS.length).reverse();
  const winN=trendWin==='all'?WEEKS.length:Math.min(+trendWin||6,WEEKS.length);
  const win=a=>rev(a).slice(-winN), hiWin=winN-1;
  const wkWin=rev(WEEKS.map(w=>w.label.replace(/ ?\d{4}/,''))).slice(-winN);
  const dispTrend=stackBars([
    {vals:win(r.bkDoneArr), color:'#059669', label:'Done'},
    {vals:win(r.bkReschedArr), color:'#f59e0b', label:'Resched'},
    {vals:win(r.bkMissedArr), color:'#dc2626', label:'No-show'},
    {vals:win(r.bkCancelledArr), color:'#64748b', label:'Cancelled'},
  ], hiWin, wkWin, new Set(), null);
  const worst = mis>=can ? `<b style="color:${agentCol}">no-shows (${mis})</b> — booked but didn't attend (many causes: reminder gaps, travel, change of mind — not only call-handling)` : `<b style="color:${relevCol}">cancellations (${can})</b> — a lead-relevancy / demand-quality signal`;
  return `<div class="card"><div class="sec-h">${_fStep(3,'#d97706')}What happened to the booked calls?</div>

    </div>
    <div style="display:flex;gap:14px;font-size:10px;color:#475569;margin-bottom:9px;flex-wrap:wrap;">

      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#f59e0b;vertical-align:middle;margin-right:4px;"></span><b style="color:#d97706">${res}</b> resched</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#0891b2;vertical-align:middle;margin-right:4px;"></span><b style="color:#0891b2">${pend}</b> pending</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#dc2626;vertical-align:middle;margin-right:4px;"></span><b style="color:#dc2626">${mis}</b> no-show</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#64748b;vertical-align:middle;margin-right:4px;"></span><b style="color:#64748b">${can}</b> cancelled</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:11px;flex-wrap:wrap;">
      ${mtile('Deferred · not lost', deferred, '#0891b2', res+' resched + '+pend+' pending — lands later')}
      ${mtile('Cancelled', can, relevCol, 'of '+bk+' booked ('+relevPct+'%) · demand-quality / relevancy')}
      ${mtile('No-shows', mis, agentCol, 'of '+bk+' booked ('+agentPct+'%) · many causes, not only call-handling')}
    </div>
    <div style="font-size:10.5px;font-weight:700;color:#0f172a;margin-bottom:3px;">Booking outcome — weekly trend</div>

    <div style="font-size:8.5px;color:#cbd5e1;display:flex;justify-content:space-between;margin-top:2px;">${wkWin.map((l,i)=>`<span style="${i===hiWin?'color:#475569;font-weight:700;':''}">${l}</span>`).join('')}</div>
    ${_fTake(`<b>${done}</b> of ${bk} completed. <b style="color:#0891b2">${deferred}</b> are deferred (not lost — they land later). The leak to watch is ${worst}.`)}
  </div>`;
}
// ── Lead quality (inbound calls): relevance funnel + call-attempt effort + Practo (demand superset) ──

// ═══════════════ STATISTICAL ATTRIBUTION (OLS regression) ═══════════════
// Model:  bookings ≈ b0 + bLead·leads + bAvail·doctor-HOURS  (hours, not days — a "day"
// can be 2h or 10h of bookable cover, so hours are sharper). It is fit PER CLINIC, but with
// only ~7 weeks each a raw 2-predictor clinic fit would wildly overfit — so each clinic's
// coefficients are RIDGE-shrunk toward a stable network model (pooled across all clinic-weeks).
// A clinic with lots of clean weeks moves toward its own slope; a thin one borrows the network's.
// (The Redshift cutover, adding more weeks per clinic, will let each clinic stand more on its
// own data.) Coefficients are interpretable: bLead = extra bookings per inbound lead, bAvail =
// extra bookings per bookable doctor-hour. We then split a clinic-week's gap-vs-expected into a
// leads part, an availability part and a residual (conversion / call-handling).
let _REGG={};   // network-model cache, keyed 'h' (hours) | 'd' (days fallback)
function solve3(A,b){ // Gaussian elimination w/ partial pivot on 3×4 augmented matrix
  const M=[[...A[0],b[0]],[...A[1],b[1]],[...A[2],b[2]]];
  for(let c=0;c<3;c++){
    let p=c; for(let r=c+1;r<3;r++) if(Math.abs(M[r][c])>Math.abs(M[p][c])) p=r;
    if(Math.abs(M[p][c])<1e-9) return null;
    [M[c],M[p]]=[M[p],M[c]];
    for(let r=0;r<3;r++){ if(r===c) continue; const f=M[r][c]/M[c][c];
      for(let k=c;k<4;k++) M[r][k]-=f*M[c][k]; }
  }
  return [M[0][3]/M[0][0], M[1][3]/M[1][1], M[2][3]/M[2][2]];
}
function _gram(X,Y){ const XtX=[[0,0,0],[0,0,0],[0,0,0]], XtY=[0,0,0];
  for(let k=0;k<Y.length;k++){ const x=X[k];
    for(let a=0;a<3;a++){ XtY[a]+=x[a]*Y[k]; for(let b=0;b<3;b++) XtX[a][b]+=x[a]*x[b]; } }
  return {XtX,XtY}; }
function _r2(X,Y,beta){ const n=Y.length; if(!n) return 0; const yb=Y.reduce((s,v)=>s+v,0)/n; let ssr=0,sst=0;
  for(let k=0;k<n;k++){ const x=X[k]; const p=beta[0]+beta[1]*x[1]+beta[2]*x[2]; ssr+=(Y[k]-p)**2; sst+=(Y[k]-yb)**2; }
  return sst>0?1-ssr/sst:0; }
// availability series for a clinic: bookable HOURS if roster present, else active-days
function availSeriesFor(r){ const h=rosterArr(r.city,r.clinic).hrs;
  return h.some(x=>x!=null) ? {arr:h.map(x=>x==null?0:x), hours:true} : {arr:r.avArr, hours:false}; }
// Network (pooled) model — the shrinkage prior. Two variants: hours vs days.
function fitNetwork(useHours){
  const key=useHours?'h':'d'; if(_REGG[key]) return _REGG[key];
  const X=[],Y=[];
  for(const r of allClinicRCA()){
    const av = useHours ? availSeriesFor(r).arr : r.avArr;
    for(let i=0;i<WEEKS.length;i++){ const a=av[i]; if(a==null||a<=0) continue;
      if(r.ldArr[i]==null||r.bkArr[i]==null) continue;
      if((r.bkArr[i]||0)<=0) continue;                 // skip 0-booking weeks (sheet gaps / closures)
      X.push([1,r.ldArr[i]||0,a]); Y.push(r.bkArr[i]||0); }
  }
  const n=Y.length; if(n<8){ return (_REGG[key]={ok:false,n}); }
  const {XtX,XtY}=_gram(X,Y); const beta=solve3(XtX,XtY);
  if(!beta){ return (_REGG[key]={ok:false,n}); }
  return (_REGG[key]={ok:true,n,b0:beta[0],bLead:beta[1],bAvail:beta[2],r2:_r2(X,Y,beta)});
}
// Per-clinic model: ridge-shrunk toward the network prior. Returns the clinic's own beta,
// its own R², the prior, the shrink weight α (fraction borrowed from the network) and unit.
function fitClinicModel(r){
  const av=availSeriesFor(r), useHours=av.hours;
  const g=fitNetwork(useHours); if(!g||!g.ok) return null;
  const X=[],Y=[];
  for(let i=0;i<WEEKS.length;i++){ const a=av.arr[i]; if(a==null||a<=0) continue;
    if(r.ldArr[i]==null||r.bkArr[i]==null) continue;
    if((r.bkArr[i]||0)<=0) continue;                   // skip 0-booking weeks (sheet gaps / closures)
    X.push([1,r.ldArr[i]||0,a]); Y.push(r.bkArr[i]||0); }
  const nC=Y.length, prior=[g.b0,g.bLead,g.bAvail];
  if(nC<3) return {useHours,nC,beta:prior,r2:null,alpha:1,g,own:false};
  const {XtX,XtY}=_gram(X,Y);
  const K=4, alpha=K/(K+nC);               // prior weight fraction: thin clinic → more network
  const lam=alpha/(1-alpha);               // per-feature ridge scaled by that feature's XtX_jj
  const A=[[...XtX[0]],[...XtX[1]],[...XtX[2]]], bb=[...XtY];
  for(let j=0;j<3;j++){ const lj=lam*XtX[j][j]; A[j][j]+=lj; bb[j]+=lj*prior[j]; }
  const beta=solve3(A,bb)||prior;
  return {useHours,nC,beta,r2:_r2(X,Y,beta),alpha,g,own:true};
}
// Regression card: per-clinic, hours-based, network-stabilised attribution of the weekly gap.
function regCard(r){
  const cm=fitClinicModel(r); if(!cm) return '';

  const av=availSeriesFor(r).arr;
  const av_w=av[W]==null?0:av[W], avBase=expectedOf(av,W), ldBase=expectedOf(r.ldArr,W);
  const [b0,bLead,bAvail]=cm.beta;

  const gap=r.dBk, resid=gap-cLeads-cAvail;

  const tile=(p)=>`<div style="flex:1;min-width:90px;"><div style="font-size:10px;color:#64748b;">${p.k}</div><div style="font-size:16px;font-weight:800;color:${p.c};">${signed(r1(p.v))}</div><div style="font-size:9px;color:#94a3b8;">bookings</div></div>`;
  const eq=`bookings ≈ ${r1(b0)} + ${r1(bLead)}·leads + ${r1(bAvail)}·${unit}`;
  const drv=Math.abs(cLeads)>=Math.abs(cAvail)&&Math.abs(cLeads)>=Math.abs(resid)?'leads (demand)'
           :Math.abs(cAvail)>=Math.abs(resid)?unit+' (availability)':'conversion / call-handling';
  const story = Math.abs(gap)<1
    ? `Bookings are essentially on-model this week (gap ${signed(r1(gap))}).`
    : `Of the <b>${signed(r1(gap))}</b> booking gap vs expected, the model attributes ≈<b style="color:#f59e0b">${signed(r1(cLeads))}</b> to leads, ≈<b style="color:#0891b2">${signed(r1(cAvail))}</b> to ${unit} and ≈<b style="color:#64748b">${signed(r1(resid))}</b> to conversion / other. Biggest driver: <b>${drv}</b>.`;
  const blendPct=Math.round(cm.alpha*100);
  const fitNote = cm.own
    ? `Fitted on <b>this clinic's ${cm.nC} weeks</b>, ridge-blended ~${blendPct}% toward the network model for stability. This clinic: <b>${r1(bLead)}</b> bookings/lead · <b>${r1(bAvail)}</b> per ${uShort} &nbsp;vs&nbsp; network <b>${r1(cm.g.bLead)}</b> / <b>${r1(cm.g.bAvail)}</b>.`
      + (weakClinic?` <span style="color:#b45309;">Note: leads + hours explain little of this clinic's week-to-week swings (low R²) — other factors (mix, conversion, walk-ins) dominate here, so read the split as indicative.</span>`:'')
    : `Too few clean weeks here yet — using the <b>network model</b> (${cm.g.n} clinic-weeks). Sharpens to a clinic-specific fit once the Redshift cutover adds more weeks.`;
  return `<div class="card"><div class="sec-h"><span class="sec-num">📐</span>Statistical attribution — regression</div>
    <div class="sec-sub">Per-clinic ${useHours?'hours-based':'days-based'} model · R²=<b>${(r2).toFixed(2)}</b> (${r2pct}% of this clinic's bookings explained — <b>${conf}</b> fit) · ${WEEKS[wkIdx].label}</div>
    <div style="font-family:ui-monospace,monospace;font-size:12px;background:#0f172a;color:#e2e8f0;border-radius:8px;padding:9px 12px;margin-bottom:10px;">${eq}</div>
    <div style="font-size:10.5px;color:#64748b;background:#f1f5f9;border-radius:8px;padding:8px 11px;margin-bottom:12px;line-height:1.55;">${fitNote}</div>
    <div style="font-size:11px;color:#475569;margin-bottom:6px;">This week's gap (<b>${signed(r1(gap))}</b> vs expected ${r1(r.bkBase)}) splits as:</div>
    <div style="display:flex;height:14px;border-radius:7px;overflow:hidden;margin-bottom:10px;">${bar}</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;">${parts.map(tile).join('')}</div>
    <div style="font-size:11.5px;background:#f8fafc;border-radius:9px;padding:10px 13px;line-height:1.6;color:#475569;">${story} <span style="color:#94a3b8;">Model predicts ${r1(pred)} bookings this week vs actual ${r.bk_w}.</span></div>

// ═══════════════ LEADS → BOOKINGS: timing & co-movement ═══════════════
// Answers: do this week's bookings follow this week's leads or last week's? did leads and
// bookings move together (demand) or diverge (conversion / availability)? and are there more
// bookings than tracked leads (walk-ins / referrals / untracked)? Uses the weekly series.
function _corr(a,b){ const n=Math.min(a.length,b.length); if(n<3) return null;
  const sa=a.slice(0,n), sb=b.slice(0,n); const ma=sa.reduce((s,v)=>s+v,0)/n, mb=sb.reduce((s,v)=>s+v,0)/n;
  let num=0,da=0,db=0; for(let i=0;i<n;i++){ const x=sa[i]-ma,y=sb[i]-mb; num+=x*y; da+=x*x; db+=y*y; }
  return (da&&db)?num/Math.sqrt(da*db):null; }
function leadBookingTiming(r){

  const lag1=_corr(bk.slice(0,bk.length-1), ld.slice(1));   // bookings[t] vs leads[t+1] (prior week, newest-first)
  if(lag0==null) return '';

  const timing = sameWeek
    ? `Bookings track <b>this week's</b> leads (corr ${lag0.toFixed(2)}) more than last week's (${lag1==null?'—':lag1.toFixed(2)}) — <b>leads convert fast, the same week</b>, so a lead dip shows up in bookings immediately.`
    : `Bookings track <b>last week's</b> leads (corr ${lag1.toFixed(2)}) more than this week's (${lag0.toFixed(2)}) — <b>leads lag ~a week</b> before becoming bookings, so this week's booking dip may trace to last week's leads.`;

  else if(bkDown && !ldDown){ diag=`Bookings fell <b>${signed(dBkP,'%')}</b> but leads held <b>(${signed(dLd,'%')})</b> → <b>not a demand problem</b>. The gap is <b style="color:#d97706">availability or conversion</b> — see the booking-rate card above.`; dcol='#d97706'; }
  else if(ldDown && !bkDown){ diag=`Leads softened <b>(${signed(dLd,'%')})</b> but bookings held <b>(${signed(dBkP,'%')})</b> — conversion / repeat demand cushioned it this week, but watch next week if leads stay low.`; dcol='#7c3aed'; }
  else if(bkUp && ldUp){ diag=`Leads <b>(${signed(dLd,'%')})</b> and bookings <b>(${signed(dBkP,'%')})</b> both rose together — healthy demand-led growth.`; dcol='#059669'; }
  else { diag=`Leads ${signed(dLd,'%')}, bookings ${signed(dBkP,'%')} — broadly in line, no clear divergence this week.`; dcol='#475569'; }

  const newArr=r.bkNewArr&&r.bkNewArr.some(x=>x)?r.bkNewArr:null;
  const new_w=newArr?newArr[wkIdx]:null;

    : '';
