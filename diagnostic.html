      <span style="font-weight:600;color:#64748b;font-size:13px;">${r.bk_w} total scheduled bookings vs ${exp} expected (${signed(gap)}).</span></div>
    <div style="font-size:12.5px;color:#475569;margin-top:5px;line-height:1.5;">
      Primary cause: <b style="color:${statusCol}">${causePhrase}</b>${r.mixWith?` (mix with ${CAUSE[r.mixWith].short})`:''}.${r.note?` <span style="color:#94a3b8;">${r.note}.</span>`:''}
      ${drillHint?`<span style="color:#94a3b8;"> → see the <b>${drillHint}</b> drill below.</span>`:''}</div>
  </div>`;
  // 1) Four vital signs — outcome + the three levers (demand, supply, efficiency).
  // booking-rate split: weekday vs weekend bookings per OPEN day (rounded for clean labels)
  const _bkWe=r.bkWeArr||[];
  const wdRateArr = r.bkArr.map((b,i)=>{ const d=(r.avArr[i]||0)-(r.weArr[i]||0); return d>0?Math.round((b-(_bkWe[i]||0))/d*10)/10:0; });
  const weRateArr = r.bkArr.map((b,i)=>{ const d=r.weArr[i]||0; return d>0?Math.round((_bkWe[i]||0)/d*10)/10:0; });
  const wd_rate_w=(r.av_w-r.we_w)>0?(r.bk_w-(_bkWe[wkIdx]||0))/(r.av_w-r.we_w):0;
  const we_rate_w=r.we_w>0?(_bkWe[wkIdx]||0)/r.we_w:0;
  // calls done = screening calls actually completed (subset of booked)
  const _done=r.bkDoneArr||[], done_w=_done[wkIdx]||0, done_n=avg(_done.slice(wkIdx+1,wkIdx+6));
  const doneRate=r.bk_w>0?Math.round(done_w/r.bk_w*100):0;
  const vital=(icon,title,val,unit,dpct,sub,svg)=>`<div class="card" style="margin:0;">
    <div style="font-size:12px;font-weight:700;color:#0f172a;">${icon} ${title}</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin:1px 0 1px;">
      <span style="font-size:23px;font-weight:800;color:#0f172a;line-height:1.1;">${val}<span style="font-size:11px;font-weight:600;color:#94a3b8;">${unit||''}</span></span>
      <span style="font-size:12.5px;font-weight:800;color:${dCol(dpct)};">${signed(dpct,'%')}</span></div>
    <div style="font-size:10px;color:#94a3b8;margin-bottom:4px;">${sub}</div>${svg}${wkAxisRow}</div>`;
  const vitals = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;">
    ${vital('📅','Bookings', r.bk_w,'', gapPct, 'vs '+exp+' expected', spark(rev(r.bkArr),'#4f46e5',hi,null,r.bkBase))}
    ${vital('📞','Calls done', done_w,'', pctOf(done_w-done_n,done_n), 'completed · '+doneRate+'% of '+r.bk_w+' booked', spark(rev(r.bkDoneArr),'#0891b2',hi,null,done_n))}
    ${vital('🔎','Leads', r.ld_w,'', Math.round(r.dLeadPct), 'demand · vs '+Math.round(r.ld_avg)+' norm', spark(rev(r.ldArr),'#0ea5e9',hi,null,r.ld_avg))}
    ${vital('🩺','Availability', r1(r.av_w),' d', pctOf(r.dAct,r.av_avg), 'supply · '+r1(r.wd_w)+' wkday + '+r1(r.we_w)+' wkend days', availSplitChart(rev(r.wdArr), rev(r.weArr), hi, r.av_avg, wkS))}
    ${vital('⚡','Booking rate', r1(rate_w),'/day', pctOf(rate_w-rate_n,rate_n), 'efficiency · wkday '+r1(wd_rate_w)+' · wkend '+r1(we_rate_w)+' per open day', groupBars([{vals:rev(wdRateArr),color:'#7c3aed',label:'Weekday'},{vals:rev(weRateArr),color:'#db2777',label:'Weekend'}], hi, r1, rate_n, wkS))}
  </div>`;
  const vitalsCard = `<div class="card"><div class="sec-h"><span class="sec-num">🩺</span>Vital signs — ${r.clinic}</div>
    <div class="sec-sub">Outcome + the three levers that explain it. Last ${winN} weeks · highlighted = ${wl} · dashed = norm/expected.</div>
    ${winBar}${vitals}</div>`;
  // ═══════════ CITY-HEAD NARRATIVE — compact overview strip + collapsible diagnosis steps ═══════════
  // compact stat chip for the always-visible overview row (number + delta + tiny sparkline)
  const vchip=(icon,label,val,suf,delta,sub,chart)=>{
    const dt=(delta!=null && !isNaN(delta)) ? `<span style="font-size:11.5px;font-weight:800;color:${dCol(delta)};">${delta>0?'+':''}${delta}%</span>` : '';
    const zid='z'+(_zoomSeq++); _zoomCharts[zid]={title:icon+' '+label+' — '+r.clinic, sub:sub+' · last '+winN+' weeks · latest '+wl, svg:chart||'', weeks:weeksRow};
    return `<div class="vchip" style="position:relative;">
      <button onclick="zoomTrend('${zid}')" title="Zoom" style="position:absolute;top:6px;right:6px;border:1px solid var(--line);background:#fff;border-radius:6px;width:21px;height:21px;cursor:pointer;font-size:11px;line-height:1;color:#94a3b8;padding:0;z-index:2;">⛶</button>
      <div class="vc-l">${icon} ${label}</div>
      <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;"><span class="vc-v">${val}${suf?`<span style="font-size:12px;font-weight:600;color:#94a3b8;"> ${suf}</span>`:''}</span>${dt}</div>
      <div style="font-size:9.5px;color:#94a3b8;margin:1px 0 5px;">${sub}</div>${chart||''}${wkAxisRow}</div>`; };
  // a collapsible step: header shows title + an inline at-a-glance stat even when closed
  const acc=(n,icon,title,sub,col,stat,body,open)=>`<details class="accstep"${open?' open':''}>
    <summary><span class="stepbadge" style="background:${col||'#4f46e5'};">${n}</span>
      <div style="min-width:0;"><div style="font-size:13.5px;font-weight:800;color:#0f172a;">${icon} ${title}</div><div style="font-size:10.5px;color:#94a3b8;">${sub}</div></div>
      <div style="margin-left:auto;text-align:right;font-size:11.5px;white-space:nowrap;font-weight:700;padding-left:8px;">${stat||''}</div>
      <span class="chev">▾</span></summary>
    <div class="accbody">${body}</div></details>`;
  // conversion trends — lead→book% (new bookings / leads) and book→done% per week
  // Lead→book % = clean cohort conversion: of THIS week's leads, how many booked the SAME week
  // (leadAge 'same' ÷ leads), not new-bookings-this-week ÷ leads (which mixes in lagged conversions).
  const _l2bHasLA = hasLeadAge(r.city,r.clinic), _l2bSame = _l2bHasLA ? leadAgeArr(r.city,r.clinic,'same') : null;
  const l2bArr = r.bkArr.map((b,i)=>{ const l=r.ldArr[i]||0, conv = _l2bHasLA ? (_l2bSame[i]||0) : (r.bkNewArr[i]||0); return l>0?Math.min(100,Math.round(conv/l*100)):0; });
  const b2dArr = r.bkArr.map((b,i)=>{ const d=(r.bkDoneArr[i]||0); return b>0?Math.round(d/b*100):0; });
  const l2b_w=l2bArr[wkIdx], b2d_w=b2dArr[wkIdx];
  // doctor shrinkage (slots blocked) for the overview chip
  const _shr = ros.shr || {sched:[],shrunk:[],avail:[]};
  const _shrHas = _shr.sched && _shr.sched.some(x=>x>0);
  const _scW=_shr.sched[wkIdx]||0, _shW=_shr.shrunk[wkIdx]||0, _shrPct=_scW?Math.round(_shW/_scW*100):0;
  const _psc=_shr.sched.slice(wkIdx+1,wkIdx+6).reduce((a,b)=>a+(b||0),0), _psh=_shr.shrunk.slice(wkIdx+1,wkIdx+6).reduce((a,b)=>a+(b||0),0);
  const _shrPctN=_psc?Math.round(_psh/_psc*100):0;
  const shrChip = _shrHas ? shrinkChart(rev(_shr.sched), rev(_shr.shrunk), rev(_shr.avail), hi) : '<div style="color:#cbd5e1;font-size:10px;padding:18px 0;text-align:center;">No roster / shrinkage data</div>';
  // OVERVIEW — six at a glance, 2 per row (wider = bigger charts); details in the tabs below
  const ov = `<div class="card" style="margin-bottom:12px;">${winBar}
    <div style="font-size:10.5px;color:#94a3b8;margin:0 0 9px;">📅 Trailing <b>${winN}</b> weeks · ${WEEKS[Math.min(wkIdx+winN-1,WEEKS.length-1)].label} → <b>${wl}</b> · chart dates are week-ending · click ⛶ on any chart to zoom.</div>
    <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;">
      ${vchip('🆕','New bookings', new_w,'', newPct, 'first-time · vs '+r1(new_n)+' norm', spark(rev(r.bkNewArr),'#4f46e5',hi,null,new_n))}
      ${vchip('📅','All scheduled bookings', r.bk_w,'', gapPct, 'new+repeat · vs '+exp+' exp', spark(rev(r.bkArr),'#6366f1',hi,null,r.bkBase))}
      ${vchip('🔎','Leads', r.ld_w,'', Math.round(r.dLeadPct), 'inbound · vs '+Math.round(r.ld_avg)+' norm', spark(rev(r.ldArr),'#0ea5e9',hi,null,r.ld_avg))}
      ${vchip('📞','Consults done', done_w,'', pctOf(done_w-done_n,done_n), doneRate+'% of '+r.bk_w+' scheduled completed', spark(rev(r.bkDoneArr),'#0891b2',hi,null,done_n))}
      ${vchip('🩺','Availability', r1(r.av_w),'d', pctOf(r.dAct,r.av_avg), 'realized doctor-days · wd '+r1(r.wd_w)+' + we '+r1(r.we_w)+(hasRoster&&rh_w!=null?' · '+r1(rh_w)+'h scheduled':''), availSplitChart(rev(r.wdArr), rev(r.weArr), hi, r.av_avg, wkS))}
      ${vchip('✂️','Doctor shrinkage', _shrPct,'%', null, _shrHas?_shW+' of '+_scW+' slots blocked · norm '+_shrPctN+'%':'no roster data', shrChip)}
      ${vchip('⛳','Lead→book %', l2b_w,'%', null, (_l2bHasLA?'this week’s leads booked same week':'new bookings ÷ leads')+' · vs '+Math.round(avg(l2bArr.slice(wkIdx+1,wkIdx+6)))+'% norm', spark(rev(l2bArr),'#0ea5e9',hi,v=>v+'%',avg(l2bArr.slice(wkIdx+1,wkIdx+6))))}
      ${vchip('✅','Book→done %', b2d_w,'%', null, 'consults done ÷ booked · vs '+Math.round(avg(b2dArr.slice(wkIdx+1,wkIdx+6)))+'% norm', spark(rev(b2dArr),'#059669',hi,v=>v+'%',avg(b2dArr.slice(wkIdx+1,wkIdx+6))))}
    </div></div>`;
  // the "why" fork — leads down (demand/sources) vs leads held (conversion)
  const leadsDown = r.dLeadPct<=-12 || r.leadsBroke;
  const whyIntro = (gap<-1) ? `<div class="card" style="background:#fff7ed;border-left:4px solid #d97706;margin:0 0 12px;"><div style="font-size:13px;color:#9a3412;line-height:1.55;"><b>Bookings dipped ${signed(gap)} (${signed(gapPct,'%')}).</b> ${leadsDown?`Same-week leads fell <b>${Math.round(r.dLeadPct)}%</b> — cause is upstream in <b>demand / channels</b>: see the <b>Leads</b> then <b>Source</b> tabs.`:`Same-week leads held (<b>${signed(Math.round(r.dLeadPct),'%')}</b>) — cause is <b>conversion</b>, not demand: see the <b>Convert</b> tab.`}</div></div>` : '';
  // inline at-a-glance stats shown on each tab
  const availStat = deltaTag(pctOf(r.dAct,r.av_avg),'%');
  const expStat   = `<span style="color:${dCol(gap)}">${signed(gap)}</span>`;
  const leadStat  = deltaTag(Math.round(r.dLeadPct),'%');
  const convStat  = `<span style="color:${doneRate>=70?'#059669':'#d97706'}">${doneRate}%</span>`;
  const srcStat   = `<span style="color:${leadsDown?'#dc2626':'#059669'}">${leadsDown?'↓':'held'}</span>`;
  const step5col = !leadsDown && gap<-1 ? '#d97706' : '#4f46e5';
  const step6col = leadsDown ? '#dc2626' : '#4f46e5';
  const reg=regCard(r), bm=bookTypeMix(r);
  // ── horizontal step tabs — one full-width, scrollable section at a time ──
  // "Expected" tab removed — availability is covered in tab 1; the expected-bookings loss
  // waterfall ("how much we lost, step by step") now lives in the Model tab.
  const _modelWaterfall = bookingRateCard(r);
  const tabs=[
    {n:1,icon:'🩺',label:'Availability',col:'#7c3aed',stat:availStat,body:availCard},
    {n:2,icon:'🔎',label:'Leads & source',col:'#0ea5e9',stat:leadStat,body:whyIntro+leadsCard+leadLossDrill(r)},
    {n:3,icon:'⛳',label:'Convert',col:step5col,stat:convStat,body:convDiagnosisCard(r)+funnelMasterCard(r)+leadQualityCard(r)+funnelOutcomeCard(r)},
  ];
  if(_modelWaterfall||reg||bm) tabs.push({n:4,icon:'🧪',label:'Model',col:'#64748b',stat:`<span style="color:${dCol(gap)}">${signed(gap)}</span>`,body:(_modelWaterfall||'')+(reg||'')+(bm||'')});
  const causeTab = r.cause==='avail'?1 : r.cause==='leads'?2 : r.cause==='l2b'?3 : 1;
  const active = (diagStep && tabs.some(t=>t.n===diagStep)) ? diagStep : causeTab;
  const tabBar = `<div class="diagtabs">${tabs.map(t=>{ const on=t.n===active;
    return `<button onclick="setDiagStep(${t.n})" class="diagtab${on?' on':''}" style="${on?`border-color:${t.col};color:${t.col};background:${t.col}0d;`:''}">
      <span class="dt-num" style="${on?`background:${t.col};color:#fff;`:''}">${t.n}</span>
      <span>${t.icon} ${t.label}</span>${t.stat?`<span class="dt-stat">${t.stat}</span>`:''}</button>`; }).join('')}</div>`;
  const activeBody = (tabs.find(t=>t.n===active)||tabs[0]).body;

  return `<div class="card">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <button onclick="setSelClinic('')" style="font-size:12px;padding:5px 12px;background:#f1f5f9;border:1px solid var(--line);border-radius:8px;cursor:pointer;">← Back to clinics</button>
      <div><div style="font-size:18px;font-weight:800;">${r.clinic}</div><div style="font-size:11px;color:#94a3b8;">${r.city} · ${cityTier(r.city)} · ${r.mat} · ${wl}</div></div>
      <div style="margin-left:auto;text-align:right;">${causePill(r.cause, r.mixWith)}</div>
    </div>
  </div>
  ${verdictBanner}
  ${ov}
  ${tabBar}
  <div class="diagtab-body">${activeBody}</div>`;
}
function renderOnline(){
  if(!JDATA.online) return '<div class="card">No online scope in data.json.</div>';
  const O=rcaOnline(), wl=WEEKS[wkIdx].label;
  const CHN={fb:'Meta (FB)',google:'Google',gmb:'GMB',organic:'Organic',practo:'Practo'};
  const chRows=Object.entries(O.ch).map(([k,v])=>{ const d=v.w-v.base; return {k,name:CHN[k]||k,w:v.w,base:v.base,d}; }).sort((a,b)=>a.d-b.d);
  const maxAbs=Math.max(1,...chRows.map(c=>Math.abs(c.d)));
  const headline=`<div class="card">
    <div class="sec-h"><span class="sec-num">1</span>Online (tele-pool) — ${wl}</div>
    <div class="sec-sub">Online has no clinics and no doctor-availability — the funnel is simply demand → bookings → completed calls. So an online drop is always a <b>demand or conversion</b> story, never a supply one.</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;">
      <div class="kpi"><div class="kpi-l">Online bookings · ${wl}</div><div class="kpi-v">${O.bkW.toLocaleString()}</div><div class="kpi-s">vs 8-wk avg ${Math.round(O.bkAvg).toLocaleString()}</div></div>
      <div class="kpi"><div class="kpi-l">Δ vs average</div><div class="kpi-v" style="color:${dCol(O.dBk)}">${signed(O.dBk)}</div><div class="kpi-s">${O.bkAvg?signed(Math.round(O.dBk/O.bkAvg*100),'%'):''}</div></div>
      <div class="kpi"><div class="kpi-l">Calls done</div><div class="kpi-v">${O.callsW.toLocaleString()}</div><div class="kpi-s">B2D ~100% — completion is fine</div></div>
      <div class="kpi"><div class="kpi-l">Lead driver</div><div class="kpi-v" style="color:#dc2626">${O.driver?(CHN[O.driver]||O.driver):'—'}</div><div class="kpi-s">${O.driver?signed(Math.round(O.driverDelta))+' leads':'leads flat'}</div></div>
    </div>
  </div>`;
  const driverCard=`<div class="card">
    <div class="sec-h"><span class="sec-num">2</span>The driver — channel lead movement (network)</div>
    <div class="sec-sub">Which channel moved? An online drop is usually one paid channel — its lead change flows straight into the tele-pool.</div>
    ${chRows.map(c=>`<div class="barrow"><div class="bl">${c.name}</div><div class="bt" style="background:#f8fafc;display:flex;justify-content:center;"><div class="bf" style="width:${Math.max(5,Math.abs(c.d)/maxAbs*50)}%;margin-left:${c.d<0?(50-Math.max(5,Math.abs(c.d)/maxAbs*50)):50}%;background:${c.d<0?'#dc2626':'#059669'};justify-content:${c.d<0?'flex-start':'flex-end'};padding:0 7px;">${signed(Math.round(c.d))}</div></div></div>`).join('')}
    <div style="font-size:11px;color:#94a3b8;margin-top:6px;">Lead Δ vs 8-wk average · network leads from the L0 sheet.</div>
  </div>`;
  const why=`<div class="card">
    <div class="sec-h"><span class="sec-num">3</span>Why this is cleanly an online problem</div>
    <ul style="font-size:12px;color:#475569;line-height:1.7;margin:0;padding-left:18px;">
      <li><b>No availability dimension.</b> Online has no doctor-days to lose — none of this is a roster/supply issue.</li>
      <li><b>B2D ~100%.</b> Tele consults complete — the drop isn't no-shows or scheduling.</li>
      <li><b>Channel separation.</b> ${O.driver?`The mover is <b>${CHN[O.driver]||O.driver}</b>`:'Leads were broadly flat'} — a budget/demand lever, separate from the offline roster & call-handling levers.</li>
    </ul>
  </div>`;
  const bottom=`<div class="card">
    <div class="sec-h"><span class="sec-num">4</span>Bottom line — online</div>
    <div class="sec-sub">Total addressable online: ~${Math.abs(O.dBk)} bookings/week. ${O.driver?`Concentrated in <b>${CHN[O.driver]||O.driver}</b> — one lever: adjust that channel's spend/targeting.`:'No single channel driver this week.'} Not a clinic, availability, or conversion problem — those belong to the offline funnel.</div>
  </div>`;
  return headline+driverCard+why+bottom;
}

// ═══════════════ INIT ═══════════════
async function init(){
  try{
    const safe=u=>fetch(u,{cache:'no-store'}).catch(()=>({ok:false}));
    const [jr,sr,lr,pr,rr,ld,rv,mk,bt,dg,ga,nr,gi,la,df,pbk,pl,lm,pd,lc,ah]=await Promise.all([ fetch('data.json',{cache:'no-store'}), safe(SHEET_URL), safe(L0_URL), safe(PRACTO_URL), safe('data_roster.json'), safe('data_leads.json'), safe('data_reviews.json'), safe('data_marketing.json'), safe('data_booktype.json'), safe('data_diagnostic.json'), safe('data_ga_city.json'), safe('data_reviews_neg.json'), safe('data_gmb_insights.json'), safe('data_lead_age.json'), safe('data_demand_funnel.json'), safe('data_practo_booked.json'), safe('data_practo_leads.json'), safe('data_lead_maturation.json'), safe('data_practo_by_doctor.json'), safe('data_lead_conv.json'), safe('data_avail_hod.json') ]);
    if(!jr.ok) throw new Error('data.json not found');
    JDATA=await jr.json();
    // SDATA now comes from Redshift (data_diagnostic.json); the Google Sheet is a fallback only.
    let diagOk=false;
    if(dg.ok){ try{ const _dj=await dg.json(); dataPulled=(_dj._meta&&_dj._meta.pulled)||''; SDATA=buildSDataFromDiag(_dj); diagOk=Object.keys(SDATA).length>0; }catch(e){ console.warn('data_diagnostic.json parse failed',e); } }
    if(!diagOk){ if(sr.ok){ SDATA=parseSheet(parseCSV(await sr.text())); console.warn('fell back to demand-tracker sheet'); } else { console.warn('no SDATA source available'); } }
    if(lr.ok){ L0=parseL0(await lr.text()); } else { console.warn('L0 sheet failed'); }
    // Practo leads: prefer the static file (robust); fall back to the live sheet only if it's missing.
    let practoStatic=false;
    if(pl.ok){ try{ const _pj=await pl.json(); delete _pj._meta; PRACTO=_pj; practoStatic=Object.keys(PRACTO).length>0; }catch(_){ } }
    if(!practoStatic){ if(pr.ok){ try{ PRACTO=parsePracto(parseCSV(await pr.text())); }catch(_){ console.warn('Practo live parse failed'); } } else { console.warn('Practo sheet + static both unavailable'); } }
    if(rr.ok){ try{ ROSTER=await rr.json(); }catch(_){ console.warn('roster parse failed'); } } else { console.warn('data_roster.json failed'); }
    if(ld.ok){ try{ LEADS=await ld.json(); }catch(_){ } }
    if(rv.ok){ try{ REVIEWS=await rv.json(); }catch(_){ } }
    if(mk.ok){ try{ MKT=await mk.json(); }catch(_){ } }
    if(bt.ok){ try{ BOOKTYPE=await bt.json(); }catch(_){ } }
    if(ga.ok){ try{ GACITY=await ga.json(); }catch(_){ } }
    if(nr.ok){ try{ NEGREV=await nr.json(); }catch(_){ } }
    if(gi.ok){ try{ GMBINS=await gi.json(); }catch(_){ } }
    if(la.ok){ try{ LEADAGE=await la.json(); }catch(_){ } }
    if(df.ok){ try{ DMF=await df.json(); }catch(_){ } }
    if(pbk.ok){ try{ PRACTOBK=await pbk.json(); }catch(_){ } }
    if(lm.ok){ try{ LEADMAT=await lm.json(); }catch(_){ } }
    if(pd.ok){ try{ PRACTODOC=await pd.json(); }catch(_){ } }
    if(lc&&lc.ok){ try{ LEADCONV=await lc.json(); }catch(_){ } }
    if(ah&&ah.ok){ try{ AVAILHOD=await ah.json(); }catch(_){ } }
    const wSel=document.getElementById('weekSelect');
    WEEKS.forEach((w,i)=>{ const o=document.createElement('option'); o.value=i; o.textContent=w.label+(i===0?' (latest)':''); if(i===0)o.selected=true; wSel.appendChild(o); });
    render(); updateRefreshBadge();
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="loading-msg" style="color:#dc2626">Error: ${e.message}</div>`;
    console.error(e);
  }
}
init();
</script>
