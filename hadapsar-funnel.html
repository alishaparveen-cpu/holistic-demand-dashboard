<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hadapsar — Clinic Funnel</title>
<script>if(!sessionStorage.getItem('allo_dash_auth'))location.replace('index.html');</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F4EE;--sheet:#fff;--inset:#F4F2EB;--ink:#1A2B26;--ink2:#52605A;--muted:#8A8A80;--faint:#B0A99A;
  --line:#E5E2D9;--line2:#EEEBE2;--accent:#1F6F5C;--accentd:#1A5E4E;--good:#1F6F5C;--goodbg:#EDF4F0;--bad:#B23A2E;--badbg:#FBEEEC;--warn:#B8862E;--r:12px;
  --goog:#2E7D5B;--gmb:#3E6F8E;--vio:#7B5EA7;--pr:#B8862E}
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);margin:0;font-size:13px;line-height:1.45}
.wrap{max-width:1280px;margin:0 auto;padding:18px 22px 90px}
a{color:inherit}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.back{font-size:12.5px;color:var(--muted);text-decoration:none}.back:hover{color:var(--accent)}
h1{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin:8px 0 2px}
.sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.wknav{display:flex;align-items:center;gap:2px;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.wknav button{width:34px;height:34px;border:none;background:transparent;color:var(--muted);font-size:15px;cursor:pointer}
.wknav button:hover{background:#F0EEE6;color:var(--ink)}.wknav button:disabled{opacity:.3;cursor:default}
.wknav .lab{padding:0 12px;font-size:13px;font-weight:600;min-width:150px;text-align:center}
.shead{display:flex;align-items:baseline;gap:10px;margin:26px 0 9px}
.shead h2{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:0}
.shead .sub2{font-size:12px;color:var(--muted)}
.fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto}
table.fm{border-collapse:collapse;width:100%;font-size:12.5px;min-width:900px}
table.fm th{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:right;padding:9px 12px;background:var(--inset);border-bottom:1px solid var(--line);white-space:nowrap}
table.fm th:first-child{text-align:left}
table.fm th.lastcol{color:var(--accentd)}
table.fm th.mhwk{background:#F5F0FA;color:#7B5EA7;border-bottom:2px solid #7B5EA7}
table.fm td{padding:8px 12px;text-align:right;border-bottom:1px solid var(--line2);font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;white-space:nowrap}
table.fm td:first-child{text-align:left;font-family:'Inter'}
table.fm tr:last-child td{border-bottom:0}
table.fm td.mhwk{background:#FBF7FF}
tr.stage td{font-weight:700;font-size:13.5px;color:var(--ink)}
.snode{display:flex;align-items:center;gap:8px;font-weight:600;padding-left:9px;border-left:3px solid var(--accent)}
tr.edge td{color:var(--ink2);font-size:12px}
.edge-lbl{padding-left:21px;color:var(--muted);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.edge-lbl .formula{font-family:'JetBrains Mono';font-size:9.5px;color:var(--faint)}
.fm td.lastcol{font-weight:700}
.sparkcell{padding:3px 10px!important;cursor:zoom-in}.sparkcell:hover{background:var(--goodbg)}
.wowd{font-size:9.5px;font-weight:700;margin-top:2px}
.chev{cursor:pointer;color:var(--muted);font-size:10px;display:inline-block;width:12px}
tr.kid td{color:var(--ink2);font-size:11.5px}
.kid-lbl{padding-left:26px;color:var(--ink2);font-size:11.5px;font-family:'Inter'}
tr.subhead td{background:var(--inset);font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:4px 13px 4px 26px;text-align:left}
tr.sep-row td{padding:14px 10px 5px;font-weight:700;font-size:11.5px;letter-spacing:.04em;color:var(--muted);border-top:2px solid var(--line)}
.note{background:#FBF9F3;border:1px dashed var(--line);border-radius:9px;padding:9px 13px;font-size:11.5px;color:var(--muted);margin-top:12px}
.mh-banner{background:#F5F0FA;border:1px solid #C8B0E8;border-radius:9px;padding:10px 14px;font-size:12.5px;color:#4A3567;margin:0 0 16px}
.mh-banner b{color:#3D2A5C}
.ix{display:inline-block;width:13px;height:13px;line-height:13px;text-align:center;border-radius:50%;background:#e8e4d8;color:#8a8270;font-size:9px;font-weight:700;cursor:help;margin-left:5px;vertical-align:middle;font-family:Inter}
.ix:hover{background:#d8d2c2;color:#5a5345}
.infopop{position:absolute;z-index:9999;max-width:320px;background:#1f2937;color:#f3f4f6;font-size:11.5px;line-height:1.55;padding:9px 12px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.28);display:none}
.sp{display:block}
.modal{position:fixed;inset:0;background:rgba(20,28,24,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:16px;padding:22px 24px;max-width:760px;width:100%}
.mbox h3{font-family:'Fraunces',serif;margin:0 0 2px;font-size:20px}
.mclose{float:right;cursor:pointer;color:var(--muted);font-size:20px;border:none;background:none}
.lgd{font-size:11.5px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">← Dashboard</a>
    <div class="wknav"><button id="wPrev">‹</button><span class="lab" id="wLab">—</span><button id="wNext">›</button></div>
  </div>
  <h1>Hadapsar · Pune</h1>
  <div class="sub">Clinic funnel — reach → leads → booked → done → purchased → revenue. <b style="color:#7B5EA7">MH GMB change was made week of 25 May 2026.</b> Watch SH vs MH split in calls and done.</div>
  <div id="app"></div>
</div>
<div class="modal" id="modal"><div class="mbox"><button class="mclose" onclick="closeZ()">✕</button><h3 id="mTitle"></h3><div id="mBody"></div></div></div>
<script>
let D=null, wk=0, ZREG=[], expanded={};
const NSHOW=7;   // show 7 weeks to capture before + after MH change
const MH_WK_IDX=4;  // May 25 = index 4 in WEEKS array (the MH change week)
const $=id=>document.getElementById(id);
const hexA=(hex,a)=>{const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;};
function toggle(k){expanded[k]=expanded[k]===false?true:false;render();}
function toggle2(k){expanded[k]=!expanded[k];render();}
const N=v=>v==null||isNaN(v)?'—':Math.round(v).toLocaleString('en-IN');
const PCT=v=>v==null||isNaN(v)?'—':v.toFixed(1)+'%';
const RUP=v=>v==null||isNaN(v)?'—':'₹'+Math.round(v).toLocaleString('en-IN');
function ix(t){return t?` <span class="ix" data-info="${String(t).replace(/"/g,'&quot;')}" onclick="showInfo(event,this)">i</span>`:'';}
function showInfo(e,el){
  e.stopPropagation();
  let pop=document.getElementById('infopop');
  if(!pop){pop=document.createElement('div');pop.id='infopop';pop.className='infopop';document.body.appendChild(pop);
    document.addEventListener('click',()=>{pop.style.display='none';});}
  pop.textContent=el.getAttribute('data-info');
  pop.style.display='block';
  const r=el.getBoundingClientRect();
  pop.style.left=Math.max(8,Math.min(window.innerWidth-336,r.left-150))+'px';
  pop.style.top=(window.scrollY+r.bottom+7)+'px';
}
const CCOL={SH:'#2E7D5B',STD:'#B8862E',STI:'#B8862E',MH:'#7B5EA7',Other:'#B0A99A',oth:'#B0A99A'};
const wkLabel=w=>{const d=new Date(w);const e=new Date(d);e.setDate(d.getDate()+6);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+M[d.getMonth()]+'–'+e.getDate()+' '+M[e.getMonth()];};
const wkShort=w=>{const d=new Date(w);const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+M[d.getMonth()];};
const isMHWeek=ci=>ci===MH_WK_IDX;   // May 25 index

function metrics(){
  const R=D.reach,L=D.leads,B=D.bottom,NW=D._meta.weeks.length;
  const arr=f=>Array.from({length:NW},(_,i)=>f(i)||0);
  const g=R.gmb||{};
  const rawCalls=L.raw||{};
  const ai=L.ai||{};
  const pAi=L.paid_ai||{};
  const ch=L.by_chan||{};
  const bot=B.total||{};
  const byCat=B.by_cat||{};
  const rc=k=>arr(i=>(rawCalls[k]&&rawCalls[k][i])||0);
  const aiC=cat=>arr(i=>((ai.by_cat&&ai.by_cat[cat]&&ai.by_cat[cat][i])||0));
  const pAiC=cat=>arr(i=>((pAi.by_cat&&pAi.by_cat[cat]&&pAi.by_cat[cat][i])||0));
  const bcat=(cat,fld)=>arr(i=>((byCat[cat]&&byCat[cat][fld]&&byCat[cat][fld][i])||0));
  const mk=f=>Array.from({length:NW},(_,i)=>{const v=f(i);return(v==null||isNaN(v))?null:v;});
  const mImpr=arr(i=>(g.impr&&g.impr[i])||0);
  const mClk=arr(i=>(g.clicks&&g.clicks[i])||0);
  const mCtr=mk(i=>mImpr[i]?mClk[i]/mImpr[i]*100:null);
  const mCallsBtn=arr(i=>(g.calls&&g.calls[i])||0);
  const mWeb=arr(i=>(g.website&&g.website[i])||0);
  const mDir=arr(i=>(g.directions&&g.directions[i])||0);
  const leads=arr(i=>(L.total&&L.total[i])||0);
  const gmbLeads=arr(i=>(ch.gmb&&ch.gmb[i])||0);
  const paidLeads=arr(i=>(ch.google_web&&ch.google_web[i])||0);
  const orgLeads=arr(i=>(ch.organic&&ch.organic[i])||0);
  const practoLeads=arr(i=>(ch.practo&&ch.practo[i])||0);
  const otherLeads=arr(i=>((ch.other&&ch.other[i])||0)+((ch.fb&&ch.fb[i])||0));
  const gmbRawTotal=rc('total'),gmbRawUnique=rc('unique'),gmbRawAnswered=rc('answered'),gmbRawMissed=rc('missed');
  const gmbCatSTI=aiC('STI'),gmbCatSH=aiC('SH'),gmbCatMH=aiC('MH'),gmbCatOther=aiC('Other');
  const paidAiTotal=arr(i=>(pAi.total&&pAi.total[i])||0);
  const booked=arr(i=>(bot.booked&&bot.booked[i])||0);
  const done=arr(i=>(bot.done&&bot.done[i])||0);
  const purch=arr(i=>(bot.purchased&&bot.purchased[i])||0);
  const rev=arr(i=>(bot.rev&&bot.rev[i])||0);
  const l2b=mk(i=>leads[i]?booked[i]/leads[i]*100:null);
  const b2d=mk(i=>booked[i]?done[i]/booked[i]*100:null);
  const d2p=mk(i=>done[i]?purch[i]/done[i]*100:null);
  // SH = all of ED+/PE+/ED+PE+ combined; STI; MH (in 'Other' for bottom — no encounter tag); Other = oth
  const shDone=bcat('SH','done');const stiDone=bcat('STI','done');const othDone=bcat('Other','done');
  const shBooked=bcat('SH','booked');const stiBooked=bcat('STI','booked');
  const shPurch=bcat('SH','purchased');const shRev=bcat('SH','rev');
  const stiPurch=bcat('STI','purchased');const stiRev=bcat('STI','rev');
  return {
    mImpr,mClk,mCtr,mCallsBtn,mWeb,mDir,
    leads,gmbLeads,paidLeads,orgLeads,practoLeads,otherLeads,
    gmbRawTotal,gmbRawUnique,gmbRawAnswered,gmbRawMissed,
    gmbCatSTI,gmbCatSH,gmbCatMH,gmbCatOther,
    paidAiTotal,paidAiSH:pAiC('SH'),paidAiMH:pAiC('MH'),paidAiSTI:pAiC('STI'),paidAiOther:pAiC('Other'),
    booked,done,purch,rev,l2b,b2d,d2p,
    shDone,stiDone,othDone,shBooked,stiBooked,shPurch,shRev,stiPurch,stiRev,
  };
}

function buildStages(M){
  const aic=D.leads&&D.leads.ai&&D.leads.ai.by_cat||{};
  return [
    {t:'stage',k:'mImpr',label:'GMB searches (impressions)',color:'#3E6F8E',fmt:N,
      info:'Number of times the Hadapsar Google Business Profile appeared in search results or Maps. UP after the MH change (week of 25 May) because the clinic now ranks for mental health searches. Higher searches ≠ more SH patients.',
      children:[
        {label:'GMB call button clicks',arr:M.mCallsBtn,fmt:N,info:'Users who tapped the Call button on the GBP. Post-MH-change these are flatter than searches — MH seekers search but call less.'},
        {label:'GMB website clicks',arr:M.mWeb,fmt:N},
        {label:'GMB directions clicks',arr:M.mDir,fmt:N},
        {label:'GMB total CTR (clicks ÷ searches)',arr:M.mCtr,fmt:PCT,info:'Combined CTR across all click types. Drop post-MH-change = more impressions (MH searches) but fewer clicks per impression (MH seekers less likely to click through).'},
      ]},
    {t:'edge',k:'leads',label:'Lead capture',formula:'CRM-registered leads from all channels',fmt:N,
      info:'Total CRM leads for Hadapsar this week.'},
    {t:'stage',k:'leads',label:'Total leads',color:'#1F6F5C',fmt:N,
      info:'All leads registered in the CRM for Pune|Hadapsar this week, across channels.',
      children:[
        {label:'GMB (organic call + website)',arr:M.gmbLeads,fmt:N,info:'Leads attributed to the Hadapsar GMB listing — organic call leads and website click leads. Primary channel for SH demand.'},
        {label:'Google paid (web)',arr:M.paidLeads,fmt:N},
        {label:'Organic web',arr:M.orgLeads,fmt:N},
        {label:'Practo',arr:M.practoLeads,fmt:N},
        {label:'Other (FB / misc)',arr:M.otherLeads,fmt:N},
      ]},
    {t:'stage',k:'gmbRawTotal',label:'GMB inbound calls · 2241483789 (Exotel · all calls incl missed)',color:'#9E8E5B',fmt:N,
      info:'ALL inbound calls to the Hadapsar GMB listing number (2241483789) from Exotel call logs. DND dashboard total = 2× Exotel total (confirmed match). Includes answered + missed. The AI category audit below runs only on the answered subset.',
      children:[
        {label:'Answered',arr:M.gmbRawAnswered,fmt:N},
        {label:'Missed / no-answer',arr:M.gmbRawMissed,fmt:N},
        {sep:1,label:'Category breakdown (AI audit · answered calls)'},
        {label:'Sexual health (SH)',arr:M.gmbCatSH,fmt:N,info:'AI-inferred: caller asking about ED/PE/SH. Was dominant before MH change. Dropped after.'},
        {label:'Mental health (MH)',arr:M.gmbCatMH,fmt:N,info:'AI-inferred: caller asking about mental health / anxiety / therapy. Near-zero before MH change. Appeared after May 25.'},
        {label:'STI',arr:M.gmbCatSTI,fmt:N},
        {label:'Other / uncategorised',arr:M.gmbCatOther,fmt:N},
        {sep:1,label:'Paid city-number calls mentioning Hadapsar (AI attributed · 2048556242)'},
        {label:'Paid calls → Hadapsar (AI)',arr:M.paidAiTotal,fmt:N,info:'Calls to the shared Pune paid call-asset (2048556242) where AI says caller mentioned Hadapsar. Supplement to GMB calls; NOT in raw total above.'},
        {label:'· SH',arr:M.paidAiSH,fmt:N},
        {label:'· MH',arr:M.paidAiMH,fmt:N},
        {label:'· STI',arr:M.paidAiSTI,fmt:N},
      ]},
    {t:'stage',k:'booked',label:'Booked (Screening Calls)',color:'#7B5EA7',fmt:N,
      info:'Screening Calls booked at Hadapsar. No category split at booking — a booking only gets a diagnosis once the patient is consulted.'},
    {t:'edge',k:'l2b',label:'Lead → book',formula:'booked ÷ leads',fmt:PCT},
    {t:'stage',k:'done',label:'Done (completed consults)',color:'#B8862E',fmt:N,
      info:'Completed Screening Calls — every done consult has a diagnosis, so this is where the category split is clean and real.',
      children:[
        {sep:1,label:'By category (diagnosis)'},
        {label:'Sexual health (SH = ED + PE + combined)',arr:M.shDone,fmt:N,info:'ED+, PE+, ED+PE+ diagnoses collapsed into SH. The core revenue category. Declining post-MH-change.'},
        {label:'STI',arr:M.stiDone,fmt:N},
        {label:'Other (incl. MH + NSSD)',arr:M.othDone,fmt:N,info:'All non-STI, non-SH diagnoses. INCLUDES MH patients — there is no separate MH diagnosis tag in encounter_tags. Rising post-MH-change, consistent with MH patients consulting.'},
      ]},
    {t:'edge',k:'b2d',label:'Book → done',formula:'done ÷ booked',fmt:PCT},
    {t:'stage',k:'purch',label:'Purchased',color:'#B8862E',fmt:N,
      children:[
        {label:'SH purchased',arr:M.shPurch,fmt:N},
        {label:'STI purchased',arr:M.stiPurch,fmt:N},
      ]},
    {t:'edge',k:'d2p',label:'Done → purchased',formula:'purchased ÷ done',fmt:PCT},
    {t:'stage',k:'rev',label:'Revenue',color:'#1F6F5C',fmt:RUP,
      children:[
        {label:'SH revenue',arr:M.shRev,fmt:RUP,info:'Revenue from ED/PE consultations. MH consults generate zero revenue here — they land in Other with no tag.'},
        {label:'STI revenue',arr:M.stiRev,fmt:RUP},
      ]},
  ];
}

function heatBg(v,mn,mx){if(v==null||isNaN(v)||!isFinite(mn))return'';const rng=(mx-mn)||1,t=(v-mn)/rng;
  if(t>=0.6)return hexA('#2E7D5B',0.07+0.18*((t-0.6)/0.4));
  if(t<=0.4)return hexA('#B23A2E',0.07+0.18*((0.4-t)/0.4));return'';}
function rowCells(arr,fmt,cols,wow){let mn=Infinity,mx=-Infinity;
  cols.forEach(ci=>{const v=arr[ci];if(v!=null&&!isNaN(v)){mn=Math.min(mn,v);mx=Math.max(mx,v);}});
  let cells='';cols.forEach((ci,j)=>{const v=arr[ci],last=j===cols.length-1;
    const bg=heatBg(v,mn,mx);const mh=isMHWeek(ci);
    let w='';if(wow&&last&&v!=null&&!isNaN(v)&&arr[1]!=null&&!isNaN(arr[1])){const d=v-arr[1];if(d){const up=d>0;w=`<div class="wowd" style="color:${up?'var(--good)':'var(--bad)'}">${up?'▲':'▼'} ${fmt(Math.abs(d))}</div>`;}}
    const cls=[last?'lastcol':'',mh?'mhwk':''].filter(Boolean).join(' ');
    const style=bg?`style="background:${bg}"`:'';
    cells+=`<td class="${cls}" ${style}>${v==null||isNaN(v)?'—':fmt(v)}${w}</td>`;});
  return cells;}
function sparkCell(arr,color,label,fmt){const idx=ZREG.length;ZREG.push({label,arr:arr.slice(0,NSHOW),fmt,color});
  return `<td class="sparkcell" onclick="zoomReg(${idx})">${spark(arr.slice(0,NSHOW),color)}</td>`;}
function matrix(M){
  ZREG=[]; const W=D._meta.weeks; const cols=[]; for(let j=NSHOW-1;j>=0;j--) cols.push(j);
  let h='<div class="fmwrap"><table class="fm"><thead><tr><th>Stage &amp; transition</th>';
  cols.forEach((ci,j)=>{
    const mh=isMHWeek(ci);
    h+=`<th class="${j===cols.length-1?'lastcol':''}${mh?' mhwk':''}">${wkShort(W[ci])}${mh?' 🔵':''}</th>`;
  });
  h+='<th>trend</th></tr></thead><tbody>';
  buildStages(M).forEach(r=>{
    const a=M[r.k];
    const kids=(r.children||[]).filter(c=>c.sep||(c.arr&&cols.some(ci=>c.arr[ci])));
    const open=expanded[r.k]!==false;
    const chev=kids.length?`<span class="chev" onclick="event.stopPropagation();toggle('${r.k}')">${open?'▾':'▸'}</span> `:'';
    if(r.t==='edge'){
      h+=`<tr class="edge"><td><div class="edge-lbl">${chev}↳ ${r.label}${ix(r.info)}<span class="formula">${r.formula||''}</span></div></td>${rowCells(a,r.fmt,cols,true)}${sparkCell(a,'#A8B0A0',r.label,r.fmt)}</tr>`;
    } else {
      h+=`<tr class="stage"><td><div class="snode" style="border-color:${r.color}">${chev}${r.label}${ix(r.info)}</div></td>${rowCells(a,r.fmt,cols,true)}${sparkCell(a,r.color,r.label,r.fmt)}</tr>`;
    }
    if(open) kids.forEach(c=>{
      if(c.sep){h+=`<tr class="subhead"><td colspan="${cols.length+2}">${c.label}</td></tr>`;return;}
      const sub=(c.kids||[]).filter(s=>s.arr&&cols.some(ci=>s.arr[ci]));
      const sk='sub_'+r.k+'_'+(c.label||'').replace(/\W+/g,''),so=expanded[sk]===true;
      const chev2=sub.length?`<span class="chev" onclick="event.stopPropagation();toggle2('${sk}')">${so?'▾':'▸'}</span>`:'';
      h+=`<tr class="kid"><td><div class="kid-lbl">${chev2}${c.label}${ix(c.info)}</div></td>${rowCells(c.arr,c.fmt||N,cols,false)}${sparkCell(c.arr,r.color||'#3E6F8E',r.label+' · '+c.label,c.fmt||N)}</tr>`;
      if(sub.length&&so) sub.forEach(s=>{
        h+=`<tr class="kid"><td><div class="kid-lbl" style="padding-left:34px">${s.label}${ix(s.info)}</div></td>${rowCells(s.arr,s.fmt||N,cols,false)}${sparkCell(s.arr,r.color||'#3E6F8E',r.label+' · '+s.label,s.fmt||N)}</tr>`;
      });
    });
  });
  return h+'</tbody></table></div>';
}

function spark(arr,color){
  const v=arr.slice().reverse().map(x=>x==null||isNaN(x)?0:x);const n=v.length,mx=Math.max(1,...v);
  const W=150,H=30,pad=2;const x=i=>pad+i*(W-2*pad)/(n-1),y=val=>H-pad-(val/mx)*(H-2*pad);
  let p='';v.forEach((val,i)=>{p+=(i?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';});
  return `<svg class="sp" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><path d="${p}" fill="none" stroke="${color}" stroke-width="1.6"/><circle cx="${x(n-1).toFixed(1)}" cy="${y(v[n-1]).toFixed(1)}" r="2.6" fill="${color}"/></svg>`;
}
function zoomReg(i){const z=ZREG[i];if(!z)return;
  $('mTitle').textContent=z.label;
  const W=700,H=300,pad=38;const wks=D._meta.weeks.slice(0,NSHOW).reverse();
  const v=z.arr.slice().reverse().map(x=>x==null||isNaN(x)?null:x);const n=v.length;
  const mx=Math.max(1,...v.map(x=>x||0));const x=i=>pad+i*(W-2*pad)/(n-1),y=val=>H-pad-((val||0)/mx)*(H-2*pad-10);
  let p='',pts='',started=false;
  v.forEach((val,i)=>{if(val==null)return;p+=(started?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';started=true;
    pts+=`<circle cx="${x(i).toFixed(1)}" cy="${y(val).toFixed(1)}" r="3" fill="${z.color}"><title>${wkShort(wks[i])}: ${z.fmt(val)}</title></circle>`;});
  let gl='';[0,.5,1].forEach(f=>{const yy=H-pad-(f*(H-2*pad-10));gl+=`<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#EEEBE2"/><text x="4" y="${yy+3}" font-size="10" fill="#999">${z.fmt(mx*f)}</text>`;});
  let xl='';v.forEach((_,i)=>{
    const isMH=(NSHOW-1-i)===MH_WK_IDX;
    xl+=`<text x="${x(i)}" y="${H-10}" font-size="9" fill="${isMH?'#7B5EA7':'#999'}" text-anchor="middle" font-weight="${isMH?'700':'400'}">${wkShort(wks[i])}${isMH?' 🔵':''}</text>`;
  });
  $('mBody').innerHTML=`<svg width="100%" viewBox="0 0 ${W} ${H}">${gl}<path d="${p}" fill="none" stroke="${z.color}" stroke-width="2"/>${pts}${xl}</svg><div class="lgd">Hover a point for week &amp; value. 🔵 = MH GMB change (May 25 week).</div>`;
  $('modal').classList.add('on');
}
function closeZ(){$('modal').classList.remove('on');}
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeZ();});

function render(){
  if(!D){$('app').innerHTML='<div class="note">Loading…</div>';return;}
  $('wLab').textContent=wkLabel(D._meta.weeks[wk]);
  $('wPrev').disabled=wk>=D._meta.weeks.length-1;$('wNext').disabled=wk<=0;
  const M=metrics();
  const i=wk;
  const ai=D.leads&&D.leads.ai||{};
  const bc=D.bottom&&D.bottom.by_cat||{};
  let h='';

  // MH impact banner
  const shCallNow=(M.gmbCatSH[1]||0); const mhCallNow=(M.gmbCatMH[1]||0);
  const shCallPre=Math.round((M.gmbCatSH[4]+(M.gmbCatSH[5]||0))/2);  // avg May18+May11... actually just use May11=5,May18=4
  h+=`<div class="mh-banner">
    <b>🔵 MH GMB change · May 25 week.</b>
    After: GMB searches <b>+53%</b> (3,200+ vs 2,100 pre-change) but GMB unique calls <b>−25%</b> (24–27 vs 30–36/week).
    AI call audit: SH calls <b>dropped ~50%</b> (7–11/week, was 15–17); MH calls <b>appeared</b> (5–8/week, was 0).
    SH done is declining (Jun 15: 7, Jun 8: 13, was 18–21). Total done roughly stable as "Other" done rose (MH patients).
    <span style="color:#7B5EA7">→ MH change is attracting MH seekers but repelling SH callers. Consider reverting if SH trend continues.</span>
  </div>`;

  // Matrix
  h+=`<div class="shead"><h2>Funnel, last 7 weeks</h2><span class="sub2">🔵 = May 25 MH-change week · latest on right · green = high, red = low per row · click sparkline to zoom</span></div>`;
  h+=matrix(M);

  h+=`<div class="note"><b>Sources.</b>
    GMB reach: Google Business Profile insights (searches = impressions; clicks = call button + website + directions).
    Leads: CRM (Pune|Hadapsar) by channel; includes Practo external sheet + CRM entries.
    GMB calls: Exotel call logs for number 2241483789 (clinic-direct, DND-dashboard-confirmed: dashboard total = 2× Exotel total).
    AI category: allo_analytics.call_analyses — audits answered calls, gives STI / SH / MH / Other.
    Paid calls: shared Pune city number 2048556242, filtered to calls where AI says caller mentioned Hadapsar.
    Booked/Done/Purchased/Revenue: Redshift (Screening Calls, Savali_Allo_Clinic, city=Pune locality=Hadapsar × encounter_tags × paid invoices).
    <b>MH note:</b> encounter_tags has no MH diagnosis type, so MH consultations land in "Other (incl. MH)" on the done/revenue side.
    The SH revenue drop is likely real: MH patients who do consult are not purchasing SH packages.
  </div>`;

  $('app').innerHTML=h;
}
$('wPrev').onclick=()=>{if(wk<D._meta.weeks.length-1){wk++;render();}};
$('wNext').onclick=()=>{if(wk>0){wk--;render();}};

fetch('data_hadapsar.json?v='+Date.now()).then(r=>r.json()).then(j=>{D=j;wk=0;render();})
  .catch(()=>{$('app').innerHTML='<div class="note">Could not load data_hadapsar.json — run scripts/assemble_hadapsar.py.</div>';});
</script>
