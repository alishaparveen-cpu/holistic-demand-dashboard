<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demand Owner вЂ” Clinic Funnel</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F4EE;--sheet:#fff;--inset:#F4F2EB;--ink:#1A2B26;--ink2:#52605A;--muted:#8A8A80;--faint:#B0A99A;
  --line:#E5E2D9;--line2:#EEEBE2;--accent:#1F6F5C;--good:#1F6F5C;--bad:#B23A2E;--warn:#B8862E;--r:11px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}
.nav{max-width:1360px;margin:0 auto;padding:10px 24px 0;font-size:12px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.nav a{color:var(--muted);text-decoration:none;padding:3px 7px;border-radius:5px}.nav a:hover{color:var(--ink);background:var(--line)}
.nav .sep{color:var(--faint)}
.hdr{max-width:1360px;margin:0 auto;padding:16px 24px 10px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-left h1{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin-bottom:2px}
.hdr-left .sub{font-size:12px;color:var(--muted)}
.ctrls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.cg label{display:block;font-family:'JetBrains Mono';font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.cg select{font-size:13px;font-weight:600;color:var(--ink);background:var(--sheet);border:1px solid var(--line);border-radius:8px;padding:6px 10px;cursor:pointer;min-width:180px;font-family:'Inter'}
.scorecards{max-width:1360px;margin:0 auto 10px;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.sc{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);padding:10px 12px}
.sc .sl{font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.sc .sv{font-size:22px;font-weight:600;font-family:'Fraunces',serif;margin-top:1px;line-height:1.1}
.sc .sd{font-size:10px;color:var(--muted);margin-top:2px}
.wrap{max-width:1360px;margin:0 auto;padding:0 24px 60px}
.fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto;margin-bottom:10px}
table.fm{border-collapse:collapse;width:100%;min-width:780px;font-size:12.5px}
table.fm th{font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:right;padding:7px 11px;background:var(--inset);border-bottom:1px solid var(--line);white-space:nowrap}
table.fm th:first-child{text-align:left}
table.fm th.cur{color:var(--ink);font-weight:700}
table.fm td{padding:7px 11px;text-align:right;border-bottom:.5px solid var(--line2);font-family:'JetBrains Mono';white-space:nowrap}
table.fm td:first-child{text-align:left;font-family:'Inter';padding-left:12px}
table.fm tr:last-child td{border-bottom:0}
tr.stage-row td{background:var(--ink);color:#fff;font-weight:700;font-size:12.5px;padding:8px 12px}
tr.stage-row.gmb td{background:#1a5276}
tr.stage-row.lead td{background:#145a32}
tr.stage-row.bk td{background:#7d6608}
tr.stage-row.done td{background:#4a235a}
tr.stage-row.rev td{background:#1a3a4a}
tr.stage-row td:first-child{font-family:'Inter'}
tr.stage-row td div.stage-lbl{font-family:'Fraunces',serif;font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px}
.key-row td:first-child{border-left:3px solid var(--warn)}
tr.sub-row td{color:var(--ink2);font-size:11.5px}
tr.sub-row td:first-child{padding-left:24px;color:var(--ink2);font-size:11.5px}
tr.sep-sub td{background:var(--inset);font-family:'JetBrains Mono';font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:4px 12px 4px 24px;text-align:left;font-weight:600}
.chev{cursor:pointer;color:var(--faint);font-size:10px;display:inline-block;width:12px;user-select:none}
.sp{display:block;cursor:zoom-in}.sp:hover{opacity:.8}
.wow{font-size:9px;font-weight:700;margin-top:1px;display:block}
.pct-bar{display:flex;align-items:center;gap:4px;justify-content:flex-end}
.cat-pills{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.cpill{font-family:'JetBrains Mono';font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px}
.note{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6;padding:10px 14px;background:var(--inset);border-radius:8px;border:1px dashed var(--line)}
/* modal */
.modal{position:fixed;inset:0;background:rgba(20,30,25,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:14px;padding:20px 24px 24px;max-width:800px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.mbox h3{font-family:'Fraunces',serif;font-size:20px;margin:0 0 4px}
.mbox .msub{font-size:11px;color:var(--muted);margin-bottom:12px}
.mclose{float:right;border:none;background:var(--inset);border-radius:8px;width:28px;height:28px;font-size:16px;cursor:pointer;color:var(--ink2)}
.mclose:hover{background:var(--line)}
.ix{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:#e2dfd4;color:#8a8270;font-size:9px;cursor:help;margin-left:4px;font-style:italic;font-family:Georgia,serif;vertical-align:middle}
.tooltip-wrap{position:relative;display:inline-block}
.tooltip-wrap .tip{visibility:hidden;opacity:0;position:absolute;bottom:130%;left:0;min-width:240px;max-width:300px;background:var(--ink);color:#f3f1ea;font-size:11px;line-height:1.5;padding:9px 11px;border-radius:8px;z-index:99;transition:opacity .1s;pointer-events:none;text-align:left;white-space:normal;font-family:Inter;font-weight:400;font-style:normal;letter-spacing:0}
.tooltip-wrap:hover .tip{visibility:visible;opacity:1}
</style>
</head><body>
<div class="nav">
  <a href="index.html">в†ђ Dashboard</a><span class="sep">|</span>
  <a href="clinic-funnel.html">All Clinics</a>
  <a href="hadapsar-funnel.html">Hadapsar Deep Dive</a>
  <a href="indiranagar-funnel.html">Indiranagar Deep Dive</a>
</div>
<div class="hdr">
  <div class="hdr-left">
    <h1 id="hTitle">Clinic Funnel вЂ” Demand Owner</h1>
    <div class="sub" id="hSub">6 priority clinics В· reach в†’ lead в†’ booking в†’ done в†’ revenue</div>
  </div>
  <div class="ctrls">
    <div class="cg"><label>Clinic</label><select id="clinicSel"></select></div>
  </div>
</div>
<div class="scorecards" id="score"></div>
<div class="wrap" id="app"></div>
<div class="modal" id="modal">
  <div class="mbox">
    <button class="mclose" id="mclose">Г—</button>
    <h3 id="mTitle"></h3><div class="msub" id="mSub"></div>
    <div id="mChart"></div>
  </div>
</div>
<script>
const TARGET_CLINICS=['Coimbatore|Bharathi Nagar','Bangalore|Indiranagar','Jaipur|Vaishali Nagar','Pune|Hadapsar','Navi Mumbai|Kharghar','Hubli|Vidya Nagar'];
const CITY_LABELS={'Coimbatore|Bharathi Nagar':'Coimbatore','Bangalore|Indiranagar':'Indiranagar В· Bangalore','Jaipur|Vaishali Nagar':'Jaipur','Pune|Hadapsar':'Hadapsar В· Pune','Navi Mumbai|Kharghar':'Kharghar В· Navi Mumbai','Hubli|Vidya Nagar':'Hubli'};
const CLINIC_COLORS={'Coimbatore|Bharathi Nagar':'#1a5276','Bangalore|Indiranagar':'#145a32','Jaipur|Vaishali Nagar':'#7d3c0e','Pune|Hadapsar':'#4a235a','Navi Mumbai|Kharghar':'#1a3a4a','Hubli|Vidya Nagar':'#0e4034'};

let DATA=null, CURKEY=null, EXPANDED={};
const $=id=>document.getElementById(id);
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const wkRange=iso=>{const s=new Date(iso+'T00:00:00Z'),e=new Date(s);e.setUTCDate(e.getUTCDate()+6);
  return s.getUTCMonth()===e.getUTCMonth()?`${s.getUTCDate()}вЂ“${e.getUTCDate()} ${MON[e.getUTCMonth()]}`:
    `${s.getUTCDate()} ${MON[s.getUTCMonth()]}вЂ“${e.getUTCDate()} ${MON[e.getUTCMonth()]}`;};
const wkShort=iso=>{const s=new Date(iso+'T00:00:00Z'),e=new Date(s);e.setUTCDate(e.getUTCDate()+6);
  return s.getUTCMonth()===e.getUTCMonth()?`${s.getUTCDate()}вЂ“${e.getUTCDate()} ${MON[e.getUTCMonth()]}`:
    `${s.getUTCDate()} ${MON[s.getUTCMonth()]}вЂ“${e.getUTCDate()} ${MON[e.getUTCMonth()]}`;};

const N=v=>v==null||isNaN(v)?'вЂ”':(Math.abs(+v)>=1000?Math.round(+v).toLocaleString('en-IN'):Number.isInteger(+v)?+v:(+v).toFixed(1));
const P=v=>v==null||isNaN(v)?'вЂ”':(+v).toFixed(1)+'%';
const RUP=v=>v==null||isNaN(v)?'вЂ”':'в‚№'+(Math.abs(+v)>=1000?Math.round(+v).toLocaleString('en-IN'):Math.round(+v));

let ZREG=[];
function sparkSVG(arr,col,W,H){
  const rev=[...arr].reverse(); const n=rev.length; const mn=Math.min(...rev.filter(x=>x!=null&&!isNaN(x)));
  const mx=Math.max(0,...rev.filter(x=>x!=null&&!isNaN(x))); const rng=(mx-mn)||1;
  const X=i=>3+i*(W-6)/(n-1); const Y=v=>H-3-(((+v||0)-mn)/rng)*(H-6);
  let pts=[];rev.forEach((v,i)=>{if(v!=null&&!isNaN(v))pts.push([X(i),Y(+v)]);});
  if(pts.length<2)return `<svg width="${W}" height="${H}"></svg>`;
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return `<svg class="sp" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><path d="${d}" fill="none" stroke="${col}" stroke-width="1.8"/><circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.4" fill="${col}"/></svg>`;
}
function zoomChart(arr,col,fmt,label){
  const W=740,H=300,PL=56,PR=16,PT=18,PB=64;
  const wks=DATA._meta.weeks.slice(0,8).reverse();
  const data=arr.slice(0,8).reverse();
  const pts=data.map((v,i)=>({v:v==null||isNaN(v)?null:+v,i})).filter(p=>p.v!=null);
  if(pts.length<2)return '<p style="padding:40px;text-align:center;color:var(--muted)">Not enough data.</p>';
  let mn=Math.min(...pts.map(p=>p.v)),mx=Math.max(...pts.map(p=>p.v));
  if(mn===mx){mn=Math.max(0,mn-1);mx+=1;} mn=mn>=0?0:mn;
  const rng=(mx-mn)||1,n=data.length-1;
  const X=i=>PL+i/n*(W-PL-PR); const Y=v=>H-PB-((v-mn)/rng)*(H-PT-PB);
  let g='';
  [0,.25,.5,.75,1].forEach(f=>{const yy=H-PB-(f*(H-PT-PB));const val=mn+rng*f;
    g+=`<line x1="${PL}" y1="${yy.toFixed(1)}" x2="${W-PR}" y2="${yy.toFixed(1)}" stroke="#EEEBE2"/>`;
    g+=`<text x="${PL-7}" y="${(yy+3).toFixed(1)}" text-anchor="end" font-family="JetBrains Mono" font-size="9" fill="#8A8A80">${fmt==='pct'?P(val):fmt==='rupee'?RUP(val):N(val)}</text>`;});
  wks.forEach((_,i)=>{const x=X(i);
    g+=`<text x="${x.toFixed(1)}" y="${H-PB+16}" text-anchor="end" transform="rotate(-38 ${x.toFixed(1)} ${H-PB+16})" font-family="JetBrains Mono" font-size="8.5" fill="#8A8A80">${wkRange(wks[i])}</text>`;});
  const dp=pts.map((p,j)=>(j?'L':'M')+X(p.i).toFixed(1)+' '+Y(p.v).toFixed(1)).join(' ');
  g+=`<path d="${dp}" fill="none" stroke="${col}" stroke-width="2.2"/>`;
  pts.forEach(p=>{g+=`<circle cx="${X(p.i).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3" fill="${col}"/><text x="${X(p.i).toFixed(1)}" y="${(Y(p.v)-7).toFixed(1)}" text-anchor="middle" font-family="JetBrains Mono" font-size="9.5" font-weight="600" fill="${col}">${fmt==='pct'?P(p.v):fmt==='rupee'?RUP(p.v):N(p.v)}</text>`;});
  return `<svg width="100%" viewBox="0 0 ${W} ${H}">${g}</svg>`;
}
function regSpark(arr,col,fmt,label){
  const id=ZREG.push({arr,col,fmt,label})-1;
  return `<span onclick="openZoom(${id})" title="click to zoom">${sparkSVG(arr.slice(0,8),col,80,24)}</span>`;
}
function openZoom(id){
  const z=ZREG[id]; if(!z)return;
  $('mTitle').textContent=z.label;
  $('mSub').textContent=CITY_LABELS[CURKEY]+' В· 8-week trend (oldest в†’ newest)';
  $('mChart').innerHTML=zoomChart(z.arr,z.col,z.fmt,z.label);
  $('modal').classList.add('on');
}
function closeZoom(){$('modal').classList.remove('on');}

function heatBg(v,mn,mx){if(v==null||isNaN(v)||mn===mx)return'';
  const t=(v-mn)/((mx-mn)||1);
  if(t>=.65)return`rgba(31,111,92,${(0.07+.22*((t-.65)/.35)).toFixed(2)})`;
  if(t<=.35)return`rgba(178,58,46,${(0.06+.18*((0.35-t)/.35)).toFixed(2)})`;return'';}

function cells(arr,fmt,NSHOW){
  const wks=DATA._meta.weeks; const cols=[]; for(let i=NSHOW-1;i>=0;i--)cols.push(i);
  let mn=Infinity,mx=-Infinity;
  cols.forEach(ci=>{const v=arr[ci];if(v!=null&&!isNaN(v)){mn=Math.min(mn,+v);mx=Math.max(mx,+v);}});
  const prev=arr[cols[0]+1];
  return cols.map((ci,j)=>{
    const v=arr[ci]; const last=j===cols.length-1;
    const bg=heatBg(v,mn,mx); const ongoing=ci===0;
    let wow='';
    if(last&&v!=null&&!isNaN(v)&&prev!=null&&!isNaN(prev)){
      const d=+v-+prev; if(Math.abs(d)>0.05){const up=d>0;wow=`<span class="wow" style="color:${up?'var(--good)':'var(--bad)'}">${up?'в–І':'в–ј'}${fmt==='pct'?P(Math.abs(d)):fmt==='rupee'?RUP(Math.abs(d)):N(Math.abs(d))}</span>`;}
    }
    const disp=v==null||isNaN(v)?'вЂ”':(fmt==='pct'?P(v):fmt==='rupee'?RUP(v):N(v));
    const sty=bg?`style="background:${bg}"`:'';
    return `<td ${sty} class="${ongoing?'':''}${last?' lastcol':''}">${disp}${wow}</td>`;
  }).join('');
}

function catCells(catFn,NSHOW,order,fmt){
  const wks=DATA._meta.weeks; const cols=[]; for(let i=NSHOW-1;i>=0;i--)cols.push(i);
  return cols.map((ci,j)=>{
    const parts=order.filter(k=>catFn(k,ci)>0).map(k=>{
      const v=catFn(k,ci); const tot=order.reduce((a,kk)=>a+(catFn(kk,ci)||0),0)||1;
      const CCOL={STI:'#b8862e',SH:'#2E7D5B','ED+':'#2E7D5B','PE+':'#1a5276','ED+PE+':'#3a6e8a',NSSD:'#4a235a',oth:'#8A8A80',MH:'#7B5EA7',Other:'#8A8A80'};
      const col=CCOL[k]||'#8A8A80';
      return `<span class="cpill" style="background:${col}22;color:${col}">${k} ${fmt==='rupee'?RUP(v):v}</span>`;
    });
    return `<td>${parts.length?`<div class="cat-pills">${parts.join('')}</div>`:'<span style="color:var(--faint)">вЂ”</span>'}</td>`;
  }).join('');
}

function thdr(NSHOW){
  const wks=DATA._meta.weeks; const cols=[]; for(let i=NSHOW-1;i>=0;i--)cols.push(i);
  return cols.map((ci,j)=>`<th class="${j===cols.length-1?'cur':''}">${wkShort(wks[ci])}${ci===0?' <span style="font-size:8px;opacity:.6">(latest)</span>':''}</th>`).join('');
}

function stageHdr(cls,label,icon){
  const NSHOW=6; const cols=NSHOW+1; // label + NSHOW data + trend
  return `<tr class="stage-row ${cls}"><td colspan="${NSHOW+2}"><div class="stage-lbl">${icon} ${label}</div></td></tr>`;
}

function tipIcon(txt){return txt?`<span class="tooltip-wrap"><span class="ix">i</span><span class="tip">${txt}</span></span>`:''}

function toggle(k){EXPANDED[k]=!EXPANDED[k];render();}

function buildRows(C,NSHOW,col){
  const wks=DATA._meta.weeks;
  const ld=C.lead||{}; const bc=ld.by_chan||{}; const aib=ld.ai_lead_by_cat||{};
  const bk=C.booking||{}; const cm=bk.catmix||{}; const dn=C.done||{};
  const rv=C.revenue||{}; const eng=C.engagement||{}; const disc=C.discovery||{};
  const su=C.supply||{}; const sh=C.showup||{};
  const get=(o,k)=>o[k]||Array(12).fill(0);
  const pct=(a,b)=>a.map((v,i)=>b[i]?(+v/(+b[i]||1)*100):null);
  const add=(a,b)=>a.map((v,i)=>(+v||0)+(+b[i]||0));

  let html='';

  // в”Ђв”Ђ SUPPLY в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const sup_open=EXPANDED['supply']!==false;
  html+=stageHdr('','Supply','рџЏҐ');
  html+=`<tr class="col-hdr"><th>Metric</th>${thdr(NSHOW)}<th>Trend</th></tr>`;
  html+=`<tr class="mrow key-row"><td><span class="chev" onclick="toggle('supply')">${sup_open?'в–ѕ':'в–ё'}</span> Active days${tipIcon('Days the clinic had a doctor available')}</td>${cells(get(su,'active_days'),'',NSHOW)}${regSpark(get(su,'active_days'),col,'',`Active days В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
  if(sup_open){
    html+=`<tr class="sub-row"><td style="padding-left:24px">Available hours</td>${cells(get(su,'avail_hours'),'h',NSHOW)}<td></td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Weekend days</td>${cells(get(su,'weekend_days'),'',NSHOW)}<td></td></tr>`;
  }

  // в”Ђв”Ђ GMB REACH в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const gmb_open=EXPANDED['gmb']!==false;
  html+=stageHdr('gmb','GMB Reach','рџ“Ќ');
  html+=`<tr class="col-hdr"><th>Metric</th>${thdr(NSHOW)}<th>Trend</th></tr>`;
  const gmbImpr=get(disc,'impressions'); const gmbCalls=get(eng,'gmb_calls');
  const gmbWeb=get(eng,'website'); const gmbDir=get(eng,'directions');
  const gmbClicks=add(add(gmbCalls,gmbWeb),gmbDir);
  const gmbCtr=pct(gmbClicks,gmbImpr);
  html+=`<tr class="mrow key-row"><td><span class="chev" onclick="toggle('gmb')">${gmb_open?'в–ѕ':'в–ё'}</span> GMB impressions${tipIcon('Times the clinic GBP appeared in Google Search/Maps. вљ  Google restated impression counting ~25 May 2026 (в‰€3Г— step-up, calls flat) вЂ” trend distorted, use cautiously.')}</td>${cells(gmbImpr,'',NSHOW)}${regSpark(gmbImpr,col,'',`GMB impressions В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
  if(gmb_open){
    html+=`<tr class="sub-row"><td style="padding-left:24px">Call button clicks${tipIcon('Users who tapped Call on the GBP listing')}</td>${cells(gmbCalls,'',NSHOW)}${regSpark(gmbCalls,'#34A853','',`GMB calls В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Website taps</td>${cells(gmbWeb,'',NSHOW)}<td></td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Direction taps${tipIcon('Highest physical-visit intent')}</td>${cells(gmbDir,'',NSHOW)}<td></td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">GMB CTR (clicks Г· impr)${tipIcon('Total clicks Г· impressions. Post-restatement artificially low.')}</td>${cells(gmbCtr,'pct',NSHOW)}${regSpark(gmbCtr,'#8A8A80','pct',`GMB CTR В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Review velocity${tipIcon('New GMB reviews this week вЂ” primary rank driver for GMB')}</td>${cells(get(disc,'review_vel'),'',NSHOW)}<td></td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Rating</td>${cells(get(disc,'rating'),'',NSHOW)}<td></td></tr>`;
  }

  // в”Ђв”Ђ LEAD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const lead_open=EXPANDED['lead']!==false;
  const aiLead=get(ld,'ai_lead_calls'); const aiRel=get(ld,'ai_relevant'); const aiStr=get(ld,'ai_strong');
  const leadTot=get(ld,'leads_total');
  html+=stageHdr('lead','Leads','рџЋЇ');
  html+=`<tr class="col-hdr"><th>Metric</th>${thdr(NSHOW)}<th>Trend</th></tr>`;
  html+=`<tr class="mrow key-row"><td><span class="chev" onclick="toggle('lead')">${lead_open?'в–ѕ':'в–ё'}</span> AI lead calls в†’ this clinic${tipIcon('Inbound calls to the Allo network where the AI identified the caller as intending THIS clinic (locality match). Live from ~27 May. Each call = one potential new patient.')}</td>${cells(aiLead,'',NSHOW)}${regSpark(aiLead,'#1F6F5C','',`AI lead calls В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
  if(lead_open){
    html+=`<tr class="sub-row"><td style="padding-left:24px"><b>Relevant leads${tipIcon('Service-intent: caller wants to book / talk to doctor / get tested. Excludes callbacks, follow-ups, existing patients calling about treatment.')}</b></td>${cells(aiRel,'',NSHOW)}${regSpark(aiRel,'#145a32','',`Relevant leads В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
    const aiCats=EXPANDED['aicat']!==false;
    html+=`<tr class="sub-row"><td style="padding-left:24px"><span class="chev" onclick="toggle('aicat')">${aiCats?'в–ѕ':'в–ё'}</span> Category breakdown (AI audit В· answered calls)${tipIcon('Category of what the caller is seeking. Based on AI analysis of the call transcript.')}</td>${catCells((k,ci)=>(aib[k]||[])[ci]||0,NSHOW,['SH','STI','MH','Other'],'')}<td></td></tr>`;
    if(aiCats){
      [['SH','#2E7D5B','Sexual health (ED / PE / SH)'],['STI','#b8862e','STI / Infection'],['MH','#7B5EA7','Mental health'],['Other','#8A8A80','Other / Uncategorised']].forEach(([k,col2,lbl])=>{
        html+=`<tr class="sub-row"><td style="padding-left:36px">${lbl}</td>${cells((aib[k]||Array(12).fill(0)),'',NSHOW)}<td></td></tr>`;
      });
    }
    html+=`<tr class="sep-sub"><td colspan="99">CRM leads (all channels)</td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Total CRM leads</td>${cells(leadTot,'',NSHOW)}${regSpark(leadTot,'#8B4A9A','',`CRM leads В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
    [['gmb','#34A853','GMB'],['google_ad','#4285F4','Google paid'],['practo_crm','#B8862E','Practo'],['fb','#E65C00','Meta / FB'],['organic','#1a5276','Organic / web'],['outbound_wa','#7B5EA7','Walk-in / Direct (WA-tagged)']].forEach(([k,c2,lbl])=>{
      const arr=bc[k]||Array(12).fill(0); if(arr.every(v=>!v))return;
      html+=`<tr class="sub-row"><td style="padding-left:36px">${lbl}</td>${cells(arr,'',NSHOW)}<td></td></tr>`;
    });
  }

  // в”Ђв”Ђ BOOKING в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const bk_open=EXPANDED['bk']!==false;
  const bookings=get(bk,'bookings'); const newPat=get(bk,'new'); const repPat=get(bk,'repeat');
  const l2b=pct(bookings,leadTot);
  html+=stageHdr('bk','Booking','рџ“…');
  html+=`<tr class="col-hdr"><th>Metric</th>${thdr(NSHOW)}<th>Trend</th></tr>`;
  html+=`<tr class="mrow key-row"><td><span class="chev" onclick="toggle('bk')">${bk_open?'в–ѕ':'в–ё'}</span> Gross bookings${tipIcon('Completed + missed (no-show). Appointments scheduled this week.')}</td>${cells(bookings,'',NSHOW)}${regSpark(bookings,'#7d6608','',`Bookings В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
  if(bk_open){
    html+=`<tr class="sub-row"><td style="padding-left:24px">New patients${tipIcon('First-ever appointment at this clinic')}</td>${cells(newPat,'',NSHOW)}<td></td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Repeat patients</td>${cells(repPat,'',NSHOW)}<td></td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Lead в†’ book %${tipIcon('Bookings Г· CRM leads')}</td>${cells(l2b,'pct',NSHOW)}${regSpark(l2b,'#8A8A80','pct',`Lв†’B% В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
    html+=`<tr class="sep-sub"><td colspan="99">Category mix at booking</td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">By diagnosis${tipIcon('Diagnosis category tagged to the appointment. STI = STI. SH = ED+ / PE+ / ED+PE+ / NSSD. Other = uncategorised.')}</td>${catCells((k,ci)=>(cm[k]||[])[ci]||0,NSHOW,['STI','ED+','PE+','ED+PE+','NSSD','oth'],'')}<td></td></tr>`;
  }

  // в”Ђв”Ђ SHOW-UP / DONE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const dn_open=EXPANDED['done']!==false;
  const done=get(dn,'done'); const noShow=get(sh,'no_show'); const resched=get(sh,'reschedules');
  const b2d=pct(done,bookings);
  html+=stageHdr('done','Show-up & Done','вњ…');
  html+=`<tr class="col-hdr"><th>Metric</th>${thdr(NSHOW)}<th>Trend</th></tr>`;
  html+=`<tr class="mrow key-row"><td><span class="chev" onclick="toggle('done')">${dn_open?'в–ѕ':'в–ё'}</span> B в†’ Done % (show-up rate)${tipIcon('Completed consultations Г· bookings. The biggest conversion leak in the funnel.')}</td>${cells(b2d,'pct',NSHOW)}${regSpark(b2d,'#4a235a','pct',`Bв†’Done% В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
  if(dn_open){
    html+=`<tr class="sub-row"><td style="padding-left:24px">Done (completed consults)</td>${cells(done,'',NSHOW)}${regSpark(done,'#7B5EA7','',`Done В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">No-shows</td>${cells(noShow,'',NSHOW)}<td></td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Reschedules</td>${cells(resched,'',NSHOW)}<td></td></tr>`;
    const avH=get(su,'avail_hours'); const util=done.map((d,i)=>avH[i]?d/(avH[i]*2)*100:null);
    html+=`<tr class="sub-row"><td style="padding-left:24px">Doctor utilisation %${tipIcon('Done Г· (available hours Г— 2 slots/hr)')}</td>${cells(util,'pct',NSHOW)}<td></td></tr>`;
  }

  // в”Ђв”Ђ REVENUE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const rv_open=EXPANDED['rev']!==false;
  const rev=get(rv,'rev'); const pc=get(rv,'paid_consults');
  const rpc=rev.map((r,i)=>pc[i]?(r/pc[i]):null);
  const rpd=rev.map((r,i)=>su.active_days[i]?(r/su.active_days[i]):null);
  const rbc=rv.by_cat||{};
  html+=stageHdr('rev','Revenue','рџ’°');
  html+=`<tr class="col-hdr"><th>Metric</th>${thdr(NSHOW)}<th>Trend</th></tr>`;
  html+=`<tr class="mrow key-row"><td><span class="chev" onclick="toggle('rev')">${rv_open?'в–ѕ':'в–ё'}</span> Revenue (realized)${tipIcon('Paid invoices on completed consultations this week.')}</td>${cells(rev,'rupee',NSHOW)}${regSpark(rev,'#1a3a4a','rupee',`Revenue В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
  if(rv_open){
    html+=`<tr class="sub-row"><td style="padding-left:24px">Paid consults</td>${cells(pc,'',NSHOW)}<td></td></tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Revenue / consult</td>${cells(rpc,'rupee',NSHOW)}${regSpark(rpc,'#8A8A80','rupee',`RPC В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
    html+=`<tr class="sub-row"><td style="padding-left:24px">Revenue / active day</td>${cells(rpd,'rupee',NSHOW)}${regSpark(rpd,'#8A8A80','rupee',`Rev/day В· ${CITY_LABELS[CURKEY]}`)}</tr>`;
    if(Object.values(rbc).some(a=>a&&a.some(Boolean))){
      html+=`<tr class="sub-row"><td style="padding-left:24px">Revenue by category</td>${catCells((k,ci)=>(rbc[k]||[])[ci]||0,NSHOW,['STI','ED+','PE+','ED+PE+','NSSD','oth'],'rupee')}<td></td></tr>`;
    }
  }

  return html;
}

function render(){
  if(!DATA||!CURKEY)return;
  ZREG=[];
  const C=DATA.clinics[CURKEY]; if(!C)return;
  const NSHOW=6; const wks=DATA._meta.weeks;
  const col=CLINIC_COLORS[CURKEY]||'#1F6F5C';
  const bk=C.booking||{}; const dn=C.done||{}; const eng=C.engagement||{}; const rv=C.revenue||{};
  const b2d=bk.bookings[0]?(dn.done[0]/bk.bookings[0]*100):null;
  $('hTitle').textContent=`${CITY_LABELS[CURKEY]} вЂ” Demand Funnel`;
  $('hSub').textContent=`${wkRange(wks[0])} (latest) В· reach в†’ lead в†’ booking в†’ done в†’ revenue`;

  // Scorecards
  const sc=[
    ['GMB actions',N(eng.interactions[0]),'calls+dir+web',eng.interactions,col],
    ['AI lead calls',N((C.lead||{}).ai_lead_calls?.[0]),'clinic-tagged',((C.lead||{}).ai_lead_calls||[]),col],
    ['Relevant leads',N((C.lead||{}).ai_relevant?.[0]),'service intent',((C.lead||{}).ai_relevant||[]),'#145a32'],
    ['Bookings',N(bk.bookings?.[0]),'gross',bk.bookings||[],'#7d6608'],
    ['Bв†’Done %',P(b2d),'show-up',bk.bookings.map((b,i)=>b?(dn.done[i]/b*100):null),'#4a235a'],
    ['Done',N(dn.done?.[0]),'completed',dn.done||[],col],
    ['Revenue',RUP((rv.rev||[])[0]),'paid invoices',rv.rev||[],'#1a3a4a'],
  ];
  $('score').innerHTML=sc.map(([l,v,d,arr,c2])=>{
    const sp=sparkSVG(arr.slice(0,8),c2,48,16);
    return `<div class="sc"><div class="sl">${l}</div><div class="sv">${v}</div><div class="sd">${d} ${sp}</div></div>`;
  }).join('');

  // Table
  const rows=buildRows(C,NSHOW,col);
  $('app').innerHTML=`<div class="fmwrap"><table class="fm">${rows}</table></div>
<div class="note">
<b>AI lead calls</b>: calls to the Allo network where the AI identified the caller as intending this clinic (locality match in the call transcript). Live from ~27 May; prior weeks show 0 not because leads were absent but because audit coverage was lower.
<b>CRM leads</b>: leads in allo_persons.lead attached to this clinic's location, by utm_source channel.
<b>GMB impressions</b>: Google restated impression counting ~25 May 2026 (~3Г— step-up). Clicks/calls were unaffected вЂ” use clicks as the reliable reach signal.
<b>Revenue</b>: paid invoices on completed consultations in this week; follow-up purchases billed in a later week appear in that week.
</div>`;
}

function select(key){
  CURKEY=key; render();
  $('clinicSel').value=key;
}

fetch('data_clinic_funnel.json?v='+Date.now()).then(r=>r.json()).then(j=>{
  DATA=j;
  const sel=$('clinicSel');
  TARGET_CLINICS.forEach(k=>{
    if(!j.clinics[k])return;
    const opt=document.createElement('option');
    opt.value=k; opt.textContent=CITY_LABELS[k];
    sel.appendChild(opt);
  });
  sel.onchange=e=>select(e.target.value);
  $('mclose').onclick=closeZoom;
  $('modal').onclick=e=>{if(e.target===$('modal'))closeZoom();};
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom();});
  $('app').addEventListener('click',e=>{
    const sc=e.target.closest('[onclick^="openZoom"]');
    // handled inline
  });
  select(TARGET_CLINICS[3]); // default Hadapsar
}).catch(()=>{$('app').innerHTML='<div class="note">Failed to load data_clinic_funnel.json вЂ” run scripts/build_clinic_funnel.py</div>';});
</script>
