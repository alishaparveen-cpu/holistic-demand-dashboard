<style>
:root{--ink:#1A1A17;--ink-2:#4A4A44;--muted:#8A8A80;--faint:#C0BDB4;--paper:#F3F1EA;--sheet:#FFF;--line:#E2DFD4;--line-2:#EDEAE0;--inset:#FAFAF6;--accent:#1F6F5C;
--good:#2E7D5B;--good-bg:#E8F2EC;--warn:#B5722A;--warn-bg:#F8EFE2;--bad:#B23A2E;--bad-bg:#F8E9E6;--gmb:#34A853;--gmb-bg:#E8F5E9;--gads:#4285F4;--gads-bg:#E8F0FE;--crm:#8B4A9A;--crm-bg:#F3EEFE;--book:#E65C00;--book-bg:#FFF3E0;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
.nav{max-width:1320px;margin:0 auto;padding:12px 32px 0;display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:12px}
.nav a{color:#64748b;text-decoration:none;padding:4px 8px;border-radius:6px}.nav a:hover{background:#eceadf}.nav .here{font-weight:700;color:var(--ink);background:#eceadf;border-radius:6px;padding:4px 8px}
.hdr{padding:20px 32px 14px;max-width:1320px;margin:0 auto}
.eyebrow{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
.hdr h1{font-family:'Newsreader';font-weight:500;font-size:28px;margin:4px 0 2px}
.hdr .sub{font-family:'JetBrains Mono';font-size:11px;color:var(--muted)}
.ctrls{max-width:1320px;margin:0 auto 14px;padding:0 32px;display:flex;gap:18px;flex-wrap:wrap;align-items:flex-end}
.cg label{display:block;font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.cg select{font-family:Inter;font-size:13px;font-weight:600;color:var(--ink);background:var(--sheet);border:1px solid var(--line);border-radius:8px;padding:7px 10px;cursor:pointer;min-width:150px}
.seg{display:inline-flex;background:#EAE7DC;border-radius:9px;padding:2px}
.seg button{border:none;background:none;font-family:Inter;font-weight:600;font-size:12px;color:var(--muted);padding:6px 12px;border-radius:7px;cursor:pointer}
.seg button.on{background:var(--sheet);color:var(--accent);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.info{display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:#C9C5B8;color:#fff;font-size:9px;font-weight:700;cursor:help;position:relative;margin-left:5px;font-style:italic;font-family:Georgia,serif}
.info .tip{visibility:hidden;opacity:0;position:absolute;bottom:150%;left:-6px;width:312px;background:var(--ink);color:#F3F1EA;font-size:11px;font-weight:400;line-height:1.55;padding:10px 12px;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.28);z-index:60;transition:opacity .12s;text-transform:none;letter-spacing:0;text-align:left;pointer-events:none}
.info .tip:after{content:"";position:absolute;top:100%;left:10px;border:6px solid transparent;border-top-color:var(--ink)}
.info:hover .tip{visibility:visible;opacity:1}
.info .tip b{color:#fff;font-weight:600}.info .tip code{font-family:'JetBrains Mono';font-size:10px;color:#CFE6DD}
/* scorecard */
.score{max-width:1320px;margin:0 auto 16px;padding:0 32px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.scard{background:var(--sheet);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.scard .sl{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.scard .sv{font-family:'Newsreader';font-size:25px;font-weight:500;line-height:1.1;margin-top:2px}
.scard .sd{font-size:10px;margin-top:2px;font-weight:600}
.legend{background:var(--sheet);border:1px solid var(--line);border-radius:10px;padding:10px 18px;margin:0 32px 16px;max-width:1320px;margin-left:auto;margin-right:auto;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2)}
.leg-badge{font-family:'JetBrains Mono';font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap}
.b-clinic{background:var(--good-bg);color:var(--good);border:1px solid #CADFD2}
.b-city{background:var(--warn-bg);color:var(--warn);border:1px solid #EAD9BF}
.b-setup{background:var(--bad-bg);color:var(--bad);border:1px dashed var(--bad)}
.src{display:inline-flex;align-items:center;font-family:'JetBrains Mono';font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:3px}
.src.GMB{background:var(--gmb-bg);color:var(--gmb)}.src.GADS{background:var(--gads-bg);color:var(--gads)}.src.CRM{background:var(--crm-bg);color:var(--crm)}.src.BOOKING{background:var(--book-bg);color:var(--book)}.src.OPS{background:#E8EAF6;color:#3949AB}.src.derived{background:#ECECEC;color:#666}
.wrap{max-width:1320px;margin:0 auto;padding:0 32px 60px}
.tbl-wrap{background:var(--sheet);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:8px}
table{width:100%;border-collapse:collapse}
.stage-hdr td{padding:10px 16px;font-family:'JetBrains Mono';font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff}
.col-hdr th{padding:6px 12px;font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line);background:var(--inset)}
.col-hdr th:first-child{text-align:left}
tr.mrow td{padding:8px 12px;border-bottom:.5px solid var(--line-2);vertical-align:top;text-align:right}
tr.mrow td:first-child{text-align:left}
tr.mrow:hover{background:#FAFAF7}
tr.mrow.key td:first-child{border-left:3px solid var(--warn)}
.m-name{font-size:12.5px;font-weight:500;color:var(--ink);display:flex;align-items:center;gap:6px}
.m-name .star{color:var(--warn);font-size:10px}
.m-desc{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4}
.val{font-family:'JetBrains Mono';font-size:14px;font-weight:600;color:var(--ink)}
.val.na{color:var(--faint);font-style:italic;font-size:11px;font-weight:400}
.delta{font-family:'JetBrains Mono';font-size:10px;font-weight:600;margin-left:6px}
.up{color:var(--good)}.down{color:var(--bad)}.flat{color:var(--muted)}
.cat-block{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;margin-top:2px}
.cat-pill{font-family:'JetBrains Mono';font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;background:#EEE;color:#555}
.note{font-size:11px;color:var(--muted);margin:6px 2px 0;line-height:1.5}
.spark{display:inline-block;vertical-align:middle;margin-left:8px}
.sparkclick{cursor:zoom-in;display:inline-flex;align-items:center;border-radius:6px;padding:1px 2px;transition:background .12s}
.sparkclick:hover{background:#EAF3EF;box-shadow:0 0 0 1px #BFE0D5 inset}
.col-hdr th .wr{display:block;font-size:7.5px;color:var(--faint);font-weight:500;letter-spacing:0;text-transform:none;margin-top:1px}
.col-hdr th.cur{color:var(--ink)}
tr.mrow td.prevw .val{color:var(--ink-2);font-size:12.5px}
/* zoom modal */
.zoom-ov{position:fixed;inset:0;background:rgba(26,26,23,.55);display:none;align-items:center;justify-content:center;z-index:90;padding:24px}
.zoom-ov.on{display:flex}
.zoom-box{background:var(--sheet);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.3);max-width:840px;width:100%;padding:20px 24px 24px;position:relative}
.zoom-box h3{font-family:'Newsreader';font-weight:500;font-size:21px;margin:0 0 2px;padding-right:36px}
.zoom-box .zsub{font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted);margin-bottom:8px}
.zoom-x{position:absolute;top:14px;right:16px;border:none;background:#EFECE2;color:var(--ink-2);width:28px;height:28px;border-radius:8px;font-size:16px;cursor:pointer;line-height:1}
.zoom-x:hover{background:#E2DECF}
@media(max-width:640px){.hdr,.ctrls,.wrap,.legend,.score,.nav{padding-left:14px;padding-right:14px}}
</style></head><body>

  <div class="cg"><label>Clinic</label><select id="clinicSel"></select></div>
  <div class="cg"><label>Week</label><select id="weekSel"></select></div>
  <div class="cg"><label>Google Ads paid layer<span class="info">i<span class="tip"><b>City-level</b> shows Google Ads metrics shared across the whole city (no per-clinic split). <b>Allocate to clinic</b> splits the volume/cost metrics (spend, ad clicks, loc clicks) by each clinic's <b>weekly booking share</b> — <code>alloc_w = clinic bookings ÷ all city-clinic bookings that week</code>. Modelled, not measured: Google Ads is city-targeted so there's no true per-clinic attribution. Rate metrics (IS %, Loc %, CPP, ePCLC) stay city-level either way.</span></span></label>
    <div class="seg" id="allocSeg"><button data-a="city" class="on">City-level</button><button data-a="alloc">Allocate to clinic</button></div></div>

<script>
let DATA=null, CL=null, WK=0, ALLOC='city';
const $=id=>document.getElementById(id);
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const wkRange=iso=>{const s=new Date(iso+'T00:00:00Z'),e=new Date(s);e.setUTCDate(e.getUTCDate()+6);
  return (s.getUTCMonth()===e.getUTCMonth()?`${s.getUTCDate()}–${e.getUTCDate()} ${MON[e.getUTCMonth()]}`:`${s.getUTCDate()} ${MON[s.getUTCMonth()]}–${e.getUTCDate()} ${MON[e.getUTCMonth()]}`);};
const N=v=>v==null?'—':(typeof v==='number'? (Math.abs(v)>=1000?Math.round(v).toLocaleString('en-IN'):(v%1?v.toFixed(v<10?2:1):v)) : v);
const R=v=>v==null?'—':'₹'+N(Math.round(v));
const P=v=>v==null?'—':(+v).toFixed(1)+'%';
const get=(o,path)=>path.split('.').reduce((a,k)=>a==null?null:a[k], o);
function deltaHTML(cur,prev,inv){ if(cur==null||prev==null||prev===0)return ''; const d=cur-prev; if(Math.abs(d)<1e-9)return '<span class="delta flat">±0</span>';
  const better=inv?d<0:d>0; const pc=Math.round(Math.abs(d)/Math.abs(prev)*100); return `<span class="delta ${better?'up':'down'}">${d>0?'▲':'▼'}${pc}%</span>`; }
function spark(arr,w,h,col){ w=w||64;h=h||20;col=col||'#8A8A80'; const a=arr.map(x=>x==null?null:+x); const pts=a.map((v,i)=>({v,i})).filter(p=>p.v!=null&&!isNaN(p.v)); if(pts.length<2)return '';
  const vs=pts.map(p=>p.v),mn=Math.min(...vs),mx=Math.max(...vs),rg=(mx-mn)||1,n=a.length-1;
  const X=i=>3+i/n*(w-6),Y=v=>h-3-((v-mn)/rg)*(h-6); const dpath=pts.map((p,j)=>(j?'L':'M')+X(p.i).toFixed(1)+' '+Y(p.v).toFixed(1)).join(' ');
  const last=pts[pts.length-1]; return `<svg class="spark" width="${w}" height="${h}"><path d="${dpath}" fill="none" stroke="${col}" stroke-width="1.4"/><circle cx="${X(last.i).toFixed(1)}" cy="${Y(last.v).toFixed(1)}" r="2" fill="${col}"/></svg>`; }

// ---- zoomable trend ----
let TRENDS=[];                                   // registry of charts for the current render
function clickSpark(full,col,label,fmt){         // full = 12-wk series newest-first; wraps a sparkline → zoom modal
  const sp=spark(full.slice(0,8).reverse(),70,20,col); if(!sp) return '';
  const id=TRENDS.push({label,fmt,col,series:full})-1;
  return `<span class="sparkclick" data-ti="${id}" title="click to zoom">${sp}</span>`;
}
function bigChart(series,col,fmt){                // series newest-first (idx0=latest); plot oldest→newest
  const W=780,H=380,padL=70,padR=22,padT=24,padB=78, wks=DATA._meta.weeks;
  const data=series.map((v,i)=>({v:v==null?null:+v,wk:wks[i]})).reverse();   // oldest first
  const pts=data.map((d,j)=>({...d,j})).filter(p=>p.v!=null&&!isNaN(p.v));
  if(pts.length<2) return '<div style="padding:48px;text-align:center;color:var(--muted)">Not enough data points to chart.</div>';
  const vs=pts.map(p=>p.v); let mn=Math.min(...vs),mx=Math.max(...vs); if(mn===mx){mn-=1;mx+=1;}
  mn=Math.min(mn,0)===0&&mn>=0?0:mn;                                          // anchor to 0 when all ≥0
  const rg=(mx-mn)||1, n=data.length-1;
  const X=j=>padL+j/n*(W-padL-padR), Y=v=>H-padB-((v-mn)/rg)*(H-padT-padB);
  let g='';
  for(let t=0;t<=4;t++){const val=mn+rg*t/4, y=Y(val);
    g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#ECEAE0"/>`+
       `<text x="${padL-8}" y="${(y+3).toFixed(1)}" text-anchor="end" font-family="JetBrains Mono" font-size="9.5" fill="#8A8A80">${fmtVal(val,fmt)}</text>`;}
  data.forEach((d,j)=>{ if(j%2&&j!==n)return; const x=X(j);
    g+=`<text x="${x.toFixed(1)}" y="${H-padB+16}" text-anchor="end" font-family="JetBrains Mono" font-size="8.5" fill="#8A8A80" transform="rotate(-40 ${x.toFixed(1)} ${H-padB+16})">${wkRange(d.wk)}</text>`;});
  const dp=pts.map((p,k)=>(k?'L':'M')+X(p.j).toFixed(1)+' '+Y(p.v).toFixed(1)).join(' ');
  g+=`<path d="${dp}" fill="none" stroke="${col}" stroke-width="2.2"/>`;
  pts.forEach((p,k)=>{const x=X(p.j),y=Y(p.v),lastTwo=k>=pts.length-2;
    g+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.2" fill="${col}"/>`;
    if(k===0||k===pts.length-1||lastTwo) g+=`<text x="${x.toFixed(1)}" y="${(y-8).toFixed(1)}" text-anchor="middle" font-family="JetBrains Mono" font-size="9.5" font-weight="600" fill="${col}">${fmtVal(p.v,fmt)}</text>`;});
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">${g}</svg>`;
}
function zoomTrend(id){const t=TRENDS[id]; if(!t)return;
  $('zoomTitle').textContent=t.label;
  $('zoomSub').textContent=`${CL.city.replace('|',' · ')} · ${CL._clinic} · 12-week trend (oldest → latest)`;
  $('zoomChart').innerHTML=bigChart(t.series,t.col,t.fmt);
  $('zoomOv').classList.add('on');}
function closeZoom(){$('zoomOv').classList.remove('on');}

const STAGE_COLORS=['#1A1A17','#1F3A5C','#1F5C3A','#5C3A1F','#5C1F3A','#3A1F5C','#5C4A1F','#1F4A5C','#4A5C1F','#5C1F1F'];
// rows: {m,desc,star, lvl:'clinic'|'city'|'setup', src, fmt:'n'|'rupee'|'pct'|'h'|'star', key (data path on clinic), paid (field on city.paid), allocable, special}
const STAGES=[
 {n:0,t:'Supply',q:'What does this clinic have to offer this week?',rows:[
   {m:'Active days',desc:'Days a doctor was actually available',star:1,lvl:'clinic',src:'OPS',key:'supply.active_days'},
   {m:'Available hours',desc:'Scheduled bookable hours (post-shrinkage)',lvl:'clinic',src:'OPS',key:'supply.avail_hours',fmt:'h'},
   {m:'Weekend days covered',lvl:'clinic',src:'OPS',key:'supply.weekend_days'},
 ]},
 {n:1,t:'Discovery',q:'How many people found this clinic?',rows:[
   {m:'Review velocity',desc:'New GMB reviews this week — primary rank driver',star:1,lvl:'clinic',src:'GMB',key:'discovery.review_vel'},
   {m:'Impressions',desc:'Times the listing appeared in search/maps · ⚠ Google restated impression counting ~25 May (≈3× step-up, calls/directions flat) — context only, not comparable week-to-week',lvl:'clinic',src:'GMB',key:'discovery.impressions'},
   {m:'GMB rating',lvl:'clinic',src:'GMB',key:'discovery.rating',fmt:'star',noTrend:1},
   {m:'Impression Share %',desc:'% of eligible ad impressions captured',lvl:'city',src:'GADS',paid:'is_pct',fmt:'pct'},
   {m:'Budget utilisation %',lvl:'city',src:'GADS',paid:'util',fmt:'pct'},
 ]},
 {n:2,t:'Engagement & Click',q:'Did people engage with what they found?',rows:[
   {m:'GMB interactions',desc:'Calls + directions + website taps on the listing',star:1,lvl:'clinic',src:'GMB',key:'engagement.interactions'},
   {m:'Interaction rate %',desc:'interactions ÷ impressions · ⚠ distorted from 25 May — impressions denominator was restated ~3× by Google, so recent weeks read artificially low',lvl:'clinic',src:'GMB',special:'intrate',fmt:'pct'},
   {m:'GMB direction taps',desc:'Highest physical-visit intent',lvl:'clinic',src:'GMB',key:'engagement.directions'},
   {m:'Ad clicks',lvl:'city',src:'GADS',paid:'clicks',allocable:1},
   {m:'Loc clicks (Ads)',desc:'Local-intent ad clicks',lvl:'city',src:'GADS',paid:'loc_clicks',allocable:1},
   {m:'Loc %',desc:'local clicks ÷ total clicks · target ≥55%',star:1,lvl:'city',src:'GADS',paid:'loc_pct',fmt:'pct'},
   {m:'ePCLC',desc:'Cost per location click',lvl:'city',src:'GADS',paid:'eplc',fmt:'rupee'},
 ]},
 {n:3,t:'Lead',q:'Did interest convert to a lead?',rows:[
   {m:'Lead calls (AI audit · clinic)',desc:'Inbound lead calls the AI call-audit placed at THIS clinic (its locality) · live from 27 May (trend builds as weeks accrue)',star:1,lvl:'clinic',src:'CRM',key:'lead.ai_lead_calls',noTrend:1},
   {m:'Relevant leads (clinic)',desc:'Of those, service-intent (talk-to-doctor / needs-tests) — the clinic-specific relevant leads',star:1,lvl:'clinic',src:'CRM',key:'lead.ai_relevant',noTrend:1},
   {m:'GMB organic calls',desc:'Direct calls from the GMB listing',lvl:'clinic',src:'GMB',key:'lead.gmb_organic_calls'},
   {m:'Tracked leads (clinic-engaged)',desc:'Leads attached to this clinic (engaged ≈ booked)',lvl:'clinic',src:'CRM',key:'lead.leads_total'},
   {m:'Ad spend',lvl:'city',src:'GADS',paid:'spend',allocable:1,fmt:'rupee'},
   {m:'CPP (cost / conversion)',desc:'Google-Ads conversions basis',lvl:'city',src:'GADS',paid:'cpp',fmt:'rupee'},
   {m:'Time to first PCC contact',lvl:'setup',desc:'30-min response ≈ 9× conversion · needs CRM timestamps'},
 ]},
 {n:4,t:'Qualification',q:'What category of demand is converting? (category = consult diagnosis)',rows:[
   {m:'STI share %',desc:'STI ÷ all consults — the demand-owner’s key cut',star:1,lvl:'clinic',src:'CRM',special:'cat_share',cat:'STI',fmt:'pct'},
   {m:'SH share % (ED + PE)',desc:'ED+ + PE+ + ED+PE+ ÷ all consults',star:1,lvl:'clinic',src:'CRM',special:'cat_share',cat:'SH',fmt:'pct'},
   {m:'Lead calls by category (AI audit · clinic)',desc:'Category of the INBOUND lead call, from the AI audit — STI / SH / MH / Other · live from 27 May. This is the lead-stage category.',star:1,lvl:'clinic',src:'CRM',special:'ailcat'},
   {m:'Category mix (consults)',desc:'Diagnosis tag on the completed consult — STI / ED+ / PE+ / ED+PE+ / NSSD / other',lvl:'clinic',src:'CRM',special:'catmix'},
 ]},
 {n:5,t:'Booking',q:'Did they book an appointment?',rows:[
   {m:'Total bookings',desc:'Confirmed appointments this week',star:1,lvl:'clinic',src:'BOOKING',key:'booking.bookings'},
   {m:'New patients',lvl:'clinic',src:'BOOKING',key:'booking.new'},
   {m:'Repeat patients',lvl:'clinic',src:'BOOKING',key:'booking.repeat'},
   {m:'L→B% (bookings ÷ leads)',lvl:'clinic',src:'derived',special:'l2b',fmt:'pct'},
   {m:'CPB (city · cost/conv)',lvl:'city',src:'GADS',paid:'cpp',fmt:'rupee'},
 ]},
 {n:6,t:'Show-up',q:'Did they actually come? (biggest leak)',rows:[
   {m:'Show-up % (B→Done)',desc:'done ÷ bookings',star:1,lvl:'clinic',src:'BOOKING',special:'b2d',fmt:'pct'},
   {m:'No-shows',lvl:'clinic',src:'BOOKING',key:'showup.no_show'},
   {m:'Reschedules',lvl:'clinic',src:'BOOKING',key:'showup.reschedules'},
 ]},
 {n:7,t:'Consultation Done',q:'Completed consultations',rows:[
   {m:'Done (total)',desc:'Completed consultations this week',star:1,lvl:'clinic',src:'BOOKING',key:'done.done'},
   {m:'B→Done%',lvl:'clinic',src:'BOOKING',special:'b2d',fmt:'pct'},
   {m:'Doctor utilisation %',desc:'done ÷ (avail hours × 2 slots/hr)',lvl:'clinic',src:'BOOKING',special:'util',fmt:'pct'},
 ]},
 {n:8,t:'Revenue & Outcome',q:'What did it generate?',rows:[
   {m:'Revenue (realized)',desc:'Paid invoices on completed consults this week',star:1,lvl:'clinic',src:'BOOKING',key:'revenue.rev',fmt:'rupee'},
   {m:'Paid consults',desc:'Consults with a paid invoice',lvl:'clinic',src:'BOOKING',key:'revenue.paid_consults'},
   {m:'RPC (revenue / paid consult)',lvl:'clinic',src:'derived',special:'rpc',fmt:'rupee'},
   {m:'Revenue by category (₹ · %)',desc:'Which diagnoses drive the money — STI / ED+ / PE+ / ED+PE+ / other',lvl:'clinic',src:'BOOKING',special:'revcat'},
   {m:'Revenue / active day',desc:'How much each working day generates',star:1,lvl:'clinic',src:'derived',special:'rev_per_day',fmt:'rupee'},
   {m:'Rev ÷ ad spend (allocated)',desc:'Total clinic revenue ÷ this clinic’s allocated city ad spend — rough, not channel-attributed',lvl:'city',src:'derived',special:'roas',fmt:'x'},
 ]},
 {n:9,t:'Velocity',q:'Is the clinic accelerating or slowing?',rows:[
   {m:'Bookings / active day',desc:'Best proxy for how busy the doctor is',star:1,lvl:'clinic',src:'derived',key:'velocity.bk_per_day'},
   {m:'Bookings / available hour',lvl:'clinic',src:'derived',key:'velocity.bk_per_hour'},
   {m:'Done / active day',lvl:'clinic',src:'derived',key:'velocity.done_per_day'},
 ]},
];

function fmtVal(v,fmt){ if(v==null)return null; if(fmt==='rupee')return R(v); if(fmt==='pct')return P(v); if(fmt==='h')return N(v)+'h'; if(fmt==='star')return v+'★'; if(fmt==='x')return (+v).toFixed(1)+'×'; return N(v); }
function cityPaid(){ const c=DATA.cities[CL.city]; return c?c.paid:null; }
function rowValueSeries(r){ // returns {series:[12], inv, badge, badgeClass, srcShown}
  const c=CL, w=WK;
  if(r.lvl==='setup') return {setup:true};
  if(r.special){
    const E=c.engagement,B=c.booking,D=c.done,S=c.supply;
    if(r.special==='intrate') return {series:E.interactions.map((iv,i)=>{const im=c.discovery.impressions[i];return im?iv/im*100:null;}),lvl:'clinic',src:'GMB'};
    if(r.special==='l2b') return {series:B.bookings.map((bk,i)=>{const ld=c.lead.leads_total[i];return ld?bk/ld*100:null;}),lvl:'clinic',src:'derived'};
    if(r.special==='b2d') return {series:D.done.map((dn,i)=>{const bk=B.bookings[i];return bk?dn/bk*100:null;}),lvl:'clinic',src:'BOOKING'};
    if(r.special==='util') return {series:D.done.map((dn,i)=>{const ah=S.avail_hours[i];return ah?dn/(ah*2)*100:null;}),lvl:'clinic',src:'BOOKING'};
    if(r.special==='catmix') return {catmix:true,lvl:'clinic',src:'CRM'};
    if(r.special==='revcat') return {revcat:true,lvl:'clinic',src:'BOOKING'};
    if(r.special==='ailcat') return {ailcat:true,lvl:'clinic',src:'CRM'};
    if(r.special==='cat_share'){ const cm=c.booking.catmix; const tot=i=>['STI','ED+','PE+','ED+PE+','NSSD','oth'].reduce((a,k)=>a+(cm[k][i]||0),0);
      const num=i=>r.cat==='SH'?((cm['ED+'][i]||0)+(cm['PE+'][i]||0)+(cm['ED+PE+'][i]||0)):(cm[r.cat][i]||0);
      return {series:cm['STI'].map((_,i)=>{const t=tot(i);return t?num(i)/t*100:null;}),lvl:'clinic',src:'CRM'}; }
    const RV=c.revenue||{rev:[],paid_consults:[]};
    if(r.special==='rpc') return {series:RV.rev.map((rv,i)=>{const pc=RV.paid_consults[i];return pc?rv/pc:null;}),lvl:'clinic',src:'derived'};
    if(r.special==='rev_per_day') return {series:RV.rev.map((rv,i)=>{const ad=S.active_days[i];return ad?rv/ad:null;}),lvl:'clinic',src:'derived'};
    if(r.special==='roas'){ const p=cityPaid(); return {series:RV.rev.map((rv,i)=>{const sp=p?(p.spend[i]||0)*(c.alloc_w[i]||0):0;return sp?rv/sp:null;}),lvl:'city',src:'derived',allocated:true}; }
  }
  if(r.lvl==='city'){
    const p=cityPaid(); if(!p) return {series:Array(12).fill(null),lvl:'city',src:r.src};
    let series=(p[r.paid]||[]).slice();
    let allocated=false;
    if(ALLOC==='alloc' && r.allocable){ series=series.map((v,i)=>v==null?null:Math.round(v*(c.alloc_w[i]||0))); allocated=true; }
    return {series,lvl:'city',src:r.src,allocated};
  }
  // clinic plain key
  return {series:get(c,r.key)||Array(12).fill(null),lvl:'clinic',src:r.src};
}

function render(){
  const c=CL,w=WK; $('sub').textContent=`${c.city.replace('|',' · ')} · ${CL._clinic} · week ${wkRange(DATA._meta.weeks[w])} · clinic-attributed where possible`;
  // scorecard
  const b2d=c.booking.bookings[w]?c.done.done[w]/c.booking.bookings[w]*100:null;
  const intr=c.discovery.impressions[w]?c.engagement.interactions[w]/c.discovery.impressions[w]*100:null;
  const sc=[
    ['GMB actions',N(c.engagement.interactions[w]),'calls+dir+web',c.engagement.interactions,'#0d9488'],
    ['GMB calls (leads)',N(c.lead.gmb_organic_calls[w]),'GMB',c.lead.gmb_organic_calls,'#34A853'],
    ['Bookings',N(c.booking.bookings[w]),'BOOKING',c.booking.bookings,'#E65C00'],
    ['Show-up %',P(b2d),'done÷booked',c.done.done.map((d,i)=>c.booking.bookings[i]?d/c.booking.bookings[i]*100:null),'#2E7D5B'],
    ['Done',N(c.done.done[w]),'BOOKING',c.done.done,'#1F4A5C'],
    ['Revenue',R((c.revenue||{rev:[]}).rev[w]),'paid invoices',(c.revenue||{rev:[]}).rev,'#2E7D5B'],
    ['Bk / active day',N(c.velocity.bk_per_day[w]),'velocity',c.velocity.bk_per_day,'#B5722A'],
  ];
  $('score').innerHTML=sc.map(([l,v,d,arr,col])=>`<div class="scard"><div class="sl">${l}</div><div class="sv">${v}</div><div class="sd" style="color:var(--muted)">${d}${spark(arr.slice(0,8).reverse(),52,16,col)}</div></div>`).join('');
  // stages
  TRENDS=[];                                            // reset zoom registry for this render
  const WC=[w,w+1,w+2], wks=DATA._meta.weeks;           // current week + 2 prior, for side-by-side compare
  const whdr=(wi,lab)=>wi<wks.length?`<th class="${wi===w?'cur':''}">${lab}<span class="wr">${wkRange(wks[wi])}</span></th>`:'<th>—</th>';
  // pill block for a category-style row at a given week index
  const catBlock=(order,getv,fmtb,wi)=>{ const tot=order.reduce((a,k)=>a+(getv(k,wi)||0),0)||1;
    const cells=order.filter(k=>getv(k,wi)>0); if(!cells.length)return '<span class="val na">—</span>';
    return '<div class="cat-block" style="flex-direction:column;align-items:flex-end;gap:2px">'+cells.map(k=>`<span class="cat-pill">${k} <b>${fmtb(getv(k,wi))}</b> · ${Math.round(getv(k,wi)/tot*100)}%</span>`).join('')+'</div>'; };
  let html='';
  STAGES.forEach(st=>{
    html+=`<div class="tbl-wrap"><table><tr class="stage-hdr"><td colspan="7" style="background:${STAGE_COLORS[st.n]}">Stage ${st.n} — ${st.t} &nbsp;·&nbsp; ${st.q}</td></tr>`;
    html+=`<tr class="col-hdr"><th style="width:38%">Metric</th>${whdr(w,'This week')}${whdr(w+1,'−1 wk')}${whdr(w+2,'−2 wk')}<th>Trend (8w) · click to zoom</th><th>Level</th><th>Source</th></tr>`;
    st.rows.forEach(r=>{
      const rv=rowValueSeries(r);
      let valTds, badge, badgeCls, srcCell, trendCell='';
      if(rv.setup){ valTds='<td colspan="3"><span class="val na">needs setup</span></td>'; badge='NEEDS SETUP'; badgeCls='b-setup'; srcCell=''; }
      else if(rv.catmix||rv.revcat||rv.ailcat){
        let order,getv,fmtb;
        if(rv.catmix){ const cm=c.booking.catmix; order=['STI','ED+','PE+','ED+PE+','NSSD','oth']; getv=(k,wi)=>cm[k][wi]||0; fmtb=x=>x; srcCell=`<span class="src CRM">CRM</span>`; }
        else if(rv.revcat){ const bc=(c.revenue||{}).by_cat||{}; order=['STI','ED+','PE+','ED+PE+','NSSD','oth']; getv=(k,wi)=>(bc[k]||[])[wi]||0; fmtb=R; srcCell=`<span class="src BOOKING">BK</span>`; }
        else { const bc=(c.lead||{}).ai_lead_by_cat||{}; order=['STI','SH','MH','Other']; getv=(k,wi)=>(bc[k]||[])[wi]||0; fmtb=x=>x; srcCell=`<span class="src CRM">CRM</span>`; }
        valTds=WC.map(wi=>`<td class="${wi===w?'':'prevw'}">${wi<wks.length?catBlock(order,getv,fmtb,wi):'<span class="val na">—</span>'}</td>`).join('');
        badge='CLINIC ✓'; badgeCls='b-clinic';
      } else {
        const s=rv.series;
        valTds=WC.map(wi=>{const cur=s[wi]; const d=r.noTrend?'':deltaHTML(cur,s[wi+1],false);
          return `<td class="${wi===w?'':'prevw'}"><span class="val ${cur==null?'na':''}">${cur==null?'—':fmtVal(cur,r.fmt)}</span>${wi<wks.length?d:''}</td>`;}).join('');
        trendCell=r.noTrend?'':clickSpark(s, rv.lvl==='city'?'#4285F4':'#1F6F5C', r.m, r.fmt);
        if(rv.lvl==='city'){ badge=rv.allocated?'CITY · alloc':'CITY'; badgeCls='b-city'; }
        else { badge='CLINIC ✓'; badgeCls='b-clinic'; }
        srcCell=rv.src?`<span class="src ${rv.src}">${rv.src==='GADS'?'GADS':rv.src==='BOOKING'?'BK':rv.src}</span>`:'';
      }
      html+=`<tr class="mrow${r.star?' key':''}"><td><div class="m-name">${r.star?'<span class="star">★</span>':''}${r.m}</div>${r.desc?`<div class="m-desc">${r.desc}</div>`:''}</td>`+
            `${valTds}<td>${trendCell}</td><td><span class="leg-badge ${badgeCls}">${badge}</span></td><td>${srcCell}</td></tr>`;
    });
    html+='</table></div>';
  });
  html+=`<div class="note">Google Ads is a <b>city-targeted</b> channel (one geo per campaign, leads matched by city-level <code>utm_campaign</code>), so its paid metrics can't be measured per clinic. The <b>City-level / Allocate</b> toggle shows them either shared across the city or split by each clinic's booking share (alloc · modelled, not measured). Everything badged <b>CLINIC ✓</b> is measured at this clinic. Stage 8 revenue is a follow-up (per-clinic billing pull).</div>`;
  $('stages').innerHTML=html;
}

function boot(){
  fetch('data_clinic_funnel.json?v='+Date.now()).then(r=>r.json()).then(j=>{
    DATA=j; const cs=$('clinicSel');
    const byCity={}; Object.keys(j.clinics).forEach(k=>{const c=k.split('|')[0];(byCity[c]=byCity[c]||[]).push(k);});
    cs.innerHTML=Object.keys(byCity).sort().map(city=>`<optgroup label="${city}">`+byCity[city].sort().map(k=>`<option value="${k}">${k.split('|')[1]}</option>`).join('')+'</optgroup>').join('');
    $('weekSel').innerHTML=j._meta.weeks.map((w,i)=>`<option value="${i}">${wkRange(w)}${i===0?' (latest)':''}</option>`).join('');
    // default to the most-active clinic (latest-week bookings + GMB impressions), not the alphabetical first —
    // some clinics (e.g. Ahmedabad·Paldi) have no GMB data and look "empty" on open.
    const score=k=>{const c=j.clinics[k]||{};const bk=(c.booking&&c.booking.bookings&&c.booking.bookings[0])||0;const im=(c.discovery&&c.discovery.impressions&&c.discovery.impressions[0])||0;return bk*100+im;};
    const first=Object.keys(j.clinics).sort((a,b)=>score(b)-score(a))[0]; cs.value=first; select(first);
    cs.onchange=e=>select(e.target.value);
    $('weekSel').onchange=e=>{WK=+e.target.value;render();};
    $('allocSeg').onclick=e=>{if(!e.target.dataset.a)return;ALLOC=e.target.dataset.a;[...$('allocSeg').children].forEach(b=>b.classList.toggle('on',b.dataset.a===ALLOC));render();};
    $('stages').addEventListener('click',e=>{const sc=e.target.closest('.sparkclick'); if(sc)zoomTrend(+sc.dataset.ti);});
    $('zoomX').onclick=closeZoom;
    $('zoomOv').onclick=e=>{if(e.target===$('zoomOv'))closeZoom();};
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom();});
  }).catch(e=>{$('sub').textContent='Failed to load data_clinic_funnel.json — run scripts/build_clinic_funnel.py';console.error(e);});
}
function select(key){ CL=DATA.clinics[key]; CL._clinic=key.split('|')[1]; render(); }
boot();
</script>
</body></html>
