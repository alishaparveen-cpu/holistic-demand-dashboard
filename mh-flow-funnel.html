<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MH Clinic — Lead→Book Funnel (WoW)</title>
<style>
  :root{--bg:#f8fafc;--card:#ffffff;--card2:#f1f5f9;--line:#e2e8f0;--ink:#0f172a;--mut:#64748b;
    --gmb:#3b82f6;--google:#16a34a;--organic:#ea9b16;--practo:#7c3aed;--meta:#db2777;--wa:#16a34a;--other:#64748b;
    --good:#16a34a;--warn:#d97706;--hl:#eef2ff;--sh:#db2777;--sti:#dc2626;--mh:#7c3aed;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1200px;margin:0 auto;padding:24px 18px 80px}
  h1{font-size:20px;margin:0 0 10px}
  .ctrls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  select{background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600}
  .lab2{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-left:4px}
  .sub{color:var(--mut);font-size:12px;margin-bottom:16px}
  .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:18px;overflow-x:auto;box-shadow:0 1px 2px rgba(15,23,42,.04)}
  .boxhd{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .step{width:24px;height:24px;border-radius:7px;background:var(--card2);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .boxhd h2{font-size:15px;margin:0;font-weight:650} .boxhd .meta{color:var(--mut);font-size:11.5px;margin-left:auto}
  table.f{border-collapse:collapse;font-size:12.5px;width:100%;min-width:760px}
  table.f th,table.f td{padding:5px 9px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  table.f th.lab,table.f td.lab{text-align:left;position:sticky;left:0;background:var(--card);z-index:1;min-width:200px}
  table.f thead th{color:var(--mut);font-weight:600;font-size:11px;border-bottom:1px solid var(--line)}
  table.f thead th.last,table.f td.last{background:var(--hl)}
  table.f tr.tot td{border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-weight:700}
  table.f tr.tot td.lab{background:var(--card)}
  table.f tr.section td{background:#f1f5f9;font-weight:700;border-top:1px solid var(--line)}
  table.f tr.section.s-good td.lab{border-left:3px solid var(--good)}
  table.f tr.section.s-warn td.lab{border-left:3px solid var(--warn)}
  table.f tr.section.s-mut td.lab{border-left:3px solid var(--other)}
  table.f tr.section.s-ret td.lab{border-left:3px solid var(--practo)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:middle}
  .sub2{color:var(--mut)} .arrow{padding-left:22px!important;font-weight:500} .good{color:var(--good)} .mut{color:var(--mut)} .warn{color:var(--warn)} .zero{color:#cbd5e1}
  .num{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--mut)}
  .tag{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--card2);color:var(--mut);margin-left:6px;text-transform:uppercase}
  .callout{background:var(--card2);border-left:3px solid var(--warn);border-radius:6px;padding:9px 12px;margin-top:12px;font-size:12px}
  .tgl{background:var(--card2);color:var(--gmb);border:1px solid var(--line);border-radius:7px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:10px}
  .err{color:#f25f5f;padding:30px;text-align:center}
  .catpill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;margin-left:8px}
</style>
</head>
<body>
<div class="wrap">
  <h1>MH Clinic — Lead → Book Funnel <span class="lab2">WoW · new-acquisition</span></h1>
  <div class="ctrls">
    <span class="lab2">Clinic</span><select id="clinic"></select>
    <span class="lab2">Weeks</span><select id="weeks"><option value="recent">Recent 10</option><option value="all">All (14)</option></select>
    <span class="lab2">View</span><select id="view">
      <option value="all">All sources</option>
      <optgroup label="Call leads">
        <option value="call:all">All call leads</option>
        <option value="call:SH">— SH</option>
        <option value="call:STI">— STI</option>
        <option value="call:MH">— MH</option>
        <option value="call:Other">— Other</option>
      </optgroup>
      <optgroup label="Web leads">
        <option value="web:all">All web leads</option>
      </optgroup>
    </select>
    <label class="lab2" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px"><input type="checkbox" id="clubgg" checked> Club GMB+Google</label>
    <span id="nums" class="sub2"></span>
  </div>
  <div class="sub" id="note">Loading…</div>
  <div id="root"></div>
</div>
<script>
const COL={'GMB':'var(--gmb)','Google':'var(--google)','Organic':'var(--organic)','Practo':'var(--practo)','Meta':'var(--meta)','WhatsApp':'var(--wa)'};
const CATCOL={'SH':'var(--sh)','STI':'var(--sti)','MH':'var(--mh)','Other':'var(--other)'};
function colorOf(s){for(const k in COL)if(s.indexOf(k)>=0)return COL[k];return 'var(--other)';}
function pct(a,b){return b?Math.round(100*a/b):0;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function sum(a){return (a||[]).reduce((x,y)=>x+(y||0),0);}
let CLUBGG=true;   // club GMB+Google together by default (expand the breakdown to separate)
function getGroups(){
  const tail=[{ch:'Organic',m:['Organic call','Organic web · clinic','Organic web · blog','Organic web · sexologist','Organic web · STI-test','Organic web · doctors','Organic web · home','Organic web · other','WhatsApp']},{ch:'Practo',m:['Practo']},{ch:'Meta',m:['Meta']},{ch:'Direct',m:['Direct / no-utm']},{ch:'Walk-in',m:['Walk-in (no lead)']},{ch:'Undetermined · booked',m:['Undetermined · booked']}];
  if(CLUBGG) return [{ch:'GMB + Google',m:['GMB call','GMB web','Google call','Google web']}].concat(tail);
  return [{ch:'GMB',m:['GMB call','GMB web']},{ch:'Google',m:['Google call','Google web']}].concat(tail);
}
let CALLNUM={};
function isConvOnly(m){return m==='Meta'||m==='Google web'||m==='WhatsApp'||m.indexOf('Organic web')===0;}
let SELINT=null;   // selected AI intents (default = clinic's intent_order = book-intent set)
function toggleIntent(it){if(!SELINT)return;if(SELINT.has(it))SELINT.delete(it);else SELINT.add(it);render();}
let WSTART=0;                       // first visible week index (week-range option)
function sl(a){return (a||[]).slice(WSTART);}
function cells(arr,cls){arr=sl(arr);let h='';const L=arr.length;arr.forEach((v,i)=>{const last=i===L-1?' last':'';h+='<td class="'+(cls||'')+last+'">'+(v?v:'<span class="zero">·</span>')+'</td>';});return h;}
function groupRows(by){let h='';getGroups().forEach(g=>{const mem=g.m.filter(m=>by[m]&&sum(by[m])>0);if(!mem.length)return;
  const par=by[mem[0]].map((_,i)=>sum(mem.map(m=>by[m][i])));const multi=mem.length>1;
  const undet=g.ch.indexOf('ndetermined')>=0;
  const tagh=undet?' <span class="tag" title="AI audit could not determine call intent, but the caller booked — counted as a lead (proven demand)">AI-audit · couldn’t determine, booked</span>':'';
  h+='<tr class="src"><td class="lab"><span class="dot" style="background:'+(undet?'var(--warn)':colorOf(g.ch))+'"></span><b>'+esc(g.ch)+'</b>'+tagh+(multi?' <span class="sub2" style="font-weight:400">('+mem.length+')</span>':'')+'</td>'+cells(par)+'</tr>';
  if(multi)mem.forEach(m=>{let lb='↳ '+esc(m);if(CALLNUM[m])lb+=' <span class="num">#'+esc(CALLNUM[m])+'</span>';if(isConvOnly(m))lb+=' <span class="tag">conv-only</span>';
    h+='<tr class="det" style="display:none"><td class="lab" style="padding-left:30px">'+lb+'</td>'+cells(by[m],'sub2')+'</tr>';});});return h;}
function toggleDet(btn){const box=btn.closest('.box');const r=box.querySelectorAll('tr.det');if(!r.length)return;const o=r[0].style.display!=='none';r.forEach(x=>x.style.display=o?'none':'');btn.textContent=o?btn.dataset.show:btn.dataset.hide;}
function lrRound(p,t){if(!t)return p.map(()=>0);const raw=p.map(x=>100*x/t),fl=raw.map(Math.floor);let rem=100-fl.reduce((a,b)=>a+b,0);const o=raw.map((r,i)=>[r-fl[i],i]).sort((a,b)=>b[0]-a[0]);for(let k=0;k<rem&&k<o.length;k++)fl[o[k][1]]++;return fl;}
function lrP(series,t){const nw=t.length,out=series.map(()=>new Array(nw).fill(0));for(let i=0;i<nw;i++){const r=lrRound(series.map(s=>s[i]),t[i]);r.forEach((p,k)=>out[k][i]=p);}return out;}
function pgc(arr,pa){arr=sl(arr);pa=sl(pa);let h='';const L=arr.length;arr.forEach((v,i)=>{const last=i===L-1?' last':'';h+='<td class="sub2'+last+'">'+(v?'<div>'+v+'</div><div class="mut" style="font-size:9.5px;line-height:1.05">'+pa[i]+'%</div>':'<span class="zero">·</span>')+'</td>';});return h;}
function thead(labels){labels=sl(labels);let h='<thead><tr><th class="lab"></th>';labels.forEach((l,i)=>{h+='<th class="'+(i===labels.length-1?'last':'')+'">'+esc(l)+'</th>';});return h+'</tr></thead>';}

let D=null;
fetch('data_clinic_funnels.json?_='+Date.now()).then(r=>r.json()).then(d=>{D=d;
  const sel=document.getElementById('clinic');
  Object.keys(d.clinics).forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=d.clinics[s].disp;sel.appendChild(o);});
  sel.onchange=render; document.getElementById('view').onchange=render; document.getElementById('weeks').onchange=render;
  document.getElementById('clubgg').onchange=()=>{CLUBGG=document.getElementById('clubgg').checked;render();}; render();
}).catch(e=>{document.getElementById('root').innerHTML='<div class="err">No data — run build_clinic_funnels.py<br><small>'+esc(e)+'</small></div>';document.getElementById('note').textContent='';});

function render(){
  const slug=document.getElementById('clinic').value, view=document.getElementById('view').value;
  const c=D.clinics[slug]; if(!c)return;
  const NWk=D.week_labels.length, dv=D.default_view_weeks||10;
  WSTART=(document.getElementById('weeks').value==='all')?0:Math.max(0,NWk-dv);
  const CALLSRC=['GMB call','Google call','Organic call'];
  const WEBSRC2=['Practo','Meta','Google web','GMB web','Organic web · clinic','Organic web · blog','Organic web · sexologist','Organic web · STI-test','Organic web · doctors','Organic web · home','Organic web · other','WhatsApp','Direct / no-utm','Walk-in (no lead)'];
  CALLNUM={'GMB call':(c.numbers['GMB call']||'').split(',')[0],'Google call':c.numbers['Google call'],'Organic call':(c.numbers['Organic call']||'').split(',')[0]};
  const W=D.week_labels,L=c.leads,B=c.bookings,F=B.flow;
  document.getElementById('nums').innerHTML='GMB #'+esc(c.numbers['GMB call'])+' · Google #'+esc(c.numbers['Google call'])+' · Organic #'+esc(c.numbers['Organic call'])+(c.google_shared?' <span class="tag">google # shared→locality-split</span>':'');
  document.getElementById('note').innerHTML='Unique-patient new-acquisition funnel. Only <code>lead_to_call</code> calls attribute (b2p excluded). Web/ad channels converted-only (dated at lead creation). Returning shown at booking level (④). <b>Category filter applies to call leads</b> (SH/STI/MH/Other, AI call audit).';
  let html='';
  const mode = view==='all'?'all':(view.startsWith('web')?'web':'call');     // all | call | web
  const cat = view.startsWith('call:')?view.split(':')[1]:'all';             // all | SH | STI | MH | Other
  let title='all sources by channel';
  if(mode==='call') title=(cat==='all'?'all call leads':('<span class="catpill" style="background:'+CATCOL[cat]+'22;color:'+CATCOL[cat]+'">'+cat+'</span> call leads'));
  if(mode==='web') title='all web leads';
  html+='<div class="box"><div class="boxhd"><span class="step">③</span><h2>Leads — '+title+'</h2><span class="meta">new-acquisition · unique patient</span></div>';
  function flatRows(srcGet, srcs, keepZero){ let h='<table class="f">'+thead(W)+'<tbody>'; let tot=Array(W.length).fill(0);
    srcs.forEach(s=>{const a=srcGet(s)||Array(W.length).fill(0);if(!keepZero&&sum(a)===0)return;
      h+='<tr class="src"><td class="lab"><span class="dot" style="background:'+colorOf(s)+'"></span>'+esc(s)+(CALLNUM[s]?' <span class="num">#'+esc(CALLNUM[s])+'</span>':'')+'</td>'+cells(a)+'</tr>';tot=tot.map((x,i)=>x+(a[i]||0));});
    return {h,tot}; }
  function whyNoBook(){ const wkr=L.nobook_reasons_weekly; if(!wkr||!Object.keys(wkr).length)return '';
    let h='<details style="margin-top:10px"><summary style="cursor:pointer;color:var(--gmb);font-size:12px;font-weight:600">▸ Why didn\'t they book? — agent disposition, weekly ('+L.nobook_total+' leads total)</summary>';
    h+='<table class="f" style="margin-top:6px">'+thead(W)+'<tbody>';
    (L.nobook_reasons||[]).forEach(rn=>{const r=rn[0];h+='<tr class="src"><td class="lab">'+esc(r)+'</td>'+cells(wkr[r]||[])+'</tr>';});
    h+='<tr class="tot"><td class="lab">Total didn\'t book</td>'+cells(L.not_booked)+'</tr>';
    h+='</tbody></table><div class="sub2" style="margin-top:4px">latest lead_to_call agent disposition × week, for new leads that didn\'t book</div></details>'; return h; }
  if(mode==='all'){
    html+='<button class="tgl" data-show="▸ Show call / web breakdown (with numbers)" data-hide="▾ Hide breakdown" onclick="toggleDet(this)">▸ Show call / web breakdown (with numbers)</button>';
    html+='<table class="f">'+thead(W)+'<tbody>'+groupRows(L.by_source);
    html+='<tr class="tot"><td class="lab">Total leads <span class="sub2" style="font-weight:400">(incl Practo + web)</span></td>'+cells(L.total)+'</tr>';
    const lp=lrP([L.booked_same,L.booked_later,L.not_booked],L.total);
    html+='<tr><td class="lab arrow good">↳ booked same week</td>'+pgc(L.booked_same,lp[0])+'</tr>';
    html+='<tr><td class="lab arrow warn">↳ booked later</td>'+pgc(L.booked_later,lp[1])+'</tr>';
    html+='<tr><td class="lab arrow mut">↳ didn\'t book</td>'+pgc(L.not_booked,lp[2])+'</tr>';
    html+='</tbody></table>';
    html+=whyNoBook();
    const cm=D.cats.map(ct=>{const a=Object.values(L.callcat[ct]||{}).reduce((s,b)=>s.map((x,i)=>x+b[i]),Array(W.length).fill(0));return ct+' '+sum(a);}).join(' · ');
    html+='<div class="callout">Call-category mix (calls only): <b>'+cm+'</b>. Use the <b>View</b> dropdown to drill: All call leads → SH/STI/MH/Other. Web/ad channels are converted-only; "didn\'t book" reflects tracked leads.</div>';
  } else if(mode==='call' && cat==='all'){
    // ===== ALL CALL LEADS: intent control + (no-dedup, = colleague) + bucketed-elsewhere =====
    const ci=L.call_intent||{}, order=L.intent_order||[];
    const present=[]; Object.values(ci).forEach(m=>Object.keys(m).forEach(it=>{if(!present.includes(it))present.push(it);}));
    const ordered=order.filter(it=>present.includes(it)).concat(present.filter(it=>!order.includes(it)));
    if(!SELINT) SELINT=new Set(order);
    html+='<div class="legend" style="margin-bottom:8px"><b>AI intent included</b> (default = book-intent set · strength≠NOT_A_PATIENT always required): ';
    ordered.forEach(it=>{const on=SELINT.has(it);html+='<label style="margin-right:12px;cursor:pointer;'+(on?'':'opacity:.45')+'"><input type="checkbox" '+(on?'checked':'')+' onclick="toggleIntent(\''+it+'\')"> '+esc(it)+'</label>';});
    html+='</div>';
    html+='<table class="f">'+thead(W)+'<tbody>'; let gtot=Array(W.length).fill(0);
    ['GMB','Google','Organic'].forEach(chn=>{const m=ci[chn]; if(!m)return;
      const arr=Array(W.length).fill(0);
      Object.keys(m).forEach(it=>{if(SELINT.has(it))m[it].forEach((v,i)=>arr[i]+=(v||0));});
      if(sum(arr)===0)return; const src=chn+' call';
      html+='<tr class="src"><td class="lab"><span class="dot" style="background:'+colorOf(chn)+'"></span>'+esc(src)+(CALLNUM[src]?' <span class="num">#'+esc(CALLNUM[src])+'</span>':'')+'</td>'+cells(arr)+'</tr>';
      const fn=L.by_source[src]||[]; html+='<tr><td class="lab arrow sub2">↳ funnel (deduped, 1 channel/patient) = '+sum(fn)+'</td>'+cells(fn,'sub2')+'</tr>';
      const bk2=(L.bucketed||{})[src];
      if(bk2&&bk2.length){const bt=bk2.reduce((a,b)=>a+b[1],0);const samp=(L.bucketed_sample||{})[src]||[];
        html+='<tr><td class="lab" colspan="'+(W.length+1)+'"><details><summary style="color:var(--gmb);cursor:pointer;font-size:11.5px;padding-left:22px">▸ '+bt+' relevant callers bucketed elsewhere (acquired earlier / other source)</summary>'
          +'<div class="sub2" style="padding:4px 0 4px 22px">'+bk2.map(b=>esc(b[0])+': '+b[1]).join(' · ')+'</div>'
          +'<div class="sub2" style="padding-left:22px;font-family:ui-monospace,Menlo,monospace;font-size:10.5px">'+samp.slice(0,12).map(s=>esc(s[0])+' '+esc(s[1])+' → '+esc(s[2])).join('<br>')+'</div></details></td></tr>';}
      gtot=gtot.map((x,i)=>x+arr[i]);});
    html+='<tr class="tot"><td class="lab">All call leads (selected intents)</td>'+cells(gtot)+'</tr></tbody></table>';
    // ---- breakdown of "Other" (non-book-intent) calls: missed leads? ----
    const ob=L.other_call_breakdown||{};
    if(Object.keys(ob).length){
      const obooked=Object.values(ob).reduce((a,v)=>a+v.booked,0), ototal=Object.values(ob).reduce((a,v)=>a+v.total,0);
      html+='<details style="margin-top:10px"><summary style="cursor:pointer;color:var(--gmb);font-size:12px;font-weight:600">▸ Breakdown of "Other" / non-book-intent calls — '+ototal+' callers, '+obooked+' booked ('+pct(obooked,ototal)+'%) — missed leads?</summary>';
      html+='<table class="f" style="min-width:auto;margin-top:6px"><thead><tr><th class="lab">AI intent</th><th>callers</th><th>booked</th><th>book%</th><th class="lab">top agent dispositions</th></tr></thead><tbody>';
      Object.keys(ob).sort((a,b)=>ob[b].total-ob[a].total).forEach(it=>{const v=ob[it];
        html+='<tr class="src"><td class="lab" style="min-width:auto">'+esc(it)+'</td><td>'+v.total+'</td><td class="good">'+v.booked+'</td><td class="sub2">'+pct(v.booked,v.total)+'%</td><td class="lab sub2" style="min-width:240px;white-space:normal">'+(v.reasons||[]).map(r=>esc(r[0])+' ('+r[1]+')').join(' · ')+'</td></tr>';});
      html+='</tbody></table><div class="sub2" style="margin-top:4px">Callers here who <b>booked</b> are now auto-counted as leads (proven demand the AI relevance filter under-captured). The non-booked rest stay excluded — tick an intent above to include them too. Blank / Spam / Outbound-not-connected = genuine noise.</div></details>';
    }
    html+='<div class="callout"><b>All call leads</b> = unique relevant callers per channel (patient_id required), <b>NOT deduped across channels</b> — matches your colleague\'s per-channel cut. The <b>funnel</b> sub-line is the deduped (one-channel-per-patient) number; expand <b>bucketed elsewhere</b> to see the patient_ids credited to another channel (their earlier touch) or excluded as returning. Toggle the AI intents above to see exactly what the audit includes.</div>';
  } else if(mode==='call'){
    const {h,tot}=flatRows(s=>(L.callcat[cat]||{})[s],CALLSRC,false);
    html+=h+'<tr class="tot"><td class="lab">'+cat+' call leads (total)</td>'+cells(tot)+'</tr></tbody></table>';
    html+='<div class="callout"><b>'+cat+' call leads</b> = unique patients whose relevant call was AI-categorised <b>'+cat+'</b>, on this clinic\'s own numbers.</div>';
  } else { // web
    const {h,tot}=flatRows(s=>L.by_source[s],WEBSRC2);
    html+=h+'<tr class="tot"><td class="lab">All web / marketplace leads (total)</td>'+cells(tot)+'</tr></tbody></table>';
    html+='<div class="callout"><b>Web / marketplace leads</b> (Practo, Meta, Google-web, GMB-web, Organic-web, WhatsApp, Direct). These are <b>converted-only</b> for ad channels (only knowable once they book), dated at lead-creation. No AI call-category here.</div>';
  }
  html+='</div>';
  html+='<div class="box"><div class="boxhd"><span class="step">④</span><h2>Bookings — flow from leads</h2><span class="meta">all categories · this-week → carry-in → direct/walk-in → returning</span></div>';
  html+='<button class="tgl" data-show="▸ Show call / web breakdown" data-hide="▾ Hide breakdown" onclick="toggleDet(this)">▸ Show call / web breakdown</button>';
  html+='<table class="f">'+thead(W)+'<tbody>';
  function sec(t,sub,bk,cls){return '<tr class="section '+cls+'"><td class="lab">'+t+(sub?' <span class="sub2" style="font-weight:400">'+sub+'</span>':'')+'</td>'+cells(bk.total,'sec')+'</tr>'+groupRows(bk.by_source);}
  html+='<tr><td class="lab sub2" style="font-size:11px">NEW ACQUISITIONS</td>'+cells(W.map(()=>''))+'</tr>';
  html+=sec('① From this week\'s leads','',F.thisweek,'s-good');
  html+=sec('② From earlier weeks','carry-in',F.prior,'s-warn');
  html+=sec('③ Direct · walk-in','no attributable lead',F.other,'s-mut');
  html+='<tr class="tot"><td class="lab">New-acquisition bookings</td>'+cells(F.thisweek.total.map((v,i)=>v+F.prior.total[i]+F.other.total[i]))+'</tr>';
  if(F.returning&&sum(F.returning.total)>0){html+='<tr><td class="lab sub2" style="font-size:11px;padding-top:10px">RETURNING (booking-level)</td>'+cells(W.map(()=>''))+'</tr>'+sec('④ Returning patients','repeat SC',F.returning,'s-ret');}
  html+='<tr class="tot"><td class="lab">Total bookings</td>'+cells(B.total)+'</tr>';
  html+='<tr class="tot"><td class="lab good">Done</td>'+pgc(B.done,B.total)+'</tr>';
  html+='</tbody></table>';
  const tb=sum(B.total),tnew=sum(F.thisweek.total)+sum(F.prior.total)+sum(F.other.total),tr=sum(F.returning?F.returning.total:[]),td=sum(B.done);
  html+='<div class="callout">10-wk: <b class="good">'+tnew+' new</b> + <b style="color:var(--practo)">'+tr+' returning</b> = <b>'+tb+'</b> bookings · <b class="good">'+td+'</b> done ('+pct(td,tb)+'%).</div>';
  html+='</div>';
  document.getElementById('root').innerHTML=html;
}
</script>
</body>
</html>
