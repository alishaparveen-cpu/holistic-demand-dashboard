<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demand Review</title>
<script>if(!sessionStorage.getItem('allo_dash_auth'))location.replace('index.html');</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F1F5F9;--card:#fff;--ink:#0F172A;--ink2:#334155;--muted:#64748B;--faint:#94A3B8;--line:#E2E8F0;
  --good:#16A34A;--goodbg:#DCFCE7;--bad:#DC2626;--badbg:#FEE2E2;--barG:#5BB985;--barR:#E2685A;--bargrey:#E9EEF3;
  --blue:#2563EB;--bluebg:#DBEAFE;--amber:#B45309;--amberbg:#FEF3C7;--vio:#7C3AED}
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);margin:0;font-size:13px;line-height:1.45}
.wrap{max-width:1180px;margin:0 auto;padding:16px 22px 80px}
a{color:inherit;text-decoration:none}
.nav{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 22px;display:flex;align-items:center;gap:18px;margin-bottom:18px}
.nav a{font-size:13px;color:var(--muted);font-weight:500}.nav a:hover{color:var(--ink)}
.nav .sep{color:var(--line)}
.nav .right{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav .right label{font-size:11px;letter-spacing:.08em;color:var(--faint);font-weight:700}
select{font-family:inherit;font-size:13px;font-weight:700;padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
h1{font-size:27px;font-weight:800;margin:4px 0 3px}
.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.tabs{display:inline-flex;gap:4px;background:#E7EDF3;border-radius:11px;padding:4px;margin:2px 0 16px}
.tabs button{border:none;background:transparent;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit}
.tabs button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
@media(max-width:840px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.kpi .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:700}
.kpi .v{font-size:34px;font-weight:800;line-height:1;margin:8px 0 9px}
.kpi .v.g{color:var(--good)}.kpi .v.r{color:var(--bad)}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;margin-right:5px}
.p-up{background:var(--goodbg);color:var(--good)}.p-dn{background:var(--badbg);color:var(--bad)}.p-flat{background:#EEF2F6;color:var(--muted)}
.p-star{background:var(--bluebg);color:var(--blue)}.p-amb{background:var(--amberbg);color:var(--amber)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
.card-h{display:flex;align-items:center;gap:10px;padding:15px 18px;cursor:pointer}
.card-h h3{font-size:15px;font-weight:700;margin:0}.card-h .hint{font-size:11.5px;color:var(--faint);font-weight:500}
.card-h .chev{margin-left:auto;color:var(--faint);transition:.2s}.card.closed .chev{transform:rotate(-90deg)}
.card-b{padding:0 18px 18px}.card.closed .card-b{display:none}
.toggle{display:inline-flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px;margin:0 0 14px auto}
.toprow{display:flex;align-items:center}
.toggle button{border:none;background:transparent;padding:6px 15px;border-radius:16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit}
.toggle button.on{background:var(--ink);color:#fff}
.tg-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:700;margin:14px 0 8px}
.brow{display:grid;grid-template-columns:130px 54px 1fr;align-items:center;gap:12px;padding:5px 0}
.brow .nm{font-size:13px;font-weight:600}.brow .nm .t{font-size:9px;font-weight:700;color:var(--faint);margin-left:5px}
.brow .pc{font-size:13px;font-weight:800;text-align:right}.brow .pc.g{color:var(--good)}.brow .pc.r{color:var(--bad)}.brow .pc.f{color:var(--muted)}
.track{height:13px;background:var(--bargrey);border-radius:7px;position:relative;overflow:hidden}
.fill{position:absolute;top:0;bottom:0;border-radius:7px}.fill.g{background:var(--barG)}.fill.r{background:var(--barR)}
.split{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px}
.mini .mt{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:700;margin-bottom:10px}
.mrow{display:grid;grid-template-columns:96px 1fr 48px;align-items:center;gap:9px;padding:4px 0;font-size:12px}
.mrow .ml{color:var(--ink2);font-weight:500}.mrow .mv{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.mtrack{height:9px;background:var(--bargrey);border-radius:5px;overflow:hidden}.mtrack i{display:block;height:100%;border-radius:5px}
.narr{background:#fff;border:1px solid var(--line);border-left:4px solid var(--good);border-radius:14px;padding:16px 20px;margin-bottom:16px;font-size:13.5px;line-height:1.65}
.narr h3{font-size:15px;margin:0 0 8px;font-weight:800}
.narr p{margin:7px 0}.narr b{font-weight:700}.narr .g{color:var(--good);font-weight:700}.narr .r{color:var(--bad);font-weight:700}
.spark{display:flex;align-items:flex-end;gap:3px;height:46px;margin-top:6px}
.spark i{flex:1;background:var(--bargrey);border-radius:2px 2px 0 0;min-height:2px}.spark i.cur{background:var(--barG)}
.note{background:#F8FAFC;border:1px dashed var(--line);border-radius:10px;padding:10px 14px;font-size:11.5px;color:var(--muted);margin-top:14px}
</style></head>
<body><div class="wrap">
  <div class="nav"><a href="index.html">← Dashboard</a><span class="sep">|</span>
    <a href="category.html">Category</a><a href="city.html">City</a><a href="campaigns.html">Channel</a>
    <span class="right"><label>WEEK</label><select id="wsel"></select></span></div>
  <h1>Demand Review</h1>
  <div class="sub" id="sub">vs 6-week average</div>
  <div class="tabs" id="tabs">
    <button data-m="bookings" class="on">New Bookings</button>
    <button data-m="leads">Leads</button>
    <button data-m="done">Consults Done</button></div>
  <div id="app"></div>
  <div class="note" id="srcnote"></div>
</div>
<script>
let D=null,w=0,metric='bookings',tier='all',closed={};
const $=id=>document.getElementById(id);
const N=v=>v==null?'—':Math.round(v).toLocaleString('en-IN');
const wkLabel=ws=>{const d=new Date(ws);const e=new Date(d);e.setDate(d.getDate()+6);const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+'–'+e.getDate()+' '+M[e.getMonth()]+' '+e.getFullYear();};
const avg6=a=>{const s=(a||[]).slice(w+1,w+7).filter(x=>x!=null);return s.length?s.reduce((p,c)=>p+c,0)/s.length:null;};
const pct=(a,b)=>(a!=null&&b)?((a-b)/b*100):null;
const CCOL={Google:'#16A34A',GMB:'#2563EB',Organic:'#7C3AED',Meta:'#B45309',Practo:'#9333EA',JustDial:'#94A3B8',Other:'#94A3B8',STI:'#B45309',SH:'#16A34A',Other2:'#94A3B8'};
const pillP=(p,suffix)=>{if(p==null)return `<span class="pill p-flat">—</span>`;const c=p>=2?'p-up':p<=-2?'p-dn':'p-flat',a=p>=2?'▲':p<=-2?'▼':'■';return `<span class="pill ${c}">${a} ${p>=0?'+':''}${p.toFixed(0)}% ${suffix}</span>`;};
const T1=()=>D._meta.t1;

function spark(arr){const v=arr.slice(0,8).reverse();const mx=Math.max(1,...v);
  return '<div class="spark">'+v.map((x,i)=>`<i class="${i===7-w?'cur':''}" style="height:${Math.max(2,Math.round((x||0)/mx*46))}px" title="${N(x)}"></i>`).join('')+'</div>';}

function cityBars(M){
  const rows=Object.keys(M.city).map(c=>{const a=avg6(M.city[c]);return {c,t:M.city[c][w]||0,a,p:pct(M.city[c][w],a),tier:T1().includes(c)?'T1':'T2'};})
    .filter(x=>x.a&&x.a>=2);
  const mx=Math.max(20,...rows.map(x=>Math.abs(x.p||0)));
  const grp=t=>rows.filter(x=>x.tier===t&&(tier==='all'||tier===t)).sort((a,b)=>(b.p||-999)-(a.p||-999));
  const render=t=>grp(t).map(x=>{const cls=x.p>=2?'g':x.p<=-2?'r':'f';const wd=Math.min(100,Math.abs(x.p||0)/mx*100);
    return `<div class="brow"><span class="nm">${x.c}<span class="t">${x.tier}</span></span>
      <span class="pc ${cls}">${x.p==null?'—':(x.p>=0?'+':'')+x.p.toFixed(0)+'%'}</span>
      <span class="track"><span class="fill ${x.p>=0?'g':'r'}" style="width:${wd}%"></span></span></div>`;}).join('');
  let h='';
  if(tier!=='T2'){h+=`<div class="tg-lbl">Tier 1</div>${render('T1')||'<div class="mrow">—</div>'}`;}
  if(tier!=='T1'){h+=`<div class="tg-lbl">Tier 2</div>${render('T2')||''}`;}
  return h;
}
function miniBar(title,obj,keys,colorFn){
  const vals=keys.map(k=>({k,v:(obj[k]&&obj[k][w])||0})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const mx=Math.max(1,...vals.map(x=>x.v));
  return `<div class="mini"><div class="mt">${title}</div>`+vals.map(x=>
    `<div class="mrow"><span class="ml">${x.k}</span><span class="mtrack"><i style="width:${Math.round(x.v/mx*100)}%;background:${colorFn(x.k)}"></i></span><span class="mv">${N(x.v)}</span></div>`).join('')+'</div>';
}

function kpis(){
  const B=D.bookings,L=D.leads,Dn=D.done;
  const bp=pct(B.total[w],avg6(B.total)), lp=pct(L.total[w],avg6(L.total));
  const cd=Object.keys(B.city).map(c=>({p:pct(B.city[c][w],avg6(B.city[c])),a:avg6(B.city[c])})).filter(x=>x.a&&x.a>=3&&x.p!=null);
  const grow=cd.filter(x=>x.p>=5).length, drop=cd.filter(x=>x.p<=-5).length;
  const leadMax=L.total[w]===Math.max(...L.total.slice(0,8));
  return `<div class="kpis">
   <div class="kpi"><div class="k">New bookings</div><div class="v">${N(B.total[w])}</div><div>${pillP(pct(B.total[w],B.total[w+1]),'WoW')}${pillP(bp,'vs 6wk')}</div></div>
   <div class="kpi"><div class="k">Leads</div><div class="v">${N(L.total[w])}</div><div>${pillP(lp,'vs 6wk')}${L.total[w]>=6000?'<span class="pill p-star">★ '+(leadMax?'highest, ':'')+'6k+</span>':''}</div></div>
   <div class="kpi"><div class="k">Cities growing</div><div class="v g">${grow}</div><div><span class="pill p-flat">of ${cd.length} clinic-cities</span></div></div>
   <div class="kpi"><div class="k">Cities dropping</div><div class="v r">${drop}</div><div><span class="pill p-flat">${drop} below −5%</span></div></div>
  </div>`;
}

// ---- narrative ----
const fmt=arr=>arr.slice(0,6).map(([c,p])=>`${c} <span class="${p>=0?'g':'r'}">${p>=0?'+':''}${p.toFixed(0)}%</span>`).join(', ')||'—';
function movers(M,mn){const up={T1:[],T2:[]},dn={T1:[],T2:[]};Object.keys(M.city).forEach(c=>{const a=avg6(M.city[c]);if(!a||a<3)return;const p=pct(M.city[c][w],a);if(p==null)return;const t=T1().includes(c)?'T1':'T2';if(p>=mn)up[t].push([c,p]);else if(p<=-mn)dn[t].push([c,p]);});for(const k in up){up[k].sort((a,b)=>b[1]-a[1]);dn[k].sort((a,b)=>a[1]-b[1]);}return{up,dn};}
function catNarr(cat){const D2=D.done,tot=D2.cat[cat],t1=D2.tiercat.T1[cat],t2=D2.tiercat.T2[cat];
  const cd=Object.keys(D2.citycat).map(c=>{const ar=D2.citycat[c][cat],a=avg6(ar);return[c,pct(ar[w],a),a];}).filter(x=>x[2]&&x[2]>=2&&x[1]!=null);
  return{p:pct(tot[w],avg6(tot)),pt1:pct(t1[w],avg6(t1)),pt2:pct(t2[w],avg6(t2)),
    ups:cd.filter(x=>x[1]>=15).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>[x[0],x[1]]),
    dns:cd.filter(x=>x[1]<=-15).sort((a,b)=>a[1]-b[1]).slice(0,4).map(x=>[x[0],x[1]])};}
function narrative(){
  const L=D.leads,B=D.bookings,Dn=D.done;
  const sp=p=>`<span class="${p>=0?'g':'r'}">${p>=0?'+':''}${p?p.toFixed(0):0}%</span>`;
  const t1all=T1().map(c=>[c,pct((B.city[c]||[])[w],avg6(B.city[c]||[0]))]).filter(x=>x[1]!=null).sort((a,b)=>b[1]-a[1]);
  const bk=movers(B,10),sti=catNarr('STI'),sh=catNarr('SH');
  const leadMax=L.total[w]===Math.max(...L.total.slice(0,8));
  let h=`<div class="narr"><h3>📈 ${wkLabel(D._meta.weeks[w])} — at a glance</h3>`;
  h+=`<p><b>Leads ${N(L.total[w])}</b> (${sp(pct(L.total[w],L.total[w+1]))} WoW, ${sp(pct(L.total[w],avg6(L.total)))} vs 6-wk avg)${L.total[w]>=6000?' — over 6k'+(leadMax?', highest in 8 weeks':''):''}. <b>New bookings ${N(B.total[w])}</b> (${sp(pct(B.total[w],B.total[w+1]))} WoW, ${sp(pct(B.total[w],avg6(B.total)))} vs avg). <b>Consults done ${N(Dn.total[w])}</b> (${sp(pct(Dn.total[w],Dn.total[w+1]))} WoW).</p>`;
  h+=`<p><b>City bookings vs 6-wk avg.</b> Tier 1: ${fmt(t1all)}. Tier 2 — up: ${fmt(bk.up.T2)}${bk.dn.T2.length?'; down: '+fmt(bk.dn.T2):''}.</p>`;
  h+=`<p><b>Consults done by category vs 6-wk avg.</b> <b>STI</b> ${sp(sti.p)} overall (T1 ${sp(sti.pt1)}, T2 ${sp(sti.pt2)})${sti.ups.length?' — growth in '+fmt(sti.ups):''}. <b>SH</b> ${sp(sh.p)} overall (T1 ${sp(sh.pt1)}, T2 ${sp(sh.pt2)})${sh.dns.length?' — drops in '+fmt(sh.dns):''}.</p></div>`;
  return h;
}

function card(id,title,hint,body){const cl=closed[id]?' closed':'';
  return `<div class="card${cl}" id="card_${id}"><div class="card-h" onclick="closed['${id}']=!closed['${id}'];render()"><h3>${title}</h3><span class="hint">${hint}</span><span class="chev">▾</span></div><div class="card-b">${body}</div></div>`;}

function render(){
  if(!D)return;
  const M=D[metric], mlbl={bookings:'New bookings',leads:'Leads',done:'Consults done'}[metric];
  $('sub').textContent='Week of '+wkLabel(D._meta.weeks[w])+' · network · vs 6-week average';
  [...$('tabs').children].forEach(b=>b.classList.toggle('on',b.dataset.m===metric));
  let h=narrative()+kpis();
  // City bars (signature view)
  h+=card('city',`City ${mlbl} vs 6-wk avg`,'sorted by % change',
    `<div class="toprow"><div class="toggle"><button class="${tier==='all'?'on':''}" onclick="event.stopPropagation();tier='all';render()">All</button><button class="${tier==='T1'?'on':''}" onclick="event.stopPropagation();tier='T1';render()">Tier 1</button><button class="${tier==='T2'?'on':''}" onclick="event.stopPropagation();tier='T2';render()">Tier 2</button></div></div>${cityBars(M)}`);
  // Breakdowns
  const chans=Object.keys(M.channel);
  let mh=`<div class="split">`;
  mh+=miniBar('Channel',M.channel,chans.sort((a,b)=>(M.channel[b][w]||0)-(M.channel[a][w]||0)),k=>CCOL[k]||'#94A3B8');
  mh+=miniBar('Online vs Offline',{Online:M.online,Offline:M.offline},['Offline','Online'],k=>k==='Online'?'#7C3AED':'#16A34A');
  mh+=miniBar('Tier 1 vs Tier 2',{['Tier 1']:M.tier.T1,['Tier 2']:M.tier.T2},['Tier 1','Tier 2'],k=>k==='Tier 1'?'#16A34A':'#2563EB');
  if(metric!=='leads') mh+=miniBar('Category (STI / SH / Other)',M.cat,['STI','SH','Other'],k=>CCOL[k]==='#94A3B8'?'#94A3B8':({STI:'#B45309',SH:'#16A34A',Other:'#94A3B8'}[k]));
  mh+=`</div>`;
  h+=card('brk',`${mlbl} — breakdowns`,'this week',mh);
  // 8-week trend
  h+=card('trend',`${mlbl} — 8-week trend`,'current week highlighted',spark(M.total)+`<div class="mt" style="margin-top:6px;color:var(--faint);font-size:11px">${D._meta.weeks.slice(0,8).reverse().map(ws=>wkLabel(ws).split(' ')[0]).join(' · ')}</div>`);
  $('app').innerHTML=h;
  $('srcnote').innerHTML='<b>Definitions.</b> Leads = main_source_wise_leads (by created week). New bookings = first-ever Screening Calls (excl. reschedules &amp; cancellations). Consults done = completed Screening Calls. Channel (book/done) = originating lead source. Category = consultation diagnosis (STI · SH = ED·PE · Other; no Mental-Health diagnosis tag → MH consults sit in Other). City / Tier = physical clinics; online/telehealth separate. Most leads arrive online/national, so leads city/tier covers clinic-tied leads only.';
}
[...$('tabs').children].forEach(b=>b.onclick=()=>{metric=b.dataset.m;render();});
fetch('data_weekly_review.json?v='+Date.now()).then(r=>r.json()).then(j=>{D=j;
  $('wsel').innerHTML=D._meta.weeks.slice(0,7).map((ws,i)=>`<option value="${i}">${wkLabel(ws)}${i===0?' (latest)':''}</option>`).join('');
  $('wsel').onchange=e=>{w=+e.target.value;render();};render();
}).catch(()=>{$('app').innerHTML='<div class="note">Could not load data_weekly_review.json — run scripts/build_weekly_review.py</div>';});
</script>
</body></html>
