function heatBg(v,mn,mx){if(v==null||isNaN(v)||!isFinite(mn))return'';const rng=(mx-mn)||1,t=(v-mn)/rng;

  if(t<=0.4)return hexA('#B23A2E',0.07+0.18*((0.4-t)/0.4));return'';}

  let cells='';cols.forEach((ci,j)=>{const v=arr[ci],last=j===cols.length-1,bg=heatBg(v,mn,mx);

  return cells;}

}
function spark(arr,color){
  const v=arr.slice().reverse().map(x=>x==null||isNaN(x)?0:x); const n=v.length, mx=Math.max(1,...v);
  const W=150,H=30,pad=2; const x=i=>pad+i*(W-2*pad)/(n-1), y=val=>H-pad-(val/mx)*(H-2*pad);
  let p=''; v.forEach((val,i)=>{p+=(i?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';});
  return `<svg class="sp" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><path d="${p}" fill="none" stroke="${color}" stroke-width="1.6"/><circle cx="${x(n-1).toFixed(1)}" cy="${y(v[n-1]).toFixed(1)}" r="2.6" fill="${color}"/></svg>`;
}
let _M=null;
function zoomReg(i){const z=ZREG[i];if(!z)return;zoomShow(z.label,z.arr,z.fmt,z.color,z.formula);}
function zoomShow(title,sNewestFirst,fmt,color,formula){
  $('mTitle').textContent=title;
  const W=700,H=300,pad=38; const wks=D._meta.weeks.slice(0,NSHOW).reverse();
  const v=sNewestFirst.slice().reverse().map(x=>x==null||isNaN(x)?null:x); const n=v.length;
  const mx=Math.max(1,...v.map(x=>x||0)); const x=i=>pad+i*(W-2*pad)/(n-1),y=val=>H-pad-((val||0)/mx)*(H-2*pad-10);
  let p='',pts='',started=false;
  v.forEach((val,i)=>{if(val==null)return; p+=(started?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';started=true;
    pts+=`<circle cx="${x(i).toFixed(1)}" cy="${y(val).toFixed(1)}" r="3" fill="${color}"><title>${wkShort(wks[i])}: ${fmt(val)}</title></circle>`;});
  let gl='';[0,.5,1].forEach(f=>{const yy=H-pad-(f*(H-2*pad-10));gl+=`<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#EEEBE2"/><text x="4" y="${yy+3}" font-size="10" fill="#999">${fmt(mx*f)}</text>`;});
  let xl='';v.forEach((_,i)=>{if(i%2===0)xl+=`<text x="${x(i)}" y="${H-10}" font-size="9" fill="#999" text-anchor="middle">${wkShort(wks[i])}</text>`;});
  $('mBody').innerHTML=`<div class="lgd" style="margin:0 0 6px">${formula}</div><svg width="100%" viewBox="0 0 ${W} ${H}">${gl}<path d="${p}" fill="none" stroke="${color}" stroke-width="2"/>${pts}${xl}</svg><div class="lgd">6-week trend · hover a point for week &amp; value.</div>`;
  $('modal').classList.add('on');
}
function closeZ(){$('modal').classList.remove('on');}
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeZ();});

// ---- per-clinic reconciliation (selected week) ----
function reconTable(M){
  const i=wk; const clins=(BA&&BA.clinics)?Object.keys(BA.clinics):[];
  const lead=c=>((BA.clinics[c].total||[])[i])||0;
  const bot=(c,k)=>{const o=BBOT&&BBOT.clinics&&BBOT.clinics[c]; return o?((o.total[k]||[])[i]||0):0;};
  const rows=clins.map(c=>({c,L:lead(c),B:bot(c,'booked'),D:bot(c,'done'),P:bot(c,'purchased'),R:bot(c,'rev')}))
    .sort((a,b)=>b.L-a.L);
  let sL=0,sB=0,sD=0,sP=0,sR=0; rows.forEach(r=>{sL+=r.L;sB+=r.B;sD+=r.D;sP+=r.P;sR+=r.R;});
  const cityLead=((BA.city.total||[])[i])||0;
  const cb=(BBOT&&BBOT.city)?BBOT.city.total:{};
  const cBk=(cb.booked||[])[i]||0, cDn=(cb.done||[])[i]||0, cPu=(cb.purchased||[])[i]||0, cRv=(cb.rev||[])[i]||0;
  const okL=sL===cityLead, okB=sB===cBk;
  let h=`<div class="recon">${(okL&&okB)
    ?`<b>✓ Reconciled.</b> The 14 clinic funnels sum exactly to the city this week. &nbsp;Leads: <b>${N(sL)} = ${N(cityLead)}</b> &nbsp;·&nbsp; Booked: <b>${N(sB)} = ${N(cBk)}</b>.`
    :`<b class="x">⚠ Mismatch.</b> Leads ${N(sL)} vs ${N(cityLead)} · Booked ${N(sB)} vs ${N(cBk)}.`} <span style="color:var(--muted)">(Leads = the 8 attribution buckets; Practo is an external add-on, not part of this reconciliation.)</span></div>`;
  h+='<table class="rc"><thead><tr><th>Clinic</th><th>Leads</th><th>Booked</th><th>Consulted</th><th>Purchased</th><th>Revenue</th></tr></thead><tbody>';
  rows.forEach(r=>{h+=`<tr><td class="nm">${r.c}</td><td>${N(r.L)}</td><td>${N(r.B)}</td><td>${N(r.D)}</td><td>${N(r.P)}</td><td>${RUP(r.R)}</td></tr>`;});
  h+=`<tr class="tot"><td>City total ✓ = Σ above</td><td>${N(sL)}</td><td>${N(cBk)}</td><td>${N(cDn)}</td><td>${N(cPu)}</td><td>${RUP(cRv)}</td></tr>`;
  h+='</tbody></table>';
  // ── "anything remaining?" — build city Google from city campaigns (excl Online/Brand, independent GA model)
  //    and show what the clinic sum (resolved Google) leaves on the table.
  const gac=(GACITY&&GACITY.city&&GACITY.city.Bangalore)||{};
  const gFull=((gac.web&&gac.web[i])||0)+((gac.call&&gac.call[i])||0);      // Google paid · city campaigns excl Online/Brand
  const gRes=((BA.city.paid_call||[])[i]||0)+((BA.city.paid_web||[])[i]||0); // Google paid · resolved to a clinic (in the Σ above)
  const remain=Math.max(0,gFull-gRes);
  const full=sL+remain;
  h+=`<div class="note" style="background:#FBF9F3;border-style:solid">
    <b>Anything remaining?</b> Build city leads the demand way — Google = all city campaigns <i>except Online &amp; Brand</i> (independent count), GMB / Practo / organic / walk-in / Meta / other = sum of the 14 clinics. Everything except Google is a clinic-sum, so it reconciles with <b>0 remainder</b>. Google is the only leak:
    <br>&nbsp;&nbsp;• Google paid · city campaigns <b>${N(gFull)}</b> &nbsp;−&nbsp; resolved to a clinic <b>${N(gRes)}</b> (inside the ${N(sL)} above) &nbsp;=&nbsp; <b class="${remain?'x':''}" style="color:${remain?'var(--bad)':'inherit'}">${N(remain)} remaining</b> (ran city-wide, never resolved to a clinic).
    <br>&nbsp;&nbsp;• So Σ 14 clinics <b>${N(sL)}</b> + unattributed Google paid <b>${N(remain)}</b> = full city paid+organic demand <b>${N(full)}</b>. That ${N(remain)} is the "Google paid · leaked beyond this" row in the funnel below.</div>`;
  return h;
}

// ── How to resolve the leak: attribute paid CALLS by the clinic the caller WANTED (AI call audit
//    locality intent), booking or not. Recovers most of the leak; residual = genuinely city-level.
function paidIntentBlock(){
  if(!PAIDINT||!PAIDINT.clinics) return '';
  const i=wk, cl=PAIDINT.clinics;
  const tot=(PAIDINT.total||[])[i]||0, res=(PAIDINT.residual||[])[i]||0, attr=tot-res;
  const pct=tot?Math.round(attr/tot*100):0;
  const rows=Object.keys(cl).map(c=>({c,v:(cl[c]||[])[i]||0})).filter(r=>r.v).sort((a,b)=>b.v-a.v);
  let h=`<div class="shead"><h2>How to resolve it — paid calls by clinic-of-intent</h2><span class="sub2">AI call audit · week of ${wkLabel(D._meta.weeks[i])}</span></div>`;
  h+=`<div class="recon"><b>${pct}% recoverable now.</b> Of <b>${N(tot)}</b> paid calls to the shared city number, the call audit can pin <b>${N(attr)}</b> to the specific clinic the caller asked for — booking or not — leaving only <b>${N(res)}</b> genuinely city-level (no clinic named). Attributing paid by INTENT (not by waiting for a booking) is the fix the model can apply today. <span style="color:var(--muted)">Call volume by intent — a parallel layer, kept out of the 316 booking-spine.</span></div>`;
  h+='<table class="rc"><thead><tr><th>Clinic</th><th>Paid calls · by caller intent</th></tr></thead><tbody>';
  rows.forEach(r=>{h+=`<tr><td class="nm">${r.c}</td><td>${N(r.v)}</td></tr>`;});
  h+=`<tr><td class="nm" style="color:var(--muted)">Residual · no clinic named (stays city-level)</td><td style="color:var(--muted)">${N(res)}</td></tr>`;
  h+=`<tr class="tot"><td>Total paid-call demand</td><td>${N(tot)}</td></tr>`;
  h+='</tbody></table>';
  h+=`<div class="note"><b>What to do.</b> <b>Now (data in hand):</b> feed this intent attribution into the city + clinic models as a "paid call · by clinic intent" layer — it resolves ${pct}% of paid calls without a booking. <b>Durable fix (eng):</b> capture the clinic at lead time — pipe this call-audit locality back into the CRM lead so <code>call_location</code> fills for non-bookers, and add a clinic / nearest-clinic selector on paid landing pages (the only thing that resolves the paid <i>web</i> leak, which has no call-audit signal). <b>Residual</b> (~${N(res)}/wk, no clinic named) is genuinely city-level demand — convert it (faster pickup / routing), don't force-attribute. ⚠ Call volume (~late-Apr on), not person-deduped — indicative, not a booking count.</div>`;
  return h;
}

function render(){
  if(!D){$('app').innerHTML='<div class="note">Loading…</div>';return;}
  $('wLab').textContent=wkLabel(D._meta.weeks[wk]);
  $('wPrev').disabled=wk>=D._meta.weeks.length-1; $('wNext').disabled=wk<=0;
  const M=metrics(); _M=M; const i=wk;
  let h='';

  // 1) SNAPSHOT FUNNEL
  h+=`<div class="shead"><h2>The city funnel</h2><span class="sub2">week of ${wkLabel(D._meta.weeks[i])} · all 14 Bangalore clinics</span></div>`;
  h+=snapshot(M,i);
  h+=`<div class="funnel-read">Reach <b>${N(M.impr[i])}</b> impressions (Google ${N(M.gImpr[i])} + GMB ${N(M.mImpr[i])}) → <b>${N(M.clicks[i])}</b> clicks (CTR ${PCT(M.ctr[i])}) → <b>${N(M.leads[i])}</b> city leads (GMB ${N(M.gmbDirect[i])} + Google paid ${N(M.googlePaid[i])} + other web ${N(M.webOrg[i])} + walk-in/Meta/Practo/other) → <b>${N(M.booked[i])}</b> booked → <b>${N(M.done[i])}</b> done (${PCT(M.b2d[i])}) → <b>${N(M.purch[i])}</b> purchased (${PCT(M.d2p[i])}) → <b>${RUP(M.rev[i])}</b>. <span style="color:var(--muted)">Leads and Booked are different cohorts (Booked includes walk-ins, repeat &amp; prior-week patients) — so there’s no honest lead→book %.</span></div>`;

  // 2) RECONCILIATION + per-clinic table
  h+=`<div class="shead"><h2>Do the 14 clinic funnels add up?</h2><span class="sub2">week of ${wkLabel(D._meta.weeks[i])}</span></div>`;
  h+=reconTable(M);
  h+=paidIntentBlock();

  // 3) WEEKLY MOVEMENT (matrix with nested breakdowns)
  h+=`<div class="shead"><h2>The funnel, last 6 weeks — with breakdowns</h2><span class="sub2">latest on the right · <b style="color:var(--good)">green = high</b> / <b style="color:var(--bad)">red = low</b> per row · ▲▼ vs prior week · ▾ collapse a stage · click a trend to zoom</span></div>`;
  h+=matrix(M);

  h+=`<div class="note"><b>Sources.</b> Reach: Google = Bangalore city paid impressions/clicks (location-of-presence, real); GMB = Business-Profile insights summed across all 14 clinics (no category). Leads: unified attribution (main_source_wise_leads, clinic=call_location) — the 8 channel buckets reconcile to the city total and the 14 clinics sum to it; Practo added on top (external sheet). Relevant calls by category: AI call audit (call VOLUME, does not reconcile). Booked → Done → Purchased → Revenue: exact Redshift (Screening Calls, deduped to unique patient/clinic/week × diagnosis × paid invoices), city = sum of the 14 clinics. <b>Mental Health note:</b> there is no MH diagnosis tag, so on the booked→revenue side MH sits inside <b>Other</b>; even the AI call audit shows ~0 MH intent — MH is near-invisible end-to-end. Only STI &amp; SH are clinically separable.</div>`;

  $('app').innerHTML=h;
}
$('wPrev').onclick=()=>{if(wk<D._meta.weeks.length-1){wk++;render();}};
$('wNext').onclick=()=>{if(wk>0){wk--;render();}};
function boot(j,ba,pr,bb,pl,ga,pi){D=j;BA=ba;PRACTO=pr;BBOT=bb;POOL=pl;GACITY=ga;PAIDINT=pi;wk=0;render();}
if(window.__D__){boot(window.__D__,window.__BA__,window.__PRACTO__,window.__BBOT__,window.__POOL__,window.__GACITY__,window.__PAIDINT__);}
else{
  Promise.all([
    fetch('data_bangalore.json?v='+Date.now()).then(r=>r.json()),
    fetch('data_bangalore_attribution.json?v='+Date.now()).then(r=>r.json()),
    fetch('data_practo_leads.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('data_bangalore_bottom.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('data_bangalore_pool.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('data_ga_city_leads.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('data_bangalore_paid_intent.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
  ]).then(([j,ba,pr,bb,pl,ga,pi])=>boot(j,ba,pr,bb,pl,ga,pi))
    .catch(()=>{$('app').innerHTML='<div class="note">Could not load data_bangalore.json — run scripts/assemble_bangalore.py.</div>';});
}
</script>
