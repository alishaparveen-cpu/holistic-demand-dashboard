<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Coimbatore · Bharathi Nagar — Lead→Book Funnel (WoW)</title>
<style>
  :root{
    --bg:#0f1115; --card:#181b22; --card2:#1f232c; --line:#2a2f3a; --ink:#e8ebf0; --mut:#9aa3b2;
    --gmb:#4f9cff; --google:#34c759; --organic:#ffb340; --practo:#a78bfa; --meta:#f25fa8; --wa:#25d366; --other:#7c8696;
    --good:#34c759; --warn:#ffb340; --hl:#222838;
  }
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1200px;margin:0 auto;padding:26px 18px 80px}
  h1{font-size:21px;margin:0 0 2px} .sub{color:var(--mut);font-size:12.5px;margin-bottom:20px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--card2);color:var(--mut);margin-left:8px}
  .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:18px;overflow-x:auto}
  .boxhd{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
  .step{width:24px;height:24px;border-radius:7px;background:var(--card2);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .boxhd h2{font-size:15px;margin:0;font-weight:650} .boxhd .meta{color:var(--mut);font-size:11.5px;margin-left:auto}
  table.f{border-collapse:collapse;font-size:12.5px;width:100%;min-width:760px}
  table.f th,table.f td{padding:5px 9px;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  table.f th.lab,table.f td.lab{text-align:left;position:sticky;left:0;background:var(--card);z-index:1;min-width:180px}
  table.f thead th{color:var(--mut);font-weight:600;font-size:11px;border-bottom:1px solid var(--line)}
  table.f thead th.last,table.f td.last{background:var(--hl)}
  table.f tr.tot td{border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-weight:700}
  table.f tr.tot td.lab{background:var(--card)}
  .src td.lab{padding-left:9px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:middle}
  .sub2{color:var(--mut)} .arrow{color:var(--mut);padding-left:22px!important;font-weight:500}
  .good{color:var(--good)} .mut{color:var(--mut)} .warn{color:var(--warn)}
  .zero{color:#3a4150}
  .caret{display:inline-block;width:12px;color:var(--mut);font-size:10px}
  table.f tr.section td{background:#161a22;font-weight:700;border-top:1px solid var(--line)}
  table.f tr.section.s-good td.lab{border-left:3px solid var(--good)}
  table.f tr.section.s-warn td.lab{border-left:3px solid var(--warn)}
  table.f tr.section.s-mut td.lab{border-left:3px solid var(--other)}
  table.f tr.section.s-ret td.lab{border-left:3px solid var(--practo)}
  td.sec{font-weight:700}
  .tgl{background:var(--card2);color:var(--gmb);border:1px solid var(--line);border-radius:7px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:10px}
  .tgl:hover{border-color:var(--gmb)}
  .tag{font-size:9px;padding:1px 5px;border-radius:4px;background:var(--card2);color:var(--mut);margin-left:6px;text-transform:uppercase;letter-spacing:.03em}
  tr.child td.lab{font-weight:400}
  tr.src.parent:hover td{background:var(--hl)} tr.src.parent:hover td.lab{background:var(--hl)}
  .pctbar{display:inline-block;height:5px;border-radius:3px;background:var(--gmb);vertical-align:middle;margin-left:6px}
  .callout{background:var(--card2);border-left:3px solid var(--warn);border-radius:6px;padding:9px 12px;margin-top:12px;font-size:12px;color:var(--ink)}
  .err{color:#f25f5f;padding:40px;text-align:center}
  .legend{font-size:11.5px;color:var(--mut);margin:2px 0 8px}
  .legend .dot{margin-left:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title">Coimbatore · Bharathi Nagar <span class="pill" id="period">Lead → Book funnel · WoW</span></h1>
  <div class="sub" id="note">Loading…</div>
  <div id="root"></div>
</div>
<script>
const COL={'GMB':'var(--gmb)','Google':'var(--google)','Organic':'var(--organic)','Practo':'var(--practo)','Meta':'var(--meta)','WhatsApp':'var(--wa)'};
function colorOf(s){for(const k in COL)if(s.indexOf(k)>=0)return COL[k];return 'var(--other)';}
function pct(a,b){return b?Math.round(100*a/b):0;}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function sum(a){return a.reduce((x,y)=>x+y,0);}

fetch('data_coimbatore_funnel.json?_='+Date.now()).then(r=>r.json()).then(render).catch(e=>{
  document.getElementById('root').innerHTML='<div class="err">No data yet — run <code>build_coimbatore_funnel.py</code>.<br><small>'+esc(e)+'</small></div>';
});

const GROUPS=[
  {ch:'GMB',members:['GMB call','GMB web']},
  {ch:'Google',members:['Google call','Google web']},
  {ch:'Organic',members:['Organic web','WhatsApp','Organic call']},
  {ch:'Practo',members:['Practo']},
  {ch:'Meta',members:['Meta']},
  {ch:'Direct',members:['Direct / no-utm']},
  {ch:'Walk-in',members:['Walk-in (no lead)']},
];
let CALLNUM={}, WEBSET=new Set();
function groupRows(by_source){
  let h='';
  GROUPS.forEach(g=>{
    const mem=g.members.filter(m=>by_source[m]&&sum(by_source[m])>0);
    if(!mem.length) return;
    const parent=(by_source[mem[0]]).map((_,i)=>sum(mem.map(m=>by_source[m][i])));
    const multi=mem.length>1;
    h+='<tr class="src parent"><td class="lab"><span class="dot" style="background:'+colorOf(g.ch)+'"></span><b>'+esc(g.ch)+'</b>'
      +(multi?' <span class="sub2" style="font-weight:400">('+mem.length+')</span>':'')+'</td>'+cells(parent)+'</tr>';
    if(multi) mem.forEach(m=>{
      let lbl='↳ '+esc(m);
      if(CALLNUM[m]) lbl+=' <span class="num">#'+esc(CALLNUM[m])+'</span>';
      if(WEBSET.has(m)) lbl+=' <span class="tag">conv-only</span>';
      h+='<tr class="det" style="display:none"><td class="lab" style="padding-left:30px">'+lbl+'</td>'+cells(by_source[m],'sub2')+'</tr>';
    });
  });
  return h;
}
function toggleDet(btn){const box=btn.closest('.box');const rows=box.querySelectorAll('tr.det');if(!rows.length)return;
  const open=rows[0].style.display!=='none';rows.forEach(r=>r.style.display=open?'none':'');
  btn.textContent=open?btn.dataset.show:btn.dataset.hide;}
function cells(arr,cls){let h='';const L=arr.length;arr.forEach((v,i)=>{const last=i===L-1?' last':'';h+='<td class="'+(cls||'')+last+'">'+(v?v:'<span class="zero">·</span>')+'</td>';});return h;}
function pctcells(num,den){let h='';const L=num.length;num.forEach((v,i)=>{const last=i===L-1?' last':'';const p=pct(v,den[i]);h+='<td class="sub2'+last+'">'+(den[i]?v+'<span class="mut"> '+p+'%</span>':'<span class="zero">·</span>')+'</td>';});return h;}
// largest-remainder rounding so a group of shares sums to exactly 100 per week
function lrRound(parts,total){if(!total)return parts.map(()=>0);const raw=parts.map(p=>100*p/total);const fl=raw.map(Math.floor);
  let rem=100-fl.reduce((a,b)=>a+b,0);const ord=raw.map((r,i)=>[r-fl[i],i]).sort((a,b)=>b[0]-a[0]);
  for(let k=0;k<rem&&k<ord.length;k++)fl[ord[k][1]]++;return fl;}
function lrPercents(series,total){const nw=total.length;const out=series.map(()=>new Array(nw).fill(0));
  for(let i=0;i<nw;i++){const r=lrRound(series.map(s=>s[i]),total[i]);r.forEach((p,k)=>out[k][i]=p);}return out;}
function pctGroupCells(arr,pctArr){let h='';const L=arr.length;arr.forEach((v,i)=>{const last=i===L-1?' last':'';
  h+='<td class="sub2'+last+'">'+(v?v+'<span class="mut"> '+pctArr[i]+'%</span>':'<span class="zero">·</span>')+'</td>';});return h;}
function thead(weeks,labels){let h='<thead><tr><th class="lab">'+'</th>';labels.forEach((l,i)=>{const last=i===labels.length-1?' last':'';h+='<th class="'+last.trim()+(last?' last':'')+'">'+esc(l)+'</th>';});h+='</tr></thead>';return h;}

function render(d){
  document.getElementById('note').textContent=d.note;
  CALLNUM=d.call_numbers||{}; WEBSET=new Set((d.leads&&d.leads.web_sources)||[]);
  const W=d.week_labels, L=d.leads, B=d.bookings;
  let html='';

  // ===== LEADS =====
  html+='<div class="box"><div class="boxhd"><span class="step">③</span><h2>Leads — new-acquisition demand by channel (per week)</h2>'
      +'<span class="meta">new patients only · returning excluded · repeat calls collapsed</span></div>';
  html+='<button class="tgl" data-show="▸ Show call / web breakdown (with numbers)" data-hide="▾ Hide call / web breakdown" onclick="toggleDet(this)">▸ Show call / web breakdown (with numbers)</button>';
  html+='<table class="f">'+thead(d.weeks,W)+'<tbody>';
  html+=groupRows(L.by_source);
  // GMB+Google CALLS-only subtotal — matches the colleague's sheet scope (he counts calls only, no web)
  const gc=L.by_source['GMB call']||[], goc=L.by_source['Google call']||[], oc=L.by_source['Organic call']||[];
  const ggcall=gc.map((v,i)=>v+(goc[i]||0)+(oc[i]||0));
  html+='<tr class="tot" style="border-top:1px dashed var(--line)"><td class="lab" style="color:var(--gmb)">↳ GMB + Google + Organic (calls only) <span class="sub2" style="font-weight:400">— compare to his sheet</span></td>'+cells(ggcall)+'</tr>';
  html+='<tr class="tot"><td class="lab">Total leads <span class="sub2" style="font-weight:400">(all sources incl Practo + web)</span></td>'+cells(L.total)+'</tr>';
  const lp=lrPercents([L.booked_same,L.booked_later,L.not_booked],L.total);
  html+='<tr><td class="lab arrow good">↳ booked same week</td>'+pctGroupCells(L.booked_same,lp[0])+'</tr>';
  html+='<tr><td class="lab arrow warn">↳ booked later (carryover)</td>'+pctGroupCells(L.booked_later,lp[1])+'</tr>';
  html+='<tr><td class="lab arrow mut">↳ didn\'t book</td>'+pctGroupCells(L.not_booked,lp[2])+'</tr>';
  html+='</tbody></table>';
  const tl=sum(L.total),ts=sum(L.booked_same),tla=sum(L.booked_later),tn=sum(L.not_booked);
  html+='<div class="callout"><b>Web/ad channels (Meta · Google-web · Organic-web · WhatsApp) are converted-only</b> — only knowable per-clinic once they book — so they sit in "booked", and <b>"didn\'t book" reflects tracked leads</b> (calls + GMB listing + Practo). '
      +(L.web_older?'<b>+'+L.web_older+'</b> booked from web leads created before this window (carry-in in bookings ②). ':'')
      +'<b>⚠ Latest 1–2 weeks still maturing</b> — "booked later" undercounts until future weeks land. Hit <b>"call / web breakdown"</b> to see each channel\'s sources + the dialed numbers.</div>';
  html+='</div>';

  // ===== BOOKINGS as a FLOW =====
  const F=B.flow;
  html+='<div class="box"><div class="boxhd"><span class="step">④</span><h2>Bookings — flow from leads (per week)</h2>'
      +'<span class="meta">this-week\'s leads → carry-in → direct/walk-in</span></div>';
  html+='<button class="tgl" data-show="▸ Show call / web breakdown (with numbers)" data-hide="▾ Hide call / web breakdown" onclick="toggleDet(this)">▸ Show call / web breakdown (with numbers)</button>';
  html+='<table class="f">'+thead(d.weeks,W)+'<tbody>';
  function section(title,sub,bucket,cls){
    let h='<tr class="section '+(cls||'')+'"><td class="lab">'+title+(sub?' <span class="sub2" style="font-weight:400">'+sub+'</span>':'')+'</td>'+cells(bucket.total,'sec')+'</tr>';
    return h+groupRows(bucket.by_source);
  }
  html+='<tr><td class="lab sub2" style="font-size:11px">NEW ACQUISITIONS (first-ever SC)</td>'+cells(d.weeks.map(()=>''),'')+'</tr>';
  html+=section('① From <b>this week\'s</b> leads','GMB·Google·Organic·Practo·Meta',F.thisweek,'s-good');
  html+=section('② From <b>earlier weeks\'</b> leads','carry-in',F.prior,'s-warn');
  html+=section('③ Direct · walk-in','no attributable lead',F.other,'s-mut');
  html+='<tr class="tot"><td class="lab">New-acquisition bookings</td>'+cells(F.thisweek.total.map((v,i)=>v+F.prior.total[i]+F.other.total[i]))+'</tr>';
  if(F.returning && sum(F.returning.total)>0){
    html+='<tr><td class="lab sub2" style="font-size:11px;padding-top:10px">RETURNING (booking-level only · existing patients re-booking a new SC)</td>'+cells(d.weeks.map(()=>''),'')+'</tr>';
    html+=section('④ Returning patients','repeat SC — not new demand',F.returning,'s-ret');
  }
  html+='<tr class="tot"><td class="lab">Total bookings</td>'+cells(B.total)+'</tr>';
  html+='<tr class="tot"><td class="lab good">Done (completed)</td>'+pctcells(B.done,B.total)+'</tr>';
  html+='</tbody></table>';
  const tb=sum(B.total),t1=sum(F.thisweek.total),t2=sum(F.prior.total),t3=sum(F.other.total),tr=sum((F.returning||{total:[]}).total||[]),td=sum(B.done);
  const tnew=t1+t2+t3;
  html+='<div class="callout"><b>Demand = new acquisitions only</b> (the window SC is the patient\'s first-ever appointment). 10-wk: <b class="good">'+tnew+' new</b> = ① '+t1+' this-week + ② '+t2+' carry-in + ③ '+t3+' direct/walk-in · <b style="color:var(--practo)">'+tr+' returning</b> (existing patients re-booking, shown at booking level to complete the total) · <b>'+tb+' total</b> · <b class="good">'+td+'</b> done. '
      +'Only <code>lead_to_call</code> calls attribute (b2p excluded). Returning patients mostly come back via <b>Practo + GMB listing</b>.</div>';
  html+='</div>';

  document.getElementById('root').innerHTML=html;
}
</script>
</body>
</html>
