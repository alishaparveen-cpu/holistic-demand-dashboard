<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Indiranagar — Clinic Funnel</title>
<script>if(!sessionStorage.getItem('allo_dash_auth'))location.replace('index.html');</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F4EE;--sheet:#fff;--inset:#F4F2EB;--ink:#1A2B26;--ink2:#52605A;--muted:#8A8A80;--faint:#B0A99A;
  --line:#E5E2D9;--line2:#EEEBE2;--accent:#1F6F5C;--accentd:#1A5E4E;--good:#1F6F5C;--goodbg:#EDF4F0;--bad:#B23A2E;--badbg:#FBEEEC;--warn:#B8862E;--r:12px;
  --goog:#2E7D5B;--gmb:#3E6F8E;--vio:#7B5EA7;--pr:#B8862E}
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);margin:0;font-size:13px;line-height:1.45}
.wrap{max-width:1240px;margin:0 auto;padding:18px 22px 90px}
a{color:inherit}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.back{font-size:12.5px;color:var(--muted);text-decoration:none}.back:hover{color:var(--accent)}
h1{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin:8px 0 2px}
.sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.wknav{display:flex;align-items:center;gap:2px;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.wknav button{width:34px;height:34px;border:none;background:transparent;color:var(--muted);font-size:15px;cursor:pointer}
.wknav button:hover{background:#F0EEE6;color:var(--ink)}.wknav button:disabled{opacity:.3;cursor:default}
.wknav .lab{padding:0 12px;font-size:13px;font-weight:600;min-width:150px;text-align:center}
.shead{display:flex;align-items:baseline;gap:10px;margin:26px 0 9px}
.shead h2{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:0}
.shead .sub2{font-size:12px;color:var(--muted)}
/* funnel snapshot */
.funnel{display:flex;background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.fcell{flex:1;min-width:104px;padding:13px 10px;border-right:1px solid var(--line2);text-align:center}
.fcell:last-child{border-right:0}
.fcell .fk{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
.fcell .fv{font-family:'Fraunces',serif;font-size:23px;font-weight:600;margin-top:3px;line-height:1}
.fcell .fmeta{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.3}
.fcell .fmeta b{color:var(--accentd)}
.farrow{flex:0 0 72px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--inset);border-right:1px solid var(--line2)}
.farrow .conv{font-family:'JetBrains Mono';font-size:13px;font-weight:700;color:var(--accentd)}
.farrow .clab{font-size:8.5px;color:var(--muted);margin-top:1px;text-align:center}
.funnel-read{background:var(--sheet);border:1px solid var(--line);border-top:0;border-radius:0 0 var(--r) var(--r);padding:11px 16px;font-size:12.5px;color:var(--ink2);margin-top:-1px}
.funnel-read b{color:var(--ink)}
/* matrix */
.fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto}
table.fm{border-collapse:collapse;width:100%;font-size:12.5px;min-width:900px}
table.fm th{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:right;padding:9px 12px;background:var(--inset);border-bottom:1px solid var(--line);white-space:nowrap}
table.fm th:first-child{text-align:left}
table.fm th.lastcol{color:var(--accentd)}
table.fm td{padding:8px 12px;text-align:right;border-bottom:1px solid var(--line2);font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;white-space:nowrap}
table.fm td:first-child{text-align:left;font-family:'Inter'}
table.fm tr:last-child td{border-bottom:0}
tr.stage td{font-weight:700;font-size:13.5px;color:var(--ink)}
.snode{display:flex;align-items:center;gap:8px;font-weight:600;padding-left:9px;border-left:3px solid var(--accent)}
tr.edge td{color:var(--ink2);font-size:12px}
.edge-lbl{padding-left:21px;color:var(--muted);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.edge-lbl .formula{font-family:'JetBrains Mono';font-size:9.5px;color:var(--faint)}
.fm td.lastcol{font-weight:700}
.sparkcell{padding:3px 10px!important;cursor:zoom-in}.sparkcell:hover{background:var(--goodbg)}
.wowd{font-size:9.5px;font-weight:700;margin-top:2px}
.chev{cursor:pointer;color:var(--muted);font-size:10px;display:inline-block;width:12px}
.cohortbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:12.5px;color:var(--ink2);margin:6px 0 2px}
.tg{border:1px solid var(--line);background:var(--sheet);border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:inherit}
.tg.on{background:var(--accentd);color:#fff;border-color:var(--accentd)}
tr.kid td{color:var(--ink2);font-size:11.5px}
.kid-lbl{padding-left:26px;color:var(--ink2);font-size:11.5px;font-family:'Inter'}
tr.subhead td{background:var(--inset);font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:4px 13px 4px 26px;text-align:left}
/* category cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px}
.card{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px}
.card .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:9px}
.catbar{display:flex;flex-direction:column;gap:5px}
.catrow{display:grid;grid-template-columns:64px 1fr 52px;align-items:center;gap:7px;font-size:11.5px}
.catrow .bar{height:8px;border-radius:4px;background:var(--inset);overflow:hidden}
.catrow .fill{height:100%;border-radius:4px}
.catrow .cn{color:var(--muted)}.catrow .cv{text-align:right;font-weight:600}
.note{background:#FBF9F3;border:1px dashed var(--line);border-radius:9px;padding:9px 13px;font-size:11.5px;color:var(--muted);margin-top:12px}
.ix{display:inline-block;width:13px;height:13px;line-height:13px;text-align:center;border-radius:50%;background:#e8e4d8;color:#8a8270;font-size:9px;font-weight:700;cursor:help;margin-left:5px;vertical-align:middle;font-family:Inter}
.ix:hover{background:#d8d2c2;color:#5a5345}
.infopop{position:absolute;z-index:9999;max-width:320px;background:#1f2937;color:#f3f4f6;font-size:11.5px;line-height:1.55;padding:9px 12px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.28);display:none}
.sp{display:block}
/* modal */
.modal{position:fixed;inset:0;background:rgba(20,28,24,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:16px;padding:22px 24px;max-width:760px;width:100%}
.mbox h3{font-family:'Fraunces',serif;margin:0 0 2px;font-size:20px}
.mclose{float:right;cursor:pointer;color:var(--muted);font-size:20px;border:none;background:none}
.lgd{font-size:11.5px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">← Dashboard</a>
    <div class="wknav"><button id="wPrev">‹</button><span class="lab" id="wLab">—</span><button id="wNext">›</button></div>
  </div>
  <h1>Indiranagar · Bangalore</h1>
  <div class="sub">Clinic funnel — reach → leads → booked → done → purchased → revenue. Snapshot, week-by-week movement, and trend (click any sparkline to zoom).</div>
  <div id="app"></div>
</div>
<div class="modal" id="modal"><div class="mbox"><button class="mclose" onclick="closeZ()">✕</button><h3 id="mTitle"></h3><div id="mBody"></div></div></div>
<script>
let D=null, POOL=null, PD=null, AT=null, JOURNEY=null, BA=null, wk=0, ZREG=[], expanded={}, cohort=true;
const NSHOW=6;   // show the most recent 6 weeks in the matrix / trend
const $=id=>document.getElementById(id);
const hexA=(hex,a)=>{const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;};
function toggle(k){expanded[k]=expanded[k]===false?true:false;render();}
function toggle2(k){expanded[k]=!expanded[k];render();}   // for nested kids (collapsed by default)
function setCohort(v){cohort=v;render();}
const N=v=>v==null||isNaN(v)?'—':Math.round(v).toLocaleString('en-IN');
const PCT=v=>v==null||isNaN(v)?'—':v.toFixed(1)+'%';
const RUP=v=>v==null||isNaN(v)?'—':'₹'+Math.round(v).toLocaleString('en-IN');
function ix(t){return t?` <span class="ix" data-info="${String(t).replace(/"/g,'&quot;')}" title="${String(t).replace(/"/g,'&quot;')}" onclick="showInfo(event,this)">i</span>`:'';}
function showInfo(e,el){
  e.stopPropagation();
  let pop=document.getElementById('infopop');
  if(!pop){ pop=document.createElement('div'); pop.id='infopop'; pop.className='infopop'; document.body.appendChild(pop);
    document.addEventListener('click',()=>{pop.style.display='none';}); }
  pop.textContent=el.getAttribute('data-info');
  pop.style.display='block';
  const r=el.getBoundingClientRect();
  pop.style.left=Math.max(8,Math.min(window.innerWidth-336, r.left-150))+'px';
  pop.style.top=(window.scrollY+r.bottom+7)+'px';
}
const Lk=v=>v==null?'—':v>=1000?'₹'+(v/1000).toFixed(1)+'k':'₹'+Math.round(v);
const CCOL={SH:'#2E7D5B',STD:'#B8862E',STI:'#B8862E',MH:'#7B5EA7',ED:'#3E6F8E','ED+':'#3E6F8E','PE+':'#5B9E8C','ED+PE+':'#8E6FB0',NSSD:'#9E8E5B',Brand:'#6B6B6B',Other:'#B0A99A',oth:'#B0A99A',
  'Inbound (call)':'#3E6F8E','Web/UTM':'#2E7D5B','Organic':'#7B5EA7','Practo':'#B8862E'};
const wkLabel=w=>{const d=new Date(w);const e=new Date(d);e.setDate(d.getDate()+6);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+M[d.getMonth()]+'–'+e.getDate()+' '+M[e.getMonth()];};
const wkShort=w=>{const d=new Date(w);const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+M[d.getMonth()];};

// ---- derive every funnel metric as a 12-week array (newest-first, matching D._meta.weeks) ----
function metrics(){
  const R=D.reach, L=D.leads, B=D.bottom, NW=D._meta.weeks.length;
  const ch=L.by_chan, ai=L.ai, cc=L.call_channels||{};
  const arr=(f)=>Array.from({length:NW},(_,i)=>f(i)||0);
  const ccTot=k=>arr(i=>((cc[k]&&cc[k].total&&cc[k].total[i])||0));
  const impr=R.combined.impr, clicks=R.combined.clicks;
  // ── Unified attribution (data_bangalore_attribution.json) — clinic = call_location; the Indiranagar slice
  //    sums into the Bangalore city total. Each lead is bucketed by CHANNEL × MECHANISM (call vs web).
  //    Already includes Tier A (clinic captured) + Tier B (clinic resolved at booking). ──
  const B0=(BA&&BA.clinics&&BA.clinics['Indiranagar'])||{};
  const Bk=k=>arr(i=>(B0[k]&&B0[k][i])||0);
  const gmbCallB=Bk('gmb_call'),  gmbWebB=Bk('gmb_web');          // organic GBP: call vs website
  const paidCallB=Bk('paid_call'),paidWebB=Bk('paid_web');        // Google paid: ad-call vs landing page
  const webOrg=Bk('web_organic'), walkin=Bk('walkin'), meta=Bk('meta'), otherB=Bk('other');
  const webClinic=Bk('web_clinic'), webPage=Bk('web_page'), webUntagged=Bk('web_untagged');  // sub-split of webOrg
  // category — ONLY where attributable: calls (→ split STI/SH/MH by the call audit, shown in Relevant leads),
  // plus a small web sliver tagged by landing page / campaign. The rest has no category signal.
  const catCall=Bk('cat_call'), catEd=Bk('cat_ed'), catPe=Bk('cat_pe'), catSti=Bk('cat_sti'), catSh=Bk('cat_sh'), catUncat=Bk('cat_uncat');
  // attribution timing: clinic known at capture vs only set at the booking
  const tierCaptured=Bk('tier_captured'), tierResolved=Bk('tier_resolved');
  // Inbound CALLS split by the NUMBER dialed (call-audit, data_indiranagar_calls.json) — the only source that
  // can separate Google-paid calls (call-asset #) from organic GMB calls (clinic's own #). main_source_wise_leads can't.
  const ccA=k=>arr(i=>((cc[k]&&cc[k].total&&cc[k].total[i])||0));
  const callGmb=ccA('gmb'), callPaid=ccA('paid'), callOther=ccA('other');
  const callsplit=arr(i=>callGmb[i]+callPaid[i]+callOther[i]);
  const gmbDirect=arr(i=>gmbCallB[i]+gmbWebB[i]);                 // GMB organic (call + website)
  const googlePaid=arr(i=>paidCallB[i]+paidWebB[i]);             // Google paid (call + web)
  const gmbGoog=arr(i=>gmbDirect[i]+googlePaid[i]);              // Google + GMB combined (the clicks-driven channels)
  const allOther=arr(i=>webOrg[i]+walkin[i]+meta[i]+otherB[i]);  // all non-Google/GMB/Practo channels combined
  const pr=ch.practo;                                            // Practo LEADS (external sheet) — not in main_source_wise_leads
  const pdoc2=(PD&&PD['Bangalore|Indiranagar'])||{};            // Practo per-doctor {leads,booked}
  const prBooked=arr(i=>Object.values(pdoc2).reduce((s,a)=>s+((a&&Array.isArray(a.booked)&&a.booked[i])||0),0));  // subset who booked a consult
  const gmbCall=gmbCallB, onsiteWeb=webOrg;                      // aliases for downstream refs
  const miscLead=arr(i=>meta[i]+otherB[i]);
  // clinic leads = every unified bucket + Practo. call-mechanism subset = own-number + paid-tracking calls.
  const tier1=arr(i=>gmbDirect[i]+googlePaid[i]+webOrg[i]+walkin[i]+meta[i]+otherB[i]+(pr[i]||0));
  const leads=tier1;
  const callLeads=arr(i=>gmbCallB[i]+paidCallB[i]);
  // City pool (exotel) — CONTEXT lens only, NOT summed (its booked-here slice is already inside Tier B above).
  const poolWon=arr(i=>(POOL&&POOL.won&&POOL.won[i])||0);
  const poolTot=arr(i=>(POOL&&POOL.pool_callers&&POOL.pool_callers[i])||0);
  const poolElse=arr(i=>(POOL&&POOL.elsewhere&&POOL.elsewhere[i])||0);
  const poolNo=arr(i=>(POOL&&POOL.noconv&&POOL.noconv[i])||0);
  // cohort=true → follow only THIS week's leads (booked→done→purchased→revenue from same-week leads)
  const allB=B.total.booked, bwl=B.total.booked_wk_lead||allB.map(()=>0);
  const bprior=arr(i=>(allB[i]||0)-(bwl[i]||0));
  const booked = cohort ? bwl                                   : allB;
  const done   = cohort ? (B.total.done_wk_lead||B.total.done)  : B.total.done;
  const purch  = cohort ? (B.total.purchased_wk_lead||B.total.purchased) : B.total.purchased;
  const rev    = cohort ? (B.total.rev_wk_lead||B.total.rev)    : B.total.rev;
  const rate=(a,b)=>arr(i=>b[i]?a[i]/b[i]*100:null);
  // Click → lead by channel (best-effort cross-system ratio): only where a clicks number exists.
  const gClkA=arr(i=>(R.google.clicks&&R.google.clicks[i])||0), mClkA=arr(i=>(R.gmb.clicks&&R.gmb.clicks[i])||0);
  const c2l_paid=rate(googlePaid,gClkA), c2l_gmb=rate(gmbDirect,mClkA);
  const c2l_comb=rate(arr(i=>googlePaid[i]+gmbDirect[i]), arr(i=>gClkA[i]+mClkA[i]));  // Google+GMB combined
  const aiCat=(ai&&ai.by_cat)||{};
  const callCat=arr(i=>['STI','SH','MH','Other'].reduce((s,c)=>s+((aiCat[c]&&aiCat[c][i])||0),0));  // call-audit relevant total (its own universe)
  return {impr,clicks,callLeads,relevant:callCat,pr,leads,c2l_paid,c2l_gmb,
    gmbDirect,googlePaid,onsiteWeb,walkin,miscLead,
    gmbCallB,gmbWebB,paidCallB,paidWebB,webOrg,webClinic,webPage,webUntagged,meta,otherB,gmbGoog,allOther,
    prBooked,prConv:rate(prBooked,pr),
    catCall,catEd,catPe,catSti,catSh,catUncat,tierCaptured,tierResolved,c2l_comb,
    callGmb,callPaid,callOther,callsplit,
    gmbCall,tier1,poolWon,poolTot,poolElse,poolNo,
    booked,bookedWkLead:bwl,bookedPrior:bprior,done,purch,rev,
    gImpr:R.google.impr,gClk:R.google.clicks,mImpr:R.gmb.impr,mClk:R.gmb.clicks,
    ctr:rate(clicks,impr),c2l:rate(leads,clicks),l2b:rate(booked,leads),
    l2rl:rate(callLeads,leads),rl2b:rate(booked,callLeads),pool_share:rate(poolWon,poolTot),citypool:poolTot,
    b2d:rate(done,booked),d2p:rate(purch,done),
    arpu:arr(i=>purch[i]?rev[i]/purch[i]:null)};
}

// ---- snapshot funnel (selected week) ----
function snapshot(M,i){
  const cell=(k,v,m)=>`<div class="fcell"><div class="fk">${k}</div><div class="fv">${v}</div><div class="fmeta">${m||'&nbsp;'}</div></div>`;
  const arrow=(c,l)=>`<div class="farrow"><div class="conv">${c}</div><div class="clab">${l}</div></div>`;
  return '<div class="funnel">'
   +cell('Impressions',N(M.impr[i]),`Google <b>${N(M.gImpr[i])}</b> · GMB <b>${N(M.mImpr[i])}</b>`)
   +arrow(PCT(M.ctr[i]),'CTR')
   +cell('Clicks',N(M.clicks[i]),`loc-asset ${N(M.gClk[i])} · GMB ${N(M.mClk[i])}`)
   +arrow(PCT(M.c2l[i]),'click→lead')
   +cell('Leads (total)',N(M.leads[i]),`GMB <b>${N(M.gmbDirect[i])}</b> · paid ${N(M.googlePaid[i])} · web ${N(M.webOrg[i])} · Practo ${N((M.pr&&M.pr[i])||0)}`)
   +arrow(PCT(M.l2b[i]),'lead→book')
   +cell('Booked',N(M.booked[i]),'screening calls')
   +arrow(PCT(M.b2d[i]),'book→done')
   +cell('Done',N(M.done[i]),'consulted')
   +arrow(PCT(M.d2p[i]),'done→paid')
   +cell('Purchased',N(M.purch[i]),'treatment')
   +cell('Revenue',Lk(M.rev[i]),`ARPU ${RUP(M.arpu[i])}`)
   +'</div>';
}

// ---- weekly matrix (stages + edges × weeks, newest on the right, trend column) ----
// funnel rows WITH nested breakdowns: reach by category, leads by source + by category, bottom by diagnosis
function buildStages(M){
  const R=D.reach, B=D.bottom, ai=D.leads.ai||{}, cats=B.cats||[];
  const gc=R.google.by_cat||{};
  const gcat=(c,f)=>(gc[c]&&gc[c][f])||[];
  const bcat=(c,f)=>(B.by_cat[c]&&B.by_cat[c][f])||[];
  const cf=f=>cohort?f+'_wk_lead':f;   // cohort → same-week-lead field variant
  const NWv=D._meta.weeks.length, mk=f=>Array.from({length:NWv},(_,i)=>f(i));
  const GCATS=['STI','SH','MH','Other'], aic=ai.by_cat||{};
  const cc=D.leads.call_channels||{}, ccA=k=>(cc[k]&&cc[k].total)||[];
  // Practo per-profile breakdown (doctor + clinic profiles, from data_practo_by_doctor.json) — sums to the clinic Practo total
  const pdoc=(PD && PD['Bangalore|Indiranagar'])||{};
  const practoKids=Object.entries(pdoc).filter(([n,a])=>a&&Array.isArray(a.leads)&&a.leads.some(v=>v))
    .map(([n,a])=>({label:'· '+n,arr:a.leads,fmt:N,info:/^Dr\.?\s/i.test(n)?'Practo DOCTOR-profile leads for '+n+' (maps to Indiranagar).':'Practo CLINIC-profile leads ('+n+').'}));
  // jpaths(bucketKeys) → exact "how they came" sub-rows for the given attribution bucket(s), from data_indiranagar_journey.json
  const jpaths=(...bks)=>!JOURNEY||!JOURNEY.paths ? [] :
    JOURNEY.paths.filter(p=>bks.includes(p.bucket)&&p.weeks.some(v=>v))
      .sort((a,b)=>(b.weeks.reduce((x,y)=>x+y,0))-(a.weeks.reduce((x,y)=>x+y,0)))
      .map(p=>({label:'· '+p.path,arr:p.weeks,fmt:N,
        info:'Exact entry path (channel: '+p.channel+'). Source: main_source_wise_leads organic_l2 / paid-campaign name. Placed by the week the lead was CREATED.'}));
  return [
    {t:'stage',k:'impr',label:'Impressions (Google location-asset + GMB)',color:'#1F6F5C',fmt:N,
      info:'Google = impressions of the Indiranagar LOCATION ASSET (the clinic address shown in city-wide paid ads), by category. GMB = Business-Profile listing views. Anonymous aggregate counts — no per-user link to leads.',children:[
      ...GCATS.map(c=>({label:'Google loc-asset · '+c,arr:gcat(c,'impr'),fmt:N})),
      {label:'GMB listing',arr:R.gmb.impr,fmt:N}]},
    {t:'stage',k:'clicks',label:'Clicks (Google location-asset + GMB listing)',color:'#2E7D5B',fmt:N,

function heatBg(v,mn,mx){if(v==null||isNaN(v)||!isFinite(mn))return'';const rng=(mx-mn)||1,t=(v-mn)/rng;
  if(t>=0.6)return hexA('#2E7D5B',0.07+0.18*((t-0.6)/0.4));
  if(t<=0.4)return hexA('#B23A2E',0.07+0.18*((0.4-t)/0.4));return'';}
function rowCells(arr,fmt,cols,wow){let mn=Infinity,mx=-Infinity;cols.forEach(ci=>{const v=arr[ci];if(v!=null&&!isNaN(v)){mn=Math.min(mn,v);mx=Math.max(mx,v);}});
  let cells='';cols.forEach((ci,j)=>{const v=arr[ci],last=j===cols.length-1,bg=heatBg(v,mn,mx);
    let w='';if(wow&&last&&v!=null&&!isNaN(v)&&arr[1]!=null&&!isNaN(arr[1])){const d=v-arr[1];if(d){const up=d>0;w=`<div class="wowd" style="color:${up?'var(--good)':'var(--bad)'}">${up?'▲':'▼'} ${fmt(Math.abs(d))}</div>`;}}
    cells+=`<td class="${last?'lastcol':''}"${bg?` style="background:${bg}"`:''}>${v==null||isNaN(v)?'—':fmt(v)}${w}</td>`;});
  return cells;}
function sparkCell(arr,color,label,fmt,formula){const idx=ZREG.length;ZREG.push({label,arr:arr.slice(0,NSHOW),fmt,color,formula:formula||''});
  return `<td class="sparkcell" onclick="zoomReg(${idx})">${spark(arr.slice(0,NSHOW),color)}</td>`;}
function matrix(M){

    +cols.map((ci,j)=>`<th class="${j===cols.length-1?'lastcol':''}">${wkShort(W[ci])}</th>`).join('')+'<th>trend</th></tr></thead><tbody>';
  buildStages(M).forEach(r=>{
    if(r.t==='sep'){ h+=`<tr><td colspan="${cols.length+2}" style="padding:16px 10px 6px;font-weight:700;font-size:12px;letter-spacing:.04em;color:var(--muted);border-top:2px solid var(--line)">${r.label}${ix(r.info)}</td></tr>`; return; }
    const a=M[r.k];
    const kids=(r.children||[]).filter(c=>c.sep||(c.arr&&cols.some(ci=>c.arr[ci])));
    const open=expanded[r.k]!==false;
    const chev=kids.length?`<span class="chev" onclick="event.stopPropagation();toggle('${r.k}')">${open?'▾':'▸'}</span> `:'';
    if(r.t==='edge'){
      h+=`<tr class="edge"><td><div class="edge-lbl">${chev}↳ ${r.label}${ix(r.info)}<span class="formula">${r.formula||''}</span></div></td>${rowCells(a,r.fmt,cols,true)}${sparkCell(a,'#A8B0A0',r.label,r.fmt,r.formula)}</tr>`;
    } else {
      h+=`<tr class="stage"><td><div class="snode" style="border-color:${r.color}">${chev}${r.label}${ix(r.info)}</div></td>${rowCells(a,r.fmt,cols,true)}${sparkCell(a,r.color,r.label,r.fmt)}</tr>`;
    }
    if(open) kids.forEach(c=>{
      if(c.sep){h+=`<tr class="subhead"><td colspan="${cols.length+2}">${c.label}${ix(c.info)}</td></tr>`;return;}

      if(sub.length&&so) sub.forEach(s=>{
        const gk=(s.kids||[]).filter(x=>x.arr&&cols.some(ci=>x.arr[ci]));
        const sk2='s2_'+r.k+'_'+(c.label||'').replace(/\W+/g,'')+'_'+(s.label||'').replace(/\W+/g,''), so2=expanded[sk2]===true;
        const chev3=gk.length?`<span class="chev" onclick="event.stopPropagation();toggle2('${sk2}')">${so2?'▾':'▸'}</span> `:'';
        h+=`<tr class="kid"><td><div class="kid-lbl" style="padding-left:34px">${chev3}${s.label}${ix(s.info)}</div></td>${rowCells(s.arr,s.fmt||N,cols,false)}${sparkCell(s.arr,r.color||'#3E6F8E',r.label+' · '+s.label,s.fmt||N)}</tr>`;
        if(gk.length&&so2) gk.forEach(x=>{

      });
    });
  });
  return h+'</tbody></table></div>';
}

// sparkline (newest-first array → drawn oldest→newest)
function spark(arr,color){
  const v=arr.slice().reverse().map(x=>x==null||isNaN(x)?0:x); const n=v.length, mx=Math.max(1,...v);
  const W=150,H=30,pad=2; const x=i=>pad+i*(W-2*pad)/(n-1), y=val=>H-pad-(val/mx)*(H-2*pad);
  let p=''; v.forEach((val,i)=>{p+=(i?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';});
  return `<svg class="sp" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><path d="${p}" fill="none" stroke="${color}" stroke-width="1.6"/><circle cx="${x(n-1).toFixed(1)}" cy="${y(v[n-1]).toFixed(1)}" r="2.6" fill="${color}"/></svg>`;
}
let _M=null;

function zoomShow(title,sNewestFirst,fmt,color,formula){
  $('mTitle').textContent=title;
  const W=700,H=300,pad=38; const wks=D._meta.weeks.slice(0,NSHOW).reverse();
  const v=sNewestFirst.slice().reverse().map(x=>x==null||isNaN(x)?null:x); const n=v.length;
  const mx=Math.max(1,...v.map(x=>x||0)); const x=i=>pad+i*(W-2*pad)/(n-1),y=val=>H-pad-((val||0)/mx)*(H-2*pad-10);
  let p='',pts='',started=false;
  v.forEach((val,i)=>{if(val==null)return; p+=(started?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';started=true;
    pts+=`<circle cx="${x(i).toFixed(1)}" cy="${y(val).toFixed(1)}" r="3" fill="${color}"><title>${wkShort(wks[i])}: ${fmt(val)}</title></circle>`;});
  let gl='';[0,.5,1].forEach(f=>{const yy=H-pad-(f*(H-2*pad-10));gl+=`<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#EEEBE2"/><text x="4" y="${yy+3}" font-size="10" fill="#999">${fmt(mx*f)}</text>`;});
  let xl='';v.forEach((_,i)=>{if(i%2===0)xl+=`<text x="${x(i)}" y="${H-10}" font-size="9" fill="#999" text-anchor="middle">${wkShort(wks[i])}</text>`;});
  $('mBody').innerHTML=`<div class="lgd" style="margin:0 0 6px">${formula}</div><svg width="100%" viewBox="0 0 ${W} ${H}">${gl}<path d="${p}" fill="none" stroke="${color}" stroke-width="2"/>${pts}${xl}</svg><div class="lgd">12-week trend · hover a point for week &amp; value.</div>`;
  $('modal').classList.add('on');
}

  h+=`<div class="shead"><h2>The funnel</h2><span class="sub2">week of ${wkLabel(D._meta.weeks[i])}</span></div>`;
  h+=snapshot(M,i);
  h+=`<div class="funnel-read">Reach <b>${N(M.impr[i])}</b> impressions (Google ${N(M.gImpr[i])} + GMB ${N(M.mImpr[i])}) → <b>${N(M.clicks[i])}</b> clicks (CTR ${PCT(M.ctr[i])}) → <b>${N(M.leads[i])}</b> leads (GMB ${N(M.gmbDirect[i])} + Google paid ${N(M.googlePaid[i])} + other web ${N(M.webOrg[i])} + walk-in/Meta/Practo/other) →<b>${N(M.booked[i])}</b> booked → <b>${N(M.done[i])}</b> done (${PCT(M.b2d[i])}) → <b>${N(M.purch[i])}</b> purchased (${PCT(M.d2p[i])}) → <b>${RUP(M.rev[i])}</b>. <span style="color:var(--muted)">Lead→book can exceed 100% when bookings include repeat/walk-in patients beyond tracked new leads.</span></div>`;

  // L2RL — each category's share of total leads (categorised from inbound calls)
  {const lc=ai.by_cat||{}, tl=M.leads[i]||1, sh=c=>PCT(((lc[c]&&lc[c][i])||0)/tl*100);
   h+=`<div style="font-size:12px;color:var(--ink2);margin:9px 2px 0;padding:9px 13px;background:#FBF9F3;border:1px dashed var(--line);border-radius:9px">
     <b>Lead category mix (share of total leads):</b> STI <b style="color:#B8862E">${sh('STI')}</b> · Sexual health <b style="color:#2E7D5B">${sh('SH')}</b> · Mental health <b style="color:#7B5EA7">${sh('MH')}</b> · Other ${sh('Other')}
     <span style="color:var(--muted)"> — categorised from inbound calls; the remainder are web/organic leads (no category).</span></div>`;}

  // Cohort toggle — booked → revenue either follows this week's leads, or counts all activity this week
  h+=`<div class="cohortbar"><b>Booked → revenue follows:</b>
    <button class="tg ${cohort?’on’:’’}" onclick="setCohort(true)">This week’s leads → done (cohort)</button>
    <button class="tg ${!cohort?’on’:’’}" onclick="setCohort(false)">All activity this week</button>
    <span style="color:var(--muted)">${cohort?'Booked/Done/Purchased/Revenue = only patients whose lead came in that same week — a true forward cohort (rates ≤100%).':'Booked/Done/Purchased/Revenue = everything that happened that week, incl. older/repeat patients.'}</span></div>`;

  // 2) WEEKLY MOVEMENT (matrix with nested breakdowns)
  h+=`<div class="shead"><h2>The funnel, last 6 weeks — with breakdowns</h2><span class="sub2">latest on the right · <b style="color:var(--good)">green = high</b> / <b style="color:var(--bad)">red = low</b> per row · ▲▼ vs prior week · ▾ collapse a stage · click a trend to zoom</span></div>`;
  h+=matrix(M);

  h+=`<div class="note"><b>Sources.</b> Reach: Google = the Indiranagar location-asset (Assets→Location), by category; GMB = Business-Profile insights (no category). Leads: <b>inbound calls</b> from the AI call audit, clinic-attributed by caller intent and split by channel — <b>Paid Google call</b> (city call-asset #), <b>GMB organic call</b> (clinic listing #), <b>Other</b> (shared pool) — and by category (STI/SH/MH/Other); web from UTM; organic/Practo from CRM. Booked → Done → Purchased → Revenue: exact Redshift (Screening Calls × diagnosis × paid invoices). <b>Mental Health note:</b> demand (reach + calls) splits STI/SH/MH/Other, but the consultation <i>diagnosis</i> has no MH tag — so on the booked→revenue side MH sits inside <b>Other</b> (only STI &amp; SH are clinically separable). Lead→book can exceed 100% when bookings include repeat/walk-in patients beyond tracked new leads.</div>`;

  $('app').innerHTML=h;
}
$('wPrev').onclick=()=>{if(wk<D._meta.weeks.length-1){wk++;render();}};
$('wNext').onclick=()=>{if(wk>0){wk--;render();}};
Promise.all([
  fetch('data_indiranagar.json?v='+Date.now()).then(r=>r.json()),
  fetch('data_indiranagar_pool.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_practo_by_doctor.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_indiranagar_attribution.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_indiranagar_journey.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_bangalore_attribution.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
]).then(([j,p,pd,at,jr,ba])=>{D=j;POOL=p;PD=pd;AT=at;JOURNEY=jr;BA=ba;wk=0;render();})
  .catch(()=>{$('app').innerHTML='<div class="note">Could not load data_indiranagar.json — run scripts/assemble_indiranagar.py.</div>';});
</script>
