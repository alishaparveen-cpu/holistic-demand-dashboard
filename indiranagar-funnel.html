<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Indiranagar — Clinic Funnel</title>
<script>if(!sessionStorage.getItem('allo_dash_auth'))location.replace('index.html');</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F4EE;--card:#fff;--ink:#1A2B26;--muted:#7C8A82;--line:#E5E2D9;--accent:#1F6F5C;--accent2:#3E6F8E;
  --good:#1F6F5C;--amber:#B8862E;--bad:#B23A2E;--vio:#7B5EA7;--gmb:#3E6F8E;--goog:#2E7D5B;--pr:#B8862E}
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);margin:0;font-size:13px;line-height:1.45}
.wrap{max-width:1180px;margin:0 auto;padding:18px 22px 80px}
a{color:inherit}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.back{font-size:12.5px;color:var(--muted);text-decoration:none}.back:hover{color:var(--accent)}
h1{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin:8px 0 2px}
.sub{color:var(--muted);font-size:13px;margin-bottom:16px}
.wknav{display:flex;align-items:center;gap:2px;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.wknav button{width:34px;height:34px;border:none;background:transparent;color:var(--muted);font-size:15px;cursor:pointer}
.wknav button:hover{background:#F0EEE6;color:var(--ink)}.wknav button:disabled{opacity:.3;cursor:default}
.wknav .lab{padding:0 12px;font-size:13px;font-weight:600;min-width:150px;text-align:center}
.tog{display:inline-flex;gap:3px;background:#ECEAE1;border-radius:9px;padding:3px;margin-left:8px}
.tog button{border:none;background:transparent;padding:5px 12px;border-radius:7px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit}
.tog button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
.stage{margin:14px 0}
.stage-h{display:flex;align-items:baseline;gap:10px;margin:22px 0 9px}
.stage-n{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.stage-r{font-size:12px;color:var(--muted)}
.rate{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:#EDF2EF;color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:11px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;position:relative}
.card.z{cursor:zoom-in}.card.z:hover{border-color:#cfcabc}
.k{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.v{font-size:25px;font-weight:600;line-height:1}
.sub2{font-size:11.5px;color:var(--muted);margin-top:5px}
.wow{font-size:11px;font-weight:600}.up{color:var(--good)}.dn{color:var(--bad)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.note{background:#FBF9F3;border:1px dashed var(--line);border-radius:9px;padding:8px 12px;font-size:11.5px;color:var(--muted);margin:6px 0 0}
.catbar{display:flex;flex-direction:column;gap:5px;margin-top:9px}
.catrow{display:grid;grid-template-columns:74px 1fr 38px;align-items:center;gap:7px;font-size:11.5px}
.catrow .bar{height:8px;border-radius:4px;background:#EDEAE0;overflow:hidden}
.catrow .fill{height:100%;border-radius:4px}
.catrow .cn{color:var(--muted)}.catrow .cv{text-align:right;font-weight:600}
.sp{display:block}
.zhint{position:absolute;top:11px;right:12px;font-size:11px;color:#C3BDAE}
.flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:4px 0 2px;font-size:12px;color:var(--muted)}
.flow b{color:var(--ink)}
.modal{position:fixed;inset:0;background:rgba(20,28,24,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:16px;padding:22px 24px;max-width:760px;width:100%}
.mbox h3{font-family:'Fraunces',serif;margin:0 0 2px;font-size:20px}
.mclose{float:right;cursor:pointer;color:var(--muted);font-size:20px;border:none;background:none}
.lgd{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">← Dashboard</a>
    <div class="wknav"><button id="wPrev">‹</button><span class="lab" id="wLab">—</span><button id="wNext">›</button></div>
  </div>
  <h1>Indiranagar · Bangalore</h1>
  <div class="sub" id="sub">Clinic-level demand funnel — reach → leads → bookings → done → purchased → revenue, with category breakdowns.</div>
  <div id="app"></div>
</div>
<div class="modal" id="modal"><div class="mbox"><button class="mclose" onclick="closeZ()">✕</button><h3 id="mTitle"></h3><div id="mBody"></div></div></div>
<script>
let D=null, wk=0, reachMode='separate';
const $=id=>document.getElementById(id);
const N=v=>v==null?'—':(+v).toLocaleString('en-IN');
const PCT=v=>v==null?'—':v.toFixed(1)+'%';
const RUP=v=>v==null?'—':'₹'+Math.round(v).toLocaleString('en-IN');
const CCOL={SH:'#2E7D5B',STD:'#B8862E',STI:'#B8862E',MH:'#7B5EA7',ED:'#3E6F8E','ED+':'#3E6F8E','PE+':'#5B9E8C','ED+PE+':'#8E6FB0',NSSD:'#9E8E5B',Brand:'#6B6B6B',Other:'#B0A99A',oth:'#B0A99A'};
const wkLabel=w=>{const d=new Date(w);const e=new Date(d);e.setDate(d.getDate()+6);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+M[d.getMonth()]+'–'+e.getDate()+' '+M[e.getMonth()];};

function delta(arr){ if(!arr) return '';
  const a=arr[wk], b=arr[wk+1]; if(a==null||b==null) return '';
  const d=a-b; if(!d) return '<span class="wow" style="color:var(--muted)">±0</span>';
  const up=d>0; return `<span class="wow ${up?'up':'dn'}">${up?'▲':'▼'} ${Math.abs(Math.round(d)).toLocaleString('en-IN')}</span>`;}

// sparkline over all weeks (oldest→newest left→right); highlight current wk
function spark(arr,color){ if(!arr) return '';
  const v=arr.slice().reverse().map(x=>x==null?0:x); const n=v.length, mx=Math.max(1,...v);
  const W=190,H=34,pad=2; const x=i=>pad+i*(W-2*pad)/(n-1), y=val=>H-pad-(val/mx)*(H-2*pad);
  let p=''; v.forEach((val,i)=>{p+=(i?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';});
  const ci=n-1-wk; // current week position
  return `<svg class="sp" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><path d="${p}" fill="none" stroke="${color}" stroke-width="1.6"/>`+
    `<circle cx="${x(ci).toFixed(1)}" cy="${y(v[ci]).toFixed(1)}" r="2.6" fill="${color}"/></svg>`;}

// metric card with optional sparkline (zoomable) + sub
function card(label,val,opts={}){
  const {sub,arr,color='var(--accent)',dotc,wowArr,title}=opts;
  const z = arr? ' z':'';
  return `<div class="card${z}" ${arr?`onclick="zoom('${(title||label).replace(/'/g,'')}','${encodeURIComponent(JSON.stringify(arr))}','${color}')"`:''}>
    ${arr?'<span class="zhint">⤢</span>':''}
    <div class="k">${dotc?`<span class="dot" style="background:${dotc}"></span>`:''}${label}</div>
    <div class="v">${val}</div>
    ${wowArr!==undefined?`<div style="margin-top:5px">${delta(wowArr)}</div>`:''}
    ${sub?`<div class="sub2">${sub}</div>`:''}
    ${arr?`<div style="margin-top:8px">${spark(arr,color.replace('var(--accent)','#1F6F5C'))}</div>`:''}
  </div>`;}

function catBars(obj,keys,fmt=N){
  const vals=keys.map(k=>({k,v:(obj[k]&&obj[k][wk])||0})).filter(x=>x.v);
  const mx=Math.max(1,...vals.map(x=>x.v));
  if(!vals.length) return '<div class="sub2">No category data this week.</div>';
  return '<div class="catbar">'+vals.sort((a,b)=>b.v-a.v).map(x=>
    `<div class="catrow"><span class="cn">${x.k}</span><span class="bar"><span class="fill" style="width:${Math.round(x.v/mx*100)}%;background:${CCOL[x.k]||'#999'}"></span></span><span class="cv">${fmt(x.v)}</span></div>`).join('')+'</div>';}

function zoom(title,enc,color){
  const arr=JSON.parse(decodeURIComponent(enc)); $('mTitle').textContent=title;
  const W=700,H=300,pad=34; const v=arr.slice().reverse().map(x=>x==null?0:x), wks=D._meta.weeks.slice().reverse();
  const n=v.length,mx=Math.max(1,...v); const x=i=>pad+i*(W-2*pad)/(n-1),y=val=>H-pad-(val/mx)*(H-2*pad-10);
  let p='',bars='';
  v.forEach((val,i)=>{p+=(i?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';
    bars+=`<circle cx="${x(i).toFixed(1)}" cy="${y(val).toFixed(1)}" r="3" fill="${color}"><title>${wkLabel(wks[i])}: ${N(arr.slice().reverse()[i])}</title></circle>`;});
  let gl='';[0,.25,.5,.75,1].forEach(f=>{const yy=H-pad-(f*(H-2*pad-10));gl+=`<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#EEEBE2"/><text x="4" y="${yy+3}" font-size="10" fill="#999">${Math.round(mx*f).toLocaleString('en-IN')}</text>`;});
  let xl='';v.forEach((_,i)=>{if(i%2===0)xl+=`<text x="${x(i)}" y="${H-8}" font-size="9" fill="#999" text-anchor="middle">${wkLabel(wks[i]).split('–')[0]}</text>`;});
  $('mBody').innerHTML=`<svg width="100%" viewBox="0 0 ${W} ${H}">${gl}<path d="${p}" fill="none" stroke="${color}" stroke-width="2"/>${bars}${xl}</svg>
    <div class="lgd">12-week trend · hover a point for the week & value · current selection highlighted in the cards.</div>`;
  $('modal').classList.add('on');}
function closeZ(){$('modal').classList.remove('on');}
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeZ();});

function safeRate(a,b){ return (a!=null&&b)? a/b*100 : null; }

function render(){
  if(!D){$('app').innerHTML='<div class="note">Loading…</div>';return;}
  $('wLab').textContent=wkLabel(D._meta.weeks[wk]);
  $('wPrev').disabled=wk>=D._meta.weeks.length-1; $('wNext').disabled=wk<=0;
  const R=D.reach, L=D.leads, B=D.bottom, i=wk;
  const g=R.google, gm=R.gmb, cb=R.combined;
  let h='';

  // ---------- 1. REACH ----------
  h+=`<div class="stage-h"><span class="stage-n">1 · Reach</span>
      <span class="stage-r">Google paid (clinic catchment) + GMB listing · CTR = clicks ÷ impressions</span>
      <span class="tog" style="margin-left:auto">
        <button class="${reachMode==='separate'?'on':''}" onclick="reachMode='separate';render()">Separate</button>
        <button class="${reachMode==='together'?'on':''}" onclick="reachMode='together';render()">Together</button></span></div>`;
  if(reachMode==='together'){
    h+='<div class="grid">'
      +card('Impressions (Google+GMB)',N(cb.impr[i]),{arr:cb.impr,wowArr:cb.impr,color:'#1F6F5C',title:'Combined impressions'})
      +card('Clicks (Google+GMB)',N(cb.clicks[i]),{arr:cb.clicks,wowArr:cb.clicks,color:'#1F6F5C',title:'Combined clicks'})
      +card('CTR (combined)',PCT(cb.ctr[i]),{arr:cb.ctr,color:'#1F6F5C',title:'Combined CTR'})
      +'</div>';
  } else {
    h+='<div class="grid">'
      +card('Google impressions',N(g.impr[i]),{arr:g.impr,wowArr:g.impr,color:'#2E7D5B',dotc:'#2E7D5B',title:'Google impressions',sub:'users in Indiranagar'})
      +card('Google clicks',N(g.clicks[i]),{arr:g.clicks,wowArr:g.clicks,color:'#2E7D5B',dotc:'#2E7D5B',title:'Google clicks'})
      +card('Google CTR',PCT(g.ctr[i]),{arr:g.ctr,color:'#2E7D5B',dotc:'#2E7D5B',title:'Google CTR'})
      +card('GMB impressions',N(gm.impr[i]),{arr:gm.impr,wowArr:gm.impr,color:'#3E6F8E',dotc:'#3E6F8E',title:'GMB impressions',sub:'searches (search+maps)'})
      +card('GMB clicks',N(gm.clicks[i]),{arr:gm.clicks,wowArr:gm.clicks,color:'#3E6F8E',dotc:'#3E6F8E',title:'GMB clicks',sub:`calls ${N(gm.calls[i])} · web ${N(gm.website[i])} · dir ${N(gm.directions[i])}`})
      +card('GMB CTR',PCT(gm.ctr[i]),{arr:gm.ctr,color:'#3E6F8E',dotc:'#3E6F8E',title:'GMB CTR'})
      +'</div>';
    // Google impressions by category
    h+=`<div class="card" style="margin-top:11px"><div class="k">Google paid by category — impressions</div>${catBars(mapCat(g.by_cat,'impr'),['SH','STD','MH','ED','Brand','Other'])}</div>`;
  }
  h+=`<div class="note">Google paid is real clinic-catchment data (users physically in Indiranagar, from Google's geographic report) — by category from the campaign. GMB has no category. <b>Google paid <i>calls</i> can't be split below city</b> (one call-asset number per city), so they're not shown here.</div>`;

  // ---------- 2. LEADS ----------
  const c2l=safeRate(L.total[i], cb.clicks[i]);
  h+=`<div class="stage-h"><span class="stage-n">2 · Leads</span>
      <span class="rate">C2L ${PCT(c2l)}</span>
      <span class="stage-r">click → lead · clinic CRM leads by channel</span></div>`;
  const ch=L.by_chan;
  h+='<div class="grid">'
    +card('Total leads',N(L.total[i]),{arr:L.total,wowArr:L.total,color:'#1F6F5C',title:'Total leads'})
    +card('GMB (organic)',N(ch.gmb[i]),{arr:ch.gmb,color:'#3E6F8E',dotc:'#3E6F8E',title:'GMB leads'})
    +card('Google (web/UTM)',N(ch.google_web[i]),{arr:ch.google_web,color:'#2E7D5B',dotc:'#2E7D5B',title:'Google web leads'})
    +card('Organic',N(ch.organic[i]),{arr:ch.organic,color:'#7B5EA7',dotc:'#7B5EA7',title:'Organic leads'})
    +card('Practo',N(ch.practo[i]),{arr:ch.practo,color:'#B8862E',dotc:'#B8862E',title:'Practo leads'})
    +card('Other (FB/JD/…)',N((ch.fb[i]||0)+(ch.other[i]||0)),{color:'#B0A99A',dotc:'#B0A99A'})
    +'</div>';
  h+=`<div class="note">GMB organic calls (raw volume): <b>${N(L.gmb_call_volume[i])}</b> this week — the clinic's own GMB number, fully clinic-attributable. Paid Google calls route via a shared city number (not clinic-split).</div>`;
  // AI category split of audited calls
  const ai=L.ai, aic=ai.by_cat||{}; const auditCats=['STI','SH','MH','Other'];
  const aiHas=(ai.calls&&ai.calls[i]);
  h+=`<div class="card" style="margin-top:11px"><div class="k">AI call-audit — lead categories ${aiHas?'':' (no audited calls this week)'}</div>`;
  if(aiHas){
    const l2rl=safeRate(ai.relevant[i],ai.calls[i]);
    h+=`<div class="flow">Audited calls <b>${N(ai.calls[i])}</b> → relevant <b>${N(ai.relevant[i])}</b> <span class="rate">L2RL ${PCT(l2rl)}</span> · strong <b>${N(ai.strong[i])}</b></div>`;
    h+=catBars(aic,auditCats);
  } else { h+='<div class="sub2">The AI call audit covers recent weeks only — pick a more recent week to see STI/SH/MH split.</div>'; }
  h+='</div>';

  // ---------- 3-6 BOTTOM (exact, by diagnosis category) ----------
  const T=B.total, bc=B.by_cat, cats=B.cats||['STI','ED+','PE+','ED+PE+','NSSD','oth'];
  const l2b=safeRate(T.booked[i],L.total[i]), b2d=safeRate(T.done[i],T.booked[i]), d2p=safeRate(T.purchased[i],T.done[i]);
  const arpu = T.purchased[i]? T.rev[i]/T.purchased[i] : null;
  const catObj=f=>{const o={};cats.forEach(c=>o[c]=bc[c]?bc[c][f]:null);return o;};

  h+=`<div class="stage-h"><span class="stage-n">3 · Booked</span><span class="rate">L2B ${PCT(l2b)}</span><span class="stage-r">lead → screening-call booked</span></div>`;
  h+='<div class="grid">'+card('SC appointments booked',N(T.booked[i]),{arr:T.booked,wowArr:T.booked,color:'#1F6F5C',title:'Booked'})+'</div>';
  h+=`<div class="card" style="margin-top:11px"><div class="k">Booked by category (diagnosis)</div>${catBars(catObj('booked'),cats)}</div>`;

  h+=`<div class="stage-h"><span class="stage-n">4 · Done</span><span class="rate">B2D ${PCT(b2d)}</span><span class="stage-r">booked → completed (showed up)</span></div>`;
  h+='<div class="grid">'+card('Screening calls done',N(T.done[i]),{arr:T.done,wowArr:T.done,color:'#1F6F5C',title:'Done'})+'</div>';
  h+=`<div class="card" style="margin-top:11px"><div class="k">Done by category (diagnosis)</div>${catBars(catObj('done'),cats)}</div>`;

  h+=`<div class="stage-h"><span class="stage-n">5 · Purchased</span><span class="rate">D2P ${PCT(d2p)}</span><span class="stage-r">done → paid (treatment purchased)</span></div>`;
  h+='<div class="grid">'+card('Purchased (paid consults)',N(T.purchased[i]),{arr:T.purchased,wowArr:T.purchased,color:'#1F6F5C',title:'Purchased'})+'</div>';
  h+=`<div class="card" style="margin-top:11px"><div class="k">Purchased by category (diagnosis)</div>${catBars(catObj('purchased'),cats)}</div>`;

  h+=`<div class="stage-h"><span class="stage-n">6 · Revenue</span><span class="stage-r">paid-invoice ₹ · ARPU ${RUP(arpu)}/purchase</span></div>`;
  h+='<div class="grid">'+card('Revenue',RUP(T.rev[i]),{arr:T.rev,wowArr:T.rev,color:'#1F6F5C',title:'Revenue'})+'</div>';
  h+=`<div class="card" style="margin-top:11px"><div class="k">Revenue by category (diagnosis)</div>${catBars(catObj('rev'),cats,RUP)}</div>`;

  h+=`<div class="note" style="margin-top:14px"><b>Two category layers</b> (they don't map 1:1): <b>Reach &amp; leads</b> use marketing/intent categories (SH/STD/MH) and the AI audit (STI/SH/MH/Other); <b>booked → revenue</b> use the consultation's <i>diagnosis</i> (STI/ED+/PE+/ED+PE+/NSSD/oth). A diagnosis only exists once a patient is consulted, so no-show bookings sit in 'oth'.</div>`;

  $('app').innerHTML=h;
}
// remap geo by_cat {SH:{impr,clicks,ctr}} → {SH:[impr...]} for a given field
function mapCat(byCat,field){const o={};for(const k in byCat){o[k]=byCat[k][field];}return o;}

$('wPrev').onclick=()=>{if(wk<D._meta.weeks.length-1){wk++;render();}};
$('wNext').onclick=()=>{if(wk>0){wk--;render();}};
fetch('data_indiranagar.json?v='+Date.now()).then(r=>r.json()).then(j=>{D=j;wk=0;render();})
  .catch(e=>{$('app').innerHTML='<div class="note">Could not load data_indiranagar.json — run scripts/assemble_indiranagar.py.</div>';});
</script>
</body>
</html>
