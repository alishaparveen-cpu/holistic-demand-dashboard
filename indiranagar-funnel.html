<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Indiranagar — Clinic Funnel</title>
<script>if(!sessionStorage.getItem('allo_dash_auth'))location.replace('index.html');</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F4EE;--sheet:#fff;--inset:#F4F2EB;--ink:#1A2B26;--ink2:#52605A;--muted:#8A8A80;--faint:#B0A99A;
  --line:#E5E2D9;--line2:#EEEBE2;--accent:#1F6F5C;--accentd:#1A5E4E;--good:#1F6F5C;--goodbg:#EDF4F0;--bad:#B23A2E;--badbg:#FBEEEC;--warn:#B8862E;--r:12px;
  --goog:#2E7D5B;--gmb:#3E6F8E;--vio:#7B5EA7;--pr:#B8862E}
*{box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);margin:0;font-size:13px;line-height:1.45}
.wrap{max-width:1240px;margin:0 auto;padding:18px 22px 90px}
a{color:inherit}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.back{font-size:12.5px;color:var(--muted);text-decoration:none}.back:hover{color:var(--accent)}
h1{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin:8px 0 2px}
.sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.wknav{display:flex;align-items:center;gap:2px;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.wknav button{width:34px;height:34px;border:none;background:transparent;color:var(--muted);font-size:15px;cursor:pointer}
.wknav button:hover{background:#F0EEE6;color:var(--ink)}.wknav button:disabled{opacity:.3;cursor:default}
.wknav .lab{padding:0 12px;font-size:13px;font-weight:600;min-width:150px;text-align:center}
.shead{display:flex;align-items:baseline;gap:10px;margin:26px 0 9px}
.shead h2{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:0}
.shead .sub2{font-size:12px;color:var(--muted)}
/* funnel snapshot */
.funnel{display:flex;background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;overflow-x:auto}
.fcell{flex:1;min-width:104px;padding:13px 10px;border-right:1px solid var(--line2);text-align:center}
.fcell:last-child{border-right:0}
.fcell .fk{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
.fcell .fv{font-family:'Fraunces',serif;font-size:23px;font-weight:600;margin-top:3px;line-height:1}
.fcell .fmeta{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.3}
.fcell .fmeta b{color:var(--accentd)}
.farrow{flex:0 0 72px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--inset);border-right:1px solid var(--line2)}
.farrow .conv{font-family:'JetBrains Mono';font-size:13px;font-weight:700;color:var(--accentd)}
.farrow .clab{font-size:8.5px;color:var(--muted);margin-top:1px;text-align:center}
.funnel-read{background:var(--sheet);border:1px solid var(--line);border-top:0;border-radius:0 0 var(--r) var(--r);padding:11px 16px;font-size:12.5px;color:var(--ink2);margin-top:-1px}
.funnel-read b{color:var(--ink)}
/* matrix */
.fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto}
table.fm{border-collapse:collapse;width:100%;font-size:12.5px;min-width:900px}
table.fm th{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:right;padding:9px 12px;background:var(--inset);border-bottom:1px solid var(--line);white-space:nowrap}
table.fm th:first-child{text-align:left}
table.fm th.lastcol{color:var(--accentd)}
table.fm td{padding:8px 12px;text-align:right;border-bottom:1px solid var(--line2);font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;white-space:nowrap}
table.fm td:first-child{text-align:left;font-family:'Inter'}
table.fm tr:last-child td{border-bottom:0}
tr.stage td{font-weight:700;font-size:13.5px;color:var(--ink)}
.snode{display:flex;align-items:center;gap:8px;font-weight:600;padding-left:9px;border-left:3px solid var(--accent)}
tr.edge td{color:var(--ink2);font-size:12px}
.edge-lbl{padding-left:21px;color:var(--muted);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.edge-lbl .formula{font-family:'JetBrains Mono';font-size:9.5px;color:var(--faint)}
.fm td.lastcol{font-weight:700}
.sparkcell{padding:3px 10px!important;cursor:zoom-in}.sparkcell:hover{background:var(--goodbg)}
.wowd{font-size:9.5px;font-weight:700;margin-top:2px}
/* category cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:11px}
.card{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px}
.card .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:9px}
.catbar{display:flex;flex-direction:column;gap:5px}
.catrow{display:grid;grid-template-columns:64px 1fr 52px;align-items:center;gap:7px;font-size:11.5px}
.catrow .bar{height:8px;border-radius:4px;background:var(--inset);overflow:hidden}
.catrow .fill{height:100%;border-radius:4px}
.catrow .cn{color:var(--muted)}.catrow .cv{text-align:right;font-weight:600}
.note{background:#FBF9F3;border:1px dashed var(--line);border-radius:9px;padding:9px 13px;font-size:11.5px;color:var(--muted);margin-top:12px}
.sp{display:block}
/* modal */
.modal{position:fixed;inset:0;background:rgba(20,28,24,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal.on{display:flex}
.mbox{background:#fff;border-radius:16px;padding:22px 24px;max-width:760px;width:100%}
.mbox h3{font-family:'Fraunces',serif;margin:0 0 2px;font-size:20px}
.mclose{float:right;cursor:pointer;color:var(--muted);font-size:20px;border:none;background:none}
.lgd{font-size:11.5px;color:var(--muted);margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">← Dashboard</a>
    <div class="wknav"><button id="wPrev">‹</button><span class="lab" id="wLab">—</span><button id="wNext">›</button></div>
  </div>
  <h1>Indiranagar · Bangalore</h1>
  <div class="sub">Clinic funnel — reach → leads → booked → done → purchased → revenue. Snapshot, week-by-week movement, and trend (click any sparkline to zoom).</div>
  <div id="app"></div>
</div>
<div class="modal" id="modal"><div class="mbox"><button class="mclose" onclick="closeZ()">✕</button><h3 id="mTitle"></h3><div id="mBody"></div></div></div>
<script>
let D=null, wk=0;
const $=id=>document.getElementById(id);
const N=v=>v==null||isNaN(v)?'—':Math.round(v).toLocaleString('en-IN');
const PCT=v=>v==null||isNaN(v)?'—':v.toFixed(1)+'%';
const RUP=v=>v==null||isNaN(v)?'—':'₹'+Math.round(v).toLocaleString('en-IN');
const Lk=v=>v==null?'—':v>=1000?'₹'+(v/1000).toFixed(1)+'k':'₹'+Math.round(v);
const CCOL={SH:'#2E7D5B',STD:'#B8862E',STI:'#B8862E',MH:'#7B5EA7',ED:'#3E6F8E','ED+':'#3E6F8E','PE+':'#5B9E8C','ED+PE+':'#8E6FB0',NSSD:'#9E8E5B',Brand:'#6B6B6B',Other:'#B0A99A',oth:'#B0A99A',
  'Inbound (call)':'#3E6F8E','Web/UTM':'#2E7D5B','Organic':'#7B5EA7','Practo':'#B8862E'};
const wkLabel=w=>{const d=new Date(w);const e=new Date(d);e.setDate(d.getDate()+6);
  const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return d.getDate()+' '+M[d.getMonth()]+'–'+e.getDate()+' '+M[e.getMonth()];};
const wkShort=w=>{const d=new Date(w);const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return d.getDate()+' '+M[d.getMonth()];};

// ---- derive every funnel metric as a 12-week array (newest-first, matching D._meta.weeks) ----
function metrics(){
  const R=D.reach, L=D.leads, B=D.bottom, NW=D._meta.weeks.length;
  const ch=L.by_chan, ai=L.ai;
  const arr=(f)=>Array.from({length:NW},(_,i)=>f(i)||0);
  const impr=R.combined.impr, clicks=R.combined.clicks;
  // call leads: AI audit (clinic-attributed, incl. paid) where present, else CRM GMB tag
  const callLeads=arr(i=>(ai.calls&&ai.calls[i])? ai.calls[i] : (ch.gmb[i]||0));
  const web=ch.google_web, org=ch.organic, pr=ch.practo, oth=arr(i=>(ch.fb[i]||0)+(ch.other[i]||0));
  const leads=arr(i=>callLeads[i]+(web[i]||0)+(org[i]||0)+(pr[i]||0)+oth[i]);
  const booked=B.total.booked, done=B.total.done, purch=B.total.purchased, rev=B.total.rev;
  const rate=(a,b)=>arr(i=>b[i]?a[i]/b[i]*100:null);
  return {impr,clicks,callLeads,web,org,pr,oth,leads,booked,done,purch,rev,
    gImpr:R.google.impr,gClk:R.google.clicks,mImpr:R.gmb.impr,mClk:R.gmb.clicks,
    ctr:rate(clicks,impr),c2l:rate(leads,clicks),l2b:rate(booked,leads),b2d:rate(done,booked),d2p:rate(purch,done),
    arpu:arr(i=>purch[i]?rev[i]/purch[i]:null)};
}

// ---- snapshot funnel (selected week) ----
function snapshot(M,i){
  const cell=(k,v,m)=>`<div class="fcell"><div class="fk">${k}</div><div class="fv">${v}</div><div class="fmeta">${m||'&nbsp;'}</div></div>`;
  const arrow=(c,l)=>`<div class="farrow"><div class="conv">${c}</div><div class="clab">${l}</div></div>`;
  return '<div class="funnel">'
   +cell('Impressions',N(M.impr[i]),`Google <b>${N(M.gImpr[i])}</b> · GMB <b>${N(M.mImpr[i])}</b>`)
   +arrow(PCT(M.ctr[i]),'CTR')
   +cell('Clicks',N(M.clicks[i]),`Google ${N(M.gClk[i])} · GMB ${N(M.mClk[i])}`)
   +arrow(PCT(M.c2l[i]),'click→lead')
   +cell('Leads (total)',N(M.leads[i]),`inbound <b>${N(M.callLeads[i])}</b> · web ${N(M.web[i])}`)
   +arrow(PCT(M.l2b[i]),'lead→book')
   +cell('Booked',N(M.booked[i]),'screening calls')
   +arrow(PCT(M.b2d[i]),'book→done')
   +cell('Done',N(M.done[i]),'consulted')
   +arrow(PCT(M.d2p[i]),'done→paid')
   +cell('Purchased',N(M.purch[i]),'treatment')
   +cell('Revenue',Lk(M.rev[i]),`ARPU ${RUP(M.arpu[i])}`)
   +'</div>';
}

// ---- weekly matrix (stages + edges × weeks, newest on the right, trend column) ----
const ROWS=[
  {k:'impr',  t:'stage',label:'Impressions',          fmt:N,  color:'#1F6F5C'},
  {k:'ctr',   t:'edge', label:'CTR',                   fmt:PCT,formula:'clicks ÷ impr'},
  {k:'clicks',t:'stage',label:'Clicks',               fmt:N,  color:'#2E7D5B'},
  {k:'c2l',   t:'edge', label:'Click → lead',          fmt:PCT,formula:'leads ÷ clicks'},
  {k:'leads', t:'stage',label:'Leads',                fmt:N,  color:'#3E6F8E'},
  {k:'l2b',   t:'edge', label:'Lead → book',           fmt:PCT,formula:'booked ÷ leads'},
  {k:'booked',t:'stage',label:'Booked',               fmt:N,  color:'#7B5EA7'},
  {k:'b2d',   t:'edge', label:'Book → done',           fmt:PCT,formula:'done ÷ booked'},
  {k:'done',  t:'stage',label:'Done',                 fmt:N,  color:'#B8862E'},
  {k:'d2p',   t:'edge', label:'Done → purchased',      fmt:PCT,formula:'purchased ÷ done'},
  {k:'purch', t:'stage',label:'Purchased',            fmt:N,  color:'#B8862E'},
  {k:'rev',   t:'stage',label:'Revenue',              fmt:RUP,color:'#1F6F5C'},
];
function matrix(M){
  const W=D._meta.weeks, NW=W.length;
  // columns oldest → newest
  const cols=[]; for(let j=NW-1;j>=0;j--) cols.push(j);
  let h='<div class="fmwrap"><table class="fm"><thead><tr><th>Stage &amp; transition</th>'
    +cols.map((ci,j)=>`<th class="${j===cols.length-1?'lastcol':''}">${wkShort(W[ci])}</th>`).join('')+'<th>trend</th></tr></thead><tbody>';
  ROWS.forEach(r=>{
    const s=M[r.k];
    let cells='';
    cols.forEach((ci,j)=>{const v=s[ci]; const last=j===cols.length-1;
      let wow='';
      if(last && v!=null && !isNaN(v) && s[1]!=null && !isNaN(s[1])){
        const d=v-s[1]; if(d){const up=d>0; const col=up?'var(--good)':'var(--bad)';
          wow=`<div class="wowd" style="color:${col}">${up?'▲':'▼'} ${r.fmt(Math.abs(d))}</div>`;}}
      cells+=`<td class="${last?'lastcol':''}">${v==null||isNaN(v)?'—':r.fmt(v)}${wow}</td>`;});
    const lbl=r.t==='stage'?`<div class="snode" style="border-color:${r.color}">${r.label}</div>`
      :`<div class="edge-lbl">↳ ${r.label}<span class="formula">${r.formula||''}</span></div>`;
    h+=`<tr class="${r.t}"><td>${lbl}</td>${cells}<td class="sparkcell" onclick="zoomK('${r.k}')">${spark(s,r.color||'#3E6F8E')}</td></tr>`;
  });
  return h+'</tbody></table></div>';
}

// sparkline (newest-first array → drawn oldest→newest)
function spark(arr,color){
  const v=arr.slice().reverse().map(x=>x==null||isNaN(x)?0:x); const n=v.length, mx=Math.max(1,...v);
  const W=150,H=30,pad=2; const x=i=>pad+i*(W-2*pad)/(n-1), y=val=>H-pad-(val/mx)*(H-2*pad);
  let p=''; v.forEach((val,i)=>{p+=(i?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';});
  return `<svg class="sp" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><path d="${p}" fill="none" stroke="${color}" stroke-width="1.6"/><circle cx="${x(n-1).toFixed(1)}" cy="${y(v[n-1]).toFixed(1)}" r="2.6" fill="${color}"/></svg>`;
}
let _M=null;
function zoomK(k){const r=ROWS.find(x=>x.k===k); if(!r)return; zoomShow(r.label, _M[k], r.fmt, r.color||'#3E6F8E', r.formula||'');}
function zoomShow(title,sNewestFirst,fmt,color,formula){
  $('mTitle').textContent=title;
  const W=700,H=300,pad=38; const wks=D._meta.weeks.slice().reverse();
  const v=sNewestFirst.slice().reverse().map(x=>x==null||isNaN(x)?null:x); const n=v.length;
  const mx=Math.max(1,...v.map(x=>x||0)); const x=i=>pad+i*(W-2*pad)/(n-1),y=val=>H-pad-((val||0)/mx)*(H-2*pad-10);
  let p='',pts='',started=false;
  v.forEach((val,i)=>{if(val==null)return; p+=(started?'L':'M')+x(i).toFixed(1)+','+y(val).toFixed(1)+' ';started=true;
    pts+=`<circle cx="${x(i).toFixed(1)}" cy="${y(val).toFixed(1)}" r="3" fill="${color}"><title>${wkShort(wks[i])}: ${fmt(val)}</title></circle>`;});
  let gl='';[0,.5,1].forEach(f=>{const yy=H-pad-(f*(H-2*pad-10));gl+=`<line x1="${pad}" y1="${yy}" x2="${W-pad}" y2="${yy}" stroke="#EEEBE2"/><text x="4" y="${yy+3}" font-size="10" fill="#999">${fmt(mx*f)}</text>`;});
  let xl='';v.forEach((_,i)=>{if(i%2===0)xl+=`<text x="${x(i)}" y="${H-10}" font-size="9" fill="#999" text-anchor="middle">${wkShort(wks[i])}</text>`;});
  $('mBody').innerHTML=`<div class="lgd" style="margin:0 0 6px">${formula}</div><svg width="100%" viewBox="0 0 ${W} ${H}">${gl}<path d="${p}" fill="none" stroke="${color}" stroke-width="2"/>${pts}${xl}</svg><div class="lgd">12-week trend · hover a point for week &amp; value.</div>`;
  $('modal').classList.add('on');
}
function closeZ(){$('modal').classList.remove('on');}
$('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeZ();});

// ---- category bars (selected week) ----
function catBars(obj,keys,fmt=N){
  const vals=keys.map(k=>({k,v:(obj[k]&&obj[k][wk])||0})).filter(x=>x.v);
  const mx=Math.max(1,...vals.map(x=>x.v));
  if(!vals.length) return '<div style="font-size:11.5px;color:var(--muted)">No data this week.</div>';
  return '<div class="catbar">'+vals.sort((a,b)=>b.v-a.v).map(x=>
    `<div class="catrow"><span class="cn">${x.k}</span><span class="bar"><span class="fill" style="width:${Math.round(x.v/mx*100)}%;background:${CCOL[x.k]||'#999'}"></span></span><span class="cv">${fmt(x.v)}</span></div>`).join('')+'</div>';}
function mapCat(byCat,field){const o={};for(const k in byCat){o[k]=byCat[k][field];}return o;}

function render(){
  if(!D){$('app').innerHTML='<div class="note">Loading…</div>';return;}
  $('wLab').textContent=wkLabel(D._meta.weeks[wk]);
  $('wPrev').disabled=wk>=D._meta.weeks.length-1; $('wNext').disabled=wk<=0;
  const M=metrics(); _M=M; const i=wk;
  const R=D.reach, L=D.leads, B=D.bottom, ai=L.ai, cats=B.cats;
  let h='';

  // 1) SNAPSHOT FUNNEL
  h+=`<div class="shead"><h2>The funnel</h2><span class="sub2">week of ${wkLabel(D._meta.weeks[i])}</span></div>`;
  h+=snapshot(M,i);
  h+=`<div class="funnel-read">Reach <b>${N(M.impr[i])}</b> impressions (Google ${N(M.gImpr[i])} + GMB ${N(M.mImpr[i])}) → <b>${N(M.clicks[i])}</b> clicks (CTR ${PCT(M.ctr[i])}) → <b>${N(M.leads[i])}</b> leads (call ${N(M.callLeads[i])} + web ${N(M.web[i])} + organic/Practo) → <b>${N(M.booked[i])}</b> booked → <b>${N(M.done[i])}</b> done (${PCT(M.b2d[i])}) → <b>${N(M.purch[i])}</b> purchased (${PCT(M.d2p[i])}) → <b>${RUP(M.rev[i])}</b>. <span style="color:var(--muted)">Lead→book can exceed 100% when bookings include repeat/walk-in patients beyond tracked new leads.</span></div>`;

  // 2) WEEKLY MOVEMENT (matrix)
  h+=`<div class="shead"><h2>The same funnel, week by week</h2><span class="sub2">latest on the right · ▲▼ = vs prior week · click a trend to zoom</span></div>`;
  h+=matrix(M);

  // 3) CATEGORY BREAKDOWNS (selected week)
  h+=`<div class="shead"><h2>By category</h2><span class="sub2">week of ${wkLabel(D._meta.weeks[i])} · reach &amp; call-leads use intent (SH/STD/MH); booked→revenue use diagnosis (STI/ED+/PE+)</span></div>`;
  h+='<div class="grid">';
  h+=`<div class="card"><div class="k">Google reach — impressions</div>${catBars(mapCat(R.google.by_cat,'impr'),['SH','STD','MH','ED','Brand','Other'])}</div>`;
  // Leads hierarchy: total → composition (inbound within total) → inbound split by category
  const comp={'Inbound (call)':M.callLeads,'Web/UTM':M.web,'Organic':M.org,'Practo':M.pr,'Other':M.oth};
  const inboundPct=M.leads[i]?Math.round(M.callLeads[i]/M.leads[i]*100):0;
  h+=`<div class="card"><div class="k">Leads — total ${N(M.leads[i])}, by source</div>${catBars(comp,['Inbound (call)','Web/UTM','Organic','Practo','Other'])}</div>`;
  h+=`<div class="card"><div class="k">↳ Inbound (call) leads — ${N(M.callLeads[i])} of ${N(M.leads[i])} (${inboundPct}%), split by category${ai.calls&&ai.calls[i]?` · ${N(ai.relevant[i])} relevant`:''}</div>${catBars(ai.by_cat||{},['STI','SH','MH','Other'])}</div>`;
  const catObj=f=>{const o={};cats.forEach(c=>o[c]=B.by_cat[c]?B.by_cat[c][f]:null);return o;};
  h+=`<div class="card"><div class="k">Booked — by diagnosis</div>${catBars(catObj('booked'),cats)}</div>`;
  h+=`<div class="card"><div class="k">Done — by diagnosis</div>${catBars(catObj('done'),cats)}</div>`;
  h+=`<div class="card"><div class="k">Purchased — by diagnosis</div>${catBars(catObj('purchased'),cats)}</div>`;
  h+=`<div class="card"><div class="k">Revenue — by diagnosis</div>${catBars(catObj('rev'),cats,RUP)}</div>`;
  h+='</div>';

  h+=`<div class="note"><b>Sources.</b> Reach: Google = the Indiranagar location-asset (Assets→Location, by caller's clinic); GMB = Business-Profile insights. Leads: call leads from the AI call audit (clinic-attributed by caller intent, incl. paid calls), web from UTM, organic/Practo from CRM. Booked/Done/Purchased/Revenue: exact Redshift (Screening Calls × diagnosis × paid invoices). Categories are two layers (intent vs diagnosis) — not 1:1.</div>`;

  $('app').innerHTML=h;
}
$('wPrev').onclick=()=>{if(wk<D._meta.weeks.length-1){wk++;render();}};
$('wNext').onclick=()=>{if(wk>0){wk--;render();}};
fetch('data_indiranagar.json?v='+Date.now()).then(r=>r.json()).then(j=>{D=j;wk=0;render();})
