<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Weekly Diagnostic · earliest broken stage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F6F4EE;--sheet:#fff;--inset:#F4F2EB;--ink:#1A2B26;--ink2:#52605A;--muted:#8A8A80;--faint:#B0A99A;
    --line:#E5E2D9;--line2:#EEEBE2;--accent:#1F6F5C;--good:#1F6F5C;--bad:#B23A2E;--warn:#B8862E;--r:12px;
    --gbg:#EAF1ED;--rbg:#FBEEEC;--abg:#FBF3E9;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.45 'Inter',-apple-system,sans-serif}
  .wrap{max-width:1200px;margin:0 auto;padding:20px 20px 90px}
  a.back{font-size:12.5px;color:var(--muted);text-decoration:none}a.back:hover{color:var(--accent)}
  h1{font-family:'Fraunces',serif;font-size:28px;font-weight:600;margin:8px 0 2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px;max-width:880px}
  .ctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .lab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  select{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:600;font-family:Inter;cursor:pointer}
  .fbtn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter}
  .fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .modebtn{background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:10px 18px;font-size:14px;font-weight:700;color:var(--ink2);cursor:pointer;font-family:Inter;transition:all .15s}
  .modebtn:hover{border-color:var(--accent)} .modebtn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(31,111,92,.2)}
  .mbtn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter}
  .mbtn:hover{border-color:var(--ink2)} .mbtn.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .cmpnote{color:var(--muted);font-size:11.5px;margin:-6px 0 14px}
  .chiprow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .ichip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter}
  .ichip b{color:var(--ink);margin-left:4px}.ichip.on{background:var(--accent);border-color:var(--accent);color:#fff}.ichip.on b{color:#fff}
  .ichip.zero{opacity:.4} .ichip:hover{border-color:var(--accent)}
  .densrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .ms{position:relative;display:inline-block}
  .mspanel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:40;background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:0 8px 26px rgba(0,0,0,.16);max-height:360px;overflow:auto;min-width:240px;padding:5px}
  .mspanel.on{display:block}
  .msq{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;margin-bottom:4px;font-family:Inter;box-sizing:border-box}
  .msact{display:flex;gap:12px;padding:4px 9px 6px;border-bottom:1px solid var(--line);margin-bottom:3px}.msact a{color:var(--accent);font-size:11px;font-weight:700;cursor:pointer}
  .msi{display:flex;align-items:center;gap:8px;padding:5px 9px;font-size:12.5px;cursor:pointer;border-radius:5px;white-space:nowrap}.msi:hover{background:var(--inset)} .msi .c{margin-left:auto;color:var(--muted);font-size:10.5px;font-family:'JetBrains Mono'}
  .mc{display:inline-block;min-width:26px;text-align:center;font-family:'JetBrains Mono';font-size:11px;font-weight:700;border-radius:5px;padding:2px 5px;margin-right:3px}
  .mc.base{background:var(--inset);color:var(--muted)} .mc.red{background:var(--rbg);color:#a8352a} .mc.amber{background:var(--abg);color:#8a6412} .mc.green{background:var(--gbg);color:var(--good)}
  .mlab{font-size:11px;color:var(--ink2);font-weight:600;margin-right:7px;display:inline-block;min-width:78px} .wc{font-size:10.5px;color:var(--bad);margin-left:6px} .fixt{font-size:10.5px;color:var(--muted);margin-left:8px}
  .slope{display:inline-block;font-weight:800;font-size:13px;margin-right:7px;width:13px;text-align:center;cursor:help}
  .slope.down{color:var(--bad)}.slope.amber{color:var(--warn)}.slope.up{color:var(--good)}.slope.flat{color:var(--faint)}
  .sp{cursor:zoom-in} .zsp{cursor:zoom-in;display:inline-block}
  .modal{position:fixed;inset:0;background:rgba(20,25,22,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.on{display:flex}
  .mbox{background:#fff;border-radius:14px;padding:18px 20px;max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .mhd{display:flex;justify-content:space-between;align-items:center;font-family:Fraunces;font-size:17px;font-weight:600;margin-bottom:6px;gap:12px}
  .mhd button{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted)}
  .pickbar{font-size:12px;color:var(--ink2);min-height:20px;margin:2px 0 6px}
  .pclear{color:var(--muted);cursor:pointer;font-size:11px;margin-left:6px} .pclear:hover{color:var(--bad)}
  .lgd{font-size:11px;color:var(--muted);margin-top:6px}
  /* ---- founder question chips ---- */
  .qgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:10px;margin-bottom:16px}
  .qc{background:var(--sheet);border:1px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;transition:box-shadow .15s}
  .qc:hover{box-shadow:0 4px 14px rgba(0,0,0,.07)}.qc.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(31,111,92,.14)}
  .qc .qn{font-size:26px;font-weight:700;font-family:'JetBrains Mono';line-height:1}
  .qc .ql{font-size:12px;color:var(--ink2);margin-top:5px;line-height:1.35}
  .qc.red .qn{color:var(--bad)}.qc.warn .qn{color:var(--warn)}.qc.acc .qn{color:var(--accent)}
  /* ---- scan table ---- */
  .fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto}
  table.fm{border-collapse:collapse;width:100%;font-size:12.5px;min-width:820px}
  table.fm th{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:center;padding:8px 10px;background:var(--inset);border-bottom:1px solid var(--line);white-space:nowrap}
  table.fm th:first-child{text-align:left}
  table.fm td{padding:7px 10px;text-align:center;border-bottom:1px solid var(--line2);white-space:nowrap;font-family:'JetBrains Mono';font-variant-numeric:tabular-nums}
  table.fm td:first-child{text-align:left;font-family:Inter;font-weight:600}
  table.fm tbody tr[onclick]{cursor:pointer}
  table.fm tbody tr[onclick]:hover td{background:var(--inset)}
  table.fm tbody tr[onclick]:hover td:first-child{color:var(--accent)}
  .drillco{color:var(--faint);font-weight:700;padding-left:6px}
  table.fm tbody tr[onclick]:hover .drillco{color:var(--accent)}
  tr.hide{display:none}
  .cell{display:inline-block;min-width:52px;border-radius:6px;padding:2px 7px;font-weight:700;font-size:12px}
  .cell.red{background:var(--rbg);color:#a8352a}.cell.amber{background:var(--abg);color:#8a6412}.cell.green{color:var(--muted);background:transparent}
  .brk{font-family:Inter;font-weight:700}.brk.red{color:var(--bad)}.brk.none{color:var(--muted);font-weight:500}
  .why{font-family:Inter;color:var(--ink2);text-align:left!important;font-size:11.5px;white-space:normal;max-width:320px}
  /* ---- per-clinic funnel (drill) ---- */
  .verdict{background:var(--sheet);border:1px solid var(--line);border-left:4px solid var(--bad);border-radius:var(--r);padding:14px 18px;margin-bottom:16px}
  .verdict.ok{border-left-color:var(--good)}
  .verdict .vh{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:3px}.verdict .vd{color:var(--ink2);font-size:13px;line-height:1.55}
  .stagerow{display:flex;align-items:stretch;gap:14px}
  .stage{flex:1;background:var(--sheet);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:var(--r);padding:13px 16px;cursor:pointer;transition:box-shadow .15s;display:flex;align-items:center;gap:14px}
  .stage:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
  .stage.red{border-left-color:var(--bad);background:linear-gradient(90deg,var(--rbg),var(--sheet) 60%)}
  .stage.amber{border-left-color:var(--warn);background:linear-gradient(90deg,var(--abg),var(--sheet) 60%)}
  .stage.green{border-left-color:var(--good)}
  .snum{width:32px;height:32px;flex:none;border-radius:9px;background:var(--inset);color:var(--accent);font-family:'JetBrains Mono';font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center}
  .stage.red .snum{background:var(--bad);color:#fff}.stage.amber .snum{background:var(--warn);color:#fff}.stage.green .snum{background:var(--good);color:#fff}
  .sbody{flex:1;min-width:0}.sname{font-weight:700;font-size:16px;color:var(--ink)}
  .sname.red{color:var(--bad)} .sname.amber{color:#8a6412}
  .sname .caret{font-size:11px;color:var(--faint);margin-left:7px;font-weight:600;vertical-align:middle}
  .ssub{color:var(--muted);font-size:12px;margin-top:2px}
  .sval{text-align:right;font-family:'JetBrains Mono';flex:none;min-width:104px}.sval .v{font-size:22px;font-weight:700}.sval .d{font-size:12px;font-weight:700;margin-top:1px}
  .up{color:var(--good)}.down{color:var(--bad)}.flat{color:var(--muted)}
  svg.sp{display:block}
  .chip{flex:none;width:180px;border-radius:10px;padding:9px 12px;font-size:11.5px;line-height:1.4;border:1px solid var(--line);background:var(--sheet);color:var(--muted)}
  .chip.red{border-color:#E6C5C0;background:var(--rbg);color:#7a2b22}.chip.amber{border-color:#E8D6B0;background:var(--abg);color:#7a5a12}
  .chip b{display:block;font-size:12.5px;color:inherit;margin-bottom:1px}
  .dtag{font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle;white-space:nowrap}
  .dtag.red{background:var(--rbg);color:#a8352a}.dtag.amber{background:var(--abg);color:#8a6412}
  .conn{height:16px;width:2px;background:var(--line);margin:0 auto}
  .drill{background:var(--inset);border:1px solid var(--line);border-radius:10px;margin:3px 0 4px;padding:12px 16px;display:none}.drill.open{display:block}
  table.d{border-collapse:collapse;width:100%;font-size:12px;table-layout:fixed}
  table.d td,table.d th{padding:5px 6px;text-align:right;font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  table.d td:first-child,table.d th:first-child{text-align:left;font-family:Inter;font-weight:600;width:172px;white-space:normal;overflow-wrap:anywhere;padding-right:8px}
  table.d td:last-child,table.d th:last-child{width:96px}
  table.d thead th{font-size:8.5px!important}
  table.d thead th{font-family:'JetBrains Mono';font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line)}
  table.d td.last{color:var(--accent);font-weight:700}
  table.d tr.subr td{font-size:11px;color:var(--ink2)} table.d tr.subr td:first-child{padding-left:18px;font-weight:500;color:var(--muted)}
  .dhead{font-family:Fraunces;font-size:14px;font-weight:600;margin-bottom:7px}
  /* ---- redesigned per-clinic funnel: readable stage cards ---- */
  .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:14px}
  .scard{background:var(--sheet);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:var(--r);padding:14px 16px 12px}
  .scard.red{border-left-color:var(--bad)} .scard.amber{border-left-color:var(--warn)} .scard.green{border-left-color:var(--good)}
  .scard-hd{display:flex;align-items:center;gap:12px;margin-bottom:9px}
  .scard-t{flex:1;min-width:0}
  .chartwrap{cursor:zoom-in;background:var(--inset);border-radius:9px;padding:9px 8px 4px;margin:2px 0 9px;position:relative}
  .chartwrap:hover{box-shadow:inset 0 0 0 1.5px var(--line)}
  .chartwrap .zhint{position:absolute;top:6px;right:9px;font-size:10px;color:var(--faint);opacity:0;transition:opacity .15s}
  .chartwrap:hover .zhint{opacity:1}
  .bchips{display:flex;flex-wrap:wrap;gap:7px 15px;font-size:12.5px;line-height:1.5}
  .bchip{display:inline-flex;align-items:baseline;gap:5px;color:var(--ink2)}
  .bchip .dot{width:9px;height:9px;border-radius:2px;display:inline-block;align-self:center}
  .bchip b{color:var(--ink);font-family:'JetBrains Mono';font-weight:700}
  .bchip .dd{font-family:'JetBrains Mono';font-size:11px;font-weight:700;margin-left:1px}
  .zero{color:var(--faint)} .err{color:var(--bad);padding:30px;text-align:center}
  /* redesigned toolbar */
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .tgroup{display:flex;align-items:center;gap:8px}
  .tlab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--inset)}
  .seg .segbtn{background:none;border:none;padding:8px 15px;font-size:13.5px;font-weight:700;color:var(--ink2);cursor:pointer;font-family:Inter;transition:background .15s}
  .seg .segbtn:hover{color:var(--ink)} .seg .segbtn.on{background:var(--accent);color:#fff}
  .hint{font-size:12px;color:var(--faint);margin-left:auto}
  .crumb{font-size:13.5px;font-weight:600;color:var(--ink);display:inline-flex;align-items:center;gap:0}
  .crumb .sep{color:var(--faint);margin:0 7px;font-weight:400}
  .crumb .cur{color:var(--accent)}
  .legend{display:inline-flex;gap:12px;align-items:center;font-size:11.5px;color:var(--ink2);background:var(--inset);border-radius:8px;padding:4px 11px}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Dashboard</a>
  <h1>Weekly Diagnostic</h1>
  <div class="sub">Two things, one place — <b>where are my clinics breaking</b>, and <b>how do they compare</b> on a metric week-by-week. Pick a view:</div>
  <!-- ── 1) what am I looking at + time window ── -->
  <div class="toolbar">
    <div class="tgroup"><span class="tlab">View</span>
      <div class="seg"><button class="segbtn on" id="vIssues" onclick="setView('issues')">⚠ Where are the issues?</button><button class="segbtn" id="vCompare" onclick="setView('compare')">📊 Overview</button></div>
    </div>
    <div class="tgroup" style="margin-left:auto"><span class="tlab">Compare</span>
      <select id="curn" onchange="setCurN(this.value)"></select>
      <span style="font-size:12px;font-weight:600;color:var(--faint)">vs</span>
      <select id="basen" onchange="setBaseN(this.value)"></select>
    </div>
  </div>
  <!-- metric picker (only in Compare view) -->
  <div class="ctrls" id="metricbar" style="display:none;gap:6px;margin:-2px 0 10px">
    <span class="tlab">Metric</span>
    <button class="mbtn" data-m="demand" onclick="setMet('demand')">Leads</button>
    <button class="mbtn" data-m="bookings" onclick="setMet('bookings')">Bookings</button>
    <button class="mbtn" data-m="done" onclick="setMet('done')">Done</button>
    <button class="mbtn" data-m="availability" onclick="setMet('availability')">Availability</button>
    <button class="mbtn" data-m="conversion" onclick="setMet('conversion')">book→done %</button>
    <button class="mbtn" data-m="velocity" onclick="setMet('velocity')">Bookings/active day</button>
  </div>
  <!-- ── 2) scope ── -->
  <div class="toolbar">
    <div class="tgroup"><span class="tlab">Scope</span>
      <div class="ms"><button class="fbtn" id="cityBtn" onclick="openCityMs(event)">All cities ▾</button><div class="mspanel" id="cityPanel"></div></div>
      <div class="ms"><button class="fbtn" id="clinBtn" onclick="openClinMs(event)">All clinics ▾</button><div class="mspanel" id="clinPanel"></div></div>
    </div>
    <span class="hint">pick a <b>City</b> to narrow · one <b>Clinic</b> (or click a row) opens its funnel</span>
  </div>
  <div class="cmpnote" id="cmpnote"></div>
  <div id="root"></div>
</div>
<div class="modal" id="modal" onclick="if(event.target===this)closeZ()"><div class="mbox"><div class="mhd"><span id="mTitle"></span><button onclick="closeZ()" title="close">✕</button></div><div id="pickBar" class="pickbar"></div><div id="mBody"></div></div></div>
<script>
let D=null, CURN=1, BASEN=4, MODE='ov', C=null, OPEN={}, QF='any', CITYF=new Set(), CLINF=new Set(), DENSITY='compact', MET='break';
function inCity(city){return !CITYF.size||CITYF.has(city);}
function inScope(slug){return CLINF.size?CLINF.has(slug):inCity(D.clinics[slug].city);}   // explicit clinics win, else city filter
function cityStr(){if(CLINF.size)return CLINF.size+' clinic'+(CLINF.size===1?'':'s')+' selected';return CITYF.size?(CITYF.size<=2?[...CITYF].join(', '):CITYF.size+' cities'):'All cities';}
const $=id=>document.getElementById(id);
const mean=a=>{const b=a.filter(x=>x!=null);return b.length?b.reduce((x,y)=>x+y,0)/b.length:null;};
const sum=a=>a.reduce((x,y)=>x+(y||0),0);
function fmt(v,d){return v==null?'—':(d?(Math.round(v*10)/10):Math.round(v)).toLocaleString('en-IN');}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
// slope of the shown window: distinguishes a steady week-on-week slide from a single bad week
function slopeInfo(win){
  const v=win.filter(x=>x!=null);const n=v.length;if(n<3)return null;
  const my=v.reduce((a,b)=>a+b,0)/n;const mx=(n-1)/2;let num=0,den=0;
  for(let i=0;i<n;i++){num+=(i-mx)*(v[i]-my);den+=(i-mx)*(i-mx);}
  const spct=(den&&my)?(num/den)/my:0;                 // fractional change per week
  let down=0;for(let i=1;i<n;i++)if(v[i]<v[i-1])down++;const downFrac=down/(n-1);
  const prior=v.slice(0,-1),pAvg=prior.reduce((a,b)=>a+b,0)/prior.length;
  const lastVsPrior=pAvg?(v[n-1]-pAvg)/pAvg:0;         // is the drop only the latest week?
  if(spct<=-0.02&&downFrac>=0.5)return {sym:'↘',cls:'down',t:'Sliding — a steady week-on-week decline ('+Math.round(spct*100)+'%/wk), not a blip.'};
  if(lastVsPrior<=-0.12&&spct>-0.02)return {sym:'⚡',cls:'amber',t:'One-off — mostly the latest week ('+Math.round(lastVsPrior*100)+'% vs the weeks before); earlier weeks were steady.'};
  if(spct>=0.02)return {sym:'↗',cls:'up',t:'Rising — trending up (+'+Math.round(spct*100)+'%/wk).'};
  return {sym:'→',cls:'flat',t:'Steady — no clear week-on-week trend.'};
}
function slopeBadge(win){const s=slopeInfo(win);return s?'<span class="slope '+s.cls+'" title="'+s.t+'">'+s.sym+'</span>':'<span class="slope flat"></span>';}
const SLOPE_LEG='<span class="slope down">↘</span>sliding · <span class="slope amber">⚡</span>one-off · <span class="slope flat">→</span>steady';
const STAGES=[
  {key:'availability',num:1,name:'Availability',short:'Avail',sub:'active days · available hours',diag:'Clinic closed / fewer days',fix:'Ops · roster',
   metrics:c=>[{nm:'active days',arr:c.availability.active_days,fmtd:0},{nm:'↳ weekday days',arr:c.availability.wday_days,fmtd:0},{nm:'↳ weekend days',arr:c.availability.wend_days,fmtd:0},{nm:'available hours',arr:c.availability.avail_hours||c.availability.hours,fmtd:0},{nm:'↳ screening-call available hours',arr:c.availability.hours,fmtd:0}],headline:0},
  {key:'bookings',num:2,name:'Bookings',short:'Book',sub:'SC bookings — fresh / carry-in / rebook / relapse',diag:'Fewer SC bookings',fix:'Demand / PCC',
   metrics:c=>[{nm:'SC bookings',arr:c.bookings.total,fmtd:0}],headline:0,
   tax:c=>[{nm:'↳ fresh — lead this week',arr:c.bookings.new_tw},{nm:'↳ older-week lead (carry-in)',arr:c.bookings.new_old},{nm:'↳ rebooked (never done)',arr:c.bookings.rebook},{nm:'↳ relapse (done before)',arr:c.bookings.relapse}]},
  {key:'conversion',num:3,name:'Book → done',short:'B→D',sub:'book→done % — processing of demand',diag:'Conversion drop — front-desk / follow-up',fix:'Clinic / PCC',

function metricChips(c,stageKey){
  const st=STAGES.find(x=>x.key===stageKey),m=st.metrics(c)[0],ev=evalMetric(m.arr),a=m.arr.slice(-(CURN+BASEN));
  const chips=a.map((v,i)=>{const cur=i>=a.length-CURN;const val=v==null?'·':(m.pct?Math.round(v)+'%':(Math.round(v*10)/10));return '<span class="mc '+(cur?ev.st:'base')+'">'+val+'</span>';}).join('');
  return {ev,chips,nm:m.nm,pct:m.pct,a};
}
function renderMetric(){
  const st=STAGES.find(x=>x.key===MET);
  let rows=Object.keys(D.clinics).filter(inScope).map(slug=>({slug,c:D.clinics[slug],mc:metricChips(D.clinics[slug],MET)}));
  rows.sort((a,b)=>(a.mc.ev.d==null?9:a.mc.ev.d)-(b.mc.ev.d==null?9:b.mc.ev.d));   // worst drop first
  const nred=rows.filter(r=>r.mc.ev.st==='red').length, namb=rows.filter(r=>r.mc.ev.st==='amber').length;
  let h='<div class="chiprow"><span class="ichip on" style="cursor:default">'+st.name+'</span>'
    +'<span style="font-size:12px;color:var(--ink2);align-self:center;margin-left:4px">comparing every clinic on <b>'+st.metrics(D.clinics[rows[0]?rows[0].slug:Object.keys(D.clinics)[0]])[0].nm+'</b> · '
    +'<span style="color:var(--bad)">🔴 '+nred+' dropped</span> · <span style="color:var(--warn)">🟡 '+namb+'</span> · sorted worst→best</span></div>';
  h+='<div class="densrow"><span class="lab" style="text-transform:none;font-weight:600;color:var(--ink2)">'+rows.length+' clinic'+(rows.length===1?'':'s')+' · '+cityStr()+'</span></div>';
  h+='<div class="fmwrap"><table class="fm" style="min-width:640px"><thead><tr><th>Clinic</th><th style="text-align:left">recent '+(CURN+BASEN)+' wks — '+st.name+' &nbsp;<span style="font-weight:500;text-transform:none;color:var(--faint)">'+SLOPE_LEG+'</span></th><th style="text-align:right">now vs before</th><th style="text-align:right">open ›</th></tr></thead><tbody>';
  if(!rows.length)h+='<tr><td colspan="4" style="color:var(--muted);padding:16px;text-align:left">No clinics.</td></tr>';
  rows.forEach(r=>{const e=r.mc.ev,pct=r.mc.pct,f=v=>v==null?'—':(pct?Math.round(v)+'%':(Math.round(v*10)/10));
    const dcell=(e.cur==null||e.d==null)?'<span class="flat">'+f(e.cur)+'</span>':'<b>'+f(e.cur)+'</b> <span class="flat">vs</span> '+f(e.base)+' &nbsp;<span class="'+(e.d>0?'up':e.d<0?'down':'flat')+'" style="font-weight:700">'+(e.d>0?'+':'')+Math.round(e.d*100)+'%</span>';
    h+='<tr onclick="goClinic(\''+r.slug+'\')" title="open funnel"><td>'+r.c.disp+'</td><td class="why">'+slopeBadge(r.mc.a)+r.mc.chips+'</td><td style="text-align:right;font-family:JetBrains Mono;white-space:nowrap">'+dcell+'</td><td class="drillco" style="text-align:right">›</td></tr>';});
  h+='</tbody></table></div>';
  $('root').innerHTML=h;
}
function goClinic(slug){CLINF=new Set([slug]);$('clinBtn').textContent=clinBtnLabel();$('clinBtn').classList.add('on');C=D.clinics[slug];MODE='cl';OPEN={};updateModeUI();render();}

// ---------- PER-CLINIC FUNNEL (readable stage cards) ----------
function renderClinic(){
  if(!C){$('root').innerHTML='';return;}
  ZREG=[];CURZ=null;
  const lbl=curLabel();$('cmpnote').innerHTML='Comparing <b>'+lbl.c+'</b> vs baseline <b>'+lbl.b+'</b> · red ≤ −15%, amber ≤ −7% · each chart shows the last 12 weeks — click to zoom full history.';
  const evs=STAGES.map(s=>evalStage(s,C));
  let h='<div style="margin-bottom:14px"><button class="modebtn" onclick="backToList()" style="padding:7px 14px;font-size:13px">← back to all clinics</button> <span class="lab" style="text-transform:none;font-weight:700;font-size:17px;color:var(--ink);margin-left:8px">'+C.disp+'</span></div>';
  h+='<div class="sgrid">';
  STAGES.forEach((s,i)=>{const e=evs[i],hm=e.hm,col=COL[e.status];
    let lineS=[],chipOnly=[];
    if(s.key==='availability'){lineS=[{label:'weekday days',arr:C.availability.wday_days,color:BPAL[0]},{label:'weekend days',arr:C.availability.wend_days,color:BPAL[1]}];chipOnly=[{label:'available hrs',arr:C.availability.avail_hours||C.availability.hours},{label:'screening-call hrs',arr:C.availability.hours}];}
    else if(s.key==='bookings'){lineS=[{label:'fresh',arr:C.bookings.new_tw,color:BPAL[0]},{label:'carry-in',arr:C.bookings.new_old,color:BPAL[1]},{label:'rebook',arr:C.bookings.rebook,color:BPAL[2]},{label:'relapse',arr:C.bookings.relapse,color:BPAL[3]}];}
    else if(s.key==='conversion'){chipOnly=[{label:'booked',arr:C.done.booked},{label:'done',arr:C.done.done}];}
    else if(s.key==='done'){const dc=C.done.by_cat;['SH','STI','MH','Other'].forEach((ct,k)=>{if(dc[ct]&&sum(dc[ct]))lineS.push({label:ct,arr:dc[ct],color:BPAL[k]});});}
    else if(s.key==='demand'){const bc=C.demand.by_channel;Object.keys(bc).sort((a,b)=>sum(bc[b])-sum(bc[a])).slice(0,5).forEach((ch,k)=>{if(sum(bc[ch]))lineS.push({label:ch,arr:bc[ch],color:BPAL[k]});});chipOnly=[{label:'lead→book%',arr:C.demand.lead_book_pct,pct:1}];}
    else if(s.key==='velocity'){const v=C.velocity;lineS=[{label:'per weekday',arr:v.per_weekday,color:BPAL[0]},{label:'per weekend',arr:v.per_weekend,color:BPAL[1]}];chipOnly=[{label:'wday bookings',arr:v.bk_wday},{label:'wend bookings',arr:v.bk_wend}];}
    const series=[{label:hm.nm,arr:hm.arr,color:col,main:true}].concat(lineS.map(l=>({label:l.label,arr:l.arr,color:l.color})));
    const zi=ZREG.length;ZREG.push({label:s.num+' · '+s.name,arr:hm.arr,col:col,pct:!!hm.pct});
    const chart=miniChart(series,D.week_labels,!!hm.pct);
    const chips=lineS.map(l=>bchip(l.label,l.arr,l.color,l.pct||0)).join('')+chipOnly.map(c=>bchip(c.label,c.arr,'var(--faint)',c.pct||0)).join('');
    const val=fmt(hm.ev.cur,hm.fmtd||(hm.pct?1:0))+(hm.pct?'%':''),was=fmt(hm.ev.base,hm.fmtd||(hm.pct?1:0))+(hm.pct?'%':'');
    h+='<div class="scard '+e.status+'">'
      +'<div class="scard-hd"><div class="snum">'+s.num+'</div><div class="scard-t"><div class="sname '+e.status+'">'+s.name+'</div><div class="ssub">'+s.sub+'</div></div>'
      +'<div class="sval"><div class="v">'+val+'</div><div class="d">'+dpct(hm.ev.d)+' <span class="flat" style="font-weight:500">was '+was+'</span></div></div></div>'
      +'<div class="chartwrap" onclick="zoomReg('+zi+')"><span class="zhint">⤢ zoom full history</span>'+chart+'</div>'
      +(chips?'<div class="bchips">'+chips+'</div>':'')
    +'</div>';});
  h+='</div>';
  $('root').innerHTML=h;
}
function drill(s,e){const wl=D.week_labels,NW=D.weeks.length,show=Math.min(NW,8);
  let h='<div class="drill'+(OPEN[s.key]?' open':'')+'" id="dr_'+s.key+'"><div class="dhead">'+s.num+' · '+s.name+' — recent '+show+' weeks</div>';
  h+='<table class="d"><thead><tr><th></th>'+wl.slice(NW-show).map((l,i)=>'<th class="'+(i===show-1?'last':'')+'">'+l+'</th>').join('')+'<th>trend</th></tr></thead><tbody>';
  const row=(nm,arr,pct,fmtd,col)=>{const sub=/^\s*[↳·▪]/.test(nm);const a=arr.slice(NW-show);return '<tr'+(sub?' class="subr"':'')+'><td>'+nm+'</td>'+a.map((v,i)=>'<td class="'+(i===a.length-1?'last':'')+'">'+(v==null?'<span class="zero">·</span>':fmt(v,fmtd||(pct?1:0))+(pct?'%':''))+'</td>').join('')+'<td>'+zspark(nm.replace(/^[↳·▪ ]+/,''),arr,col||'var(--ink2)',pct)+'</td></tr>';};
  if(!s.velMath)e.ms.forEach(m=>h+=row(m.nm,m.arr,m.pct,m.fmtd,COL[m.ev.st]));
  if(s.tax){s.tax(C).forEach(t=>{if(sum(t.arr))h+=row(t.nm,t.arr,0,0,'var(--ink2)');});}
  if(s.byChannel){const bc=s.byChannel(C);Object.keys(bc).sort((a,b)=>sum(bc[b])-sum(bc[a])).forEach(ch=>{if(sum(bc[ch]))h+=row('↳ '+ch,bc[ch],0,0);});}
  if(s.doneCat){const dc=s.doneCat(C);h+=row('booked (denom)',C.done.booked,0,0);['SH','STI','MH','Other'].forEach(ct=>{if(dc[ct]&&sum(dc[ct]))h+=row('↳ done · '+ct,dc[ct],0,0,'var(--ink2)');});}
  if(s.velMath){const v=C.velocity;
    h+=row('Weekday bookings',v.bk_wday,0,0);
    h+=row('↳ active weekdays',v.wday_days,0,0);
    h+=row('↳ bookings / active weekday',v.per_weekday,0,1,'var(--ink2)');
    h+=row('Weekend bookings',v.bk_wend,0,0);
    h+=row('↳ active weekend days',v.wend_days,0,0);
    h+=row('↳ bookings / active weekend',v.per_weekend,0,1,'var(--ink2)');
    h+=row('▪ bookings / active day (combined)',v.per_active_day,0,1,'var(--accent)');
    const i=NW-1,wd=v.wday_days[i],we=v.wend_days[i],bwd=v.bk_wday[i],bwe=v.bk_wend[i],tot=(wd+we)?((bwd+bwe)/(wd+we)).toFixed(1):'—';
    h+='</tbody></table><div style="font-size:11.5px;color:var(--ink2);margin-top:8px;line-height:1.5">'
      +'<b>How bookings/active-day is built</b> (latest week): weekday = '+bwd+' bookings ÷ '+wd+' active weekdays = <b>'+(wd?(bwd/wd).toFixed(1):'—')+'</b>; weekend = '+bwe+' ÷ '+we+' = <b>'+(we?(bwe/we).toFixed(1):'—')+'</b>. '
      +'Combined = ('+bwd+' + '+bwe+') ÷ ('+wd+' + '+we+') = <b>'+tot+'/day</b>. Weekends run hotter, so a lost weekend day hurts more.</div></div>';
    return h;}
  h+='</tbody></table></div>';return h;}
function tog(k){OPEN[k]=!OPEN[k];render();}

function setMode(m){MODE=m;syncMode();render();}
function syncMode(){updateModeUI();}
function render(){MODE==='ov'?renderOverview():renderClinic();}
let ALLCITIES=[];
function cityBtnLabel(){return (CITYF.size?(CITYF.size<=2?[...CITYF].join(', '):CITYF.size+' cities'):'All cities')+' ▾';}
function clinBtnLabel(){return (CLINF.size?(CLINF.size===1?D.clinics[[...CLINF][0]].loc:CLINF.size+' clinics'):'All clinics')+' ▾';}
function closePanels(){document.querySelectorAll('.mspanel').forEach(x=>x.classList.remove('on'));}
function openCityMs(e){e.stopPropagation();const p=$('cityPanel'),show=!p.classList.contains('on');closePanels();if(show){renderCityPanel('');p.classList.add('on');const q=$('cityQ');if(q)q.focus();}}
function renderCityPanel(q){q=(q||'').toLowerCase();const list=ALLCITIES.filter(c=>c.toLowerCase().includes(q));
  let h='<input id="cityQ" class="msq" placeholder="search city…" oninput="renderCityPanel(this.value)" onclick="event.stopPropagation()"><div class="msact"><a onclick="allCity(1)">select all</a><a onclick="allCity(0)">clear</a></div>';
  list.forEach(c=>{const n=Object.values(D.clinics).filter(x=>x.city===c).length;h+='<label class="msi" onclick="event.stopPropagation()"><input type="checkbox" '+(CITYF.has(c)?'checked':'')+' onchange="togCity(\''+c.replace(/'/g,"\\'")+'\')">'+c+'<span class="c">'+n+'</span></label>';});
  $('cityPanel').innerHTML=h;}
function cityChanged(){$('cityBtn').textContent=cityBtnLabel();$('cityBtn').classList.toggle('on',!!CITYF.size);
  try{localStorage.setItem('wd_city',JSON.stringify([...CITYF]));}catch(e){}
  if(CLINF.size)[...CLINF].forEach(s=>{if(!inCity(D.clinics[s].city))CLINF.delete(s);});$('clinBtn').textContent=clinBtnLabel();$('clinBtn').classList.toggle('on',!!CLINF.size);
  render();}
function togCity(c){CITYF.has(c)?CITYF.delete(c):CITYF.add(c);cityChanged();}
function allCity(on){CITYF=on?new Set(ALLCITIES):new Set();renderCityPanel($('cityQ')?$('cityQ').value:'');cityChanged();}
function openClinMs(e){e.stopPropagation();const p=$('clinPanel'),show=!p.classList.contains('on');closePanels();if(show){renderClinPanel('');p.classList.add('on');const q=$('clinQ');if(q)q.focus();}}
function renderClinPanel(q){q=(q||'').toLowerCase();
  const ks=Object.keys(D.clinics).filter(s=>inCity(D.clinics[s].city)&&D.clinics[s].disp.toLowerCase().includes(q)).sort((a,b)=>D.clinics[a].disp.localeCompare(D.clinics[b].disp));
  let h='<input id="clinQ" class="msq" placeholder="search clinic…" oninput="renderClinPanel(this.value)" onclick="event.stopPropagation()"><div class="msact"><a onclick="allClin(1)">select all</a><a onclick="allClin(0)">clear</a></div>';
  if(!ks.length)h+='<div class="msi" style="color:var(--muted)">no clinics</div>';
  ks.forEach(s=>{h+='<label class="msi" onclick="event.stopPropagation()"><input type="checkbox" '+(CLINF.has(s)?'checked':'')+' onchange="togClin(\''+s+'\')">'+D.clinics[s].disp+'</label>';});
  $('clinPanel').innerHTML=h;}
function clinChanged(){$('clinBtn').textContent=clinBtnLabel();$('clinBtn').classList.toggle('on',!!CLINF.size);
  if(CLINF.size===1){C=D.clinics[[...CLINF][0]];MODE='cl';OPEN={};}else{MODE='ov';}   // pick one clinic → its funnel; none/many → the list
  updateModeUI();render();}
function backToList(){CLINF=new Set();$('clinBtn').textContent=clinBtnLabel();$('clinBtn').classList.remove('on');MODE='ov';updateModeUI();render();}
function togClin(s){CLINF.has(s)?CLINF.delete(s):CLINF.add(s);clinChanged();}
function allClin(on){const q=$('clinQ')?$('clinQ').value.toLowerCase():'';const ks=Object.keys(D.clinics).filter(s=>inCity(D.clinics[s].city)&&D.clinics[s].disp.toLowerCase().includes(q));if(on)ks.forEach(s=>CLINF.add(s));else ks.forEach(s=>CLINF.delete(s));renderClinPanel($('clinQ')?$('clinQ').value:'');clinChanged();}
async function boot(){
  try{D=await fetch('data_weekly_diag.json').then(r=>r.json());}
  catch(e){$('root').innerHTML='<div class="err">Failed to load data_weekly_diag.json</div>';return;}
  ALLCITIES=[...new Set(Object.values(D.clinics).map(c=>c.city))].sort();
  try{const saved=JSON.parse(localStorage.getItem('wd_city')||'[]');if(Array.isArray(saved))saved.forEach(c=>{if(ALLCITIES.includes(c))CITYF.add(c);});}catch(e){}
  $('cityBtn').textContent=cityBtnLabel();$('cityBtn').classList.toggle('on',!!CITYF.size);
  $('clinBtn').textContent=clinBtnLabel();
  document.addEventListener('click',e=>{if(!e.target.closest('.ms'))closePanels();});
  fillSel('curn',CUR_PRESETS,CURN,'weeks');fillSel('basen',BASE_PRESETS,BASEN,'wks');
  C=D.clinics[Object.keys(D.clinics)[0]];syncMode();render();
}
window.addEventListener('DOMContentLoaded',boot);
</script>
</body>
