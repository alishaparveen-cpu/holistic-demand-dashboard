<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Quick Diagnostic · earliest broken stage</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#EDF3F9;--sheet:#fff;--inset:#E4EDF6;--hover:#D2E1F1;--ink:#16232E;--ink2:#44566A;--muted:#7B8A9B;--faint:#A6B4C3;
    --line:#D5DFEA;--line2:#E5ECF3;--accent:#2C6CAE;--good:#1F6F5C;--bad:#B23A2E;--warn:#B8862E;--r:12px;
    --gbg:#E5F0EB;--rbg:#FBEDEB;--abg:#FAF2E6;}
  *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 'Inter',-apple-system,sans-serif}
  .wrap{max-width:1340px;margin:0 auto;padding:16px 22px 80px}
  a.back{font-size:12.5px;color:var(--muted);text-decoration:none}a.back:hover{color:var(--accent)}
  h1{font-family:'Fraunces',serif;font-size:28px;font-weight:600;margin:8px 0 2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:14px;max-width:880px}
  .ctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .lab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  select{background:#fff;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:13px;font-weight:600;font-family:Inter;cursor:pointer}
  .fbtn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter}
  .fbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .modebtn{background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:10px 18px;font-size:14px;font-weight:700;color:var(--ink2);cursor:pointer;font-family:Inter;transition:all .15s}
  .modebtn:hover{border-color:var(--accent)} .modebtn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 3px 10px rgba(31,111,92,.2)}
  .mbtn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter}
  .mbtn:hover{border-color:var(--ink2)} .mbtn.on{background:var(--ink2);border-color:var(--ink2);color:#fff}
  .mbtn.primary{background:var(--ink);border-color:var(--ink);box-shadow:0 0 0 2px var(--accent)}
  .cmpnote{color:var(--muted);font-size:11.5px;margin:-6px 0 14px}
  .chiprow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
  .ichip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:Inter}
  .ichip b{color:var(--ink);margin-left:4px}.ichip.on{background:var(--accent);border-color:var(--accent);color:#fff}.ichip.on b{color:#fff}
  .ichip.zero{opacity:.4} .ichip:hover{border-color:var(--accent)}
  .densrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .ms{position:relative;display:inline-block}
  .mspanel{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:40;background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:0 8px 26px rgba(0,0,0,.16);max-height:360px;overflow:auto;min-width:240px;padding:5px}
  .mspanel.on{display:block}
  .msq{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:12.5px;margin-bottom:4px;font-family:Inter;box-sizing:border-box}
  .msact{display:flex;gap:12px;padding:4px 9px 6px;border-bottom:1px solid var(--line);margin-bottom:3px}.msact a{color:var(--accent);font-size:11px;font-weight:700;cursor:pointer}
  .msi{display:flex;align-items:center;gap:8px;padding:5px 9px;font-size:12.5px;cursor:pointer;border-radius:5px;white-space:nowrap}.msi:hover{background:var(--inset)} .msi .c{margin-left:auto;color:var(--muted);font-size:10.5px;font-family:'JetBrains Mono'}
  #docPanel{min-width:290px}
  .docclin{margin-left:auto;color:var(--muted);font-size:10.5px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;padding-left:10px}
  .mc{display:inline-block;min-width:34px;text-align:center;font-family:'JetBrains Mono';font-size:14px;font-weight:700;border-radius:6px;padding:5px 8px;margin-right:4px}
  .mc.base{background:var(--inset);color:var(--ink2);box-shadow:inset 0 0 0 1px var(--line)} .mc.red{background:var(--rbg);color:#a8352a} .mc.amber{background:var(--abg);color:#8a6412} .mc.green{background:var(--gbg);color:var(--good)}
  .mc.now{background:#fff;color:var(--ink);font-weight:800;box-shadow:inset 0 0 0 1.5px var(--line)}
  .metpk{display:inline-flex;align-items:center;gap:3px;min-width:104px;font-family:Inter;font-size:12px;color:var(--ink2);margin-right:10px;vertical-align:middle}
  .metpk b{min-width:52px;text-align:center;font-weight:700}
  .marr{cursor:pointer;color:var(--muted);font-weight:800;font-size:16px;line-height:1;padding:1px 5px;border-radius:5px}
  .marr:hover{color:var(--accent);background:var(--hover)}
  .metpk.peek{color:var(--accent)} .metpk.peek b{color:var(--accent)}
  .condgrp{display:inline-flex;align-items:center;gap:7px;background:var(--sheet);border:1px solid var(--line);border-radius:9px;padding:3px 5px 3px 10px}
  .condlab{font-size:12px;font-weight:700;color:var(--ink2)}
  .cseg-wrap{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .cseg{border:none;background:var(--inset);padding:4px 9px;font-size:12px;cursor:pointer;color:var(--muted);font-family:Inter;font-weight:600;border-right:1px solid var(--line)}
  .cseg:last-child{border-right:none}
  .cseg.on{background:var(--accent);color:#fff;box-shadow:inset 0 0 0 1px var(--accent)}
  .cseg:hover:not(.on){background:var(--hover);color:var(--ink)}
  .subsel{margin-left:5px;font-size:11.5px;border:1px solid var(--line);border-radius:6px;padding:3px 6px;background:var(--inset);font-family:Inter;font-weight:600;color:var(--accent);cursor:pointer;vertical-align:middle}
  .nvlbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--faint);margin-right:5px;letter-spacing:.03em}
  .avgmk{font-family:'JetBrains Mono';font-weight:800;font-size:14.5px;color:var(--ink2);white-space:nowrap;display:inline-flex;align-items:baseline;gap:0}
  .avgmk.avgbefore{margin-left:16px}.avgmk.avgnow{margin-left:10px}
  .crow .avgmk.avgbefore{margin-left:auto}   /* By-metric rows keep before/now pushed to the right */
  .avgmk.red{color:#a8352a}.avgmk.amber{color:#8a6412}.avgmk.green{color:var(--good)}
  .avgmk .avglab{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--faint);margin-right:4px;letter-spacing:.03em}
  .mlab{font-size:11px;color:var(--ink2);font-weight:600;margin-right:7px;display:inline-block;min-width:78px}
  .crow{display:flex;align-items:center;gap:6px;margin:3px 0;cursor:zoom-in;border-radius:7px;padding:2px 5px;transition:background .12s}
  .crow:hover{background:var(--hover)}
  .crow .clab{width:210px;flex:none;font-size:11.5px;font-weight:600;color:var(--ink2);white-space:normal;line-height:1.3}
  .crow .clab .mnm{color:var(--ink);font-weight:700} .crow .clab .mseg{color:var(--muted);font-weight:500;font-size:10.5px} .crow .clab .msub{color:var(--accent);font-weight:600;font-size:10.5px}
  .wc{font-size:10.5px;color:var(--bad);margin-left:6px} .fixt{font-size:10.5px;color:var(--muted);margin-left:8px}
  .slope{display:inline-block;font-weight:800;font-size:13px;margin-right:7px;width:13px;text-align:center;cursor:help}
  .slope.down{color:var(--bad)}.slope.amber{color:var(--warn)}.slope.up{color:var(--good)}.slope.flat{color:var(--faint)}
  .sp{cursor:zoom-in} .zsp{cursor:zoom-in;display:inline-block}
  .modal{position:fixed;inset:0;background:rgba(20,25,22,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.on{display:flex}
  .mbox{background:#fff;border-radius:14px;padding:18px 20px;max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .mhd{display:flex;justify-content:space-between;align-items:center;font-family:Fraunces;font-size:17px;font-weight:600;margin-bottom:6px;gap:12px}
  .mhd button{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted)}
  .pickbar{font-size:12px;color:var(--ink2);min-height:20px;margin:2px 0 6px}
  .pclear{color:var(--muted);cursor:pointer;font-size:11px;margin-left:6px} .pclear:hover{color:var(--bad)}
  .lgd{font-size:11px;color:var(--muted);margin-top:6px}
  /* ---- founder question chips ---- */
  .qgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:10px;margin-bottom:16px}
  .qc{background:var(--sheet);border:1px solid var(--line);border-radius:11px;padding:12px 14px;cursor:pointer;transition:box-shadow .15s}
  .qc:hover{box-shadow:0 4px 14px rgba(0,0,0,.07)}.qc.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(31,111,92,.14)}
  .qc .qn{font-size:26px;font-weight:700;font-family:'JetBrains Mono';line-height:1}
  .qc .ql{font-size:12px;color:var(--ink2);margin-top:5px;line-height:1.35}
  .qc.red .qn{color:var(--bad)}.qc.warn .qn{color:var(--warn)}.qc.acc .qn{color:var(--accent)}
  /* ---- scan table ---- */
  .fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto}
  table.fm{border-collapse:collapse;width:100%;font-size:13.5px;min-width:820px}
  table.fm th{font-family:'JetBrains Mono';font-size:13.5px;letter-spacing:.02em;text-transform:uppercase;color:var(--ink2);font-weight:700;text-align:center;padding:13px 12px;background:var(--inset);border-bottom:1px solid var(--line);white-space:nowrap}
  table.fm th:first-child{text-align:left}
  table.fm td{padding:11px 12px;text-align:center;border-bottom:1px solid var(--line2);white-space:nowrap;font-family:'JetBrains Mono';font-variant-numeric:tabular-nums}
  table.fm td:first-child{text-align:left;font-family:Inter;font-weight:600}
  table.fm tbody tr[onclick]{cursor:pointer}
  table.fm tbody tr[onclick]:hover td{background:var(--hover)}
  table.fm tbody tr[onclick]:hover td:first-child{color:var(--accent);font-weight:700}
  .drillco{color:var(--faint);font-weight:700;padding-left:6px}
  table.fm tbody tr[onclick]:hover .drillco{color:var(--accent)}
  tr.hide{display:none}
  .cell{display:inline-block;min-width:52px;border-radius:6px;padding:2px 7px;font-weight:700;font-size:12px}
  .cell.red{background:var(--rbg);color:#a8352a}.cell.amber{background:var(--abg);color:#8a6412}.cell.green{color:var(--muted);background:transparent}
  .brk{font-family:Inter;font-weight:700;white-space:nowrap}.brk.red{color:var(--bad)}.brk.amber{color:var(--warn)}.brk.green{color:var(--good);font-weight:600;opacity:.85}.brk.none{color:var(--muted);font-weight:500}
  .why{font-family:Inter;color:var(--ink2);text-align:left!important;font-size:13px;white-space:normal;max-width:420px}
  td.chipzoom{cursor:zoom-in} table.fm tbody tr[onclick]:hover td.chipzoom{background:var(--inset)!important;box-shadow:inset 0 0 0 1.5px var(--line)}
  tr.totalrow td{background:var(--inset);border-bottom:2px solid var(--line)} tr.totalrow td:first-child{color:var(--accent);font-weight:800}
  /* ---- per-clinic funnel (drill) ---- */
  .verdict{background:var(--sheet);border:1px solid var(--line);border-left:4px solid var(--bad);border-radius:var(--r);padding:14px 18px;margin-bottom:16px}
  .verdict.ok{border-left-color:var(--good)}
  .verdict .vh{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:3px}.verdict .vd{color:var(--ink2);font-size:13px;line-height:1.55}
  .stagerow{display:flex;align-items:stretch;gap:14px}
  .stage{flex:1;background:var(--sheet);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:var(--r);padding:14px 18px;transition:box-shadow .15s;display:flex;align-items:flex-start;gap:14px;cursor:default}
  .stage:hover{box-shadow:0 3px 12px rgba(20,50,80,.08)}
  .stage.red{border-left-color:var(--bad);background:linear-gradient(90deg,var(--rbg),var(--sheet) 60%)}
  .stage.amber{border-left-color:var(--warn);background:linear-gradient(90deg,var(--abg),var(--sheet) 60%)}
  .stage.green{border-left-color:var(--good)}
  .snum{width:32px;height:32px;flex:none;border-radius:9px;background:var(--inset);color:var(--accent);font-family:'JetBrains Mono';font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center}
  .stage.red .snum{background:var(--bad);color:#fff}.stage.amber .snum{background:var(--warn);color:#fff}.stage.green .snum{background:var(--good);color:#fff}
  .sbody{flex:1;min-width:0}.sname{font-weight:700;font-size:16px;color:var(--ink)}
  .sname.red{color:var(--bad)} .sname.amber{color:#8a6412}
  .sname .caret{font-size:11px;color:var(--faint);margin-left:7px;font-weight:600;vertical-align:middle}
  .ssub{color:var(--muted);font-size:12px;margin-top:2px}
  .sval{text-align:right;font-family:'JetBrains Mono';flex:none;min-width:132px}.sval .v{font-size:24px;font-weight:700}.sval .d{font-size:12px;font-weight:700;margin-top:1px}
  .sval .zsp{margin-left:auto;display:block}
  .up{color:var(--good)}.down{color:var(--bad)}.flat{color:var(--muted)}
  svg.sp{display:block}
  .chip{flex:none;width:180px;border-radius:10px;padding:9px 12px;font-size:11.5px;line-height:1.4;border:1px solid var(--line);background:var(--sheet);color:var(--muted)}
  .chip.red{border-color:#E6C5C0;background:var(--rbg);color:#7a2b22}.chip.amber{border-color:#E8D6B0;background:var(--abg);color:#7a5a12}
  .chip b{display:block;font-size:12.5px;color:inherit;margin-bottom:1px}
  .dtag{font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;margin-left:8px;vertical-align:middle;white-space:nowrap}
  .dtag.red{background:var(--rbg);color:#a8352a}.dtag.amber{background:var(--abg);color:#8a6412}
  .conn{height:16px;width:2px;background:var(--line);margin:0 auto}
  .drill{background:var(--inset);border:1px solid var(--line);border-radius:10px;margin:3px 0 4px;padding:12px 16px;display:none}.drill.open{display:block}
  table.d{border-collapse:collapse;width:100%;font-size:12px;table-layout:fixed}
  table.d td,table.d th{padding:5px 6px;text-align:right;font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  table.d td:first-child,table.d th:first-child{text-align:left;font-family:Inter;font-weight:600;width:172px;white-space:normal;overflow-wrap:anywhere;padding-right:8px}
  table.d td:last-child,table.d th:last-child{width:96px}
  table.d thead th{font-size:8.5px!important}
  table.d thead th{font-family:'JetBrains Mono';font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line)}
  table.d td.last{color:var(--accent);font-weight:700}
  table.d tr.subr td{font-size:11px;color:var(--ink2)} table.d tr.subr td:first-child{padding-left:18px;font-weight:500;color:var(--muted)}
  .dhead{font-family:Fraunces;font-size:14px;font-weight:600;margin-bottom:7px}
  /* ---- redesigned per-clinic funnel: readable stage cards ---- */
  .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:14px}
  .scard{background:var(--sheet);border:1px solid var(--line);border-left:4px solid var(--line);border-radius:var(--r);padding:14px 16px 12px}
  .scard.red{border-left-color:var(--bad)} .scard.amber{border-left-color:var(--warn)} .scard.green{border-left-color:var(--good)}
  .scard-hd{display:flex;align-items:center;gap:12px;margin-bottom:9px}
  .scard-t{flex:1;min-width:0}
  .chartwrap{cursor:zoom-in;background:var(--inset);border-radius:9px;padding:9px 8px 4px;margin:2px 0 9px;position:relative}
  .chartwrap:hover{box-shadow:inset 0 0 0 1.5px var(--line)}
  .chartwrap .zhint{position:absolute;top:6px;right:9px;font-size:10px;color:var(--faint);opacity:0;transition:opacity .15s}
  .chartwrap:hover .zhint{opacity:1}
  .bchips{display:flex;flex-wrap:wrap;gap:7px 15px;font-size:12.5px;line-height:1.5}
  .bchip{display:inline-flex;align-items:baseline;gap:5px;color:var(--ink2);cursor:pointer;border-radius:6px;padding:2px 6px;transition:background .12s}
  .bchip:hover{background:var(--hover)}
  .bchip .dot{width:9px;height:9px;border-radius:2px;display:inline-block;align-self:center}
  .bchip b{color:var(--ink);font-family:'JetBrains Mono';font-weight:700}
  .bchip .dd{font-family:'JetBrains Mono';font-size:11px;font-weight:700;margin-left:1px}
  .trend-cap{font-size:10px;color:var(--faint);text-align:right;margin-top:3px;letter-spacing:.02em}
  .frow{display:flex;flex-direction:row;align-items:center;gap:0;padding:4px 6px;cursor:zoom-in;border-radius:7px;overflow-x:auto}
  .frow:hover{background:var(--hover)}
  .fbody{margin-top:6px}
  .flab{width:290px;flex:none;font-size:12.5px;font-weight:600;color:var(--ink2);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fchange{flex:none;width:82px;display:inline-flex;justify-content:flex-start}
  .fslope{flex:none;width:30px;display:inline-flex;justify-content:center}
  .frow .mc{width:48px;flex:none;box-sizing:border-box;text-align:center;margin-right:3px}
  .fchange .mc{width:auto;min-width:auto;white-space:nowrap}   /* the %change pill keeps its natural width */
  .frow .avgmk{flex:none}
  .frow .avgmk.avgbefore{min-width:132px;margin-left:16px}
  .frow .avgmk.avgnow{margin-left:10px}
  .flab .dot{width:9px;height:9px;border-radius:2px;flex:none}
  .frow.head{background:var(--inset);border-radius:8px}
  .frow.head .flab{font-weight:800;color:var(--ink);font-size:14px}
  .fbreak{margin:4px 0 0 20px;padding-left:14px;border-left:2px solid var(--line2)}
  .fnow{font-family:'JetBrains Mono';font-weight:700;font-size:12.5px;margin-left:6px}
  .cmp{margin-left:auto;padding-left:16px;font-family:'JetBrains Mono';font-size:13.5px;color:var(--ink);white-space:nowrap}
  .cmp b{color:var(--ink);font-weight:800}
  .cmp .vsavg{color:var(--muted);font-weight:500;font-size:12px;margin:0 3px}
  .zero{color:var(--faint)} .err{color:var(--bad);padding:30px;text-align:center}
  /* redesigned toolbar */
  .toolbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .tgroup{display:flex;align-items:center;gap:8px}
  .tlab{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--inset)}
  .seg .segbtn{background:none;border:none;padding:8px 15px;font-size:13.5px;font-weight:700;color:var(--ink2);cursor:pointer;font-family:Inter;transition:background .15s}
  .seg .segbtn:hover{color:var(--ink)} .seg .segbtn.on{background:var(--accent);color:#fff}
  .hint{font-size:12px;color:var(--faint);margin-left:auto}
  .crumb{font-size:13.5px;font-weight:600;color:var(--ink);display:inline-flex;align-items:center;gap:0}
  .crumb .sep{color:var(--faint);margin:0 7px;font-weight:400}
  .crumb .cur{color:var(--accent)}
  .legend{display:inline-flex;gap:12px;align-items:center;font-size:11.5px;color:var(--ink2);background:var(--inset);border-radius:8px;padding:4px 11px}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Dashboard</a>
  <h1>Quick Diagnostic</h1>
  <!-- ── 1) what am I looking at + time window ── -->
  <div class="toolbar">
    <div class="tgroup" style="margin-left:auto"><span class="tlab">Compare</span>
      <select id="curn" onchange="setCurN(this.value)"></select>
      <span style="font-size:12px;font-weight:600;color:var(--faint)">vs</span>
      <select id="basen" onchange="setBaseN(this.value)"></select>
    </div>

<script>
let D=null, AGE={}, CURN=1, BASEN=4, MODE='ov', C=null, OPEN={}, QF='any', CITYF=new Set(), CLINF=new Set(), TIERF=new Set(), MATF=new Set(), DOCF=new Set(), SEG='offline', DENSITY='compact', MET='bookings', OVMODE='metric', METSEL=['bookings'], MCOND={}, MSUB={};
let QD=null, FUNNEL2='sc';   // SC/FU/Combined — data sourced from master demand (data_quick_diag.json)
function setFunnel2(v){FUNNEL2=v;['sc','fu','all'].forEach(x=>{const b=$('fn2'+x);if(b)b.classList.toggle('on',x===v);});applyVariant();if(MODE==='cl'&&C){const s=C._slug;C=D.clinics[s]||C;}render();}
function applyVariant(){   // overlay the matched SC/FU/Combined numbers onto each clinic (remapped to D.weeks)
  if(!QD)return; const dw=D.weeks, qw=QD.weeks, qi=qw.map(w=>dw.indexOf(w));
  const rm=arr=>{const o=Array(dw.length).fill(null);(arr||[]).forEach((v,i)=>{const g=qi[i];if(g>=0)o[g]=v;});return o;};
  const rmObj=o=>{const r={};for(const k in o){r[k]=Array.isArray(o[k])?rm(o[k]):rmObj(o[k]);}return r;};
  for(const slug in QD.clinics){const c=D.clinics[slug];if(!c)continue;const v=QD.clinics[slug][FUNNEL2];if(!v)continue;
    if(!c._slug)c._slug=slug;
    c.bookings=rmObj(v.bookings); c.done=rmObj(v.done); c.availability=Object.assign({},c.availability,rmObj(v.availability));
    c.velocity=rmObj(v.velocity); c.by_doctor=rmObj(v.by_doctor);
    if(v.revenue)c.revenue=rmObj(v.revenue); if(v.purchased)c.purchased=rmObj(v.purchased);}
}
// availability / leads / bookings-per-active-day don't exist for online (national telehealth, no clinics/roster)
function naMetric(c,key){return !!(c&&c._online)&&(key==='availability'||key==='demand'||key==='velocity');}
const T1CITIES=new Set(['Bangalore','Mumbai','Navi Mumbai','Pune','Hyderabad','Chennai']);
function tierOf(city){return T1CITIES.has(city)?'T1':'T2';}
function clinMonths(slug){const d=AGE[D.clinics[slug].loc];if(!d)return null;const t=Date.parse(d);return isNaN(t)?null:(Date.now()-t)/(1000*60*60*24*30.44);}
function matBucket(m){return m==null?null:(m<3?'<3mo':m<6?'3-6mo':m<12?'6-12mo':'>1yr');}
function inCity(city){return !CITYF.size||CITYF.has(city);}
function inScope(slug){const c=D.clinics[slug];
  const on=!!c._online;
  if(SEG==='offline'&&on)return false;
  if(SEG==='online'&&!on)return false;
  if(TIERF.size&&!TIERF.has(tierOf(c.city)))return false;
  if(MATF.size){const b=matBucket(clinMonths(slug));if(!b||!MATF.has(b))return false;}
  if(DOCF.size&&(!c.by_doctor||![...DOCF].some(dr=>c.by_doctor[dr])))return false;
  return CLINF.size?CLINF.has(slug):inCity(c.city);}
// scoped-clinic accessor: when doctors are selected in scope, rescale the doctor-attributable metrics
// (bookings, book→done, done, purchased, revenue, bookings/active-day) to just those doctors' slices.
// availability & leads aren't doctor-attributable, so they stay clinic-level.
function CL(slug){const c=D.clinics[slug];if(!DOCF.size||!c.by_doctor)return c;
  const sel=[...DOCF].filter(dr=>c.by_doctor[dr]);if(!sel.length)return c;
  const N=D.weeks.length,Z=()=>new Array(N).fill(0),add=(a,b)=>a.map((x,i)=>x+((b&&b[i])||0));
  let booked=Z(),done=Z(),purchased=Z(),rev=Z();
  sel.forEach(dr=>{const f=c.by_doctor[dr];booked=add(booked,f.booked);done=add(done,f.done);purchased=add(purchased,f.purchased);rev=add(rev,f.rev);});
  const ad=c.availability.active_days||Z();
  const pct=(n,d)=>n.map((x,i)=>d[i]?Math.round(100*x/d[i]):null),rate=(n,d)=>n.map((x,i)=>d[i]?Math.round(10*x/d[i])/10:null);
  const o=Object.assign({},c);
  o.bookings=Object.assign({},c.bookings,{total:booked});
  o.done=Object.assign({},c.done,{booked:booked,done:done,book_done_pct:pct(done,booked),by_cat:{}});   // no by_doctor×category split → drop cat breakdown while doctor-scoped
  o.purchased=Object.assign({},c.purchased||{},{total:purchased,by_cat:{}});
  o.revenue=Object.assign({},c.revenue||{},{rev:rev,by_cat:{}});
  o.velocity=Object.assign({},c.velocity,{bookings:booked,per_active_day:rate(booked,ad)});
  o.doctors={count:c.doctors?c.doctors.count:Z()};
  o.by_doctor=Object.fromEntries(sel.map(dr=>[dr,c.by_doctor[dr]]));
  return o;}
function scopeExtra(){const t=[...TIERF].map(x=>x==='T1'?'Tier 1':'Tier 2'),m=[...MATF];return t.concat(m);}
function cityStr(){let base=CLINF.size?CLINF.size+' clinic'+(CLINF.size===1?'':'s')+' selected':(CITYF.size?(CITYF.size<=2?[...CITYF].join(', '):CITYF.size+' cities'):'All cities');
  const ex=scopeExtra();return ex.length?base+' · '+ex.join(', '):base;}
const $=id=>document.getElementById(id);
const mean=a=>{const b=a.filter(x=>x!=null);return b.length?b.reduce((x,y)=>x+y,0)/b.length:null;};
const sum=a=>a.reduce((x,y)=>x+(y||0),0);
function fmt(v,d){return v==null?'—':(d?(Math.round(v*10)/10):Math.round(v)).toLocaleString('en-IN');}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
// slope of the shown window: distinguishes a steady week-on-week slide from a single bad week
function slopeInfo(win){
  const v=win.filter(x=>x!=null);const n=v.length;if(n<3)return null;
  const my=v.reduce((a,b)=>a+b,0)/n;const mx=(n-1)/2;let num=0,den=0;
  for(let i=0;i<n;i++){num+=(i-mx)*(v[i]-my);den+=(i-mx)*(i-mx);}
  const spct=(den&&my)?(num/den)/my:0;                 // fractional change per week
  let down=0;for(let i=1;i<n;i++)if(v[i]<v[i-1])down++;const downFrac=down/(n-1);
  const prior=v.slice(0,-1),pAvg=prior.reduce((a,b)=>a+b,0)/prior.length;
  const lastVsPrior=pAvg?(v[n-1]-pAvg)/pAvg:0;         // is the drop only the latest week?
  if(spct<=-0.02&&downFrac>=0.5)return {sym:'↘',cls:'down',t:'Sliding — a steady week-on-week decline ('+Math.round(spct*100)+'%/wk), not a blip.'};
  if(lastVsPrior<=-0.12&&spct>-0.02)return {sym:'⚡',cls:'amber',t:'One-off — mostly the latest week ('+Math.round(lastVsPrior*100)+'% vs the weeks before); earlier weeks were steady.'};
  if(spct>=0.02)return {sym:'↗',cls:'up',t:'Rising — trending up (+'+Math.round(spct*100)+'%/wk).'};
  return {sym:'→',cls:'flat',t:'Steady — no clear week-on-week trend.'};
}
function slopeBadge(win){const s=slopeInfo(win);return s?'<span class="slope '+s.cls+'" title="'+s.t+'">'+s.sym+'</span>':'<span class="slope flat"></span>';}
const SLOPE_LEG='<span class="slope down">↘</span>sliding · <span class="slope amber">⚡</span>one-off · <span class="slope flat">→</span>steady';
const STAGES=[
  {key:'availability',num:1,name:'Availability',short:'Avail',sub:'active days · available hours',diag:'Clinic closed / fewer days',fix:'Ops · roster',
   metrics:c=>[{nm:'active days',arr:c.availability.active_days,fmtd:0},{nm:'↳ weekday days',arr:c.availability.wday_days,fmtd:0},{nm:'↳ weekend days',arr:c.availability.wend_days,fmtd:0},{nm:'available hours',arr:c.availability.avail_hours||c.availability.hours,fmtd:0},{nm:'↳ screening-call available hours',arr:c.availability.hours,fmtd:0}],headline:0},
  {key:'bookings',num:2,name:'Bookings',short:'Book',sub:'new patients (fresh / carry-in) · repeat patients (never-done / relapse)',diag:'Fewer bookings',fix:'Demand / PCC',
   metrics:c=>[{nm:funnelWord()+' bookings',arr:c.bookings.total,fmtd:0}],headline:0,
   tax:c=>[{nm:'↳ fresh — lead this week',arr:c.bookings.new_tw},{nm:'↳ older-week lead (carry-in)',arr:c.bookings.new_old},{nm:'↳ rebooked (never done)',arr:c.bookings.rebook},{nm:'↳ relapse (done before)',arr:c.bookings.relapse}]},
  {key:'conversion',num:3,name:'Book → done',short:'B→D',sub:'book→done % — processing of demand',diag:'Conversion drop — front-desk / follow-up',fix:'Clinic / PCC',
   metrics:c=>[{nm:'book→done %',arr:c.done.book_done_pct,pct:1}],headline:0},
  {key:'done',num:4,name:'Done',short:'Done',sub:'completed · by category (SH/STI/MH)',diag:'Done dropped',fix:'Clinic / PCC',
   metrics:c=>[{nm:'done',arr:c.done.done,fmtd:0}],headline:0,doneCat:c=>c.done.by_cat},
  {key:'demand',num:5,name:'Leads',short:'Leads',sub:'leads · lead→book %',diag:'Channel break — GMB / Ads / Practo',fix:'Marketing',
   metrics:c=>[{nm:'leads',arr:c.demand.leads,fmtd:0},{nm:'lead→book % (tagged-lead ~)',arr:c.demand.lead_book_pct,pct:1}],headline:0,byChannel:c=>c.demand.by_channel},
  {key:'velocity',num:8,name:'Bookings / active day',short:'Bk/day',sub:'weekday·weekend weighted ⓘ',diag:'Capacity limit — scheduling / staffing',fix:'Ops · staffing',
   metrics:c=>[{nm:'bookings / active day',arr:c.velocity.per_active_day,fmtd:1}],headline:0,velMath:true},
  {key:'purchased',num:6,name:'Purchased',short:'Purch',sub:'paid after SC · by category',diag:'Fewer purchases',fix:'Clinic · sales',
   metrics:c=>[{nm:'purchased',arr:(c.purchased&&c.purchased.total)||[],fmtd:0}],headline:0,catCube:c=>c.purchased&&c.purchased.by_cat},
  {key:'revenue',num:7,name:'Revenue',short:'Rev',sub:'₹ from paid invoices · by category',diag:'Revenue dropped',fix:'Clinic · sales',
   metrics:c=>[{nm:'revenue (₹)',arr:(c.revenue&&c.revenue.rev)||[],fmtd:0}],headline:0,catCube:c=>c.revenue&&c.revenue.by_cat},
  {key:'doctors',num:9,name:'Doctors',short:'Docs',sub:'active providers · per-doctor drill',diag:'Fewer active doctors',fix:'Ops · staffing',
   metrics:c=>[{nm:'active doctors',arr:(c.doctors&&c.doctors.count)||[],fmtd:0}],headline:0,byDoctor:true},
];
const ISSUE_STAGES=[0,4,1,2,3,6,7,5];   // availability, leads, bookings, book→done, done, purchased, revenue, bk/day
const FUNNEL_ORDER=[0,4,1,2,3,6,7,5,8]; // the 8 agreed metrics in order, then Doctors (per-doctor drill) in the clinic funnel
function evalMetric(arr){const NW=arr.length;const cur=mean(arr.slice(NW-CURN));const base=mean(arr.slice(Math.max(0,NW-CURN-BASEN),NW-CURN));
  const d=(cur!=null&&base)?((cur-base)/base):null;const st=d==null?'green':d<=-0.15?'red':d<=-0.07?'amber':'green';return {cur,base,d,st};}
function evalStage(st,c){const ms=st.metrics(c).map(m=>({...m,ev:evalMetric(m.arr)}));
  let status='green';if(st.headline==='worst')status=ms.some(m=>m.ev.st==='red')?'red':ms.some(m=>m.ev.st==='amber')?'amber':'green';else status=ms[st.headline].ev.st;
  const hm=st.headline==='worst'?ms.slice().sort((a,b)=>(a.ev.d??0)-(b.ev.d??0))[0]:ms[st.headline];return {ms,status,hm};}
function summary(c){const s={};STAGES.forEach(st=>{const e=evalStage(st,c);s[st.key]={st:e.status,d:e.hm.ev.d,cur:e.hm.ev.cur,base:e.hm.ev.base,hm:e.hm,pct:e.hm.pct};});
  s.firstBreak=STAGES.findIndex(st=>s[st.key].st==='red');
  s.velRate=evalMetric(c.velocity.per_active_day);   // bookings/active-day for the 'velocity dropping' question
  const bc=c.demand.by_channel;let wc=null,wd=0;for(const ch in bc){const e=evalMetric(bc[ch]);if(e.d!=null&&e.d<wd&&sum(bc[ch].slice(-CURN-BASEN))>=3){wd=e.d;wc=ch;}}
  s.worstChan=wc?{ch:wc,d:wd}:null;return s;}
function spark(arr,col){const v=arr.map(x=>x==null?0:x);const n=v.length;const mx=Math.max(...v,1),mn=Math.min(...v,0),w=90,h=24,p=3;
  const x=i=>p+i*(w-2*p)/(n-1),y=val=>h-p-((val-mn)/((mx-mn)||1))*(h-2*p);
  return '<svg class="sp" width="'+w+'" height="'+h+'"><polyline fill="none" stroke="'+col+'" stroke-width="1.5" points="'+v.map((val,i)=>x(i).toFixed(1)+','+y(val).toFixed(1)).join(' ')+'"/><circle cx="'+x(n-1).toFixed(1)+'" cy="'+y(v[n-1]).toFixed(1)+'" r="2.3" fill="'+col+'"/></svg>';}
const COL={red:'var(--bad)',amber:'var(--warn)',green:'var(--good)'};
// ---------- click-to-zoom sparklines ----------
let ZREG=[],CURZ=null,PICKA=null,PICKB=null;
function zspark(label,arr,col,pct){const i=ZREG.length;ZREG.push({label,arr,col:col||'var(--ink2)',pct:!!pct});
  return '<span class="zsp" onclick="event.stopPropagation();zoomReg('+i+')" title="click to zoom">'+spark(arr,col)+'</span>';}
function zoomReg(i){openZoom(ZREG[i]);}
function fmtZ(v,pct){return v==null?'·':(pct?Math.round(v)+'%':(Math.round(v*10)/10).toLocaleString('en-IN'));}
function pickPt(i){if(PICKA===null)PICKA=i;else if(PICKB===null){if(i===PICKA)PICKA=null;else PICKB=i;}else{PICKA=i;PICKB=null;}if(CURZ)openZoom(CURZ);}
function clearPick(){PICKA=null;PICKB=null;if(CURZ)openZoom(CURZ);}
function closeZ(){$('modal').classList.remove('on');PICKA=null;PICKB=null;CURZ=null;}
function openZoom(z){if(!z)return;if(z!==CURZ){PICKA=null;PICKB=null;}CURZ=z;
  const WIN=Math.min(CURN+BASEN,z.arr.length);   // show only the selected window (current + baseline weeks)
  const F=v=>fmtZ(v,z.pct),labels=D.week_labels.slice(-WIN),col=z.col;
  $('mTitle').textContent=(z.noPrefix?'':(C?C.disp+' · ':''))+z.label;
  const W=700,H=300,pad=40,padT=26;
  const v=z.arr.slice(-WIN).map(x=>x==null||isNaN(x)?null:x),n=v.length;
  const valid=v.filter(x=>x!=null);const vmn=valid.length?Math.min(...valid):0,vmx=valid.length?Math.max(...valid):1,rng=(vmx-vmn)||Math.abs(vmx)||1;
  const lo=Math.max(0,vmn-rng*0.18),hi=vmx+rng*0.18;
  const x=i=>pad+i*(W-2*pad)/((n-1)||1),y=val=>{let yy=H-pad-((val-lo)/((hi-lo)||1))*(H-pad-padT);return yy<padT?padT:(yy>H-pad?H-pad:yy);};
  let p='',pts='',lbls='',prev=null;
  v.forEach((val,i)=>{if(val==null){prev=null;return;}if(prev!=null)p+='<line x1="'+x(prev.i).toFixed(1)+'" y1="'+y(prev.v).toFixed(1)+'" x2="'+x(i).toFixed(1)+'" y2="'+y(val).toFixed(1)+'" stroke="'+col+'" stroke-width="2"/>';prev={i,v:val};
    const sel=(i===PICKA||i===PICKB);
    pts+='<circle cx="'+x(i).toFixed(1)+'" cy="'+y(val).toFixed(1)+'" r="13" fill="transparent" style="cursor:pointer" onclick="pickPt('+i+')"></circle><circle cx="'+x(i).toFixed(1)+'" cy="'+y(val).toFixed(1)+'" r="'+(sel?5.5:3.2)+'" fill="'+(sel?(i===PICKA?'#1F6F5C':'#C2691F'):col)+'" stroke="'+(sel?'#fff':col)+'" stroke-width="'+(sel?2:0)+'" style="cursor:pointer" onclick="pickPt('+i+')"><title>'+labels[i]+': '+F(val)+'</title></circle>';
    lbls+='<text x="'+x(i).toFixed(1)+'" y="'+(y(val)-9).toFixed(1)+'" font-size="11" fill="'+col+'" text-anchor="middle" font-weight="700">'+F(val)+'</text>';});
  let gl='';[0,.5,1].forEach(f=>{const yy=H-pad-(f*(H-pad-padT));gl+='<line x1="'+pad+'" y1="'+yy+'" x2="'+(W-pad)+'" y2="'+yy+'" stroke="#EEEBE2"/><text x="4" y="'+(yy+3)+'" font-size="10" fill="#999">'+F(lo+f*(hi-lo))+'</text>';});
  const rot=n>8;const Hv=rot?H+44:H;let xl='';labels.forEach((L,i)=>{const lx=x(i).toFixed(1),ly=(H-pad+15).toFixed(1);if(rot)xl+='<text x="'+lx+'" y="'+ly+'" font-size="9" fill="#999" text-anchor="end" transform="rotate(-40 '+lx+' '+ly+')">'+L+'</text>';else xl+='<text x="'+lx+'" y="'+(H-9)+'" font-size="9" fill="#999" text-anchor="middle">'+L+'</text>';});
  const avg=valid.length?valid.reduce((a,b)=>a+b,0)/valid.length:null;
  let avgLine='';if(avg!=null){const ya=y(avg);avgLine='<line x1="'+pad+'" y1="'+ya.toFixed(1)+'" x2="'+(W-pad)+'" y2="'+ya.toFixed(1)+'" stroke="'+col+'" stroke-width="1.3" stroke-dasharray="6 4" opacity="0.5"/>';}
  let connector='';if(PICKA!=null&&PICKB!=null&&v[PICKA]!=null&&v[PICKB]!=null)connector='<line x1="'+x(PICKA).toFixed(1)+'" y1="'+y(v[PICKA]).toFixed(1)+'" x2="'+x(PICKB).toFixed(1)+'" y2="'+y(v[PICKB]).toFixed(1)+'" stroke="#C2691F" stroke-width="1.6" stroke-dasharray="5 3"/>';
  $('mBody').innerHTML='<svg width="100%" viewBox="0 0 '+W+' '+Hv+'">'+gl+avgLine+connector+p+pts+lbls+xl+'</svg><div class="lgd">oldest→newest · '+n+' weeks · dashed = average'+(avg!=null?' ('+F(avg)+')':'')+'</div>';

function miniChart(series,labels,pct){
  const W=720,H=176,pad=36,padT=16,padB=28,SHOW=Math.min(labels.length,12),off=labels.length-SHOW;
  const L=labels.slice(off),n=L.length;
  const S=series.map(s=>({...s,v:s.arr.slice(off).map(x=>x==null||isNaN(x)?null:x)}));
  let all=[];S.forEach(s=>s.v.forEach(x=>{if(x!=null)all.push(x);}));
  const vmn=all.length?Math.min(...all):0,vmx=all.length?Math.max(...all):1,rng=(vmx-vmn)||Math.abs(vmx)||1;
  const lo=Math.max(0,vmn-rng*0.12),hi=vmx+rng*0.20;
  const x=i=>pad+i*(W-pad-10)/((n-1)||1),y=v=>H-padB-((v-lo)/((hi-lo)||1))*(H-padB-padT);
  const F=v=>v==null?'':(pct?Math.round(v)+'%':(Math.round(v*10)/10));
  let gl='';[0,.5,1].forEach(f=>{const yy=H-padB-(f*(H-padB-padT));gl+='<line x1="'+pad+'" y1="'+yy.toFixed(1)+'" x2="'+(W-10)+'" y2="'+yy.toFixed(1)+'" stroke="#EAE6DB"/><text x="2" y="'+(yy+3).toFixed(1)+'" font-size="10" fill="#B0A99A">'+F(lo+f*(hi-lo))+'</text>';});
  let xl='';L.forEach((l,i)=>{if(n>7&&i%2===1&&i!==n-1)return;xl+='<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" font-size="9.5" fill="#8A8A80" text-anchor="middle">'+l.split('–')[0].split(' → ')[0]+'</text>';});
  let lines='';S.forEach(s=>{let prev=null;s.v.forEach((val,i)=>{if(val==null){prev=null;return;}if(prev!=null)lines+='<line x1="'+x(prev.i).toFixed(1)+'" y1="'+y(prev.v).toFixed(1)+'" x2="'+x(i).toFixed(1)+'" y2="'+y(val).toFixed(1)+'" stroke="'+s.color+'" stroke-width="'+(s.main?2.6:1.4)+'" opacity="'+(s.main?1:0.8)+'"/>';prev={i,v:val};});});

  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'+gl+xl+lines+mk+'</svg>';
}

function funnelWord(){return FUNNEL2==='fu'?'Follow-up':FUNNEL2==='all'?'SC + FU':'SC';}   // SC·demand / FU·ops / All funnel variant
function metricNameFull(key){const fw=funnelWord();switch(key){   // outcome metrics carry the SC/FU/All variant; leads is demand-side (variant-agnostic)
  case 'availability':return 'Availability · active days'+(FUNNEL2==='sc'?'':' ('+fw+')');
  case 'demand':return 'Leads';
  case 'bookings':return fw+' bookings';
  case 'conversion':return fw+' book → done %';
  case 'done':return fw+' done (completed)';
  case 'purchased':return fw+' purchased (paid)';
  case 'revenue':return fw+' revenue (₹)';
  case 'velocity':return fw+' bookings / active day';
  case 'doctors':return 'Active doctors';
  default:return key;}}
function metricLabelHTML(key){const sub=MSUB[key];
  return '<span class="mnm">'+metricNameFull(key)+'</span><span class="mseg"> · '+segWord()+'</span>'+(sub?'<span class="msub"> · '+sub+'</span>':'');}
function metricLabelText(key){return metricNameFull(key)+' · '+segWord()+(MSUB[key]?' · '+MSUB[key]:'');}
function metricRow(c,key,disp){const st=STAGES.find(x=>x.key===key);
  if(naMetric(c,key))return '<div class="crow" style="cursor:default;opacity:.45"><span class="clab">'+metricLabelHTML(key)+'</span><span class="flat">—</span><span style="font-size:11px;color:var(--faint);margin-left:6px">n/a for online</span></div>';
  const m=st.metrics(c)[0],sub=MSUB[key],pct=sub?false:!!m.pct,arr=metricArr(c,key),ev=evalMetric(arr),a=arr.slice(-(CURN+BASEN));
  const zi=ZREG.length;ZREG.push({label:disp+' · '+metricLabelText(key),arr:arr,col:COL[ev.st]||'var(--ink2)',pct:pct,noPrefix:true});
  return '<div class="crow" onclick="event.stopPropagation();zoomReg('+zi+')"><span class="clab">'+metricLabelHTML(key)+'</span>'+pctPill(ev)+'<span style="margin:0 2px 0 6px">'+slopeBadge(a)+'</span>'+trendHTML(arr,pct,ev)+'</div>';}
function metricStack(c,disp){return METSEL.map(k=>metricRow(c,k,disp)).join('');}
function renderMetric(){
  ZREG=[];CURZ=null;
  const metrics=METSEL.map(k=>STAGES.find(x=>x.key===k)).filter(Boolean);
  if(!metrics.length){METSEL=['bookings'];MET='bookings';return renderMetric();}
  const primary=metrics[0];
  const scopeSlugs=Object.keys(D.clinics).filter(inScope);
  let rows=scopeSlugs.filter(slug=>{const c=CL(slug);return METSEL.every(k=>{const req=MCOND[k];return !req||!req.length||(!naMetric(c,k)&&req.includes(metricEval(c,k).ev.st));});})   // AND across metrics; within a metric, OR across the selected statuses
    .map(slug=>{const c=CL(slug);return{slug,c,pe:metricEval(c,primary.key).ev};});
  rows.sort((a,b)=>(a.pe.d==null?9:a.pe.d)-(b.pe.d==null?9:b.pe.d));   // worst on the primary (sorted) metric first
  const cc=(k)=>{const st=STAGES.find(x=>x.key===k),sel=MCOND[k]||[];
    const opt=(v,lab,on)=>'<button class="cseg'+(on?' on':'')+'" onclick="setCond(\''+k+'\',\''+v+'\')">'+lab+'</button>';
    const sd=subDims(k);let sub='';   // fifth level: apply the status + trend to a breakdown component
    if(sd&&sd.length>1){const cur=MSUB[k]||'';
      sub='<select class="subsel" title="narrow this metric to one breakdown (e.g. a lead channel or a category)" onchange="setSub(\''+k+'\',this.value)"><option value="">'+sd[0].label+'</option>'+sd.slice(1).map(d=>'<option value="'+d.label.replace(/"/g,'')+'"'+(cur===d.label?' selected':'')+'>'+d.label+'</option>').join('')+'</select>';}
    return '<span class="condgrp"><span class="condlab">'+st.short+'</span><span class="cseg-wrap">'+opt('any','any',!sel.length)+opt('red','🔴',sel.includes('red'))+opt('amber','🟡',sel.includes('amber'))+opt('green','🟢',sel.includes('green'))+'</span>'+sub+'</span>';};
  let h='<div class="densrow" style="gap:8px;flex-wrap:wrap"><span class="lab" style="text-transform:none;font-weight:600;color:var(--ink2)">'+rows.length+' clinic'+(rows.length===1?'':'s')+' · '+cityStr()+' · sorted by <b>'+primary.name+'</b></span>'
    +'<span style="display:inline-flex;gap:6px;flex-wrap:wrap;margin-left:4px">'+metrics.map(s=>cc(s.key)).join('')+'</span>'
    +'<button class="fbtn" style="padding:5px 13px;font-size:12px;font-weight:700" onclick="clearMet()">✕ clear all</button>'
    +'<span style="font-weight:500;color:var(--faint);font-size:11px;margin-left:auto">metric buttons ↑ add/remove rows · chips here set a required status (dropped/fine…) — clinics match ALL</span></div>';
  h+='<div class="fmwrap"><table class="fm" style="min-width:640px"><thead><tr><th style="white-space:nowrap">Clinic</th><th style="text-align:left">selected metrics · change · recent '+(CURN+BASEN)+' wks · before avg → now</th></tr></thead><tbody>';
  if(scopeSlugs.length>1){const agg=aggregate(scopeSlugs,'Total');
    h+='<tr class="totalrow" onclick="setOvMode(\'funnel\')" title="open the combined funnel"><td style="white-space:nowrap;width:1%">Σ Total · '+scopeSlugs.length+'</td><td class="why">'+metricStack(agg,'Total')+'</td></tr>';}
  if(!rows.length)h+='<tr><td colspan="2" style="color:var(--muted);padding:16px;text-align:left">No clinics match these conditions.</td></tr>';
  rows.forEach(r=>{h+='<tr onclick="goClinic(\''+r.slug+'\')" title="open funnel"><td style="white-space:nowrap;width:1%">'+r.c.disp+'</td><td class="why">'+metricStack(r.c,r.c.disp)+'</td></tr>';});
  h+='</tbody></table></div>';
  $('root').innerHTML=h;
}
function goClinic(slug){CLINF=new Set([slug]);$('clinBtn').textContent=clinBtnLabel();$('clinBtn').classList.add('on');C=CL(slug);MODE='cl';OPEN={};updateModeUI();render();}

// ---------- PER-CLINIC FUNNEL (funnel + colour chips, trend on click) ----------
function stageParts(s,o){   // breakdown series per stage: lineS = coloured components, chipOnly = off-scale, groups = 2-level nest
  let lineS=[],chipOnly=[],groups=null;
  if(s.key==='availability'){lineS=[{label:'weekday days',arr:o.availability.wday_days,color:BPAL[0]},{label:'weekend days',arr:o.availability.wend_days,color:BPAL[1]}];chipOnly=[{label:'available hrs',arr:o.availability.avail_hours||o.availability.hours},{label:'screening-call hrs',arr:o.availability.hours}];}
  else if(s.key==='bookings'){const B=o.bookings,ad=(x,y)=>x.map((v,i)=>(v||0)+((y&&y[i])||0));   // new patients (fresh/carry-in) vs repeat patients (rebooked/relapse)
    groups=[
      {label:'new patients',arr:ad(B.new_tw,B.new_old),color:BPAL[0],children:[
        {label:'fresh — lead this week',arr:B.new_tw,color:BPAL[0]},
        {label:'older-week lead (carry-in)',arr:B.new_old,color:BPAL[1]}]},
      {label:'repeat patients',arr:ad(B.rebook,B.relapse),color:BPAL[2],children:[
        {label:'never done before',arr:B.rebook,color:BPAL[2]},
        {label:'relapse — done before, booked again',arr:B.relapse,color:BPAL[3]}]}
    ];}
  else if(s.key==='conversion'){chipOnly=[{label:'booked',arr:o.done.booked},{label:'done',arr:o.done.done}];}
  else if(s.key==='done'){const dc=o.done.by_cat;['SH','STI','MH','Other'].forEach((ct,k)=>{if(dc[ct]&&sum(dc[ct]))lineS.push({label:ct,arr:dc[ct],color:BPAL[k]});});}
  else if(s.key==='demand'){const bc=o.demand.by_channel;Object.keys(bc).sort((a,b)=>sum(bc[b])-sum(bc[a])).slice(0,5).forEach((ch,k)=>{if(sum(bc[ch]))lineS.push({label:ch,arr:bc[ch],color:BPAL[k]});});chipOnly=[{label:'lead→book%',arr:o.demand.lead_book_pct,pct:1}];}
  else if(s.key==='velocity'){const v=o.velocity;lineS=[{label:'per weekday',arr:v.per_weekday,color:BPAL[0]},{label:'per weekend',arr:v.per_weekend,color:BPAL[1]}];chipOnly=[{label:'wday bookings',arr:v.bk_wday},{label:'wend bookings',arr:v.bk_wend}];}
  else if(s.key==='purchased'||s.key==='revenue'){const dc=(s.catCube&&s.catCube(o))||{};['SH','STI','MH','Other'].forEach((ct,k)=>{if(dc[ct]&&sum(dc[ct]))lineS.push({label:ct,arr:dc[ct],color:BPAL[k]});});}
  else if(s.key==='doctors'){const bd=o.by_doctor||{};Object.keys(bd).sort((a,b)=>sum(b&&bd[b].booked||[])-sum(a&&bd[a].booked||[])).slice(0,6).forEach((dr,k)=>{const bk=bd[dr].booked||[];if(sum(bk))lineS.push({label:dr.replace(/^Dr\.?\s*/,''),arr:bk,color:BPAL[k%BPAL.length]});});}
  return {lineS,chipOnly,groups};
}
// funnel body (stage rows + breakdown trend rows) for ANY clinic-shaped object (single clinic OR city aggregate)
function funnelStagesHTML(o){
  let h='<div class="lab" style="text-transform:none;font-weight:500;color:var(--faint);margin:-4px 0 10px">Top line of each stage = the headline metric (look here first); the rows nested below it are its breakdown. Each row: recent '+(CURN+BASEN)+' weeks, then <b>before avg → now</b> · click any row for its full trend.</div>';
  FUNNEL_ORDER.forEach((si,di)=>{const s=STAGES[si];
    if(o._online&&(s.key==='availability'||s.key==='demand'||s.key==='velocity'))return;   // n/a for online
    const e=evalStage(s,o),hm=e.hm,col=COL[e.status];
    const {lineS,chipOnly,groups}=stageParts(s,o);
    const head=miniRow(hm.nm,hm.arr,hm.pct,col,0,true);   // headline metric — the focus line (depth 0)
    const bd=(groups   // grouped: parent row (depth 1, e.g. new patients) then its children (depth 2)
        ? groups.map(g=>miniRow(g.label,g.arr,0,g.color,1)+g.children.map(ch=>miniRow(ch.label,ch.arr,0,ch.color,2)).join('')).join('')
        : lineS.map(l=>miniRow(l.label,l.arr,l.pct||0,l.color,1)).join('')
      )+chipOnly.map(c=>miniRow(c.label,c.arr,c.pct||0,'var(--faint)',1)).join('');   // breakdown — indent via label only
    h+='<div class="stagerow"><div class="stage '+e.status+'"><div class="snum">'+(di+1)+'</div>'
      +'<div class="sbody"><div class="sname '+e.status+'">'+s.name+'</div><div class="ssub">'+s.sub+'</div>'
        +'<div class="fbody">'+head+bd+'</div>'
      +'</div></div></div>';
    if(di<FUNNEL_ORDER.length-1)h+='<div class="conn"></div>';});
  return h;
}
// sum all in-scope clinics into one clinic-shaped object for a city-level (or any-scope) funnel
function aggregate(slugs,label){
  const N=D.weeks.length,Z=()=>new Array(N).fill(0),add=(a,b)=>a.map((v,i)=>(v||0)+(b?(b[i]||0):0));
  const a={disp:label,
    availability:{active_days:Z(),wday_days:Z(),wend_days:Z(),hours:Z(),avail_hours:Z()},
    demand:{leads:Z(),by_channel:{},lead_book_pct:Z()},
    bookings:{total:Z(),new_tw:Z(),new_old:Z(),rebook:Z(),relapse:Z()},
    done:{booked:Z(),done:Z(),book_done_pct:Z(),by_cat:{SH:Z(),STI:Z(),MH:Z(),Other:Z()}},
    purchased:{total:Z(),by_cat:{SH:Z(),STI:Z(),MH:Z(),Other:Z()}},
    revenue:{rev:Z(),by_cat:{SH:Z(),STI:Z(),MH:Z(),Other:Z()}},
    doctors:{count:Z()},by_doctor:{},
    velocity:{bookings:Z(),wday_days:Z(),wend_days:Z(),bk_wday:Z(),bk_wend:Z(),per_active_day:Z(),per_weekday:Z(),per_weekend:Z()}};
  slugs.forEach(sl=>{const c=CL(sl);
    ['active_days','wday_days','wend_days','hours','avail_hours'].forEach(k=>a.availability[k]=add(a.availability[k],c.availability[k]));
    a.demand.leads=add(a.demand.leads,c.demand.leads);
    for(const ch in c.demand.by_channel)a.demand.by_channel[ch]=add(a.demand.by_channel[ch]||Z(),c.demand.by_channel[ch]);
    ['total','new_tw','new_old','rebook','relapse'].forEach(k=>a.bookings[k]=add(a.bookings[k],c.bookings[k]));
    a.done.booked=add(a.done.booked,c.done.booked);a.done.done=add(a.done.done,c.done.done);
    ['SH','STI','MH','Other'].forEach(ct=>a.done.by_cat[ct]=add(a.done.by_cat[ct],c.done.by_cat[ct]));
    if(c.purchased){a.purchased.total=add(a.purchased.total,c.purchased.total);['SH','STI','MH','Other'].forEach(ct=>a.purchased.by_cat[ct]=add(a.purchased.by_cat[ct],(c.purchased.by_cat||{})[ct]));}
    if(c.revenue){a.revenue.rev=add(a.revenue.rev,c.revenue.rev);['SH','STI','MH','Other'].forEach(ct=>a.revenue.by_cat[ct]=add(a.revenue.by_cat[ct],(c.revenue.by_cat||{})[ct]));}
    if(c.doctors)a.doctors.count=add(a.doctors.count,c.doctors.count);
    if(c.by_doctor)for(const dr in c.by_doctor){const bd=a.by_doctor[dr]=a.by_doctor[dr]||{booked:Z(),done:Z(),purchased:Z(),rev:Z()};['booked','done','purchased','rev'].forEach(k=>bd[k]=add(bd[k],c.by_doctor[dr][k]));}
    ['bk_wday','bk_wend'].forEach(k=>a.velocity[k]=add(a.velocity[k],c.velocity[k]));});
  const newp=add(a.bookings.new_tw,a.bookings.new_old),rate=(num,den)=>num.map((v,i)=>den[i]?Math.round(v/den[i]*10)/10:null);
  a.demand.lead_book_pct=a.demand.leads.map((L,i)=>L?Math.round(100*newp[i]/L):null);
  a.done.book_done_pct=a.done.booked.map((B,i)=>B?Math.round(100*a.done.done[i]/B):null);
  a.velocity.bookings=a.bookings.total;a.velocity.wday_days=a.availability.wday_days;a.velocity.wend_days=a.availability.wend_days;
  a.velocity.per_active_day=rate(a.bookings.total,a.availability.active_days);
  a.velocity.per_weekday=rate(a.velocity.bk_wday,a.availability.wday_days);
  a.velocity.per_weekend=rate(a.velocity.bk_wend,a.availability.wend_days);
  return a;
}

function drill(s,e){const wl=D.week_labels,NW=D.weeks.length,show=Math.min(NW,8);
  let h='<div class="drill'+(OPEN[s.key]?' open':'')+'" id="dr_'+s.key+'"><div class="dhead">'+s.num+' · '+s.name+' — recent '+show+' weeks</div>';
  h+='<table class="d"><thead><tr><th></th>'+wl.slice(NW-show).map((l,i)=>'<th class="'+(i===show-1?'last':'')+'">'+l+'</th>').join('')+'<th>trend</th></tr></thead><tbody>';
  const row=(nm,arr,pct,fmtd,col)=>{const sub=/^\s*[↳·▪]/.test(nm);const a=arr.slice(NW-show);return '<tr'+(sub?' class="subr"':'')+'><td>'+nm+'</td>'+a.map((v,i)=>'<td class="'+(i===a.length-1?'last':'')+'">'+(v==null?'<span class="zero">·</span>':fmt(v,fmtd||(pct?1:0))+(pct?'%':''))+'</td>').join('')+'<td>'+zspark(nm.replace(/^[↳·▪ ]+/,''),arr,col||'var(--ink2)',pct)+'</td></tr>';};
  if(!s.velMath)e.ms.forEach(m=>h+=row(m.nm,m.arr,m.pct,m.fmtd,COL[m.ev.st]));
  if(s.tax){s.tax(C).forEach(t=>{if(sum(t.arr))h+=row(t.nm,t.arr,0,0,'var(--ink2)');});}
  if(s.byChannel){const bc=s.byChannel(C);Object.keys(bc).sort((a,b)=>sum(bc[b])-sum(bc[a])).forEach(ch=>{if(sum(bc[ch]))h+=row('↳ '+ch,bc[ch],0,0);});}
  if(s.doneCat){const dc=s.doneCat(C);h+=row('booked (denom)',C.done.booked,0,0);['SH','STI','MH','Other'].forEach(ct=>{if(dc[ct]&&sum(dc[ct]))h+=row('↳ done · '+ct,dc[ct],0,0,'var(--ink2)');});}
  if(s.velMath){const v=C.velocity;
    h+=row('Weekday bookings',v.bk_wday,0,0);
    h+=row('↳ active weekdays',v.wday_days,0,0);
    h+=row('↳ bookings / active weekday',v.per_weekday,0,1,'var(--ink2)');
    h+=row('Weekend bookings',v.bk_wend,0,0);
    h+=row('↳ active weekend days',v.wend_days,0,0);
    h+=row('↳ bookings / active weekend',v.per_weekend,0,1,'var(--ink2)');
    h+=row('▪ bookings / active day (combined)',v.per_active_day,0,1,'var(--accent)');
    const i=NW-1,wd=v.wday_days[i],we=v.wend_days[i],bwd=v.bk_wday[i],bwe=v.bk_wend[i],tot=(wd+we)?((bwd+bwe)/(wd+we)).toFixed(1):'—';
    h+='</tbody></table><div style="font-size:11.5px;color:var(--ink2);margin-top:8px;line-height:1.5">'
      +'<b>How bookings/active-day is built</b> (latest week): weekday = '+bwd+' bookings ÷ '+wd+' active weekdays = <b>'+(wd?(bwd/wd).toFixed(1):'—')+'</b>; weekend = '+bwe+' ÷ '+we+' = <b>'+(we?(bwe/we).toFixed(1):'—')+'</b>. '
      +'Combined = ('+bwd+' + '+bwe+') ÷ ('+wd+' + '+we+') = <b>'+tot+'/day</b>. Weekends run hotter, so a lost weekend day hurts more.</div></div>';
    return h;}
  h+='</tbody></table></div>';return h;}

function syncScopeBtns(){document.querySelectorAll('[data-tier]').forEach(b=>b.classList.toggle('on',TIERF.has(b.dataset.tier)));document.querySelectorAll('[data-mat]').forEach(b=>b.classList.toggle('on',MATF.has(b.dataset.mat)));}
function allCity(on){CITYF=on?new Set(ALLCITIES):new Set();renderCityPanel($('cityQ')?$('cityQ').value:'');cityChanged();}
function openClinMs(e){e.stopPropagation();const p=$('clinPanel'),show=!p.classList.contains('on');closePanels();if(show){renderClinPanel('');p.classList.add('on');const q=$('clinQ');if(q)q.focus();}}
function renderClinPanel(q){q=(q||'').toLowerCase();
  const ks=Object.keys(D.clinics).filter(s=>inCity(D.clinics[s].city)&&D.clinics[s].disp.toLowerCase().includes(q)).sort((a,b)=>D.clinics[a].disp.localeCompare(D.clinics[b].disp));
  let h='<input id="clinQ" class="msq" placeholder="search clinic…" oninput="renderClinPanel(this.value)" onclick="event.stopPropagation()"><div class="msact"><a onclick="allClin(1)">select all</a><a onclick="allClin(0)">clear</a></div>';
  if(!ks.length)h+='<div class="msi" style="color:var(--muted)">no clinics</div>';
  ks.forEach(s=>{h+='<label class="msi" onclick="event.stopPropagation()"><input type="checkbox" '+(CLINF.has(s)?'checked':'')+' onchange="togClin(\''+s+'\')">'+D.clinics[s].disp+'</label>';});
  $('clinPanel').innerHTML=h;}
function clinChanged(){$('clinBtn').textContent=clinBtnLabel();$('clinBtn').classList.toggle('on',!!CLINF.size);
  if(CLINF.size===1){C=CL([...CLINF][0]);MODE='cl';OPEN={};}else{MODE='ov';}   // pick one clinic → its funnel; none/many → the list
  syncDocBtn();updateModeUI();render();}
function backToList(){CLINF=new Set();$('clinBtn').textContent=clinBtnLabel();$('clinBtn').classList.remove('on');MODE='ov';updateModeUI();render();}
function togClin(s){CLINF.has(s)?CLINF.delete(s):CLINF.add(s);clinChanged();}
function allClin(on){const q=$('clinQ')?$('clinQ').value.toLowerCase():'';const ks=Object.keys(D.clinics).filter(s=>inCity(D.clinics[s].city)&&D.clinics[s].disp.toLowerCase().includes(q));if(on)ks.forEach(s=>CLINF.add(s));else ks.forEach(s=>CLINF.delete(s));renderClinPanel($('clinQ')?$('clinQ').value:'');clinChanged();}
// ---- Doctors scope (after clinics): pick doctor(s) → metrics rescale to their slices via CL() ----
function docShort(dr){return (dr||'').replace(/^Dr\.?\s*/i,'');}
function docNames(){const s=new Set();Object.keys(D.clinics).forEach(sl=>{const c=D.clinics[sl];if(CLINF.size?!CLINF.has(sl):!inCity(c.city))return;if(c.by_doctor)Object.keys(c.by_doctor).forEach(dr=>s.add(dr));});return [...s].sort((a,b)=>docShort(a).localeCompare(docShort(b)));}
function docBtnLabel(){return (DOCF.size?(DOCF.size===1?docShort([...DOCF][0]):DOCF.size+' doctors'):'All doctors')+' ▾';}
function openDocMs(e){e.stopPropagation();const p=$('docPanel'),show=!p.classList.contains('on');closePanels();if(show){renderDocPanel();p.classList.add('on');const q=$('docQ');if(q)q.focus();}}
function docClinics(dr){const cs=[];Object.keys(D.clinics).forEach(sl=>{const c=D.clinics[sl];if(c._online)return;if(CLINF.size?!CLINF.has(sl):!inCity(c.city))return;if(c.by_doctor&&c.by_doctor[dr])cs.push({loc:c.loc||c.disp,city:c.city});});return cs;}
function renderDocPanel(){const ks=docNames();   // render full list ONCE; search filters in place so the input keeps focus
  let h='<input id="docQ" class="msq" placeholder="search doctor / clinic / city…" oninput="filterDoc(this.value)" onclick="event.stopPropagation()"><div class="msact"><a onclick="allDoc(1)">select all</a><a onclick="allDoc(0)">clear</a></div>';
  if(!ks.length)h+='<div class="msi" style="color:var(--muted)">no doctors in scope</div>';
  ks.forEach(d=>{const cl=docClinics(d),locs=cl.map(x=>x.loc),show=locs.length<=2?locs.join(', '):locs.slice(0,2).join(', ')+' +'+(locs.length-2);
    const srch=(docShort(d)+' '+cl.map(x=>x.loc+' '+x.city).join(' ')).toLowerCase().replace(/"/g,'');
    h+='<label class="msi" data-s="'+srch+'" onclick="event.stopPropagation()"><input type="checkbox" '+(DOCF.has(d)?'checked':'')+' onchange="togDoc(\''+d.replace(/'/g,"\\'")+'\')"><span>'+docShort(d)+'</span><span class="docclin" title="'+locs.join(', ').replace(/"/g,'')+'">'+(show||'—')+'</span></label>';});
  $('docPanel').innerHTML=h;}
function filterDoc(q){q=(q||'').toLowerCase().trim();document.querySelectorAll('#docPanel label.msi').forEach(l=>{l.style.display=(l.getAttribute('data-s')||'').includes(q)?'':'none';});}
function docChanged(){$('docBtn').textContent=docBtnLabel();$('docBtn').classList.toggle('on',!!DOCF.size);
  if(MODE==='cl'&&CLINF.size===1)C=CL([...CLINF][0]);
  render();}
function togDoc(d){DOCF.has(d)?DOCF.delete(d):DOCF.add(d);docChanged();}
function allDoc(on){const q=($('docQ')?$('docQ').value:'').toLowerCase().trim();
  docNames().forEach(d=>{const hay=(docShort(d)+' '+docClinics(d).map(x=>x.loc+' '+x.city).join(' ')).toLowerCase();if(!q||hay.includes(q)){on?DOCF.add(d):DOCF.delete(d);}});
  renderDocPanel();const inp=$('docQ');if(inp&&q){inp.value=q;filterDoc(q);}docChanged();}
// Build "🌐 Online · <city>" pseudo-clinics from national telehealth data (D.online.by_city) so the
// Consult=Online / All toggle can fold online demand into the same per-clinic table. Online has no
// availability / leads / velocity (national, no roster), so those render as "— n/a".
function buildOnlineClinics(){
  if(!D.online||!D.online.by_city)return;
  const N=D.weeks.length,Z=()=>new Array(N).fill(0),NA=()=>new Array(N).fill(null);
  const pct=(n,d)=>n.map((x,i)=>d[i]?Math.round(100*x/d[i]):null);
  const CATS=['SH','STI','MH','Other'];
  for(const city in D.online.by_city){
    const cb=D.online.by_city[city];if(!cb||!cb.booked||!sum(cb.booked))continue;
    const slug='online__'+city.toLowerCase().replace(/[^a-z0-9]+/g,'_');
    const byc=cb.by_cat||{},catField=f=>{const o={};CATS.forEach(ct=>{if(byc[ct]&&sum(byc[ct][f]||[]))o[ct]=byc[ct][f];});return o;};
    D.clinics[slug]={disp:'🌐 Online · '+city,city:city,loc:'Online',_online:true,
      availability:{active_days:NA(),wday_days:NA(),wend_days:NA(),hours:NA(),avail_hours:NA()},
      demand:{leads:NA(),by_channel:{},lead_book_pct:NA(),has_leads:false},
      bookings:{total:cb.booked,new_tw:Z(),new_old:Z(),rebook:Z(),relapse:Z()},
      done:{booked:cb.booked,done:cb.done,book_done_pct:pct(cb.done,cb.booked),by_cat:catField('done')},
      purchased:{total:cb.purchased,by_cat:catField('purchased')},
      revenue:{rev:cb.rev,by_cat:catField('rev')},
      velocity:{bookings:cb.booked,wday_days:NA(),wend_days:NA(),bk_wday:Z(),bk_wend:Z(),per_active_day:NA(),per_weekday:NA(),per_weekend:NA()},
      doctors:{count:Z()},by_doctor:{}};
  }
}
async function boot(){
  try{D=await fetch('data_weekly_diag.json').then(r=>r.json());}
  catch(e){$('root').innerHTML='<div class="err">Failed to load data_weekly_diag.json</div>';return;}
  try{AGE=await fetch('data_clinic_age.json').then(r=>r.ok?r.json():{open:{}}).then(a=>(a&&a.open)||{});}catch(e){AGE={};}
  try{QD=await fetch('data_quick_diag.json?v='+Date.now()).then(r=>r.ok?r.json():null);}catch(e){QD=null;}
  if(QD)applyVariant();   // master-demand matched numbers become the source of truth (SC default)
  buildOnlineClinics();
  ALLCITIES=[...new Set(Object.values(D.clinics).map(c=>c.city))].sort();
  try{const saved=JSON.parse(localStorage.getItem('wd_city')||'[]');if(Array.isArray(saved))saved.forEach(c=>{if(ALLCITIES.includes(c))CITYF.add(c);});}catch(e){}
  $('cityBtn').textContent=cityBtnLabel();$('cityBtn').classList.toggle('on',!!CITYF.size);
  $('clinBtn').textContent=clinBtnLabel();
  document.addEventListener('click',e=>{if(!e.target.closest('.ms'))closePanels();});
  fillSel('curn',CUR_PRESETS,CURN,'weeks');fillSel('basen',BASE_PRESETS,BASEN,'wks');
  C=D.clinics[Object.keys(D.clinics)[0]];syncMode();render();
}
window.addEventListener('DOMContentLoaded',boot);
</script>
