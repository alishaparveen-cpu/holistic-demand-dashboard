<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clinic Cannibalization · RCA</title>
<style>
  :root{--ink:#1a1a17;--mut:#5f5e5a;--line:#e6e4dc;--bg:#faf9f5;--card:#fff;--old:#185fa5;--new:#d85a30}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  header{padding:20px 24px;border-bottom:1px solid var(--line);background:var(--card)}
  header h1{margin:0;font-size:20px;font-weight:600}
  header p{margin:4px 0 0;color:var(--mut);font-size:13px}
  .wrap{max-width:1080px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:18px}
  .city{font-size:16px;font-weight:600;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .ctrls{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;margin-bottom:10px}
  .fld{display:flex;flex-direction:column;gap:3px}
  .fld label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut)}
  select{padding:7px 9px;font-size:13px;border:1px solid var(--line);border-radius:7px;background:#fff;min-width:140px;cursor:pointer}
  .dist{font-size:13px;color:var(--mut);padding:7px 11px;background:var(--bg);border-radius:7px;border:1px solid var(--line)}
  .dist b{color:var(--ink)}
  .chartbox{position:relative;height:280px;width:100%}
  .zoomctrls{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .zoomctrls button{font-size:12px;padding:5px 11px;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer;color:var(--ink)}
  .zoomctrls button:hover:not(:disabled){background:var(--bg)}
  .zoomctrls button:disabled{opacity:.4;cursor:default}
  .insight{margin-top:12px;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.6;border-left:3px solid var(--mut);background:var(--bg)}
  .insight.v-yes{border-color:#d85a30;background:#faece7}
  .insight.v-no{border-color:#0f6e56;background:#e1f5ee}
  .insight.v-soon{border-color:#ba7517;background:#faeeda}
  .insight .tag{font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.04em}
  .foot{color:var(--mut);font-size:12px;margin-top:6px}
  .sumcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin-bottom:18px}
  .sumcard h2{margin:0 0 4px;font-size:18px;font-weight:600}
  .sumcity{margin:14px 0 0}
  .sumcity .nm{font-weight:600;font-size:14px;margin-bottom:4px;display:flex;gap:8px;align-items:center}
  .pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
  .p-yes{background:#faece7;color:#993c1d}.p-no{background:#e1f5ee;color:#0f6e56}.p-soon{background:#faeeda;color:#854f0b}
  .sumrow{font-size:13px;color:var(--mut);line-height:1.7;padding-left:2px}
  .sumrow b{color:var(--ink)}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Clinic cannibalization — Tier 1</h1>
    <p>One section per city. Each opens with that city's cannibalization scan (which new clinics ate into a nearby old one), then a chart zoomed to 6 weeks before → after each opening so the shift is visible.</p>
  </header>
  <div class="wrap" id="cities"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<script>
const METRICS=[['bookings','New bookings'],['leads','Leads'],['done','Total done'],['sh','SH done'],['sti','STI done']];   // default NEW BOOKINGS (done/diagnosis tags only reliable ~Sep 2025+); done + by-category available too
const fmtW=w=>{const d=new Date(w);return d.getDate()+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+" '"+(''+d.getFullYear()).slice(2);};
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
function km(a,b){if(!a||!b||a.lat==null||b.lat==null)return null;const R=6371,r=Math.PI/180;
  const dla=(b.lat-a.lat)*r,dlo=(b.lon-a.lon)*r;
  const h=Math.sin(dla/2)**2+Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dlo/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(h))*10)/10;}
let DB, WEEKS, isDark=matchMedia('(prefers-color-scheme: dark)').matches;
const charts={};
const BEFORE=6, AFTER=16, AFTER_EVAL=8;
function openIdx(cln){ if(!cln.open) return -1; const od=cln.open.slice(0,10); let i=-1; for(let k=0;k<WEEKS.length;k++){ if(WEEKS[k]<=od) i=k; else break; } return i; }
function sum(a){return a.reduce((x,y)=>x+y,0);}

async function boot(){
  DB=await (await fetch('data_cannibalization.json')).json();
  WEEKS=DB._meta.weeks;
  Chart.register(window['chartjs-plugin-annotation']);
  const host=document.getElementById('cities');
  DB._meta.t1.forEach(city=>{ if(DB.cities[city]) host.appendChild(buildCity(city)); });
}

function verdict(o,n,mk,d,oi){
  if(oi<0) return {s:'soon',tag:'Unknown',line:`no opening date.`};
  if(WEEKS.length-1-oi<6) return {s:'soon',tag:'Too recent',line:`opened ~${Math.max(0,WEEKS.length-1-oi)} wks ago — need ≥6 wks of post-data to judge.`};
  const ob=avg(o[mk].slice(Math.max(0,oi-BEFORE),oi).filter(v=>v>0));
  const oa=avg(o[mk].slice(oi+1,oi+1+AFTER_EVAL));
  const na=avg(n[mk].slice(oi+1,oi+1+AFTER_EVAL));
  if(ob<1) return {s:'soon',tag:"Can't assess",line:`no pre-opening baseline${(mk==='sh'||mk==='sti'||mk==='done')?' (diagnosis tags start ~Sep 2025 — use Leads/Bookings)':''}.`,noBase:true};
  const oc=Math.round((oa-ob)/ob*100), lost=Math.round(ob-oa), gain=Math.round(na);
  const near=d!=null&&d<8, mid=d!=null&&d<=15, fell=oc<=-10;
  if(fell&&na>0&&near) return {s:'yes',tag:'Likely cannibalization',oc,line:`fell <b>${oc}%</b> (${Math.round(ob)}→${Math.round(oa)}/wk) after a clinic opened <b>${d} km</b> away that ramped to ~${gain}/wk.`};
  if(fell&&na>0&&mid) return {s:'yes',tag:'Possible cannibalization',oc,line:`fell <b>${oc}%</b> after an opening <b>${d} km</b> away (mid-range, ~${gain}/wk) — plausible, partly other causes.`};
  if(fell&&d!=null&&d>15) return {s:'no',tag:'Drop, not distance',oc,line:`fell <b>${oc}%</b> but the new clinic is far (<b>${d} km</b>) — look elsewhere (doctor/channel).`};
  if(fell) return {s:'soon',tag:'Drop, unclear',oc,line:`fell <b>${oc}%</b> but distance/ramp pattern is weak.`};
  return {s:'no',tag:'No cannibalization',oc,line:`held (${oc>=0?'+':''}${oc}%, ${Math.round(ob)}→${Math.round(oa)}/wk)${d!=null?` after an opening ${d} km away`:''}.`};
}

function buildCity(city){
  const cd=DB.cities[city];
  const mature=Object.keys(cd).filter(k=>cd[k].mature).sort((a,b)=>sum(cd[b].done)-sum(cd[a].done));
  const news=Object.keys(cd).filter(k=>!cd[k].mature);
  const card=document.createElement('div'); card.className='card';
  card.innerHTML=`<div class="city">${city} <span style="font-weight:400;color:var(--mut);font-size:13px">· ${mature.length} old · ${news.length} new clinics</span></div>
    <div class="ctrls">
      <div class="fld"><label>Old clinic</label><select class="old"></select></div>
      <div class="fld"><label>New clinic (nearest first)</label><select class="new"></select></div>
      <div class="dist"></div>
      <div class="fld"><label>Metric</label><select class="met">${METRICS.map(m=>`<option value="${m[0]}">${m[1]}</option>`).join('')}</select></div>
      <div class="fld"><label>View</label><select class="vw"><option value="focus">Zoom to opening</option><option value="full">Full history</option></select></div>
    </div>
    ${citySummary(city)}
    <div class="chartbox"><canvas role="img" aria-label="Week over week ${city} old vs new clinic around opening"></canvas></div>
    <div class="zoomctrls"><button class="addOld">← + older weeks</button><button class="addNew">+ newer weeks →</button><button class="rstZoom">reset zoom</button></div>
    <div class="insight"></div>`;
  const oldSel=card.querySelector('.old'), newSel=card.querySelector('.new'), metSel=card.querySelector('.met'), vwSel=card.querySelector('.vw');
  oldSel.innerHTML=mature.map(k=>`<option value="${k}">${k}</option>`).join('');
  metSel.value='bookings';
  function refreshNew(){
    const o=cd[oldSel.value];
    const sorted=news.map(n=>({n,d:km(o,cd[n])})).sort((a,b)=>(a.d==null?1e9:a.d)-(b.d==null?1e9:b.d));
    newSel.innerHTML=sorted.map(x=>`<option value="${x.n}">${x.n} · ${x.d==null?'? ':x.d+' km'} · opened ${cd[x.n].open?cd[x.n].open.slice(0,7):'?'}</option>`).join('')||'<option>— no new clinics —</option>';
  }
  let eb=0, ea=0;
  function draw(){
    const o=cd[oldSel.value], nk=newSel.value, n=cd[nk]; if(!n)return;
    const d=km(o,n), mk=metSel.value, lbl=METRICS.find(m=>m[0]===mk)[1], oi=openIdx(n);
    card.querySelector('.dist').innerHTML=`Distance<br><b>${d==null?'n/a':d+' km'}</b>`;
    const focus=vwSel.value==='focus';
    card.querySelector('.zoomctrls').style.display=focus?'flex':'none';
    const win=drawChart(card,city,oldSel.value,nk,o[mk],n[mk],oi,lbl,focus,eb,ea);
    card.querySelector('.addOld').disabled=!focus||!win||win.s<=0;
    card.querySelector('.addNew').disabled=!focus||!win||win.e>=WEEKS.length-1;
    const v=verdict(o,n,mk,d,oi);
    card.querySelector('.insight').outerHTML=`<div class="insight v-${v.s}"><span class="tag">${v.tag}</span> &nbsp;<b>${oldSel.value}</b> ${v.line}<div class="foot">Zoom = ${BEFORE} wks before → ${AFTER} after opening (use + buttons to widen). Verdict from old-clinic change (${AFTER_EVAL} wks after vs ${BEFORE} before) + distance + new-clinic ramp. ${mk==='leads'?'Leads = all sources by call-location.':mk==='bookings'?'Bookings = new SC.':'Done = completed SC by diagnosis (tags ~Sep 2025+).'}</div></div>`;
  }
  card.querySelector('.addOld').onclick=()=>{eb+=6;draw();};
  card.querySelector('.addNew').onclick=()=>{ea+=6;draw();};
  card.querySelector('.rstZoom').onclick=()=>{eb=0;ea=0;draw();};
  refreshNew();
  oldSel.onchange=()=>{eb=0;ea=0;refreshNew();draw();};
  newSel.onchange=()=>{eb=0;ea=0;draw();}; metSel.onchange=draw; vwSel.onchange=()=>{eb=0;ea=0;draw();};
  setTimeout(draw,0);
  return card;
}

function drawChart(card,city,oldK,newK,oldS,newS,oi,lbl,focus,eb,ea){
  const cv=card.querySelector('canvas'), id=city;
  if(charts[id]) charts[id].destroy();
  let s=0,e=WEEKS.length-1;
  if(focus&&oi>=0){ s=Math.max(0,oi-BEFORE-(eb||0)); e=Math.min(WEEKS.length-1,oi+AFTER+(ea||0)); }
  const idx=[]; for(let i=s;i<=e;i++) idx.push(i);
  const grid=isDark?'rgba(255,255,255,.1)':'rgba(0,0,0,.07)', tick=isDark?'#b4b2a9':'#5f5e5a';
  const ann={};
  if(oi>=s&&oi<=e){ const mk=oi-s;
    ann.after={type:'box',xMin:mk,xMax:idx.length-1,backgroundColor:'rgba(216,90,48,.06)',borderWidth:0};
    ann.open={type:'line',xMin:mk,xMax:mk,borderColor:'#534ab7',borderWidth:2,
      label:{display:true,content:newK+' opens',position:'start',backgroundColor:'#534ab7',color:'#fff',font:{size:10},padding:3}};
  }
  const pr=focus?2:0;
  charts[id]=new Chart(cv,{type:'line',
    data:{labels:idx.map(i=>fmtW(WEEKS[i])),datasets:[
      {label:oldK+' (old)',data:idx.map(i=>oldS[i]),borderColor:'#185fa5',backgroundColor:'#185fa5',borderWidth:2.4,pointRadius:pr,tension:.3},
      {label:newK+' (new)',data:idx.map(i=>newS[i]),borderColor:'#d85a30',backgroundColor:'#d85a30',borderWidth:2.4,pointRadius:pr,tension:.3,borderDash:[5,3]}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true,position:'top',labels:{boxWidth:12,font:{size:12},color:tick}},annotation:{annotations:ann}},
      scales:{x:{grid:{color:grid},ticks:{color:tick,maxRotation:45,autoSkip:true,maxTicksLimit:focus?10:12}},
        y:{grid:{color:grid},ticks:{color:tick},title:{display:true,text:lbl+' / week',color:tick},beginAtZero:true}}}});
  return {s,e};
}

function citySummary(city){
  const cd=DB.cities[city]; if(!cd) return '';
  const mature=Object.keys(cd).filter(k=>cd[k].mature), news=Object.keys(cd).filter(k=>!cd[k].mature);
  let rows='', yes=0, assessed=0;
  news.map(nk=>{
    const n=cd[nk]; let best=null;
    mature.forEach(ok=>{const d=km(cd[ok],n); if(d!=null&&(!best||d<best.d)) best={ok,d};});
    if(!best) return null; return {nk,n,best};
  }).filter(Boolean).sort((a,b)=>a.best.d-b.best.d).forEach(({nk,n,best})=>{
    const v=verdict(cd[best.ok],n,'bookings',best.d,openIdx(n));
    const pc=v.s==='yes'?'p-yes':v.s==='no'?'p-no':'p-soon';
    if(v.s==='yes')yes++; if(v.s==='yes'||v.s==='no')assessed++;
    rows+=`<div class="sumrow"><b>${nk}</b> <span style="color:var(--mut)">(${best.d} km from ${best.ok}, opened ${n.open?n.open.slice(0,7):'?'})</span> — <span class="pill ${pc}">${v.tag}</span> ${best.ok} ${v.line.replace(/<[^>]+>/g,'')}</div>`;
  });
  const head = yes>0?`<span class="pill p-yes">${yes} cannibalized</span>`:(assessed>0?`<span class="pill p-no">none detected</span>`:`<span class="pill p-soon">too recent / no baseline</span>`);
  return `<div class="sumcard" style="margin:0 0 14px"><div class="nm" style="font-weight:600;font-size:13px;margin-bottom:6px">Cannibalization scan ${head}</div>${rows||'<div class="sumrow" style="color:var(--mut)">no new clinics to assess.</div>'}<div class="foot" style="margin-top:6px">Each new clinic vs its nearest old clinic, on <b>new bookings</b> (full history). Auto-scan.</div></div>`;
}
window.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
