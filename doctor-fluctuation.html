<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Doctor Fluctuation · RCA</title>
<style>
  :root{--ink:#1a1a17;--mut:#5f5e5a;--line:#e6e4dc;--bg:#faf9f5;--card:#fff;--cap:#185fa5;--prod:#d85a30}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  header{padding:20px 24px;border-bottom:1px solid var(--line);background:var(--card)}
  header h1{margin:0;font-size:20px;font-weight:600}
  header p{margin:4px 0 0;color:var(--mut);font-size:13px}
  .wrap{max-width:1060px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:18px}
  .city{font-size:16px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .step{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);font-weight:600;margin:16px 0 7px;display:flex;align-items:center;gap:6px}
  .step .n{background:var(--ink);color:#fff;width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
  select{padding:7px 9px;font-size:13px;border:1px solid var(--line);border-radius:7px;background:#fff;min-width:200px;cursor:pointer}
  .headline{font-size:13px;line-height:1.7;padding:11px 13px;border-radius:8px;background:var(--bg);border-left:3px solid var(--mut)}
  .headline.h-cap{border-color:var(--cap)} .headline.h-prod{border-color:var(--prod)} .headline.h-both{border-color:#993556} .headline.h-ok{border-color:#0f6e56}
  .headline b{color:var(--ink)} .headline .tag{font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.04em}
  .why{font-size:13px;line-height:1.7;margin:9px 2px 2px;color:var(--ink)} .why i{color:var(--mut)} .why b{color:var(--ink)}
  .hm{font-size:11px;overflow-x:auto}
  .hmgrid{display:grid;gap:2px;min-width:640px}
  .hmh{color:var(--mut);font-size:10px;text-align:center;padding-bottom:2px}
  .hmdoc{font-size:12px;display:flex;align-items:center;gap:6px;padding-right:8px;white-space:nowrap;cursor:pointer}
  .hmdoc:hover{color:var(--cap)}
  .hmrow-sel .hmdoc{font-weight:600;color:var(--cap)}
  .cell{height:26px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;font-variant-numeric:tabular-nums;cursor:pointer}
  .st{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
  .st-act{background:#e1f5ee;color:#0f6e56}.st-left{background:#faece7;color:#993c1d}.st-new{background:#faeeda;color:#854f0b}
  .ctrlrow{display:flex;gap:14px;align-items:flex-end;margin:6px 0 2px;flex-wrap:wrap}
  .fld{display:flex;flex-direction:column;gap:3px}.fld label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut)}
  .chartbox{position:relative;height:230px;width:100%;margin-top:10px}
  .foot{color:var(--mut);font-size:12px;margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Doctor fluctuation — RCA drill</h1>
    <p>Top-down: clinic verdict → all doctors' movement (heatmap) → isolate one doctor's capacity, productivity & Practo.</p>
  </header>
  <div class="wrap" id="cities"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const fmtM=m=>{const [y,mo]=m.split('-');return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+mo-1]+" '"+y.slice(2);};
const MI=m=>['J','F','M','A','M','J','J','A','S','O','N','D'][+m.split('-')[1]-1];
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:0;
const r1=x=>Math.round(x*10)/10;
const median=a=>{const b=a.slice().sort((x,y)=>x-y),n=b.length;return n?(n%2?b[(n-1)/2]:(b[n/2-1]+b[n/2])/2):0;};
const last=s=>s.split(' ').slice(-1)[0];
function genWhy(cl,oP,dP,pP,hc){
  const days=cl.days||{};
  const info=Object.keys(cl.doctors).filter(d=>d!=='Others / locum').map(d=>{
    const done=cl.doctors[d], dy=days[d]||M.map(()=>0), peak=Math.max(...done);
    const lastA=done.reduce((a,v,i)=>v>0?i:a,-1), firstA=done.findIndex(v=>v>0);
    const rates=done.map((v,i)=>dy[i]>=2?v/dy[i]:null).filter(x=>x!=null);
    const recDone=avg(done.slice(-3)), recDay=avg(dy.slice(-3));
    return {d,peak,lastA,firstA,typRate:rates.length?median(rates):0,recDone,recRate:recDay?recDone/recDay:0,st:docStat(done,dy).st};
  });
  const left=info.filter(x=>x.st==='left').sort((a,b)=>b.peak-a.peak);
  const joined=info.filter(x=>x.st==='new').sort((a,b)=>b.recDone-a.recDone);
  const cover=info.filter(x=>x.recDone>=3).sort((a,b)=>b.recDone-a.recDone);
  const lead=left[0];
  const cw=cover.slice(0,4), ctot=cw.reduce((s,x)=>s+x.recDone,0)||1, coverRate=cw.reduce((s,x)=>s+x.recRate*x.recDone,0)/ctot;
  const leadStr=lead?`<b>${lead.d}</b> (peaked ${lead.peak}/mo at ${r1(lead.typRate)} SC/day) left ${fmtM(M[lead.lastA])}`:null;
  const coverStr=cover.slice(0,3).map(x=>`${x.d} ${r1(x.recRate)}/day`).join(', ');
  if(hc==='h-ok'){
    if(oP>=12&&joined.length) return `<b>Why:</b> growth from added capacity — ${joined.slice(0,2).map(j=>`${j.d} (now ${Math.round(j.recDone)}/mo)`).join(', ')} ramped${lead?`, offsetting ${lead.d}'s exit`:''}.`;
    if(lead) return `<b>Why:</b> ${left.slice(0,2).map(x=>`${x.d} left`).join(' & ')} — but output held, backfilled by ${joined.length?joined.slice(0,2).map(j=>j.d).join(', '):'the remaining roster'} at similar pace.`;
    return `<b>Why:</b> stable roster, output flat.`;
  }
  if(hc==='h-prod') return `<b>Why — throughput, not capacity:</b> ${leadStr?leadStr+'. ':''}Covering doctors now average ~${r1(coverRate)} SC/day (${coverStr||'current roster'})${lead&&coverRate<lead.typRate?` — below ${last(lead.d)}'s ${r1(lead.typRate)}/day`:''}, so output fell even though doctor-days ${dP>=0?`rose +${dP}%`:`were ${dP}%`}. <i>Covering doctors haven't matched the throughput (or slots aren't filling). Fix: ramp them / consolidate to fuller days.</i>`;
  if(hc==='h-cap') return `<b>Why — capacity:</b> ${leadStr?leadStr+' and wasn’t fully backfilled':'fewer doctor-days'} — total active-days ${dP}%, while per-day throughput held. <i>Demand likely intact; it’s availability. Fix: add / replace doctor-days.</i>`;
  if(hc==='h-both') return `<b>Why — both:</b> ${leadStr?leadStr+'; ':''}fewer doctor-days (${dP}%) <i>and</i> lower per-day throughput (${pP}%) from the covering doctors (${coverStr}).`;
  return '';
}
let DB, M, isDark=matchMedia('(prefers-color-scheme: dark)').matches;
const charts={};
async function boot(){
  DB=await (await fetch('data_doctor_flux.json')).json(); M=DB._meta.months;
  const host=document.getElementById('cities');
  DB._meta.t1.forEach(city=>{ if(DB.cities[city]) host.appendChild(buildCity(city)); });
}
const sum=a=>a.reduce((x,y)=>x+y,0);
function docStat(done,days){
  const n=M.length,peak=Math.max(...done);
  const lastA=done.reduce((a,v,i)=>v>0?i:a,-1),firstA=done.findIndex(v=>v>0);
  const rD=avg(done.slice(-3)),rDay=avg(days.slice(-3)),prod=rDay?rD/rDay:0;
  let st='act',lab='Active';
  if(rD<2&&peak>=8&&lastA>=0&&lastA<n-2){st='left';lab='Left '+fmtM(M[lastA]);}
  else if(firstA>=n-6&&rD>=4){st='new';lab='New '+fmtM(M[firstA]);}
  return{peak,rD,rDay,prod,st,lab};
}

const MKEY={done:'doctors',sh:'sh',sti:'sti',bookings:'bookings',days:'days',practo:'practo'};
const MLAB={done:'completed SC',sh:'SH done',sti:'STI done',bookings:'new bookings',days:'active-days',practo:'Practo leads'};
function sumOver(cl,clKey){const docs=Object.keys(cl.doctors);return M.map((_,i)=>docs.reduce((s,d)=>s+(((cl[clKey]||{})[d]||[])[i]||0),0));}

function buildCity(city){
  const cd=DB.cities[city];
  const clinics=Object.keys(cd).sort((a,b)=>sum(cd[b].total)-sum(cd[a].total));
  const card=document.createElement('div'); card.className='card';
  card.innerHTML=`<div class="city">${city} <span style="font-weight:400;color:var(--mut);font-size:13px">· ${clinics.length} clinics</span></div>
    <div class="ctrlrow"><div class="fld"><label>Clinic</label><select class="cl">${clinics.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div></div>
    <div class="step"><span class="n">1</span> Clinic verdict & trend</div>
    <div class="headline"></div>
    <div class="why"></div>
    <div class="ctrlrow"><div class="fld"><label>Clinic metric</label><select class="cm">
      <option value="done">Total done</option><option value="cat">Done by category (SH / STI)</option>
      <option value="bookings">New bookings</option><option value="leads">Leads</option>
      <option value="days">Active-days (capacity)</option><option value="practo">Practo leads</option></select></div></div>
    <div class="chartbox"><canvas class="cc1" role="img" aria-label="${city} clinic trend"></canvas></div>
    <div class="step"><span class="n">2</span> Doctor movement — by doctor × month (click a doctor)</div>
    <div class="ctrlrow"><div class="fld"><label>Heatmap shows</label><select class="hmm">
      <option value="done">Completed SC (done)</option><option value="sh">SH done</option><option value="sti">STI done</option>
      <option value="bookings">New bookings</option><option value="practo">Practo leads</option><option value="days">Active-days</option></select></div></div>
    <div class="hm"></div>
    <div class="step"><span class="n">3</span> Isolate doctor — <span class="seldoc" style="color:var(--cap)"></span></div>
    <div class="ctrlrow"><div class="fld"><label>Compare</label><select class="cmp">
      <option value="capprod">Capacity × productivity</option><option value="bookdone">Bookings vs done</option>
      <option value="cat">Done by category (SH / STI)</option><option value="practo">Practo leads vs done</option></select></div></div>
    <div class="chartbox"><canvas class="cc3" role="img" aria-label="${city} selected doctor metrics"></canvas></div>
    <div class="foot"></div>`;
  const clSel=card.querySelector('.cl'),cmSel=card.querySelector('.cm'),hmmSel=card.querySelector('.hmm'),cmpSel=card.querySelector('.cmp');
  let sel=null;
  function verdict(){
    const cl=cd[clSel.value],days=cl.days||{},docs=Object.keys(cl.doctors);
    const total=cl.total,totDays=sumOver(cl,'days');
    const oE=avg(total.slice(0,3)),oR=avg(total.slice(-3)),dE=avg(totDays.slice(0,3)),dR=avg(totDays.slice(-3));
    const pE=dE?oE/dE:0,pR=dR?oR/dR:0;
    const oP=oE?Math.round((oR-oE)/oE*100):0,dP=dE?Math.round((dR-dE)/dE*100):0,pP=pE?Math.round((pR-pE)/pE*100):0;
    let hc='h-ok',tag='Output steady',v='';
    if(oP<=-12){const cdr=Math.max(0,-dP),pdr=Math.max(0,-pP);
      if(pdr>cdr+8){hc='h-prod';tag='Productivity-driven drop';v=`Mostly <b>fewer consults per day</b> (productivity ${pP}%)${dP>=5?` — doctor-days rose +${dP}%, so it's throughput, not capacity`:''}.`;}
      else if(cdr>pdr+8){hc='h-cap';tag='Capacity-driven drop';v=`Mostly <b>fewer doctor-days</b> (capacity ${dP}%)${pP>=-5?` — per-day throughput held`:''}.`;}
      else{hc='h-both';tag='Capacity + productivity';v=`Both fell — capacity ${dP}%, productivity ${pP}%.`;}}
    else if(oP>=12){tag='Output up';v=`Capacity ${dP>=0?'+':''}${dP}%, productivity ${pP>=0?'+':''}${pP}%.`;}
    else v=`Capacity ${dP>=0?'+':''}${dP}%, productivity ${pP>=0?'+':''}${pP}%.`;
    const hl=card.querySelector('.headline');hl.className='headline '+hc;
    hl.innerHTML=`<span class="tag">${tag}</span> &nbsp;<b>${clSel.value}</b> output <b>${Math.round(oE)}→${Math.round(oR)}/mo</b> (${oP>=0?'+':''}${oP}%). Active-days ${Math.round(dE)}→${Math.round(dR)} (${dP>=0?'+':''}${dP}%) · productivity ${r1(pE)}→${r1(pR)} SC/day (${pP>=0?'+':''}${pP}%). ${v}`;
    card.querySelector('.why').innerHTML=genWhy(cl,oP,dP,pP,hc);
  }
  function clinicChart(){
    const cl=cd[clSel.value],m=cmSel.value,cv=card.querySelector('.cc1'),id=city+'_c';
    if(charts[id])charts[id].destroy();
    const grid=isDark?'rgba(255,255,255,.1)':'rgba(0,0,0,.07)',tick=isDark?'#b4b2a9':'#5f5e5a';
    let ds;
    if(m==='cat') ds=[{label:'SH done',data:sumOver(cl,'sh'),borderColor:'#d85a30',borderWidth:2.4,pointRadius:1,tension:.25},{label:'STI done',data:sumOver(cl,'sti'),borderColor:'#534ab7',borderWidth:2.4,pointRadius:1,tension:.25},{label:'total done',data:cl.total,borderColor:'#888780',borderWidth:1.6,pointRadius:0,borderDash:[4,3],tension:.25}];
    else if(m==='leads') ds=[{label:'leads',data:cl.leads||M.map(()=>0),borderColor:'#0f6e56',borderWidth:2.4,pointRadius:1,tension:.25}];
    else ds=[{label:MLAB[m],data:sumOver(cl,MKEY[m]),borderColor:'#185fa5',borderWidth:2.4,pointRadius:1,tension:.25}];
    charts[id]=new Chart(cv,{type:'line',data:{labels:M.map(fmtM),datasets:ds},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:m==='cat',position:'top',labels:{boxWidth:11,font:{size:11},color:tick}}},
        scales:{x:{grid:{color:grid},ticks:{color:tick,maxRotation:45,autoSkip:true,maxTicksLimit:12}},y:{grid:{color:grid},ticks:{color:tick},title:{display:true,text:(m==='leads'?'leads':MLAB[m]||'done')+' / month',color:tick},beginAtZero:true}}}});
  }
  function heatmap(){
    const cl=cd[clSel.value],days=cl.days||{},m=hmmSel.value,key=MKEY[m];
    const docs=Object.keys(cl.doctors).sort((a,b)=>sum(cl.doctors[b])-sum(cl.doctors[a]));
    const arrOf=d=>(cl[key]||{})[d]||M.map(()=>0);
    const mx=Math.max(1,...docs.flatMap(d=>arrOf(d)));
    const cols=`170px repeat(${M.length},1fr)`;
    let h=`<div class="hmgrid" style="grid-template-columns:${cols}"><div class="hmh" style="text-align:left">doctor</div>${M.map(mm=>`<div class="hmh">${MI(mm)}</div>`).join('')}`;
    docs.forEach(d=>{
      const s=docStat(cl.doctors[d],days[d]||M.map(()=>0));
      h+=`<div class="hmdoc" data-doc="${d.replace(/"/g,'&quot;')}">${d.length>17?d.slice(0,16)+'…':d} <span class="st st-${s.st}">${s.st==='act'?'·':s.st}</span></div>`;
      arrOf(d).forEach((v,i)=>{
        const dy=(days[d]||[])[i]||0,done=(cl.doctors[d]||[])[i]||0,pr=dy?r1(done/dy):0;
        const a=v>0?0.14+0.82*v/mx:0;
        const bg=v>0?`rgba(15,110,86,${a.toFixed(2)})`:(isDark?'rgba(255,255,255,.04)':'#f4f2ec');
        const tc=a>0.55?'#fff':(v>0?'#0f6e56':'transparent');
        h+=`<div class="cell" data-doc="${d.replace(/"/g,'&quot;')}" style="background:${bg};color:${tc}" title="${d} · ${fmtM(M[i])}: ${v} ${MLAB[m]} · ${done} done · ${dy} days · ${pr}/day">${v||''}</div>`;
      });
    });
    h+=`</div>`;
    card.querySelector('.hm').innerHTML=h;
    if(!sel||!docs.includes(sel)) sel=docs[0];
    card.querySelectorAll('[data-doc]').forEach(el=>el.onclick=()=>{sel=el.dataset.doc;selDoc();});
    selDoc();
  }
  function selDoc(){
    card.querySelectorAll('.hmdoc').forEach(el=>{const on=el.dataset.doc===sel;el.style.fontWeight=on?'600':'';el.style.color=on?'var(--cap)':'';});
    card.querySelector('.seldoc').textContent=sel;
    drawDoc(card,city,cd[clSel.value],sel,cmpSel.value);
    card.querySelector('.foot').innerHTML=`Heatmap: darker = more "${MLAB[hmmSel.value]}" that month; blank = none/inactive. Status: <span class="st st-left">left</span> peaked ≥8/mo & now ~0 · <span class="st st-new">new</span> joined recently. Months Jan '25 → ${fmtM(M[M.length-1])}. Practo = Book+Call matched to the doctor by name.`;
  }
  function render(){verdict();clinicChart();heatmap();}
  clSel.onchange=()=>{sel=null;render();};
  cmSel.onchange=clinicChart; hmmSel.onchange=heatmap; cmpSel.onchange=selDoc;
  setTimeout(render,0);
  return card;
}

function drawDoc(card,city,cl,doc,mode){
  const cv=card.querySelector('.cc3'), id=city+'_d';
  const g=k=>(cl[k]||{})[doc]||M.map(()=>0);
  const done=cl.doctors[doc]||M.map(()=>0), days=g('days'), bookings=g('bookings'), shA=g('sh'), stiA=g('sti'), practo=g('practo');
  const prod=M.map((_,i)=>days[i]?r1(done[i]/days[i]):null);
  if(charts[id]) charts[id].destroy();
  const grid=isDark?'rgba(255,255,255,.1)':'rgba(0,0,0,.07)', tick=isDark?'#b4b2a9':'#5f5e5a';
  let datasets, yTitle='per month', useY1=false;
  if(mode==='capprod'){useY1=true;yTitle='active days / mo';
    datasets=[{type:'bar',label:'active days (capacity)',data:days,backgroundColor:'#185fa5',yAxisID:'y',borderWidth:0,order:2},
      {type:'line',label:'SC per active-day (productivity)',data:prod,borderColor:'#d85a30',yAxisID:'y1',borderWidth:2.4,pointRadius:2,tension:.25,order:1}];}
  else if(mode==='bookdone') datasets=[{type:'line',label:'new bookings',data:bookings,borderColor:'#185fa5',borderWidth:2.4,pointRadius:2,tension:.25},{type:'line',label:'done (completed SC)',data:done,borderColor:'#0f6e56',borderWidth:2.4,pointRadius:2,tension:.25}];
  else if(mode==='cat') datasets=[{type:'line',label:'SH done',data:shA,borderColor:'#d85a30',borderWidth:2.4,pointRadius:2,tension:.25},{type:'line',label:'STI done',data:stiA,borderColor:'#534ab7',borderWidth:2.4,pointRadius:2,tension:.25},{type:'line',label:'total done',data:done,borderColor:'#888780',borderWidth:1.6,pointRadius:0,borderDash:[4,3],tension:.25}];
  else datasets=[{type:'line',label:'Practo leads (Book+Call)',data:practo,borderColor:'#993556',borderWidth:2.4,pointRadius:2,tension:.25},{type:'line',label:'done (completed SC)',data:done,borderColor:'#0f6e56',borderWidth:2.4,pointRadius:2,tension:.25}];
  const scales={x:{grid:{color:grid},ticks:{color:tick,maxRotation:45,autoSkip:true,maxTicksLimit:12}},
    y:{position:'left',grid:{color:grid},ticks:{color:tick},title:{display:true,text:yTitle,color:useY1?'#185fa5':tick},beginAtZero:true}};
  if(useY1) scales.y1={position:'right',grid:{display:false},ticks:{color:tick},title:{display:true,text:'SC / active-day',color:'#d85a30'},beginAtZero:true};
  charts[id]=new Chart(cv,{data:{labels:M.map(fmtM),datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true,position:'top',labels:{boxWidth:11,font:{size:11},color:tick}}},scales}});
}

window.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
