name: Refresh dashboard data

# Runs the data pipeline daily and commits the refreshed data_*.json files.
# Manual run: Actions tab → "Refresh dashboard data" → Run workflow.
on:
  schedule:
    - cron: '30 1 * * *'      # 01:30 UTC ≈ 07:00 IST daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID:          ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:      ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CLIENT_ID:       ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      GOOGLE_ADS_CLIENT_SECRET:   ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      GOOGLE_ADS_REFRESH_TOKEN:   ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
      GBP_CLIENT_ID:              ${{ secrets.GBP_CLIENT_ID }}
      GBP_CLIENT_SECRET:          ${{ secrets.GBP_CLIENT_SECRET }}
      GBP_REFRESH_TOKEN:          ${{ secrets.GBP_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install boto3
      - name: Run refresh pipeline
        run: bash scripts/refresh_all.sh
      - name: Commit refreshed data
        run: |
          git config user.name  "allo-data-bot"
          git config user.email "noreply@allohealth.care"
          git add data_*.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: scheduled data refresh $(date -u +%F)"
            git push
          fi
