<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>L2B Demand Dashboard</title>
<style>
  :root{--bg:#EDF3F9;--ink:#1f2d3d;--muted:#5b6b7d;--line:#dbe4ee;--accent:#2C6CAE;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,sans-serif}
  header{padding:16px 22px 0;max-width:1000px;margin:0 auto}
  h1{font-family:'Fraunces',Georgia,serif;font-size:20px;font-weight:600;letter-spacing:-.3px;margin:0 0 3px}
  .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:2px solid var(--accent);max-width:1000px;margin:0 auto;padding:0 22px}
  .tab{font:inherit;font-size:13px;font-weight:600;border:1px solid var(--line);border-bottom:none;background:#fff;color:var(--muted);
       border-radius:9px 9px 0 0;padding:9px 16px;cursor:pointer;position:relative;top:2px}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab small{display:block;font-weight:400;font-size:10px;opacity:.8;margin-top:1px}
  .frame{width:100%;border:none;background:var(--bg);display:block}
  .hint{max-width:1000px;margin:0 auto;padding:6px 22px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
  <header>
    <h1>L2B Demand Dashboard</h1>
    <div class="sub">weekly lead → book, reconciled &amp; source-corrected · every tab has Full-weeks / Week-to-date</div>
  </header>
  <div class="tabs" id="tabs"></div>
  <div class="hint" id="hint"></div>
  <iframe id="frame" class="frame"></iframe>

<script>
  const TABS=[
    ['Overview','correct → corrected → final','l2b-overview.html'],
    ['Call leads','inbound calls → book','l2b-final.html'],
    ['Web leads','no-call, online → book','l2b-noncall.html'],
    ['Final','combined call + web','l2b-combined.html'],
  ];
  const tabsEl=document.getElementById('tabs'), frame=document.getElementById('frame'), hint=document.getElementById('hint');
  function sizeFrame(){ frame.style.height=(window.innerHeight-frame.getBoundingClientRect().top-8)+'px'; }
  function show(i){
    [...tabsEl.children].forEach((b,j)=>b.classList.toggle('on',j===i));
    frame.src=TABS[i][2];
    hint.textContent='Tab '+(i+1)+' of 4 · '+TABS[i][2];
    location.hash=i;
  }
  TABS.forEach((t,i)=>{const b=document.createElement('button');b.className='tab';
    b.innerHTML=`${t[0]}<small>${t[1]}</small>`;b.onclick=()=>show(i);tabsEl.appendChild(b);});
  window.addEventListener('resize',sizeFrame);
  frame.addEventListener('load',sizeFrame);
  const start=parseInt(location.hash.replace('#',''))||0;
  show(start>=0&&start<TABS.length?start:0); sizeFrame();
</script>
</body>
</html>
