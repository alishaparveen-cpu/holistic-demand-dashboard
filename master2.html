<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demand Master — L2-matched</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
:root{--bg:#EDF3F9;--sheet:#fff;--ink:#16232E;--ink2:#44566A;--muted:#7B8A9B;--faint:#A6B4C3;--line:#D5DFEA;--line2:#E5ECF3;--inset:#E4EDF6;--hover:#D2E1F1;--accent:#2C6CAE;--gold:#C2691F;--vio:#7B5EA7;--blu:#3E6F8E;--bad:#B23A2E;--good:#1F6F5C;--gbg:#E5F0EB;--rbg:#FBEDEB;--abg:#FAF2E6}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,sans-serif;padding:22px 26px 80px;max-width:1320px}
a.back{color:var(--muted);text-decoration:none;font-size:12.5px}
h1{font-family:Fraunces,serif;font-weight:600;font-size:27px;margin:6px 0 3px}
.sub{color:var(--ink2);font-size:13px;margin-bottom:10px;line-height:1.5;max-width:900px}
.ctlpanel{border:1px solid var(--line);border-radius:12px;background:#fff;padding:2px 13px;margin:11px 0 15px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.ctltier{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:8px 0;border-bottom:1px dashed var(--line2);min-height:30px}
.ctltier:last-child{border-bottom:none}
.ctltag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);min-width:50px;flex:0 0 50px}
.fbtn{padding:4px 10px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:Inter;color:var(--ink2);white-space:nowrap}
.fbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.fl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.ctlgap{flex:0 0 auto;width:15px}
.ms{position:relative;display:inline-block}
.mspanel{display:none;position:absolute;z-index:40;top:110%;left:0;background:#fff;border:1px solid var(--line);border-radius:9px;box-shadow:0 8px 26px rgba(0,0,0,.16);padding:7px;max-height:360px;overflow:auto;min-width:230px}
.mspanel.on{display:block}
.mspanel label{display:flex;align-items:center;gap:7px;font-size:12px;padding:4px 7px;white-space:nowrap;cursor:pointer;border-radius:5px}
.mspanel label:hover{background:var(--inset)}
.mspanel label .c{margin-left:auto;color:var(--muted);font-size:10.5px;font-family:'JetBrains Mono'}
.msgrp{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:6px 6px 2px}
.msclr{display:block;font-size:11px;color:var(--accent);cursor:pointer;padding:6px 6px 2px;border-top:1px solid var(--line);margin-top:5px}
.mssearch{width:100%;border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12px;font-family:Inter;margin-bottom:5px}
select.wsel{height:29px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:12px;font-weight:600;font-family:Inter;color:var(--ink2);padding:0 6px;cursor:pointer}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{border:none;background:#fff;color:var(--ink2);font-size:12px;font-weight:600;font-family:Inter;padding:5px 11px;cursor:pointer;border-right:1px solid var(--line)}
.seg button:last-child{border-right:none}.seg button.on{background:var(--accent);color:#fff}
#filtCount{margin-left:auto;font-size:11px;color:var(--muted);font-family:'JetBrains Mono'}
.fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:13px;overflow-x:auto}
table.fm{border-collapse:collapse;width:100%;font-size:13.5px;min-width:var(--fmw,860px);table-layout:fixed}
table.fm th{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);font-weight:600;text-align:right;padding:9px 10px;background:var(--inset);border-bottom:1px solid var(--line);white-space:nowrap}
table.fm th:first-child{text-align:left;width:300px;position:sticky;left:0;background:var(--inset);z-index:2}
th.avgcol{color:var(--ink2)}th.dcol{color:var(--ink2)}
.thsel{font-family:'JetBrains Mono';font-size:9px;font-weight:600;color:var(--accent);border:1px solid var(--line);border-radius:5px;background:#fff;padding:1px 2px;cursor:pointer;text-transform:none;letter-spacing:0}
table.fm td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line2);font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;white-space:nowrap}
table.fm td:first-child{text-align:left;font-family:Inter;color:var(--ink2);position:sticky;left:0;background:var(--sheet);z-index:1}
td.avgc{background:#FBFAF5;font-weight:600;color:var(--ink)}
td.dc{font-weight:700}
th.dcol,td.dc{width:82px;text-align:center}
th.avgcol,td.avgc{width:64px}
th.nowcol,td.nowc{width:58px}
th.nowcol{color:var(--accent)}
/* readable, de-cluttered funnel: history = quiet plain numbers; colour only on the verdict (change) + now */
table.fm td .wkc{font-weight:600;color:var(--ink)}
table.fm td.lastcol .wkc{color:var(--ink);font-weight:800}
td.nowc{background:var(--sheet)}
td.nowc .wkc{display:inline-block;min-width:24px;text-align:center;border-radius:6px;padding:3px 9px;font-weight:800;color:var(--ink);background:var(--inset)}
td.nowc .wkc.up{background:var(--gbg);color:var(--good)}
td.nowc .wkc.dn{background:var(--rbg);color:var(--bad)}
td.dc .dpill{display:inline-block;min-width:58px;text-align:center;border-radius:6px;padding:5px 9px;font-size:13px;font-weight:800;background:var(--inset);color:var(--muted)}
td.dc .dpill.up{background:var(--gbg);color:var(--good)}
td.dc .dpill.dn{background:var(--rbg);color:var(--bad)}
/* coloured, nested left column — each section colour-coded; breakdowns sit inside their parent's tinted rail */
tr.hd td{font-family:Inter;font-weight:700;color:var(--ink);font-size:13px;padding:10px 12px;border-top:2px solid var(--line)}
tr.hd td:first-child{background:var(--secbg,#EEF3F0);border-left:4px solid var(--seccol,var(--accent))}
tr.tot td{font-weight:700;color:var(--ink);font-size:14.5px}
tr.tot td:first-child{font-family:Inter;color:var(--seccol,var(--ink));border-left:4px solid var(--seccol,var(--accent))}
tr.sub td:first-child{padding-left:26px;font-size:12.5px;color:var(--ink2);border-left:4px solid var(--seccol,var(--line));background:var(--secbg,var(--sheet))}
tr.sub2 td:first-child{padding-left:44px;font-size:12px;color:var(--muted);border-left:4px solid var(--seccol,var(--line));background:var(--secbg,var(--sheet))}
tr.pct td{color:var(--vio)}tr.pct td:first-child{padding-left:26px;color:var(--ink2);font-size:12.5px;border-left:4px solid var(--seccol,var(--line));background:var(--secbg,var(--sheet))}
tr.brk td:first-child{padding-left:26px;font-size:12.5px;color:var(--ink2);border-left:4px solid var(--seccol,var(--line));background:var(--secbg,var(--sheet))}
tr.brk2 td:first-child{padding-left:46px;font-size:12px;color:var(--muted);border-left:4px solid var(--seccol,var(--line));background:var(--secbg,var(--sheet))}
tr.brk3 td:first-child{padding-left:66px;font-size:11.5px;color:var(--muted);border-left:4px solid var(--seccol,var(--line));background:var(--secbg,var(--sheet))}
tr.brk4 td:first-child{padding-left:86px;font-size:11.5px;color:var(--muted);border-left:4px solid var(--seccol,var(--line));background:var(--secbg,var(--sheet))}
tr.cat td:first-child{padding-left:24px;font-size:13px;font-weight:700;color:var(--seccol,var(--ink));border-left:4px solid var(--seccol,var(--accent))}
.lastcol{background:#FBFAF5!important}
.exp{cursor:pointer;user-select:none}.exp:before{content:'▸ ';color:var(--accent);font-size:10px;display:inline-block;width:12px}
.exp.open:before{content:'▾ '}
.brkpick{margin-left:8px;font-size:11px;font-family:Inter;font-weight:600;color:var(--accent);border:1px solid var(--line);border-radius:6px;background:#fff;padding:2px 5px;cursor:pointer}
.spark{display:inline-block;vertical-align:middle}
/* ── card-funnel presentation (coloured stage cards · nested breakdowns · sparkline, no chips) ── */
#tbl.cards{display:block}
.capbar{font-size:12px;color:var(--muted);margin:0 2px 8px}
.capbar b{color:var(--ink2);font-weight:600}
/* column header — aligned to the card content (border 5 + card pad 12 + frow pad 8) · sticky */
.chead{position:sticky;top:0;z-index:6;display:grid;grid-template-columns:var(--gtc);align-items:end;padding:8px 20px 8px 25px;margin-bottom:6px;background:var(--bg);border-bottom:1px solid var(--line);font-family:'JetBrains Mono';font-size:10px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--muted)}
.chead span{text-align:right;padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chead .chl{text-align:left}.chead .chc{text-align:left}
.chead .lastw{color:var(--accent)}.chead .chb{color:var(--ink2)}
.scard{background:var(--sheet);border:1px solid var(--line);border-left:5px solid var(--c,var(--accent));border-radius:14px;padding:2px 12px 10px;margin-bottom:16px;box-shadow:0 1px 3px rgba(20,50,80,.04)}
.scard-h{display:flex;align-items:center;gap:11px;padding:13px 4px 9px;flex-wrap:wrap}
.snum{min-width:28px;height:28px;padding:0 6px;flex:none;border-radius:8px;background:var(--c,var(--accent));color:#fff;font-family:'JetBrains Mono';font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
.sname{font-weight:700;font-size:16.5px;color:var(--ink)}
.fbody{display:block}
.frow{display:grid;grid-template-columns:var(--gtc,300px 92px 1fr 130px 90px);align-items:center;box-sizing:border-box;max-width:none;padding:9px 8px;border-radius:9px;cursor:zoom-in}
.fwk{text-align:right;font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink);padding:0 5px}
.fwk.lastw{font-weight:800;border-radius:6px;padding:4px 7px;background:var(--inset)}
.fwk.lastw.up{background:var(--gbg);color:var(--good)}.fwk.lastw.dn{background:var(--rbg);color:var(--bad)}
.frow:hover{background:var(--inset)}
.frow.tot{background:var(--cbg,var(--inset))}
.frow.tot .flab{font-weight:800;font-size:15px;color:var(--ink)}
.flab{min-width:0;display:inline-flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flab .dot{width:11px;height:11px;border-radius:3px;flex:none}
/* nested breakdowns sit INSIDE their parent — a stepped indent + a tree rail on the left */
.frow.sub .flab,.frow.pct .flab,.frow.brk .flab,.frow.cat .flab{margin-left:16px;padding-left:15px;border-left:2px solid var(--line)}
.frow.sub2 .flab,.frow.brk2 .flab{margin-left:40px;padding-left:15px;border-left:2px solid var(--line)}
.frow.brk3 .flab{margin-left:64px;padding-left:15px;border-left:2px solid var(--line)}
.frow.brk4 .flab{margin-left:88px;padding-left:15px;border-left:2px solid var(--line)}
.frow.cat .flab{font-weight:700;color:var(--ink)}
.frow.pct .flab{color:var(--vio)}
.fchange{display:inline-flex}
.fchange .dpill{display:inline-block;min-width:58px;text-align:center;border-radius:6px;padding:4px 9px;font-size:13px;font-weight:800;background:var(--inset);color:var(--muted)}
.fchange .dpill.up{background:var(--gbg);color:var(--good)}.fchange .dpill.dn{background:var(--rbg);color:var(--bad)}
.fspk{min-width:0;display:flex;align-items:center;padding:0 16px}
.fspk .sparkcell{flex:1;min-width:0;border-radius:6px;padding:3px 6px}.fspk .sparkcell:hover{background:var(--hover)}
.fspk .spark{width:100%;height:26px;display:block}
.fba{text-align:right;font-family:'JetBrains Mono';font-size:12.5px;color:var(--muted)}
.fnow{text-align:right;font-family:'JetBrains Mono';font-size:13.5px;color:var(--muted);padding-left:14px}
.fba b,.fnow b{color:var(--ink);font-weight:700}
.fnow.up b{color:var(--good)}.fnow.dn b{color:var(--bad)}
.sparkcell{cursor:zoom-in}.sparkcell:hover{background:var(--inset)}
.foot{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.6}
.modal{display:none;position:fixed;inset:0;background:rgba(34,32,27,.42);z-index:100;align-items:center;justify-content:center}
.modal.on{display:flex}
.mcard{background:var(--sheet);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.28);padding:20px 22px;width:min(760px,92vw)}
.mcard h3{font-family:Fraunces,serif;font-weight:600;font-size:19px;margin:0 0 2px}
.mclose{float:right;cursor:pointer;color:var(--muted);font-size:18px;border:none;background:none;line-height:1}
.pickbar{font-size:13px;color:var(--ink);padding:9px 2px 0;min-height:22px;border-top:1px solid var(--line2);margin-top:8px}
.pclear{color:var(--muted);cursor:pointer;margin-left:10px;font-size:11px;font-weight:600}
</style></head>
<body>
<a class="back" href="index.html">← Dashboard</a>
<h1 id="h1">Demand Master</h1>
<div class="sub"><b>demand → bookings → done → category → revenue → capacity</b>, reconciled to the L2 ops sheet. Offline demand funnel · bookings = distinct patient · revenue = done-week invoiced.</div>

<div class="ctlpanel">
  <div class="ctltier">
    <span class="ctltag">Funnel</span>
    <span class="seg"><button id="fnSC" class="on" onclick="setFunnel('sc')">🩺 Screening Calls · demand</button><button id="fnFU" onclick="setFunnel('fu')">🔁 Follow-ups · ops</button><button id="fnALL" onclick="setFunnel('all')">🌐 Combined · all</button></span>
  </div>
  <div class="ctltier">
    <span class="ctltag">Scope</span>
    <button class="fbtn" id="ovBtn" onclick="resetScope()">◎ All India</button>
    <span class="ctlgap"></span>
    <button class="fbtn" data-t="T1" onclick="togTier('T1')">Tier 1</button><button class="fbtn" data-t="T2" onclick="togTier('T2')">Tier 2</button>
    <span class="ctlgap"></span>
    <span class="ms"><button class="fbtn" id="cityBtn" onclick="openMs(event,'City')">All cities ▾</button><div class="mspanel" id="panelCity"></div></span>
    <span class="ms"><button class="fbtn" id="clinBtn" onclick="openMs(event,'Clin')">All clinics ▾</button><div class="mspanel" id="panelClin"></div></span>
    <span class="ms"><button class="fbtn" id="docBtn" onclick="openMs(event,'Doc')">All doctors ▾</button><div class="mspanel" id="panelDoc"></div></span>
    <span class="ctlgap"></span>
    <button class="fbtn" data-m="<3" onclick="togMat('<3')">&lt;3mo</button><button class="fbtn" data-m="3-6" onclick="togMat('3-6')">3–6mo</button><button class="fbtn" data-m="6-12" onclick="togMat('6-12')">6–12mo</button><button class="fbtn" data-m=">12" onclick="togMat('>12')">&gt;1yr</button>
    <span class="ctlgap"></span>
    <button class="fbtn on" id="scoff" onclick="setScope('off')">Offline</button><button class="fbtn" id="sconl" onclick="setScope('onl')">Online</button><button class="fbtn" id="scboth" onclick="setScope('both')">All</button>
    <span id="filtCount"></span>
  </div>
  <div class="ctltier">
    <span class="ctltag">Time</span>
    <span class="seg"><button id="guW" class="on" onclick="setGran('week')">Weekly</button><button id="guM" onclick="setGran('club')">Club</button></span>
    <span class="seg" id="clubStep" style="margin-left:4px;display:none"><button onclick="CLUBN=Math.max(2,CLUBN-1);render()">−</button><button style="pointer-events:none;min-width:34px" id="clubN">4w</button><button onclick="CLUBN=Math.min(8,CLUBN+1);render()">+</button></span>
    <span class="seg" style="margin-left:6px"><button id="agS" class="on" onclick="setAgg('sum')">Σ Sum</button><button id="agA" onclick="setAgg('avg')">x̄ Avg</button></span>
    <span class="ctlgap"></span>
    <span class="fl">Show</span><select class="wsel" id="rngSel" onchange="NSHOW=+this.value;render()"><option value="5" selected>5</option><option value="8">8</option><option value="13">13</option><option value="18">18</option><option value="26">26</option></select><span class="fl" id="unitWord">weeks</span>
    <span class="ctlgap"></span>
    <button class="fbtn" id="heatBtn" onclick="HEAT=!HEAT;this.classList.toggle('on',HEAT);render()">🎨 Heatmap</button>
  </div>
</div>

<div id="tbl" class="cards"></div>
<div class="foot" id="foot"></div>
<div class="modal" id="zmodal" onclick="if(event.target===this)closeZ()"><div class="mcard">
  <button class="mclose" onclick="closeZ()">✕</button>
  <h3 id="zTitle"></h3><div id="zSub" style="font-size:12px;color:var(--muted);margin-bottom:8px"></div>
  <div id="zChart"></div><div class="pickbar" id="zPick"></div>
</div></div>

<script>
let SC_BK=null,SC_EC=null,FU_BK=null,FU_EC=null,BK=null,EC=null,AV=null,REC=null,PR=null;
let SC_BK_ON=null,SC_EC_ON=null,FU_BK_ON=null,FU_EC_ON=null;   // online cubes (telehealth)
let FUNNEL='sc';   // 'sc' = Screening Calls (demand) · 'fu' = Follow-ups (ops) · 'all' = combined
let SCOPE='off';   // 'off' = offline clinics · 'onl' = online (telehealth) · 'both' = all channels
let ALL_BK=null,ALL_EC=null,DATASETS=null;
function setFunnel(f){FUNNEL=f;['sc','fu','all'].forEach(x=>document.getElementById('fn'+x.toUpperCase()).classList.toggle('on',f===x));render();}
function setScope(s){SCOPE=s;['off','onl','both'].forEach(x=>document.getElementById('sc'+x).classList.toggle('on',s===x));
  CITY.clear();CLIN.clear();TIER.clear();MAT.clear();DOC.clear();   // scope changes the clinic universe → reset scope filters
  ['cityBtn','clinBtn','docBtn'].forEach(id=>{const b=document.getElementById(id);if(b)b.textContent=b.textContent.replace(/^\S.*▾$/,id==='cityBtn'?'All cities ▾':id==='clinBtn'?'All clinics ▾':'All doctors ▾');});
  render();}
// build the 3×3 scope×funnel dataset matrix from the loaded cubes
function buildDatasets(){
  const offAllBk=combineData(SC_BK,FU_BK),offAllEc=combineData(SC_EC,FU_EC);
  const onAllBk=combineData(SC_BK_ON,FU_BK_ON),onAllEc=combineData(SC_EC_ON,FU_EC_ON);
  ALL_BK=offAllBk;ALL_EC=offAllEc;
  const OFF={sc:[SC_BK,SC_EC],fu:[FU_BK,FU_EC],all:[offAllBk,offAllEc]};
  const ON ={sc:[SC_BK_ON,SC_EC_ON],fu:[FU_BK_ON,FU_EC_ON],all:[onAllBk,onAllEc]};
  const BOTH={sc:[combineData(SC_BK,SC_BK_ON),combineData(SC_EC,SC_EC_ON)],
              fu:[combineData(FU_BK,FU_BK_ON),combineData(FU_EC,FU_EC_ON)],
              all:[combineData(offAllBk,onAllBk),combineData(offAllEc,onAllEc)]};
  DATASETS={off:OFF,onl:ON,both:BOTH};}
// element-wise sum of two datasets (aligned by week key), merging nested by_cat/by_doctor/by_source
function combineData(A,B){if(!A)return B;if(!B)return A;
  const weeks=[...new Set([...A._meta.weeks,...B._meta.weeks])].sort();
  const rm=(arr,src)=>{const o=Array(weeks.length).fill(0);(src||[]).forEach((w,i)=>{const gi=weeks.indexOf(w);if(gi>=0)o[gi]=(arr||[])[i]||0;});return o;};
  const add=(x,y,wx,wy)=>{const o={};const ks=new Set([...Object.keys(x||{}),...Object.keys(y||{})]);
    ks.forEach(f=>{const xv=(x||{})[f],yv=(y||{})[f];
      if(Array.isArray(xv)||Array.isArray(yv)){const a=rm(xv,wx),b=rm(yv,wy);o[f]=a.map((v,i)=>v+b[i]);}
      else o[f]=add(xv,yv,wx,wy);});return o;};
  const out={_meta:{weeks},clinics:{}};
  new Set([...Object.keys(A.clinics),...Object.keys(B.clinics)]).forEach(k=>{out.clinics[k]=add(A.clinics[k],B.clinics[k],A._meta.weeks,B._meta.weeks);});
  return out;}
let TIER=new Set(),CITY=new Set(),CLIN=new Set(),MAT=new Set(),DOC=new Set();
let NSHOW=5, EXPCAT=false, HEAT=false, GRAN='week', GAGG='sum', CMPB='avg', CLUBN=4;
let BRKS={dem:['none','none','none','none'],done:['category','none','none','none'],rev:['none','none','none','none'],cap:['none','none','none','none']};  // done defaults to a category breakdown
function setBrk(sec,i,v){BRKS[sec][i]=v;if(v==='none')for(let j=i+1;j<4;j++)BRKS[sec][j]='none';render();}
let KEY2META={};
const N=v=>v==null||isNaN(v)?'—':Math.round(v).toLocaleString('en-IN');
const N1=v=>v==null||isNaN(v)?'—':(Math.round(v*10)/10).toLocaleString('en-IN');
const RUP=v=>v==null||isNaN(v)?'—':'₹'+Math.round(v).toLocaleString('en-IN');
const P=v=>v==null||isNaN(v)?'—':Math.round(v)+'%';
const ZA=n=>Array(n).fill(0);
const wlab=w=>{const d=new Date(w+'T00:00:00'),e=new Date(d);e.setDate(e.getDate()+6);const m=x=>x.toLocaleString('en',{month:'short'});
  return d.getMonth()===e.getMonth()?`${d.getDate()}–${e.getDate()} ${m(e)}`:`${d.getDate()} ${m(d)}–${e.getDate()} ${m(e)}`;};
const mlab=k=>{const[y,m]=k.split('-');return new Date(y,m-1,1).toLocaleString('en',{month:'short',year:'2-digit'});};
const matBucket=age=>age==null?null:(age<3?'<3':age<6?'3-6':age<12?'6-12':'>12');

function allKeys(){return Object.keys(BK.clinics);}
function scopedKeys(){return allKeys().filter(k=>{const m=KEY2META[k]||{};
  if(TIER.size&&!TIER.has(m.tier))return false;if(CITY.size&&!CITY.has(m.city))return false;
  if(CLIN.size&&!CLIN.has(k))return false;if(MAT.size&&!(m.mat&&MAT.has(m.mat)))return false;
  if(DOC.size&&!Object.keys((BK.clinics[k].by_doctor)||{}).some(d=>DOC.has(d)))return false;return true;});}

// ── aggregation respecting DOC ──
function sumInto(o,a){if(a)for(let i=0;i<o.length;i++)o[i]+=a[i]||0;}
function aggBK(keys,f){const o=ZA(BK._meta.weeks.length);keys.forEach(k=>{const c=BK.clinics[k];if(!c)return;
  if(DOC.size){const bd=c.by_doctor||{};DOC.forEach(d=>{if(bd[d])sumInto(o,bd[d][f]);});}else sumInto(o,c[f]);});return o;}
function aggEC(keys,f,cat){const w=BK._meta.weeks,ew=EC._meta.weeks,o=ZA(w.length),map=ew.map(wk=>w.indexOf(wk));
  keys.forEach(k=>{const c=EC.clinics[k];if(!c)return;let a;
    if(cat)a=((c.by_cat||{})[cat]||{})[f];
    else if(DOC.size){const acc=ZA(ew.length);Object.keys(c.by_doctor||{}).forEach(d=>{if(DOC.has(d)&&c.by_doctor[d][f])for(let i=0;i<ew.length;i++)acc[i]+=c.by_doctor[d][f][i]||0;});a=acc;}
    else a=c[f];
    if(a)ew.forEach((wk,ei)=>{const gi=map[ei];if(gi>=0)o[gi]+=a[ei]||0;});});return o;}
function aggAV(keys,f){if(!AV)return null;const w=BK._meta.weeks,aw=AV._meta.weeks,o=ZA(w.length),map=aw.map(wk=>w.indexOf(wk));
  keys.forEach(k=>{const c=AV.clinics[k];if(!c||!c[f])return;aw.forEach((wk,ai)=>{const gi=map[ai];if(gi>=0)o[gi]+=c[f][ai]||0;});});return o;}
// paid-date revenue (cash collected) — align paid-rev weeks to BK axis, sum given channel(s) over keys
function aggPR(keys,chans){if(!PR)return null;const w=BK._meta.weeks,pw=PR._meta.weeks,o=ZA(w.length),map=pw.map(wk=>w.indexOf(wk));
  keys.forEach(k=>{const c=PR.clinics[k];if(!c)return;chans.forEach(ch=>{const a=c[ch];if(!a)return;pw.forEach((wk,pi)=>{const gi=map[pi];if(gi>=0)o[gi]+=a[pi]||0;});});});return o;}
// category rollups → sub-categories (finer diagnoses)
const CATGRP=[['STI · infections',['STI']],
  ['SH · sexual health',['ED+','PE+','ED+PE+','LSD','DE','DYS','VGS','FSAD','AORG']],
  ['MH · mental health',['MH','PA','CM']],
  ['Other / undetermined',['NOS','oth']]];
const SUBLAB={'STI':'STI','ED+':'Erectile dysfunction (ED)','PE+':'Premature ejaculation (PE)','ED+PE+':'ED + PE','LSD':'Low sexual desire','DE':'Delayed ejaculation','DYS':'Dyspareunia / pain','VGS':'Vaginismus','FSAD':'Female arousal (FSAD)','AORG':'Anorgasmia','MH':'Mental health','PA':'Porn addiction','CM':'Compulsive masturbation','NOS':'Not-otherwise-specified','oth':'Undetermined / no-dx'};
function aggGrp(keys,subs,f){const o=ZA(BK._meta.weeks.length);subs.forEach(c=>sumInto(o,aggEC(keys,f,c)));return o;}

// ── time buckets (week or month) over the last NSHOW complete weeks ──
function blab(idxs){const w=BK._meta.weeks;const a=new Date(w[idxs[0]]+'T00:00:00'),b=new Date(w[idxs[idxs.length-1]]+'T00:00:00');b.setDate(b.getDate()+6);
  const m=x=>x.toLocaleString('en',{month:'short'});return a.getDate()+' '+m(a)+'–'+b.getDate()+' '+m(b);}
function vbuckets(){const w=BK._meta.weeks,today=new Date();today.setHours(0,0,0,0);
  const full=w.map((x,i)=>i).filter(i=>{const e=new Date(w[i]+'T00:00:00');e.setDate(e.getDate()+7);return e<=today;});
  if(GRAN==='club'){const blocks=[];for(let e=full.length;e>0;e-=CLUBN)blocks.unshift(full.slice(Math.max(0,e-CLUBN),e));
    return blocks.slice(-NSHOW).map(idxs=>({lab:blab(idxs),idxs}));}
  return full.slice(-NSHOW).map(i=>({lab:wlab(w[i]),idxs:[i]}));}
function bval(arr,b){const vs=b.idxs.map(i=>arr[i]);const s=vs.reduce((a,x)=>a+(x||0),0);return GAGG==='avg'?s/b.idxs.length:s;}
function pctBucket(nu,de,b){let sn=0,sd=0;b.idxs.forEach(i=>{sn+=nu[i]||0;sd+=de[i]||0;});return sd?sn/sd:null;}

function sparkline(vals,color){const v=vals.filter(x=>x!=null&&!isNaN(x));if(v.length<2)return'';const mn=Math.min(...v),mx=Math.max(...v),rg=mx-mn||1;
  const W=180,H=26,pts=vals.map((x,i)=>{const px=i/(vals.length-1)*W;const py=x==null?H/2:H-3-((x-mn)/rg)*(H-6);return px.toFixed(1)+','+py.toFixed(1);}),lx=(vals.length-1)/(vals.length-1)*W,ly=vals[vals.length-1]==null?H/2:H-3-((vals[vals.length-1]-mn)/rg)*(H-6);
  return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" width="'+W+'" height="'+H+'"><polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.6"/><circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="2.6" fill="'+color+'"/></svg>';}
function heatBg(t){if(t==null)return'';const g='31,111,92',r='178,58,46';return t>=.5?`background:rgba(${g},${(0.04+0.16*((t-0.5)/0.5)).toFixed(3)})`:`background:rgba(${r},${(0.04+0.16*((0.5-t)/0.5)).toFixed(3)})`;}

let SEQ=0;
function render(){
  const ds=(DATASETS&&DATASETS[SCOPE]&&DATASETS[SCOPE][FUNNEL])||[SC_BK,SC_EC];
  BK=ds[0];EC=ds[1];   // active dataset for current scope × funnel
  const isFU=FUNNEL==='fu', isSC=FUNNEL==='sc', isALL=FUNNEL==='all';
  const isOnl=SCOPE==='onl', isBoth=SCOPE==='both';
  const chan=isOnl?'Online':isBoth?'All-channel':'Offline';
  const bkLab=(isFU?'FU':isALL?'All':'SC')+' '+chan+' Bookings'+(isALL?' · SC + FU':'');
  const dnLab=(isFU?'Follow-up':isALL?'All':'Screening Call')+' Consults Done'+(isOnl?' · online':isBoth?' · all-channel':'');
  const fwWord=isFU?'Follow-up':isALL?'SC + FU':'Screening-call';   // funnel word for section context
  const ctx='<span style="font-weight:400;color:var(--muted);font-size:11px"> · '+fwWord+' · '+chan.toLowerCase()+'</span>';
  const keys=scopedKeys(), B=vbuckets();
  ZREG=[];
  const spk=(lab,vals,fmt,color)=>{const idx=ZREG.length;ZREG.push({t:lab.replace(/<[^>]+>/g,'').trim(),v:vals.slice(),L:B.map(b=>b.lab),f:fmt||N,c:color});return '<span class="sparkcell" onclick="event.stopPropagation();zoomReg('+idx+')">'+sparkline(vals,color)+'</span>';};
  document.getElementById('unitWord').textContent=GRAN==='club'?(CLUBN+'-wk blocks'):'weeks';
  {const cn=document.getElementById('clubN');if(cn)cn.textContent=CLUBN+'w';}
  const cities=[...new Set(keys.map(k=>k.split('|')[0]))];
  document.getElementById('h1').textContent='Demand Master'+(DOC.size?' · 👤 '+(DOC.size<=2?[...DOC].map(d=>d.replace(/^Dr\.?\s*/,'')).join(' + '):DOC.size+' doctors'):CITY.size===1?' · '+[...CITY][0]:TIER.size?' · '+[...TIER].join('+'):'');
  document.getElementById('filtCount').textContent=(DOC.size?DOC.size+' doctors · ':'')+keys.length+' clinics · '+cities.length+' cities';
  document.getElementById('tbl').style.setProperty('--fmw',(300+B.length*74+240)+'px');
  document.getElementById('tbl').style.setProperty('--gtc','300px 84px repeat('+B.length+',minmax(48px,1fr)) 124px');

  const cmpOpts=['avg','first','peak'].map(o=>'<option value="'+o+'"'+(CMPB===o?' selected':'')+'>'+o+'</option>').join('');
  const dcolTh='<th class="dcol">Δ vs <select class="thsel" onchange="CMPB=this.value;render()" onclick="event.stopPropagation()">'+cmpOpts+'</select></th>';
  const cmpSel='<select class="thsel" style="font-size:12px;padding:2px 4px" onchange="CMPB=this.value;render()">'+cmpOpts+'</select>';
  const head='<div class="capbar">Each row → <b>change</b> vs '+cmpSel+' · weekly numbers (latest = coloured verdict) · <b>before-avg</b>. Click any row for its full trend graph.</div>';
  const chead='<div class="chead"><span class="chl">metric</span><span class="chc">Δ '+CMPB+'</span>'+B.map((b,k)=>'<span'+(k===B.length-1?' class="lastw"':'')+'>'+b.lab+'</span>').join('')+'<span class="chb">before</span></div>';
  // per-section colour (badge + card rail), set by hd(); each metric = one frow (dot·label · Δ pill · sparkline · before → now)
  let SEC=['var(--accent)','#EAF1FB'];let cardOpen=false;
  const PAL=['#C2691F','#3E6F8E','#7A5CC2','#1F6F5C','#B23A2E','#5A7D2E','#B08900','#8E5A9E','#2E7D5B','#A65C2E'];
  // build one funnel row from a bucketed series
  function frow(lab,cv,cls,fmt,o){o=o||{};fmt=fmt||N;
    const ref=CMPB==='peak'?Math.max(...cv.filter(x=>x!=null)):CMPB==='first'?cv[0]:cv.reduce((a,x)=>a+(x||0),0)/cv.length;
    const last=cv[cv.length-1];const dn=(ref&&last!=null)?Math.round((last-ref)/Math.abs(ref)*100):null;
    const dc=dn==null?'':(dn>0?'up':dn<0?'dn':'');
    const col=o.color||SEC[0];
    const pill='<span class="fchange"><span class="dpill '+dc+'">'+(dn==null?'—':((dn>0?'↑ ':dn<0?'↓ ':'→ ')+Math.abs(dn)+'%'))+'</span></span>';
    const wk=cv.map((v,k)=>{const isL=k===cv.length-1;const iv=(v==null||isNaN(v))?'—':fmt(v);return '<span class="fwk'+(isL?' lastw '+dc:'')+'">'+iv+'</span>';}).join('');
    const zi=ZREG.length;ZREG.push({t:lab.replace(/<[^>]+>/g,'').trim(),v:cv.slice(),L:B.map(b=>b.lab),f:fmt||N,c:col});
    return '<div class="frow '+(cls||'')+'" onclick="zoomReg('+zi+')" title="click for the full trend">'
      +'<span class="flab"><span class="dot" style="background:'+col+'"></span>'+lab+'</span>'
      +pill+wk
      +'<span class="fba">before <b>'+(isNaN(ref)?'—':fmt(ref))+'</b></span>'
    +'</div>';}
  // row of a count/value metric
  function row(lab,arr,cls,fmt,o){return frow(lab,B.map(b=>bval(arr,b)),cls,fmt,o);}
  function prow(lab,nu,de,fmt,xcls){fmt=fmt||P;const cv=B.map(b=>pctBucket(nu,de,b));const mult=fmt===P?100:1;
    return frow(lab,cv.map(v=>v==null?null:v*mult),'pct'+(xcls?' '+xcls:''),fmt,{color:'#9b8bbf'});}
  const hd=(t,pick,col)=>{if(col)SEC=col;const m=t.match(/^(\S+)\s+([\s\S]*)$/);const num=m?m[1]:'';const title=m?m[2]:t;
    const open=(cardOpen?'</div></div>':'');cardOpen=true;
    return open+'<div class="scard" style="--c:'+SEC[0]+';--cbg:'+SEC[1]+'"><div class="scard-h"><span class="snum">'+num+'</span><span class="sname">'+title+'</span>'+(pick||'')+'</div><div class="fbody">';};
  const BOPTS=[['none','—'],['city','City'],['clinic','Clinic'],['doctor','Doctor'],['tier','Tier'],['maturity','Maturity']];
  const EXTRA={dem:[['source','Source']],done:[['source','Source'],['category','Category'],['subcategory','Sub-category']],rev:[['category','Category'],['subcategory','Sub-category']],cap:[]};
  const GEORANK={tier:1,city:2,clinic:3};   // broader → narrower
  // valid dims to offer at a given level, given what's already chosen (kills meaningless combos)
  function optsFor(sec,dims,level){
    const used=dims.slice(0,level).filter(d=>d!=='none');
    if(used.some(d=>['doctor','source','subcategory'].includes(d)))return [];   // terminal leaf → nothing further
    let opts=BOPTS.concat(EXTRA[sec]||[]).filter(o=>o[0]==='none'||!used.includes(o[0]));
    if(isFU)opts=opts.filter(o=>o[0]!=='source');                               // FU has no source data
    if(isOnl)opts=opts.filter(o=>!['city','clinic','tier','maturity'].includes(o[0]));   // online is national (one bucket) → geo breaks are meaningless
    if(DOC.size)opts=opts.filter(o=>!['source','category','subcategory'].includes(o[0]));  // doctor slice: only geo/doctor sliceable (by_cat/by_source are whole-clinic)
    const gr=used.filter(d=>d in GEORANK).map(d=>GEORANK[d]);
    if(gr.length){const mn=Math.min(...gr);opts=opts.filter(o=>!(o[0] in GEORANK)||GEORANK[o[0]]>mn);}  // only strictly-narrower geo
    if(used.includes('clinic')||used.includes('maturity'))opts=opts.filter(o=>o[0]!=='maturity'&&!(o[0] in GEORANK)||o[0]==='none');
    if(used.includes('category'))opts=opts.filter(o=>o[0]==='none'||o[0]==='subcategory');  // category → only its sub-types
    return opts;
  }
  function sanitizeBrk(sec){const dims=BRKS[sec];for(let i=0;i<4;i++){if(dims[i]==='none')break;
    const ok=optsFor(sec,dims,i).map(o=>o[0]);if(ok.indexOf(dims[i])<0){for(let j=i;j<4;j++)dims[j]='none';break;}}}
  ['dem','done','rev','cap'].forEach(sanitizeBrk);
  const brkSel=(sec)=>{const dims=BRKS[sec];let h='';
    for(let i=0;i<4;i++){if(i>0&&dims[i-1]==='none')break;const opts=optsFor(sec,dims,i);
      if(opts.filter(o=>o[0]!=='none').length===0)break;const lab=i===0?'break':'then';
      h+='<select class="brkpick" onchange="setBrk(\''+sec+'\','+i+',this.value)">'+opts.map(o=>'<option value="'+o[0]+'"'+(dims[i]===o[0]?' selected':'')+'>'+(o[0]==='none'?'— '+lab+' —':lab+': '+o[1])+'</option>').join('')+'</select>';}
    return h;};
  const MATLAB={'<3':'<3mo','3-6':'3–6mo','6-12':'6–12mo','>12':'>1yr','?':'—'};
  const SUBORDER=['STI','ED+','PE+','ED+PE+','LSD','DE','DYS','VGS','FSAD','AORG','MH','PA','CM','NOS','oth'];
  function members(dim,ks,parentCats){ks=ks||keys;
    if(dim==='category')return CATGRP.map(([lab,subs])=>({nm:lab,keys:ks,cats:subs}));
    if(dim==='subcategory'){const present={};ks.forEach(k=>Object.keys((EC.clinics[k]||{}).by_cat||{}).forEach(c=>{present[c]=1;}));
      return SUBORDER.filter(c=>present[c]&&(!parentCats||parentCats.indexOf(c)>=0)).map(c=>({nm:SUBLAB[c]||c,keys:ks,cat:c}));}
    if(dim==='city'){const g={};ks.forEach(k=>{(g[k.split('|')[0]]=g[k.split('|')[0]]||[]).push(k);});return Object.keys(g).map(nm=>({nm,keys:g[nm]}));}
    if(dim==='clinic')return ks.map(k=>({nm:k.replace('|',' · '),keys:[k]}));
    if(dim==='doctor'){const docs={};ks.forEach(k=>{Object.keys(BK.clinics[k].by_doctor||{}).forEach(d=>{if(DOC.size&&!DOC.has(d))return;(docs[d]=docs[d]||[]).push(k);});});
      return Object.keys(docs).map(nm=>({nm:nm.replace(/^Dr\.?\s*/,''),keys:docs[nm],doc:nm}));}
    if(dim==='tier'){const g={};ks.forEach(k=>{const t=(KEY2META[k]||{}).tier||'?';(g[t]=g[t]||[]).push(k);});return Object.keys(g).sort().map(nm=>({nm:nm==='?'?'—':'Tier '+nm.slice(1),keys:g[nm]}));}
    if(dim==='maturity'){const g={};ks.forEach(k=>{const mm=(KEY2META[k]||{}).mat||'?';(g[mm]=g[mm]||[]).push(k);});return ['<3','3-6','6-12','>12','?'].filter(x=>g[x]).map(nm=>({nm:MATLAB[nm],keys:g[nm]}));}
    if(dim==='source'){const g={};ks.forEach(k=>{Object.keys(BK.clinics[k].by_source||{}).forEach(s=>{(g[s]=g[s]||[]).push(k);});});return Object.keys(g).map(nm=>({nm,keys:g[nm],src:nm}));}
    return [];}
  // member-aware aggregation (doctor members use by_doctor slice)
  function bkMem(m,f){if(m.src){const o=ZA(BK._meta.weeks.length);m.keys.forEach(k=>{const bs=(BK.clinics[k].by_source||{})[m.src];if(bs)sumInto(o,bs[f]);});return o;}
    if(!m.doc)return aggBK(m.keys,f);const o=ZA(BK._meta.weeks.length);m.keys.forEach(k=>{const bd=(BK.clinics[k].by_doctor||{})[m.doc];if(bd)sumInto(o,bd[f]);});return o;}
  function ecMem(m,f){if(!m.doc)return aggEC(m.keys,f);const w=BK._meta.weeks,ew=EC._meta.weeks,o=ZA(w.length),map=ew.map(wk=>w.indexOf(wk));m.keys.forEach(k=>{const c=EC.clinics[k];if(!c)return;const bd=(c.by_doctor||{})[m.doc];if(bd&&bd[f])ew.forEach((wk,ei)=>{const gi=map[ei];if(gi>=0)o[gi]+=bd[f][ei]||0;});});return o;}
  const NWK=BK._meta.weeks.length;
  function doneAgg(m){   // Done broken by source (bookings cube) / category / sub-category / doctor / geography
    if(m.src){const o=ZA(NWK);m.keys.forEach(k=>{const bs=(BK.clinics[k].by_source||{})[m.src];if(bs)sumInto(o,bs.done);});return o;}
    if(m.cats){const o=ZA(NWK);m.cats.forEach(c=>sumInto(o,aggEC(m.keys,'done',c)));return o;}
    if(m.cat)return aggEC(m.keys,'done',m.cat);
    return ecMem(m,'done');}
  function purchAgg(m){   // purchased per member (econ only — source has no purchased → null, skips the % row)
    if(m.src)return null;
    if(m.cats){const o=ZA(NWK);m.cats.forEach(c=>sumInto(o,aggEC(m.keys,'purchased',c)));return o;}
    if(m.cat)return aggEC(m.keys,'purchased',m.cat);
    return ecMem(m,'purchased');}
  function revAgg(m){const g=fn=>{const o=ZA(NWK);['meds_val','test_val','ther_val','cons_val'].forEach(f=>sumInto(o,fn(f)));return o;};
    if(m.cats)return g(f=>{const o=ZA(NWK);m.cats.forEach(c=>sumInto(o,aggEC(m.keys,f,c)));return o;});
    if(m.cat)return g(f=>aggEC(m.keys,f,m.cat));

  function brkRows(sec,aggfn,pctNumFn){const raw=BRKS[sec];const dims=[];for(const d of raw){if(d==='none')break;if(!dims.includes(d))dims.push(d);}
    if(!dims.length)return'';const la=B[B.length-1];
    const caps=[25,12,8,6],cls=['brk','brk2','brk3','brk4'];
    function nest(ks,depth,parentCats){if(depth>=dims.length)return'';
      const ms=members(dims[depth],ks,parentCats).map(m=>({m,arr:aggfn(m)})).filter(x=>x.arr.some(v=>v)).sort((a,b)=>bval(b.arr,la)-bval(a.arr,la)).slice(0,caps[depth]);
      let o='';ms.forEach((x,i)=>{o+=row(x.m.nm,x.arr,cls[depth],null,{color:depth===0?PAL[i%PAL.length]:SEC[0]});
        if(pctNumFn){const num=pctNumFn(x.m);if(num&&x.arr.some(v=>v))o+=prow('→ purchased %',num,x.arr,null,cls[depth+1]||'brk4');}
        const leaf=x.m.doc||x.m.src||x.m.cat;
        const canChild=depth+1<dims.length&&!leaf&&(x.m.cats?dims[depth+1]==='subcategory':true);
        if(canChild)o+=nest(x.m.keys,depth+1,x.m.cats||null);});return o;}
    return nest(keys,0,null);}

  const booked=aggBK(keys,'booked'),done=aggBK(keys,'done');
  const ftS=aggBK(keys,'ft_same'),ftP=aggBK(keys,'ft_prev'),ftN=aggBK(keys,'ft_nolead');
  const rep=aggBK(keys,'repeat'),reb=aggBK(keys,'ret_rebook'),ret=aggBK(keys,'ret_return');
  const newT=booked.map((_,i)=>ftS[i]+ftP[i]+ftN[i]);
  const eDone=aggEC(keys,'done'),purch=aggEC(keys,'purchased');
  const meds=aggEC(keys,'meds_val'),test=aggEC(keys,'test_val'),ther=aggEC(keys,'ther_val');
  const prod=meds.map((_,i)=>meds[i]+test[i]+ther[i]);

  let h=head+chead;
  // ── ① Leads — acquisition top of funnel (national; a lead has no clinic until it books) ──
  const ML=REC&&REC._meta&&REC._meta.master_leads;
  if(ML&&!isFU){const LW=(REC._meta.weeks)||[],bw=BK._meta.weeks;
    const la=arr=>{const o=ZA(bw.length);LW.forEach((w,i)=>{const gi=bw.indexOf(w);if(gi>=0)o[gi]=(arr||[])[i]||0;});return o;};
    const T=ML.total||{};const newL=la(T.new_leads),bSame=la(T.booked_same),bLater=la(T.booked_later),bNever=la(T.never_booked);
    const bookedEver=newL.map((_,i)=>bSame[i]+bLater[i]);
    const bOff=la(T.booked_off),bOn=la(T.booked_on),bOffAS=la(T.booked_off_apptsame),bOffAL=la(T.booked_off_apptlater);
    h+=hd('① Leads — acquisition <span style="font-weight:400;color:var(--muted);font-size:11px">· national · by source · booked = CRM call-date; the offline appt-week line below ties to the funnel</span>','',['#2C6CAE','#EAF1FB']);
    h+=row('<b>New leads this week</b> · fresh phones',newL,'tot',N,{color:'#3E6F8E'});
    h+=prow('lead → book % (eventually)',bookedEver,newL);
    // offline/online lead-booking split needs build_master_leads.py's booked_off/on/apptsame/apptlater fields — hide until the warehouse re-pull populates them (self-heals; avoids a wall of 0s)
    if(bOff.some(x=>x)||bOn.some(x=>x)){
      h+=row('booked → offline · called this wk',bOff,'sub');
      h+=row('appointment this week (≡ funnel)',bOffAS,'sub2');
      h+=row('appointment a later week (drift)',bOffAL,'sub2');
      h+=row('booked → online',bOn,'sub');}
    h+=row('booked a later week',bLater,'sub');h+=row('never booked',bNever,'sub');
    // sources ranked by volume; drop JustDial; collapse the small tail into one "Other sources" row
    const SRC=(ML.sources||[]).filter(s=>s!=='JustDial').map(s=>{const bs=(ML.by_source||{})[s];if(!bs)return null;const nl=la(bs.new_leads);if(!nl.some(v=>v))return null;
        return{s,nl,book:la(bs.booked_same).map((v,i)=>v+la(bs.booked_later)[i]),vol:nl.reduce((a,b)=>a+b,0)};}).filter(Boolean).sort((a,b)=>b.vol-a.vol);
    const BIG=SRC.slice(0,6),SMALL=SRC.slice(6);
    BIG.forEach((x,i)=>{h+=row(x.s,x.nl,'cat',null,{color:PAL[i%PAL.length]});h+=prow('lead → book %',x.book,x.nl,null,'sub2');});
    if(SMALL.length){const onl=SMALL.reduce((o,x)=>x.nl.map((v,i)=>v+o[i]),ZA(bw.length)),obk=SMALL.reduce((o,x)=>x.book.map((v,i)=>v+o[i]),ZA(bw.length));
      h+=row('Other sources · '+SMALL.length+' small channels',onl,'cat',null,{color:'#8a8579'});h+=prow('lead → book %',obk,onl,null,'sub2');}
  }
  h+=hd((isFU?'② Follow-up bookings (ops)':isALL?'② Bookings — all consults (SC + FU)':'② Demand — bookings')+'<span style="font-weight:400;color:var(--muted);font-size:11px"> · '+chan.toLowerCase()+'</span>',brkSel('dem'),['#1F6F5C','#E7F1EC']);
  h+=row('<b>'+bkLab+'</b> · distinct patient',booked,'tot',N,{color:'#2E7D5B'});
  h+=brkRows('dem',m=>bkMem(m,'booked'));
  if(isSC){
    h+=row('New patients (1st-time)',newT,'sub');
    h+=row('from this week’s leads',ftS,'sub2');h+=row('from earlier leads (backlog)',ftP,'sub2');
    if(B.some(b=>bval(ftN,b)))h+=row('no lead tracked',ftN,'sub2');
    h+=row('Repeat patients',rep,'sub');
    h+=row('re-book (never completed)',reb,'sub2');h+=row('return (completed before)',ret,'sub2');
  }

  h+=hd('③ Done — completed consults'+ctx+(DOC.size?'':' <span style="font-weight:400;color:var(--muted);font-size:11px">(break by source · category · sub-category · city · clinic · doctor)</span>'),brkSel('done'),['#2E7D5B','#E9F3EE']);
  h+=row('<b>'+dnLab+'</b>',done,'tot',N,{color:'#2E7D5B'});
  h+=brkRows('done',doneAgg,purchAgg);
  h+=prow('book → done %',done,booked);

  h+=hd('④ Value — done-week (invoiced)'+ctx+(DOC.size?'':' <span style="font-weight:400;color:var(--muted);font-size:11px">(break by category · sub-category · city · clinic · doctor)</span>'),brkSel('rev'),['#C2691F','#F9F1E5']);
  const cons=aggEC(keys,'cons_val');const total=prod.map((_,i)=>prod[i]+cons[i]);
  h+=row('<b>Revenue</b> · total (incl. consultation)',total,'tot',RUP,{color:'#C2691F'});
  h+=brkRows('rev',revAgg);
  h+=prow('RPC — ₹/consult · incl. consultation',total,eDone,RUP);
  h+=prow('RPC — ₹/consult · products only (ex-consult)',prod,eDone,RUP);
  h+=prow('done → purchased %',purch,eDone);
  h+=row('Consultation fee',cons,'sub',RUP);h+=row('Medicines',meds,'sub',RUP);h+=row('Tests / diagnostics',test,'sub',RUP);h+=row('Therapy',ther,'sub',RUP);
  // ── paid-date revenue (cash actually collected this week) — separate axis, kept alongside for comparison ──
  if(PR){
    const NEWOFF=['New Offline','New · offline (SC)'],NEWON=['New Online','New · online (SC)'],REPEAT=['Repeat','Repeat (FU / queries)'],
      DIRECT=['Direct','Direct purchase'],OTHER=['Other','Other'],NOINV=['no_invoice','Un-invoiced'];
    const CH={off:{sc:[NEWOFF],fu:[REPEAT],all:[NEWOFF,REPEAT,DIRECT,OTHER]},
              onl:{sc:[NEWON],fu:[REPEAT],all:[NEWON,REPEAT]},
              both:{sc:[NEWOFF,NEWON],fu:[REPEAT],all:[NEWOFF,NEWON,REPEAT,DIRECT,OTHER,NOINV]}};
    const PCH=CH[SCOPE][FUNNEL];
    const pkeys=SCOPE==='off'?keys:Object.keys(PR.clinics);   // online has no clinic geo → national when scope includes online
    const paidTot=aggPR(pkeys,PCH.map(c=>c[0]));
    const chNote=isFU?'Repeat channel':isALL?'all channels':(isOnl?'New-Online channel':isBoth?'New Offline + Online':'New-Offline channel');
    h+=hd('④b Value — paid-date (cash collected)'+(DOC.size?'':' <span style="font-weight:400;color:var(--muted);font-size:11px">(actual payments · '+chNote+(SCOPE!=='off'?' · online = national':'')+' · pairs with invoiced above)</span>','',['#7A5CC2','#F0ECF9']));
    h+=row('<b>Revenue · paid</b> · cash in',paidTot,'tot',RUP,{color:'#7A5CC2'});
    PCH.forEach(c=>{const a=aggPR(pkeys,[c[0]]);if(a&&a.some(v=>v))h+=row(c[1],a,'sub',RUP);});
    h+=prow('RPC — ₹/consult · paid-date (cash)',paidTot,eDone,RUP);
    h+=prow('paid ÷ invoiced (collection vs booked value)',paidTot,total);}

  if(!isFU && SCOPE==='off' && AV){const scH=aggAV(keys,'net_sc_hrs'),scS=aggAV(keys,'net_sc_slots'),adays=aggAV(keys,'active_days');
    h+=hd('⑤ Capacity & utilisation (realized roster)',brkSel('cap'),['#3E6F8E','#E9F1F6']);
    h+=row('<b>SC net available hrs</b>',scH,'tot',N1,{color:'#3E6F8E'});
    h+=brkRows('cap',m=>aggAV(m.keys,'net_sc_hrs'));   // availability has no doctor grain → doctor break approximates to clinic capacity
    h+=row('SC slots offered',scS,'sub');
    h+=prow('utilisation — done ÷ slots',done,scS);
    h+=row('active clinic-days',adays,'sub');
    h+=prow('booking velocity — booked ÷ active-day',booked,adays,N1);
  }
  if(cardOpen)h+='</div></div>';
  document.getElementById('tbl').innerHTML=h;

  const lb=B[B.length-1];
  document.getElementById('foot').innerHTML='Latest ('+lb.lab+'): <b>'+N(bval(booked,lb))+'</b> booked → <b>'+N(bval(done,lb))+'</b> done ('+P(pctBucket(done,booked,lb)*100)+') → <b>'+RUP(bval(prod,lb))+'</b> ('+RUP(pctBucket(prod,eDone,lb))+'/consult).'+(DOC.size?' <b style="color:var(--gold)">Doctor scope: category breakdown hidden (needs doctor×category cross).</b>':'')+'<br>Additive over '+keys.length+' clinics · reconciled to L2. National channel-leads (GMB/Google/Meta/Practo) live in channel-view.';
}
let EXP={};function toggle(k){EXP[k]=!EXP[k];render();}   // (reserved for future inline expands)

// ── trend zoom modal ──
let ZREG=[], ZCUR=null, PICKA=null, PICKB=null;
function zoomReg(i){ZCUR=ZREG[i];PICKA=null;PICKB=null;drawZoom();document.getElementById('zmodal').classList.add('on');}
function closeZ(){document.getElementById('zmodal').classList.remove('on');}
function pickPt(i){if(PICKA===null)PICKA=i;else if(PICKB===null){PICKB=(i===PICKA)?null:i;if(PICKB===null)PICKA=null;}else{PICKA=i;PICKB=null;}drawZoom();}
function clearPick(){PICKA=null;PICKB=null;drawZoom();}
function drawZoom(){const z=ZCUR;if(!z)return;const fmt=z.f||N;
  document.getElementById('zTitle').textContent=z.t;
  const vals=z.v,vv=vals.filter(x=>x!=null&&!isNaN(x));const mn=Math.min(...vv),mx=Math.max(...vv),rg=(mx-mn)||1;
  const avg=vv.reduce((a,x)=>a+x,0)/vv.length;
  const W=700,H=250,PL=54,PR=16,PT=18,PB=40,iw=W-PL-PR,ih=H-PT-PB;
  const X=i=>PL+(vals.length<2?iw/2:i/(vals.length-1)*iw), Y=v=>PT+ih-((v-mn)/rg)*ih;
  let g='<svg width="'+W+'" height="'+H+'" style="max-width:100%">';
  [0,.25,.5,.75,1].forEach(t=>{const yv=mn+rg*t,y=Y(yv);g+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#EFEBE0"/>'+'<text x="'+(PL-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#8A8579" font-family="JetBrains Mono">'+fmt(yv)+'</text>';});
  const ya=Y(avg);g+='<line x1="'+PL+'" y1="'+ya+'" x2="'+(W-PR)+'" y2="'+ya+'" stroke="#C2691F" stroke-dasharray="4 3" opacity=".6"/><text x="'+(W-PR)+'" y="'+(ya-4)+'" text-anchor="end" font-size="9" fill="#C2691F">avg '+fmt(avg)+'</text>';
  const pts=vals.map((v,i)=>v==null?null:X(i)+','+Y(v)).filter(Boolean).join(' ');
  g+='<polyline points="'+pts+'" fill="none" stroke="'+(z.c||'#1F6F5C')+'" stroke-width="2"/>';
  vals.forEach((v,i)=>{if(v==null)return;const sel=(i===PICKA||i===PICKB);g+='<circle cx="'+X(i)+'" cy="'+Y(v)+'" r="'+(sel?5:3.5)+'" fill="'+(sel?'#C2691F':(z.c||'#1F6F5C'))+'" stroke="#fff" stroke-width="1.5" style="cursor:pointer" onclick="pickPt('+i+')"/>';
    g+='<text x="'+X(i)+'" y="'+(Y(v)-9)+'" text-anchor="middle" font-size="9" fill="#54504A" font-family="JetBrains Mono">'+fmt(v)+'</text>';});
  (z.L||[]).forEach((lab,i)=>{g+='<text x="'+X(i)+'" y="'+(H-14)+'" text-anchor="middle" font-size="8.5" fill="#8A8579" font-family="JetBrains Mono">'+lab+'</text>';});
  g+='</svg>';document.getElementById('zChart').innerHTML=g;
  const pb=document.getElementById('zPick');
  if(PICKA!=null&&PICKB!=null){const a=vals[PICKA],b=vals[PICKB],pc=a?Math.round((b-a)/Math.abs(a)*100):0;const col=pc>0?'#2E7D5B':pc<0?'#B23A2E':'#54504A';
    pb.innerHTML='<b>'+z.L[PICKA]+'</b> '+fmt(a)+' → <b>'+z.L[PICKB]+'</b> '+fmt(b)+' &nbsp;<b style="color:'+col+';font-size:15px">'+(pc>0?'+':'')+pc+'%</b> <span class="pclear" onclick="clearPick()">✕ clear</span>';}
  else if(PICKA!=null){pb.innerHTML='Selected <b>'+z.L[PICKA]+'</b> '+fmt(vals[PICKA])+' — click another point <span class="pclear" onclick="clearPick()">✕</span>';}
  else{pb.innerHTML='<span style="color:var(--muted)">➜ click any two points to compare % change</span>';}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZ();});

// ── filters ──
function togTier(t){TIER.has(t)?TIER.delete(t):TIER.add(t);document.querySelector('[data-t="'+t+'"]').classList.toggle('on');render();}
function togMat(m){MAT.has(m)?MAT.delete(m):MAT.add(m);document.querySelector('[data-m="'+m+'"]').classList.toggle('on');render();}
function setGran(g){GRAN=g;document.getElementById('guW').classList.toggle('on',g==='week');document.getElementById('guM').classList.toggle('on',g==='club');document.getElementById('clubStep').style.display=g==='club'?'inline-flex':'none';render();}
function setAgg(a){GAGG=a;document.getElementById('agS').classList.toggle('on',a==='sum');document.getElementById('agA').classList.toggle('on',a==='avg');render();}
function resetScope(){TIER.clear();CITY.clear();CLIN.clear();MAT.clear();DOC.clear();document.querySelectorAll('.fbtn.on').forEach(b=>{if(['catBtn','heatBtn'].indexOf(b.id)<0)b.classList.remove('on');});['city','clin','doc'].forEach(x=>{const b=document.getElementById(x+'Btn');if(b)b.textContent='All '+(x==='clin'?'clinics':x==='doc'?'doctors':'cities')+' ▾';});render();}
function openMs(e,w){e.stopPropagation();const p=document.getElementById('panel'+w);const o=p.classList.contains('on');document.querySelectorAll('.mspanel').forEach(x=>x.classList.remove('on'));if(!o){buildMs(w);p.classList.add('on');}}
function buildMs(w){const p=document.getElementById('panel'+w);const i=BK._meta.weeks.indexOf('2026-06-22');
  if(w==='City'){const cities=[...new Set(allKeys().map(k=>k.split('|')[0]))];const byT={T1:[],T2:[],'?':[]};
    cities.forEach(c=>{const t=(KEY2META[allKeys().find(k=>k.split('|')[0]===c)]||{}).tier||'?';(byT[t]||byT['?']).push(c);});
    let h='<input class="mssearch" placeholder="search city…" oninput="filterMs(this)">';
    ['T1','T2','?'].forEach(t=>{if(!byT[t].length)return;h+='<div class="msgrp">'+(t==='?'?'Other':'Tier '+t.slice(1))+'</div>';byT[t].sort().forEach(c=>{h+='<label><input type="checkbox" '+(CITY.has(c)?'checked':'')+' onchange="togCity(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</label>';});});
    if(CITY.size)h+='<a class="msclr" onclick="CITY.clear();buildMs(\'City\');render()">clear</a>';p.innerHTML=h;
  }else if(w==='Clin'){const keys=allKeys().filter(k=>!CITY.size||CITY.has(k.split('|')[0])).sort();
    let h='<input class="mssearch" placeholder="search clinic…" oninput="filterMs(this)">';
    keys.forEach(k=>{h+='<label><input type="checkbox" '+(CLIN.has(k)?'checked':'')+' onchange="togClin(\''+k.replace(/'/g,"\\'")+'\')">'+k.replace('|',' · ')+'<span class="c">'+(BK.clinics[k].booked[i]||0)+'</span></label>';});
    if(CLIN.size)h+='<a class="msclr" onclick="CLIN.clear();buildMs(\'Clin\');render()">clear</a>';p.innerHTML=h;
  }else{ // Doctor
    const kk=allKeys().filter(k=>!CITY.size||CITY.has(k.split('|')[0])).filter(k=>!CLIN.size||CLIN.has(k));
    const docs={};kk.forEach(k=>{Object.keys(BK.clinics[k].by_doctor||{}).forEach(d=>{docs[d]=(docs[d]||0)+(BK.clinics[k].by_doctor[d].booked[i]||0);});});
    const list=Object.keys(docs).filter(d=>docs[d]>0||DOC.has(d)).sort((a,b)=>docs[b]-docs[a]);
    let h='<input class="mssearch" placeholder="search doctor…" oninput="filterMs(this)">';
    list.forEach(d=>{h+='<label><input type="checkbox" '+(DOC.has(d)?'checked':'')+' onchange="togDoc(\''+d.replace(/'/g,"\\'")+'\')">'+d+'<span class="c">'+docs[d]+'</span></label>';});
    if(DOC.size)h+='<a class="msclr" onclick="DOC.clear();buildMs(\'Doc\');render()">clear</a>';p.innerHTML=h;
  }}
function filterMs(inp){const q=inp.value.toLowerCase();inp.parentNode.querySelectorAll('label').forEach(l=>{l.style.display=l.textContent.toLowerCase().indexOf(q)>=0?'':'none';});}
function togCity(c){CITY.has(c)?CITY.delete(c):CITY.add(c);document.getElementById('cityBtn').textContent=CITY.size?CITY.size+' cities ▾':'All cities ▾';render();}
function togClin(k){CLIN.has(k)?CLIN.delete(k):CLIN.add(k);document.getElementById('clinBtn').textContent=CLIN.size?CLIN.size+' clinics ▾':'All clinics ▾';render();}
function togDoc(d){DOC.has(d)?DOC.delete(d):DOC.add(d);document.getElementById('docBtn').textContent=DOC.size?DOC.size+' doctors ▾':'All doctors ▾';render();}
document.addEventListener('click',e=>{if(!e.target.closest('.ms'))document.querySelectorAll('.mspanel').forEach(x=>x.classList.remove('on'));});

Promise.all([
  fetch('data_sc_bookings.json?v='+Date.now()).then(r=>r.json()),
  fetch('data_d2p_econ.json?v='+Date.now()).then(r=>r.json()),
  fetch('data_availability.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_source_recon.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_fu_bookings.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_fu_econ.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_paid_rev.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_sc_bookings_online.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_d2p_econ_online.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_fu_bookings_online.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_fu_econ_online.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null)
]).then(([bk,ec,av,rec,fubk,fuec,pr,scbkon,scecon,fubkon,fuecon])=>{SC_BK=bk;SC_EC=ec;FU_BK=fubk;FU_EC=fuec;BK=bk;EC=ec;AV=av;REC=rec;PR=pr;
  const EMPTYON={_meta:{weeks:bk._meta.weeks},clinics:{}};   // graceful fallback if an online cube is missing
  SC_BK_ON=scbkon||EMPTYON;SC_EC_ON=scecon||EMPTYON;FU_BK_ON=fubkon||EMPTYON;FU_EC_ON=fuecon||EMPTYON;
  buildDatasets();
  const m=(rec&&rec._meta)||{};const disp=m.display||{},tier=m.city_tier||{},age=m.clinic_age||{};
  const key2slug={};Object.keys(disp).forEach(slug=>{const parts=String(disp[slug]).split(' · ');if(parts.length>=2){key2slug[parts[parts.length-1]+'|'+parts.slice(0,-1).join(' · ')]=slug;}});
  // meta for every key across all datasets (incl. the 'Online|Online' national bucket)
  const km=new Set();['off','onl','both'].forEach(s=>['sc','fu','all'].forEach(f=>{const d=DATASETS[s][f][0];if(d)Object.keys(d.clinics).forEach(k=>km.add(k));}));
  km.forEach(k=>{const city=k.split('|')[0];const slug=key2slug[k];KEY2META[k]=k==='Online|Online'?{city:'Online',tier:'—',mat:null,online:1}:{city,tier:tier[city]||'?',mat:slug?matBucket(age[slug]):null};});
  render();
}).catch(e=>{document.body.insertAdjacentHTML('beforeend','<p style="color:#B23A2E">Load error: '+e.message+'</p>');});
</script>
