<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SC bookings flow funnel</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#2C6CAE;--accentd:#1d5793;--ink:#1e2530;--ink2:#404a58;--muted:#6a7380;--faint:#9aa3b0;
    --bg:#F0EEE6;--sheet:#ffffff;--inset:#f5f3ec;--line:#e7e4d9;--line2:#efece3;--r:13px;
    --call:#2c6cae;--web:#1f9e8f;--wa:#4caf50;--book:#8257c4;--walk:#9aa3b0;--other:#c2c8d2;}
  @media (prefers-color-scheme:dark){:root{--ink:#e8ecf2;--ink2:#c4ccd6;--muted:#98a2b0;--faint:#6b7684;
    --bg:#12140f;--sheet:#181b21;--inset:#1e222a;--line:#2a2f38;--line2:#242932;}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;font-size:13px}
  .wrap{max-width:1040px;margin:0 auto;padding:18px 22px 90px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:4px}
  .back{font-size:12.5px;color:var(--muted);text-decoration:none}.back:hover{color:var(--accent)}
  h1{font-family:'Fraunces',serif;font-size:29px;font-weight:600;margin:8px 0 2px}
  .sub{color:var(--muted);font-size:12.5px;margin-bottom:14px;max-width:860px;line-height:1.5}
  h2.sech{font-family:'Fraunces',serif;font-size:19px;font-weight:600;margin:8px 0 10px;color:var(--ink)}
  select{font:inherit;font-weight:600;padding:7px 12px;border:1px solid var(--line);border-radius:9px;background:var(--sheet);color:var(--ink);min-width:210px;cursor:pointer}
  .segw{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .segw button{font:inherit;font-weight:600;font-size:12px;padding:7px 12px;border:0;background:var(--sheet);color:var(--muted);cursor:pointer}
  .segw button.on{background:var(--accent);color:#fff}

  /* ---- layer chips (draggable + multiselect) ---- */
  .layerbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:6px 0 15px}
  .layerbar .lead{font-size:11px;color:var(--faint);font-weight:600;margin-right:2px}
  .chip{position:relative;display:inline-flex;align-items:center;gap:8px;background:var(--sheet);border:1px solid var(--line);border-radius:10px;padding:7px 11px;cursor:grab;user-select:none;transition:box-shadow .12s,border-color .12s}
  .chip:hover{border-color:var(--accent)}
  .chip.drag{opacity:.4}.chip.over{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 30%,transparent)}
  .chip .ord{font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:#fff;background:var(--accent);width:16px;height:16px;border-radius:5px;display:flex;align-items:center;justify-content:center}
  .chip .nm{font-weight:700;font-size:12.5px}
  .chip .cnt{font-family:'JetBrains Mono';font-size:10.5px;color:var(--muted)}
  .chip .grip{color:var(--faint);font-size:13px;letter-spacing:-2px;margin-left:1px}
  .chip.pinned{cursor:default}.chip.pinned .grip{display:none}
  .chip .cv{font-size:10px;color:var(--faint);transition:transform .12s}
  .chip.open2 .cv{transform:rotate(180deg)}
  .chip .rm{font-size:13px;color:var(--faint);margin-left:1px;padding:0 2px;border-radius:4px}
  .chip .rm:hover{color:#B8503C;background:var(--inset)}
  .ghost{display:inline-flex;align-items:center;background:transparent;border:1px dashed var(--line);border-radius:10px;padding:6px 10px;font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer}
  .ghost:hover{border-color:var(--accent);color:var(--accent)}
  .arrow{color:var(--faint);font-size:13px}
  .pop{position:absolute;top:calc(100% + 5px);left:0;z-index:40;background:var(--sheet);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(20,28,24,.16);padding:8px;min-width:190px;display:none}
  .pop.show{display:block}
  .pop .pact{display:flex;gap:6px;margin-bottom:6px}
  .pop .pact button{flex:1;font:inherit;font-size:10.5px;font-weight:600;padding:4px;border:1px solid var(--line);border-radius:6px;background:var(--inset);color:var(--muted);cursor:pointer}
  .pop label{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:7px;cursor:pointer;font-size:12px}
  .pop label:hover{background:var(--inset)}
  .pop label .sw{width:9px;height:9px;border-radius:2px;flex:none}
  .pop input{accent-color:var(--accent)}

  .hero{display:flex;align-items:baseline;gap:10px;margin:6px 0 14px}
  .hero .n{font-family:'Fraunces',serif;font-size:34px;font-weight:600;line-height:1}
  .hero .l{font-size:13px;color:var(--muted)}
  .fmwrap{background:var(--sheet);border:1px solid var(--line);border-radius:var(--r);overflow-x:auto}
  #wkstep .nwk{display:flex;align-items:center;padding:0 8px;font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;border-left:1px solid var(--line);border-right:1px solid var(--line)}
  #wkstep button{width:26px;font-size:15px}
  .vsel{font-size:12px;color:var(--muted);font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .vsel select{padding:6px 8px;border:1px solid var(--line);border-radius:8px;background:var(--sheet);color:var(--ink);font:inherit;font-weight:600;font-size:12px;cursor:pointer;min-width:auto}
  .head{display:flex;align-items:center;gap:10px;padding:7px 15px;background:var(--inset);border-bottom:1px solid var(--line);font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .head .h-lbl{flex:1}.head .h-cnt{width:44px;text-align:right}.head .h-pct{width:42px;text-align:right}
  .frow{display:flex;align-items:center;gap:10px;padding:9px 15px;border-bottom:1px solid var(--line2)}
  .frow:last-child{border-bottom:0}
  .frow.clk{cursor:pointer}.frow.clk:hover{background:var(--inset)}
  .chev{width:12px;flex:none;color:var(--faint);font-size:10px;display:inline-block;text-align:center}
  .chev.leaf{visibility:hidden}
  .lbl{flex:none;display:flex;align-items:center;gap:7px;font-weight:600}
  .lbl .dot{width:9px;height:9px;border-radius:2px;flex:none}
  .attr{font-family:'JetBrains Mono';font-size:10px;color:var(--faint);margin-left:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:0 1 auto}   /* long URLs ellipsize instead of overrunning the number columns (full value in the title tooltip) */
  .attr.tbc{color:#b8862e}
  .nlab{color:var(--faint)}
  .numlist{padding:2px 0 7px;font-family:'JetBrains Mono';font-size:10px;color:var(--muted);border-bottom:1px solid var(--line2)}
  .numrow{padding:1.5px 0}.numrow.out{color:var(--faint);font-style:italic}
  .barwrap{display:block;flex:1;min-width:60px;height:16px;background:var(--inset);border-radius:4px;overflow:hidden}
  .barfill{display:block;height:100%;border-radius:4px;min-width:2px}
  .cnt{font-family:'JetBrains Mono';font-weight:600;font-variant-numeric:tabular-nums;width:44px;text-align:right;flex:none}
  .pct{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);width:42px;text-align:right;flex:none}
  .frow.wkly .lbl{flex:1;min-width:0}
  .wk{font-family:'JetBrains Mono';font-size:11.5px;font-variant-numeric:tabular-nums;width:52px;text-align:right;flex:none;color:var(--ink2)}
  .wk.last{color:var(--ink);font-weight:700}
  .wktot{font-family:'JetBrains Mono';font-weight:700;font-size:12px;width:48px;text-align:right;flex:none;padding-left:6px;border-left:1px solid var(--line2)}
  .head .wk,.head .wktot{font-size:9px;color:var(--faint);font-weight:600;line-height:1.15}
  .head .wk.last{color:var(--muted)}
  .delta{font-family:'JetBrains Mono';font-size:11px;font-weight:700;width:56px;text-align:right;flex:none;padding-left:6px}
  .delta.up{color:#2E7D5B}.delta.dn{color:#B8503C}.delta.flat{color:var(--faint)}
  .avgmk{font-family:'JetBrains Mono';font-size:12.5px;font-weight:700;flex:none;display:inline-flex;align-items:baseline;gap:4px;color:var(--ink)}
  .avgmk .avglab{font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .avgbefore{width:98px;box-sizing:border-box;justify-content:flex-end;padding-left:12px}.avgnow{width:80px;box-sizing:border-box;justify-content:flex-end}   /* FIXED (not min-) width so before/now never resize with the number → every week column stays vertically aligned across ①②③④⑤ */
  .avgnow.up{color:#2E7D5B}.avgnow.dn{color:#B8503C}.avgnow.flat{color:var(--ink)}
  .head .avgmk{font-size:8.5px;color:var(--faint);font-weight:600}.head .avgmk .avglab{color:var(--faint)}
  .head .delta{font-size:8.5px;color:var(--faint);font-weight:600}
  .frow.brate{background:color-mix(in srgb,#2E7D5B 6%,transparent)}
  .frow.brate .lbl{color:#2E7D5B;font-style:italic;font-weight:600}
  .frow.brate .wk{color:#2E7D5B;font-weight:700}
  .frow.brate .wk.last{color:#1F6F5C}
  .frow.subr{background:var(--inset)}
  .frow.subr .lbl{font-weight:600}
  .frow.subr.bkd .lbl,.frow.subr.bkd .wk{color:#2E7D5B}
  .frow.subr.nbk .lbl,.frow.subr.nbk .wk{color:#B8503C}
  .frow.subr.rate .lbl,.frow.subr.rate .wk{color:#1F6F5C;font-style:italic;font-weight:700}
  .bookpct{font-family:'JetBrains Mono';font-size:12px;font-weight:700;width:60px;text-align:center;flex:none;color:#155e45;background:color-mix(in srgb,#2E7D5B 13%,transparent);border-radius:6px;padding:2px 4px;margin-left:2px}
  .head .bookpct{font-size:8.5px;color:#2E7D5B;font-weight:700;background:color-mix(in srgb,#2E7D5B 10%,transparent)}
  .tag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:5px;background:var(--inset);color:var(--faint);letter-spacing:.03em}
  .frow.foot{border-top:2px solid var(--line);font-weight:700;background:var(--inset)}
  .frow.foot .lbl{flex:1}
  .hero{display:none}   /* headline total hidden — the Total row at the bottom carries it */
  .opsbadge{font-family:'JetBrains Mono';font-size:9.5px;font-weight:700;letter-spacing:.03em;color:#1F6F5C;background:color-mix(in srgb,#2E7D5B 12%,transparent);border-radius:6px;padding:2px 8px;vertical-align:middle;margin-left:8px}
  .opssub2{font-size:11.5px;color:var(--muted);margin:-4px 0 9px}.opssub2 b{color:#B8503C}
  .frow.opsstage{border-top:1px solid var(--line2)}
  .frow.opsstage .lbl{font-weight:700;color:var(--ink)}
  .frow.opssub .lbl{color:var(--muted);font-size:12.5px}
  .dlchip{border:1px solid var(--line);background:var(--sheet);color:var(--muted);border-radius:6px;padding:2px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:4px}
  .dlchip.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,var(--sheet));color:var(--accent);cursor:grab}
  .dlchip.on.drag{opacity:.4}.dlchip.over{box-shadow:-2px 0 0 var(--accent)}
  .dlchip.fix{border-style:dashed;color:var(--muted);cursor:default}
  .dlgrip{color:var(--faint);margin-right:5px;font-size:9px;letter-spacing:-1px}
  .dlx{margin-left:6px;color:var(--faint);cursor:pointer;font-weight:700}.dlx:hover{color:#B8503C}
  .dlghost{border:1px dashed var(--line);color:var(--faint);border-radius:6px;padding:2px 9px;font-size:11px;font-weight:700;cursor:pointer;margin-right:4px}.dlghost:hover{border-color:var(--accent);color:var(--accent)}
  .dllead{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin-right:6px}
  .dlfix{font-weight:700;color:var(--muted)}
  .dlnote{color:#B8862E;font-size:11px}
  .combnote{font-size:11px;color:#2C6CAE;background:color-mix(in srgb,#2C6CAE 9%,transparent);border-radius:6px;padding:4px 8px;margin:4px 0}.combnote b{color:var(--ink)}
  .shrpill{font-family:'JetBrains Mono';font-size:10px;font-weight:700;padding:1px 5px;border-radius:5px;margin-left:7px;background:var(--inset);color:var(--muted);vertical-align:middle}
  .shrpill.up{background:color-mix(in srgb,#2E7D5B 14%,transparent);color:#1F6F5C}
  .shrpill.dn{background:color-mix(in srgb,#B8503C 14%,transparent);color:#B8503C}
  /* week-ending slider */
  .wkend{display:inline-flex;align-items:center;gap:4px}
  .wkend button{border:1px solid var(--line);background:var(--sheet);color:var(--muted);border-radius:7px;width:28px;height:30px;font-size:12px;cursor:pointer;font-family:inherit}
  .wkend button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
  .wkend button:disabled{opacity:.3;cursor:default}
  .wkend select{border:1.5px solid var(--accent);border-radius:8px;padding:6px 8px;font-size:12.5px;font-weight:600;font-family:inherit;background:var(--sheet);color:var(--ink);cursor:pointer;max-width:180px}
  /* scope multiselect picker */
  .mspick{position:relative;display:inline-block}
  .msbtn{display:inline-flex;align-items:center;gap:8px;min-width:180px;max-width:280px;justify-content:space-between;background:var(--sheet);border:1.5px solid var(--accent);color:var(--ink);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .msbtn .mscar{color:var(--faint);font-size:11px}
  .mspick.dis .msbtn{border-color:var(--line);color:var(--faint);cursor:default}
  .mspanel{position:absolute;top:calc(100% + 5px);left:0;z-index:40;width:320px;max-width:88vw;background:var(--sheet);border:1px solid var(--line);border-radius:11px;box-shadow:0 14px 40px rgba(0,0,0,.22);padding:9px;display:none}
  .mspick.open .mspanel{display:block}
  .mssearch{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-size:12.5px;font-family:inherit;margin-bottom:7px;background:var(--inset)}
  .mssearch:focus{outline:none;border-color:var(--accent)}
  .msact{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
  .msact button{border:1px solid var(--line);background:var(--sheet);color:var(--muted);border-radius:6px;padding:2px 9px;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .msact button:hover{border-color:var(--accent);color:var(--accent)}
  .mslist{max-height:300px;overflow-y:auto}
  .msrow{display:flex;align-items:center;gap:9px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:12.5px}
  .msrow:hover{background:var(--inset)}
  .msrow input{cursor:pointer;flex:none;accent-color:var(--accent)}
  .msrow .mslab{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .msrow .mssub{color:var(--faint);font-size:11px;font-weight:400}
  .msrow .mstier{font-size:9px;font-weight:700;color:var(--faint);border:1px solid var(--line);border-radius:4px;padding:0 4px}
  .msempty{padding:14px;text-align:center;color:var(--faint);font-size:12px}
  .mshdr{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);padding:6px 7px 2px}
  .zoom{cursor:pointer;flex:none;width:78px;display:flex;align-items:center;justify-content:center}
  .zoom svg{color:var(--accent);opacity:.9;border:1px solid var(--line);border-radius:6px;padding:2px 4px;background:var(--sheet);transition:background .12s,border-color .12s;vertical-align:middle}
  .zoom:hover svg{background:color-mix(in srgb,var(--accent) 12%,var(--sheet));border-color:var(--accent);opacity:1}
  .zoom:hover{color:var(--accent);opacity:1}
  .head .zoom{font-size:8.5px;color:var(--faint);font-weight:600;letter-spacing:.06em}
  .cmodal{position:fixed;inset:0;background:rgba(20,28,24,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .cmodal.on{display:flex}
  .cbox{background:var(--sheet);border-radius:14px;padding:18px 22px 22px;max-width:760px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.32)}
  .cbox h3{font-family:'Fraunces',serif;margin:0 0 4px;font-size:18px;color:var(--ink)}
  .cbox .csub{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .cx{float:right;border:none;background:none;font-size:19px;color:var(--muted);cursor:pointer;line-height:1}
  .note{background:var(--inset);border:1px dashed var(--line);border-radius:9px;padding:10px 14px;font-size:11px;color:var(--muted);margin-top:14px;line-height:1.6}
  .note b{color:var(--ink2)}
  .empty{padding:16px;color:var(--faint);text-align:center}
  .nbhd{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--ink);margin:0 0 9px}
  .nbsum{font-family:'JetBrains Mono';font-weight:700;font-size:12px;width:120px;text-align:right;flex:none}
  .head .nbsum{font-size:8.5px;color:var(--faint);font-weight:600}
  .nbnote{font-size:11px;color:var(--faint);margin-top:9px;line-height:1.55}.nbnote b{color:var(--muted)}
</style>
<script src="leads-cube.js"></script>
<script src="bookings-cube.js"></script>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">← Dashboard</a>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div class="segw" id="scopeseg" title="national / city / clinic / doctor level"><button data-s="national">National</button><button data-s="city">City</button><button data-s="clinic" class="on">Clinic</button><button data-s="doctor">Doctor</button></div>
      <div class="mspick" id="mspick">
        <button class="msbtn" id="msbtn" type="button"><span id="msbtnlab">…</span><span class="mscar">▾</span></button>
        <div class="mspanel" id="mspanel">
          <input type="text" class="mssearch" id="mssearch" placeholder="type to search…" autocomplete="off">
          <div class="msact" id="msact"></div>
          <div class="mslist" id="mslist"></div>
        </div>
      </div>
      <div class="segw" id="segseg" title="offline (clinic-attributed) / online (no-city, telehealth) / both"><button data-g="both" class="on">Both</button><button data-g="offline">Offline</button><button data-g="online">Online</button></div>
      <div class="segw" id="pctseg" title="show counts or % of parent"><button data-p="n" class="on"># count</button><button data-p="p">% share</button></div>
      <div class="segw" id="viewseg" title="weekly = each week week-vs-week · week-to-date = pick days (Mon–Thu…) to compare like-for-like across weeks · Σ total = one total over the window"><button data-v="wk" class="on">weekly</button><button data-v="wtd">week-to-date</button><button data-v="agg">Σ total</button></div>
      <div class="segw" id="dowseg" title="pick the days to compare like-for-like across weeks (e.g. Mon–Thu)" style="display:none"><button data-d="0" class="on">M</button><button data-d="1" class="on">T</button><button data-d="2" class="on">W</button><button data-d="3" class="on">T</button><button data-d="4" class="on">F</button><button data-d="5" class="on">S</button><button data-d="6" class="on">S</button></div>
      <div class="segw" id="wkstep" title="weeks shown (both weekly &amp; total)"><button data-s="-1">−</button><span class="nwk" id="nwkLbl">5 wk</span><button data-s="1">+</button></div>
      <div class="wkend" id="wkendctl" title="slide the window — pick which week is the latest shown"><button data-w="older" title="older">◀</button><select id="wkendsel"></select><button data-w="newer" title="newer">▶</button></div>
      <label class="vsel" title="club N consecutive weeks into each column for a longer-term view">Club <select id="clubsel"><option value="1" selected>weekly</option><option value="2">2 wks</option><option value="3">3 wks</option><option value="4">4 wks · monthly</option><option value="6">6 wks</option><option value="13">13 wks · quarter</option><option value="custom">custom…</option></select></label>
      <label class="vsel">Δ vs <select id="cmpsel"><option value="last">last week</option><option value="first">first week</option><option value="avg" selected>average</option><option value="peak">peak</option></select></label>
      <label class="vsel" title="which booking window counts as booked (relative to when the lead came in)">Booked <select id="bookwin"><option value="ever" selected>ever</option><option value="2wk">≤ 2 weeks</option><option value="week">same week</option></select></label>
    </div>
  </div>
  <h1>Leads → SC bookings · funnel</h1>
  <div class="sub" id="subt"></div>

  <!-- ① attributable leads -->
  <div id="leadSection">
  <h2 class="sech">① Attributable leads → book %</h2>
  <div class="layerbar" id="barL"><span class="lead">Layers ·</span></div>
  <div class="hero"><span class="n" id="heroNL">—</span><span class="l" id="heroLL"></span></div>
  <div class="fmwrap">

// ---- city normalisation: keep only real (operational) clinic cities; fold phantoms / online / untracked into ONE "no city" bucket ----
const NEWCITY=new Set(['Indore','Rajkot']);          // newly launched — keep even if no clinic key yet
const NONCITY=new Set(['Online','Practo Online']);   // never a physical city → no-city / online bucket
const NOCITY_LAB='— no city · online / untracked';   // the single no-city / untracked bucket label
let TRACKED_CITY=new Set(), LOC2CITY={}, OPLOC=new Set();   // TRACKED_CITY: real op cities (+new launches); LOC2CITY: clinic locality → its true city; OPLOC: operational clinic localities (from the bookings cube) — closed clinics with stray leads are excluded from the Clinic layer
function isTracked(city){return TRACKED_CITY.has(city);}
function displayCity(loc,city){
  const rc=loc&&LOC2CITY[loc];
  if(rc&&isTracked(rc))return rc;                    // locality belongs to a real TRACKED clinic → its true city (fixes AI mis-tag: Kondapur→Hyderabad etc.)

  return NOCITY_LAB;                                 // phantom (Delhi, Lucknow) / online / Practo-online / untracked → one no-city bucket
}

let WEEKS=[],WEEKLY=true,CMP='avg',PCT=false,NWK=5,CLINIC='',WKOFF=0,CLUB=1;   // display prefs shared across both pivots. WKOFF = display columns back from newest that the window ENDS on (0 = latest). CLUB = weeks summed per display column (1 = weekly, 4 ≈ monthly)
let NUM2CLINIC={};   // GMB number -> 'City|Locality' (to flag cross-clinic number leakage)
let BOOKWIN='ever';  // which booking window counts as "booked" (lag buckets from the builder)
// booked-window buckets — sourced from the shared leads-cube.js module (single source of truth); fallback kept identical
const BOOKED_SET=(function(){const B=(window.LeadsCube&&window.LeadsCube.BOOKED_SET)||{ever:['w0','w1','later','prior','booked'],'2wk':['w0','w1'],week:['w0']};const o={};for(const k in B)o[k]=new Set(B[k]);return o;})();

const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtWk(d){if(!d)return '';const p=d.split('-');return (+p[2])+' '+MON[+p[1]-1];}
const wkIdxs=()=>{const L=(typeof AX==='function'?AX().length:WEEKS.length);const a=[];for(let i=NWK-1;i>=0;i--){const idx=WKOFF+i;if(idx<L)a.push(idx);}return a;};   // oldest→newest (latest last), on the active axis, ending WKOFF weeks back from newest
let SEG='both', CUMUL=false;   // SEG: offline / online / both ; CUMUL: week-to-date (running totals across the shown weeks)
// ---- day-of-week compare: when the day chips select a subset, the axis switches to the recent daily weeks (incl. current partial week) ----
let DOWSEL=new Set([0,1,2,3,4,5,6]);   // 0=Mon … 6=Sun
let DOW_WEEKS=null, DAY_LEN=0;          // DOW_WEEKS: 8 recent week-Mondays newest-first (from _meta.days); DAY_LEN = days per cell (56)
function initDaily(meta){const days=meta&&meta.days;if(!days||!days.length){DOW_WEEKS=null;return;}DAY_LEN=days.length;
  const w=[];for(let i=0;i<days.length;i+=7)w.push(days[i]);          // Monday of each daily week, oldest→newest
  DOW_WEEKS=w.slice().reverse();}                                     // newest-first, to match the weekly axis convention
function dowActive(){return DOWSEL.size<7&&!!DOW_WEEKS;}       // day-of-week filter: per-week totals of the picked days — comparison in weekly view, cumulative in Σ to-date
function baseAx(){return dowActive()?DOW_WEEKS:WEEKS;}                 // raw per-week (or DOW) axis, newest-first
function nBlk(len){return CLUB<=1?len:Math.ceil(len/CLUB);}
function AX(){const b=baseAx();if(CLUB<=1)return b;const n=nBlk(b.length),o=[];for(let i=0;i<n;i++)o.push(b[i*CLUB]);return o;}   // display axis — each column = CLUB weeks (represented by the block's newest week)
function clubify(raw){if(CLUB<=1)return raw||[];const b=baseAx().length,o=new Array(nBlk(b)).fill(0);for(let i=0;i<b;i++)o[Math.floor(i/CLUB)]+=(raw[i]||0);return o;}   // sum CLUB consecutive weeks into each display column
function weekEnd(mon){if(!mon)return '';const d=new Date(mon+'T00:00:00');d.setDate(d.getDate()+6);return fmtWk(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));}
function wkRange(startMon,endWeekMon){if(!startMon)return '';const e=new Date(endWeekMon+'T00:00:00');e.setDate(e.getDate()+6);   // full column span: start Monday → end Sunday, compact (drop repeated month)
  const p=startMon.split('-'),sd=+p[2],sm=+p[1]-1,ed=e.getDate(),em=e.getMonth();return (sm===em?sd:sd+' '+MON[sm])+'–'+ed+' '+MON[em];}
function blockLabel(axis,i){if(CLUB<=1)return wkRange(axis[i],axis[i]);const s=i*CLUB,e=Math.min(axis.length-1,s+CLUB-1);return wkRange(axis[e],axis[s]);}   // block i (newest-first): oldest week axis[e] (start) → newest week axis[s] (end Sunday) — full date span in every column
function cellArr(c){if(!dowActive())return c.arr;                     // DOW mode: per recent-week sum of the selected weekdays, from the daily array
  const dd=c.day,n=DOW_WEEKS.length,out=new Array(n).fill(0);if(!dd)return out;
  for(let i=0;i<n;i++){const bs=(n-1-i)*7;DOWSEL.forEach(k=>out[i]+=dd[bs+k]||0);}return out;}   // i=0 newest week → last daily block
function cumArr(a){if(!CUMUL||dowActive())return a||[];const ix=wkIdxs();const out=(a||[]).slice();let r=0;for(let k=0;k<ix.length;k++){const i=ix[k];r+=(a[i]||0);out[i]=r;}return out;}   // running total oldest→newest, within the shown window (day-of-week compare is never cumulative)
const dv=a=>(CUMUL&&!dowActive())?cumArr(a):(a||[]);   // display array: cumulative ONLY in Σ to-date with no day filter; a day-of-week selection is always per-week comparison
function weekArr(cells){const b=baseAx(),L=b.length,a=new Array(L).fill(0);cells.forEach(c=>{const ar=(typeof cellArr==='function'?cellArr(c):c.arr)||[];for(let i=0;i<L;i++)a[i]+=ar[i]||0;});return clubify(a);}   // per-week sums → clubbed to display columns
function sumT(wk){let s=0;for(let i=0;i<NWK;i++)s+=wk[WKOFF+i]||0;return s;}   // sum the shown window (WKOFF..WKOFF+NWK-1)
function fmtVal(v,par){return PCT?(par>0?Math.round(100*v/par)+'%':'0%'):(''+v);}
// latest week (idx 0) vs baseline over prior weeks — avg or peak
function deltaPct(wk){const latest=wk[WKOFF]||0;const hist=wk.slice(WKOFF+1,WKOFF+NWK);   // prior weeks within the shown window (ending WKOFF back)
  let base;
  if(CMP==='last') base=wk[WKOFF+1]||0;
  else if(CMP==='first') base=wk[Math.min(WKOFF+NWK,(typeof AX==='function'?AX().length:WEEKS.length))-1]||0;   // oldest column shown
  else if(CMP==='peak') base=Math.max(0,...hist);
  else base=hist.length?hist.reduce((a,b)=>a+b,0)/hist.length:0;     // avg of prior shown weeks
  if(base<1)return{txt:latest>0?'▲ new':'—',cls:latest>0?'up':'flat',before:base,now:latest};
  let d=Math.round(100*(latest-base)/base); d=Math.max(-99,Math.min(999,d));
  return{txt:(d>0?'+':'')+d+'%',cls:d>2?'up':(d<-2?'dn':'flat'),before:base,now:latest};}
// the "before → now" exact-value columns shown after Δ (only in weekly / % share, not in Σ total)
function bnCols(dp,isPct){const f=v=>v==null?'—':(isPct?Math.round(v)+'%':(Math.abs(v)>=1000?Math.round(v).toLocaleString('en-US'):(Math.round(v*10)/10)));
  return '<span class="avgmk avgbefore"><span class="avglab">before</span>'+f(dp.before)+'</span><span class="avgmk avgnow '+dp.cls+'"><span class="avglab">now</span>'+f(dp.now)+'</span>';}

function splitCat(v,cc){   // integer v → {STI,SH,MH,Other} summing exactly to v, by AI-audit fractions cc
  const cats=['STI','SH','MH','Other'],fl={},raw={};let used=0;
  cats.forEach(c=>{raw[c]=v*(cc[c]||0);fl[c]=Math.floor(raw[c]);used+=fl[c];});
  cats.slice().sort((a,b)=>(raw[b]-fl[b])-(raw[a]-fl[a])).slice(0,v-used).forEach(c=>fl[c]++);
  return fl;
}
function buildCells(node){

    num:c.num||'',url:c.url||'',relevance:c.rel||'unknown',intent:c.int||'',strength:c.istr||'',category:c.cat||'na',verified:c.vf==='y'?'verified':'unverified',loc:c.loc||'',city:c.city||'',citygroup:(c.city&&c.city.indexOf('— no city')!==0)?'attr':'nocity',_on:((c.city||'').indexOf('— no city')===0),campaign:'na',arr:c.w,day:c.d||null}));   // _on = online / untracked (no-city bucket); verified = phone matched an allo_persons.patient (patient_id created); day[] = recent-8wk daily
}
function total(cells){return sumT(weekArr(cells));}
function cellPass(c,P){if(P.mode!=='leads'&&SEG!=='both'&&((SEG==='online')!==!!c._on))return false;return P.dims.every(dk=>{if(dk==='campaign')return !P.sel.campaign.size||P.sel.campaign.has(c.campaign);return P.sel[dk].has(c[DIMS[dk].field]);});}   // leads ignore Offline/Online — a lead can book anywhere

// two independent pivot instances — each owns its layers / expansions / selection; display prefs (week window, %/Σ, Δ) are shared
const $=id=>document.getElementById(id);
function makeP(cfg){const P={mode:cfg.mode,dims:cfg.dims,order:[...cfg.order],build:cfg.build,hero:cfg.hero,data:null,cells:[],open:{},sel:{},present:{},els:cfg.els};
  P.dims.forEach(dk=>{P.sel[dk]=new Set(DIMS[dk].values.map(v=>v.k));});return P;}
const PL=makeP({mode:'leads',dims:['citygroup','city','clinic','channel','medium','number','intent','strength','category','status','verified'],order:['channel','medium'],build:buildLeadCells,hero:'attributable leads',
  els:{flow:$('flowL'),bar:$('barL'),heroN:$('heroNL'),heroL:$('heroLL'),hHdr:$('hHdrL'),hRight:$('hRightL')}});
const PB=makeP({mode:'bookings',dims:['seg','city','clinic','ptype','channel','maturity','medium','category','campaign'],order:['seg','ptype','channel','maturity','medium'],build:buildCells,hero:'SC bookings',
  els:{flow:$('flowB'),bar:$('barB'),heroN:$('heroNB'),heroL:$('heroLB'),hHdr:$('hHdrB'),hRight:$('hRightB')}});

// exact numbers dialed under a call node (shown inline when expanded) — so you see WHICH numbers, incl. organic
function renderNumList(container,sub,depth){
  const nums={};let junk=0;
  sub.forEach(c=>{const s=sumT(cellArr(c));if(!s)return;if(c.num&&c.num.length===10)nums[c.num]=(nums[c.num]||0)+s;else if(c.num)junk+=s;});
  const list=Object.entries(nums).sort((a,b)=>b[1]-a[1]);
  if(!list.length&&!junk)return;
  const rowFor=([n,c])=>{

function pivotUnits(dk,P){const dim=DIMS[dk],combs=(P.comb&&P.comb[dk])||[],inC=new Set();
  combs.forEach(c=>c.vals.forEach(x=>inC.add(x)));const out=[];
  combs.forEach((c,ci)=>{const vals=c.vals.filter(x=>P.sel[dk].has(x));if(!vals.length)return;out.push({k:'__c'+ci,label:c.label,vals,valSet:new Set(vals),color:c.color||'#4E73C4',single:false});});
  dim.values.forEach(v=>{if(P.sel[dk].has(v.k)&&!inC.has(v.k))out.push({k:v.k,label:labOf(dk,v.k),vals:[v.k],valSet:new Set([v.k]),color:dim.color(v.k),single:true});});
  return out;}
function unitLbl(dk,vk,P){if(typeof vk==='string'&&vk.indexOf('__c')===0){const c=(P.comb&&P.comb[dk])||[],ci=+vk.slice(3);return c[ci]?c[ci].label:vk;}return labOf(dk,vk);}

const ZSVG='<svg width="13" height="13" viewBox="0 0 16 16" style="display:inline-block;vertical-align:middle"><polyline points="1,11 5,7 9,9 15,2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"/></svg>';
// a real inline sparkline of the shown weeks (in the GRAPH column) — visible, still clickable to open the full chart
function sparkline(wk){const ix=wkIdxs(),d=dv(wk),vals=ix.map(i=>d[i]||0),n=vals.length,W=56,H=15,p=2;
  if(n<2)return ZSVG;
  const mx=Math.max(...vals),mn=Math.min(...vals),rng=(mx-mn)||1;
  const x=i=>p+i*(W-2*p)/(n-1),y=v=>H-p-((v-mn)/rng)*(H-2*p);
  const pts=vals.map((v,i)=>x(i).toFixed(1)+','+y(v).toFixed(1)).join(' ');
  return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><polyline points="'+pts+'" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="'+x(n-1).toFixed(1)+'" cy="'+y(vals[n-1]).toFixed(1)+'" r="1.7" fill="currentColor"/></svg>';}
// leads: ↳ booked / ↳ not booked / → book rate % as weekly rows under a node (booked, notbooked shown even when 0)

// ================= OPS SECTIONS (③ Availability · ④ Book→Done · ⑤ Done) — driven by data_quick_diag.json =================
// Offline clinic operations (same source as the diagnostic + city-head sheet), so these reconcile. Weekly-only (no daily).
let QD=null, QD_IDX={}, SLUG2LOC={}, ONL=null, ONL_IDX={};
const OPS_GRAIN='distinct';   // patient-distinct per scope (clinic→clinic booked, city→city-distinct, national→national-distinct) = exactly the city-head sheet. ② is reconciled to the SAME grain (see loadClinic), so ②=④=sheet at every level.
const qnorm=s=>(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');   // 'HSR Layout' -> 'hsr_layout'
function onlAlign(arr){if(!arr)return new Array(WEEKS.length).fill(0);return WEEKS.map(w=>{const j=ONL_IDX[w];return j===undefined?0:(arr[j]||0);});}   // online cube arrays → WEEKS (newest-first)
function onlKeys(){if(!ONL||!ONL.clinics)return [];const ks=Object.keys(ONL.clinics);
  if(SCOPE==='national')return ks;
  if(SCOPE==='city')return ks.filter(k=>SEL.city.has(displayCity(k.slice(k.indexOf('|')+1),k.slice(0,k.indexOf('|')))));
  if(SCOPE==='clinic')return ks.filter(k=>SEL.clinic.has(k));
  return [];}   // doctor scope: online-by-doctor not wired (offline only)
const SUBCAT2TOP={STI:'STI',MH:'MH','ED+':'SH','ED+PE+':'SH','PE+':'SH','PA':'SH','CM':'SH','Oth':'Other','NOS':'Other'};   // 9 diagnosis sub-cats → 4 top categories
const ONL_ROLL={LSD:'Oth',DE:'Oth',DYS:'Oth',VGS:'Oth',FSAD:'Oth',AORG:'Oth',oth:'Oth'};   // roll the online cube's raw diag_cat into the same 9 sub-cats offline uses (matches quick_diag ROLL)
function qdAlign(arr){if(!arr)return new Array(WEEKS.length).fill(0);return WEEKS.map(w=>{const j=QD_IDX[w];return j===undefined?0:(arr[j]||0);});}   // QD arrays are OLDEST-first → re-align to WEEKS (newest-first)
function slugLoc(s){if(SLUG2LOC[s])return SLUG2LOC[s];const city=(QD.clinics[s]||{}).city||'';let loc=s;const suf='_'+qnorm(city);if(loc.endsWith(suf))loc=loc.slice(0,-suf.length);loc=loc.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());return (SLUG2LOC[s]=loc);}

// a "unit" = one aggregable ops entity (offline clinic / doctor from quick_diag, or online clinic from the online cube).
// Each unit carries `al` (its week-aligner) so offline & online arrays combine on the same WEEKS axis. Availability/category live on offline only.
function opsUnitsOffline(){if(!QD)return [];
  if(SCOPE==='doctor')return [...SEL.doctor].map(dk=>{const j=dk.indexOf('::'),slug=dk.slice(0,j),name=dk.slice(j+2),qc=QD.clinics[slug];if(!qc)return null;const bd=(qc.sc.by_doctor||{})[name];if(!bd)return null;
    return {al:qdAlign,key:dk,label:name,city:qc.city,loc:slugLoc(slug),doctor:name,booked:bd.booked,done:bd.done,bookedSlots:null,doneSlots:null,byCat:bd.cat_done||{},byCatSrc:null,avail:bd.availability||{},bySource:null,online:false};}).filter(Boolean);   // per-doctor: patient-level only
  const g=(OPS_GRAIN==='distinct')?(SCOPE==='national'?'_nat':SCOPE==='city'?'_city':''):'';   // clinic-attributed ('' = clinic-sum, ties ②) vs patient-distinct (_nat/_city, ties sheet)
  return opsSlugs().map(s=>{const qc=QD.clinics[s],d=qc.sc.done;return {al:qdAlign,key:s,label:slugLoc(s),city:qc.city,loc:slugLoc(s),doctor:null,booked:d['booked'+g]||d.booked,done:d['done'+g]||d.done,bookedSlots:d.booked_slots||null,doneSlots:d.done_slots||null,slotStatus:d.slot_status||null,byCat:d.by_cat||{},byCatSrc:d.by_cat_source||null,avail:qc.sc.availability||{},bySource:(qc.sc.bookings||{}).by_source||null,online:false};});}
function opsUnitsOnline(){return onlKeys().map(k=>{const n=ONL.clinics[k],i=k.indexOf('|'),loc=k.slice(i+1);
  const byCat={};if(n.by_cat)for(const c in n.by_cat){const rc=ONL_ROLL[c]||c,dn=n.by_cat[c].done||[],a=(byCat[rc]=byCat[rc]||[]);for(let j=0;j<dn.length;j++)a[j]=(a[j]||0)+(dn[j]||0);}   // online done split by merged-Rx diagnosis, rolled to the same 9 sub-cats as offline (LSD/DE/…/oth → Oth)

  if(SEG==='online')return opsUnitsOnline();

function opsSumU(units,pick){const out=new Array(WEEKS.length).fill(0);units.forEach(u=>{const a=u.al(pick(u));for(let i=0;i<out.length;i++)out[i]+=a[i]||0;});return out;}
// make the ② SC-bookings funnel EXACT to ops: the funnel cube (episode lens) undercounts vs ops bookings.total (appointment lens) — entirely in rebook. Add the (ops − funnel) gap per clinic-week as a labelled 'reconcile' rebook cell so every scope's ② total ties to the sheet. (verified ≥0 every week)

      if(inp.checked)P.sel[dk].add(inp.dataset.k);else P.sel[dk].delete(inp.dataset.k);updCnt();draw(P);});

    chip.ondragend=()=>{chip.classList.remove('drag');document.querySelectorAll('.chip').forEach(c=>c.classList.remove('over'));};
    chip.ondragover=(e)=>{e.preventDefault();chip.classList.add('over');};

      const m=P.order.splice(dragIdx,1)[0];P.order.splice(to,0,m);dragIdx=null;dragP=null;P.open={};renderLayerBar(P);draw(P);};
    bar.appendChild(chip);

  });
  // available dimensions (not currently a layer) → click to add (Clinic/City only when there's >1 to split by)
  P.dims.filter(d=>!P.order.includes(d)).filter(d=>!['clinic','city','citygroup'].includes(d)||(P.present[d]&&P.present[d].size>1)).forEach(dk=>{

  });
}

function scopeKeys(){   // the selected scope node keys that feed the ①② pivots (doctor scope hides them)
  if(SCOPE==='national')return ['National'];

function loadClinic(){const keys=scopeKeys();CLINIC=keys.join('+')||SCOPE;   // CLINIC = a stable signature of the selection (breadcrumb / open-state root)
  [PL,PB].forEach(P=>{
    let cells=[];keys.forEach(k=>{const node=(P.data||{})[k];if(node)cells=cells.concat(P.build(node));});P.cells=cells;
    if(P.mode==='bookings'&&QD)reconcileBkDisplay(P);   // scope-aware: top the OFFLINE episode cube up to the patient-distinct booked (national/city/clinic grain) so ②=④=city-head sheet
    P.present={};P.dims.forEach(dk=>{const f=DIMS[dk].field;P.present[dk]=new Set(P.cells.filter(c=>(c.arr||[]).some(x=>x)).map(c=>c[f]));});
    if(P.mode==='bookings'){   // dynamic Campaign values (paid campaigns present for this clinic, by size)
      const tot={};P.cells.forEach(c=>{const s=c.arr.reduce((a,b)=>a+(b||0),0);tot[c.campaign]=(tot[c.campaign]||0)+s;});
      const camps=Object.keys(tot).filter(k=>k!=='na').sort((a,b)=>tot[b]-tot[a]);
      DIMS.campaign.values=camps.map(k=>({k,l:k.length>30?k.slice(0,28)+'…':k})).concat([{k:'na',l:'— non-paid'}]);
      P.sel.campaign=new Set(DIMS.campaign.values.map(v=>v.k));
    }
    if(P.mode==='leads'){   // dynamic Number-dialed values (which exophone numbers this clinic's callers used, by size)
      const tot={};P.cells.forEach(c=>{const s=c.arr.reduce((a,b)=>a+(b||0),0);tot[c.num]=(tot[c.num]||0)+s;});
      const nums=Object.keys(tot).filter(k=>k!=='').sort((a,b)=>tot[b]-tot[a]);
      DIMS.number.values=nums.map(k=>{const nl=NUMLABEL[k];return {k,l:nl?k+' · '+nl.l:k};}).concat([{k:'',l:'— web / no call'}]);
      P.sel.number=new Set(DIMS.number.values.map(v=>v.k));
    }
  });
  // fold leads pinned to a CLOSED / non-operational clinic into the no-clinic bucket (keep their city) so only real clinics show as rows — the leads still count in the city + total
  if(OPLOC.size)[PL,PB].forEach(P=>P.cells.forEach(c=>{if(c.loc&&!OPLOC.has(c.loc))c.loc='';}));
  // dynamic Clinic + City values (union across leads + bookings), by size — for city/national drill-down
  const locs={},cities={};
  [PL,PB].forEach(P=>P.cells.forEach(c=>{const s=(c.arr||[]).reduce((a,b)=>a+(b||0),0);if(c.loc)locs[c.loc]=(locs[c.loc]||0)+s;if(c.city)cities[c.city]=(cities[c.city]||0)+s;}));
  DIMS.clinic.values=Object.keys(locs).filter(k=>!OPLOC.size||OPLOC.has(k)).sort((a,b)=>locs[b]-locs[a]).map(k=>({k,l:k})).concat([{k:'',l:'— not attributed to a clinic'}]);   // operational clinics only
  // City dim: only real (tracked) cities, size-sorted; the single no-city / online / untracked bucket sorts last. Phantoms (Delhi/Lucknow) + Practo-online already folded into it.
  const cityKeys=Object.keys(cities).filter(k=>k===NOCITY_LAB||isTracked(k));
  DIMS.city.values=cityKeys.sort((a,b)=>a===NOCITY_LAB?1:b===NOCITY_LAB?-1:cities[b]-cities[a]).map(k=>({k,l:k}));
  [PL,PB].forEach(P=>{P.sel.clinic=new Set(DIMS.clinic.values.map(v=>v.k));P.sel.city=new Set(DIMS.city.values.map(v=>v.k));P.open={};renderLayerBar(P);draw(P);});
  document.getElementById('subt').textContent='';
  renderWkEnd(); renderOps();
}

// tag city+loc onto every cell of a clinic-keyed cube (cells carry neither — both live in the 'City|Loc' node key). Needed at clinic scope so the City dim (now phantom-filtered) doesn't drop them.
function tagCells(cube){const out={_meta:cube._meta};
  Object.keys(cube).filter(k=>k!=='_meta').forEach(key=>{const i=key.indexOf('|');const rawCity=i<0?key:key.slice(0,i),kloc=i<0?'':key.slice(i+1);
    out[key]={cells:(cube[key].cells||[]).map(c=>{const loc=c.loc||kloc;return Object.assign({},c,{loc,city:displayCity(loc,c.city||rawCity)});})};});
  return out;}
function aggBkByCity(bk){const out={_meta:bk._meta};   // clinic bookings -> city (normalise: Practo-online / online fold into no-city bucket)
  Object.keys(bk).filter(k=>k!=='_meta').forEach(k=>{const p=k.split('|'),loc=p[1]||'',city=displayCity(loc,p[0]);if(!out[city])out[city]={cells:[]};
    (bk[k].cells||[]).forEach(c=>out[city].cells.push(Object.assign({},c,{loc,city})));});
  return out;}
function aggBkNational(bk){const cells=[];   // all clinic bookings -> single National (tag normalised city + clinic)
  Object.keys(bk).filter(k=>k!=='_meta').forEach(k=>{const p=k.split('|'),loc=p[1]||'',city=displayCity(loc,p[0]);(bk[k].cells||[]).forEach(c=>cells.push(Object.assign({},c,{city,loc})));});
  return {_meta:bk._meta,National:{cells}};}
function aggLeadsNational(ld){const cells=[];   // all city leads -> single National (tag city; clinic already on cells)
  Object.keys(ld).filter(k=>k!=='_meta').forEach(city=>{(ld[city].cells||[]).forEach(c=>cells.push(Object.assign({},c,{city})));});
  return {_meta:ld._meta,National:{cells}};}
// The leads cube tags city from the AI call-audit, so a lead can land under the wrong city when its locality is really elsewhere
// (e.g. a Kondapur/Hyderabad lead tagged Bangalore). Re-route each lead to the city of its locality when that locality is a REAL clinic.
function locCityMap(bk){const m={};Object.keys(bk||{}).forEach(k=>{if(k==='_meta')return;const i=k.indexOf('|');if(i<0)return;const city=k.slice(0,i),loc=k.slice(i+1);if(loc&&city&&city.indexOf('— no city')!==0)m[loc]=city;});return m;}
function rerouteCityLeads(cityLeads,bk){const out={_meta:cityLeads._meta};
  Object.keys(cityLeads).filter(k=>k!=='_meta').forEach(city=>{(cityLeads[city].cells||[]).forEach(cell=>{
    const tgt=displayCity(cell.loc||'', city);   // real-clinic locality → its true city; phantom (Delhi/Lucknow) / untracked → one no-city bucket; Indore/Rajkot kept
    (out[tgt]=out[tgt]||{cells:[]}).cells.push(Object.assign({},cell,{city:tgt}));   // tag the normalised city so cellPass keeps it at city scope
  });});
  return out;}
// ---- scope multiselect (searchable checklist panel) ----
const SEL={city:new Set(),clinic:new Set(),doctor:new Set()};
let DOCTORS=[], PICK_OPTS=[];
function buildDoctors(){DOCTORS=[];if(!QD)return;Object.keys(QD.clinics).forEach(s=>{const qc=QD.clinics[s],bd=qc.sc.by_doctor||{},loc=slugLoc(s),city=qc.city;
  Object.keys(bd).forEach(name=>{DOCTORS.push({k:s+'::'+name,label:name,sub:loc+' · '+city,slug:s,clinicKey:city+'|'+loc});});});
  DOCTORS.sort((a,b)=>a.label.localeCompare(b.label));}
function scopeOptions(s){
  if(s==='city')return [...TRACKED_CITY].filter(c=>c!==NOCITY_LAB).sort().map(c=>({k:c,label:c,tier:tierOf(c)}));
  if(s==='clinic')return Object.keys(DATASETS.clinic.bk).filter(k=>k!=='_meta'&&k!==NOCITY_LAB&&isTracked(k.split('|')[0])).sort()
    .map(k=>{const i=k.indexOf('|');return {k,label:k.slice(i+1),sub:k.slice(0,i)};});
  if(s==='doctor')return DOCTORS;
  return [];}
function ensureDefaultSel(s){
  if(s==='city'&&!SEL.city.size){const o=scopeOptions('city');SEL.city.add((o.find(x=>x.k==='Bangalore')||o[0]||{}).k);}
  if(s==='clinic'&&!SEL.clinic.size){const o=scopeOptions('clinic');SEL.clinic.add((o.find(x=>x.k==='Bangalore|Indiranagar')||o[0]||{}).k);}
  if(s==='doctor'&&!SEL.doctor.size){const o=scopeOptions('doctor'),d=o.filter(x=>x.clinicKey==='Bangalore|Indiranagar');(d.length?d:o.slice(0,1)).forEach(x=>SEL.doctor.add(x.k));}}
function renderPicker(){
  const pick=document.getElementById('mspick'),lab=document.getElementById('msbtnlab'),act=document.getElementById('msact');
  const nat=SCOPE==='national';pick.classList.toggle('dis',nat);if(nat)pick.classList.remove('open');
  if(nat){lab.textContent='National · all clinics';act.innerHTML='';document.getElementById('mslist').innerHTML='';return;}
  const opts=scopeOptions(SCOPE),sel=SEL[SCOPE],chosen=opts.filter(o=>sel.has(o.k)),plural=SCOPE==='city'?'cities':SCOPE+'s';
  lab.textContent=chosen.length===0?('select '+SCOPE+'…'):chosen.length===1?(chosen[0].sub?chosen[0].label+' · '+chosen[0].sub:chosen[0].label):(chosen.length+' '+plural);
  act.innerHTML=`<button data-a="all">All</button><button data-a="none">None</button>`+(SCOPE==='city'?`<button data-a="t1">Tier 1</button><button data-a="t2">Tier 2</button>`:'');
  renderPickList();}
function renderPickList(){
  const list=document.getElementById('mslist'),q=(document.getElementById('mssearch').value||'').toLowerCase().trim(),sel=SEL[SCOPE];
  const base=scopeOptions(SCOPE).filter(o=>!q||o.label.toLowerCase().includes(q)||(o.sub||'').toLowerCase().includes(q));
  PICK_OPTS=[...base.filter(o=>sel.has(o.k)),...base.filter(o=>!sel.has(o.k))];   // selected float to the top for easy review
  if(!PICK_OPTS.length){list.innerHTML='<div class="msempty">no matches</div>';return;}
  list.innerHTML=PICK_OPTS.map((o,i)=>`<label class="msrow"><input type="checkbox" data-i="${i}" ${sel.has(o.k)?'checked':''}><span class="mslab">${o.label}${o.sub?` <span class="mssub">· ${o.sub}</span>`:''}</span>${o.tier?`<span class="mstier">${o.tier}</span>`:''}</label>`).join('');
  list.querySelectorAll('input').forEach(inp=>inp.onchange=()=>{const o=PICK_OPTS[+inp.dataset.i];if(!o)return;if(inp.checked)sel.add(o.k);else sel.delete(o.k);renderPicker();loadClinic();});}
function syncSegLayer(){   // ② always carries the Segment layer: Both → Offline vs Online; Offline/Online toggle → one labelled group (Offline · clinic / Online · telehealth)
  if(!PB.order.includes('seg'))PB.order.unshift('seg');}
function setScope(s){SCOPE=s;
  document.querySelectorAll('#scopeseg button').forEach(x=>x.classList.toggle('on',x.dataset.s===s));
  const ds=s==='doctor'?'clinic':s;PL.data=DATASETS[ds].leads;PB.data=DATASETS[ds].bk;
  // per-scope default drill layers (National: Attribution→City for leads; City: Clinic split; bookings always attributed → no citygroup)
  const geoL = s==='national' ? ['citygroup','city','clinic'] : s==='city' ? ['clinic'] : [];   // leads default drills Attribution → City → Clinic
  const geoB = s==='national' ? ['city']             : s==='city' ? ['clinic'] : [];
  PL.order = [...geoL,'channel','medium','category'];   // leads default drill: Attribution → City → Clinic → Channel → Medium → Call category
  PB.order = [...geoB,'ptype','channel','maturity','medium'];
  syncSegLayer();   // prepend Segment (Offline/Online) as the top split ONLY in Both view — Offline/Online toggle scopes the whole section instead
  syncDoneOrder();   // refresh ⑤ Done layer order with this scope's geo dims (all layers stay drag-reorderable)
  ensureDefaultSel(s);
  const doc=(s==='doctor');
  document.getElementById('leadSection').style.display=doc?'none':'';
  document.getElementById('bkSection').style.display=doc?'none':'';
  const dn=document.getElementById('docNote');dn.style.display=doc?'':'none';
  if(doc)dn.innerHTML='<b>Doctor scope</b> · leads & SC-bookings don’t split by doctor, so ①② are hidden — the ③④⑤ ops funnel below scopes to the selected doctor(s).';
  renderPicker(); loadClinic();}

// merge online telehealth SC bookings (separate cube) into the offline bookings as an Online segment (tagged on:1).
// Online has NO lead-maturity/medium (telehealth), but it DOES carry patient type — split booked by new / retry / relapse (ft_* / ret_rebook / ret_return).
function mergeOnlineBookings(bk,onl){
  if(!onl||!onl.clinics||!onl._meta)return;
  const oi={};(onl._meta.weeks||[]).forEach((w,i)=>oi[w]=i);
  const map=(bk._meta.weeks||[]).map(w=>oi[w]!==undefined?oi[w]:-1);   // funnel week idx -> online idx
  const SRC={'GMB':'GMB','Google':'Google Ads','Meta':'Meta','Practo':'Practo','Organic':'Organic','Others':'Other','Direct / none':'Other'};
  const rm=a=>map.map(j=>j>=0?((a||[])[j]||0):0);   // realign an online array to the funnel week axis
  for(const key in onl.clinics){const node=onl.clinics[key],bs=node.by_source||{};
    if(!bk[key])bk[key]={cells:[]};if(!bk[key].cells)bk[key].cells=[];
    for(const src in bs){const d=bs[src];if(!d)continue;const ch=SRC[src]||'Other';
      const s1=d.ft_same||[],s2=d.ft_prev||[],s3=d.ft_nolead||[];
      const nw=map.map(j=>j>=0?((s1[j]||0)+(s2[j]||0)+(s3[j]||0)):0);   // 1st-ever = ft_same+ft_prev+ft_nolead
      const push=(pt,w)=>{if(w.some(x=>x))bk[key].cells.push({pt,ch,la:'na',md:'na',cmp:'na',cat:'na',on:1,w});};
      push('new',nw); push('reattempt',rm(d.ret_rebook)); push('relapse',rm(d.ret_return));}
  }
}
Promise.all([
  fetch('data_bookings_funnel.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()),
  fetch('data_leads.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).catch(()=>null),
  fetch('data_gmb_number_clinic.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).catch(()=>({})),
  fetch('data_leads_city.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.json()).catch(()=>null),
  fetch('data_sc_bookings_online.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data_quick_diag.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.ok?r.json():null).catch(()=>null),
]).then(([bk,ld,n2c,ldc,onlbk,qd])=>{
  NUM2CLINIC=n2c||{}; WEEKS=bk._meta.weeks;
  QD=qd; QD_IDX={}; if(qd&&qd.weeks)qd.weeks.forEach((w,i)=>QD_IDX[w]=i);   // ops funnel source (offline SC ops; ties to city-head sheet)
  ONL=onlbk; ONL_IDX={}; if(onlbk&&onlbk._meta&&onlbk._meta.weeks)onlbk._meta.weeks.forEach((w,i)=>ONL_IDX[w]=i);   // online SC cube — book→done for the Online / Both segments
  LOC2CITY=locCityMap(bk);   // clinic locality → its true city (for the mis-tag re-route)
  TRACKED_CITY=new Set(); Object.keys(bk).filter(k=>k!=='_meta').forEach(k=>{const c=k.split('|')[0];if(c&&!NONCITY.has(c))TRACKED_CITY.add(c);}); NEWCITY.forEach(c=>TRACKED_CITY.add(c));   // real op cities (+ new launches Indore/Rajkot), minus Online/Practo-online
  OPLOC=new Set(); Object.keys(bk).filter(k=>k!=='_meta').forEach(k=>{const i=k.indexOf('|');if(i>=0){const loc=k.slice(i+1);if(loc)OPLOC.add(loc);}});   // operational clinic localities = the bookings cube's clinics (drops closed clinics that only have stray leads)
  SLUG2LOC={}; Object.keys(bk).filter(k=>k!=='_meta').forEach(k=>{const i=k.indexOf('|');if(i<0)return;const city=k.slice(0,i),loc=k.slice(i+1);SLUG2LOC[qnorm(loc)+'_'+qnorm(city)]=loc;});   // quick_diag slug → clinic locality name (for the ⑤ Done drill)
  mergeOnlineBookings(bk,onlbk);   // add Online SC bookings (tagged on:1) so the Offline/Online toggle has online data
  initDaily((ldc&&ldc._meta)||(ld&&ld._meta));   // day-of-week axis (recent 8 wks incl. current partial week)
  {const ds=document.getElementById('dowseg');if(ds)ds.style.display='none';}   // day chips hidden by default — only shown under the "week-to-date" view (keeps the top clean)
  // ② is reconciled to ops at DISPLAY time (scope-aware, in loadClinic) so it ties to the sheet at clinic/city/national — not baked here.
  const cityLeads=rerouteCityLeads(ldc||{_meta:{weeks:WEEKS}}, bk);   // fix AI-mis-tagged city (Bangalore showing Kondapur/Kothrud/Thane etc) → re-route by locality
  DATASETS.clinic={leads:tagCells(ld||{_meta:{weeks:WEEKS}}), bk:tagCells(bk)};   // tag city/loc so clinic-scope cells survive the phantom-filtered City dim
  DATASETS.city={leads:cityLeads, bk:aggBkByCity(bk)};
  DATASETS.national={leads:aggLeadsNational(cityLeads), bk:aggBkNational(bk)};
  buildDoctors();   // doctor-scope option list (from quick_diag by_doctor)
  // scope multiselect picker events
  document.getElementById('msbtn').onclick=e=>{e.stopPropagation();if(SCOPE==='national')return;const pk=document.getElementById('mspick');pk.classList.toggle('open');if(pk.classList.contains('open')){const s=document.getElementById('mssearch');s.value='';renderPickList();s.focus();}};
  document.getElementById('mssearch').oninput=renderPickList;
  document.getElementById('msact').onclick=e=>{const b=e.target.closest('button');if(!b)return;const a=b.dataset.a,sel=SEL[SCOPE],opts=scopeOptions(SCOPE);
    if(a==='all')opts.forEach(o=>sel.add(o.k));else if(a==='none')sel.clear();
    else if(a==='t1'||a==='t2'){const t=a==='t1'?'T1':'T2';sel.clear();opts.forEach(o=>{if(o.tier===t)sel.add(o.k);});}
    renderPicker();loadClinic();};
  document.addEventListener('click',e=>{if(!e.target.closest('#mspick'))document.getElementById('mspick').classList.remove('open');});
  document.querySelectorAll('#scopeseg button').forEach(b=>b.onclick=()=>setScope(b.dataset.s));
  const syncCmp=()=>{document.querySelector('.vsel').style.opacity=WEEKLY?1:.4;};   // Δ is a weekly concept
  document.querySelectorAll('#viewseg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#viewseg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');const v=b.dataset.v;WEEKLY=(v!=='agg');
    const wtd=(v==='wtd'),ds=document.getElementById('dowseg');if(ds)ds.style.display=(wtd&&DOW_WEEKS)?'':'none';
    if(!wtd){DOWSEL=new Set([0,1,2,3,4,5,6]);document.querySelectorAll('#dowseg button').forEach(x=>x.classList.add('on'));}   // leaving week-to-date → clear the day filter so weekly/Σ are clean
    syncCmp();PL.open={};PB.open={};redrawAll();});
  document.querySelectorAll('#segseg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#segseg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');SEG=b.dataset.g;syncSegLayer();PL.open={};PB.open={};renderLayerBar(PB);redrawAll();});   // toggle also adds/removes the ② Segment split (+ its layer chip)
  document.querySelectorAll('#dowseg button').forEach(b=>b.onclick=()=>{const d=+b.dataset.d;if(DOWSEL.has(d))DOWSEL.delete(d);else DOWSEL.add(d);if(!DOWSEL.size)DOWSEL.add(d);b.classList.toggle('on',DOWSEL.has(d));
    if(DOWSEL.size<7&&CUMUL){WEEKLY=true;CUMUL=false;document.querySelectorAll('#viewseg button').forEach(x=>x.classList.toggle('on',x.dataset.v==='wk'));syncCmp();}   // picking a day subset = compare those days week-vs-week → force the weekly (non-cumulative) view
    PL.open={};PB.open={};redrawAll();});
  document.getElementById('clubsel').onchange=e=>{let v=e.target.value;
    if(v==='custom'){const n=parseInt(prompt('Club how many weeks into each column?','4'),10);if(!n||n<1){e.target.value=String(CLUB);return;}v=n;
      let opt=[...e.target.options].find(o=>o.value===String(n));if(!opt){opt=new Option(n+' wks',String(n));e.target.add(opt,e.target.options[e.target.options.length-1]);}e.target.value=String(n);}
    CLUB=Math.max(1,+v);WKOFF=0;PL.open={};PB.open={};Object.keys(OPS_OPEN).forEach(k=>delete OPS_OPEN[k]);redrawAll();};
  document.getElementById('wkendsel').onchange=e=>{WKOFF=+e.target.value;PL.open={};PB.open={};redrawAll();};
  document.querySelectorAll('#wkendctl button').forEach(b=>b.onclick=()=>{const maxOff=Math.max(0,AX().length-NWK);WKOFF=b.dataset.w==='older'?Math.min(maxOff,WKOFF+1):Math.max(0,WKOFF-1);PL.open={};PB.open={};redrawAll();});
  document.getElementById('cmpsel').onchange=e=>{CMP=e.target.value;redrawAll();};
  document.getElementById('bookwin').onchange=e=>{BOOKWIN=e.target.value;loadClinic();};   // re-derive booked/notbooked for the chosen window
  document.querySelectorAll('#wkstep button').forEach(b=>b.onclick=()=>{NWK=Math.max(1,Math.min(WEEKS.length,NWK+(+b.dataset.s)));PL.open={};PB.open={};redrawAll();});
  document.querySelectorAll('#pctseg button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#pctseg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');PCT=b.dataset.p==='p';redrawAll();});
  document.getElementById('cx').onclick=closeChart;
  document.getElementById('cmodal').onclick=e=>{if(e.target.id==='cmodal')closeChart();};
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeChart();});
  const EMBED=new URLSearchParams(location.search).has('embed');   // embedded (e.g. in marketing-diagnostic): leads-only, national default, no page chrome
  if(EMBED){document.body.classList.add('embed');
    ['.back'].forEach(s=>{const e=document.querySelector(s);if(e)e.style.display='none';});
    const h1=document.querySelector('h1');if(h1)h1.style.display='none';
    const bk=document.getElementById('bkSection');if(bk)bk.style.display='none';   // leads pivot only
    const ops=document.getElementById('opsSection');if(ops)ops.style.display='none';   // embed = leads only, no downstream ops funnel
    const sc=document.querySelector('.sech');if(sc)sc.style.display='none';   // hide the "① Attributable leads" header (host page has its own)
  }
  syncCmp(); setScope(EMBED?'national':'clinic');
}).catch(e=>{document.getElementById('flowL').innerHTML='<div class="empty">failed to load data — '+e+'</div>';});
