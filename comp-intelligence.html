<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Allo — Competition Intelligence</title>
<style>
:root{--acc:#2C6CAE;--ink:#1A2230;--muted:#6B7583;--line:#E4E8EF;--bg:#F7F8FA;
 --allo:#2C6CAE;--ayur:#7D5BA6;--unani:#2A9D8F;--homeo:#C86B9E;--nonmed:#B8862E;--thin:#9AA6B5;--mixed:#B8503C;
 --win:#1E8449;--red:#C0392B;--amber:#B8862E}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:13px}
.wrap{max-width:1500px;margin:0 auto;padding:16px 20px 60px}
h1{font-size:20px;margin:0 0 2px}.sub{color:var(--muted);font-size:12px;margin-bottom:14px}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{padding:7px 18px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-weight:700;color:var(--muted)}
.tab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.ads{display:flex;flex-wrap:wrap;align-items:stretch;background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden}
.ads .ah{padding:10px 14px;font-weight:800;font-size:12px;display:flex;align-items:center;gap:8px;background:#f3f6fb;border-right:1px solid var(--line)}
.adm{padding:7px 16px;border-right:1px solid var(--line)}
.adm .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.adm .v{font-size:16px;font-weight:800;margin-top:1px}
.scope{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.scope label{font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.scope select{font-size:14px;font-weight:700;padding:7px 14px;border:1.5px solid var(--acc);color:var(--acc);border-radius:8px}
.scope .hint{color:var(--muted);font-size:12px}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 16px;min-width:120px}
.card .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.card .v{font-size:22px;font-weight:800;margin-top:2px}
.bars{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-bottom:14px}
.bars h3{margin:0 0 8px;font-size:13px}
.barrow{display:flex;align-items:center;gap:8px;margin:4px 0;cursor:pointer}
.barrow:hover{background:#f4f7fb}
.barlbl{width:200px;font-size:12px}.bartrk{flex:1;background:#eef1f5;border-radius:5px;height:16px;overflow:hidden}
.barfil{height:100%;border-radius:5px}.barn{width:44px;text-align:right;font-weight:700;font-size:12px}
.lens{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.lens label{font-size:11px;color:var(--muted);margin-right:5px}
select{padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px;background:#fff}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;color:#fff}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
th{background:var(--acc);color:#fff;font-size:11px;text-align:left;padding:8px 10px;position:sticky;top:0}
th[data-s]{cursor:pointer;user-select:none}th[data-s]:hover{background:#255c96}
.g-ahead{color:#1E8449;font-weight:800;text-align:center}
.g-small{color:#5B8A2A;font-weight:700;text-align:center}
.g-mid{color:#B8862E;font-weight:700;text-align:center}
.g-big{color:#C0603A;font-weight:700;text-align:center}
.g-huge{color:#C0392B;font-weight:800;text-align:center}
td{padding:7px 10px;border-bottom:1px solid var(--line);font-size:12px;vertical-align:middle}
tr.clk{cursor:pointer}tr.clk:hover td{background:#f4f7fb}
.rev{font-weight:700}.gap{color:var(--red)}.lead{color:var(--win)}
.r-green{color:#1E8449;font-weight:800;text-align:center}
.r-amber{color:#B8862E;font-weight:800;text-align:center}
.r-red{color:#C0392B;font-weight:800;text-align:center}
.vk-win{color:var(--win);font-weight:700}.vk-outrank{color:var(--acc);font-weight:700}.vk-reviews{color:var(--amber);font-weight:700}.vk-push{color:var(--muted)}
.detail{background:#fbfcfe;padding:0}
.detail table{border:none;border-radius:0}.detail th{background:#eef2f7;color:var(--ink)}
a.maps{color:var(--acc);text-decoration:none;font-weight:700;white-space:nowrap}a.maps:hover{text-decoration:underline}
.tag{display:inline-block;background:#eef1f5;color:#5a6472;border-radius:5px;padding:1px 6px;font-size:10px;margin:1px}
.muted{color:var(--muted)}
/* faceted explorer — compact horizontal boxes; every row is a proportional, clickable bar */
.facets{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-start}
.facet{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;flex:1 1 230px;min-width:208px}
.facet.type{flex:1.3 1 280px}
.facet h4{margin:0 0 7px;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);display:flex;align-items:center;gap:6px}
.facet h4 .clr{margin-left:auto;color:var(--acc);cursor:pointer;font-weight:700;font-size:10px;visibility:hidden;text-transform:none;letter-spacing:0}
.facet h4 .clr.on{visibility:visible}
.frow{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:2px 6px;padding:3px 5px;margin:1px -5px;border-radius:6px;cursor:pointer}
.frow:hover{background:#eef4fb}
.frow.on{background:#e4eefb;box-shadow:inset 2px 0 0 var(--acc)}
.frow.ex{background:#fbe9e7;box-shadow:inset 2px 0 0 var(--red);opacity:.85}
.frow.ex .flbl{text-decoration:line-through;color:var(--red)}
.frow.dim{opacity:.42}
.fhide{font-size:12px;color:#c3ccd8;cursor:pointer;padding:0 3px;visibility:hidden;line-height:1}
.frow:hover .fhide{visibility:visible}
.frow.ex .fhide{visibility:visible;color:var(--red)}
.chip.exq{background:#fbe9e7;border-color:#f1b4ab;color:var(--red)}
.fhead{display:flex;align-items:center;gap:6px;min-width:0}
.fdot{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
.flbl{font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frow.on .flbl{font-weight:700}
.fn{font-size:11.5px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right}
.fbarbg{grid-column:1/-1;height:6px;border-radius:3px;background:#eef1f5;overflow:hidden}
.fbarbg>i{display:block;height:100%;border-radius:3px}
.ksub{display:flex;flex-wrap:wrap;gap:4px;margin:1px 0 3px 15px}
.ksub .sc{cursor:pointer;padding:1px 6px;border-radius:4px;font-size:10px;background:#f2f4f7;color:#48525f}
.ksub .sc:hover{background:#e3e9f0}.ksub .sc.on{background:var(--acc);color:#fff;font-weight:700}
.active{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;min-height:22px}
.chip{display:inline-flex;align-items:center;gap:6px;background:#eef4fb;border:1px solid #cfe0f2;color:var(--acc);border-radius:16px;padding:3px 10px;font-size:11.5px;font-weight:600}
.chip b{font-weight:800}.chip .x{cursor:pointer;font-weight:800}
.active .cnt{margin-left:auto;color:var(--muted);font-weight:700}
.active .clrall{color:var(--red);cursor:pointer;font-weight:600;font-size:11.5px}
</style></head><body><div class="wrap">
<h1>Competition Intelligence</h1>
<div class="sub" id="sub">local map-pack competition per clinic · reviews · pathy · distance · verdict</div>
<div class="tabs" id="tabs"></div>
<div class="scope"><label>Scope</label><select id="fCity"></select><span class="hint" id="scopehint"></span></div>
<div class="cards" id="cards"></div>
<div class="ads" id="ads"></div>
<div class="facets" id="facets"></div>
<div class="active" id="active"></div>
<table><thead><tr id="hdr">
  <th data-s="city">City</th><th data-s="loc">Clinic</th>
  <th data-s="rival">Top rival</th><th data-s="pathy">Type</th><th data-s="rcat" title="the rival's Google Business category">Rival GMB category</th>
  <th data-s="our" title="our clinic's Google review count">Our rev</th><th data-s="rrev" title="the #1 rival's review count">Rival rev</th>
  <th data-s="ratio">Ratio</th><th data-s="gap" title="reviews we'd need to catch up (rival − ours)">Gap ⤢</th><th data-s="dist">Dist</th>
  <th data-s="gmb" title="searches that showed our Google listing, per week (map + search views · mature 4-week avg)">Our GMB views/wk</th><th data-s="verdict">Verdict</th><th>Maps</th>
</tr></thead><tbody id="rows"></tbody></table>
</div>
<script>
let CUBE,CAT,SORT={col:null,dir:1},TAX=null;
const CATLBL={SH:'Sexual Health',STI:'STI',MH:'Mental Health'};
// taxonomy is per-category, supplied by the cube (_meta.tax): pathy for SH, facility-type for STI/MH
function tax(){return (TAX&&TAX[CAT])||{kind:{},kindOrder:[],typeColor:{},kindColor:{}};}
function kindOf(p){return tax().kind[p]||'Other';}
function typeColor(p){return tax().typeColor[p]||'#9AA6B5';}
function kindColor(k){return tax().kindColor[k]||'#9AA6B5';}
function kindOrder(){return tax().kindOrder||[];}
function pill(p){return `<span class="pill" style="background:${typeColor(p)}">${p}</span>`}
// outcome tags → label + colour ('beaten:<Type>' resolved dynamically)
const OUTLBL={winning:'Winning (more reviews)',['have-reviews-but-outranked']:'Have reviews · outranked',['review-gap']:'Big review gap'};
const OUTCOL={winning:'var(--win)',['have-reviews-but-outranked']:'var(--acc)',['review-gap']:'var(--red)'};
function tagLabel(t){return t.startsWith('beaten:')?'Beaten by '+t.slice(7):(OUTLBL[t]||t);}
function tagColor(t){return t.startsWith('beaten:')?typeColor(t.slice(7)):(OUTCOL[t]||'#999');}
function outLabel(v){if(v==='__beaten')return 'Beaten by a rival';if(v.startsWith('__bkind:'))return 'Beaten by '+v.slice(8);return tagLabel(v);}
fetch('data_competition.json').then(r=>r.json()).then(d=>{CUBE=d;TAX=d._meta.tax;CAT=d._meta.cats[0];
  document.getElementById('tabs').innerHTML=d._meta.cats.map(c=>`<div class="tab" data-c="${c}">${CATLBL[c]||c}</div>`).join('');
  document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{CAT=t.dataset.c;render();});
  render();});
let FIL={out:[],type:[],rev:[],rrev:[],win:[]},FILX={out:[],type:[],rev:[],rrev:[],win:[]},SCOPED=[];   // FIL=include, FILX=exclude
function render(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.c===CAT));
  FIL={out:[],type:[],rev:[],rrev:[],win:[]};FILX={out:[],type:[],rev:[],rrev:[],win:[]};SORT={col:null,dir:1};
  const C=CUBE[CAT];
  const cities=Object.keys(C.cities).sort();
  document.getElementById('fCity').innerHTML='<option value="">National — all cities</option>'+cities.map(c=>`<option>${c}</option>`).join('');
  document.getElementById('fCity').onchange=draw;
  document.querySelectorAll('#hdr th[data-s]').forEach(th=>th.onclick=()=>{const c=th.dataset.s;SORT.dir=SORT.col===c?-SORT.dir:1;SORT.col=c;draw();});
  draw();
}
// ---- faceted filter model: every facet is a predicate; counts cross-filter by the OTHER active facets ----
const PRED={
  out:(r,v)=>{
    if(v==='__beaten')return r.tags.some(t=>t.startsWith('beaten:'));
    if(v.startsWith('__bkind:')){const k=v.slice(8);return r.tags.some(t=>t.startsWith('beaten:')&&kindOf(t.slice(7))===k);}
    return r.tags.includes(v);
  },
  type:(r,v)=>{const p=r.competitors[0].pathy;return kindOrder().includes(v)?kindOf(p)===v:p===v;},
  rev:(r,v)=>{const o=r.our_reviews;return v==='strong'?o>=300:v==='mid'?(o>=100&&o<300):o<100;},
  rrev:(r,v)=>{const x=r.competitors[0].reviews;return v==='giant'?x>=1000:v==='strong'?(x>=300&&x<1000):v==='mid'?(x>=100&&x<300):x<100;},
  win:(r,v)=>{const riv=r.competitors[0].reviews,rt=riv?r.our_reviews/riv:99;return v==='ahead'?rt>=1:v==='comparable'?(rt>=0.5&&rt<1):v==='stretch'?(rt>=0.2&&rt<0.5):rt<0.2;},
};
const applyFil=(rows,except)=>rows.filter(r=>Object.keys(FIL).every(k=>{
  if(k===except)return true;
  if(FILX[k].length&&FILX[k].some(v=>PRED[k](r,v)))return false;      // excluded value present → drop
  if(FIL[k].length&&!FIL[k].some(v=>PRED[k](r,v)))return false;       // includes set but none match → drop
  return true;}));
function toggle(k,v){const x=FILX[k].indexOf(v);if(x>=0)FILX[k].splice(x,1);const a=FIL[k],i=a.indexOf(v);i>=0?a.splice(i,1):a.push(v);draw();}
function toggleX(k,v){const a=FIL[k],i=a.indexOf(v);if(i>=0)a.splice(i,1);const b=FILX[k],j=b.indexOf(v);j>=0?b.splice(j,1):b.push(v);draw();}
function renderCards(rows){
  const n=rows.length,cnt=f=>rows.filter(f).length;
  const win=cnt(r=>r.tags.includes('winning')),outrank=cnt(r=>r.tags.includes('have-reviews-but-outranked')),
        beaten=cnt(r=>r.tags.some(t=>t.startsWith('beaten:'))),gap=cnt(r=>r.tags.includes('review-gap'));
  document.getElementById('scopehint').textContent=`${n} Allo clinic${n===1?'':'s'} in scope · ${CATLBL[CAT]}`;
  document.getElementById('cards').innerHTML=[
    ['Clinics',n],['Winning · more reviews','<span style="color:var(--win)">'+win+'</span> ('+(n?Math.round(win/n*100):0)+'%)'],
    ['Beaten by a rival','<span style="color:var(--red)">'+beaten+'</span>'],['Big review gap',gap],
    ['Have reviews · outranked',outrank]
  ].map(([k,v])=>`<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
}
// one compact facet row: label + count on top, a proportional coloured clickable bar below
function frowHTML(key,v,label,n,mx,color,on,exc,dim){
  return `<div class="frow ${on?'on':exc?'ex':dim?'dim':''}" data-k="${key}" data-v="${v}">
    <div class="fhead"><span class="fdot" style="background:${color}"></span><span class="flbl">${label}</span></div>
    <span class="fn">${n}</span><span class="fhide" data-kx="${key}" data-v="${v}" title="hide / show all but this">${exc?'⊘':'⊘'}</span>
    <div class="fbarbg"><i style="width:${mx?Math.max(n?4:0,n/mx*100):0}%;background:${color}"></i></div></div>`;
}
function barFacet(key,title,opts,colf){
  const base=applyFil(SCOPED,key),active=FIL[key],ex=FILX[key];
  const cts=opts.map(([v,l])=>[v,l,base.filter(r=>PRED[key](r,v)).length]);
  const mx=Math.max(1,...cts.map(c=>c[2]));
  const rows=cts.map(([v,l,n])=>frowHTML(key,v,l,n,mx,colf(v),active.includes(v),ex.includes(v),active.length&&!active.includes(v)&&!ex.includes(v))).join('');
  return `<div class="facet"><h4>${title}<span class="clr ${active.length||ex.length?'on':''}" data-k="${key}">clear</span></h4>${rows}</div>`;
}
// two-level top-rival TYPE facet: kind rows each with type sub-chips (adapts per category via cube tax)
function typeFacet(){
  const base=applyFil(SCOPED,'type'),active=FIL.type;
  const g={};base.forEach(r=>{const p=r.competitors[0].pathy,k=kindOf(p);(g[k]=g[k]||{c:0,p:{}});g[k].c++;g[k].p[p]=(g[k].p[p]||0)+1;});
  const kinds=kindOrder().filter(k=>g[k]),mx=Math.max(1,...kinds.map(k=>g[k].c));
  const ex=FILX.type;
  const body=kinds.map(k=>{
    const G=g[k],subs=Object.entries(G.p).sort((a,b)=>b[1]-a[1]);
    const kon=active.includes(k),kex=ex.includes(k),kdim=active.length&&!kon&&!kex&&!subs.some(([p])=>active.includes(p));
    const row=frowHTML('type',k,k,G.c,mx,kindColor(k),kon,kex,kdim);
    const showSub=subs.length>1||subs[0][0]!==k;
    const sub=showSub?`<div class="ksub">`+subs.map(([p,c])=>`<span class="sc ${active.includes(p)?'on':''} ${ex.includes(p)?'exq':''}" data-v="${p}">${p} ${c}</span>`).join('')+`</div>`:'';
    return row+sub;
  }).join('');
  return `<div class="facet type"><h4>Top-rival type<span class="clr ${active.length||ex.length?'on':''}" data-k="type">clear</span></h4>${body}</div>`;
}
// hierarchical "Where we stand": Winning / Have-reviews-outranked / Beaten (parent → by-kind → by-type) / Review gap
function outcomeFacet(){
  const base=applyFil(SCOPED,'out'),active=FIL.out;
  const win=base.filter(r=>r.tags.includes('winning')).length;
  const outrank=base.filter(r=>r.tags.includes('have-reviews-but-outranked')).length;
  const gap=base.filter(r=>r.tags.includes('review-gap')).length;
  const beaten=base.filter(r=>r.tags.some(t=>t.startsWith('beaten:')));
  const bk={};beaten.forEach(r=>{const t=r.tags.find(x=>x.startsWith('beaten:')).slice(7),k=kindOf(t);(bk[k]=bk[k]||{c:0,t:{}});bk[k].c++;bk[k].t[t]=(bk[k].t[t]||0)+1;});
  const mx=Math.max(1,win,outrank,beaten.length,gap),ex=FILX.out;
  const beatenOn=active.some(a=>a==='__beaten'||a.startsWith('__bkind:')||a.startsWith('beaten:'));
  const has=v=>active.includes(v),hax=v=>ex.includes(v);
  let html=frowHTML('out','winning','Winning · more reviews',win,mx,'var(--win)',has('winning'),hax('winning'),active.length&&!has('winning'));
  if(outrank)html+=frowHTML('out','have-reviews-but-outranked','Have reviews · outranked',outrank,mx,'var(--acc)',has('have-reviews-but-outranked'),hax('have-reviews-but-outranked'),active.length&&!has('have-reviews-but-outranked'));
  html+=frowHTML('out','__beaten','Beaten by a rival',beaten.length,mx,'var(--red)',has('__beaten'),hax('__beaten'),active.length&&!beatenOn);
  kindOrder().filter(k=>bk[k]).forEach(k=>{
    const K=bk[k],types=Object.entries(K.t).sort((a,b)=>b[1]-a[1]);
    const single=types.length===1&&types[0][0]===k;   // kind has one type == itself (e.g. Allopathic) → no redundant child
    html+=`<div class="ksub"><span class="sc ${has('__bkind:'+k)?'on':''}" data-out="__bkind:${k}" style="background:${kindColor(k)}1e;color:${kindColor(k)}">▸ ${k} ${K.c}</span>`+
      (single?'':types.map(([t,c])=>`<span class="sc ${has('beaten:'+t)?'on':''}" data-out="beaten:${t}">${t} ${c}</span>`).join(''))+`</div>`;
  });
  html+=frowHTML('out','review-gap','Big review gap',gap,mx,'var(--red)',has('review-gap'),hax('review-gap'),active.length&&!has('review-gap'));
  return `<div class="facet type"><h4>Where we stand<span class="clr ${active.length||ex.length?'on':''}" data-k="out">clear</span></h4>${html}</div>`;
}
function renderFacets(){
  const F=document.getElementById('facets');
  const wcol=v=>({ahead:'var(--win)',comparable:'var(--acc)',stretch:'var(--amber)',heavy:'var(--red)'}[v]);
  F.innerHTML=typeFacet()+outcomeFacet()
    +barFacet('win','Winnability · review ratio',[['ahead','Ahead ≥1×'],['comparable','Comparable ≤2×'],['stretch','Stretch 2–5×'],['heavy','Heavy >5×']],wcol)
    +barFacet('rev','Our reviews',[['strong','Strong ≥300'],['mid','Mid 100–300'],['thin','Thin <100']],()=>'var(--acc)')
    +barFacet('rrev','Rival reviews',[['giant','Giant ≥1000'],['strong','Strong 300–1000'],['mid','Mid 100–300'],['weak','Weak <100']],()=>'var(--red)');
  F.querySelectorAll('.frow').forEach(row=>row.onclick=()=>toggle(row.dataset.k,row.dataset.v));
  F.querySelectorAll('.fhide').forEach(h=>h.onclick=e=>{e.stopPropagation();toggleX(h.dataset.kx,h.dataset.v);});
  F.querySelectorAll('.ksub .sc[data-v]').forEach(s=>s.onclick=e=>{e.stopPropagation();toggle('type',s.dataset.v);});
  F.querySelectorAll('.ksub .sc[data-out]').forEach(s=>s.onclick=e=>{e.stopPropagation();toggle('out',s.dataset.out);});
  F.querySelectorAll('.clr').forEach(c=>c.onclick=e=>{e.stopPropagation();FIL[c.dataset.k]=[];FILX[c.dataset.k]=[];draw();});
}
function renderActive(shown,total){
  const chips=[];
  if(fCity.value)chips.push(`<span class="chip"><b>${fCity.value}</b> scope</span>`);
  const add=(k,v,txt)=>chips.push(`<span class="chip"><b>${txt}</b><span class="x" data-k="${k}" data-v="${v}">✕</span></span>`);
  const addx=(k,v,txt)=>chips.push(`<span class="chip exq"><b>≠ ${txt}</b><span class="x" data-kx="${k}" data-v="${v}">✕</span></span>`);
  const winlbl={ahead:'Ahead ≥1×',comparable:'Comparable ≤2×',stretch:'Stretch 2–5×',heavy:'Heavy >5×'};
  FIL.out.forEach(v=>add('out',v,outLabel(v)));
  FIL.type.forEach(v=>add('type',v,v));
  FIL.win.forEach(v=>add('win',v,'Winnability · '+(winlbl[v]||v)));
  FIL.rev.forEach(v=>add('rev',v,'Our reviews · '+v));
  FIL.rrev.forEach(v=>add('rrev',v,'Rival reviews · '+v));
  FILX.out.forEach(v=>addx('out',v,outLabel(v)));
  FILX.type.forEach(v=>addx('type',v,v));
  FILX.win.forEach(v=>addx('win',v,'Winnability · '+(winlbl[v]||v)));
  FILX.rev.forEach(v=>addx('rev',v,'Our reviews · '+v));
  FILX.rrev.forEach(v=>addx('rrev',v,'Rival reviews · '+v));
  const any=Object.values(FIL).some(a=>a.length)||Object.values(FILX).some(a=>a.length);
  const A=document.getElementById('active');
  A.innerHTML=chips.join('')+(any?`<span class="clrall" id="clrall">clear all</span>`:'')+`<span class="cnt">${shown} of ${total} clinics</span>`;
  A.querySelectorAll('.chip .x[data-k]').forEach(x=>x.onclick=()=>toggle(x.dataset.k,x.dataset.v));
  A.querySelectorAll('.chip .x[data-kx]').forEach(x=>x.onclick=()=>toggleX(x.dataset.kx,x.dataset.v));
  const ca=document.getElementById('clrall');if(ca)ca.onclick=()=>{FIL={out:[],type:[],rev:[],rrev:[],win:[]};FILX={out:[],type:[],rev:[],rrev:[],win:[]};draw();};
}
function deriveAds(f){const r=(n,d)=>d?n/d:0;return{
  mkt:f.mkt,IS:r(f.impr,f.mkt),spend:f.spend,clicks:f.clicks,cpc:r(f.spend,f.clicks),
  locpct:r(f.locclicks,f.clicks),cplc:r(f.spend,f.locclicks),loc2ld:r(f.leads,f.locclicks),
  leads:f.leads,cpl:r(f.spend,f.leads),ld2bk:r(f.bookings,f.leads),bk2dn:r(f.done,f.bookings)};}
function renderAds(scopeCity){
  const C=CUBE[CAT];let raw;
  if(scopeCity){raw=(C.cities[scopeCity]||{}).funnel;}
  else{
    const fs=Object.values(C.cities).map(c=>c.funnel).filter(Boolean);
    const s=k=>fs.reduce((a,x)=>a+(x[k]||0),0);
    raw=fs.length?{mkt:s('mkt'),impr:s('impr'),spend:s('spend'),clicks:s('clicks'),locclicks:s('locclicks'),
       leads:s('leads'),bookings:s('bookings'),done:s('done')}:null;
  }
  const A=document.getElementById('ads');
  if(!raw||!raw.spend){A.style.display='none';A.innerHTML='';return;}
  const f=deriveAds(raw);A.style.display='';
  const pct=x=>Math.round((x||0)*100)+'%',money=x=>'₹'+Math.round(x||0).toLocaleString('en-IN'),num=x=>Math.round(x||0).toLocaleString('en-IN');
  const items=[['Market (est.)',num(f.mkt),'eligible search volume/wk'],['Impr. share',pct(f.IS),'impressions ÷ eligible'],
    ['Spend/wk',money(f.spend),''],['CPC',money(f.cpc),'cost per click'],['Loc %',pct(f.locpct),'location clicks ÷ clicks'],
    ['CPLC',money(f.cplc),'cost per location click'],['Loc→lead',pct(f.loc2ld),'leads ÷ location clicks'],
    ['Leads/wk',num(f.leads),''],['CPL',money(f.cpl),'cost per lead'],['Lead→book',pct(f.ld2bk),''],['Book→done',pct(f.bk2dn),'']];
  A.innerHTML=`<div class="ah">Google Ads · ${scopeCity||'National'} <span class="muted" style="font-weight:500">/wk · ${CAT} Exact-Local</span></div>`+
   items.map(([k,v,t])=>`<div class="adm" title="${t}"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');
}
function draw(){
  const C=CUBE[CAT],cl=C.clinics,fc=fCity.value;
  SCOPED=Object.values(cl).filter(r=>!fc||r.city===fc);
  renderCards(SCOPED,fc);
  renderAds(fc);
  renderFacets();
  let rows=applyFil(SCOPED);
  renderActive(rows.length,SCOPED.length);
  const sv=(r,c)=>{const t=r.competitors[0];return {city:r.city,loc:r.loc,rival:t.name,pathy:t.pathy,rcat:t.category||'',our:r.our_reviews,rrev:t.reviews,ratio:t.reviews?r.our_reviews/t.reviews:0,gap:r.our_reviews-t.reviews,dist:t.km==null?99999:t.km,gmb:r.gmb?r.gmb.searches:-1,verdict:r.vkind}[c];};
  if(SORT.col)rows.sort((a,b)=>{const x=sv(a,SORT.col),y=sv(b,SORT.col);return (typeof x==='string'?x.localeCompare(y):(x-y))*SORT.dir;});
  else rows.sort((a,b)=>(a.city+a.loc).localeCompare(b.city+b.loc));
  document.querySelectorAll('#hdr th[data-s]').forEach(h=>{const b=h.dataset.lbl||(h.dataset.lbl=h.textContent.trim());h.textContent=b+(SORT.col===h.dataset.s?(SORT.dir>0?' ▲':' ▼'):'');});
  document.getElementById('rows').innerHTML=rows.map((r,i)=>{
    const t=r.competitors[0],ratio=t.reviews?(r.our_reviews/t.reviews):null;
    const rc=ratio==null?'':ratio>=1?'r-green':ratio>=0.5?'r-amber':'r-red';
    const gap=r.our_reviews-t.reviews;   // + = we're ahead, − = behind
    let gc,gtxt;
    if(gap>=0){gc='g-ahead';gtxt='+'+gap+' ahead';}
    else{const a=-gap;gc=a<150?'g-mid':a<600?'g-big':'g-huge';gtxt='−'+a;}
    return `<tr class="clk" data-k="${r.city}|${r.loc}">
      <td>${r.city}</td><td><b>${r.loc}</b></td>
      <td>${t.name.slice(0,26)}</td><td>${pill(t.pathy)}</td><td class="muted" style="font-size:11px">${t.category||'—'}</td>
      <td class="rev">${r.our_reviews||'—'}</td>
      <td class="rev">${t.reviews||'—'}</td>
      <td class="${rc}">${ratio!=null?ratio.toFixed(2):'—'}</td>
      <td class="${gc}">${gtxt}</td>
      <td>${t.km!=null?t.km+'km':'—'}</td>
      <td class="rev">${r.gmb?r.gmb.searches.toLocaleString('en-IN'):'—'}</td>
      <td class="vk-${r.vkind}">${r.verdict}</td>
      <td><a class="maps" href="${r.our_maps}" target="_blank">Allo ↗</a></td></tr>
    <tr class="detail" id="d-${i}" style="display:none"><td colspan="13"></td></tr>`;
  }).join('');
  document.querySelectorAll('tr.clk').forEach((tr,i)=>tr.onclick=()=>{
    const d=document.getElementById('d-'+i),r=rows[i];
    if(d.style.display!=='none'){d.style.display='none';return;}
    d.style.display='';
    d.firstElementChild.innerHTML=`<div style="padding:6px 10px"><b>${r.loc}, ${r.city}</b> — our ${r.our_reviews} reviews · ${r.tags.map(t=>`<span class="tag" style="border-left:3px solid ${tagColor(t)}">${tagLabel(t)}</span>`).join('')}
      · <a class="maps" href="${r.our_maps}" target="_blank">our Allo listing ↗</a></div>
      ${r.gmb?`<div class="muted" style="padding:0 10px 6px">📍 Our GMB (mature ${r.gmb.mature_wks}-wk avg, per week): <b>${r.gmb.searches.toLocaleString('en-IN')}</b> map+search views → <b>${r.gmb.calls}</b> calls · <b>${r.gmb.website}</b> website · <b>${r.gmb.directions}</b> directions (${r.gmb.interactions} total actions)</div>`:''}
      <table><thead><tr><th>#</th><th>Competitor</th><th>Type</th><th>GMB category</th><th>Rating</th><th>Reviews</th><th>Distance</th><th>Ads</th><th>Maps</th></tr></thead><tbody>${
      r.competitors.map((c,j)=>`<tr${c.rel===false?' style="opacity:.5"':''}><td>${j+1}</td><td>${c.name}${c.rel===false?' <span class="muted" style="font-size:9px">(not men\'s-SH)</span>':''}</td><td>${pill(c.pathy)}</td><td class="muted">${c.category||'—'}</td><td>${c.rating||'—'}★</td><td class="rev ${c.reviews>r.our_reviews?'gap':'lead'}">${c.reviews||'—'}</td><td>${c.km!=null?c.km+'km':'—'}</td><td>${c.ads?'🟡 ads':''}</td><td>${c.maps?`<a class="maps" href="${c.maps}" target="_blank">Maps ↗</a>`:'—'}</td></tr>`).join('')}</tbody></table>`;
  });
}
</script></body></html>
